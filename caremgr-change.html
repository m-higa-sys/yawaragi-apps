<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- キャッシュ自動更新バージョンゲート（design.md 2026-06-18 準拠・<head>最先頭） -->
    <!-- version.txt を取得し、現URLの ?v= と違えば1回だけ最新版へ location.replace する -->
    <script>
    function gateShouldReload(cur, latest) { return !!latest && cur !== latest; }
    function buildVersionedUrl(currentUrl, latest) { var u = new URL(currentUrl); u.searchParams.set('v', latest); return u.href; }
    (function () {
        try {
            var cur = new URLSearchParams(location.search).get('v');
            fetch('version.txt?_=' + Date.now(), { cache: 'no-store' })
                .then(function (r) { return r.text(); })
                .then(function (t) {
                    var latest = (t || '').trim();
                    if (gateShouldReload(cur, latest)) {
                        location.replace(buildVersionedUrl(location.href, latest));
                    }
                })
                .catch(function () { /* オフライン等は no-op で固まらせない */ });
        } catch (e) { /* 念のため no-op（ゲートで画面を固まらせない） */ }
    })();
    </script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>ケアマネ変更 | yawaragi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --navy-0: #0e1623;
    --navy-1: #131e30;
    --navy-2: #1b293f;
    --navy-3: #243651;
    --navy-line: #2e4566;
    --ink-on-dark: #f4f7fb;
    --ink-on-dark-mute: #b6c2d4;

    --paper: #f6f4ed;
    --paper-deep: #ece8db;
    --ink-deep: #0b1320;

    --accent: #f5c518;
    --accent-warm: #ff7a3a;
    --accent-cool: #58e1c4;

    --shadow-card: 6px 6px 0 var(--navy-0);

    --display: 'Bricolage Grotesque', 'Noto Sans JP', sans-serif;
    --jp: 'Noto Sans JP', sans-serif;
}

html, body {
    background: var(--paper);
    color: var(--ink-deep);
    font-family: var(--jp);
    font-size: 16px;
    line-height: 1.6;
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
}

body {
    background-image:
        radial-gradient(circle at 1px 1px, rgba(14, 22, 35, 0.08) 1px, transparent 0);
    background-size: 20px 20px;
    background-color: var(--paper);
}
body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 240px;
    background: linear-gradient(180deg, var(--accent) 0%, rgba(245, 197, 24, 0.4) 78%, transparent 100%);
    z-index: 0;
    pointer-events: none;
}

button { font-family: inherit; }
input, select, textarea { font-family: inherit; }

.page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

/* ============ HEADER ============ */
.hero {
    color: var(--ink-deep);
    padding: 32px 30px;
    position: relative;
    margin-top: 24px;
    border: 3px solid var(--navy-0);
    background: #fffdf6;
    box-shadow: var(--shadow-card);
    border-radius: 6px;
    overflow: hidden;
}
.hero::after {
    content: "";
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: var(--accent);
    transform: rotate(45deg);
    z-index: 0;
}
.hero > * { position: relative; z-index: 1; }
.hero h1 {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(2rem, 4.5vw, 2.8rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--ink-deep);
}
.hero h1 .icon { margin-right: 8px; }
.hero-desc {
    font-size: 15px;
    color: #3a4252;
    margin-top: 14px;
    max-width: 60ch;
    line-height: 1.7;
}
.hero-desc b { color: var(--ink-deep); font-weight: 800; background: var(--accent); padding: 1px 4px; }

/* hero-meta（統計）は今回は非表示。将来拡張用にCSSは残す */
.hero-meta {
    display: flex;
    gap: 28px;
    margin-top: 22px;
    flex-wrap: wrap;
    align-items: baseline;
    padding-top: 18px;
    border-top: 2px dashed rgba(14, 22, 35, 0.2);
}
.stat { display: flex; align-items: baseline; gap: 10px; }
.stat .num {
    font-family: var(--display);
    font-weight: 800;
    font-size: 36px;
    line-height: 1;
    color: var(--ink-deep);
    letter-spacing: -0.03em;
}
.stat .lbl { font-family: var(--jp); font-weight: 700; font-size: 14px; color: #5b6477; }
.stat.warm .num { color: var(--accent-warm); }
.stat.cool .num { color: #2a8a73; }

/* ============ TOOLBAR ============ */
.toolbar {
    display: flex;
    gap: 12px;
    align-items: stretch;
    flex-wrap: wrap;
    margin: 26px 0 28px;
}
.btn {
    font-family: var(--jp);
    font-weight: 800;
    font-size: 16px;
    border: 3px solid var(--navy-0);
    border-radius: 6px;
    padding: 14px 22px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 5px 5px 0 var(--navy-0);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    background: #fff;
    color: var(--navy-0);
}
.btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0 var(--navy-0);
}
.btn:active {
    transform: translate(5px, 5px);
    box-shadow: 0 0 0 var(--navy-0);
}
.btn-primary { background: var(--accent); color: var(--navy-0); }
.btn-secondary { background: #fff; color: var(--navy-0); }
.btn-secondary:hover { background: var(--accent-cool); }
.btn-reload {
    background: var(--navy-2);
    color: var(--ink-on-dark);
    font-weight: 700;
    font-size: 15px;
    margin-left: auto;
}
.btn-reload:hover { background: var(--navy-1); }
.btn .plus {
    font-size: 22px;
    line-height: 1;
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--navy-0);
    color: var(--accent);
    border-radius: 4px;
    font-weight: 900;
}
.btn:disabled,
.btn[data-locked="1"] {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
    box-shadow: 5px 5px 0 var(--navy-0);
}

/* モーダル内の小型ボタン */
.btn-sm {
    font-family: var(--jp);
    font-weight: 800;
    font-size: 14px;
    border: 2.5px solid var(--navy-0);
    border-radius: 5px;
    padding: 8px 16px;
    cursor: pointer;
    background: #fff;
    color: var(--navy-0);
    box-shadow: 3px 3px 0 var(--navy-0);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
}
.btn-sm:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--navy-0); }
.btn-sm:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--navy-0); }
.btn-sm.primary { background: var(--accent); }
.btn-sm.danger { background: #fff5f5; color: #c53030; border-color: #c53030; box-shadow: 3px 3px 0 #c53030; }
.btn-sm.danger:hover { box-shadow: 4px 4px 0 #c53030; }
.btn-sm.danger:active { box-shadow: 0 0 0 #c53030; }
.btn-sm:disabled, .btn-sm[data-locked="1"] { opacity: 0.55; cursor: not-allowed; transform: none; }

/* ============ SECTION HEADER ============ */
.section-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 3px solid var(--navy-0);
}
.section-bar .label {
    font-family: var(--jp);
    font-weight: 900;
    font-size: 22px;
    color: var(--navy-0);
}
.section-bar .count-chip {
    margin-left: auto;
    font-family: var(--jp);
    font-weight: 700;
    font-size: 14px;
    background: var(--navy-0);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 4px;
}

/* ============ CARDS ============ */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
}

.card {
    position: relative;
    background: #fff;
    border: 3px solid var(--navy-0);
    border-radius: 6px;
    padding: 18px 18px 16px 24px;
    box-shadow: 6px 6px 0 var(--navy-0);
    cursor: pointer;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
    opacity: 0;
    transform: translateY(16px);
    animation: slamIn 0.5s cubic-bezier(.34,1.56,.64,1) forwards;
    overflow: hidden;
}
.card:nth-child(1) { animation-delay: 0.04s; }
.card:nth-child(2) { animation-delay: 0.10s; }
.card:nth-child(3) { animation-delay: 0.16s; }
.card:nth-child(4) { animation-delay: 0.22s; }
.card:nth-child(5) { animation-delay: 0.26s; }
.card:nth-child(6) { animation-delay: 0.30s; }
@keyframes slamIn {
    to { opacity: 1; transform: translateY(0); }
}

.card:hover {
    transform: translate(-3px, -3px);
    box-shadow: 9px 9px 0 var(--navy-0);
}
.card:active {
    transform: translate(5px, 5px);
    box-shadow: 0 0 0 var(--navy-0);
}

.card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 10px;
    background: var(--accent);
}
.card.is-contract::before { background: var(--accent); }
.card.is-meeting::before  { background: var(--accent-cool); }
.card.is-cmchange::before { background: var(--accent-warm); }
.card.is-done::before     { background: #b0b9c6; }

.card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
}
.type-chip {
    display: inline-flex;
    align-items: center;
    font-family: var(--jp);
    font-weight: 800;
    font-size: 14px;
    padding: 4px 12px;
    background: var(--navy-0);
    color: var(--accent);
    border-radius: 4px;
}
.card.is-meeting .type-chip { color: var(--accent-cool); }
.card.is-cmchange .type-chip { color: var(--accent-warm); }
.card.is-done .type-chip { background: #b0b9c6; color: var(--navy-0); }

.status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--jp);
    font-weight: 700;
    font-size: 13px;
    color: var(--navy-2);
}
.status-pill .d { width: 9px; height: 9px; border-radius: 50%; background: var(--accent-warm); }
.card.is-done .status-pill .d { background: var(--accent-cool); }

.card-name {
    font-family: var(--jp);
    font-weight: 900;
    font-size: 24px;
    line-height: 1.2;
    color: var(--navy-0);
    margin: 6px 0 16px 0;
    letter-spacing: -0.005em;
}
.card.is-done .card-name { color: #6b7686; }

.card-meta {
    font-family: var(--jp);
    font-weight: 500;
    font-size: 12px;
    color: #6b7686;
    margin: -8px 0 14px 0;
    line-height: 1.5;
}

.progress-block { }
.progress-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
}
.progress-num {
    font-family: var(--display);
    font-weight: 800;
    font-size: 30px;
    line-height: 1;
    color: var(--navy-0);
    letter-spacing: -0.03em;
}
.progress-num .of {
    font-size: 17px;
    color: #6b7686;
    margin-left: 2px;
    font-weight: 700;
}
.progress-pct {
    font-family: var(--display);
    font-weight: 800;
    font-size: 15px;
    color: var(--navy-2);
    background: var(--paper-deep);
    padding: 4px 10px;
    border-radius: 4px;
    border: 2px solid var(--navy-0);
}
.card.is-done .progress-pct {
    background: var(--accent-cool);
    color: var(--navy-0);
}

.progress-bar {
    height: 14px;
    background: var(--paper-deep);
    border: 2.5px solid var(--navy-0);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: var(--accent);
    width: var(--pct, 0%);
    transition: width 0.7s cubic-bezier(.34,1.56,.64,1);
}
.card.is-meeting .progress-fill { background: var(--accent-cool); }
.card.is-cmchange .progress-fill { background: var(--accent-warm); }
.card.is-done .progress-fill { background: var(--accent-cool); }

.today-strip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    background: var(--accent-warm);
    color: var(--navy-0);
    font-family: var(--jp);
    font-weight: 900;
    font-size: 14px;
    padding: 7px 12px;
    border: 2.5px solid var(--navy-0);
    border-radius: 4px;
    box-shadow: 3px 3px 0 var(--navy-0);
}
.today-strip .icon {
    width: 18px; height: 18px;
    background: var(--navy-0);
    color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 900;
}

.empty {
    margin-top: 36px;
    padding: 22px 18px;
    border: 3px dashed var(--navy-line);
    border-radius: 6px;
    text-align: center;
    background: rgba(255,255,255,0.5);
    font-family: var(--jp);
    font-weight: 700;
    font-size: 15px;
    color: var(--navy-2);
}

/* ============ モーダル ============ */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(14, 22, 35, 0.55); z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal-content {
    background: #fffdf6;
    border: 3px solid var(--navy-0);
    border-radius: 6px;
    box-shadow: var(--shadow-card);
    padding: 22px 22px 20px;
    width: 96%;
    max-height: 92vh;
    overflow-y: auto;
    position: relative;
}
.modal-content.modal-md { max-width: 480px; }
.modal-content.modal-sm { max-width: 380px; }
.modal-content.modal-lg { max-width: 720px; }
.modal-content h3 {
    font-family: var(--jp);
    font-weight: 900;
    font-size: 1.25rem;
    color: var(--navy-0);
    margin: 0 0 16px 0;
    padding-bottom: 10px;
    border-bottom: 2.5px solid var(--navy-0);
}

/* モーダル内フォーム要素 */
.modal-content label {
    display: block;
    margin-bottom: 14px;
    font-family: var(--jp);
    font-weight: 700;
    font-size: 14px;
    color: var(--navy-1);
}
.modal-content label .req { color: #c53030; margin-left: 2px; }
.modal-content input[type="text"],
.modal-content input[type="date"],
.modal-content select {
    width: 100%;
    padding: 10px 12px;
    margin-top: 6px;
    font-size: 15px;
    font-family: var(--jp);
    font-weight: 500;
    color: var(--navy-0);
    background: #fff;
    border: 2.5px solid var(--navy-0);
    border-radius: 5px;
    box-sizing: border-box;
    transition: box-shadow 0.12s ease, border-color 0.12s ease;
}
.modal-content input[type="text"]:focus,
.modal-content input[type="date"]:focus,
.modal-content select:focus {
    outline: none;
    border-color: var(--navy-0);
    box-shadow: 0 0 0 3px var(--accent);
}
.modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 18px;
    flex-wrap: wrap;
}
.modal-actions.split { justify-content: space-between; align-items: center; }

/* 詳細モーダル：チェックリスト項目 */
.modal-content .detail-close {
    background: none;
    border: 2.5px solid var(--navy-0);
    border-radius: 5px;
    font-family: var(--jp);
    font-weight: 800;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 2px 12px;
    color: var(--navy-0);
    background: #fff;
    box-shadow: 3px 3px 0 var(--navy-0);
}
.modal-content .detail-close:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--navy-0); }
.modal-content .detail-close:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--navy-0); }
.detail-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin: 0 0 16px 0;
    padding-bottom: 10px;
    border-bottom: 2.5px solid var(--navy-0);
}
.detail-header-row h3 {
    margin: 0; padding: 0; border: none;
    font-size: 1.15rem;
}
.detail-item {
    display: flex;
    align-items: flex-start;
    padding: 10px 6px;
    border-bottom: 1.5px solid var(--paper-deep);
}
.detail-item.is-done { opacity: 0.55; }
.detail-item input[type="checkbox"] {
    margin-right: 12px;
    margin-top: 4px;
    transform: scale(1.3);
    cursor: pointer;
    accent-color: var(--navy-0);
}
.detail-item-body { flex: 1; }
.detail-item-label {
    font-family: var(--jp);
    font-weight: 600;
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--navy-0);
}
.detail-item .urgent-on { color: #e53e3e; font-weight: 900; margin-right: 4px; }
.detail-item .urgent-off { opacity: 0.3; margin-right: 4px; cursor: pointer; user-select: none; }
.detail-item .urgent-toggle { cursor: pointer; user-select: none; margin-right: 4px; }
.detail-item .tag-select {
    font-size: 0.78rem;
    margin-left: 6px;
    padding: 2px 6px;
    border: 2px solid var(--navy-0);
    border-radius: 3px;
    background: var(--paper-deep);
    color: var(--navy-0);
    font-family: var(--jp);
    font-weight: 700;
    cursor: pointer;
}
.detail-item .tag-readonly {
    font-size: 0.78rem;
    color: #5b6477;
    margin-left: 6px;
    font-weight: 700;
}
.detail-item .edit-pen {
    cursor: pointer;
    color: var(--navy-2);
    margin-left: 6px;
    font-size: 0.85rem;
}
.detail-item .edit-pen:hover { color: var(--navy-0); }
.detail-item .done-line {
    font-size: 0.78rem;
    color: #6b7686;
    margin-top: 4px;
    font-weight: 500;
}
.detail-item .done-line .fix-link {
    cursor: pointer;
    color: var(--navy-2);
    margin-left: 6px;
    font-size: 0.82rem;
    font-weight: 700;
    text-decoration: underline;
}
.detail-footer-note {
    font-size: 0.8rem;
    color: #5b6477;
    padding: 12px 6px 4px;
    margin-top: 6px;
    border-top: 1.5px dashed var(--paper-deep);
    font-weight: 500;
}

/* ============ TOAST ============ */
.toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--navy-0);
    color: var(--accent);
    padding: 14px 26px;
    border: 2.5px solid var(--navy-0);
    border-radius: 5px;
    font-family: var(--jp);
    font-weight: 800;
    font-size: 0.95rem;
    z-index: 2000;
    transition: transform 0.3s ease;
    box-shadow: 5px 5px 0 var(--navy-2);
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
    .page { padding: 0 14px 50px; }
    .hero { padding: 24px 18px; }
    .btn-reload { margin-left: 0; width: 100%; justify-content: center; }
    .card-name { font-size: 21px; }
    .hero h1 { font-size: 1.8rem; }
}

/* 適用開始月セクション（予約反映機能 2026-05-29） */
.apply-month-section {
    border-top: 1px solid #eee;
    padding-top: 12px;
    margin-top: 12px;
    margin-bottom: 10px;
}
.apply-month-section .radio-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}
.apply-month-section .radio-row select {
    padding: 6px 10px;
    border: 2px solid var(--navy-0);
    border-radius: 5px;
    background: #fff;
    font-size: 0.9rem;
    cursor: pointer;
}
.apply-month-section .radio-row select:disabled {
    background: #f3f4f6;
    color: #9ca3af;
    cursor: not-allowed;
}
.apply-month-section .hint {
    font-size: 12px;
    color: #6b7280;
    margin: 6px 0 0;
}

/* イベントカード予約中バッジ（予約反映機能 2026-05-29） */
.evt-yoyaku-badge {
    display: inline-block;
    background: #fbbf24;
    color: #78350f;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 700;
    margin-left: 8px;
}
</style>
</head>
<body>

<header class="hero">

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ===== GAS API URL =====
const ABS_BOARD_API_URL = 'https://script.google.com/macros/s/AKfycbwo1UGxsK1qgmO8IDaqT-inDM0Qgoe_MRvxfKDxHy_gXANi4FwNFlgn2pEanMXVQxsdlw/exec';

// ===== 共通ユーティリティ（yawaragiボード.html から流用） =====
function showToast(msg, duration) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration || 2000);
}

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

// ===== リトライ付きGAS POST送信 =====
// 3回まで再試行。失敗時はスタッフに警告表示
async function gasPost(data, label) {
    const maxRetries = 3;
    for (let i = 1; i <= maxRetries; i++) {
        try {
            await fetch(ABS_BOARD_API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return true; // ネットワーク送信成功
        } catch (err) {
            console.error('GAS送信エラー (' + i + '/' + maxRetries + '): ' + (label || ''), err);
            if (i < maxRetries) {
                await new Promise(r => setTimeout(r, 2000));
            }
        }
    }
    showToast('⚠️ 送信失敗！ネットワークを確認してください', 5000);
    return false;
}

// ============================================================
// ===== 2重押し防止ヘルパー（2026-05-22追加）=====
// 登録ボタンを押した瞬間に無効化し、送信中の連打による重複登録を防ぐ。
// lockSubmitBtn: 戻り値 = ボタン要素（ロック成功）／ false（2回目の押下）／ null（ボタン不在）
// ============================================================
function lockSubmitBtn(btnId, busyLabel) {
    const btn = document.getElementById(btnId);
    if (!btn) return null;                          // ボタン不在＝従来通り素通し
    if (btn.dataset.locked === '1') return false;   // 既にロック中＝2回目の押下
    btn.dataset.locked = '1';
    btn.dataset.origLabel = btn.textContent;
    btn.disabled = true;
    btn.style.opacity = '0.55';
    btn.style.cursor = 'not-allowed';
    btn.textContent = busyLabel || '送信中…';
    return btn;
}
function unlockSubmitBtn(btn) {
    if (!btn || btn === false) return;
    btn.dataset.locked = '0';
    btn.disabled = false;
    btn.style.opacity = '';
    btn.style.cursor = 'pointer';
    if (btn.dataset.origLabel) btn.textContent = btn.dataset.origLabel;
}

// ============================================================
// ===== 利用者イベント（契約後35項目チェックリスト） 2026/4/29 =====
// ============================================================
const EVT_API_URL = ABS_BOARD_API_URL; // 同じGAS（既存定数を再利用）
const EVT_LABEL_MAP = { caremanager_change: 'ケアマネ変更' };
const ALLOWED_EVENT_TYPES = ['caremanager_change'];
let _evtCache = [];          // 一覧キャッシュ
let _evtCurrent = null;      // 詳細表示中のイベント

// ----- 一覧取得（JSONP） -----
function evtLoadList(_retryCount) {
    _retryCount = _retryCount || 0;
    const host = document.getElementById('user-events-list');
    if (!host) return;
    host.innerHTML = '<p style="color:#5b6477; padding:20px; text-align:center; grid-column: 1 / -1;">' +
        (_retryCount > 0 ? '再読み込み中... (' + _retryCount + ')' : '読み込み中…') + '</p>';

    const cbName = 'evtListCb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const url = EVT_API_URL + '?action=user_events&callback=' + cbName;

    window[cbName] = function(resp) {
        try {
            const events = (resp && resp.user_events) ? resp.user_events : [];
            _evtCache = events;
            evtRenderList(events);
        } catch (e) {
            host.innerHTML = '<p style="color:#c53030; padding:20px; grid-column: 1 / -1;">描画エラー: ' + escapeHtml(e && e.message || String(e)) + '</p>';
        } finally {
            try { delete window[cbName]; } catch(e) {}
        }
    };

    const script = document.createElement('script');
    script.src = url;
    script.onerror = function() {
        host.innerHTML = '<p style="color:#c53030; padding:20px; grid-column: 1 / -1;">通信エラー：GASに接続できません。Ctrl+Shift+R でリロードしてください。</p>';
        try { delete window[cbName]; } catch(e) {}
    };
    document.body.appendChild(script);
    setTimeout(() => {
        try { script.remove(); } catch(e) {}
        if (typeof window[cbName] === 'function') {
            try { delete window[cbName]; } catch(e) {}
            if (_retryCount < 2) {
                setTimeout(() => evtLoadList(_retryCount + 1), 500);
            } else {
                host.innerHTML = '<p style="color:#c53030; padding:20px; grid-column: 1 / -1;">取得タイムアウト：GAS応答なし（リトライ2回失敗）</p>';
            }
        }
    }, 8000);
}

function evtRenderList(events) {
    const host = document.getElementById('user-events-list');
    events = (events || []).filter(e => ALLOWED_EVENT_TYPES.includes(e.eventType));
    if (events.length === 0) {
        host.innerHTML = '<div class="empty" style="grid-column: 1 / -1;">進行中のイベントはありません。</div>';
        const chip0 = document.getElementById('event-count-chip');
        if (chip0) chip0.textContent = '0件';
        return;
    }
    host.innerHTML = '';
    events.forEach(evt => host.appendChild(evtBuildCard(evt)));
    // section-bar の件数バッジを更新
    const chip = document.getElementById('event-count-chip');
    if (chip) chip.textContent = events.length + '件';
}

// 予約中バッジ生成（予約反映機能 2026-05-29）
// metadata.適用開始月 が「YYYY-MM」かつ未来月の場合にバッジHTMLを返す
function makeYoyakuBadge(metadata) {
    if (!metadata || !metadata['適用開始月'] || metadata['適用開始月'] === '即時') return '';
    const ym = String(metadata['適用開始月']);
    if (!/^\d{4}-\d{2}$/.test(ym)) return '';
    const today = new Date();
    const todayYm = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
    if (ym <= todayYm) return ''; // 既に過ぎた予約はバッジ不要
    const ymLabel = ym.replace(/(\d{4})-(\d{2})/, function(_, y, m) {
        return y + '年' + parseInt(m, 10) + '月';
    });
    return '<span class="evt-yoyaku-badge">🟡 ' + ymLabel + 'から適用</span>';
}

function evtBuildCard(evt) {
    const card = document.createElement('article');
    const isDone = evt.status === 'completed';
    // このアプリは caremanager_change 専用なので常に is-cmchange
    card.className = 'card is-cmchange' + (isDone ? ' is-done' : '');

    const typeLabel = EVT_LABEL_MAP[evt.eventType] || evt.eventType;
    const statusLabel = isDone ? '完了済み' : '進行中';
    const done = Number(evt.itemDone) || 0;
    const total = Number(evt.itemTotal) || 0;
    const pct = total > 0 ? Math.round((done / total) * 1000) / 10 : 0;
    const pctLabel = isDone ? '100% ✓' : (pct + '%');

    const meta = evt.metadata || {};
    const yoyakuBadge = makeYoyakuBadge(meta);
    const metaParts = [];
    if (evt.eventType === 'caremanager_change') {
        if (evt.eventDate) metaParts.push('変更日: ' + escapeHtml(evt.eventDate));
        const oldOffice = meta['旧ケアマネ事業所'] || '';
        const oldStaff = meta['旧ケアマネ担当者'] || '';
        const newOffice = meta['新ケアマネ事業所'] || '';
        const newStaff = meta['新ケアマネ担当者'] || '';
        const oldLabel = [oldOffice, oldStaff].filter(Boolean).join(' ');
        const newLabel = [newOffice, newStaff].filter(Boolean).join(' ');
        if (oldLabel || newLabel) {
            metaParts.push(escapeHtml(oldLabel || '（未登録）') + ' → ' + escapeHtml(newLabel || '（未入力）'));
        }
    } else {
        if (evt.eventDate) metaParts.push(typeLabel + '日: ' + escapeHtml(evt.eventDate));
        if (meta['利用開始日']) metaParts.push('利用開始: ' + escapeHtml(meta['利用開始日']));
        if (meta['要介護度']) metaParts.push(escapeHtml(meta['要介護度']));
    }
    const metaLine = metaParts.length ? '<div class="card-meta">' + metaParts.join(' / ') + '</div>' : '';

    card.innerHTML =
        '<div class="card-head">' +
            '<span class="type-chip">' + escapeHtml(typeLabel) + '</span>' +
            '<span class="status-pill"><span class="d"></span>' + statusLabel + '</span>' +
        '</div>' +
        '<div class="card-name">' + escapeHtml(evt.userName) + ' 様' + yoyakuBadge + '</div>' +
        metaLine +
        '<div class="progress-block">' +
            '<div class="progress-top">' +
                '<span class="progress-num">' + done + '<span class="of">/' + total + '</span></span>' +
                '<span class="progress-pct">' + pctLabel + '</span>' +
            '</div>' +
            '<div class="progress-bar"><div class="progress-fill" style="width: ' + pct + '%;"></div></div>' +
        '</div>';
    card.onclick = () => evtOpenDetail(evt);
    return card;
}

// ----- 詳細モーダル -----
function evtOpenDetail(evt) {
    _evtCurrent = evt;
    evtRenderDetailHeader(evt);
    evtRenderDetailBody(evt);
    document.getElementById('event-detail-modal').classList.add('show');
}

function evtCloseDetail() {
    document.getElementById('event-detail-modal').classList.remove('show');
    _evtCurrent = null;
}

function evtRenderDetailHeader(evt) {
    document.getElementById('event-detail-title').textContent =
        evt.userName + ' 様 / ' + (EVT_LABEL_MAP[evt.eventType] || evt.eventType) +
        '（' + evt.itemDone + '/' + evt.itemTotal + '）';
}

function evtRenderDetailBody(evt) {
    const body = document.getElementById('event-detail-body');
    const ownerLabel = { boss: '🔵社長', consultant: '🟢相談員', anyone: '🟡誰でも可' };
    if (!evt.items || evt.items.length === 0) {
        body.innerHTML = '<p style="color:#5b6477; padding:20px; text-align:center; font-weight:700;">項目がありません。</p>';
        return;
    }
    const html = evt.items.map(item => {
        const isDone = item.status === 'done';
        const safeId = escapeHtml(item.id).replace(/'/g, "\\'");
        const checkedAttr = isDone ? 'checked disabled' : '';
        const onChange = isDone ? '' : "onchange=\"evtCheckItem('" + safeId + "')\"";
        const doneLine = isDone
            ? '<div class="done-line">完了: ' + escapeHtml(item.doneAt) + ' by ' + escapeHtml(item.doneBy) +
              ' <span class="fix-link" onclick="evtOpenEditCompletion(\'' + safeId + '\')" title="完了日・完了者を訂正">✏️訂正</span></div>'
            : '';
        // 急ぎ・タグセレクト・編集ボタン（完了済みは編集不可）
        const urgentBtn = isDone
            ? (item.isUrgent ? '<span class="urgent-on">🚨</span>' : '')
            : '<span class="urgent-toggle ' + (item.isUrgent ? 'urgent-on' : 'urgent-off') + '" onclick="evtToggleUrgent(\'' + safeId + '\', ' + (item.isUrgent ? 'false' : 'true') + ')" title="急ぎ切替">🚨</span>';
        const tagSelect = isDone
            ? '<span class="tag-readonly">' + (ownerLabel[item.ownerTag] || escapeHtml(item.ownerTag)) + '</span>'
            : '<select class="tag-select" onchange="evtUpdateOwnerTag(\'' + safeId + '\', this.value)">' +
                '<option value="boss"' + (item.ownerTag === 'boss' ? ' selected' : '') + '>🔵社長</option>' +
                '<option value="consultant"' + (item.ownerTag === 'consultant' ? ' selected' : '') + '>🟢相談員</option>' +
                '<option value="anyone"' + (item.ownerTag === 'anyone' ? ' selected' : '') + '>🟡誰でも可</option>' +
              '</select>';
        const editBtn = isDone
            ? ''
            : ' <span class="edit-pen" onclick="evtEditLabel(\'' + safeId + '\')" title="文言編集">✏️</span>';
        return '<div class="detail-item' + (isDone ? ' is-done' : '') + '">' +
            '<input type="checkbox" ' + checkedAttr + ' ' + onChange + '>' +
            '<div class="detail-item-body">' +
                '<div class="detail-item-label">' +
                    urgentBtn + item.seq + '. ' + escapeHtml(item.label) + editBtn +
                    tagSelect +
                '</div>' +
                doneLine +
            '</div>' +
        '</div>';
    }).join('');
    body.innerHTML = html +
        '<div class="detail-footer-note">' +
        'ℹ️ 全項目を完了すると、代表に通知メールが届きます。</div>';
}

// タグ変更（boss/consultant/anyone）
async function evtUpdateOwnerTag(itemId, newTag) {
    const ok = await gasPost({ action: 'update_event_item', itemId: itemId, ownerTag: newTag }, '項目タグ更新');
    if (!ok) { alert('タグ更新に失敗しました'); return; }
    setTimeout(() => evtRefreshAfterUpdate(), 800);
}

// 急ぎフラグ切替
async function evtToggleUrgent(itemId, newIsUrgent) {
    const ok = await gasPost({ action: 'update_event_item', itemId: itemId, isUrgent: newIsUrgent }, '項目急ぎ切替');
    if (!ok) { alert('急ぎ切替に失敗しました'); return; }
    setTimeout(() => evtRefreshAfterUpdate(), 800);
}

// 文言編集
async function evtEditLabel(itemId) {
    if (!_evtCurrent) return;
    const item = _evtCurrent.items.find(it => it.id === itemId);
    if (!item) return;
    const newLabel = prompt('項目の文言を編集', item.label);
    if (newLabel === null) return;  // キャンセル
    const trimmed = String(newLabel).trim();
    if (!trimmed) { alert('文言は空にできません'); return; }
    if (trimmed === item.label) return;  // 変更なし
    const ok = await gasPost({ action: 'update_event_item', itemId: itemId, label: trimmed }, '項目文言更新');
    if (!ok) { alert('文言更新に失敗しました'); return; }
    setTimeout(() => evtRefreshAfterUpdate(), 800);
}

        const refreshed = updated.find(e => e.id === _evtCurrent.id);
        if (refreshed) {
            _evtCurrent = refreshed;
            evtRenderDetailHeader(refreshed);
            evtRenderDetailBody(refreshed);

async function evtCheckItem(itemId) {
    const doneBy = prompt('完了者を入力してください', localStorage.getItem('yawaragi_staff') || '');
    if (!doneBy || !doneBy.trim()) {
        alert('完了者が必要です');
        // チェック状態をリセットするため再描画
        if (_evtCurrent) evtRenderDetailBody(_evtCurrent);
        return;
    }
    const ok = await gasPost({
        action: 'complete_event_item',
        itemId: itemId,
        doneBy: doneBy.trim()
    }, '利用者イベント項目完了');
    if (!ok) {
        // gasPost失敗時はrender戻し
        if (_evtCurrent) evtRenderDetailBody(_evtCurrent);
        return;
    }
    // 1秒待ってから一覧再取得 → モーダル更新
    setTimeout(async () => {
        const updated = await evtFetchList();
        _evtCache = updated;
        evtRenderList(updated);
        if (_evtCurrent) {
            const refreshed = updated.find(e => e.id === _evtCurrent.id);
            if (refreshed) {
                _evtCurrent = refreshed;
                evtRenderDetailHeader(refreshed);
                evtRenderDetailBody(refreshed);
                if (refreshed.status === 'completed') {

// JSONPでイベント一覧を取得（Promise化）
function evtFetchList() {
    return new Promise(resolve => {
        const cbName = 'evtFetchCb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        const url = EVT_API_URL + '?action=user_events&callback=' + cbName;
        let resolved = false;
        window[cbName] = function(resp) {
            if (resolved) return;
            resolved = true;
            const events = (resp && resp.user_events) ? resp.user_events : [];
            try { delete window[cbName]; } catch(e) {}
            resolve(events);
        };
        const script = document.createElement('script');
        script.src = url;
        script.onerror = function() {
            if (resolved) return;
            resolved = true;
            try { delete window[cbName]; } catch(e) {}
            resolve([]);
        };
        document.body.appendChild(script);
        setTimeout(() => {
            try { script.remove(); } catch(e) {}
            if (!resolved) {
                resolved = true;
                try { delete window[cbName]; } catch(e) {}
                resolve([]);
            }
        }, 8000);
    });
}

// 非表示事業所のSet（office名のみで非表示判定）
function _cmGetHiddenOffices() {
    // 事業所全体非表示は「name=空 + hidden=TRUE」の行 OR その事業所の全行が hidden=TRUE
    const officeAllRows = {};
    (_cmContactsList || []).forEach(c => {
        if (!c.office) return;
        if (!officeAllRows[c.office]) officeAllRows[c.office] = { total: 0, hidden: 0, hasNameEmpty: false };
        officeAllRows[c.office].total++;
        if (c.hidden) officeAllRows[c.office].hidden++;
        if (c.hidden && (!c.name || c.name.length === 0)) officeAllRows[c.office].hasNameEmpty = true;
    });
    const hidden = new Set();
    Object.keys(officeAllRows).forEach(office => {
        const r = officeAllRows[office];
        // 「name=空+hidden=TRUE」のダミー行があるなら事業所全体非表示
        if (r.hasNameEmpty) hidden.add(office);
    });
    return hidden;
}

// 非表示担当者のSet（"office\nname" キー）
function _cmGetHiddenStaffKeys() {
    const set = new Set();
    (_cmContactsList || []).forEach(c => {
        if (c.hidden && c.name && c.name.length > 0) set.add(c.office + '\n' + c.name);
    });
    return set;
}

// cmContacts と 利用者台帳の両方から「yawaragi接点のあった事業所」を集計（非表示除外）
function _cmGetAllOffices() {
    const hiddenOffices = _cmGetHiddenOffices();
    const fromContacts = (_cmContactsList || []).map(c => c.office);
    const fromUsers = (_cmUserList || []).map(u => u.currentCmOffice);
    return Array.from(new Set([...fromContacts, ...fromUsers].filter(o => o && o.length > 0 && !hiddenOffices.has(o))))
        .sort((a, b) => a.localeCompare(b, 'ja'));
}

// cmContacts と 利用者台帳の両方から「指定事業所の担当者」を集計（非表示除外）
function _cmGetStaffsByOffice(office) {
    const hiddenStaffKeys = _cmGetHiddenStaffKeys();
    const fromContacts = (_cmContactsList || [])
        .filter(c => c.office === office && c.name && c.name.length > 0 && !c.hidden)
        .map(c => c.name);
    const fromUsers = (_cmUserList || [])
        .filter(u => u.currentCmOffice === office && u.currentCmStaff && u.currentCmStaff.length > 0)
        .filter(u => !hiddenStaffKeys.has(office + '\n' + u.currentCmStaff))
        .map(u => u.currentCmStaff);
    return Array.from(new Set([...fromContacts, ...fromUsers]))
        .sort((a, b) => a.localeCompare(b, 'ja'));
}

// 事業所を非表示（プルダウン内❌）
async function evtHideOfficeItem(office) {
    if (!confirm('「' + office + '」を非表示にしますか？\n（次回からプルダウンに出なくなります。スプレッドシート上で「非表示」列を空にすれば戻せます）')) return;
    const ok = await gasPost({ action: 'hideOffice', office: office }, '事業所非表示');
    if (!ok) { alert('非表示に失敗しました'); return; }
    _cmContactsList = null;
    setTimeout(async () => {
        await _cmFetchContacts();
        _cmRenderOfficeList();
        // 選択中の事業所が消されたなら選択解除
        if (document.getElementById('cm-new-office-value').value === office) {
            document.getElementById('cm-new-office-value').value = '';
            document.getElementById('cm-office-display').textContent = '▼ 事業所を選ぶ';
            document.getElementById('cm-office-display').style.color = '#888';
        }
    }, 800);
}

// 担当者を非表示（プルダウン内❌）
async function evtHideStaffItem(staff) {
    const office = document.getElementById('cm-new-office-value').value;
    if (!office || office === '__NEW__') { alert('事業所を選んでから操作してください'); return; }
    if (!confirm('「' + office + ' / ' + staff + '」を非表示にしますか？\n（次回からプルダウンに出なくなります）')) return;
    const ok = await gasPost({ action: 'hideContact', office: office, staff: staff }, '担当者非表示');
    if (!ok) { alert('非表示に失敗しました'); return; }
    _cmContactsList = null;
    setTimeout(async () => {
        await _cmFetchContacts();
        _cmRenderStaffList(office);
        // 選択中の担当者が消されたなら選択解除
        if (document.getElementById('cm-new-staff-value').value === staff) {
            document.getElementById('cm-new-staff-value').value = '';
            document.getElementById('cm-staff-display').textContent = '▼ 担当者を選ぶ';
            document.getElementById('cm-staff-display').style.color = '#888';
        }
    }, 800);
}

// プルダウン外クリックで閉じる
document.addEventListener('click', function(e) {
    const officeDd = document.getElementById('cm-office-dropdown');
    const staffDd = document.getElementById('cm-staff-dropdown');
    if (officeDd && !officeDd.contains(e.target)) {

        document.getElementById('cm-staff-list').style.display = 'none';
    }
});

// ----- 登録処理（Task 12）-----
async function evtSubmitCmChange() {
    // 利用者必須
    if (!_cmSelectedUser) {
        alert('利用者を選んでください');
        return;
    }
    const userName = _cmSelectedUser.userName;

    // 新ケアマネ事業所取得（カスタムドロップダウン）
    const officeVal = document.getElementById('cm-new-office-value').value;
    let newOffice;
    if (officeVal === '__NEW__') {
        newOffice = document.getElementById('cm-new-office-input').value.trim();
    } else {
        newOffice = officeVal.trim();
    }
    if (!newOffice) {
        alert('新ケアマネの事業所を選んでください');
        return;
    }

    // 新ケアマネ担当者取得（カスタムドロップダウン）
    const staffVal = document.getElementById('cm-new-staff-value').value;
    let newStaff;
    if (staffVal === '__NEW__') {
        newStaff = document.getElementById('cm-new-staff-input').value.trim();
    } else {
        newStaff = staffVal.trim();
    }
    if (!newStaff) {
        alert('新ケアマネの担当者を選んでください');
        return;
    }

    // 変更日・入力者
    const changeDate = document.getElementById('cm-change-date').value;
    const createdBy = document.getElementById('cm-created-by').value.trim();
    if (!changeDate) { alert('変更日を入力してください'); return; }
    if (!createdBy)  { alert('入力者を入れてください'); return; }
    try { localStorage.setItem('yawaragi_staff', createdBy); } catch(e) {}

    // 適用開始月（予約反映機能 2026-05-29）
    const _applyModeRadio = document.querySelector('input[name="cm-apply-mode"]:checked');
    const _applyMode = _applyModeRadio ? _applyModeRadio.value : 'immediate';
    const applyMonth = _applyMode === 'future'
        ? document.getElementById('cm-apply-month').value
        : 'immediate';
    if (_applyMode === 'future' && !/^\d{4}-\d{2}$/.test(applyMonth)) {
        alert('適用開始月を選んでください'); return;
    }

    // 同じケアマネへの変更警告
    if (newOffice === _cmSelectedUser.currentCmOffice && newStaff === _cmSelectedUser.currentCmStaff) {
        if (!confirm('現ケアマネと新ケアマネが同じです。本当に登録しますか？')) return;
    }

    // 2重押し防止：登録中はボタンを無効化
    const _btn = lockSubmitBtn('cm-btn-submit', '登録中…');
    if (_btn === false) return;   // 送信中の2回目押下は無視

    try {
        // 1. cmContacts に新規追加が必要なら追加
        const isNewOffice = !((_cmContactsList || []).some(c => c.office === newOffice));
        const isNewStaff = !((_cmContactsList || []).some(c => c.office === newOffice && c.name === newStaff));
        if (isNewOffice || isNewStaff) {
            await gasPost({ action: 'addContact', office: newOffice, staff: newStaff }, 'ケアマネ連絡先追加');
        }

        // 2. 利用者台帳のケアマネを「変更後」に更新（applyMonth で予約/即時切り替え）
        await gasPost({
            action: 'update_user_caremanager',
            userName: userName,
            cmOffice: newOffice,
            cmStaff: newStaff,
            updatedBy: createdBy,
            applyMonth: applyMonth
        }, '利用者台帳ケアマネ更新');

        // 3. ケアマネ変更イベント登録（metadata に適用開始月を記録）
        await gasPost({
            action: 'add_user_event',
            eventType: 'caremanager_change',
            userName: userName,
            eventDate: changeDate,
            metadata: {
                旧ケアマネ事業所: _cmSelectedUser.currentCmOffice || '（未登録）',
                旧ケアマネ担当者: _cmSelectedUser.currentCmStaff || '（未登録）',
                新ケアマネ事業所: newOffice,
                新ケアマネ担当者: newStaff,
                適用開始月: applyMonth === 'immediate' ? '即時' : applyMonth
            },
            createdBy: createdBy
        }, 'ケアマネ変更イベント登録');

        // キャッシュ無効化（次回開いた時に最新データを取得）
        _cmUserList = null;
        _cmContactsList = null;

        alert('登録しました！画面を閉じてチェックリストを開きます。');
        evtCloseCmChangeModal();

        // 4. 一覧再取得 → 詳細モーダル開く（最新の登録イベント＝末尾）
        setTimeout(async () => {
            const updated = await evtFetchList();
            _evtCache = updated;
            evtRenderList(updated);
            // 直近で登録した（同じ userName + caremanager_change）を見つけて詳細を開く
            const target = updated.filter(e =>
                e.userName === userName && e.eventType === 'caremanager_change'
            ).sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''))[0];
            if (target) evtOpenDetail(target);
        }, 1500);
    } finally {
        unlockSubmitBtn(_btn);
    }
}

// ===== 起動時に一覧を自動ロード =====
window.addEventListener('DOMContentLoaded', function() {
    evtLoadList();
    _populateStaffSelects(); // 入力者プルダウンにスタッフ名を流し込む

    // 利用者検索オートコンプリートのリスナー（Task 9）
    const searchInput = document.getElementById('cm-user-search');
    const suggestions = document.getElementById('cm-user-suggestions');
    if (searchInput && suggestions) {
        searchInput.addEventListener('input', () => {
            const q = searchInput.value.trim();
            if (!q || !_cmUserList) {
                suggestions.style.display = 'none';
                return;
            }
            const matches = _cmUserList.filter(u =>
                u.userName.indexOf(q) === 0 ||
                (u.userNameKana && u.userNameKana.indexOf(q) === 0)
            ).slice(0, 10);
            if (matches.length === 0) {
                suggestions.style.display = 'none';
                return;
            }
            suggestions.innerHTML = matches.map(u =>
                '<div style="padding:6px 10px; cursor:pointer; font-size:0.9rem; border-bottom:1px solid #f0f0f0;" onclick="evtSelectUser(\'' +
                u.userName.replace(/'/g, "\\'") + '\')">' + escapeHtml(u.userName) +
                (u.userNameKana ? ' <span style="color:#888; font-size:0.75rem;">(' + escapeHtml(u.userNameKana) + ')</span>' : '') +
                '</div>'
            ).join('');
            suggestions.style.display = 'block';
        });
    }
});
