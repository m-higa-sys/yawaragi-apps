<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- キャッシュ自動更新バージョンゲート（design.md 2026-06-18 準拠・<head>最先頭） -->
    <!-- version.txt を取得し、現URLの ?v= と違えば1回だけ最新版へ location.replace する -->
    <script>
    function gateShouldReload(cur, latest) { return !!latest && cur !== latest; }
    function buildVersionedUrl(currentUrl, latest) { var u = new URL(currentUrl); u.searchParams.set('v', latest); return u.href; }
    (function () {
        try {
            var cur = new URLSearchParams(location.search).get('v');
            fetch('version.txt?_=' + Date.now(), { cache: 'no-store' })
                .then(function (r) { return r.text(); })
                .then(function (t) {
                    var latest = (t || '').trim();
                    if (gateShouldReload(cur, latest)) {
                        location.replace(buildVersionedUrl(location.href, latest));
                    }
                })
                .catch(function () { /* オフライン等は no-op で固まらせない */ });
        } catch (e) { /* 念のため no-op（ゲートで画面を固まらせない） */ }
    })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

        .search-count { font-size: 13px; color: #1565c0; font-weight: bold; margin-left: 6px; }

        /* モーダル共通 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);

            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {

            border-radius: 12px;

            width: 90%;

        .weight-input {

            padding: 15px;

        .graph-modal-overlay {

            top: 0; left: 0; right: 0; bottom: 0;

            justify-content: center;
            align-items: center;

        .graph-modal-overlay.active { display: flex; }
        .graph-modal {
            background: white;
            border-radius: 12px;
            padding: 25px;
            max-width: 700px;
            width: 95%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .graph-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .graph-modal-header h2 { font-size: 20px; color: #333; }
        .graph-modal-body { position: relative; width: 100%; }

        .graph-data-table {

            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        .graph-data-table th {
            background: #2196F3;
            color: white;
            padding: 6px 8px;
            font-size: 13px;
            position: static;
        }
        .graph-data-table td {
            padding: 5px 8px;
            border: 1px solid #e0e0e0;
            font-size: 14px;
        }
        .graph-data-table .change-up { color: #f44336; }
        .graph-data-table .change-down { color: #2196F3; }
        .graph-btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .graph-btn-group .btn { flex: 1; }

        /* 印刷用 */
        @media print {
            body { background: white; font-size: 12px; }
            .header, .toolbar, .no-print { display: none !important; }
            .table-container { padding: 0; overflow: visible; }
            table { box-shadow: none; font-size: 12px; }
            th, td { padding: 4px 3px; font-size: 12px; }
            .name-cell, .group-cell { position: static; }
            .weight-value { font-size: 12px; }
            .weight-change { font-size: 9px; }
            @page { size: A4 landscape; margin: 10mm; }
        }

        /* グラフ印刷用 */
        body.print-graph .header,
        body.print-graph .toolbar,
        body.print-graph .table-container,
        body.print-graph .no-print,
        body.print-graph #weightModal,
        body.print-graph #csvModal { display: none !important; }
        body.print-graph .graph-modal-overlay {
            display: block !important;
            position: static !important;
            background: none !important;
        }
        body.print-graph .graph-modal {
            box-shadow: none !important;
            max-width: 100% !important;
            width: 100% !important;
            padding: 15px !important;
            border-radius: 0 !important;
        }
        body.print-graph .graph-btn-group { display: none !important; }
        @media print {
            body.print-graph { background: white; }
            body.print-graph .graph-modal-overlay { display: block !important; position: static !important; background: none !important; }
            body.print-graph .graph-modal { box-shadow: none !important; max-width: 100% !important; padding: 10px !important; }
            body.print-graph .graph-btn-group { display: none !important; }
            body.print-graph .graph-data-table th { background: #2196F3 !important; color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            @page { size: A4 portrait; margin: 10mm; }
        }

        @media (max-width: 768px) {
            .header { padding: 10px 15px; }
            .header h1 { font-size: 18px; }
        }

        /* ===== 曜日＋午前/午後フィルター ===== */
        .filter-bar {
            padding: 8px 20px;
            background: #fff;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .filter-label {
            font-size: 13px;
            font-weight: bold;
            color: #555;
            white-space: nowrap;
        }
        .filter-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 14px;
            border: 1px solid #ccc;
            border-radius: 20px;
            background: #fff;
            color: #555;
            font-size: 14px;
            cursor: pointer;
            min-height: 36px;
            touch-action: manipulation;
            transition: all 0.15s;
        }
        .filter-btn:hover { background: #f5f5f5; }
        .filter-btn.active {
            background: #2196F3;
            color: #fff;
            border-color: #2196F3;
            font-weight: bold;
        }
        .filter-btn.active-ampm {
            background: #ff9800;
            color: #fff;
            border-color: #ff9800;
            font-weight: bold;
        }
        .filter-count {
            font-size: 13px;
            color: #888;
            align-self: center;
        }
        @media print { .filter-bar { display: none; } }
    </style>
</head>
<body>

<div class="header">
    <h1>⚖ 体重チェック表</h1>
    <div class="header-controls">
        <select id="yearSelect" class="year-select" onchange="changeYear()"></select>
        <button class="btn btn-white" onclick="loadFromSpreadsheet()">🔄 利用者台帳から取得</button>
        <button class="btn btn-green no-print" onclick="forceCloudSync()">☁️ 全件クラウド送信</button>
        <button class="btn btn-taicho" onclick="window.open('https://docs.google.com/spreadsheets/d/1blasasDuYsCLRP8fXGqcQfKGQWTMZGjYuJDVRKwNNw0/edit','_blank')">📋 利用者台帳</button>
        <button class="btn btn-white" onclick="openCsvModal()">📁 CSV読込</button>
        <button class="btn btn-white" onclick="exportJson()">💾 バックアップ</button>
        <button class="btn btn-white" onclick="importJson()">📂 復元</button>
        <button class="btn btn-white no-print" onclick="window.print()">🖨 印刷</button>
    </div>
</div>

<div class="toolbar">
    <div class="stats">
        登録者数: <strong id="totalCount">0</strong>名
        ｜ 今月の入力: <strong id="progressCount">0</strong> / <strong id="progressTotal">0</strong>
        <span class="search-count" id="searchCount"></span>
    </div>
    <div class="legend">
        <div class="legend-item"><div class="legend-color" style="background:#e3f2fd;">kg</div> 入力済</div>
        <div class="legend-item"><div class="legend-color" style="background:#ffebee;"></div> 今月未入力</div>
        <div class="legend-item"><div class="legend-color"><span style="color:#f44336;">↑</span></div> ±2kg以上</div>
        <div class="legend-item"><div class="legend-color"><span style="font-size:11px;">📏</span></div> 身長入力済</div>
    </div>
</div>

<div class="filter-bar" id="filterBar" style="display:none;">
    <div class="sched-filters" id="schedFilters">
        <span class="filter-label">曜日:</span>
        <div class="filter-group" id="dayFilters">
            <button class="filter-btn active" onclick="setDayFilter('')">全員</button>
            <button class="filter-btn" onclick="setDayFilter('月')">月</button>
            <button class="filter-btn" onclick="setDayFilter('火')">火</button>
            <button class="filter-btn" onclick="setDayFilter('水')">水</button>
            <button class="filter-btn" onclick="setDayFilter('木')">木</button>
            <button class="filter-btn" onclick="setDayFilter('金')">金</button>
            <button class="filter-btn" onclick="setDayFilter('土')">土</button>
        </div>
        <span class="filter-label" style="margin-left:8px;">時間:</span>
        <div class="filter-group" id="ampmFilters">
            <button class="filter-btn active-ampm" onclick="setAmpmFilter('')">全</button>
            <button class="filter-btn" onclick="setAmpmFilter('午前')">午前</button>
            <button class="filter-btn" onclick="setAmpmFilter('午後')">午後</button>
        </div>
        <span class="filter-count" id="filterCount"></span>
    </div>
    <div class="wt-search">
        <span style="font-size:18px;" aria-hidden="true">🔍</span>
        <input type="search" id="searchBox" placeholder="名前で検索" oninput="onSearchInput()" autocomplete="off" enterkeyhint="search">
        <button type="button" class="search-clear" id="searchClear" onclick="clearSearch()" aria-label="検索をクリア" title="クリア">✕</button>
    </div>
</div>

<div class="table-container">
    <table id="checkTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyMessage" style="text-align:center; padding:60px 20px; color:#999; font-size:18px;">
        「🔄 利用者台帳から取得」ボタンで利用者一覧を読み込んでください
    </div>
</div>

<!-- 体重入力モーダル -->
<div class="modal-overlay" id="weightModal">
    <div class="modal">
        <h2 id="weightModalTitle">体重入力</h2>
        <p id="weightModalInfo"></p>
        <input type="number" class="weight-input" id="weightInput" placeholder="例: 65.5" step="0.1" min="20" max="200" inputmode="decimal">
        <div id="heightSection" style="margin-top:12px;">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
                <span style="font-weight:bold; color:#4CAF50; font-size:15px;">📏 身長（3ヶ月に1回）</span>

            </div>
            <input type="number" class="weight-input" id="heightInput" placeholder="例: 155.0" step="0.1" min="100" max="220" inputmode="decimal" style="border-color:#4CAF50; font-size:24px; padding:12px;">

        </div>
        <div class="btn-group">
            <button class="btn btn-blue" onclick="saveWeight()">保存</button>
            <button class="btn btn-red" onclick="clearWeight()">削除</button>

        <button class="btn" style="background:#eee; color:#666; width:100%; margin-top:5px;" onclick="closeWeightModal()">キャンセル</button>

</div>

<!-- CSVモーダル -->
<div class="modal-overlay" id="csvModal">

        <h2>📁 CSV読込（手動）</h2>

            またはファイルをドラッグ＆ドロップ
            <input type="file" id="csvFile" accept=".csv" onchange="handleCsvFile(this.files[0])">

        <button class="btn btn-red" onclick="closeCsvModal()">閉じる</button>
    </div>
</div>

<!-- グラフモーダル -->

            <h2 id="graphTitle">体重推移</h2>
            <span id="graphYear" style="color:#666; font-size:14px;"></span>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>

function matchesSchedule(user, day, ampm) {
    if (!day) return true;
    if (!user.days || user.days.indexOf(day) < 0) return false;
    if (!ampm) return true;
    const ap = user.ampm || '';
    if (ap === '午前' || ap === '午後') return ap === ampm;
    const parts = ap.split(/[、,]/);
    for (const part of parts) {
        const p = part.trim();
        if (p.indexOf(day) >= 0) {
            return p.indexOf(ampm) >= 0;
        }
    }
    return false;
}

function getCurrentFiscalYear() {

    return (now.getMonth() + 1) >= 4 ? now.getFullYear() : now.getFullYear() - 1;
}

function showToast(msg, color) {

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeAttr(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

// ============ 純ロジック（scripts/test-weight-core.js が実抽出テスト・ここが正本）============
// 検索文字列・氏名・ふりがなを同じ土俵に正規化：ひらがな→カタカナ／全半角空白除去／英字小文字。
function wtNormalizeText(s) {
    var t = String(s == null ? '' : s);
    t = t.replace(/[ぁ-ゖ]/g, function (ch) { return String.fromCharCode(ch.charCodeAt(0) + 0x60); });
    t = t.replace(/[\s　]/g, '');
    t = t.toLowerCase();
    return t;
}
// 氏名＋ふりがなの部分一致（曜日/時間フィルタと AND で使う1段）。空クエリは全通過。
function wtMatchesSearch(name, furigana, query) {
    var q = wtNormalizeText(query);
    if (!q) return true;
    // 氏名・ふりがなを個別に部分一致（連結しないので跨ぎ誤ヒットが起きない）。
    return wtNormalizeText(name).indexOf(q) >= 0 || wtNormalizeText(furigana).indexOf(q) >= 0;
}
// 中止判定は台帳ステータスの単一ソース（改修2）。中止/終了/卒業 のみ中止扱い。
function wtIsEndedStatus(status) {
    var s = String(status == null ? '' : status);
    return s.indexOf('終了') >= 0 || s.indexOf('中止') >= 0 || s.indexOf('卒業') >= 0;
}
// weights[fy][name] に非空値が1つでもあるか（年度スコープ判定・改修3-1）。
function wtHasRecordInYear(weights, fy, name) {
    var yd = weights && weights[fy];
    var rec = yd && yd[name];
    if (!rec) return false;
    for (var k in rec) {
        if (Object.prototype.hasOwnProperty.call(rec, k)) {
            var v = rec[k];
            if (v !== undefined && v !== null && v !== '') return true;
        }
    }
    return false;
}
// その年度内の最新記録 {calYear, monthNum, value}（会計年度4月始まり）。無ければ null。
function wtLatestInYear(weights, fy, name, months) {
    var yd = weights && weights[fy];
    var rec = yd && yd[name];
    if (!rec) return null;
    var best = null;
    for (var i = 0; i < months.length; i++) {
        var m = months[i];
        var v = rec[m];
        if (v === undefined || v === null || v === '') continue;
        var monthNum = parseInt(m, 10);
        var calYear = monthNum >= 4 ? fy : fy + 1;
        var sortKey = calYear * 100 + monthNum;
        if (!best || sortKey > best.sortKey) best = { sortKey: sortKey, calYear: calYear, monthNum: monthNum, value: v };
    }
    return best;
}
// 中止者セクションの分類（年度スコープ＋台帳外分離・改修2/3）。
//   ledger  = 台帳の中止者のうち、選択年度に体重記録がある者
//   orphans = weights に記録はあるが 現役でも台帳中止者でもない“台帳外・要名寄せ”の氏名
function wtClassifyTerminated(opts) {
    var activeSet = (opts.activeNames instanceof Set) ? opts.activeNames : new Set(opts.activeNames || []);
    var terminated = opts.terminated || [];
    var weights = opts.weights || {};
    var fy = opts.fy;
    var months = opts.months;

    var termNames = new Set();
    var ledger = [];
    for (var i = 0; i < terminated.length; i++) {
        var t = terminated[i];
        termNames.add(t.name);
        if (!wtHasRecordInYear(weights, fy, t.name)) continue;
        var latest = wtLatestInYear(weights, fy, t.name, months);
        ledger.push({
            name: t.name,
            kana: t.kana || '',
            lastUseDate: t.lastUseDate || '',
            badge: latest ? (latest.calYear + '/' + latest.monthNum + '月') : ''
        });
    }

    var orphans = [];
    var yd = weights[fy] || {};
    Object.keys(yd).forEach(function (name) {
        if (activeSet.has(name)) return;
        if (termNames.has(name)) return;
        if (!wtHasRecordInYear(weights, fy, name)) return;
        var latest = wtLatestInYear(weights, fy, name, months);
        orphans.push({
            name: name, kana: '', lastUseDate: '',
            badge: latest ? (latest.calYear + '/' + latest.monthNum + '月') : ''
        });
    });

    var byName = function (a, b) { return String(a.name).normalize('NFKC').localeCompare(String(b.name).normalize('NFKC'), 'ja'); };
    ledger.sort(byName);
    orphans.sort(byName);
    return { ledger: ledger, orphans: orphans };
}

// ============ クラウド同期 ============
const SYNC_URL = 'https://script.google.com/macros/s/AKfycbyJtAHueOf4_F4EcVpXO1-6mksEcmJChCKxT7J28XNQNp9S8ZMFOMDyq4v4ML1C1qxP/exec';
let _syncTimer = null;

function _hasAnyValue(tree) {
    return Object.keys(tree || {}).some(function(fy) {
        return Object.keys(tree[fy] || {}).some(function(name) {
            return Object.values(tree[fy][name] || {}).some(function(v) {
                return v !== undefined && v !== null && v !== '';
            });
        });
    });
}
function cloudSync() {
    if (_syncTimer) clearTimeout(_syncTimer);
    _syncTimer = setTimeout(async function() {
        try {
            // 空データ上書き事故防止ガード（身長アプリ2026-05-08事件と同型）
            if (!_hasAnyValue(appData.heights) && !_hasAnyValue(appData.weights)) {
                console.log('☁️ ローカルデータが空のためクラウド送信スキップ（上書き事故防止）');
                return;
            }
            await fetch(SYNC_URL, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({ type: 'weight', data: { users: appData.users, weights: appData.weights, heights: appData.heights } }),
                keepalive: true
            });
            console.log('☁️ 体重データ同期完了');
        } catch(e) { console.warn('☁️ 同期エラー:', e); }
    }, 2000);
}
function forceCloudSync() {
    var wcount = 0, hcount = 0;
    Object.keys(appData.weights || {}).forEach(function(fy) {
        Object.keys(appData.weights[fy] || {}).forEach(function(name) {
            Object.values(appData.weights[fy][name] || {}).forEach(function(v) {
                if (v !== undefined && v !== null && v !== '') wcount++;
            });
        });
    });
    Object.keys(appData.heights || {}).forEach(function(fy) {
        Object.keys(appData.heights[fy] || {}).forEach(function(name) {
            Object.values(appData.heights[fy][name] || {}).forEach(function(v) {
                if (v !== undefined && v !== null && v !== '') hcount++;
            });
        });
    });
    if (wcount === 0 && hcount === 0) {
        showToast('⚠ このデバイスにデータがありません', '#f44');
        return;
    }
    if (!confirm('このデバイスのデータ（体重 ' + wcount + '件 + 身長 ' + hcount + '件）を全部クラウドへ送信します。よろしいですか？')) return;
    if (_syncTimer) { clearTimeout(_syncTimer); _syncTimer = null; }
    fetch(SYNC_URL, {
        method: 'POST', mode: 'no-cors',
        body: JSON.stringify({ type: 'weight', data: { users: appData.users, weights: appData.weights, heights: appData.heights } }),
        keepalive: true
    });
    showToast('☁️ 体重' + wcount + '件・身長' + hcount + '件をクラウドへ送信しました', '#4CAF50');
}

async function cloudLoad() {
    try {
        const res = await fetch(SYNC_URL + '?action=getWeight&t=' + Date.now());
        if (!res.ok) return;
        const cloud = await res.json();
        // weights/heightsをクラウド完全置換（last-write-wins）
        // 削除と変更を他デバイスに同期。クラウドが空ならローカル維持（事故防止）。
        if (cloud && _hasAnyValue(cloud.weights)) {
            appData.weights = cloud.weights;
        }
        if (cloud && _hasAnyValue(cloud.heights)) {
            appData.heights = cloud.heights;
        }
        if (cloud && cloud.users && cloud.users.length > 0 && appData.users.length === 0) {
            appData.users = cloud.users;
        }
        saveData();
        console.log('☁️ クラウドからデータ取得完了');
    } catch(e) { console.warn('☁️ クラウド取得エラー:', e); }
}

// ============ 利用者台帳から取得（GAS JSONP方式 = サーバー不要） ============
function loadFromSpreadsheet() {
    showToast('📋 利用者台帳からデータ取得中...', '#2196F3');

    const callbackName = 'gasCallback_' + Date.now();
    // includeEnded=1 で現役＋中止者（status/最終利用日つき）をまとめて取得（中止判定の単一ソース・改修2）
    const url = GAS_URL + '?callback=' + callbackName + '&includeEnded=1';

    const timeout = setTimeout(() => {
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
        showToast('⚠ 取得に時間がかかっています。ネット接続を確認してください', '#f44');
    }, 15000);

    window[callbackName] = function(data) {
        clearTimeout(timeout);
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);

        try {
            const all = (data.users || []).filter(u => u && u.name);
            // 台帳ステータスで現役／中止者に振り分け（wtIsEndedStatus が単一ソース）
            const activeUsers = [];
            const terminated = [];
            all.forEach(u => {
                if (wtIsEndedStatus(u.status)) {
                    terminated.push({ name: u.name, kana: u.kana || '', lastUseDate: u.lastUseDate || '' });
                } else {
                    activeUsers.push({ name: u.name, furigana: u.kana || '', days: u.days || '', ampm: u.ampm || '' });
                }
            });

            if (activeUsers.length === 0 && terminated.length === 0) {
                showToast('⚠ 利用者が見つかりません', '#f44');
                return;
            }
            mergeUsers(activeUsers);
            appData.terminated = terminated;
            saveData();
            renderTable();
            showToast(`✅ ${appData.users.length}名（中止者${terminated.length}名）を取得しました`, '#4CAF50');
        } catch(err) {
            showToast('⚠ データの解析に失敗しました', '#f44');
            console.error(err);
        }
    };

    const script = document.createElement('script');
    script.src = url;
    script.onerror = function() {
        clearTimeout(timeout);
        delete window[callbackName];
        showToast('⚠ 取得失敗。ネット接続を確認してください', '#f44');
    };
    document.head.appendChild(script);
}

// CSV手動読込用のパーサー
function parseSpreadsheetCsv(text) {
    text = text.replace(/^\uFEFF/, '');
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) return [];
    const headers = parseCSVLine(lines[0]).map(h => h.trim());
    let nameIdx = -1, kanaIdx = -1, statusIdx = -1, daysIdx = -1, ampmIdx = -1;
    for (let i = 0; i < headers.length; i++) {
        const h = headers[i];
        if (h.includes('名前') || h === '氏名' || h === '利用者名') nameIdx = i;
        else if (h.includes('カナ') || h.includes('かな') || h.includes('ふりがな') || h.includes('フリガナ')) kanaIdx = i;
        else if (h.includes('ステータス') || h.includes('状態') || h.includes('利用状況')) statusIdx = i;
        else if (h === '利用曜日') daysIdx = i;
        else if (h.includes('午前') && h.includes('午後')) ampmIdx = i;
    }
    if (nameIdx === -1) return [];
    const users = [];
    for (let i = 1; i < lines.length; i++) {
        const cols = parseCSVLine(lines[i]);
        const name = (cols[nameIdx] || '').trim();
        if (!name) continue;
        if (statusIdx >= 0) {
            const status = (cols[statusIdx] || '').trim();
            if (status.includes('終了') || status.includes('中止') || status.includes('卒業')) continue;
        }
        const kana = kanaIdx >= 0 ? (cols[kanaIdx] || '').trim() : '';
        const days = daysIdx >= 0 ? (cols[daysIdx] || '').trim() : '';
        const ampm = ampmIdx >= 0 ? (cols[ampmIdx] || '').trim() : '';
        users.push({ name, furigana: kana, days, ampm });
    }
    return users;
}

function mergeUsers(newUsers) {
    const existingMap = {};
    appData.users.forEach(u => { existingMap[u.name] = u; });

    appData.users = newUsers.map(nu => ({
        name: nu.name,
        furigana: nu.furigana || (existingMap[nu.name] ? existingMap[nu.name].furigana : ''),
        days: nu.days || (existingMap[nu.name] ? existingMap[nu.name].days : '') || '',
        ampm: nu.ampm || (existingMap[nu.name] ? existingMap[nu.name].ampm : '') || ''
    }));
    sortUsers();
}

// ============ テーブル描画 ============
function renderTable() {
    const year = appData.currentYear;
    const thead = document.getElementById('tableHead');
    const tbody = document.getElementById('tableBody');

    if (appData.users.length === 0) {
        thead.innerHTML = '';
        tbody.innerHTML = '';
        document.getElementById('emptyMessage').style.display = 'block';
        document.getElementById('totalCount').textContent = '0';
        document.getElementById('progressCount').textContent = '0';
        document.getElementById('progressTotal').textContent = '0';
        return;
    }
    document.getElementById('emptyMessage').style.display = 'none';

    let headerRow = '<tr><th style="min-width:30px;"></th><th style="min-width:55px;">氏名</th>';
    for (const m of MONTHS) headerRow += `<th style="border-left:3px solid #1565C0;">${m}</th>`;
    headerRow += '</tr>';
    thead.innerHTML = headerRow;

    if (!appData.weights[year]) appData.weights[year] = {};
    const yearData = appData.weights[year];

    const now = new Date();
    const currentMonthNum = now.getMonth() + 1;
    const currentMonthLabel = currentMonthNum + '月';
    const isCurrentYear = (currentMonthNum >= 4 && year === now.getFullYear()) ||
                          (currentMonthNum < 4 && year === now.getFullYear() - 1);

    let doneCount = 0;
    let html = '';
    let currentGroup = '';
    let rowIndex = 0;

    sortUsers();

    // フィルター適用（曜日/時間フィルタ AND 名前検索・改修1）
    const searchActive = wtNormalizeText(searchQuery) !== '';
    const filteredUsers = appData.users.filter(u =>
        matchesSchedule(u, filterDay, filterAmpm) && wtMatchesSearch(u.name, u.furigana, searchQuery));
    const hasScheduleData = appData.users.some(u => u.days);
    // 検索は台帳データが無くても使えるよう、利用者が居ればバーは常時表示。曜日/時間群だけ台帳依存で出し分け。
    document.getElementById('filterBar').style.display = appData.users.length > 0 ? 'flex' : 'none';
    const sfEl = document.getElementById('schedFilters');
    if (sfEl) sfEl.style.display = hasScheduleData ? 'flex' : 'none';
    const fcEl = document.getElementById('filterCount');
    if (filterDay || filterAmpm) {
        fcEl.textContent = filteredUsers.length + ' / ' + appData.users.length + '名 表示中';
    } else {
        fcEl.textContent = '';
    }
    // ✕ボタンは入力があるときだけ意味を持たせる（視覚フィードバック）
    const clrBtn = document.getElementById('searchClear');
    if (clrBtn) clrBtn.style.visibility = (document.getElementById('searchBox') && document.getElementById('searchBox').value) ? 'visible' : 'hidden';

    for (const user of filteredUsers) {
        const group = getGroup(user.furigana);
        if (group !== currentGroup) {
            currentGroup = group;
            html += `<tr><td class="group-cell">${group}</td><td colspan="${1 + MONTHS.length}" style="background:#e3f2fd;"></td></tr>`;
        }

        const rowClass = rowIndex % 2 === 0 ? '' : 'row-even';
        if (!yearData[user.name]) yearData[user.name] = {};

        html += `<tr class="${rowClass}">`;
        html += `<td class="group-cell"></td>`;
        html += `<td class="name-cell clickable" onclick="openGraph('${escapeAttr(user.name)}')">${escapeHtml(user.name)}</td>`;

        // 身長データ準備
        if (!appData.heights[year]) appData.heights[year] = {};
        if (!appData.heights[year][user.name]) appData.heights[year][user.name] = {};
        const heightData = appData.heights[year][user.name];

        for (let mi = 0; mi < MONTHS.length; mi++) {
            const m = MONTHS[mi];
            const weight = yearData[user.name][m];
            const height = heightData[m];
            let cls = 'weight-cell month-border';
            let content = '';

            if (weight !== undefined && weight !== null && weight !== '') {
                cls += ' has-value';
                content = `<span class="weight-value">${weight}</span>`;

                // 前月比較
                let prevWeight = null;
                if (mi > 0) {
                    prevWeight = yearData[user.name][MONTHS[mi - 1]];
                } else {
                    const prevYearData = appData.weights[year - 1];
                    if (prevYearData && prevYearData[user.name]) {
                        prevWeight = prevYearData[user.name]['3月'];
                    }
                }

                if (prevWeight !== undefined && prevWeight !== null && prevWeight !== '') {
                    const diff = (weight - prevWeight).toFixed(1);
                    const absDiff = Math.abs(parseFloat(diff));
                    let changeClass = 'same';
                    let arrow = '→±0';
                    if (parseFloat(diff) > 0) { arrow = '↑+' + diff; changeClass = absDiff >= 2 ? 'alert' : 'up'; }
                    else if (parseFloat(diff) < 0) { arrow = '↓' + diff; changeClass = absDiff >= 2 ? 'alert' : 'down'; }
                    content += `<span class="weight-change ${changeClass}">${arrow}kg</span>`;
                }

                // BMI表示（身長データがあれば）
                const nearestHeight = height || getNearestHeight(user.name, year, mi);
                if (nearestHeight) {
                    const hm = nearestHeight / 100;
                    const bmi = (weight / (hm * hm)).toFixed(1);
                    content += `<span style="font-size:10px; display:block; color:#888;">BMI ${bmi}</span>`;
                }
            } else {
                if (m === currentMonthLabel && isCurrentYear) cls += ' highlight-undone';
            }

            // 身長が入力されている月は緑のドットを表示
            if (height) {
                content += `<span style="position:absolute; top:2px; right:3px; font-size:9px; color:#4CAF50;" title="${height}cm">📏</span>`;
            }

            html += `<td class="${cls}" onclick="openWeightInput('${escapeAttr(user.name)}','${m}')">${content}</td>`;
        }
        html += '</tr>';

        if (isCurrentYear && yearData[user.name][currentMonthLabel] !== undefined && yearData[user.name][currentMonthLabel] !== null && yearData[user.name][currentMonthLabel] !== '') {
            doneCount++;
        }
        rowIndex++;
    }

    // 中止者セクション（改修2/3：台帳status単一ソース＋年度スコープ＋台帳外分離＋折りたたみ）
    const termCls = wtClassifyTerminated({
        activeNames: appData.users.map(u => u.name),
        terminated: appData.terminated,
        weights: appData.weights, fy: year, months: MONTHS
    });
    // 中止者セクションも検索対象（改修1）。氏名＋ふりがな（kana）で絞り込む。
    const ledgerShown = termCls.ledger.filter(t => wtMatchesSearch(t.name, t.kana, searchQuery));
    const orphansShown = termCls.orphans.filter(t => wtMatchesSearch(t.name, t.kana, searchQuery));
    const termTotal = termCls.ledger.length + termCls.orphans.length;
    const termShownCount = ledgerShown.length + orphansShown.length;
    // 既定は折りたたみ。検索で中止者側にヒットしたら自動展開（保存状態は変えない・改修3-2の例外）。
    const forceExpandBySearch = searchActive && termShownCount > 0;
    const expanded = forceExpandBySearch ? true : !isTerminatedCollapsed();

    // 中止者/台帳外に共通の行描画（現役行と同じセル体裁・押下で編集可）
    function renderTermRow(name, badgeHtml, rowClass) {
        if (!yearData[name]) yearData[name] = {};
        if (!appData.heights[year]) appData.heights[year] = {};
        if (!appData.heights[year][name]) appData.heights[year][name] = {};
        const tHeightData = appData.heights[year][name];
        let r = `<tr class="${rowClass}">`;
        r += `<td class="group-cell"></td>`;
        r += `<td class="name-cell">${escapeHtml(name)}${badgeHtml}</td>`;
        for (let mi = 0; mi < MONTHS.length; mi++) {
            const m = MONTHS[mi];
            const weight = yearData[name][m];
            const height = tHeightData[m];
            let cls = 'weight-cell month-border';
            let content = '';
            if (weight !== undefined && weight !== null && weight !== '') {
                cls += ' has-value';
                content = `<span class="weight-value">${weight}</span>`;
                const nearestHeight = height || getNearestHeight(name, year, mi);
                if (nearestHeight) {
                    const hm = nearestHeight / 100;
                    const bmi = (weight / (hm * hm)).toFixed(1);
                    content += `<span style="font-size:10px; display:block; color:#888;">BMI ${bmi}</span>`;
                }
            }
            if (height) {
                content += `<span style="position:absolute; top:2px; right:3px; font-size:9px; color:#4CAF50;" title="${height}cm">📏</span>`;
            }
            r += `<td class="${cls}" onclick="openWeightInput('${escapeAttr(name)}','${m}')">${content}</td>`;
        }
        r += '</tr>';
        return r;
    }

    if (termTotal > 0) {
        const caret = expanded ? '▼' : '▶';
        const countLabel = searchActive ? `表示 ${termShownCount}／${termTotal}名` : `${termTotal}名`;
        html += `<tr class="terminated-divider-row" onclick="toggleTerminatedCollapse()"><td colspan="${2 + MONTHS.length}"><span class="term-caret">${caret}</span>⛔ 中止者（記録保持・${countLabel}）　<span class="term-hint">※測定対象判定からは除外。過去データは編集可能。タップで開閉。</span></td></tr>`;
        if (expanded) {
            for (const t of ledgerShown) {
                html += renderTermRow(t.name, `<span class="terminated-badge">最終 ${t.badge || '—'}</span>`, 'row-terminated');
            }
            if (orphansShown.length > 0) {
                html += `<tr class="orphan-divider-row"><td colspan="${2 + MONTHS.length}">⚠️ 台帳外・要名寄せ（${orphansShown.length}名）　※現在の利用者台帳に該当氏名なし。氏名の取り違え・改名の可能性。台帳を確認して名寄せを。</td></tr>`;
                for (const t of orphansShown) {
                    html += renderTermRow(t.name, `<span class="orphan-badge">最終 ${t.badge || '—'}</span>`, 'row-terminated row-orphan');
                }
            }
        }
    }

    tbody.innerHTML = html;

    document.getElementById('totalCount').textContent = appData.users.length;
    document.getElementById('progressCount').textContent = isCurrentYear ? doneCount : '-';
    document.getElementById('progressTotal').textContent = isCurrentYear ? appData.users.length : '-';
    // 検索件数（登録者数の横・改修1）：現役の検索一致＋中止者/台帳外の検索一致の合計。
    const scEl = document.getElementById('searchCount');
    if (scEl) scEl.textContent = searchActive ? `｜ 検索: ${filteredUsers.length + termShownCount}件` : '';
}

// ============ 体重入力 ============
function openWeightInput(userName, month) {
    editingUser = userName;
    editingMonth = month;
    document.getElementById('weightModalTitle').textContent = `${userName} - ${month}`;

    const year = appData.currentYear;
    const current = appData.weights[year]?.[userName]?.[month];
    const input = document.getElementById('weightInput');
    input.value = (current !== undefined && current !== null && current !== '') ? current : '';

    const mi = MONTHS.indexOf(month);
    let prevInfo = '';
    if (mi > 0) {
        const prev = appData.weights[year]?.[userName]?.[MONTHS[mi-1]];
        if (prev) prevInfo = `前月（${MONTHS[mi-1]}）: ${prev}kg`;
    } else if (mi === 0) {
        const prevYearData = appData.weights[year - 1];
        if (prevYearData?.[userName]?.['3月']) prevInfo = `前月（3月）: ${prevYearData[userName]['3月']}kg`;
    }
    document.getElementById('weightModalInfo').textContent = prevInfo;

    // 身長セクション
    const isHeightMonth = HEIGHT_MONTHS.includes(month);
    const heightSection = document.getElementById('heightSection');
    const heightInput = document.getElementById('heightInput');
    const badge = document.getElementById('heightMonthBadge');

    if (isHeightMonth) {
        heightSection.style.display = 'block';
        badge.textContent = '今月は測定月！';
        badge.style.background = '#4CAF50';
    } else {
        // 測定月以外でも入力は可能（表示はするが目立たせない）
        heightSection.style.display = 'block';
        badge.textContent = '測定月以外';
        badge.style.background = '#9e9e9e';
    }

    // 身長の既存データを表示
    if (!appData.heights[year]) appData.heights[year] = {};
    if (!appData.heights[year][userName]) appData.heights[year][userName] = {};
    const currentHeight = appData.heights[year][userName][month];
    heightInput.value = (currentHeight !== undefined && currentHeight !== null && currentHeight !== '') ? currentHeight : '';

    // 直近の身長を参考表示
    const lastHeight = getLastHeight(userName, year, mi);
    if (lastHeight.value) {
        heightInput.placeholder = `前回: ${lastHeight.value}cm（${lastHeight.month}）`;
    } else {
        heightInput.placeholder = '例: 155.0';
    }

    updateBmiDisplay();

    document.getElementById('weightModal').classList.add('active');
    setTimeout(() => input.focus(), 100);
}

// 直近の身長を取得
function getLastHeight(userName, year, currentMi) {
    // 現在年度の前の月から探す
    for (let i = currentMi - 1; i >= 0; i--) {
        const h = appData.heights[year]?.[userName]?.[MONTHS[i]];
        if (h) return { value: h, month: MONTHS[i] };
    }
    // 前年度の3月から遡る
    const prevYear = year - 1;
    for (let i = MONTHS.length - 1; i >= 0; i--) {
        const h = appData.heights[prevYear]?.[userName]?.[MONTHS[i]];
        if (h) return { value: h, month: MONTHS[i] + '(前年度)' };
    }
    return { value: null, month: '' };
}

// 直近の身長を数値で取得（テーブル表示用）
function getNearestHeight(userName, year, currentMi) {
    // 同年度の前の月から
    for (let i = currentMi - 1; i >= 0; i--) {
        const h = appData.heights[year]?.[userName]?.[MONTHS[i]];
        if (h) return h;
    }
    // 前年度
    for (let i = MONTHS.length - 1; i >= 0; i--) {
        const h = appData.heights[year - 1]?.[userName]?.[MONTHS[i]];
        if (h) return h;
    }
    return null;
}

// BMIリアルタイム計算
function updateBmiDisplay() {
    const w = parseFloat(document.getElementById('weightInput').value);
    const h = parseFloat(document.getElementById('heightInput').value);
    const display = document.getElementById('bmiDisplay');

    if (!isNaN(w) && !isNaN(h) && h > 0) {
        const hm = h / 100;
        const bmi = (w / (hm * hm)).toFixed(1);
        let label = '';
        let color = '#666';
        if (bmi < 18.5) { label = '低体重'; color = '#2196F3'; }
        else if (bmi < 25) { label = '普通体重'; color = '#4CAF50'; }
        else if (bmi < 30) { label = '肥満(1度)'; color = '#FF9800'; }
        else { label = '肥満(2度以上)'; color = '#f44336'; }
        display.innerHTML = `<strong style="color:${color}; font-size:20px;">BMI: ${bmi}</strong> <span style="font-size:14px;">(${label})</span>`;
    } else {
        display.innerHTML = '';
    }
}

function closeWeightModal() {
    document.getElementById('weightModal').classList.remove('active');
}

function saveWeight() {
    const weightVal = parseFloat(document.getElementById('weightInput').value);
    const heightVal = parseFloat(document.getElementById('heightInput').value);
    const hasWeight = !isNaN(weightVal);
    const hasHeight = !isNaN(heightVal);

    if (!hasWeight && !hasHeight) {
        alert('体重または身長を入力してください');
        return;
    }
    if (hasWeight && (weightVal < 20 || weightVal > 200)) {
        alert('体重は20〜200kgの範囲で入力してください');
        return;
    }
    if (hasHeight && (heightVal < 100 || heightVal > 220)) {
        alert('身長は100〜220cmの範囲で入力してください');
        return;
    }

    const year = appData.currentYear;

    // 体重保存
    if (hasWeight) {
        if (!appData.weights[year]) appData.weights[year] = {};
        if (!appData.weights[year][editingUser]) appData.weights[year][editingUser] = {};
        appData.weights[year][editingUser][editingMonth] = weightVal;
    }

    // 身長保存
    if (hasHeight) {
        if (!appData.heights[year]) appData.heights[year] = {};
        if (!appData.heights[year][editingUser]) appData.heights[year][editingUser] = {};
        appData.heights[year][editingUser][editingMonth] = heightVal;
    }

    saveData();
    closeWeightModal();
    renderTable();
}

function clearWeight() {
    const year = appData.currentYear;
    const hasWeight = appData.weights[year]?.[editingUser]?.[editingMonth];
    const hasHeight = appData.heights[year]?.[editingUser]?.[editingMonth];
    const msg = hasWeight && hasHeight ? 'この月の体重・身長データを削除しますか？' :
                hasHeight ? 'この月の身長データを削除しますか？' :
                'この月の体重データを削除しますか？';
    if (!confirm(msg)) return;

    if (appData.weights[year]?.[editingUser]) {
        delete appData.weights[year][editingUser][editingMonth];
    }
    if (appData.heights[year]?.[editingUser]) {
        delete appData.heights[year][editingUser][editingMonth];
    }
    saveData();
    closeWeightModal();
    renderTable();
}

function closeCsvModal() { document.getElementById('csvModal').classList.remove('active'); }

const fileDrop = document.getElementById('fileDrop');
fileDrop.addEventListener('dragover', (e) => { e.preventDefault(); fileDrop.classList.add('drag-over'); });
fileDrop.addEventListener('dragleave', () => { fileDrop.classList.remove('drag-over'); });
fileDrop.addEventListener('drop', (e) => {
    e.preventDefault(); fileDrop.classList.remove('drag-over');
    if (e.dataTransfer.files.length > 0) handleCsvFile(e.dataTransfer.files[0]);
});

function handleCsvFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const result = parseSpreadsheetCsv(e.target.result);
            if (result.length === 0) { alert('利用者が見つかりません'); return; }
            mergeUsers(result);
            closeCsvModal();
            saveData();
            renderTable();
            showToast(`✅ ${appData.users.length}名を読み込みました`, '#4CAF50');
        } catch(err) { alert('CSV読込エラー: ' + err.message); }
    };
    reader.readAsText(file, 'UTF-8');
}

function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
            if (ch === '"' && line[i+1] === '"') { current += '"'; i++; }
            else if (ch === '"') { inQuotes = false; }
            else { current += ch; }
        } else {
            if (ch === '"') { inQuotes = true; }
            else if (ch === ',') { result.push(current); current = ''; }
            else { current += ch; }
        }
    }
    result.push(current);
    return result;
}

// ============ バックアップ/復元 ============
function exportJson() {
    const data = {
        type: 'yawaragi_weight_check', version: 1,
        exportDate: new Date().toISOString(),
        users: appData.users, terminated: appData.terminated, weights: appData.weights, heights: appData.heights
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const d = new Date();
    a.download = `体重チェック_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

function handleJsonFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            if (data.type !== 'yawaragi_weight_check') { alert('体重チェックのバックアップファイルではありません'); return; }
            if (confirm('現在のデータを復元データで上書きします。よろしいですか？')) {

}

// ============ 個別グラフ ============
let weightChart = null;
let graphUserName = '';

function openGraph(userName) {
    graphUserName = userName;
    const year = appData.currentYear;
    const yearLabel = `令和${year - 2018}年度`;
    document.getElementById('graphTitle').textContent = `${userName} さんの体重推移`;
    document.getElementById('graphYear').textContent = yearLabel;

    const yearData = appData.weights[year]?.[userName] || {};
    const prevYearData = appData.weights[year - 1]?.[userName] || {};

    // データ準備
    const labels = [];
    const values = [];
    const changes = [];
    for (let mi = 0; mi < MONTHS.length; mi++) {
        const m = MONTHS[mi];
        const w = yearData[m];
        labels.push(m);
        if (w !== undefined && w !== null && w !== '') {
            values.push(w);
            // 前月比
            let prev = null;
            if (mi > 0) {
                prev = yearData[MONTHS[mi - 1]];
            } else {
                prev = prevYearData['3月'];
            }
            if (prev !== undefined && prev !== null && prev !== '') {
                changes.push((w - prev).toFixed(1));
            } else {
                changes.push(null);
            }
        } else {
            values.push(null);
            changes.push(null);
        }
    }

    // グラフ描画
    const ctx = document.getElementById('weightChart').getContext('2d');
    if (weightChart) weightChart.destroy();

    // Y軸の範囲を計算
    const validValues = values.filter(v => v !== null);
    let yMin = 40, yMax = 80;
    if (validValues.length > 0) {
        const min = Math.min(...validValues);
        const max = Math.max(...validValues);
        const padding = Math.max((max - min) * 0.3, 2);
        yMin = Math.floor(min - padding);
        yMax = Math.ceil(max + padding);
    }

    weightChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: '体重 (kg)',
                data: values,
                borderColor: '#2196F3',
                backgroundColor: 'rgba(33,150,243,0.1)',
                borderWidth: 3,
                pointBackgroundColor: '#2196F3',
                pointBorderColor: '#fff',
                pointBorderWidth: 2,
                pointRadius: 6,
                pointHoverRadius: 8,
                fill: true,
                tension: 0.3,
                spanGaps: false
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: { duration: 400 },
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(ctx) {
                            let label = ctx.parsed.y + ' kg';
                            const ci = ctx.dataIndex;
                            if (changes[ci] !== null) {
                                const d = parseFloat(changes[ci]);
                                label += d > 0 ? ` (前月比 +${changes[ci]}kg)` : ` (前月比 ${changes[ci]}kg)`;
                            }
                            return label;
                        }
                    },
                    titleFont: { size: 14 },
                    bodyFont: { size: 14 }
                }
            },
            scales: {
                y: {
                    min: yMin,
                    max: yMax,
                    ticks: { font: { size: 14 }, callback: v => v + 'kg' },
                    grid: { color: '#e0e0e0' }
                },
                x: {
                    ticks: { font: { size: 14 } },
                    grid: { color: '#f0f0f0' }
                }
            }
        }
    });

    // 身長・BMIデータ準備
    const heightYearData = appData.heights[year]?.[userName] || {};
    const heightValues = [];
    const bmiValues = [];
    for (let mi = 0; mi < MONTHS.length; mi++) {
        const m = MONTHS[mi];
        const h = heightYearData[m];
        heightValues.push(h || null);
        // BMI計算（身長があるか、直近の身長を使用）
        const w = values[mi];
        const nearH = h || getNearestHeight(userName, year, mi);
        if (w !== null && nearH) {
            const hm = nearH / 100;
            bmiValues.push(parseFloat((w / (hm * hm)).toFixed(1)));
        } else {
            bmiValues.push(null);
        }
    }

    // データテーブル
    let tableHtml = '<thead><tr><th>月</th>';
    for (const m of MONTHS) tableHtml += `<th>${m}</th>`;
    tableHtml += '</tr></thead><tbody>';
    tableHtml += '<tr><td style="font-weight:bold;">体重</td>';
    for (let i = 0; i < MONTHS.length; i++) {
        tableHtml += `<td>${values[i] !== null ? values[i] + 'kg' : '-'}</td>`;
    }
    tableHtml += '</tr><tr><td style="font-weight:bold;">前月比</td>';
    for (let i = 0; i < MONTHS.length; i++) {
        if (changes[i] !== null) {
            const d = parseFloat(changes[i]);
            const cls = d > 0 ? 'change-up' : d < 0 ? 'change-down' : '';
            const sign = d > 0 ? '+' : '';
            tableHtml += `<td class="${cls}">${sign}${changes[i]}kg</td>`;
        } else {
            tableHtml += '<td>-</td>';
        }
    }
    tableHtml += '</tr><tr><td style="font-weight:bold; color:#4CAF50;">身長</td>';
    for (let i = 0; i < MONTHS.length; i++) {
        tableHtml += `<td>${heightValues[i] !== null ? heightValues[i] + 'cm' : '-'}</td>`;
    }
    tableHtml += '</tr><tr><td style="font-weight:bold; color:#FF9800;">BMI</td>';
    for (let i = 0; i < MONTHS.length; i++) {
        if (bmiValues[i] !== null) {
            let color = '#666';
            if (bmiValues[i] < 18.5) color = '#2196F3';
            else if (bmiValues[i] < 25) color = '#4CAF50';
            else if (bmiValues[i] < 30) color = '#FF9800';
            else color = '#f44336';
            tableHtml += `<td style="color:${color}; font-weight:bold;">${bmiValues[i]}</td>`;
        } else {
            tableHtml += '<td>-</td>';
        }
    }
    tableHtml += '</tr></tbody>';
    document.getElementById('graphDataTable').innerHTML = tableHtml;

    document.getElementById('graphModal').classList.add('active');
}
