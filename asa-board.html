<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- キャッシュ自動更新バージョンゲート（design.md 2026-06-18 準拠・<head>最先頭・genba型/自己完結・shared.js不要） -->
    <!-- version.txt を取得し、現URLの ?v= と違えば1回だけ最新版へ location.replace する -->
    <script>
    function gateShouldReload(cur, latest) { return !!latest && cur !== latest; }
    function buildVersionedUrl(currentUrl, latest) { var u = new URL(currentUrl); u.searchParams.set('v', latest); return u.href; }
    (function () {
        try {
            var cur = new URLSearchParams(location.search).get('v');
            fetch('version.txt?_=' + Date.now(), { cache: 'no-store' })
                .then(function (r) { return r.text(); })
                .then(function (t) {
                    var latest = (t || '').trim();
                    if (gateShouldReload(cur, latest)) {
                        location.replace(buildVersionedUrl(location.href, latest));
                    }
                })
                .catch(function () { /* オフライン等は no-op で固まらせない */ });
        } catch (e) { /* 念のため no-op（ゲートで画面を固まらせない） */ }
    })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>朝ボード｜やわらぎ</title>
<style>
  :root{
    --ground:#eef2f6; --surface:#ffffff; --surface-2:#f5f8fb;
    --ink:#243239; --ink-2:#516470; --muted:#93a3ad;
    --accent:#2c7a7b; --accent-soft:#e2f0ef;
    --line:#e3e9ee; --chip-bg:#eceff1; --chip-ink:#546e7a;
    --crit:#e04338; --crit-bg:#fcebe9; --crit-line:#e04338;
    --warn:#e08a1e; --warn-bg:#fdf1df; --warn-line:#f0a83a;
    --calm:#9aa8b1; --calm-line:#c4ced4;
    --ok:#2e9e78;
    --am:#2c7a7b; --am-soft:#e2f0ef;
    --pm:#b4632b; --pm-soft:#f6ebe1;
    --shadow:0 1px 3px rgba(38,55,70,.10),0 1px 2px rgba(38,55,70,.06);
    --radius:13px;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --ground:#111820; --surface:#1b232b; --surface-2:#212b34;
      --ink:#e7eef3; --ink-2:#a2b3bf; --muted:#6f8290;
      --accent:#4db6ac; --accent-soft:#1e2f30;
      --line:#2b353e; --chip-bg:#28333c; --chip-ink:#a9bac6;
      --crit:#ff7168; --crit-bg:#3a2220; --crit-line:#c74a42;
      --warn:#e6ab5b; --warn-bg:#33291a; --warn-line:#8a6a35;
      --calm:#7d8d97; --calm-line:#3a454e;
      --ok:#57c39a;
      --am:#4db6ac; --am-soft:#1e2f30;
      --pm:#d98a52; --pm-soft:#332318;
      --shadow:0 1px 3px rgba(0,0,0,.4);
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--ground); color:var(--ink);
    font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic','Meiryo',sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5; font-feature-settings:"palt";
  }
  .wrap{max-width:720px; margin:0 auto; padding:18px 14px 60px;}
  .demo-ribbon{
    max-width:720px; margin:0 auto 12px; background:var(--accent-soft); color:var(--accent);
    border-radius:9px; padding:7px 12px; font-size:.76rem; font-weight:700; text-align:center; letter-spacing:.02em;
  }

  /* 日付を主役に */
  .datehead{
    display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;
    padding-bottom:10px; margin-bottom:12px; border-bottom:2px solid var(--line);
  }
  .datehead .dnum{font-size:2.6rem; font-weight:800; line-height:1; letter-spacing:-.01em; color:var(--ink); font-variant-numeric:tabular-nums;}
  .datehead .dwk{font-size:1.15rem; font-weight:800; color:var(--accent); border:1.5px solid var(--accent); border-radius:8px; padding:2px 9px; align-self:center;}
  .datehead .dwk.sat{color:#2f74c0; border-color:#2f74c0;}
  .datehead .dwk.sun{color:var(--crit); border-color:var(--crit-line);}
  .datehead .app{margin-left:auto; align-self:center; font-size:.98rem; font-weight:800; color:var(--ink-2);}
  .sub{font-size:.8rem; color:var(--muted); margin:-4px 2px 14px;}

  /* AM/PM タブ */
  .tabs{display:flex; gap:8px; margin-bottom:14px;}
  .tab{
    flex:1; padding:11px 8px; border-radius:11px; border:1.5px solid var(--line);
    background:var(--surface); box-shadow:var(--shadow); cursor:pointer;
    display:flex; align-items:baseline; justify-content:center; gap:8px;
    font-weight:800; color:var(--ink-2); font-size:1rem; line-height:1;
    transition:border-color .12s, background .12s;
  }
  .tab .cnt{font-size:1.35rem; font-variant-numeric:tabular-nums;}
  .tab .unit{font-size:.72rem; font-weight:700; color:var(--muted);}
  .tab.on.am{border-color:var(--am); background:var(--am-soft); color:var(--am);}
  .tab.on.am .unit{color:var(--am);}
  .tab.on.pm{border-color:var(--pm); background:var(--pm-soft); color:var(--pm);}
  .tab.on.pm .unit{color:var(--pm);}
  .tab:active{transform:translateY(1px);}

  /* ⚠️ AM/PM衝突バナー */
  .conflict{
    background:var(--crit-bg); border:1.5px solid var(--crit-line); border-radius:11px;
    padding:10px 13px; margin-bottom:14px;
  }
  .conflict .ch{font-size:.82rem; font-weight:800; color:var(--crit); margin-bottom:3px;}
  .conflict .cn{font-size:.85rem; font-weight:700; color:var(--ink);}
  .conflict .cx{font-size:.72rem; color:var(--ink-2); margin-top:4px;}

  .tiles{display:flex; gap:10px; margin-bottom:8px; flex-wrap:wrap;}
  .tile{flex:1; min-width:96px; background:var(--surface); border-radius:var(--radius); padding:11px 13px; box-shadow:var(--shadow); border:1px solid var(--line);}
  .tile .k{font-size:.72rem; color:var(--muted); font-weight:700;}
  .tile .v{font-size:1.5rem; font-weight:800; color:var(--ink); font-variant-numeric:tabular-nums; line-height:1.15;}
  .tile .v small{font-size:.62em; font-weight:700; color:var(--ink-2); margin-left:2px;}
  .tile.accent .v{color:var(--accent);}

  .nctl{display:flex; align-items:center; gap:8px; margin:12px 2px 4px; font-size:.82rem; color:var(--ink-2); font-weight:700;}
  .step{width:30px; height:30px; border-radius:8px; border:1px solid var(--line); background:var(--surface); color:var(--accent); font-size:1.1rem; font-weight:800; cursor:pointer; line-height:1; box-shadow:var(--shadow);}
  .step:active{transform:translateY(1px);}
  .nval{min-width:1.4em; text-align:center; font-size:1.05rem; color:var(--ink); font-variant-numeric:tabular-nums;}

  .sec{margin-top:22px;}
  .sec-h{display:flex; align-items:center; gap:8px; margin:0 2px 9px;}
  .sec-h .t{font-size:1rem; font-weight:800; color:var(--ink);}
  .sec-h .c{font-size:.72rem; font-weight:700; color:var(--ink-2); background:var(--surface-2); border:1px solid var(--line); border-radius:999px; padding:1px 9px; font-variant-numeric:tabular-nums;}
  .sec-note{font-size:.75rem; color:var(--muted); margin:-4px 2px 8px;}
  .subhead{font-size:.76rem; font-weight:700; color:var(--muted); margin:14px 2px 6px; letter-spacing:.02em;}

  .card{background:var(--surface); border-radius:var(--radius); padding:10px 13px; margin-bottom:7px; box-shadow:var(--shadow); border:1px solid var(--line); border-left:5px solid var(--calm-line); display:flex; align-items:center; gap:10px;}
  .card.crit{border-left-color:var(--crit-line);}
  .card.warn{border-left-color:var(--warn-line);}
  .card.rest{opacity:.72;}
  .card .nm{font-weight:800; color:var(--ink); font-size:.98rem;}
  .care{font-size:.72rem; color:var(--chip-ink); background:var(--chip-bg); border-radius:6px; padding:2px 8px; white-space:nowrap; font-weight:700;}
  .role{font-size:.72rem; font-weight:800; border-radius:6px; padding:2px 9px; white-space:nowrap; background:var(--accent-soft); color:var(--accent);}
  .trk{font-size:.68rem; font-weight:800; border-radius:5px; padding:2px 7px; white-space:nowrap;}
  .trk.k{ background:var(--accent-soft); color:var(--accent); }
  .trk.s{ background:var(--chip-bg); color:var(--chip-ink); }
  .why{ font-size:.72rem; color:var(--ink-2); margin-top:4px; display:flex; flex-wrap:wrap; gap:4px 8px; }
  .why .pill{ background:var(--surface-2); border:1px solid var(--line); border-radius:5px; padding:1px 6px; font-weight:700; }
  .why .hot{ color:var(--crit); border-color:var(--crit-line); }
  .card.col{ flex-direction:column; align-items:stretch; }
  .card .toprow{ display:flex; align-items:center; gap:10px; }
  .spacer{flex:1;}
  .stat{font-size:.85rem; font-weight:800; text-align:right; white-space:nowrap; font-variant-numeric:tabular-nums;}
  .stat .lbl{display:block; font-size:.68rem; font-weight:700; color:var(--muted);}
  .stat.crit{color:var(--crit);}
  .stat.warn{color:var(--warn);}
  .stat.ok{color:var(--ink-2);}

  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{background:var(--surface); border:1px solid var(--line); border-radius:999px; padding:5px 12px; font-size:.83rem; font-weight:700; color:var(--ink); box-shadow:var(--shadow);}

  .bd{background:var(--surface); border-radius:var(--radius); padding:9px 13px; margin-bottom:7px; box-shadow:var(--shadow); border:1px solid var(--line); border-left:5px solid var(--warn-line); display:flex; align-items:center; gap:10px;}
  .bd .md{font-weight:800; color:var(--warn); font-variant-numeric:tabular-nums; min-width:3.2em;}
  .bd .nm{font-weight:800;}
  .bd .todo{font-size:.74rem; color:var(--ink-2); font-weight:700;}
  .allsec{margin-top:30px; padding-top:8px; border-top:2px dashed var(--line);}

  .residue{margin-top:22px; background:var(--warn-bg); border:1px solid var(--warn-line); border-radius:var(--radius); padding:11px 14px;}
  .residue .rh{font-size:.82rem; font-weight:800; color:var(--warn); margin-bottom:5px;}
  .residue .rn{font-size:.85rem; color:var(--ink); font-weight:700;}
  .residue .rx{font-size:.73rem; color:var(--ink-2); margin-top:4px;}

  .empty{font-size:.83rem; color:var(--muted); padding:6px 2px;}
  .errcard{background:var(--crit-bg); border:1px solid var(--crit-line); border-radius:var(--radius); padding:12px 14px; margin:14px 0; font-size:.85rem; color:var(--crit); font-weight:700;}
  .loading{text-align:center; color:var(--muted); padding:40px 0; font-size:.9rem;}
  .foot{margin-top:34px; text-align:center; font-size:.72rem; color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <div id="ribbon"></div>
  <div class="datehead">
    <span class="dnum" id="dnum">—</span>
    <span class="dwk" id="dwk"></span>
    <span class="app">🌅 朝ボード</span>
  </div>
  <div class="sub">その時間帯の出席者 × 今日やる業務を自動ピックアップ</div>

  <div id="conflict"></div>

  <div class="tabs" id="tabs" style="display:none;">
    <button class="tab am" data-tab="am"><span>午前</span><span class="cnt" id="amCnt">0</span><span class="unit">名</span></button>
    <button class="tab pm" data-tab="pm"><span>午後</span><span class="cnt" id="pmCnt">0</span><span class="unit">名</span></button>
  </div>

  <div class="tiles" id="tiles"></div>

  <div class="nctl" id="nctl" style="display:none;">
    「今日やる」上位
    <button class="step" id="nMinus" aria-label="減らす">−</button>
    <span class="nval" id="nVal">3</span>
    <button class="step" id="nPlus" aria-label="増やす">＋</button>
    名（測定）
  </div>

  <div id="board"><div class="loading">読み込み中…</div></div>

  <div class="foot">やわらぎ 朝ボード ／ 判定は当日出席（台帳曜日−欠席）に紐づく</div>
</div>

<script>
  // ===== 設定 =====
  var GAS = 'https://script.google.com/macros/s/AKfycbwo1UGxsK1qgmO8IDaqT-inDM0Qgoe_MRvxfKDxHy_gXANi4FwNFlgn2pEanMXVQxsdlw/exec';
  var DEMO = /[?&]demo=1/.test(location.search);

  var ROLE_LABEL = { moni1:'モニ①', moni2:'モニ②', setsume:'報告書＋計画書' };
  var YOUBI = ['日','月','火','水','木','金','土'];
  var TOPN_KEY = 'asaBoard_topN', TAB_KEY = 'asaBoard_tab';

  var topN = parseInt(localStorage.getItem(TOPN_KEY) || '3', 10);
  if (!(topN >= 1 && topN <= 9)) topN = 3;

  var DATA = null;     // abBuildBoard_ 出力
  var selTab = 'am';   // render時に確定

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function inTab(x){ return x && x.session===selTab; }
  function filt(arr){ return (arr||[]).filter(inTab); }

  // 当日日付（Asia/Tokyo。demo/実運用ともサーバ返却のdateを主に使う）
  function todayYMD(){
    var d = new Date();
    function pad(n){ return (n<10?'0':'')+n; }
    return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
  }

  // 初期タブ：保存が当日内なら尊重、そうでなければ時間帯自動（正午前=午前/以降=午後）
  function initialTab(dataDate){
    var raw = localStorage.getItem(TAB_KEY);
    if (raw){
      try {
        var o = JSON.parse(raw);
        if (o && o.date === dataDate && (o.tab === 'am' || o.tab === 'pm')) return o.tab;
      } catch(e){}
    }
    return (new Date().getHours() < 12) ? 'am' : 'pm';
  }
  function saveTab(dataDate, tab){
    try { localStorage.setItem(TAB_KEY, JSON.stringify({ date: dataDate, tab: tab })); } catch(e){}
  }

  // ===== 描画 =====
  function measureCard(r, rest){
    var cls = 'card col', stat = '', slbl = '', scls = 'ok';
    if (r.unmeasured){ slbl='未測定'; stat='最優先'; scls='crit'; }
    else if (r.remaining < 0){ slbl='期限超過'; stat=(-r.remaining)+'日'; scls='crit'; }
    else if (r.remaining <= 7){ slbl=(r.track==='kaigo'?'評価月・残':'残'); stat=r.remaining+'日'; scls='crit'; }
    else if (r.remaining <= 30){ slbl=(r.track==='kaigo'?'評価月・残':'残'); stat=r.remaining+'日'; scls='warn'; }
    else { slbl=(r.track==='kaigo'?'評価月・残':'残'); stat=r.remaining+'日'; scls='ok'; }
    if (!rest){ cls += (scls==='crit'?' crit':(scls==='warn'?' warn':'')); } else { cls += ' rest'; }
    var trk = r.track==='kaigo' ? '<span class="trk k">要介護</span>' : '<span class="trk s">要支援</span>';
    var wk = (r.weeklyVisits!=null? ('週'+r.weeklyVisits) : '');
    var rv = (r.remainingVisits!=null? ('残来所'+r.remainingVisits+'回') : '');
    var absHot = (r.absenceRate!=null && r.absenceRate>=0.2);
    var why = '<div class="why">'
      + (wk? '<span class="pill'+(r.weeklyVisits<=1?' hot':'')+'">'+wk+'</span>':'')
      + (rv? '<span class="pill'+(r.remainingVisits!=null && r.remainingVisits<=1?' hot':'')+'">'+rv+'</span>':'')
      + (absHot? '<span class="pill hot">欠席多め '+Math.round(r.absenceRate*100)+'%</span>':'')
      + '</div>';
    return '<div class="'+cls+'"><div class="toprow">'
      + trk + '<span class="nm">'+esc(r.name)+'</span>'
      + '<span class="care">'+esc(r.care||'—')+'</span><span class="spacer"></span>'
      + '<span class="stat '+scls+'"><span class="lbl">'+slbl+'</span>'+esc(stat)+'</span>'
      + '</div>' + why + '</div>';
  }

  function measurePool(rows){
    var h = '<div class="sec"><div class="sec-h"><span class="t">📏 測定（今日やる優先）</span><span class="c">'+rows.length+'名</span></div>';
    h += '<div class="sec-note">要介護（加算必達）を上に、各層内は「今後会える残チャンスが少ない人（週回数少・欠席多・残来所少）」ほど先。この時間帯の出席者のうち上位'+Math.min(topN,rows.length)+'名が今日やる。</div>';
    if (!rows.length){ h += '<div class="empty">この時間帯の測定対象はいません</div></div>'; return h; }
    var today = rows.slice(0, topN), rest = rows.slice(topN);
    h += '<div class="subhead">▶ 今日やる（上位'+Math.min(topN,rows.length)+'）</div>';
    today.forEach(function(r){ h += measureCard(r, false); });
    if (rest.length){
      h += '<div class="subhead">余裕があれば（'+rest.length+'名）</div>';
      rest.forEach(function(r){ h += measureCard(r, true); });
    }
    h += '</div>'; return h;
  }

  function tile(k, v, unit, accent){
    return '<div class="tile'+(accent?' accent':'')+'"><div class="k">'+k+'</div>'
      + '<div class="v">'+v+'<small>'+(unit||'')+'</small></div></div>';
  }
  function chipSection(title, arr){
    var h = '<div class="sec"><div class="sec-h"><span class="t">'+title+'</span><span class="c">'+arr.length+'名</span></div>';
    if (!arr.length){ h += '<div class="empty">この時間帯の対象はいません</div></div>'; return h; }
    h += '<div class="chips">';
    arr.forEach(function(r){ h += '<span class="chip">'+esc(r.name)+'</span>'; });
    h += '</div></div>'; return h;
  }

  function render(){
    var b = DATA; if (!b) return;
    // 日付ヘッダ
    var p = String(b.date||'').split('-'), d = new Date(+p[0], +p[1]-1, +p[2]), wd = d.getDay();
    document.getElementById('dnum').textContent = (p.length===3) ? ((+p[1]) + '/' + (+p[2])) : '—';
    var dwk = document.getElementById('dwk');
    dwk.textContent = (p.length===3) ? YOUBI[wd] : '';
    dwk.className = 'dwk' + (wd===6?' sat':(wd===0?' sun':''));

    // 衝突バナー
    var confEl = document.getElementById('conflict');
    if (b.ampmConflict && b.ampmConflict.length){
      var cn = b.ampmConflict.map(function(r){ return esc(r.name); }).join('、');
      confEl.innerHTML = '<div class="conflict"><div class="ch">⚠️ AM/PM両方に出席登録＝要確認：'+b.ampmConflict.length+'名</div>'
        + '<div class="cn">'+cn+'</div>'
        + '<div class="cx">1日2単位制では同じ人が午前・午後の両方に来ることはありません。氏名の重複登録か別人の同名の可能性。確認してください（暫定で午前に表示しています）。</div></div>';
    } else { confEl.innerHTML = ''; }

    // タブ
    document.getElementById('tabs').style.display = '';
    document.getElementById('nctl').style.display = '';
    document.getElementById('amCnt').textContent = (b.presentAm!=null?b.presentAm:0);
    document.getElementById('pmCnt').textContent = (b.presentPm!=null?b.presentPm:0);
    var tabEls = document.querySelectorAll('#tabs .tab');
    for (var i=0;i<tabEls.length;i++){
      var on = tabEls[i].getAttribute('data-tab')===selTab;
      tabEls[i].className = 'tab ' + tabEls[i].getAttribute('data-tab') + (on?' on':'');
    }
    document.getElementById('nVal').textContent = topN;

    var sok = filt(b.sokutei), moni = filt(b.koukuMoni), tais = filt(b.koukuTaisou), kot = filt(b.kotan), res = filt(b.residue);

    var tiles = ''
      + tile('この時間帯', (selTab==='am'?(b.presentAm||0):(b.presentPm||0)), '名 出席', true)
      + tile('測定 対象', sok.length, '名')
      + tile('口腔モニ', moni.length, '名')
      + tile('今月 誕生日', (b.birthday||[]).length, '名');
    document.getElementById('tiles').innerHTML = tiles;

    var h = '';
    h += measurePool(sok);

    // 口腔モニ
    h += '<div class="sec"><div class="sec-h"><span class="t">🦷 口腔モニタリング</span><span class="c">'+moni.length+'名</span></div>';
    if (!moni.length) h += '<div class="empty">この時間帯の対象はいません</div>';
    moni.forEach(function(r){
      h += '<div class="card"><span class="nm">'+esc(r.name)+'</span>'
         + '<span class="role">'+esc(ROLE_LABEL[r.role]||r.role)+'</span>'
         + '<span class="spacer"></span><span class="stat ok"><span class="lbl">未実施</span>要対応</span></div>';
    });
    h += '</div>';

    h += chipSection('💨 口腔体操', tais);
    h += chipSection('🏋 個別機能訓練', kot);

    // 誕生日（タブ外・常時）
    h += '<div class="allsec"><div class="sec"><div class="sec-h"><span class="t">🎂 誕生日（今月）</span><span class="c">'+(b.birthday||[]).length+'名</span></div>';
    h += '<div class="sec-note">当日出席・時間帯に関係なく今月の対象を表示（撮影→プリント→お渡しが未完の人）</div>';
    if (!(b.birthday||[]).length) h += '<div class="empty">今月の対象はいません</div>';
    (b.birthday||[]).forEach(function(r){
      h += '<div class="bd"><span class="md">'+r.month+'/'+r.day+'</span>'
         + '<span class="nm">'+esc(r.name)+'</span><span class="spacer"></span>'
         + '<span class="todo">📷 未撮影</span></div>';
    });
    h += '</div></div>';

    // residue（当該タブ）
    if (res && res.length){
      var names = res.map(function(r){ return esc(r.name); }).join('、');
      h += '<div class="residue"><div class="rh">⚠️ 名寄せ不能（要確認）：'+res.length+'名</div>'
         + '<div class="rn">'+names+'</div>'
         + '<div class="rx">出席しているが、氏名がどの業務台帳とも一致しなかった人。別人へ誤って割り当てないよう、拾い漏れとして表示しています。</div></div>';
    }

    document.getElementById('board').innerHTML = h;
  }

  function setN(n){
    topN = Math.max(1, Math.min(9, n));
    try { localStorage.setItem(TOPN_KEY, String(topN)); } catch(e){}
    render();
  }
  function setTab(t){
    if (t!=='am' && t!=='pm') return;
    selTab = t;
    saveTab(DATA ? DATA.date : todayYMD(), t);
    render();
  }
  document.getElementById('nMinus').addEventListener('click', function(){ setN(topN-1); });
  document.getElementById('nPlus').addEventListener('click', function(){ setN(topN+1); });
  var tabBtns = document.querySelectorAll('#tabs .tab');
  for (var j=0;j<tabBtns.length;j++){
    (function(el){ el.addEventListener('click', function(){ setTab(el.getAttribute('data-tab')); }); })(tabBtns[j]);
  }

  function boot(data){
    DATA = data;
    selTab = initialTab(DATA.date);
    render();
  }
  function showError(msg){
    document.getElementById('board').innerHTML = '<div class="errcard">⚠ 朝ボードの取得に失敗しました'
      + (msg? '：'+esc(msg) : '') + '（↻再読込を試してください）</div>';
  }

  // ===== データ取得 =====
  // JSONP（board GAS は GET=JSONP・POST=no-cors。genba/sokutei と同型）
  function fetchBoard(date){
    var cbName = 'asaBoardCb_' + Date.now();
    var done = false;
    var timer = setTimeout(function(){ if (done) return; done = true; cleanup(); showError('タイムアウト'); }, 20000);
    function cleanup(){ try { delete window[cbName]; } catch(e){ window[cbName] = undefined; } if (s && s.parentNode) s.parentNode.removeChild(s); clearTimeout(timer); }
    window[cbName] = function(resp){
      if (done) return; done = true; cleanup();
      if (resp && resp.ok === false){ showError(resp.error || '不明なエラー'); return; }
      boot(resp);
    };
    var s = document.createElement('script');
    s.src = GAS + '?action=asaBoard&date=' + encodeURIComponent(date) + '&callback=' + cbName + '&t=' + Date.now();
    s.onerror = function(){ if (done) return; done = true; cleanup(); showError('通信エラー'); };
    document.head.appendChild(s);
  }

  if (DEMO){
    document.getElementById('ribbon').className = 'demo-ribbon';
    document.getElementById('ribbon').textContent = '🖼 表示確認用サンプル（氏名・数字はダミー）。午前／午後タブで出席者を切り替え、測定は各タブ内で1プール優先順位。';
    boot(DEMO_DATA());
  } else {
    fetchBoard(todayYMD());
  }
