<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>yawaragi アプリ一覧（スタッフ用）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  padding: 20px;
}
h1 {
  text-align: center;
  color: #2c3e50;
  font-size: 1.6em;
  margin-bottom: 8px;
}
.subtitle {
  text-align: center;
  color: #7f8c8d;
  font-size: 0.9em;
  margin-bottom: 24px;
}
.status { max-width: 800px; margin: 0 auto 16px; text-align: center; color: #7f8c8d; font-size: 0.9em; }
.status.err { color: #c62828; }
.category {
  max-width: 800px;
  margin: 0 auto 20px;
  padding: 12px 16px 16px;
  border-radius: 14px;
  border: 2px solid;
}
.category-title {
  font-size: 1.05em;
  font-weight: 700;
  color: #2c3e50;
  margin-bottom: 10px;
  padding-left: 4px;
}
.apps {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.app-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  text-decoration: none;
  color: #2c3e50;
  font-size: 0.95em;
  font-weight: 600;
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.app-btn:active {
  transform: scale(0.97);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.icon {
  font-size: 1.5em;
  width: 36px;
  text-align: center;
  flex-shrink: 0;
}
.cat-main { background: #fff3e0; border-color: #ff9800; }
.cat-daily { background: #e8f5e9; border-color: #66bb6a; }
.cat-user { background: #e3f2fd; border-color: #42a5f5; }
.cat-soudan { background: #e0f2f1; border-color: #26a69a; }
.cat-monthly { background: #f3e5f5; border-color: #ab47bc; }
.cat-equip { background: #efebe9; border-color: #a1887f; }
.cat-rule { background: #fffde7; border-color: #ffca28; }
.cat-extra { background: #fff; border-color: #cfd8dc; }
.app-main {
  font-size: 1.2em;
  padding: 20px 24px;
  border: 2px solid #ff9800;
  min-height: 70px;
}
.app-main .icon {
  font-size: 2em;
  width: 50px;
}
.cat-main .apps {
  grid-template-columns: 1fr;
}
</style>
</head>
<body>

<h1>yawaragi アプリ一覧（スタッフ用）</h1>
<p class="subtitle">リハビリデイサービス yawaragi</p>

<div class="status" id="status">読み込み中…</div>

<!-- アプリ台帳(getAppRegistry?scope=staff)から自動生成。台帳に1行足せばここに自動で載る -->
<div id="registry"></div>

<script src="applauncher-render.js"></script>
<script>
var REGISTRY_API = 'https://script.google.com/macros/s/AKfycbwo1UGxsK1qgmO8IDaqT-inDM0Qgoe_MRvxfKDxHy_gXANi4FwNFlgn2pEanMXVQxsdlw/exec';
(function () {
  var status = document.getElementById('status');
  var url = REGISTRY_API + '?action=getAppRegistry&scope=staff&t=' + Date.now();
  fetch(url)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (!Array.isArray(data)) { status.textContent = 'アプリ一覧の形式が想定外でした。'; status.className = 'status err'; return; }
      LauncherRender.render(data, document.getElementById('registry'), { includeInternal: false });
      status.style.display = 'none';
    })
    .catch(function () {
      status.textContent = '読み込みに失敗しました（通信エラー）。少し待って再読み込みしてください。';
      status.className = 'status err';
    });
})();
</script>
</body>
</html>
