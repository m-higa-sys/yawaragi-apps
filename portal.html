body {

  background: #f0f4f8;

}
h1 {

  color: #2c3e50;

  margin-bottom: 24px;

  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));

.app-btn {

  align-items: center;
  gap: 12px;
  padding: 14px 16px;

  border-radius: 10px;

  font-size: 0.95em;
  font-weight: 600;
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.app-btn:active {
  transform: scale(0.97);

}
.icon {

  width: 36px;
  text-align: center;

.cat-main { background: #fff3e0; border-color: #ff9800; }

  padding: 20px 24px;
  border: 2px solid #ff9800;
  min-height: 70px;
}
.app-main .icon {

.cat-main .apps {
