function saveEditModal(office) {
  const cmName = document.getElementById('em_name').value.trim();
  const method = document.getElementById('em_method').value;
  const email = document.getElementById('em_email').value.trim();
  const fax = document.getElementById('em_fax').value.trim();
  const btn = document.getElementById('em_save');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const url = YAWARAGI_BOARD_API
    + '?action=updateContact'
    + '&office=' + encodeURIComponent(office)
    + '&cmName=' + encodeURIComponent(cmName)
    + '&email=' + encodeURIComponent(email)
    + '&fax=' + encodeURIComponent(fax)
    + '&method=' + encodeURIComponent(method);

  jsonp(url).then(res => {
    if (res.error) {
      alert('保存失敗: ' + res.error);
      btn.disabled = false; btn.textContent = '💾 保存';
      return;
    }
    closeEditModal();
    // 連絡先だけ再取得して再描画
    jsonp(YAWARAGI_BOARD_API + '?action=contacts').then(data => {
      allData.contacts = data.cmContacts || [];
      render();
    });
  }).catch(err => {
    alert('通信エラー: ' + err.message);
    btn.disabled = false; btn.textContent = '💾 保存';
  });
}

// 🖨️ 作業一覧を印刷（社長の実績確定作業用）
document.getElementById('printWorklistBtn').onclick = function() {
  const ym = document.getElementById('monthSel').value;
  const { targets, contactMap } = buildTargets(ym);

  // 🔴 繰越対象者を印刷にも含める（前月から📅フラグ付き）
  const progress0 = loadProgress();
  const prevYm = getPrevYm(ym);
  const prevProgress = progress0[prevYm] || {};
  const carryOverMap = {};
  Object.keys(prevProgress).forEach(name => {
    Object.keys(prevProgress[name]).forEach(flagKey => {
      if (!flagKey.endsWith('_next')) return;
      if (prevProgress[name][flagKey] !== true) return;
      const originalKey = flagKey.replace(/_next$/, '');
      if (!carryOverMap[name]) carryOverMap[name] = [];
      carryOverMap[name].push({ key: originalKey, originYm: prevYm });
    });
  });
  Object.keys(carryOverMap).forEach(name => {
    let t = targets.find(x => x.name === name);
    if (!t) {
      const u = allData.users.find(uu => uu.name === name);
      if (u) {
        t = { name: name, care: u.care, office: u.cmOffice || '(事業所未登録)', hasNewPlan: false };
        targets.push(t);
      }
    }
    if (t) t.carryOver = carryOverMap[name];
  });

  if (targets.length === 0) { alert('対象者がいません'); return; }

  const grouped = {};
  targets.forEach(t => {
    if (!grouped[t.office]) grouped[t.office] = [];
    grouped[t.office].push(t);
  });

  const physicalOffices = [];
  const digitalOffices = [];
  Object.keys(grouped).sort((a,b) => grouped[b].length - grouped[a].length).forEach(office => {
    const c = contactMap[office] || {};
    const soufuW = resolveSoufu(c.method || '');
    const m = soufuW.docMethod;  // ケアプー→持参(印刷グループへ)
    const entry = { office, method: soufuW.isCarePlan ? (m + '（📡ケアプー）') : (c.method || '未設定'), contact: c, users: grouped[office] };
    if (m === '持参' || m === '郵送') physicalOffices.push(entry);
    else digitalOffices.push(entry);
  });

  const renderUsers = function(users, physical) {
    return users.map(function(u, i) {
      const care = u.care === 'shien' ? '要支援' : '要介護';
      const newPlanTag = u.hasNewPlan ? '<span class="badge">🔴個別計画書作成月</span>' : '';
      const carryTag = u.carryOver && u.carryOver.length ? '<span class="badge" style="background:#fef3c7;color:#92400e;">📅前月繰越あり</span>' : '';
      const fin = canFinalizeJisseki(u.days || '', ym, u.ampm || '');
      let finTag = '';
      if (fin.last) {
        finTag = fin.ok
          ? '<span class="badge" style="background:#c6f6d5;color:#22543d;font-weight:700;">✅実績OK</span>'
          : '<span class="badge" style="background:#e2e8f0;color:#4a5568;">📅最終' + fin.last.day + '日</span>';
      }
      const docs = [];

      // 今月分の書類（通常対象の場合のみ）
      const isThisMonthTarget = u.care === 'shien' || u.hasNewPlan;
      if (isThisMonthTarget) {
        docs.push('<span class="doc-chip">🔴実績 ' + (physical ? '印刷' : 'PDF') + '</span>');
        if (u.care === 'shien') {
          docs.push('<span class="doc-chip">通所モニ ' + (physical ? '印刷' : 'PDF') + '</span>');
        }
        if (u.hasNewPlan) {
          docs.push('<span class="doc-chip">個別訓練計画書 印刷→サイン' + (physical ? '' : '→スキャンPDF') + '</span>');
        }
        if (u.care === 'shien') {
          docs.push('<span class="doc-chip">第一号評価 印刷→サイン' + (physical ? '' : '→スキャンPDF') + '</span>');
        }
        docs.push('<span class="doc-chip">体測 ' + (physical ? '印刷' : 'PDF') + '</span>');
      }

      // 🔴 繰越分の書類
      if (u.carryOver && u.carryOver.length > 0) {
        u.carryOver.forEach(function(co) {
          const label = KEY_LABELS[co.key] || co.key;
          docs.push('<span class="doc-chip" style="background:#fef3c7;color:#92400e;border:1px solid #f59e0b;">📅 ' + label + '（' + monthShort(co.originYm) + '分・繰越）</span>');
        });
      }

      if (docs.length === 0) return '';

      return '<div class="user-print">' + (i + 1) + '. <strong>' + escapeHtml(u.name) + '様</strong>（' + care + '）' + finTag + newPlanTag + carryTag + '<div class="docs">' + docs.join('') + '</div></div>';
    }).join('');
  };

  let html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ケアマネ送付作業一覧 ' + ym + '</title>';
  html += '<style>';
  html += 'body{font-family:Meiryo,"Yu Gothic",sans-serif;font-size:14px;margin:20px;color:#1a202c;}';
  html += 'h1{font-size:1.6rem;border-bottom:3px solid #2c7a7b;padding-bottom:8px;margin-bottom:8px;}';
  html += 'h2{font-size:1.25rem;color:#fff;background:#2c7a7b;margin-top:24px;padding:8px 14px;border-radius:4px;}';
  html += 'h3{font-size:1.1rem;background:#edf2f7;padding:8px 12px;border-left:5px solid #2c7a7b;margin-top:18px;}';
  html += '.method{color:#c53030;font-weight:bold;}';
  html += '.email-fax{font-size:0.85rem;color:#718096;font-weight:normal;margin-left:8px;}';
  html += '.user-print{margin:8px 0 8px 20px;padding:6px 0;border-bottom:1px dotted #cbd5e0;}';
  html += '.badge{background:#fed7d7;color:#c53030;padding:1px 8px;border-radius:10px;font-size:0.75rem;margin-left:6px;}';
  html += '.doc-chip{display:inline-block;padding:3px 10px;background:#e2e8f0;border-radius:12px;font-size:0.78rem;margin:3px 4px 3px 0;}';
  html += '.docs{margin-top:4px;}';
  html += '.office-block{margin-bottom:14px;}';
  html += '.office-block h3{page-break-after:avoid;}';
  html += '.user-print{page-break-inside:avoid;}';
  html += '.summary{background:#fff9e6;padding:10px 14px;border-left:4px solid #f6ad55;margin-bottom:20px;border-radius:4px;}';
  html += '@page{size:A4;margin:10mm 8mm 12mm 8mm;@bottom-right{content:counter(page) " / " counter(pages);font-size:10px;color:#718096;}}';
  html += '@media print{body{margin:0;font-size:13px;} h1{font-size:1.4rem;margin-bottom:6px;} h2{font-size:1.1rem;margin-top:14px;padding:6px 10px;} h3{font-size:1rem;margin-top:10px;padding:6px 10px;} .user-print{margin:4px 0 4px 16px;padding:4px 0;} .doc-chip{padding:2px 8px;font-size:0.78rem;margin:2px 3px 2px 0;} .summary{padding:8px 10px;margin-bottom:12px;}}';
  html += '</style></head><body>';
  html += '<h1>🔴 ' + ym + ' ケアマネ送付 作業一覧</h1>';
  html += '<div class="summary">';
  html += '対象者 <strong>' + targets.length + '名</strong> / ' + Object.keys(grouped).length + '事業所<br>';
  html += '印刷グループ（紙持参/郵送）: <strong>' + physicalOffices.length + '事業所 ' + physicalOffices.reduce((s,p) => s+p.users.length, 0) + '名</strong> / ';
  html += 'PDF化グループ（メール/FAX）: <strong>' + digitalOffices.length + '事業所 ' + digitalOffices.reduce((s,d) => s+d.users.length, 0) + '名</strong>';
  html += '</div>';

  if (physicalOffices.length > 0) {
    html += '<h2>📄 印刷グループ（紙で渡す/送る）</h2>';
    physicalOffices.forEach(function(p) {
      html += '<div class="office-block">';
      html += '<h3>【' + escapeHtml(p.office) + '】 <span class="method">' + escapeHtml(p.method) + '</span>（' + p.users.length + '名）</h3>';
      html += renderUsers(p.users, true);
      html += '</div>';
    });
  }

  if (digitalOffices.length > 0) {
    html += '<h2>💾 PDF化グループ（メール/FAX送信）</h2>';
    digitalOffices.forEach(function(d) {
      const contactInfo = [d.contact.email, d.contact.fax].filter(function(x){return x;}).join(' / ');
      html += '<div class="office-block">';
      html += '<h3>【' + escapeHtml(d.office) + '】 <span class="method">' + escapeHtml(d.method) + '</span>';
      if (contactInfo) html += '<span class="email-fax">' + escapeHtml(contactInfo) + '</span>';
      html += '（' + d.users.length + '名）</h3>';
      html += renderUsers(d.users, false);
      html += '</div>';
    });
  }

  html += '<scr' + 'ipt>window.addEventListener("load", function() { setTimeout(function() { window.print(); }, 300); });</scr' + 'ipt>';
  html += '</body></html>';

  const w = window.open('', '_blank');
  if (!w) { alert('ポップアップがブロックされました。ブラウザ設定で許可してください。'); return; }
  w.document.open();
  w.document.write(html);
  w.document.close();
};

// CSV出力
document.getElementById('exportBtn').onclick = function() {
  const ym = document.getElementById('monthSel').value;
  const progress = loadProgress()[ym] || {};
  const { targets, contactMap } = buildTargets(ym);
  const headers = ['事業所','利用者','区分','新計画書','進捗項目','状態'];
  const rows = [headers.join(',')];
  targets.forEach(t => {
    const method = resolveSoufu((contactMap[t.office] || {}).method || '').docMethod;
    const items = getCheckItems(t.care, t.hasNewPlan, method, t.isMeasure, t.needsTsushoPlan, t.needsOralPlan, t.needsHyouka, t.monitoringSignRequired);
    items.forEach(it => {
      const userProg = progress[t.name] || {};
      let state;
      if (it.key === 'hyouka') {
        // 個訓評価はGAS側データから状態取得（PDF/印刷別）
        const pdfState = t.hyoukaPdfSent ? '📄PDF済' : '📄PDF未';
        const printState = t.hyoukaPrintSent ? '🖨印刷済' : '🖨印刷未';
        state = pdfState + ' / ' + printState;
      } else {
        const isDone = userProg[it.key] === true;
        const hasNext = userProg[it.key + '_next'] === true;
        state = isDone ? '✅済' : '☐未';
        if (hasNext) state += ' 📅来月送付';
      }
      rows.push([t.office, t.name, t.care==='shien'?'要支援':'要介護', t.hasNewPlan?'有':'無', it.label, state].map(s => '"' + String(s).replace(/"/g,'""') + '"').join(','));
    });
  });
  const blob = new Blob(['﻿' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ケアマネ送付進捗_' + ym + '.csv';
  a.click();
};

// YYYY-MM-DD 形式に整形
function muFormatDate(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

// JSONP で monthly_usage を取得
function muFetchMonthly(name, ym, callback) {
  var cbName = 'muCb_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
  window[cbName] = function(data) {
    delete window[cbName];
    var s = document.getElementById(cbName);
    if (s && s.parentNode) s.parentNode.removeChild(s);
    callback(data);
  };
  var script = document.createElement('script');
  script.id = cbName;
  script.src = YAWARAGI_BOARD_API +
               '?action=monthly_usage' +
               '&name=' + encodeURIComponent(name) +
               '&yearMonth=' + encodeURIComponent(ym) +
               '&callback=' + cbName +
               '&t=' + Date.now();
  document.body.appendChild(script);
}

// 連続欠席日数（基準日から逆順走査・来館で停止・0なら null）
function muCalcConsecutiveAbsence(data) {
  var ym = data.yearMonth;
  var todayStr = muFormatDate(new Date());
  var basisStr;
  if (todayStr.indexOf(ym) === 0) {
    basisStr = todayStr;
  } else {
    var parts = ym.split('-');
    var y = parseInt(parts[0], 10);
    var m = parseInt(parts[1], 10);
    var dt = new Date(y, m, 0);
    basisStr = dt.getFullYear() + '-' + ('0' + (dt.getMonth() + 1)).slice(-2) + '-' + ('0' + dt.getDate()).slice(-2);
  }
  var dayByDate = {};
  (data.days || []).forEach(function(d) { dayByDate[d.date] = d; });
  var dates = Object.keys(dayByDate)
    .filter(function(date) { return date <= basisStr; })
    .sort()
    .reverse();
  var count = 0;
  for (var i = 0; i < dates.length; i++) {
    var info = dayByDate[dates[i]];
    if (info.attended) break;
    if (info.absent) count++;
    else break;
  }
  return count > 0 ? count : null;
}

// 直近来館日（基準日以前で最後に attended=true）
function muCalcLastVisit(data) {
  var ym = data.yearMonth;
  var todayStr = muFormatDate(new Date());
  var basisStr;
  if (todayStr.indexOf(ym) === 0) {
    basisStr = todayStr;
  } else {
    var parts = ym.split('-');
    var y = parseInt(parts[0], 10);
    var m = parseInt(parts[1], 10);
    var dt = new Date(y, m, 0);
    basisStr = dt.getFullYear() + '-' + ('0' + (dt.getMonth() + 1)).slice(-2) + '-' + ('0' + dt.getDate()).slice(-2);
  }
  var visited = (data.days || [])
    .filter(function(d) { return d.attended && d.date <= basisStr; })
    .map(function(d) { return d.date; })
    .sort();
  return visited.length ? visited[visited.length - 1] : null;
}

// 利用率（来館 ÷ 予定 × 100）
function muCalcUtilization(data) {
  var s = data.summary || {};
  if (!s.scheduledTotal) return null;
  return Math.round((s.attended || 0) / s.scheduledTotal * 100);
}

// モーダルを開く（外部から呼び出すエントリーポイント）
function attShowMonthlyUsage(name) {

function muCloseModal() {
  var modal = document.getElementById('mu-modal');

// 月タブ描画（3ヶ月：前々月・前月・今月）
function muRenderMonthTabs(name, selectedYm) {
  var box = document.getElementById('mu-month-tabs');
  var today = new Date();
  var tabs = [];
  for (var i = 2; i >= 0; i--) {
    var d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    var ym = d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2);
    var label = (d.getMonth() + 1) + '月';
    tabs.push({ ym: ym, label: label });
  }
  box.innerHTML = tabs.map(function(t) {
    var active = (t.ym === selectedYm) ? ' active' : '';
    var nameEsc = name.replace(/'/g, "\\'");
    return '<button type="button" class="mu-month-tab' + active + '" ' +
           'onclick="muLoadMonth(\'' + nameEsc + '\',\'' + t.ym + '\');muRenderMonthTabs(\'' + nameEsc + '\',\'' + t.ym + '\')">' +
           t.label + '</button>';
  }).join('');
}

// 月切替時：データ取得＋サマリー＋カレンダー描画
function muLoadMonth(name, ym) {
  document.getElementById('mu-summary').innerHTML = '<div style="color:#718096;">読込中…</div>';
  document.getElementById('mu-calendar').innerHTML = '';
  muFetchMonthly(name, ym, function(data) {
    if (!data || !data.success) {
      document.getElementById('mu-summary').innerHTML =
        '<div style="color:#c53030;">' + (data && data.error ? data.error : 'データ取得に失敗しました。もう一度開いてください。') + '</div>';
      return;
    }
    muRenderSummary(data);
    muRenderCalendar(data);
  });
}

// サマリー＋ミニ情報バッジ描画
function muRenderSummary(data) {
  var s = data.summary || {};
  var ym = data.yearMonth || '';
  var monthLabel = ym ? (parseInt(ym.split('-')[1], 10) + '月') : '';
  var main = monthLabel + '：利用 ' + (s.attended || 0) + '回 / 欠席 ' + (s.absent || 0) + '回 / 送迎なし ' + (s.noPickup || 0) + '回';

  var badges = '';
  var consec = muCalcConsecutiveAbsence(data);
  if (consec) badges += '<span class="mu-badge danger">🔴 連続欠席' + consec + '日</span>';
  var lastVisit = muCalcLastVisit(data);
  if (lastVisit) {
    var lvParts = lastVisit.split('-');
    badges += '<span class="mu-badge info">📅 直近来館 ' + parseInt(lvParts[1], 10) + '/' + parseInt(lvParts[2], 10) + '</span>';
  }
  var util = muCalcUtilization(data);
  if (util !== null) badges += '<span class="mu-badge success">📈 利用率 ' + util + '%</span>';

  document.getElementById('mu-summary').innerHTML =
    '<div class="mu-summary-main">' + main + '</div>' +
    '<div class="mu-badges">' + badges + '</div>';
}

// カレンダー描画
function muRenderCalendar(data) {
  var ym = data.yearMonth;
  var parts = ym.split('-');
  var y = parseInt(parts[0], 10);
  var m = parseInt(parts[1], 10);
  var firstDow = new Date(y, m - 1, 1).getDay();
  var lastDay = new Date(y, m, 0).getDate();

  var dayByDate = {};
  (data.days || []).forEach(function(d) { dayByDate[d.date] = d; });

  var todayStr = muFormatDate(new Date());
  var html = '<div class="mu-cal-grid">';
  ['日','月','火','水','木','金','土'].forEach(function(label, i) {
    var color = i === 0 ? 'color:#e53e3e;' : (i === 6 ? 'color:#3182ce;' : '');
    html += '<div class="mu-cal-head" style="' + color + '">' + label + '</div>';
  });
  for (var i = 0; i < firstDow; i++) html += '<div class="mu-cal-cell empty"></div>';
  for (var d = 1; d <= lastDay; d++) {
    var dateStr = y + '-' + ('0' + m).slice(-2) + '-' + ('0' + d).slice(-2);
    var info = dayByDate[dateStr];
    var cls = 'mu-cal-cell';
    if (info) {
      if (info.attended) cls += ' attended';
      if (info.absent) cls += ' absent';
      if (!info.attended && !info.absent) cls += ' scheduled';
      if (info.noPickup) cls += ' nopickup';
    }
    if (dateStr === todayStr) cls += ' today';
    html += '<div class="' + cls + '"><span>' + d + '</span></div>';
  }
  html += '</div>';
  document.getElementById('mu-calendar').innerHTML = html;
}

// モーダル初期化：背景クリック・ESCで閉じる
document.addEventListener('DOMContentLoaded', function() {
  var modal = document.getElementById('mu-modal');
  if (modal) {
    modal.addEventListener('click', function(e) {
      if (e.target === modal) muCloseModal();
    });
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      var m = document.getElementById('mu-modal');
      if (m && m.style.display !== 'none') muCloseModal();
    }
  });
});
