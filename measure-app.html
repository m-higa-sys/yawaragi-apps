<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>📐 身体機能評価(体力測定)</title>
<!-- 期限計算(sokuteiCycleMonths_/sokuteiDueDate_)・測定統合(mergeSokuteiRecords)は shared.js §I、
     ①判定純関数(ms*)は measure-core.js、優先順ソート(sbSokuteiSort_等)は session-board-core.js を流用。
     no-store方式のため ?v= は付けない（版ゲート非対象）。純関数のみ・副作用なし。 -->
<script src="shared.js"></script>
<script src="gas/yawaragi-board/session-board-core.js"></script>
<script src="measure-core.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif; background: #eef2f6; color: #263238; min-height: 100vh; padding: 14px 12px 40px; -webkit-text-size-adjust: 100%; }
.wrap { max-width: 820px; margin: 0 auto; }
h1 { text-align: center; color: #2c3e50; font-size: 1.35em; margin-bottom: 2px; }
.subtitle { text-align: center; color: #78909c; font-size: .8em; margin-bottom: 12px; }
.status { text-align: center; color: #78909c; font-size: .85em; min-height: 18px; margin-bottom: 8px; }
/* ① 日付ナビ */
.datenav { display: flex; align-items: center; gap: 8px; margin: 0 2px 10px; }
.dnav { border: none; background: #fff; color: #2c3e50; font-size: 1.2em; font-weight: 800; width: 48px; height: 48px; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); cursor: pointer; }
.dpick { flex: 1; padding: 12px; font-size: 1em; border: 1.5px solid #cfd8dc; border-radius: 12px; font-family: inherit; min-height: 48px; text-align: center; background: #fff; }
.dtoday { border: none; background: #2c3e50; color: #fff; font-weight: 700; padding: 0 14px; height: 48px; border-radius: 12px; cursor: pointer; font-family: inherit; font-size: .9em; }
.dstate { display: none; align-items: center; gap: 8px; margin: 0 2px 12px; padding: 10px 12px; border-radius: 10px; font-size: .86em; font-weight: 800; }
.dstate.on { display: flex; }
.dstate.past { background: #fdf1df; border: 1.5px solid #f0a83a; color: #e08a1e; }
.dstate.future { background: #fdecea; border: 1.5px solid #ef9a9a; color: #c62828; }
/* ② 午前午後2カラム（横向き/広幅で並列・狭幅で縦積み） */
.cols { display: flex; gap: 10px; align-items: flex-start; }
.col { flex: 1; min-width: 0; }
.colhead { font-size: .82em; font-weight: 800; padding: 7px 10px; border-radius: 10px; margin-bottom: 6px; text-align: center; }
.colhead.am { background: #e3f2fd; color: #1565c0; }
.colhead.pm { background: #fff3e0; color: #e65100; }
@media (max-width: 620px) { .cols { flex-direction: column; } }
.errbar { background: #fff3e0; border: 1px solid #ffcc80; color: #e65100; border-radius: 8px; padding: 8px 10px; font-size: .8em; margin-bottom: 10px; display: none; }
.tabs { display: flex; gap: 8px; margin-bottom: 12px; position: sticky; top: 0; z-index: 5; padding: 4px 0; background: #eef2f6; }
.tab-btn { flex: 1; padding: 14px 6px; border: none; border-radius: 12px; background: #fff; color: #546e7a; font-weight: 700; font-size: .95em; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.08); font-family: inherit; min-height: 48px; }
.tab-btn.active { background: #2c3e50; color: #fff; }
.tab-btn .cnt { display: inline-block; min-width: 20px; margin-left: 4px; font-size: .82em; opacity: .85; }
.grp { font-size: .78em; font-weight: 700; color: #90a4ae; margin: 12px 2px 4px; }
.card { background: #fff; border-radius: 14px; padding: 13px 14px; margin-bottom: 9px; border-left: 7px solid #b0bec5; box-shadow: 0 1px 4px rgba(0,0,0,.09); cursor: pointer; transition: opacity .25s, transform .05s; }
.card:active { transform: scale(.995); }
.card.b-red { border-left-color: #ef5350; }
.card.b-yellow { border-left-color: #ffa726; }
/* ③スライド組（先月から持ち越し）の控えめバッジ。急かさない＝赤・警告色は使わない（2026-07-18 方針） */
.carry { display: inline-block; background: #eceff1; color: #78909c; font-size: .72em; font-weight: 700; padding: 2px 7px; border-radius: 999px; margin-left: 6px; white-space: nowrap; }
/* v3① スタッフ選択シート（2タップ記録）: タブレットのタッチ前提で大きめの格子 */
.sheet-head { font-size: 1.05em; font-weight: 800; color: #2c3e50; margin-bottom: 2px; }
.sheet-sub { font-size: .85em; color: #78909c; margin-bottom: 14px; }
.sgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
@media (max-width: 420px) { .sgrid { grid-template-columns: repeat(2, 1fr); } }
.sbtn { min-height: 64px; border: 1.5px solid #cfd8dc; border-radius: 14px; background: #fff; color: #2c3e50; font-size: 1.05em; font-weight: 700; font-family: inherit; cursor: pointer; padding: 8px 4px; }
.sbtn:active { background: #e3f2fd; }
.sbtn.recent { border-color: #90caf9; background: #f3f9ff; }
.sheet-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
.linkbtn { background: none; border: none; color: #1565c0; font-size: .9em; font-weight: 700; font-family: inherit; cursor: pointer; padding: 10px 4px; text-decoration: underline; }
/* v3① 取り消しバー（誤タップの保険・直前の1件のみ） */
.undobar { position: fixed; left: 50%; transform: translateX(-50%); bottom: calc(16px + env(safe-area-inset-bottom)); background: #2c3e50; color: #fff; border-radius: 12px; padding: 12px 14px; display: none; align-items: center; gap: 14px; z-index: 60; box-shadow: 0 4px 16px rgba(0,0,0,.3); font-size: .9em; max-width: 92vw; }
.undobar.show { display: flex; }
.undobar button { background: #fff; color: #2c3e50; border: none; border-radius: 8px; font-weight: 800; font-family: inherit; padding: 8px 14px; min-height: 40px; cursor: pointer; }
/* v3② 測定済み一覧 */
.lctl { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.lctl input, .lctl select { flex: 1; min-width: 120px; padding: 11px; font-size: .95em; border: 1.5px solid #cfd8dc; border-radius: 10px; font-family: inherit; min-height: 44px; background: #fff; }
.tally { background: #fff; border-radius: 10px; padding: 10px 12px; margin-bottom: 10px; font-size: .85em; color: #546e7a; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.tally b { color: #2c3e50; }
.tally .tsep { color: #cfd8dc; margin: 0 6px; }
.hrow { background: #fff; border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; box-shadow: 0 1px 3px rgba(0,0,0,.06); display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.hrow .hd { font-weight: 800; color: #2c3e50; font-size: .9em; }
.hrow .hn { font-weight: 700; flex: 1; }
.hrow .hb { color: #546e7a; font-size: .85em; }
.hrow .hc { color: #90a4ae; font-size: .78em; }
.card.sunk { opacity: .42; cursor: default; }
.rowline { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
.bdg { font-size: 1.2em; }
.nm { font-weight: 700; color: #2c3e50; font-size: 1.12em; }
.cr { font-size: .74em; color: #607d8b; background: #eceff1; border-radius: 6px; padding: 2px 8px; white-space: nowrap; }
.pill { font-size: .74em; border-radius: 6px; padding: 2px 8px; white-space: nowrap; font-weight: 700; }
.pill.am { background: #e3f2fd; color: #1565c0; }
.pill.pm { background: #fff3e0; color: #e65100; }
.pill.absent { background: #f5f5f5; color: #9e9e9e; }
.meta { font-size: .84em; color: #607d8b; line-height: 1.7; margin-top: 5px; }
.over { color: #c62828; font-weight: 700; }
.done-tag { font-size: .78em; color: #2e7d32; font-weight: 700; }
.empty { text-align: center; color: #b0bec5; padding: 30px 10px; font-size: .9em; }
/* ダイアログ */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: flex-end; justify-content: center; z-index: 50; }
.overlay.show { display: flex; }
.dialog { background: #fff; width: 100%; max-width: 520px; border-radius: 18px 18px 0 0; padding: 18px 18px calc(20px + env(safe-area-inset-bottom)); box-shadow: 0 -4px 20px rgba(0,0,0,.2); }
@media (min-width: 560px) { .overlay { align-items: center; } .dialog { border-radius: 18px; } }
.dialog h3 { font-size: 1.1em; color: #2c3e50; margin-bottom: 2px; }
.dialog .dsub { font-size: .8em; color: #78909c; margin-bottom: 14px; }
.field { margin-bottom: 13px; }
.field label { display: block; font-size: .82em; color: #546e7a; font-weight: 700; margin-bottom: 5px; }
.field input, .field select { width: 100%; padding: 13px 12px; font-size: 1em; border: 1.5px solid #cfd8dc; border-radius: 10px; font-family: inherit; background: #fff; min-height: 48px; }
.field input:focus, .field select:focus { outline: none; border-color: #42a5f5; }
.dbtns { display: flex; gap: 10px; margin-top: 6px; }
.dbtn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 700; font-size: 1em; font-family: inherit; cursor: pointer; min-height: 52px; }
.dbtn.cancel { background: #eceff1; color: #546e7a; }
.dbtn.ok { background: #2e7d32; color: #fff; }
.dbtn.ok:disabled { background: #a5d6a7; cursor: default; }
.hint { font-size: .76em; color: #90a4ae; margin-top: 8px; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📐 身体機能評価(体力測定)</h1>
  <div class="subtitle">機能訓練の測定（測定日・測定者・出力者）／赤=期限超過（早めに）</div>
  <div class="datenav">
    <button class="dnav" id="prevDay" type="button" aria-label="前日">◀</button>
    <input type="date" id="datePick" class="dpick" aria-label="日付を選ぶ">
    <button class="dnav" id="nextDay" type="button" aria-label="翌日">▶</button>
    <button class="dtoday" id="todayBtn" type="button">今日</button>
  </div>
  <div id="dstate" class="dstate"></div>
  <div id="status" class="status">読み込み中…</div>
  <div id="errbar" class="errbar"></div>
  <div class="tabs">
    <button class="tab-btn active" id="tabToday" onclick="switchTab('today')">今日測れる人<span class="cnt" id="cntToday"></span></button>
    <button class="tab-btn" id="tabAll" onclick="switchTab('all')">今月の残り（不在含む）<span class="cnt" id="cntAll"></span></button>
    <button class="tab-btn" id="tabDone" onclick="switchTab('done')">測定済み一覧<span class="cnt" id="cntDone"></span></button>
  </div>
  <div id="list"></div>
</div>

<!-- v3① スタッフ選択シート（名前タップ→ここでスタッフをタップ＝2タップで保存） -->
<div class="overlay" id="sheetOverlay" onclick="if(event.target===this)closeStaffSheet()">
  <div class="dialog">
    <div class="sheet-head" id="shName">—</div>
    <div class="sheet-sub" id="shSub">—</div>
    <div class="sgrid" id="shGrid"></div>
    <div class="sheet-foot">
      <button class="linkbtn" type="button" onclick="openDetailFromSheet()">詳細（過去日・出力者を変える）</button>
      <button class="linkbtn" type="button" onclick="closeStaffSheet()">閉じる</button>
    </div>
  </div>
</div>

<!-- v3① 取り消しバー（直前の1件のみ） -->
<div class="undobar" id="undobar"><span id="undoMsg">保存しました</span><button type="button" onclick="undoLast()">取り消し</button></div>

<!-- 記録ダイアログ -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeDialog()">
  <div class="dialog">
    <h3 id="dlgName">—</h3>
    <div class="dsub" id="dlgSub">—</div>
    <div class="field">
      <label>測定日</label>
      <input type="date" id="fDate">
    </div>
    <div class="field">
      <label>測定者</label>
      <select id="fBy"></select>
    </div>
    <div class="field" id="fOutputWrap">
      <label>出力者（要介護のみ・既定＝測定者）</label>
      <select id="fOutput"></select>
    </div>
    <div class="dbtns">
      <button class="dbtn cancel" onclick="closeDialog()">キャンセル</button>
      <button class="dbtn ok" id="saveBtn" onclick="saveMeasurement()">📐 保存する</button>
    </div>
    <div class="hint" id="dlgHint"></div>
  </div>
</div>

<script>
// ===== 板GAS（morningDigest と同一 exec URL）=====
const GAS = 'https://script.google.com/macros/s/AKfycbwo1UGxsK1qgmO8IDaqT-inDM0Qgoe_MRvxfKDxHy_gXANi4FwNFlgn2pEanMXVQxsdlw/exec';
// 測定者・出力者プルダウンの除外（個訓/sokutei と同値・2026-06-15社長確定）
const MEASURER_EXCLUDE = ['代表', '小野', '林'];

const state = {
  today: '', selectedDate: '', tab: 'today', targets: [], staff: [], usageByKey: {}, sunk: {}, errs: {},
  // v3② 測定済み一覧: measuredAll=履歴全件（paper除外）／listAnchor=表示中の月／listMonths=表示ヶ月数（既定6）
  measuredAll: [], nameByKey: {}, listAnchor: '', listMonths: 6, listQ: '', listBy: '',
  // v3① 直近使った測定者（端末内のみ・localStorage）／undo=直前の1件だけ
  recentStaff: [], undo: null
};
const RECENT_KEY = 'measureRecentStaff';   // 端末内保存。名前だけ＝画面に出ている情報と同じ（持ち出さない）
function loadRecent() { try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]') || []; } catch (e) { return []; } }
function saveRecent(list) { try { localStorage.setItem(RECENT_KEY, JSON.stringify(list)); } catch (e) { /* 保存できなくても機能は動く */ } }
// ③優先順ソートの依存（session-board-core.js の既存関数を注入流用・逐語コピーを増やさない）
const SORT_DEPS = { weeklyVisits: sbCountWeeklyVisits_, remainingVisits: sbCountRemainingVisits_, sokuteiSort: sbSokuteiSort_ };

function pad2(n) { return (n < 10 ? '0' : '') + n; }
function fmtYMD(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
function todayStr() { return fmtYMD(new Date()); }
function fiscalYear() { const n = new Date(); return (n.getMonth() + 1) >= 4 ? n.getFullYear() : n.getFullYear() - 1; }
// 前月から遡って n ヶ月分の 'YYYY-MM'（昇順・当月は含めない＝月途中の予定歪み回避。sokutei と同流儀）
function prevMonthsList(n) {
  const now = new Date(); const arr = [];
  for (let i = n; i >= 1; i--) { const d = new Date(now.getFullYear(), now.getMonth() - i, 1); arr.push(d.getFullYear() + '-' + pad2(d.getMonth() + 1)); }
  return arr;
}
function esc(s) { const d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }
async function fetchJson(url) {
  const res = await fetch(url, { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}
function errMsg(r) { return (r && r.status === 'rejected') ? String(r.reason && r.reason.message || r.reason) : '応答不正'; }

// ===== 取得 → 対象抽出 =====
async function loadAll(dateStr) {
  const st = document.getElementById('status');
  st.textContent = '読み込み中…';
  state.errs = {};
  state.today = todayStr();
  const t = state.selectedDate = (dateStr && /^\d{4}-\d{2}-\d{2}$/.test(dateStr)) ? dateStr : state.today;  // ①選択日（既定=今日）
  state.sunk = {};  // 日付を切り替えたら保存済みマークはリセット（その日視点で見直す）
  updateDateNav();
  const fy = fiscalYear();
  const mk = prevMonthsList(3);
  const R = await Promise.allSettled([
    fetchJson(GAS + '?action=sessionBoard&date=' + t + '&t=' + Date.now()),      // 0: universe(母集団・選択日)
    fetchJson(GAS + '?action=attendance&date=' + t + '&t=' + Date.now()),        // 1: 来所(選択日・名前+session)
    fetchJson(GAS + '?action=getKeikakushoYear&year=' + fy + '&t=' + Date.now()),     // 2: 要介護履歴
    fetchJson(GAS + '?action=getKeikakushoYear&year=' + (fy - 1) + '&t=' + Date.now()), // 3
    fetchJson(GAS + '?action=getKeikakushoYear&year=' + (fy + 1) + '&t=' + Date.now()), // 4
    fetchJson(GAS + '?action=getShienSokutei&t=' + Date.now()),                  // 5: 要支援履歴
    fetchJson(GAS + '?action=staff_list&t=' + Date.now()),                       // 6: スタッフ
    fetchJson(GAS + '?action=usage_stats&from=' + mk[0] + '&to=' + mk[mk.length - 1] + '&t=' + Date.now()) // 7: 出席率(欠席多の優先順)
  ]);

  // universe（決定B・母集団）
  let universe = [];
  if (R[0].status === 'fulfilled' && R[0].value && R[0].value.ok && Array.isArray(R[0].value.universe)) universe = R[0].value.universe;
  else state.errs.universe = errMsg(R[0]);

  // 来所者（出席のみ）→ [{name, session}]
  const attendees = [];
  if (R[1].status === 'fulfilled' && R[1].value && R[1].value.attendance) {
    ['am', 'pm'].forEach(k => (R[1].value.attendance[k] || []).forEach(a => {
      if (a && a.name && a.status !== '欠席') attendees.push({ name: a.name, session: k });
    }));
  } else state.errs.att = errMsg(R[1]);

  // 測定履歴 → mergeSokuteiRecords(includePaper:true) → 前回測定日（期限アンカー・紙seed含む）
  let kaigoRecords = [], shienRecords = [];
  [2, 3, 4].forEach(i => { if (R[i].status === 'fulfilled' && R[i].value && R[i].value.ok) kaigoRecords = kaigoRecords.concat(R[i].value.records || []); });
  if (![2, 3, 4].some(i => R[i].status === 'fulfilled' && R[i].value && R[i].value.ok)) state.errs.kaigo = errMsg(R[2]);
  if (R[5].status === 'fulfilled' && R[5].value && R[5].value.ok) shienRecords = R[5].value.records || [];
  else state.errs.shien = errMsg(R[5]);

  const merged = mergeSokuteiRecords(kaigoRecords, shienRecords, { includePaper: true });
  // v3② 測定済み一覧は「実際に測った記録」だけ＝紙seed(paper)を除外して別に持つ（期限アンカーとは用途が違う）。
  // 取得は fy-1/fy/fy+1 の3年度分なので既定6ヶ月には十分足りる（追加リクエストなし）。
  state.measuredAll = mergeSokuteiRecords(kaigoRecords, shienRecords, { includePaper: false });
  state.nameByKey = {};
  universe.forEach(u => { if (u && u.key) state.nameByKey[u.key] = u.name || u.key; });
  if (!state.listAnchor) state.listAnchor = t;   // 一覧の基準月（◀▶で動かす・日付ナビとは独立）
  const prevMeasuredByKey = {};
  merged.forEach(r => {
    if (!r.sokutei_date) return;
    if (!prevMeasuredByKey[r.key] || r.sokutei_date > prevMeasuredByKey[r.key]) prevMeasuredByKey[r.key] = r.sokutei_date;
  });

  // スタッフ
  if (R[6].status === 'fulfilled' && R[6].value && Array.isArray(R[6].value.staff)) state.staff = R[6].value.staff.filter(s => MEASURER_EXCLUDE.indexOf(s) < 0);
  else { state.staff = []; state.errs.staff = errMsg(R[6]); }

  // 出席率U（欠席多の優先順用）= Σ(予定−欠席)/Σ予定（当月除く3ヶ月・sokutei と同式）。無ければU=1（ペナルティなし）
  state.usageByKey = {};
  if (R[7].status === 'fulfilled' && R[7].value && R[7].value.usageStats) {
    (R[7].value.usageStats.users || []).forEach(u => {
      let s = 0, a = 0;
      if (u.monthly) mk.forEach(m => { const mo = u.monthly[m]; if (mo) { const sch = Number(mo.scheduled) || 0; if (sch > 0) { s += sch; a += sch - (Number(mo.absences) || 0); } } });
      state.usageByKey[u.name] = s > 0 ? a / s : 1.0;
    });
  } else state.errs.usage = errMsg(R[7]);

  // 対象抽出（Phase1純関数・期限は shared.js の sokuteiDueDate_ を注入・today＝選択日）
  const targets = msBuildMeasurementTargets(universe, prevMeasuredByKey, attendees, t, sokuteiDueDate_);
  // ③優先順ソート（sbSokuteiSort_ 流用・overdue最上部・要介護上・残チャンス少い順）
  state.targets = msPrioritySort(targets, state.usageByKey, t, SORT_DEPS);

  st.textContent = '';
  renderErrs();
  render();
}

// ① 日付ナビ表示更新（ピッカー値・今日以外の警告バナー）
function updateDateNav() {
  document.getElementById('datePick').value = state.selectedDate;
  const w = msDateWarning(state.selectedDate, state.today);
  const el = document.getElementById('dstate');
  el.className = 'dstate' + (w.show ? ' on ' + w.kind : '');
  el.textContent = w.label;
}
function goDate(d) { if (/^\d{4}-\d{2}-\d{2}$/.test(d)) loadAll(d); }

function renderErrs() {
  const keys = Object.keys(state.errs);
  const bar = document.getElementById('errbar');
  if (!keys.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  bar.innerHTML = '⚠️ 一部データ取得に失敗: ' + keys.map(k => esc(k)).join('、') + '（表示が欠ける場合あり）';
}

// ===== 描画 =====
function switchTab(tab) {
  state.tab = tab;
  document.getElementById('tabToday').classList.toggle('active', tab === 'today');
  document.getElementById('tabAll').classList.toggle('active', tab === 'all');
  document.getElementById('tabDone').classList.toggle('active', tab === 'done');
  render();
}

// v3② 表示中の一覧行（期間→絞り込み）。集計もタブ件数もこれに追随させる＝表示と数字がずれない。
function measuredRows() {
  const range = msMonthsBack(state.listAnchor || state.selectedDate || todayStr(), state.listMonths);
  const base = msBuildMeasuredList(state.measuredAll, state.nameByKey, range);
  return { range: range, rows: msFilterMeasured(base, { q: state.listQ, by: state.listBy }) };
}

function render() {
  const all = state.targets;
  const today = all.filter(r => r.attendingToday);
  document.getElementById('cntToday').textContent = today.length ? '(' + today.length + ')' : '';
  // ③人数に内訳を添える（例: (75・うち先月から12)）。0名なら内訳は出さない
  const carryN = msCountCarryOver(all);
  document.getElementById('cntAll').textContent = all.length
    ? '(' + all.length + (carryN ? '・うち先月から' + carryN : '') + ')' : '';
  const listEl = document.getElementById('list');
  const mr = measuredRows();
  document.getElementById('cntDone').textContent = mr.rows.length ? '(' + mr.rows.length + ')' : '';

  if (state.tab === 'done') { listEl.innerHTML = doneHtml(mr); return; }

  if (state.tab === 'today') {
    // ② 午前/午後の2カラム（横向き/広幅で並列・狭幅で縦積み・各列人数付き）
    const sp = msSplitBySession(all);
    if (!sp.amCount && !sp.pmCount) { listEl.innerHTML = '<div class="empty">今日測る対象はいません（お疲れさまです）</div>'; return; }
    listEl.innerHTML = '<div class="cols">' + colHtml('am', '午前', sp.am) + colHtml('pm', '午後', sp.pm) + '</div>';
    return;
  }
  // 「今月の残り」タブ: 単一リスト（優先順のみ）。
  // ③スライド組を先頭に集める見出し区切り（🔴期限超過/🟡今月が期限）は廃止＝並びに混ぜて急かさない。
  if (!all.length) { listEl.innerHTML = '<div class="empty">今月の測定対象はありません</div>'; return; }
  let html = '';
  all.forEach(r => { html += cardHtml(r); });
  listEl.innerHTML = html;
}

// v3② 測定済み一覧: 期間ナビ＋名前検索＋測定者絞り＋測定者別件数（偏りの可視化）＋履歴行
function doneHtml(mr) {
  const from = mr.range.from.slice(0, 7).replace('-', '/'), to = mr.range.to.slice(0, 7).replace('-', '/');
  const byOpts = ['<option value="">測定者すべて</option>']
    .concat(msCountByMeasurer(msBuildMeasuredList(state.measuredAll, state.nameByKey, mr.range))
      .map(c => '<option value="' + esc(c.name) + '"' + (state.listBy === c.name ? ' selected' : '') + '>' + esc(c.name) + '</option>')).join('');
  let h = '<div class="datenav">' +
    '<button class="dnav" type="button" onclick="moveListMonth(-1)" aria-label="前の月へ">◀</button>' +
    '<div class="dpick" style="line-height:24px">' + from + '〜' + to + '（' + state.listMonths + 'ヶ月）</div>' +
    '<button class="dnav" type="button" onclick="moveListMonth(1)" aria-label="次の月へ">▶</button>' +
    '<button class="dtoday" type="button" onclick="expandListMonths()">もっと見る</button>' +
    '</div>';
  h += '<div class="lctl">' +
    '<input id="lq" type="search" placeholder="名前で探す（この人の前回いつ？）" value="' + esc(state.listQ) + '" oninput="onListQ(this.value)">' +
    '<select id="lby" onchange="onListBy(this.value)">' + byOpts + '</select></div>';
  // 測定者別の件数＝表示中の範囲・絞り込みに追随（「直近使った人が左上」で偏る分を数字で見えるように）
  const tally = msCountByMeasurer(mr.rows);
  h += '<div class="tally">測定者別　' + (tally.length
    ? tally.map(c => '<b>' + esc(c.name) + '</b> ' + c.count).join('<span class="tsep">/</span>')
    : '（該当なし）') + '</div>';
  if (!mr.rows.length) return h + '<div class="empty">該当する測定記録はありません</div>';
  mr.rows.forEach(r => {
    h += '<div class="hrow"><span class="hd">' + esc(r.date.slice(5).replace('-', '/')) + '</span>' +
      '<span class="hn">' + esc(r.name) + '</span>' +
      '<span class="hb">' + (r.by ? esc(r.by) : '<span class="hc">測定者未記入</span>') + '</span>' +
      '<span class="hc">' + esc(r.care) + '</span></div>';
  });
  return h;
}
function onListQ(v) { state.listQ = v; render(); document.getElementById('lq').focus(); }
function onListBy(v) { state.listBy = v; render(); }
function moveListMonth(n) {
  const d = new Date(state.listAnchor.slice(0, 4), Number(state.listAnchor.slice(5, 7)) - 1 + n, 1);
  state.listAnchor = d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-01';
  render();
}
function expandListMonths() { state.listMonths += 6; render(); }   // 「もっと見る」＝過去へ6ヶ月ずつ広げる

function colHtml(cls, label, rows) {
  let inner = '<div class="colhead ' + cls + '">' + label + '　' + rows.length + '名</div>';
  if (!rows.length) inner += '<div class="empty" style="padding:16px 6px">なし</div>';
  else rows.forEach(r => { inner += cardHtml(r); });
  return '<div class="col">' + inner + '</div>';
}

function cardHtml(r) {
  const sunk = !!state.sunk[r.key];
  // ③スライド組でも見た目は同じ（赤にしない）。区別は控えめな「先月から」バッジのみ（2026-07-18 方針）
  const bcls = sunk ? 'sunk' : 'b-yellow';
  const bdg = sunk ? '✅' : '🟡';
  const carry = (!sunk && r.status === 'overdue') ? '<span class="carry">先月から</span>' : '';
  let pill;
  if (r.attendingToday) pill = '<span class="pill ' + r.session + '">' + (r.session === 'am' ? '午前来所' : '午後来所') + '</span>';
  else pill = '<span class="pill absent">今日は不在</span>';
  const prev = r.前回測定日 ? '前回 ' + esc(r.前回測定日) : '<span class="over">前回なし（要測定）</span>';
  const due = '次回期限 ' + esc(r.次回期限);   // ③「（超過）」の赤字は出さない＝急かさない
  const doneTag = sunk ? '<span class="done-tag">✅ 保存済み</span>' : '';
  // v3① 既定の動線はスタッフ選択シート（2タップ）。過去日・出力者変更はシート内の「詳細」から既存ダイアログへ。
  return '<div class="card ' + bcls + '" ' + (sunk ? '' : 'onclick="openStaffSheet(\'' + encodeURIComponent(r.key) + '\')"') + '>' +
    '<div class="rowline"><span class="bdg">' + bdg + '</span>' +
    '<span class="nm">' + esc(r.name) + '</span>' +
    '<span class="cr">' + esc(r.care) + '</span>' + carry + pill + ' ' + doneTag + '</div>' +
    '<div class="meta">' + prev + '　/　' + due + '</div></div>';
}

// ===== v3① スタッフ選択シート（名前タップ→スタッフタップの2タップで保存）=====
// 測定日＝選択中の日付（入力させない）／測定者＝タップした人／出力者＝測定者と同じ（画面に出さない）。
// 押す直前の二重確認は見出しの「氏名 ／ 日付」で行う（確認ダイアログを挟まない＝2タップを守る）。
let sheetTarget = null;
function openStaffSheet(encKey) {
  const key = decodeURIComponent(encKey);
  const r = state.targets.find(x => x.key === key);
  if (!r || state.sunk[key]) return;
  sheetTarget = r;
  document.getElementById('shName').textContent = r.name;
  document.getElementById('shSub').textContent = fmtJP(state.selectedDate) + ' に測定　/　' + r.care;
  const order = msStaffOrder(state.staff, state.recentStaff);
  document.getElementById('shGrid').innerHTML = order.length
    ? order.map(s => '<button type="button" class="sbtn' + (state.recentStaff.indexOf(s) >= 0 ? ' recent' : '') +
      '" onclick="pickStaff(\'' + encodeURIComponent(s) + '\')">' + esc(s) + '</button>').join('')
    : '<div class="empty">スタッフ一覧を取得できませんでした</div>';
  document.getElementById('sheetOverlay').classList.add('show');
}
function closeStaffSheet() { document.getElementById('sheetOverlay').classList.remove('show'); sheetTarget = null; }
function openDetailFromSheet() {
  const r = sheetTarget; closeStaffSheet();
  if (r) openDialog(encodeURIComponent(r.key));   // 例外用（過去日・出力者変更）は既存ダイアログへ
}
function fmtJP(ymd) {
  const w = ['日', '月', '火', '水', '木', '金', '土'];
  const d = new Date(Number(ymd.slice(0, 4)), Number(ymd.slice(5, 7)) - 1, Number(ymd.slice(8, 10)));
  return (d.getMonth() + 1) + '/' + d.getDate() + '(' + w[d.getDay()] + ')';
}

async function pickStaff(encName) {
  const by = decodeURIComponent(encName);
  const r = sheetTarget;
  if (!r || state.sunk[r.key]) return;
  document.querySelectorAll('#shGrid .sbtn').forEach(b => { b.disabled = true; });  // 二重タップ抑止
  // 保存前の値を控える（取り消しで元へ戻すため。通常は空＝未測定だから対象に出ている）
  const prev = { sokuteiDate: r.前回測定日 && r.status === 'sunk' ? r.前回測定日 : '', sokuteiBy: '', outputBy: '' };
  const spec = msRouteWrite(r, { sokuteiDate: state.selectedDate, sokuteiBy: by, outputBy: by }, state.selectedDate);
  try {
    await sendSpec(spec);
    state.sunk[r.key] = true;
    state.recentStaff = msRecentStaffPush(state.recentStaff, by, 6);
    saveRecent(state.recentStaff);
    state.undo = { target: r, spec: spec, prev: prev, name: r.name, by: by };
    closeStaffSheet();
    render();
    showUndo(r.name + ' / ' + by + ' で保存しました');
  } catch (e) {
    document.querySelectorAll('#shGrid .sbtn').forEach(b => { b.disabled = false; });
    alert('保存に失敗しました：' + (e && e.message || e) + '\nもう一度お試しください。');
  }
}

// 取り消し（直前の1件のみ）。新actionは作らず、要介護=updateKeikakushoで元値へ／要支援=既存 deleteShienSokutei。
let undoTimer = null;
function showUndo(msg) {
  document.getElementById('undoMsg').textContent = msg;
  document.getElementById('undobar').classList.add('show');
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(hideUndo, 8000);   // 8秒で消える＝誤タップに気づける長さ
}
function hideUndo() { document.getElementById('undobar').classList.remove('show'); state.undo = null; }
async function undoLast() {
  const u = state.undo;
  if (!u) { hideUndo(); return; }
  try {
    await sendSpec(msBuildUndo(u.target, u.spec, u.prev));
    delete state.sunk[u.target.key];
    hideUndo();
    render();
  } catch (e) {
    alert('取り消しに失敗しました：' + (e && e.message || e) + '\n画面を再読み込みして状態を確認してください。');
  }
}

// 既存actionの送信を1箇所に集約（保存・取り消し・ダイアログ保存で共用＝逐語コピーを増やさない）
async function sendSpec(spec) {
  if (spec.action === 'updateKeikakusho') {
    if (!spec.year || !spec.month) throw new Error('計画月が特定できません（planStart未設定の可能性）');
    // 3項目を逐次（既存の updateKeikakusho＝1リクエスト1フィールド・部分更新）
    for (const j of spec.jobs) {
      const url = GAS + '?action=updateKeikakusho&userId=' + encodeURIComponent(spec.userId) +
        '&year=' + spec.year + '&month=' + spec.month + '&field=' + encodeURIComponent(j.field) +
        '&value=' + encodeURIComponent(j.value) + '&operator=' + encodeURIComponent('測定アプリ') + '&t=' + Date.now();
      const res = await fetchJson(url);
      if (res && res.ok === false) throw new Error(res.error || '保存失敗(' + j.field + ')');
    }
    return;
  }
  if (spec.action === 'deleteShienSokutei') {
    const url = GAS + '?action=deleteShienSokutei&name=' + encodeURIComponent(spec.name) +
      '&date=' + encodeURIComponent(spec.date) + '&by=' + encodeURIComponent(spec.by) + '&t=' + Date.now();
    const res = await fetchJson(url);
    if (!res || res.ok === false) throw new Error((res && res.error) || '取り消しに失敗しました');
    return;
  }
  // addShienSokutei（追記・verified 必須）
  const url = GAS + '?action=addShienSokutei&name=' + encodeURIComponent(spec.name) +
    '&date=' + encodeURIComponent(spec.date) + '&by=' + encodeURIComponent(spec.by) + '&t=' + Date.now();
  const res = await fetchJson(url);
  if (!res || !res.ok || !res.verified) throw new Error((res && res.error) || '保存の確認が取れませんでした');
}

// ===== 記録ダイアログ（例外用: 過去日・出力者を変えるとき）=====
let dlgTarget = null;
function openDialog(encKey) {
  const key = decodeURIComponent(encKey);
  const r = state.targets.find(x => x.key === key);
  if (!r || state.sunk[key]) return;
  dlgTarget = r;
  document.getElementById('dlgName').textContent = r.name;
  document.getElementById('dlgSub').textContent = r.care + '　/　前回 ' + (r.前回測定日 || 'なし') + '　/　期限 ' + r.次回期限;
  document.getElementById('fDate').value = state.selectedDate;   // 既定=選択日・過去日も選べる
  const byOpts = '<option value="">（測定者を選択）</option>' + state.staff.map(s => '<option value="' + esc(s) + '">' + esc(s) + '</option>').join('');
  document.getElementById('fBy').innerHTML = byOpts;
  const isKaigo = String(r.care).indexOf('要介護') === 0;
  document.getElementById('fOutputWrap').style.display = isKaigo ? 'block' : 'none';
  if (isKaigo) document.getElementById('fOutput').innerHTML = '<option value="">（測定者と同じ）</option>' + state.staff.map(s => '<option value="' + esc(s) + '">' + esc(s) + '</option>').join('');
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('dlgHint').textContent = isKaigo
    ? '要介護：計画書記録の測定日・測定者・出力者に保存します。'
    : '要支援・事業対象：測定記録に1件追記します（出力者なし）。二重タップ防止のため保存後は沈めます。';
  document.getElementById('overlay').classList.add('show');
}
function closeDialog() { document.getElementById('overlay').classList.remove('show'); dlgTarget = null; }

async function saveMeasurement() {
  if (!dlgTarget) return;
  const btn = document.getElementById('saveBtn');
  const by = document.getElementById('fBy').value;
  if (!by) { alert('測定者を選択してください'); return; }
  const date = document.getElementById('fDate').value || state.selectedDate;
  const outputBy = (String(dlgTarget.care).indexOf('要介護') === 0) ? document.getElementById('fOutput').value : '';
  btn.disabled = true; btn.textContent = '保存中…';   // 二重タップ抑止（追記系の二重行防止）

  // 計画月の算出は選択日基準（その日視点でのサイクル）。measure-core が planStart/planMonths から算出。
  const spec = msRouteWrite(dlgTarget, { sokuteiDate: date, sokuteiBy: by, outputBy: outputBy }, state.selectedDate);
  try {
    await sendSpec(spec);
    // 成功 → sunk（グレーアウトで沈める・消さない）
    state.sunk[dlgTarget.key] = true;
    state.recentStaff = msRecentStaffPush(state.recentStaff, by, 6);
    saveRecent(state.recentStaff);
    closeDialog();
    render();
  } catch (e) {
    alert('保存に失敗しました：' + (e && e.message || e) + '\nもう一度お試しください。');
    btn.disabled = false; btn.textContent = '📐 保存する';
  }
}

// ① 日付ナビのイベント
document.getElementById('prevDay').addEventListener('click', () => goDate(msAddDays(state.selectedDate, -1)));
document.getElementById('nextDay').addEventListener('click', () => goDate(msAddDays(state.selectedDate, 1)));
document.getElementById('todayBtn').addEventListener('click', () => goDate(todayStr()));
document.getElementById('datePick').addEventListener('change', function () { goDate(this.value); });

state.recentStaff = loadRecent();   // v3① 直近使った測定者（端末内）
loadAll();
</script>
