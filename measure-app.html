<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>📐 身体機能評価(体力測定)</title>
<!-- 期限計算(sokuteiCycleMonths_/sokuteiDueDate_)・測定統合(mergeSokuteiRecords)は shared.js §I、
     ①判定純関数(ms*)は measure-core.js。no-store方式のため ?v= は付けない（版ゲート非対象）。 -->
<script src="shared.js"></script>
<script src="measure-core.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif; background: #eef2f6; color: #263238; min-height: 100vh; padding: 14px 12px 40px; -webkit-text-size-adjust: 100%; }
.wrap { max-width: 820px; margin: 0 auto; }
h1 { text-align: center; color: #2c3e50; font-size: 1.35em; margin-bottom: 2px; }
.subtitle { text-align: center; color: #78909c; font-size: .8em; margin-bottom: 12px; }
.status { text-align: center; color: #78909c; font-size: .85em; min-height: 18px; margin-bottom: 8px; }
.errbar { background: #fff3e0; border: 1px solid #ffcc80; color: #e65100; border-radius: 8px; padding: 8px 10px; font-size: .8em; margin-bottom: 10px; display: none; }
.tabs { display: flex; gap: 8px; margin-bottom: 12px; position: sticky; top: 0; z-index: 5; padding: 4px 0; background: #eef2f6; }
.tab-btn { flex: 1; padding: 14px 6px; border: none; border-radius: 12px; background: #fff; color: #546e7a; font-weight: 700; font-size: .95em; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.08); font-family: inherit; min-height: 48px; }
.tab-btn.active { background: #2c3e50; color: #fff; }
.tab-btn .cnt { display: inline-block; min-width: 20px; margin-left: 4px; font-size: .82em; opacity: .85; }
.grp { font-size: .78em; font-weight: 700; color: #90a4ae; margin: 12px 2px 4px; }
.card { background: #fff; border-radius: 14px; padding: 13px 14px; margin-bottom: 9px; border-left: 7px solid #b0bec5; box-shadow: 0 1px 4px rgba(0,0,0,.09); cursor: pointer; transition: opacity .25s, transform .05s; }
.card:active { transform: scale(.995); }
.card.b-red { border-left-color: #ef5350; }
.card.b-yellow { border-left-color: #ffa726; }
.card.sunk { opacity: .42; cursor: default; }
.rowline { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
.bdg { font-size: 1.2em; }
.nm { font-weight: 700; color: #2c3e50; font-size: 1.12em; }
.cr { font-size: .74em; color: #607d8b; background: #eceff1; border-radius: 6px; padding: 2px 8px; white-space: nowrap; }
.pill { font-size: .74em; border-radius: 6px; padding: 2px 8px; white-space: nowrap; font-weight: 700; }
.pill.am { background: #e3f2fd; color: #1565c0; }
.pill.pm { background: #fff3e0; color: #e65100; }
.pill.absent { background: #f5f5f5; color: #9e9e9e; }
.meta { font-size: .84em; color: #607d8b; line-height: 1.7; margin-top: 5px; }
.over { color: #c62828; font-weight: 700; }
.done-tag { font-size: .78em; color: #2e7d32; font-weight: 700; }
.empty { text-align: center; color: #b0bec5; padding: 30px 10px; font-size: .9em; }
/* ダイアログ */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none; align-items: flex-end; justify-content: center; z-index: 50; }
.overlay.show { display: flex; }
.dialog { background: #fff; width: 100%; max-width: 520px; border-radius: 18px 18px 0 0; padding: 18px 18px calc(20px + env(safe-area-inset-bottom)); box-shadow: 0 -4px 20px rgba(0,0,0,.2); }
@media (min-width: 560px) { .overlay { align-items: center; } .dialog { border-radius: 18px; } }
.dialog h3 { font-size: 1.1em; color: #2c3e50; margin-bottom: 2px; }
.dialog .dsub { font-size: .8em; color: #78909c; margin-bottom: 14px; }
.field { margin-bottom: 13px; }
.field label { display: block; font-size: .82em; color: #546e7a; font-weight: 700; margin-bottom: 5px; }
.field input, .field select { width: 100%; padding: 13px 12px; font-size: 1em; border: 1.5px solid #cfd8dc; border-radius: 10px; font-family: inherit; background: #fff; min-height: 48px; }
.field input:focus, .field select:focus { outline: none; border-color: #42a5f5; }
.dbtns { display: flex; gap: 10px; margin-top: 6px; }
.dbtn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: 700; font-size: 1em; font-family: inherit; cursor: pointer; min-height: 52px; }
.dbtn.cancel { background: #eceff1; color: #546e7a; }
.dbtn.ok { background: #2e7d32; color: #fff; }
.dbtn.ok:disabled { background: #a5d6a7; cursor: default; }
.hint { font-size: .76em; color: #90a4ae; margin-top: 8px; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📐 身体機能評価(体力測定)</h1>
  <div class="subtitle">機能訓練の測定（測定日・測定者・出力者）／赤=期限超過（早めに）</div>
  <div id="status" class="status">読み込み中…</div>
  <div id="errbar" class="errbar"></div>
  <div class="tabs">
    <button class="tab-btn active" id="tabToday" onclick="switchTab('today')">今日測れる人<span class="cnt" id="cntToday"></span></button>
    <button class="tab-btn" id="tabAll" onclick="switchTab('all')">今月の残り（不在含む）<span class="cnt" id="cntAll"></span></button>
  </div>
  <div id="list"></div>
</div>

<!-- 記録ダイアログ -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeDialog()">
  <div class="dialog">
    <h3 id="dlgName">—</h3>
    <div class="dsub" id="dlgSub">—</div>
    <div class="field">
      <label>測定日</label>
      <input type="date" id="fDate">
    </div>
    <div class="field">
      <label>測定者</label>
      <select id="fBy"></select>
    </div>
    <div class="field" id="fOutputWrap">
      <label>出力者（要介護のみ・既定＝測定者）</label>
      <select id="fOutput"></select>
    </div>
    <div class="dbtns">
      <button class="dbtn cancel" onclick="closeDialog()">キャンセル</button>
      <button class="dbtn ok" id="saveBtn" onclick="saveMeasurement()">📐 保存する</button>
    </div>
    <div class="hint" id="dlgHint"></div>
  </div>
</div>

<script>
// ===== 板GAS（morningDigest と同一 exec URL）=====
const GAS = 'https://script.google.com/macros/s/AKfycbwo1UGxsK1qgmO8IDaqT-inDM0Qgoe_MRvxfKDxHy_gXANi4FwNFlgn2pEanMXVQxsdlw/exec';
// 測定者・出力者プルダウンの除外（個訓/sokutei と同値・2026-06-15社長確定）
const MEASURER_EXCLUDE = ['代表', '小野', '林'];

const state = { today: '', tab: 'today', targets: [], staff: [], sunk: {}, errs: {} };

function pad2(n) { return (n < 10 ? '0' : '') + n; }
function fmtYMD(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
function todayStr() { return fmtYMD(new Date()); }
function fiscalYear() { const n = new Date(); return (n.getMonth() + 1) >= 4 ? n.getFullYear() : n.getFullYear() - 1; }
function esc(s) { const d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }
async function fetchJson(url) {
  const res = await fetch(url, { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}
function errMsg(r) { return (r && r.status === 'rejected') ? String(r.reason && r.reason.message || r.reason) : '応答不正'; }

// ===== 取得 → 対象抽出 =====
async function loadAll() {
  const st = document.getElementById('status');
  st.textContent = '読み込み中…';
  state.errs = {};
  const t = state.today = todayStr();
  const fy = fiscalYear();
  const R = await Promise.allSettled([
    fetchJson(GAS + '?action=sessionBoard&date=' + t + '&t=' + Date.now()),      // 0: universe(母集団)
    fetchJson(GAS + '?action=attendance&date=' + t + '&t=' + Date.now()),        // 1: 来所(名前+session)
    fetchJson(GAS + '?action=getKeikakushoYear&year=' + fy + '&t=' + Date.now()),     // 2: 要介護履歴
    fetchJson(GAS + '?action=getKeikakushoYear&year=' + (fy - 1) + '&t=' + Date.now()), // 3
    fetchJson(GAS + '?action=getKeikakushoYear&year=' + (fy + 1) + '&t=' + Date.now()), // 4
    fetchJson(GAS + '?action=getShienSokutei&t=' + Date.now()),                  // 5: 要支援履歴
    fetchJson(GAS + '?action=staff_list&t=' + Date.now())                        // 6: スタッフ
  ]);

  // universe（決定B・母集団）
  let universe = [];
  if (R[0].status === 'fulfilled' && R[0].value && R[0].value.ok && Array.isArray(R[0].value.universe)) universe = R[0].value.universe;
  else state.errs.universe = errMsg(R[0]);

  // 来所者（出席のみ）→ [{name, session}]
  const attendees = [];
  if (R[1].status === 'fulfilled' && R[1].value && R[1].value.attendance) {
    ['am', 'pm'].forEach(k => (R[1].value.attendance[k] || []).forEach(a => {
      if (a && a.name && a.status !== '欠席') attendees.push({ name: a.name, session: k });
    }));
  } else state.errs.att = errMsg(R[1]);

  // 測定履歴 → mergeSokuteiRecords(includePaper:true) → 前回測定日（期限アンカー・紙seed含む）
  let kaigoRecords = [], shienRecords = [];
  [2, 3, 4].forEach(i => { if (R[i].status === 'fulfilled' && R[i].value && R[i].value.ok) kaigoRecords = kaigoRecords.concat(R[i].value.records || []); });
  if (![2, 3, 4].some(i => R[i].status === 'fulfilled' && R[i].value && R[i].value.ok)) state.errs.kaigo = errMsg(R[2]);
  if (R[5].status === 'fulfilled' && R[5].value && R[5].value.ok) shienRecords = R[5].value.records || [];
  else state.errs.shien = errMsg(R[5]);

  const merged = mergeSokuteiRecords(kaigoRecords, shienRecords, { includePaper: true });
  const prevMeasuredByKey = {};
  merged.forEach(r => {
    if (!r.sokutei_date) return;
    if (!prevMeasuredByKey[r.key] || r.sokutei_date > prevMeasuredByKey[r.key]) prevMeasuredByKey[r.key] = r.sokutei_date;
  });

  // スタッフ
  if (R[6].status === 'fulfilled' && R[6].value && Array.isArray(R[6].value.staff)) state.staff = R[6].value.staff.filter(s => MEASURER_EXCLUDE.indexOf(s) < 0);
  else { state.staff = []; state.errs.staff = errMsg(R[6]); }

  // 対象抽出（Phase1純関数・期限は shared.js の sokuteiDueDate_ を注入）
  state.targets = msBuildMeasurementTargets(universe, prevMeasuredByKey, attendees, t, sokuteiDueDate_);

  st.textContent = '';
  renderErrs();
  render();
}

function renderErrs() {
  const keys = Object.keys(state.errs);
  const bar = document.getElementById('errbar');
  if (!keys.length) { bar.style.display = 'none'; return; }
  bar.style.display = 'block';
  bar.innerHTML = '⚠️ 一部データ取得に失敗: ' + keys.map(k => esc(k)).join('、') + '（表示が欠ける場合あり）';
}

// ===== 描画 =====
function switchTab(tab) {
  state.tab = tab;
  document.getElementById('tabToday').classList.toggle('active', tab === 'today');
  document.getElementById('tabAll').classList.toggle('active', tab === 'all');
  render();
}

function render() {
  const all = state.targets;
  const today = all.filter(r => r.attendingToday);
  document.getElementById('cntToday').textContent = today.length ? '(' + today.length + ')' : '';
  document.getElementById('cntAll').textContent = all.length ? '(' + all.length + ')' : '';
  const rows = (state.tab === 'today') ? today : all;
  const listEl = document.getElementById('list');

  if (!rows.length) {
    listEl.innerHTML = '<div class="empty">' + (state.tab === 'today' ? '今日測る対象はいません（お疲れさまです）' : '今月の測定対象はありません') + '</div>';
    return;
  }
  // overdue（赤・最上部）→ due の順は msBuildMeasurementTargets で確定済み。見出しで区切る。
  let html = '';
  let lastGrp = null;
  rows.forEach(r => {
    const grp = r.status === 'overdue' ? '🔴 期限超過（スライド・早めに）' : '🟡 今月が期限';
    if (grp !== lastGrp) { html += '<div class="grp">' + grp + '</div>'; lastGrp = grp; }
    html += cardHtml(r);
  });
  listEl.innerHTML = html;
}

function cardHtml(r) {
  const sunk = !!state.sunk[r.key];
  const bcls = sunk ? 'sunk' : (r.status === 'overdue' ? 'b-red' : 'b-yellow');
  const bdg = sunk ? '✅' : (r.status === 'overdue' ? '🔴' : '🟡');
  let pill;
  if (r.attendingToday) pill = '<span class="pill ' + r.session + '">' + (r.session === 'am' ? '午前来所' : '午後来所') + '</span>';
  else pill = '<span class="pill absent">今日は不在</span>';
  const prev = r.前回測定日 ? '前回 ' + esc(r.前回測定日) : '<span class="over">前回なし（要測定）</span>';
  const due = '次回期限 ' + esc(r.次回期限) + (r.status === 'overdue' ? '（<span class="over">超過</span>）' : '');
  const doneTag = sunk ? '<span class="done-tag">✅ 保存済み</span>' : '';
  return '<div class="card ' + bcls + '" ' + (sunk ? '' : 'onclick="openDialog(\'' + encodeURIComponent(r.key) + '\')"') + '>' +
    '<div class="rowline"><span class="bdg">' + bdg + '</span>' +
    '<span class="nm">' + esc(r.name) + '</span>' +
    '<span class="cr">' + esc(r.care) + '</span>' + pill + ' ' + doneTag + '</div>' +
    '<div class="meta">' + prev + '　/　' + due + '</div></div>';
}

// ===== 記録ダイアログ =====
let dlgTarget = null;
function openDialog(encKey) {
  const key = decodeURIComponent(encKey);
  const r = state.targets.find(x => x.key === key);
  if (!r || state.sunk[key]) return;
  dlgTarget = r;
  document.getElementById('dlgName').textContent = r.name;
  document.getElementById('dlgSub').textContent = r.care + '　/　前回 ' + (r.前回測定日 || 'なし') + '　/　期限 ' + r.次回期限;
  document.getElementById('fDate').value = state.today;   // 既定=今日・過去日も選べる
  const byOpts = '<option value="">（測定者を選択）</option>' + state.staff.map(s => '<option value="' + esc(s) + '">' + esc(s) + '</option>').join('');
  document.getElementById('fBy').innerHTML = byOpts;
  const isKaigo = String(r.care).indexOf('要介護') === 0;
  document.getElementById('fOutputWrap').style.display = isKaigo ? 'block' : 'none';
  if (isKaigo) document.getElementById('fOutput').innerHTML = '<option value="">（測定者と同じ）</option>' + state.staff.map(s => '<option value="' + esc(s) + '">' + esc(s) + '</option>').join('');
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('dlgHint').textContent = isKaigo
    ? '要介護：計画書記録の測定日・測定者・出力者に保存します。'
    : '要支援・事業対象：測定記録に1件追記します（出力者なし）。二重タップ防止のため保存後は沈めます。';
  document.getElementById('overlay').classList.add('show');
}
function closeDialog() { document.getElementById('overlay').classList.remove('show'); dlgTarget = null; }

async function saveMeasurement() {
  if (!dlgTarget) return;
  const btn = document.getElementById('saveBtn');
  const by = document.getElementById('fBy').value;
  if (!by) { alert('測定者を選択してください'); return; }
  const date = document.getElementById('fDate').value || state.today;
  const outputBy = (String(dlgTarget.care).indexOf('要介護') === 0) ? document.getElementById('fOutput').value : '';
  btn.disabled = true; btn.textContent = '保存中…';   // 二重タップ抑止（追記系の二重行防止）

  const spec = msRouteWrite(dlgTarget, { sokuteiDate: date, sokuteiBy: by, outputBy: outputBy }, state.today);
  try {
    if (spec.action === 'updateKeikakusho') {
      if (!spec.year || !spec.month) throw new Error('計画月が特定できません（planStart未設定の可能性）');
      // 3項目を逐次（既存の updateKeikakusho＝1リクエスト1フィールド・部分更新）
      for (const j of spec.jobs) {
        const url = GAS + '?action=updateKeikakusho&userId=' + encodeURIComponent(spec.userId) +
          '&year=' + spec.year + '&month=' + spec.month + '&field=' + encodeURIComponent(j.field) +
          '&value=' + encodeURIComponent(j.value) + '&operator=' + encodeURIComponent('測定アプリ') + '&t=' + Date.now();
        const res = await fetchJson(url);
        if (res && res.ok === false) throw new Error(res.error || '保存失敗(' + j.field + ')');
      }
    } else { // addShienSokutei（追記・verified 必須）
      const url = GAS + '?action=addShienSokutei&name=' + encodeURIComponent(spec.name) +
        '&date=' + encodeURIComponent(spec.date) + '&by=' + encodeURIComponent(spec.by) + '&t=' + Date.now();
      const res = await fetchJson(url);
      if (!res || !res.ok || !res.verified) throw new Error((res && res.error) || '保存の確認が取れませんでした');
    }
    // 成功 → sunk（グレーアウトで沈める・消さない）
    state.sunk[dlgTarget.key] = true;
    closeDialog();
    render();
  } catch (e) {
    alert('保存に失敗しました：' + (e && e.message || e) + '\nもう一度お試しください。');
    btn.disabled = false; btn.textContent = '📐 保存する';
  }
}

loadAll();
</script>
</body>
</html>
