<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>口座振替不備返却管理 - yawaragi</title>
<style>
:root {
  --green: #4caf50; --yellow: #ffc107; --red: #f44336;
  --bg: #f5f5f5; --card-bg: #fff; --border: #ddd;
  --primary: #1976d2; --primary-dark: #1565c0; --text: #333;
}
* { box-sizing: border-box; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif; margin: 0; padding: 0; background: var(--bg); color: var(--text); font-size: 14px; }
header { background: var(--primary); color: #fff; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; }
header h1 { margin: 0; font-size: 18px; }
header button { background: #fff; color: var(--primary); border: none; padding: 10px 18px; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; min-height: 44px; }
.month-tabs { display: flex; gap: 4px; padding: 8px 16px; background: #e8e8e8; overflow-x: auto; }
.month-tab { padding: 8px 14px; background: #fff; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; white-space: nowrap; font-size: 13px; }
.month-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.summary { padding: 8px 16px; font-size: 13px; color: #666; display: flex; justify-content: space-between; align-items: center; }
.summary .sync-status { font-size: 11px; color: #999; }
.cards { padding: 0 16px 80px; }
.card { background: var(--card-bg); border: 2px solid var(--green); border-radius: 8px; margin-bottom: 12px; padding: 12px; }
.card.yellow { border-color: var(--yellow); }
.card.red { border-color: var(--red); background: #fff5f5; }
.card.done { border-color: #ccc; opacity: 0.75; }
.card-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; gap: 8px; }
.card-name { font-size: 16px; font-weight: bold; }
.card-meta { font-size: 12px; color: #888; white-space: nowrap; }
.card.red .card-meta { color: var(--red); font-weight: bold; }
.card-info { font-size: 13px; color: #555; margin-bottom: 8px; }
.progress-bar { font-family: monospace; font-size: 16px; color: var(--primary); letter-spacing: 2px; margin-bottom: 8px; }
.next-action { background: #e3f2fd; padding: 12px; border-radius: 4px; margin-top: 8px; }
.next-action button { background: var(--primary); color: #fff; border: none; padding: 12px 20px; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; width: 100%; min-height: 48px; }
.next-action button:hover { background: var(--primary-dark); }
.menu-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px 8px; color: #888; }
.done-section { margin-top: 24px; }
.done-section h2 { font-size: 14px; color: #666; padding: 0 16px; cursor: pointer; }

/* モーダル */
.modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-start; justify-content: center; padding: 16px; z-index: 100; overflow-y: auto; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 8px; padding: 16px; width: 100%; max-width: 600px; }
.modal h2 { margin-top: 0; font-size: 16px; }
.modal label { display: block; margin-top: 12px; font-weight: bold; font-size: 13px; }
.modal input, .modal select, .modal textarea { width: 100%; padding: 10px; font-size: 14px; border: 1px solid var(--border); border-radius: 4px; margin-top: 4px; min-height: 40px; font-family: inherit; }
.modal textarea { min-height: 80px; resize: vertical; }
.modal-buttons { display: flex; gap: 8px; margin-top: 16px; }
.modal-buttons button { flex: 1; padding: 12px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; min-height: 48px; font-weight: bold; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:disabled { background: #aaa; cursor: not-allowed; }
.btn-secondary { background: #888; color: #fff; }
.btn-danger { background: var(--red); color: #fff; }
.info-block { background: #f0f0f0; padding: 12px; border-radius: 4px; margin-top: 8px; font-size: 13px; }
.info-block.blue { background: #e3f2fd; }
.info-block.yellow { background: #fff9c4; }
.info-block.green { background: #e8f5e9; }
.user-search-result { max-height: 220px; overflow-y: auto; border: 1px solid var(--border); margin-top: 4px; border-radius: 4px; }
.user-search-result div { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; }
.user-search-result div:hover { background: #f0f8ff; }
.checkbox-list label { display: flex; align-items: center; font-weight: normal; margin-top: 8px; }
.checkbox-list input[type=checkbox] { width: auto; margin-right: 10px; transform: scale(1.3); }
.empty-state { text-align: center; color: #888; padding: 32px; }

@media (max-width: 600px) {
  header h1 { font-size: 16px; }
  .card-name { font-size: 15px; }
}
</style>
</head>
<body>
<header>
  <h1>🏦 口座振替不備返却管理</h1>
  <button id="btn-new">＋ 新規登録</button>
</header>
<div class="month-tabs" id="month-tabs"></div>
<div class="summary">
  <span id="summary-text">読み込み中...</span>
  <span class="sync-status" id="sync-status"></span>
</div>
<div class="cards" id="cards"></div>
<div class="done-section">
  <h2 id="done-toggle">✅ 完了 <span id="done-count"></span> ▼</h2>
  <div class="cards" id="done-cards" style="display:none"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
// ============================
// 設定
// ============================
const GAS_URL = 'https://script.google.com/macros/s/AKfycby9yifGR7oxbstElccGjUFhNN2BlDGfMgcFBT-KlX4iAHIgb6LZuCpplMgpxkMy7am91w/exec';
// 利用者マスタは yawaragiボードGAS の user_list を直接叩く（GAS同士の連携は OAuth スコープが要るため）
const YAWARAGI_BOARD_GAS = 'https://script.google.com/macros/s/AKfycbwo1UGxsK1qgmO8IDaqT-inDM0Qgoe_MRvxfKDxHy_gXANi4FwNFlgn2pEanMXVQxsdlw/exec';
// 振替不能管理アプリ（同フォルダ内のローカル版）から不能リストを取得する。
// 将来 GAS 化されたら URL を入れる。当面は localStorage の `furikaeFuno` 等を参照する形でも可。
const FURIKAE_FUNO_GAS = ''; // TODO: 振替不能管理アプリのGAS URL（あれば設定）

const SUPPORT_INFO = {
  電算CSS係: { tel: '058-279-3482', 加入店コード: '9470035730' },
  送付先: ['〒501-6196', '岐阜県岐阜市日置江1-58', '株式会社電算システム', 'オペレーションサービスセンターCSS係']
};

const FUBI_CATEGORIES = ['印鑑相違','記入漏れ・記入不備','口座番号誤り','金融機関コード／支店コード誤り','名義人不一致','該当口座なし','その他'];

const STEP_LABELS = {
  1: '受領登録',
  2: '不備理由を入力',
  3: '利用者へ連絡',
  4: '新書類を受領',
  5: '電算へ再送付',
  6: 'パンチ＆ファイリング'
};

// ============================
// 状態
// ============================
const LS_KEY = 'furikaeFubi:cases:v1';
const LS_KEY_CUSTOMER = 'furikaeFubi:customers:v1';
const LS_KEY_USERS = 'furikaeFubi:users:v1';
const LS_KEY_CURRENT_MONTH = 'furikaeFubi:currentMonth:v1';

const state = {
  cases: [],
  customers: [],
  users: [],
  funoRecords: [],
  currentMonth: null
};

// ============================
// ユーティリティ
// ============================
function todayISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function ymOf(dateStr) { return (dateStr || '').slice(0, 7); }
function daysSince(dateStr) {
  if (!dateStr) return 0;
  return Math.floor((new Date() - new Date(dateStr)) / (1000 * 60 * 60 * 24));
}
function colorOf(days) {
  if (days >= 8) return 'red';
  if (days >= 4) return 'yellow';
  return 'green';
}
function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function nowSyncLabel() {
  const d = new Date();
  return `同期: ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ============================
// 同期4点セット
// ============================
function loadFromLocal() {
  try { state.cases = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); } catch (_) { state.cases = []; }
  try { state.customers = JSON.parse(localStorage.getItem(LS_KEY_CUSTOMER) || '[]'); } catch (_) { state.customers = []; }
  try { state.users = JSON.parse(localStorage.getItem(LS_KEY_USERS) || '[]'); } catch (_) { state.users = []; }
  state.currentMonth = localStorage.getItem(LS_KEY_CURRENT_MONTH) || null;
}
function saveToLocal() {
  localStorage.setItem(LS_KEY, JSON.stringify(state.cases));
  localStorage.setItem(LS_KEY_CUSTOMER, JSON.stringify(state.customers));
  localStorage.setItem(LS_KEY_USERS, JSON.stringify(state.users));
  if (state.currentMonth) localStorage.setItem(LS_KEY_CURRENT_MONTH, state.currentMonth);
}

async function fetchFromGAS() {
  try {
    const [casesRes, custRes, usersRes] = await Promise.all([
      fetch(GAS_URL + '?action=list').then(r => r.json()).catch(e => null),
      fetch(GAS_URL + '?action=customers').then(r => r.json()).catch(e => null),
      fetch(YAWARAGI_BOARD_GAS + '?action=user_list').then(r => r.json()).catch(e => null)
    ]);
    // 空ガード: 空配列で返ってきたらローカルを上書きしない（GAS失敗時の保護）
    if (casesRes && casesRes.ok && Array.isArray(casesRes.cases)) {
      if (casesRes.cases.length > 0 || state.cases.length === 0) {
        state.cases = casesRes.cases;
      }
    }
    if (custRes && custRes.ok && Array.isArray(custRes.customers)) {
      state.customers = custRes.customers;
    }
    // yawaragiボードGAS の user_list 形式 → 共通フォーマットへ変換
    if (usersRes && Array.isArray(usersRes.user_list)) {
      const users = usersRes.user_list.map(u => ({
        利用者ID: 'row_' + u.row,
        利用者名: u.userName,
        利用者名カナ: u.userNameKana,
        ケアマネ事業所: u.currentCmOffice,
        ケアマネ名: u.currentCmStaff
      }));
      if (users.length > 0 || state.users.length === 0) {
        state.users = users;
      }
    }
    saveToLocal();
    document.getElementById('sync-status').textContent = nowSyncLabel();
    render();
  } catch (err) {
    console.error('fetchFromGAS failed:', err);
    document.getElementById('sync-status').textContent = '同期失敗（ローカル表示中）';
  }
}

// GAS は access:ANYONE のため、ブラウザクッキー（Googleログイン情報）を送る必要がある。
// fetch POST はクロスオリジン制約でクッキーが送れないため、form-iframe 方式に切替。
function postViaForm(payload) {
  return new Promise((resolve) => {
    let iframe = document.getElementById('gas-iframe');
    if (!iframe) {
      iframe = document.createElement('iframe');
      iframe.id = 'gas-iframe';
      iframe.name = 'gas-iframe';
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
    }
    const form = document.createElement('form');
    form.action = GAS_URL;
    form.method = 'POST';
    form.target = 'gas-iframe';
    form.style.display = 'none';
    const input = document.createElement('input');
    input.type = 'hidden';
    input.name = 'payload';
    input.value = JSON.stringify(payload);
    form.appendChild(input);
    document.body.appendChild(form);
    let resolved = false;
    const onDone = () => {
      if (resolved) return;
      resolved = true;
      try { document.body.removeChild(form); } catch (_) {}
      iframe.removeEventListener('load', onDone);
      resolve();
    };
    iframe.addEventListener('load', onDone);
    form.submit();
    // 5秒タイムアウト
    setTimeout(onDone, 5000);
  });
}

async function pushUpsert(c) {
  // 楽観的に state へ反映してから送信（即UI反映）
  if (!c.id) c.id = 'fubi_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
  if (!c['作成日時']) c['作成日時'] = new Date().toISOString();
  c['更新日時'] = new Date().toISOString();
  const idx = state.cases.findIndex(x => x.id === c.id);
  if (idx >= 0) state.cases[idx] = c;
  else state.cases.push(c);
  saveToLocal();
  render();
  await postViaForm({ action: 'upsert', case: c });
  setTimeout(fetchFromGAS, 1500);
  return { ok: true, case: c };
}

async function pushDelete(id) {
  state.cases = state.cases.filter(x => x.id !== id);
  saveToLocal();
  render();
  await postViaForm({ action: 'delete', id });
  setTimeout(fetchFromGAS, 1500);
}

async function pushCustomer(c) {
  const idx = state.customers.findIndex(x => x['利用者ID'] === c['利用者ID']);
  if (idx >= 0) state.customers[idx] = { ...state.customers[idx], ...c };
  else state.customers.push(c);
  saveToLocal();
  await postViaForm({ action: 'save_customer', customer: c });
}

// ============================
// 描画
// ============================
function render() {
  renderMonthTabs();
  renderSummary();
  renderCards();
  renderDoneCards();
}

function renderMonthTabs() {
  const months = new Set(state.cases.map(c => ymOf(c['受領日'])).filter(Boolean));
  const now = todayISO().slice(0, 7);
  months.add(now);
  const sorted = Array.from(months).sort().reverse();
  if (!state.currentMonth || !sorted.includes(state.currentMonth)) state.currentMonth = sorted[0] || now;
  const el = document.getElementById('month-tabs');
  el.innerHTML = sorted.map(m => `
    <div class="month-tab ${m === state.currentMonth ? 'active' : ''}" data-month="${m}">${m.replace('-', '/')}</div>
  `).join('');
  el.querySelectorAll('.month-tab').forEach(t => {
    t.addEventListener('click', () => {
      state.currentMonth = t.dataset.month;
      saveToLocal();
      render();
    });
  });
}

function renderSummary() {
  const inProgress = state.cases.filter(c => ymOf(c['受領日']) === state.currentMonth && c['状態'] === '進行中');
  const red = inProgress.filter(c => daysSince(c['受領日']) >= 8).length;
  let text = `進行中: ${inProgress.length}件`;
  if (red > 0) text += ` （🔴8日以上経過: ${red}件）`;
  document.getElementById('summary-text').textContent = text;
}

function renderCards() {
  const list = state.cases
    .filter(c => ymOf(c['受領日']) === state.currentMonth && c['状態'] === '進行中')
    .sort((a, b) => daysSince(b['受領日']) - daysSince(a['受領日']));
  const el = document.getElementById('cards');
  el.innerHTML = list.map(c => cardHTML(c, false)).join('') || '<p class="empty-state">この月に進行中のカードはありません</p>';
  bindCardEvents(el);
}

function renderDoneCards() {
  const list = state.cases
    .filter(c => ymOf(c['受領日']) === state.currentMonth && c['状態'] !== '進行中')
    .sort((a, b) => (b['完了日'] || '').localeCompare(a['完了日'] || ''));
  document.getElementById('done-count').textContent = `(${list.length})`;
  const el = document.getElementById('done-cards');
  el.innerHTML = list.map(c => cardHTML(c, true)).join('');
  bindCardEvents(el);
}

function cardHTML(c, done) {
  const days = daysSince(c['受領日']);
  const cls = done ? 'done' : colorOf(days);
  const step = c['現在ステップ'] || 1;
  const bar = '●'.repeat(Math.min(step, 6)) + '○'.repeat(Math.max(0, 6 - step));
  const reasons = (c['不備理由カテゴリ'] || []).join('・') || '未入力';
  const stateLabel = c['状態'] === '中止' ? '【中止】' : c['状態'] === '完了' ? '【完了】' : '';
  let funoSection = '';
  if (done && c['予想振替月']) {
    funoSection = `<div class="info-block" style="font-size:12px;margin-top:8px">📊 振替実績: ${matchFunoStatusText(c)}</div>`;
  }
  return `
    <div class="card ${cls}">
      <div class="card-header">
        <div class="card-name">${stateLabel}${escapeHtml(c['利用者名'])}</div>
        <div>
          <span class="card-meta">${days}日経過${cls==='red'?'・最優先':''}</span>
          <button class="menu-btn" data-action="menu" data-id="${c.id}">⋮</button>
        </div>
      </div>
      <div class="card-info">受領: ${c['受領日']} | 不備: ${escapeHtml(reasons)}</div>
      <div class="progress-bar">${bar} (Step ${step}: ${STEP_LABELS[step] || '完了'})</div>
      ${!done ? `<div class="next-action"><button data-action="open" data-id="${c.id}">▶ ${STEP_LABELS[step]}</button></div>` : ''}
      ${funoSection}
    </div>
  `;
}

function bindCardEvents(el) {
  el.querySelectorAll('[data-action="open"]').forEach(b => {
    b.addEventListener('click', () => openStep(b.dataset.id));
  });
  el.querySelectorAll('[data-action="menu"]').forEach(b => {
    b.addEventListener('click', (e) => { e.stopPropagation(); openMenu(b.dataset.id); });
  });
}

function matchFunoStatusText(c) {
  if (!state.funoRecords || state.funoRecords.length === 0) {
    return `予想振替月 ${c['予想振替月']} ・振替不能管理アプリで自動追跡（連動未取得）`;
  }
  const userRecords = state.funoRecords.filter(r => r['利用者ID'] === c['利用者ID'] || r['利用者名'] === c['利用者名']);
  if (userRecords.length === 0) return `予想振替月 ${c['予想振替月']} ・✅ 不能リスト該当なし（振替成功と推定）`;
  return userRecords.slice(-3).map(r => {
    const m = r['月'] || '';
    const status = r['status'] || r['ステータス'] || '';
    return status === '回収済' ? `${m}: ✅ 成功` : `${m}: ❌ ${r['不能理由']||'不能'}`;
  }).join(' / ');
}

// ============================
// モーダル制御
// ============================
function openModal(html) {
  document.getElementById('modal').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'modal-overlay') closeModal();
});

// ============================
// 新規登録（Step 1: 受領登録）
// ============================
document.getElementById('btn-new').addEventListener('click', () => {
  openModal(`
    <h2>🆕 新規登録 - Step 1: 受領</h2>
    <label>利用者を選んでください</label>
    <input type="text" id="user-search" placeholder="🔍 名前またはカナを入力">
    <div class="user-search-result" id="user-list"></div>
    <label>受領日（書類が手元に届いた日 ・ 通常は今日のままでOK）</label>
    <input type="date" id="recv-date" value="${todayISO()}">
    <label>文書日付（書類カバーレター右上に書いてある日付 ・ 空でもOK）</label>
    <input type="date" id="doc-date">
    <label>入力者（あなたの名前 ・ 空でもOK）</label>
    <input type="text" id="staff" placeholder="例: 福永">
    <div class="modal-buttons">
      <button class="btn-secondary" id="btn-cancel-recv">キャンセル</button>
      <button class="btn-primary" id="btn-confirm-recv" disabled>受領を記録する</button>
    </div>
  `);
  let selected = null;
  const search = document.getElementById('user-search');
  const listEl = document.getElementById('user-list');
  const btn = document.getElementById('btn-confirm-recv');
  document.getElementById('btn-cancel-recv').addEventListener('click', closeModal);

  function refreshList() {
    const q = search.value.trim();
    let filtered;
    if (!q) {
      filtered = state.users.slice(0, 30);
    } else {
      filtered = state.users.filter(u =>
        (u['利用者名'] || '').includes(q) ||
        (u['利用者名カナ'] || '').includes(q)
      );
    }
    listEl.innerHTML = filtered.map(u =>
      `<div data-id="${u['利用者ID']}" data-name="${escapeHtml(u['利用者名'])}">${escapeHtml(u['利用者名'])}<small style="color:#888;margin-left:8px">${escapeHtml(u['利用者名カナ']||'')}</small></div>`
    ).join('') || '<div style="padding:10px;color:#999">該当なし</div>';
    listEl.querySelectorAll('div[data-id]').forEach(d => {
      d.addEventListener('click', () => {
        selected = { id: d.dataset.id, name: d.dataset.name };
        search.value = d.dataset.name;
        listEl.innerHTML = '';
        btn.disabled = false;
      });
    });
  }
  search.addEventListener('input', refreshList);
  refreshList();

  btn.addEventListener('click', async () => {
    if (!selected) return;
    btn.disabled = true;
    btn.textContent = '保存中...';
    const c = {
      受領日: document.getElementById('recv-date').value,
      文書日付: document.getElementById('doc-date').value,
      利用者ID: selected.id,
      利用者名: selected.name,
      現在ステップ: 2,
      不備理由カテゴリ: [],
      ステップ履歴: [{ ステップ: 1, 日時: new Date().toISOString(), 担当: document.getElementById('staff').value, メモ: '' }],
      状態: '進行中'
    };
    await pushUpsert(c);
    closeModal();
  });
});

// ============================
// Step 2-6 のダイアログ
// ============================
function openStep(id) {
  const c = state.cases.find(x => x.id === id);
  if (!c) return;
  const step = c['現在ステップ'] || 1;
  if (step === 2) return openStep2(c);
  if (step === 3) return openStep3(c);
  if (step === 4) return openStep4(c);
  if (step === 5) return openStep5(c);
  if (step === 6) return openStep6(c);
}

function openStep2(c) {
  const checkboxes = FUBI_CATEGORIES.map(cat => `
    <label>
      <input type="checkbox" value="${cat}" ${(c['不備理由カテゴリ']||[]).includes(cat)?'checked':''}>
      ${cat}
    </label>
  `).join('');
  openModal(`
    <h2>📋 ${escapeHtml(c['利用者名'])}さん - Step 2: 不備理由</h2>
    <p style="font-size:13px;color:#666;margin-top:8px">書類右下の「金融機関使用欄」の不備事由を確認してください</p>
    <label>不備カテゴリ（複数選択可）</label>
    <div class="checkbox-list" id="fubi-cats">${checkboxes}</div>
    <label>詳細メモ（書類に書いてある文言をそのまま）</label>
    <textarea id="reason-detail">${escapeHtml(c['不備理由詳細']||'')}</textarea>
    <div class="modal-buttons">
      <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" id="btn-step2">次へ → Step 3</button>
    </div>
  `);
  document.getElementById('btn-step2').addEventListener('click', async () => {
    const cats = Array.from(document.querySelectorAll('#fubi-cats input:checked')).map(x => x.value);
    if (cats.length === 0) { alert('不備カテゴリを1つ以上選んでください'); return; }
    const next = { ...c };
    next['不備理由カテゴリ'] = cats;
    next['不備理由詳細'] = document.getElementById('reason-detail').value;
    next['現在ステップ'] = 3;
    next['ステップ履歴'] = [...(c['ステップ履歴']||[]), { ステップ: 2, 日時: new Date().toISOString(), 担当: '', メモ: '' }];
    await pushUpsert(next);
    closeModal();
  });
}

function openStep3(c) {

  openModal(`

      <strong>📞 連絡先</strong><br>
      ケアマネ: ${escapeHtml(user['ケアマネ名']||'')}（${escapeHtml(user['ケアマネ事業所']||'')}）<br>
      <hr style="margin:8px 0;border:none;border-top:1px dashed #ccc">
      電話番号（利用者本人）: <input type="text" id="contact-phone" value="${escapeHtml(cust['電話番号']||'')}" placeholder="未登録なら入力" style="display:inline-block;width:60%;margin-top:4px"><br>
      キーパーソン: <input type="text" id="contact-kp" value="${escapeHtml(cust['キーパーソン']||'')}" placeholder="例: 息子さん" style="display:inline-block;width:60%;margin-top:4px"><br>
      キーパーソン電話: <input type="text" id="contact-kp-phone" value="${escapeHtml(cust['キーパーソン電話']||'')}" placeholder="例: 090-XXXX-XXXX" style="display:inline-block;width:60%;margin-top:4px">
      <p style="font-size:11px;color:#888;margin:4px 0 0">※ 一度入力すれば次回から自動表示されます</p>
    </div>
    <div class="info-block yellow">
      <strong>📝 こう伝える</strong><br>
      銀行から口座振替の書類で「${escapeHtml(reasonsText||'不備')}」が出たので、新しい書類を取りに伺ってもいいですか？
    </div>
    <label>誰に連絡したか</label>
    <select id="contact-to">
      <option value="本人">本人</option>
      <option value="キーパーソン">キーパーソン</option>
      <option value="ケアマネ経由">ケアマネ経由</option>
    </select>
    <label>メモ（連絡内容・約束日など）</label>
    <textarea id="contact-memo">${escapeHtml(c['連絡先メモ']||'')}</textarea>
    <div class="modal-buttons">
      <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" id="btn-step3">✓ 連絡完了 → Step 4</button>
    </div>
  `);
  document.getElementById('btn-step3').addEventListener('click', async () => {
    // 連絡先マスタを更新（電話・キーパーソンの初回入力 or 変更があった場合）
    const phone = document.getElementById('contact-phone').value.trim();
    const kp = document.getElementById('contact-kp').value.trim();
    const kpPhone = document.getElementById('contact-kp-phone').value.trim();
    if (phone !== (cust['電話番号']||'') || kp !== (cust['キーパーソン']||'') || kpPhone !== (cust['キーパーソン電話']||'')) {
      await pushCustomer({
        利用者ID: c['利用者ID'],
        利用者名: c['利用者名'],
        電算顧客番号: cust['電算顧客番号'] || '',
        電話番号: phone,
        キーパーソン: kp,
        キーパーソン電話: kpPhone,
        メモ: cust['メモ'] || ''
      });
    }
    const next = { ...c };
    next['連絡先メモ'] = document.getElementById('contact-memo').value;
    next['現在ステップ'] = 4;
    next['ステップ履歴'] = [...(c['ステップ履歴']||[]), { ステップ: 3, 日時: new Date().toISOString(), 担当: '', メモ: document.getElementById('contact-to').value }];
    await pushUpsert(next);
    closeModal();
  });
}

function openStep5(c) {
  const cust = state.customers.find(x => x['利用者ID'] === c['利用者ID']) || {};
  const densanNo = cust['電算顧客番号'] || '';
  const addressLines = SUPPORT_INFO.送付先;
  openModal(`
    <h2>📮 ${escapeHtml(c['利用者名'])}さん - Step 5: 電算へ再送付</h2>
    <div class="info-block blue">
      <strong>📮 送付先</strong>
      <button id="btn-copy-addr" style="float:right;padding:6px 12px;font-size:12px;background:var(--primary);color:#fff;border:none;border-radius:4px;cursor:pointer">📋 コピー</button>
      <div style="margin-top:8px;clear:both">${addressLines.join('<br>')}</div>
    </div>
    <div class="info-block">
      <strong>📞 電算CSS係（質問あれば）</strong><br>
      TEL: ${SUPPORT_INFO.電算CSS係.tel}（平日9-17時）<br>
      加入店コード: ${SUPPORT_INFO.電算CSS係.加入店コード}<br>
      顧客番号: <input type="text" id="densan-no" value="${escapeHtml(densanNo)}" placeholder="例: 162" style="width:120px;display:inline-block">

    </div>
    <label>送付方法</label>
    <select id="send-method">
      <option value="郵送">郵送</option>
      <option value="持参">持参</option>
      <option value="宅配便">宅配便</option>
    </select>
    <label>送付日</label>
    <input type="date" id="send-date" value="${todayISO()}">
    <div class="modal-buttons">
      <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" id="btn-step5">✓ 再送付しました → Step 6</button>
    </div>
  `);
  document.getElementById('btn-copy-addr').addEventListener('click', () => {
    navigator.clipboard.writeText(addressLines.join('\n')).then(() => {

    }).catch(() => alert('コピーに失敗しました'));

  document.getElementById('btn-step5').addEventListener('click', async () => {
    const newDensanNo = document.getElementById('densan-no').value.trim();
    if (newDensanNo !== densanNo) {
      await pushCustomer({

        電話番号: cust['電話番号'] || '',
        キーパーソン: cust['キーパーソン'] || '',
        キーパーソン電話: cust['キーパーソン電話'] || '',

    next['送付方法'] = document.getElementById('send-method').value;

    next['ステップ履歴'] = [...(c['ステップ履歴']||[]), {
      ステップ: 5,

      担当: '',
      メモ: document.getElementById('send-method').value

    closeModal();
  });

// ============================
// メニュー（編集・中止・削除）
// ============================
function openMenu(id) {
  const c = state.cases.find(x => x.id === id);
  if (!c) return;
  openModal(`
    <h2>⋮ ${escapeHtml(c['利用者名'])}さんのカード</h2>
    <p style="font-size:12px;color:#666">現在ステップ: ${c['現在ステップ']} (${STEP_LABELS[c['現在ステップ']]||'-'})・状態: ${c['状態']}</p>
    <div class="modal-buttons" style="flex-direction:column;gap:8px">
      <button class="btn-primary" id="btn-rewind">◀ 前のステップに戻る</button>
      <button class="btn-secondary" id="btn-resume" style="${c['状態']==='完了'||c['状態']==='中止'?'':'display:none'}">⟲ 進行中に戻す</button>
      <button class="btn-secondary" id="btn-cancel" style="${c['状態']==='進行中'?'':'display:none'}">⊘ このケースを中止（解約等）</button>
      <button class="btn-danger" id="btn-delete">🗑 削除（戻せません）</button>
      <button class="btn-secondary" onclick="closeModal()">閉じる</button>
    </div>
  `);
  document.getElementById('btn-rewind').addEventListener('click', async () => {
    const step = c['現在ステップ'] || 1;
    if (step <= 1) { alert('これ以上戻せません'); return; }
    await pushUpsert({ ...c, 現在ステップ: step - 1, 状態: '進行中', 完了日: '' });
    closeModal();
  });
  const btnResume = document.getElementById('btn-resume');
  if (btnResume) btnResume.addEventListener('click', async () => {
    await pushUpsert({ ...c, 状態: '進行中', 完了日: '' });
    closeModal();
  });
  const btnCancel = document.getElementById('btn-cancel');
  if (btnCancel) btnCancel.addEventListener('click', async () => {
    if (!confirm('このケースを中止しますか？解約や別口座切替で不要になった場合に選んでください。')) return;
    await pushUpsert({ ...c, 状態: '中止', 完了日: todayISO() });
    closeModal();
  });
  document.getElementById('btn-delete').addEventListener('click', async () => {
    if (!confirm(`「${c['利用者名']}」さんのカードを完全に削除しますか？\n履歴も消えて元に戻せません。`)) return;
    await pushDelete(c.id);
    closeModal();
  });
}

// ============================
// 振替日逆算
// ============================
function computeExpectedFurikaeMonth(sendDateStr) {
  // 振替日は毎月27日。電算反映に2週間程度必要なので、当月13日以前送付→当月27日、それ以降→翌月27日。
  // ただし、銀行確認等で実際は翌々月になることが多いので、安全側で送付月翌月を予測値とする。
  const d = new Date(sendDateStr);
  const day = d.getDate();
  const target = new Date(d.getFullYear(), d.getMonth() + (day <= 13 ? 1 : 2), 1);
  return target.getFullYear() + '-' + String(target.getMonth() + 1).padStart(2, '0');
}

// ============================
// 振替不能データ取得（連動表示用）
// ============================
async function fetchFunoLists() {
  if (!FURIKAE_FUNO_GAS) return;  // 設定がない場合はスキップ
  try {
    const res = await fetch(FURIKAE_FUNO_GAS + '?action=list');
    const data = await res.json();
    if (data && data.ok && Array.isArray(data.records)) {
      state.funoRecords = data.records;
    }
  } catch (err) {
    console.error('fetchFunoLists failed:', err);
  }
}

// ============================
// 完了セクション折りたたみ
// ============================
document.getElementById('done-toggle').addEventListener('click', () => {
  const el = document.getElementById('done-cards');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
});

// ============================
// 初期化
// ============================
document.addEventListener('DOMContentLoaded', () => {
  loadFromLocal();
  render();
  fetchFromGAS();
  fetchFunoLists();
});
// タブが見えるたびに再フェッチ（同期4点セットの4: visibilitychange）
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    fetchFromGAS();
    fetchFunoLists();
  }
});

// グローバル公開（モーダル内のonclickから呼ぶため）
window.closeModal = closeModal;
</script>
