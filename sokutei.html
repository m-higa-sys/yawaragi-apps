<title>📏 測定管理（機能訓練）</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif; background: #f0f4f8; min-height: 100vh; padding: 16px; }
h1 { text-align: center; color: #2c3e50; font-size: 1.4em; margin-bottom: 4px; }
.subtitle { text-align: center; color: #7f8c8d; font-size: 0.85em; margin-bottom: 14px; }
.wrap { max-width: 760px; margin: 0 auto; }
.tabs { display: flex; gap: 8px; margin-bottom: 14px; }
.tab-btn { flex: 1; padding: 11px 6px; border: none; border-radius: 10px; background: #fff; color: #546e7a; font-weight: 700; font-size: .9em; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.08); font-family: inherit; }
.tab-btn.active { background: #2c3e50; color: #fff; }
.card { background: #fff; border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; border-left: 6px solid #b0bec5; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.card.b-red { border-left-color: #ef5350; }
.card.b-yellow { border-left-color: #ffa726; }
.card.b-white { border-left-color: #b0bec5; }

.cr { font-size: .76em; color: #607d8b; background: #eceff1; border-radius: 6px; padding: 2px 7px; white-space: nowrap; }
.tag { font-size: .76em; color: #90a4ae; border: 1px solid #cfd8dc; border-radius: 6px; padding: 1px 7px; }

.over { color: #c62828; font-weight: 700; }
.hdr { font-size: .88em; font-weight: 700; color: #455a64; margin: 4px 2px 10px; }
.section-label { font-size: .85em; font-weight: 700; color: #78909c; margin: 16px 0 6px; }
.note { font-size: .78em; color: #90a4ae; margin: 10px 2px 4px; }
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; }
.f-btn { padding: 8px 14px; border: none; border-radius: 999px; background: #fff; color: #546e7a; font-weight: 700; font-size: .82em; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,.08); font-family: inherit; }
.f-btn.active { background: #4272D8; color: #fff; }
.sbar-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
.sbar-row:last-child { border-bottom: none; }
.sbar-name { width: 5.5em; font-size: .85em; font-weight: 700; color: #2c3e50; flex-shrink: 0; }
.sbar-track { flex: 1; min-width: 60px; }
.sbar-fill { height: 12px; border-radius: 0 4px 4px 0; background: #4272D8; }
.sbar-val { width: 6.5em; text-align: right; font-size: .82em; color: #2c3e50; font-weight: 700; flex-shrink: 0; }
.sbar-last { width: 7em; text-align: right; font-size: .76em; color: #90a4ae; flex-shrink: 0; }
#status { text-align: center; color: #7f8c8d; padding: 20px; }
.reload-row { text-align: center; margin: 14px 0 4px; }
.reload-btn { border: none; border-radius: 8px; padding: 8px 18px; font-size: .85em; font-weight: 700; cursor: pointer; background: #eceff1; color: #546e7a; font-family: inherit; }
.rec-btn { margin-left: auto; border: none; border-radius: 8px; padding: 5px 10px; font-size: .78em; font-weight: 700; cursor: pointer; background: #e8f0fe; color: #4272D8; font-family: inherit; white-space: nowrap; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
.modal-box { background: #fff; border-radius: 14px; padding: 20px; width: 100%; max-width: 340px; box-shadow: 0 6px 24px rgba(0,0,0,.2); }
.modal-title { font-weight: 700; color: #2c3e50; font-size: 1.05em; margin-bottom: 6px; }
.modal-name { font-weight: 700; color: #4272D8; font-size: 1.1em; margin-bottom: 14px; }
.modal-label { display: block; font-size: .8em; color: #607d8b; margin: 10px 0 4px; }
.modal-select, .modal-input { width: 100%; padding: 9px 10px; border: 1px solid #cfd8dc; border-radius: 8px; font-size: .95em; font-family: inherit; }
.modal-actions { display: flex; gap: 8px; margin-top: 18px; }
.modal-btn { flex: 1; border: none; border-radius: 8px; padding: 10px; font-size: .9em; font-weight: 700; cursor: pointer; font-family: inherit; }
.modal-btn.cancel { background: #eceff1; color: #546e7a; }
.modal-btn.confirm { background: #4272D8; color: #fff; }
.modal-btn.confirm:disabled { opacity: .6; cursor: default; }
</style>

<body>
<h1>📏 測定管理</h1>
<div class="subtitle">機能訓練 測定の優先度と実施バランス（要介護・要支援等）</div>
<div class="wrap">
  <div class="tabs">
    <button type="button" class="tab-btn active" id="tabbtn1" onclick="showTab(1)">📋 今日の優先</button>
    <button type="button" class="tab-btn" id="tabbtn2" onclick="showTab(2)">👥 全利用者</button>
    <button type="button" class="tab-btn" id="tabbtn3" onclick="showTab(3)">📊 スタッフ%</button>
  </div>
  <div id="status">読み込み中…</div>
  <div id="tab1"></div>
  <div id="tab2" style="display:none"></div>
  <div id="tab3" style="display:none"></div>
  <div class="reload-row"><button type="button" class="reload-btn" onclick="load()">↻ 再読込</button></div>
</div>
<div id="recordModal" class="modal-overlay" style="display:none" onclick="if(event.target===this) closeRecordModal()">
  <div class="modal-box">
    <div class="modal-title">📝 今日測定した</div>
    <div class="modal-name" id="recordModalName"></div>
    <label class="modal-label">測定者</label>
    <select id="recordStaffSelect" class="modal-select"></select>
    <label class="modal-label">メモ（任意）</label>
    <input type="text" id="recordNote" class="modal-input" placeholder="備考があれば">
    <div class="modal-actions">
      <button type="button" class="modal-btn cancel" onclick="closeRecordModal()">キャンセル</button>
      <button type="button" class="modal-btn confirm" id="recordConfirmBtn" onclick="submitRecord()">記録する</button>
    </div>
  </div>
</div>
<script>
const GAS = 'https://script.google.com/macros/s/AKfycbwo1UGxsK1qgmO8IDaqT-inDM0Qgoe_MRvxfKDxHy_gXANi4FwNFlgn2pEanMXVQxsdlw/exec';
// 測定者候補の除外（個訓アプリ MEASURER_EXCLUDE と同値・2026-06-15社長確定）
const MEASURER_EXCLUDE = ['代表', '小野', '林'];
const BADGE_EMOJI = { red: '🔴', yellow: '🟡', white: '⚪' };
const YOUBI_ARR = ['日', '月', '火', '水', '木', '金', '土'];

// ===== 優先度純関数（正本 = my-project/scripts/test-sokutei-priority.js から同一コード転記・1文字も変えない） =====

function sokuteiCycleMonths_(care) {
  return String(care || '').indexOf('要介護') === 0 ? 3 : 4;
}

function sokuteiDueDate_(baseDateStr, care) {
  var y = parseInt(String(baseDateStr).slice(0, 4), 10);
  var m = parseInt(String(baseDateStr).slice(5, 7), 10);
  var d = parseInt(String(baseDateStr).slice(8, 10), 10);
  var add = sokuteiCycleMonths_(care);
  var m0 = (m - 1) + add;               // 0始まり月に加算
  var ny = y + Math.floor(m0 / 12);
  var nm = (m0 % 12) + 1;               // 1-12
  var lastDay = new Date(Date.UTC(ny, nm, 0)).getUTCDate(); // 翌月0日=当月末日
  var nd = d > lastDay ? lastDay : d;
  function pad(n) { return (n < 10 ? '0' : '') + n; }
  return ny + '-' + pad(nm) + '-' + pad(nd);
}

function sokuteiRemaining_(dueDateStr, todayStr) {
  var due = Date.parse(String(dueDateStr) + 'T00:00:00Z');
  var today = Date.parse(String(todayStr) + 'T00:00:00Z');
  return Math.round((due - today) / 86400000);
}

function sokuteiTier_(care, remaining) {
  var kaigo = String(care || '').indexOf('要介護') === 0;
  if (kaigo && remaining < 0) return 0;
  if (kaigo && remaining <= 30) return 1;
  if (!kaigo && remaining < 0) return 2;
  return 3;
}

function sokuteiBadge_(care, remaining) {
  var kaigo = String(care || '').indexOf('要介護') === 0;
  if ((kaigo && remaining < 0) || (remaining >= 0 && remaining <= 7)) return 'red';
  if (remaining <= 30 || (!kaigo && remaining < 0)) return 'yellow';
  return 'white';
}

function sokuteiUsageRate_(months) {
  var s = 0, a = 0;
  for (var i = 0; i < (months || []).length; i++) {
    var sch = Number(months[i].scheduled) || 0;
    if (sch > 0) { s += sch; a += Number(months[i].attended) || 0; }
  }
  return s > 0 ? a / s : 1;
}

function sokuteiRemainingVisits_(daysStr, todayStr) {
  var s = String(daysStr || '');
  var y = parseInt(String(todayStr).slice(0, 4), 10);
  var m = parseInt(String(todayStr).slice(5, 7), 10);
  var d = parseInt(String(todayStr).slice(8, 10), 10);
  var lastDay = new Date(Date.UTC(y, m, 0)).getUTCDate();
  var youbi = ['日', '月', '火', '水', '木', '金', '土'];
  var count = 0;
  for (var day = d + 1; day <= lastDay; day++) {
    var w = new Date(Date.UTC(y, m - 1, day)).getUTCDay();
    if (s.indexOf(youbi[w]) !== -1) count++;
  }
  return count;
}

function sokuteiSort_(rows) {
  var out = [];
  for (var i = 0; i < (rows || []).length; i++) {
    var r = rows[i];
    var c = {};
    for (var k in r) c[k] = r[k];
    c.tier = sokuteiTier_(r.care, r.remaining);
    c.badge = sokuteiBadge_(r.care, r.remaining);
    c.E = Number(r.R) * Number(r.U);
    out.push(c);
  }
  out.sort(function (a, b) {
    if (a.tier !== b.tier) return a.tier - b.tier;
    if (a.E !== b.E) return a.E - b.E;
    var ka = String(a.kana || a.name || ''), kb = String(b.kana || b.name || '');
    return ka < kb ? -1 : ka > kb ? 1 : 0;
  });
  return out;
}

// ===== ユーティリティ =====
function esc(s) { const d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }
function pad2(n) { return (n < 10 ? '0' : '') + n; }
function fmtYMD(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
function todayStr() { return fmtYMD(new Date()); }
// 'YYYY-MM-DD' へ正規化（'2026/6/5'・ISO日時・月だけの 'YYYY-MM'（planStart実測形式・日=01扱い）にも耐える）。解釈不能は ''
function normDate(s) {
  if (s == null) return '';
  const m = String(s).match(/^(\d{4})[\/\-](\d{1,2})(?:[\/\-](\d{1,2}))?/);
  return m ? m[1] + '-' + pad2(+m[2]) + '-' + pad2(m[3] ? +m[3] : 1) : '';
}
// 表示用 'M/D'（年が違えば 'YYYY/M/D'）
function fmtMD(ymd) {
  if (!ymd) return '—';
  const y = +ymd.slice(0, 4), m = +ymd.slice(5, 7), d = +ymd.slice(8, 10);
  return (y === new Date().getFullYear() ? '' : y + '/') + m + '/' + d;
}
function fiscalYear() { const n = new Date(); return (n.getMonth() + 1) >= 4 ? n.getFullYear() : n.getFullYear() - 1; }
// 前月から遡って n ヶ月分の 'YYYY-MM'（昇順・当月は含めない＝月途中の scheduled 歪み回避）
function prevMonthsList(n) {
  const now = new Date(); const list = [];
  for (let i = n; i >= 1; i--) {
    const t = new Date(now.getFullYear(), now.getMonth() - i, 1);
    list.push(t.getFullYear() + '-' + pad2(t.getMonth() + 1));
  }
  return list;
}
// 今日から n ヶ月前の 'YYYY-MM-DD'（月末丸め）
function monthsAgoStr(n) {
  const now = new Date();
  const first = new Date(now.getFullYear(), now.getMonth() - n, 1);
  const lastDay = new Date(first.getFullYear(), first.getMonth() + 1, 0).getDate();
  return first.getFullYear() + '-' + pad2(first.getMonth() + 1) + '-' + pad2(Math.min(now.getDate(), lastDay));
}
// 利用曜日から今日以降の直近該当日 '7/4(金)'（4週先まで探して無ければ '—'）
function nextVisitStr(daysStr, tStr) {
  const s = String(daysStr || '');
  if (!s) return '—';
  const y = +tStr.slice(0, 4), m = +tStr.slice(5, 7), d = +tStr.slice(8, 10);
  for (let i = 0; i < 28; i++) {
    const t = new Date(Date.UTC(y, m - 1, d + i));
    const w = t.getUTCDay();
    if (s.indexOf(YOUBI_ARR[w]) !== -1) return (t.getUTCMonth() + 1) + '/' + t.getUTCDate() + '(' + YOUBI_ARR[w] + ')';
  }
  return '—';
}

// ===== 状態 =====
const state = { today: todayStr(), att: null, usage: null, users: [], records: [], staff: [], shien: [], userList: [], tsushoUsers: [], errs: {} };
function isKaigoCare(care) { return String(care || '').indexOf('要介護') === 0; }
let derived = { rowByName: {} };
let careFilter = 'all';   // タブ2 介護度フィルタ
let periodMonths = 1;     // タブ3 期間（1/2/3ヶ月）
let currentTab = 1;

// ===== 取得（Promise.allSettled・1つ失敗しても他タブは描画 = teirei の safe 精神） =====
async function fetchJson(url) {
  const res = await fetch(url, { redirect: 'follow' });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}
function errMsg(r) {
  if (r.status === 'rejected') return (r.reason && r.reason.message) || String(r.reason);
  return (r.value && (r.value.error || r.value.message)) || '応答形式エラー';
}

async function load() {
  const statusEl = document.getElementById('status');
  statusEl.textContent = '読み込み中…';
  state.errs = {};
  const t = state.today = todayStr();
  const fy = fiscalYear();
  const months = prevMonthsList(3);
  const results = await Promise.allSettled([
    fetchJson(GAS + '?action=attendance&date=' + t + '&t=' + Date.now()),
    fetchJson(GAS + '?action=usage_stats&from=' + months[0] + '&to=' + months[months.length - 1] + '&t=' + Date.now()),
    fetchJson(GAS + '?action=getKeikakushoYear&year=' + fy + '&t=' + Date.now()),
    fetchJson(GAS + '?action=getKeikakushoYear&year=' + (fy + 1) + '&t=' + Date.now()),
    fetchJson(GAS + '?action=getKeikakushoYear&year=' + (fy - 1) + '&t=' + Date.now()),
    fetchJson(GAS + '?action=staff_list&t=' + Date.now()),
    fetchJson(GAS + '?action=getShienSokutei&t=' + Date.now()),
    fetchJson(GAS + '?action=user_list&t=' + Date.now()),
    fetchJson(GAS + '?action=getTsushoPlansYearV2&year=' + fy + '&t=' + Date.now())
  ]);
  // year は暦年のため、4月以降に前暦年の測定レコードが漏れないよう fy−1 も含めた3年分をマージ（GAS側 year 厳密一致・重複二重計上なし）
  const att = results[0], usage = results[1], years = [results[2], results[3], results[4]], staff = results[5];
  const shien = results[6], userList = results[7], tsushoUsers = results[8];
  if (att.status === 'fulfilled' && att.value && att.value.success && att.value.attendance) state.att = att.value;
  else { state.att = null; state.errs.att = errMsg(att); }
  if (usage.status === 'fulfilled' && usage.value && usage.value.success && usage.value.usageStats) state.usage = usage.value.usageStats;
  else { state.usage = null; state.errs.usage = errMsg(usage); }
  const okYears = years.filter(r => r.status === 'fulfilled' && r.value && r.value.ok);
  state.users = [];
  for (let i = 0; i < okYears.length; i++) {   // users は fy → fy+1 → fy−1 の優先順で最初に取れた年のもの
    if ((okYears[i].value.users || []).length) { state.users = okYears[i].value.users; break; }
  }
  state.records = [];
  okYears.forEach(r => { state.records = state.records.concat(r.value.records || []); });
  if (!okYears.length) state.errs.year = errMsg(years[0]);
  if (staff.status === 'fulfilled' && staff.value && Array.isArray(staff.value.staff)) state.staff = staff.value.staff;
  else { state.staff = []; state.errs.staff = errMsg(staff); }
  if (shien.status === 'fulfilled' && shien.value && shien.value.ok) state.shien = shien.value.records || [];
  else { state.shien = []; state.errs.shien = errMsg(shien); }
  if (userList.status === 'fulfilled' && userList.value && userList.value.success) state.userList = userList.value.user_list || [];
  else { state.userList = []; state.errs.userList = errMsg(userList); }
  if (tsushoUsers.status === 'fulfilled' && tsushoUsers.value && tsushoUsers.value.ok) state.tsushoUsers = tsushoUsers.value.users || [];
  else { state.tsushoUsers = []; state.errs.tsushoUsers = errMsg(tsushoUsers); }
  buildDerived();
  statusEl.textContent = '';
  renderAll();
}

// ===== 共通計算（利用者ごとの行モデル） =====
function buildDerived() {
  const t = state.today;
  const usageByName = {};
  if (state.usage) (state.usage.users || []).forEach(u => { usageByName[u.name] = u; });
  // 前回測定日（要介護）= 個別機能訓練計画書記録の最新 sokutei_date（userIdキー結合・台帳で氏名を直しても履歴が切れない）
  const lastById = {};
  (state.records || []).forEach(r => {
    const d = normDate(r.sokutei_date);
    if (!d || !r.userId) return;
    if (!lastById[r.userId] || d > lastById[r.userId]) lastById[r.userId] = d;
  });
  // 前回測定日（要支援・事業対象者）= 要支援測定記録の最新 sokutei_date（nameキー結合・Phase B）
  const lastShien = {};
  (state.shien || []).forEach(r => {
    const d = normDate(r.sokutei_date);
    if (!d || !r.name) return;
    if (!lastShien[r.name] || d > lastShien[r.name]) lastShien[r.name] = d;
  });
  const daysByName = {};
  (state.userList || []).forEach(u => { if (u.userName) daysByName[u.userName] = u.days; });
  const attCare = {};
  if (state.att) ['am', 'pm'].forEach(k => (state.att.attendance[k] || []).forEach(a => { if (a.care) attCare[a.name] = a.care; }));
  const monthKeys = prevMonthsList(3);
  const rowByName = {};

  // last = 実測定日（無ければ空）／ baseFallback = 実測定日が無い時だけ使う起点（要介護のplanStartのみ・要支援は無し）
  function buildRow(name, care, kana, weekdaysRaw, last, baseFallback) {
    const uu = usageByName[name];
    const weekdays = (uu && uu.weekdaysRaw) || weekdaysRaw || '';
    const monthsArr = [];
    if (uu && uu.monthly) monthKeys.forEach(mk => {
      const mo = uu.monthly[mk];
      if (mo) {
        const sch = Number(mo.scheduled) || 0;
        monthsArr.push({ scheduled: sch, attended: sch - (Number(mo.absences) || 0) });  // 出席 = 予定 − 欠席（推定）
      }
    });
    const base = last || baseFallback || '';
    let due = '', remaining = -999;   // どちらも無ければ未測定 = 最優先扱い
    if (base) { due = sokuteiDueDate_(base, care); remaining = sokuteiRemaining_(due, t); }
    rowByName[name] = {
      name: name, kana: kana || '', care: care,
      remaining: remaining, R: sokuteiRemainingVisits_(weekdays, t), U: sokuteiUsageRate_(monthsArr),
      last: last, base: base, due: due, unmeasured: !base, weekdays: weekdays
    };
  }

  // 要介護（個別機能訓練計画書対象・getKeikakushoYear）
  (state.users || []).forEach(u => {
    const care = u.category || attCare[u.name] || '';
    buildRow(u.name, care, u.furigana, u.days, lastById[u.userId] || '', normDate(u.planStart));
  });
  // 要支援・事業対象者（getTsushoPlansYearV2の対象者から要介護以外を抽出・Phase B）
  (state.tsushoUsers || []).forEach(u => {
    if (u.cancelled || isKaigoCare(u.category) || rowByName[u.name]) return;
    buildRow(u.name, u.category || '', u.furigana, daysByName[u.name] || '', lastShien[u.name] || '', '');
  });
  derived = { rowByName: rowByName };
}

// ===== 描画共通 =====
function errCard(label, msg) {
  return '<div class="card b-red"><div class="meta">⚠ ' + esc(label) + ' の取得に失敗しました' + (msg ? '：' + esc(msg) : '') + '（↻再読込を試してください）</div></div>';
}
function lastLabel(r) {
  if (r.last) return fmtMD(r.last);
  if (r.base) return 'なし（開始日 ' + fmtMD(r.base) + ' 起点）';
  return 'なし（記録なし）';
}
function rowCard(r, gray, tag, nextVisit) {
  let remainHtml;
  if (r.unmeasured) remainHtml = '<span class="over">⚠️未測定（最優先）</span>';
  else if (r.remaining < 0) remainHtml = '<span class="over">⚠️超過 ' + (-r.remaining) + '日</span>';
  else remainHtml = '期限まで残り ' + r.remaining + '日';
  // 記録ボタンは要支援・事業対象者のみ（要介護は個訓アプリ側で記録するため出さない・Phase B）
  const recBtn = !isKaigoCare(r.care)
    ? '<button type="button" class="rec-btn" data-name="' + esc(r.name) + '" onclick="openRecordModal(this.dataset.name)">📝今日測定した</button>'
    : '';
  return '<div class="card b-' + r.badge + (gray ? ' gray' : '') + '">'
    + '<div class="rowline">'
    + '<span class="bdg">' + BADGE_EMOJI[r.badge] + '</span>'
    + '<span class="nm">' + esc(r.name) + '</span>'
    + '<span class="cr">' + esc(r.care || '介護度不明') + '</span>'
    + (tag ? '<span class="tag">' + esc(tag) + '</span>' : '')
    + recBtn
    + '</div>'
    + '<div class="meta">前回測定 ' + esc(lastLabel(r)) + ' ／ ' + remainHtml
    + ' ／ 今月あと約' + r.E.toFixed(1) + '回'
    + (nextVisit ? ' ／ 次回来館 ' + esc(nextVisit) : '')
    + '</div></div>';
}
function showTab(n) {
  currentTab = n;
  for (let i = 1; i <= 3; i++) {
    document.getElementById('tab' + i).style.display = (i === n) ? '' : 'none';
    document.getElementById('tabbtn' + i).classList.toggle('active', i === n);
  }
}
function renderAll() { renderTab1(); renderTab2(); renderTab3(); }

// ===== タブ1: 今日の測定優先リスト =====
function renderTab1() {
  const el = document.getElementById('tab1');
  if (!state.att) { el.innerHTML = errCard('今日の来館予定（attendance）', state.errs.att); return; }
  if (!state.users.length) { el.innerHTML = errCard('個訓対象者（getKeikakushoYear）', state.errs.year); return; }
  // am+pm を名前で一意化（どちらかで出席なら出席扱い）
  const seen = {}; const list = [];
  ['am', 'pm'].forEach(k => (state.att.attendance[k] || []).forEach(a => {
    if (seen[a.name]) { if (a.status === '出席') seen[a.name].status = '出席'; return; }
    const c = { name: a.name, status: a.status };
    seen[a.name] = c; list.push(c);
  }));
  const rowsOf = arr => arr.map(a => derived.rowByName[a.name]).filter(Boolean);  // 測定対象（要介護個訓＋要支援等）に居る人のみ
  const present = list.filter(a => a.status === '出席');
  const presentRows = sokuteiSort_(rowsOf(present));
  const main = presentRows.filter(r => !(r.tier === 3 && r.remaining > 30));
  const doneRows = presentRows.filter(r => r.tier === 3 && r.remaining > 30);
  const absentRows = sokuteiSort_(rowsOf(list.filter(a => a.status !== '出席')));
  let html = '<div class="hdr">' + esc(fmtMD(state.today)) + '・来館予定' + present.length + '名中 対象' + presentRows.length + '名</div>';
  if (state.errs.usage) html += '<div class="note">⚠ 利用率（usage_stats）取得失敗のため E は残り回数のみで計算しています</div>';
  if (!main.length) html += '<div class="card"><div class="meta">今日の優先測定対象はいません</div></div>';
  main.forEach(r => { html += rowCard(r, false, '', ''); });
  if (doneRows.length) {
    html += '<div class="section-label">✅ 当サイクル測定済み・余裕（' + doneRows.length + '名）</div>';
    doneRows.forEach(r => { html += rowCard(r, true, r.last ? '測定済' : '余裕', ''); });
  }
  if (absentRows.length) {
    html += '<div class="section-label">🚫 本日欠席（' + absentRows.length + '名）</div>';
    absentRows.forEach(r => { html += rowCard(r, true, '欠席', ''); });
  }
  el.innerHTML = html;
}

// ===== タブ2: 全利用者 期限順 =====
function setCareFilter(v) { careFilter = v; renderTab2(); }
function renderTab2() {
  const el = document.getElementById('tab2');
  if (!state.users.length) { el.innerHTML = errCard('個訓対象者（getKeikakushoYear）', state.errs.year); return; }
  const all = [];
  Object.keys(derived.rowByName).forEach(n => all.push(derived.rowByName[n]));
  // sokuteiSort_ は badge/tier/E 付与に流用し、タブ2の並びは期限（remaining）昇順・同値はkana順（設計書§4-2）。未測定=-999 が自然に最上位
  const decorated = sokuteiSort_(all);
  decorated.sort((a, b) => {
    if (a.remaining !== b.remaining) return a.remaining - b.remaining;
    const ka = String(a.kana || a.name || ''), kb = String(b.kana || b.name || '');
    return ka < kb ? -1 : ka > kb ? 1 : 0;
  });
  const rows = decorated.filter(r => {
    if (careFilter === 'kaigo') return String(r.care).indexOf('要介護') === 0;
    if (careFilter === 'shien') return String(r.care).indexOf('要介護') !== 0;
    return true;
  });
  const fb = (v, label) => '<button type="button" class="f-btn' + (careFilter === v ? ' active' : '') + '" onclick="setCareFilter(\'' + v + '\')">' + label + '</button>';
  let html = '<div class="filter-row">' + fb('all', '全て') + fb('kaigo', '要介護のみ') + fb('shien', '要支援等') + '</div>';
  html += '<div class="hdr">対象 ' + rows.length + '名（期限が近い順）</div>';
  rows.forEach(r => { html += rowCard(r, false, '', nextVisitStr(r.weekdays, state.today)); });
  el.innerHTML = html;
}

// ===== タブ3: スタッフ別実施バランス =====
function setPeriod(n) { periodMonths = n; renderTab3(); }
function renderTab3() {
  const el = document.getElementById('tab3');
  if (!state.records.length && state.errs.year) { el.innerHTML = errCard('測定記録（getKeikakushoYear）', state.errs.year); return; }
  const t = state.today;
  const cutoff = monthsAgoStr(periodMonths);
  const counts = {}, lastBy = {};
  let totalPeriod = 0;   // シェア%の分母 = 期間内総測定件数
  // 要支援等は 'app'（実測定）のみ集計対象。'paper'（紙台帳投入・測定者不明・日付は月初仮置き）は
  // 実施バランス分析の対象外＝件数に含めない（含めると誰にも属さない件数で総数だけ膨らむ）。
  const allRecords = (state.records || []).concat((state.shien || []).filter(r => r.source !== 'paper'));
  allRecords.forEach(r => {
    const d = normDate(r.sokutei_date);
    if (!d) return;
    const inPeriod = d >= cutoff && d <= t;
    if (inPeriod) totalPeriod++;
    const by = String(r.sokutei_by || '').trim();
    if (!by) return;
    if (!lastBy[by] || d > lastBy[by]) lastBy[by] = d;   // 最終測定日は期間外も含む全期間
    if (inPeriod) counts[by] = (counts[by] || 0) + 1;
  });
  // 表示対象 = staff_list − 除外3名（0件も全員）＋ records にだけ現れる測定者
  const names = (state.staff || []).filter(s => MEASURER_EXCLUDE.indexOf(s) < 0);
  Object.keys(counts).forEach(n => { if (names.indexOf(n) < 0 && MEASURER_EXCLUDE.indexOf(n) < 0) names.push(n); });
  const rows = names.map(n => ({ name: n, count: counts[n] || 0, last: lastBy[n] || '' }));
  rows.sort((a, b) => (b.count - a.count) || (a.name < b.name ? -1 : a.name > b.name ? 1 : 0));
  const max = rows.reduce((m, r) => Math.max(m, r.count), 0);
  const pb = n => '<button type="button" class="f-btn' + (periodMonths === n ? ' active' : '') + '" onclick="setPeriod(' + n + ')">' + n + 'ヶ月</button>';
  let html = '<div class="filter-row">' + pb(1) + pb(2) + pb(3) + '</div>';
  html += '<div class="hdr">' + esc(fmtMD(cutoff)) + '〜' + esc(fmtMD(t)) + '・総測定 ' + totalPeriod + '件</div>';
  if (state.errs.staff) html += '<div class="note">⚠ スタッフ一覧（staff_list）取得失敗のため records に現れる測定者のみ表示しています</div>';
  html += '<div class="card">';
  if (!rows.length) html += '<div class="meta">表示できるスタッフがいません</div>';
  rows.forEach(r => {
    const pct = totalPeriod > 0 ? Math.round(r.count / totalPeriod * 100) : 0;
    const w = max > 0 ? Math.max(r.count / max * 100, r.count > 0 ? 2 : 0) : 0;
    html += '<div class="sbar-row">'
      + '<div class="sbar-name">' + esc(r.name) + '</div>'
      + '<div class="sbar-track"><div class="sbar-fill" style="width:' + w + '%"></div></div>'
      + '<div class="sbar-val">' + r.count + '件 (' + pct + '%)</div>'
      + '<div class="sbar-last">' + (r.last ? '最終 ' + esc(fmtMD(r.last)) : '—') + '</div>'
      + '</div>';
  });
  html += '</div><div class="note">※データ起点 2026/6/15（Phase1開始）</div>';
  el.innerHTML = html;
}

// ===== 要支援等「今日測定した」ワンタップ記録（Phase B） =====
let recordTargetName = '';
function openRecordModal(name) {
  recordTargetName = name;
  document.getElementById('recordModalName').textContent = name;
  const sel = document.getElementById('recordStaffSelect');
  const names = (state.staff || []).filter(s => MEASURER_EXCLUDE.indexOf(s) < 0);
  sel.innerHTML = names.map(n => '<option value="' + esc(n) + '">' + esc(n) + '</option>').join('');
  document.getElementById('recordNote').value = '';
  document.getElementById('recordModal').style.display = 'flex';
}
function closeRecordModal() {
  document.getElementById('recordModal').style.display = 'none';
  recordTargetName = '';
}
async function submitRecord() {
  const name = recordTargetName;
  const by = document.getElementById('recordStaffSelect').value;
  const note = document.getElementById('recordNote').value.trim();
  if (!name || !by) return;
  const btn = document.getElementById('recordConfirmBtn');
  btn.disabled = true; btn.textContent = '記録中…';
  try {
    const url = GAS + '?action=addShienSokutei&name=' + encodeURIComponent(name)
      + '&date=' + todayStr() + '&by=' + encodeURIComponent(by)
      + '&note=' + encodeURIComponent(note) + '&t=' + Date.now();
    const res = await fetchJson(url);
    if (!res.ok || !res.verified) throw new Error((res && res.error) || '書き込み検証に失敗しました');
    state.shien.push(res.row);
    closeRecordModal();
    buildDerived();
    renderAll();
  } catch (err) {
    alert('記録に失敗しました：' + ((err && err.message) || err));
  } finally {
    btn.disabled = false; btn.textContent = '記録する';
  }
}

load();
