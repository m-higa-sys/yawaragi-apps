  /* ===== 注意事項バナー（要注意フラグが立ってる事例を上部表示） ===== */

<div class="no-print" style="margin-bottom:12px;">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ============ Excel取込（ドラッグ＆ドロップ） ============
const ERROR_CODE_MAP = {
  '0': null,
  '1': '残高不足',
  '2': '預金取引なし',
  '3': '振替停止（預金者都合）',
  '4': '預金口座振替依頼書なし',
  '8': '振替停止（委託者都合）',
  '9': 'その他'
};

// 直近の取込で検知した「翌月合算の回収済候補」（過去の未回収×今月成功）。承認パネルに表示。
let _fnkCandidates = [];

function setupDropZone() {
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) processExcelFile(file);
  });
}

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (file) processExcelFile(file);
  event.target.value = '';
}

function processExcelFile(file) {
  const resultDiv = document.getElementById('importResult');

  // ファイル名から引落月を推定（20260327_kekka.xls → 2026-03）
  const match = file.name.match(/(\d{4})(\d{2})(\d{2})/);
  let hikiotoshiMonth = '';
  let hikiotoshiDate = '';
  if (match) {
    hikiotoshiMonth = `${match[1]}-${match[2]}`;
    hikiotoshiDate = `${match[1]}-${match[2]}-${match[3]}`;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const workbook = XLSX.read(e.target.result, { type: 'binary' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

      if (rows.length < 2) {
        showImportResult('データが見つかりませんでした', true);
        return;
      }

      // 1行目はヘッダー、2行目以降がデータ
      const dataRows = rows.slice(1);
      const funou = [];
      const okCustomerIds = []; // 今月正常に振替できた顧客番号（過去不能の翌月合算・回収済候補の検知に使う）

      dataRows.forEach(row => {
        if (!row || row.length < 10) return;
        // 振替結果コードは「0-振替済み」等の連結形式・素の「2」両対応。split('-')[0]で先頭数字を取る
        const rawCode = String(row[9] || '0').trim();
        const resultCode = fnkExtractResultCode(rawCode) || '0';
        const okId = String(parseInt(row[7]) || row[7] || '').trim();
        if (resultCode === '0') { if (okId) okCustomerIds.push(okId); return; } // 成功＝不能台帳に載せない（成功分は管理しない）

        const reason = ERROR_CODE_MAP[resultCode] || 'その他（コード:' + rawCode + '）';
        funou.push({
          bank: String(row[1] || '').trim(),
          branch: String(row[8] || '').trim(),
          accountType: String(row[3] || '').trim(),
          account: String(row[4] || '').trim(),
          name: String(row[5] || '').trim(),
          amount: parseInt(row[6]) || 0,
          customerId: String(parseInt(row[7]) || row[7] || '').trim(),
          reason: reason,
          resultCode: resultCode
        });
      });

      if (funou.length === 0) {
        showImportResult(`✅ 振替不能は0件でした！（全${dataRows.length}件が正常振替）`, false);
        return;
      }

      // 月を決定（ファイル名から取れない場合はプロンプト）
      let month = hikiotoshiMonth;
      if (!month) {
        month = prompt('引落月を入力してください（例: 2026-03）');
        if (!month) return;
      }

      // 重複チェック（同月・同顧客番号）
      const existingIds = data.records
        .filter(r => r.month === month)
        .map(r => r.customerId);

      const newRecords = [];
      let skipCount = 0;

      funou.forEach((f, i) => {
        if (existingIds.includes(f.customerId)) {
          skipCount++;
          return;
        }
        newRecords.push({
          id: data.nextId++,
          month: month,
          hikiotoshiDate: hikiotoshiDate,
          no: String(i + 1).padStart(5, '0'),
          name: f.name,
          bank: f.bank,
          branch: f.branch,
          account: f.account,
          amount: f.amount,
          customerId: f.customerId,
          reason: f.reason,
          detailReason: '',
          status: '未対応',
          memo: '',
          formSentDate: '',
          expectedStartMonth: '',
          createdAt: new Date().toISOString().split('T')[0]
        });
      });

      // 翌月合算の回収済候補：過去の未回収レコードのうち、今月正常振替できた顧客番号に一致する行
      // （自動確定はしない・§4-4。承認パネルで社長が一括承認して回収済にする）
      _fnkCandidates = fnkGoushanCandidates(data.records, month, okCustomerIds);

      if (newRecords.length > 0) {
        data.records.push(...newRecords);
        saveData(data);
      }

      // 表示を更新（取込月に切替）
      initMonthSelect();
      document.getElementById('monthSelect').value = month;
      renderMonth();
      fnkScheduleNotify(month); // 取込後の要対応件数を伝達ボードへ

      let msg;
      if (newRecords.length === 0) {
        msg = skipCount > 0
          ? `この月のデータは既に登録済みです（${skipCount}件スキップ）`
          : `✅ 新規の振替不能はありませんでした（${month}）`;
      } else {
        msg = `📥 ${newRecords.length}件の振替不能を取り込みました（${month}）`;
        if (skipCount > 0) msg += `\n（${skipCount}件は登録済みのためスキップ）`;
      }
      if (_fnkCandidates.length > 0) {
        msg += `\n🎉 過去の不能から今月引落成功が ${_fnkCandidates.length}件 見つかりました（下の承認パネルで確認）`;
      }
      showImportResult(msg, false);

    } catch (err) {
      showImportResult('ファイルの読み込みに失敗しました: ' + err.message, true);
    }
  };
  reader.readAsBinaryString(file);
}

function showImportResult(msg, isError) {
  const div = document.getElementById('importResult');
  div.textContent = msg;
  div.style.whiteSpace = 'pre-line';
  div.className = 'import-result' + (isError ? ' error' : '');
  div.style.display = 'block';
  setTimeout(() => { div.style.display = 'none'; }, 15000);
}

// ============ クラウド同期 ============
// ⚠️ ここにApps ScriptのデプロイURLを貼り付け
const SYNC_URL = 'https://script.google.com/macros/s/AKfycbwT5wX9EsPnE6tQEPMIAzojDfb6YpxthVxlkX7t7B2phfFKkV5btF5dkXEtjEQDwfgr7A/exec';
let _syncTimer = null;
let _isSyncing = false;
let _initialLoadDone = false;

// ===== 本番オリジン書込ブロック（2026-07-05・genba 2026-07-03 荒谷4件対策の移植）=====
// localStorage も GAS 同期もオリジン単位。検証用URL(file://・localhost・別host)から本番GASへ
// 書き込めてしまう事故（genba で発生）を furikae でも構造的に断つ。furikae の書込POSTは
// cloudSync 1本に集約されるため、その先頭でガードすれば全書込（取込・消込・更新）を遮断できる。
// 本番オリジン完全一致以外は書込不可（判定不能＝例外時も安全側=不可）。
// テスト: scripts/test-furikae-origin-guard.js（純関数+単一ファネルの構造証明）
const PROD_ORIGIN = 'https://m-higa-sys.github.io';
const PROD_URL = 'https://m-higa-sys.github.io/yawaragi-apps/furikae.html';

function fnkIsProdWriteAllowed(origin) {
  try { return String(origin) === PROD_ORIGIN; } catch (e) { return false; }
}

// 別オリジンで開いている事実を常設バナーで知らせる（入力・操作前に気づけるよう）
function fnkCheckProductionOrigin() {
  try {
    const el = document.getElementById('origin-warn');
    if (!el) return;
    if (fnkIsProdWriteAllowed(location.origin)) { el.style.display = 'none'; return; }
    el.innerHTML = '⚠ 本番URL以外で開いています。取込・消込は保存されません。<br>'
      + '正しいURL: <a href="' + PROD_URL + '" style="color:#c53030;">' + PROD_URL + '</a>';
    el.style.display = 'block';
  } catch (e) { /* バナー表示失敗は致命でない（POST層ガードが最終防衛）*/ }
}

// 書込ブロック時の利用者向け通知（バナー表示に集約）。テストでは差し替えて発火回数を検証。
function fnkOriginNotice() {
  fnkCheckProductionOrigin();
}

// 書込POST共通ゲート。書込ファネル cloudSync の先頭で呼ぶ。false なら送信せず抜ける。
// 通知は3秒デバウンス（自動同期の連発でバナー再描画を暴発させない）。
let _fnkGuardNoticeAt = 0;
function fnkGuardProdWrite(label) {
  let ok = false;
  try { ok = fnkIsProdWriteAllowed(location.origin); } catch (e) { ok = false; }
  if (!ok) {
    try {
      const now = Date.now();
      if (now - _fnkGuardNoticeAt > 3000) {
        _fnkGuardNoticeAt = now;
        fnkOriginNotice();
      }
    } catch (e) {}
    try { console.warn('[originガード] 書込ブロック: ' + (label || '')); } catch (e) {}
  }
  return ok;
}

function cloudSync() {
  if (!fnkGuardProdWrite('クラウド同期')) return; // 別オリジンからの本番書込を構造的に遮断
  if (!SYNC_URL || SYNC_URL.indexOf('__') === 0) return; // URL未設定
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function() {
    if (_isSyncing) return;
    _isSyncing = true;
    try {
      const payload = JSON.stringify({
        type: 'furikae',
        data: { records: data.records, nextId: data.nextId }
      });
      fetch(SYNC_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: payload
      }).then(function() { _isSyncing = false; })
        .catch(function() { _isSyncing = false; });
    } catch(e) { _isSyncing = false; }
  }, 2000);
}

// ===== 伝達ボード通知（件数のみ・冪等更新＋締め）2026-07-06 =====
// 当月1メッセージを upsert（キー furikae-funou-YYYY-MM）。件数変化のたびに本文を置換し、
// 0件（全件回収）で締め＝削除。氏名・金額・理由は一切出さない（件数のみ）。
// ★これは書込POST（第2の送信経路）。fnkGuardProdWrite を必ず通す（tripwire維持・SENDERSに追加済）。
const DENGON_API_URL = 'https://script.google.com/macros/s/AKfycbwo1UGxsK1qgmO8IDaqT-inDM0Qgoe_MRvxfKDxHy_gXANi4FwNFlgn2pEanMXVQxsdlw/exec';
let _fnkNotifyTimer = null;

// 通知本文（件数のみ）。0件は空文字＝締め（削除）のシグナル。
function fnkNoticeBody(count) {
  return count > 0 ? ('振替不能・要対応あり（' + count + '件）') : '';
}

function fnkNotifyBoard(month) {
  if (!fnkGuardProdWrite('伝達ボード通知')) return; // 別オリジンからの本番書込を遮断
  if (!month) return;
  const count = fnkActionableCount(data.records, month);
  const payload = { action: 'upsert_furikae_notice', key: 'furikae-funou-' + month, body: fnkNoticeBody(count) };
  try {
    fetch(DENGON_API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).catch(function() {});
  } catch (e) {}
}

// 連続操作（取込直後の複数消込など）でボード通知を暴発させない 1.5秒デバウンス
function fnkScheduleNotify(month) {
  if (_fnkNotifyTimer) clearTimeout(_fnkNotifyTimer);
  _fnkNotifyTimer = setTimeout(function() { fnkNotifyBoard(month); }, 1500);
}

function cloudLoad() {
  if (!SYNC_URL || SYNC_URL.indexOf('__') === 0) return; // URL未設定
  try {
    const script = document.createElement('script');
    const cbName = '_furikaeCb_' + Date.now();
    let loaded = false;
    window[cbName] = function(cloud) {
      loaded = true;
      if (cloud && cloud.records && cloud.records.length > 0) {
        // クラウドにデータあり → 取り込む
        data.records = cloud.records;
        if (cloud.nextId) data.nextId = cloud.nextId;
        // detailReason マイグレーション
        data.records.forEach(function(r) {
          if (r.detailReason === undefined) r.detailReason = '';
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        initMonthSelect();
        renderMonth();
      } else if (data.records && data.records.length > 0 && !_initialLoadDone) {
        // クラウドが空でローカルにデータあり → 初回プッシュ
        cloudSync();
      }
      _initialLoadDone = true;
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    };
    script.src = SYNC_URL + '?action=getFurikae&callback=' + cbName + '&t=' + Date.now();
    script.onerror = function() {
      if (!loaded) { delete window[cbName]; }
      if (script.parentNode) script.parentNode.removeChild(script);
    };
    document.head.appendChild(script);
  } catch(e) { console.warn('☁️ クラウド取得エラー:', e); }
}

// ============ 自動更新（30秒ごと＋画面復帰時） ============
let _autoRefreshTimer = null;
function startAutoRefresh() {
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(function() {
    if (document.hidden || _isSyncing) return;
    cloudLoad();
  }, 30000);
}
document.addEventListener('visibilitychange', function() {
  if (!document.hidden && !_isSyncing) cloudLoad();
});

// ============ データ管理 ============
const STORAGE_KEY = 'yawaragi_furikae_funou';

    if (parsed.records) {
      parsed.records.forEach(r => {
        if (r.detailReason === undefined) r.detailReason = '';
      });

  // 初期データ: 2026年2月分（2/27引落）
  return {

        id: 1,

        createdAt: '2026-03-08'
      },
      {
        id: 2,
        month: '2026-02',
        hikiotoshiDate: '2026-02-27',
        no: '00102',
        name: '',
        bank: 'ゆうちょ銀行',
        branch: '038',
        account: '0383281',
        amount: 741,
        customerId: '151',
        reason: '預金取引なし',
        status: '未対応',
        memo: '新規',
        createdAt: '2026-03-08'
      },
      {
        id: 3,
        month: '2026-02',
        hikiotoshiDate: '2026-02-27',
        no: '00103',
        name: '',
        bank: '東和銀行',
        branch: '東松山',
        account: '0394904',
        amount: 552,
        customerId: '152',
        reason: '預金口座振替依頼書なし',

      }
    ],

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  cloudSync();
}

let data = loadData();

// ============ 月選択 ============
function getMonths() {
  const months = [...new Set(data.records.map(r => r.month))];
  months.sort().reverse();
  if (months.length === 0) months.push('2026-02');
  return months;
}

function initMonthSelect() {
  const sel = document.getElementById('monthSelect');
  const months = getMonths();
  sel.innerHTML = months.map(m => {
    const [y, mo] = m.split('-');
    return `<option value="${m}">${y}年${parseInt(mo)}月分</option>`;
  }).join('');
}

// ===== 振替不能トラッカー 純関数（分類・未回収・集計・翌月合算候補）2026-07-06 =====
// テスト: scripts/test-furikae-tracker.js
// 結果コード抽出。電算xlsは "0-振替済み" 連結・素の "2" 両対応。split('-')[0] で先頭トークンの
// 数字だけ取る（旧 match(/\d/)[0] は "10-…" を "1" に化けさせるバグ→修正）。
function fnkExtractResultCode(raw) {
  if (raw === null || raw === undefined) return '';
  const head = String(raw).trim().split('-')[0];
  return head.replace(/[^0-9]/g, '');
}

// 3色バッジ分類。コード優先、無ければ理由テキストから推定、不明は🔴要確認で必ず表面化。
// 🔴要電話確認(2取引なし/3停止預金者/8委託者/9その他) 🟠要依頼書再送(4依頼書なし) ⚪翌月合算予定(1残高不足)
function fnkBadgeFor(rec) {
  rec = rec || {};
  let code = rec.resultCode ? fnkExtractResultCode(rec.resultCode) : '';
  if (!code) {
    const t = String(rec.reason || '');
    if (t.indexOf('残高') >= 0) code = '1';
    else if (t.indexOf('依頼書') >= 0 || t.indexOf('印鑑') >= 0 || t.indexOf('相違') >= 0) code = '4';
    else if (t.indexOf('取引なし') >= 0 || t.indexOf('解約') >= 0) code = '2';
    else if (t.indexOf('停止') >= 0) code = '3';
    else if (t.indexOf('その他') >= 0) code = '9';
  }
  if (code === '1') return { code: '1', key: 'white', mark: '⚪', label: '翌月合算予定' };
  if (code === '4') return { code: '4', key: 'orange', mark: '🟠', label: '要依頼書再送' };
  if (code === '2' || code === '3' || code === '8' || code === '9') return { code: code, key: 'red', mark: '🔴', label: '要電話確認' };
  return { code: code || '?', key: 'red', mark: '🔴', label: '要確認' };
}

// 未回収判定（終わるまで方式：回収済フラグ/resolvedMonthでのみ消える・日付では消えない）
function fnkIsUnpaid(rec) {
  if (!rec) return false;
  if (rec.resolvedMonth) return false;
  return rec.status !== '回収済';
}

// 月別サマリー（未回収のみ・件数/合計）
function fnkMonthSummary(records, month) {
  const list = (records || []).filter(function (r) { return r.month === month && fnkIsUnpaid(r); });
  return { count: list.length, total: list.reduce(function (s, r) { return s + (r.amount || 0); }, 0) };
}

// 翌月合算の自動消込候補：過去の未回収レコードのうち、今月Excelで成功した顧客番号に一致する行
function fnkGoushanCandidates(records, month, okCustomerIds) {
  const ids = okCustomerIds || [];
  return (records || []).filter(function (r) {
    return r.month !== month && fnkIsUnpaid(r) && r.customerId && ids.indexOf(String(r.customerId)) >= 0;
  });
}

// 伝達ボード通知に出す「要対応」件数：当月の未回収のうち 🔴🟠 のみ（⚪翌月合算予定は放置可＝数えない）
function fnkActionableCount(records, month) {
  return (records || []).filter(function (r) {
    return r.month === month && fnkIsUnpaid(r) && fnkBadgeFor(r).key !== 'white';
  }).length;
}

// ============ 描画 ============
function renderMonth() {
  const month = document.getElementById('monthSelect').value;
  const monthRecords = data.records.filter(r => r.month === month);
  const unpaid = monthRecords.filter(fnkIsUnpaid);
  const summary = fnkMonthSummary(data.records, month);
  const mmLabel = month ? parseInt(month.split('-')[1]) + '月分' : '';

  // ① 集計ヘッダ（未回収のみ）
  document.getElementById('summaryCards').innerHTML =
    summary.count === 0
      ? `<div class="fnk-head fnk-head-zero">✓ ${mmLabel} 未回収の振替不能はありません</div>`
      : `<div class="fnk-head">
           <span class="fnk-head-count">未回収 <b>${summary.count}</b>件</span>
           <span class="fnk-head-amt">¥${summary.total.toLocaleString()}</span>
           <span class="fnk-head-mon">${mmLabel}</span>
         </div>`;

  // ② 未回収カード（既定はこれだけ・回収済/成功は出さない）
  const list = document.getElementById('cardList');
  if (list) {
    if (unpaid.length === 0) {
      list.innerHTML = monthRecords.length === 0
        ? `<div class="fnk-empty">この月の取込データはありません。上の「📂 結果Excelを取込」から入れてください。</div>`
        : `<div class="fnk-done">🎉 ${mmLabel}は全て回収済みです</div>`;
    } else {
      list.innerHTML = unpaid.map(fnkCardHtml).join('');
    }
  }

  // ③ 翌月合算の回収済候補（承認パネル）／④ 今月回収済フッタ（取消用）
  renderCandidatePanel(month);
  renderCollectedFooter(month);
}

// 1枚の未回収カード（氏名/△月分/金額/理由/状態バッジ/[回収済]・行タップで詳細）

  const b = fnkBadgeFor(r);
  const mm = r.month ? parseInt(r.month.split('-')[1]) + '月分' : '';
  const hint = b.key === 'white' ? '今は放置でOK（翌月に合算）'
             : b.key === 'orange' ? '依頼書を再送 → 送付日を記録'
             : '電話で口座の生存・意向を確認';
  const expected = r.expectedStartDate || r.expectedStartMonth || '';
  return `
  <div class="fnk-card fnk-b-${b.key}" data-id="${r.id}">
    <div class="fnk-row" onclick="fnkToggleDetail(${r.id})">
      <span class="fnk-badge">${b.mark}</span>
      <span class="fnk-name">${escapeHtml(r.name) || '(名前なし)'}${fubiHistoryBadge(r)}</span>
      <span class="fnk-mon">${mm}</span>
      <span class="fnk-amt">¥${(r.amount || 0).toLocaleString()}</span>
      <span class="fnk-reason">${escapeHtml(r.reason || '')}</span>
      <span class="fnk-act" id="fnk-act-${r.id}" onclick="event.stopPropagation();">
        <button class="fnk-collect-btn" onclick="fnkMarkCollected(${r.id})">回収済</button>
      </span>
    </div>
    <div class="fnk-sub">└ ${b.label}（${hint}）</div>
    <div class="fnk-detail" id="fnk-detail-${r.id}" style="display:none;">
      <label class="fnk-f">利用者名（半角カナ）
        <input type="text" value="${escapeHtml(r.name || '')}" onchange="updateName(${r.id}, this.value)"></label>
      <div class="fnk-meta">金融機関: ${escapeHtml(r.bank || '')} ${escapeHtml(r.branch || '')} ／ 口座 ${escapeHtml(r.account || '')} ／ 顧客番号 ${escapeHtml(r.customerId || '')} ／ No.${escapeHtml(r.no || '')}</div>
      <label class="fnk-f">詳細理由・経緯（電話で判明した内容など）
        <textarea onchange="updateDetailReason(${r.id}, this.value)" placeholder="ゆうちょ末尾1漏れ・口座解約 等">${escapeHtml(r.detailReason || '')}</textarea></label>
      <label class="fnk-f">対応状況
        <select onchange="updateStatus(${r.id}, this.value)">
          ${['未対応','連絡済','手続中','再提出済','回収済'].map(s => `<option value="${s}" ${r.status === s ? 'selected' : ''}>${s}</option>`).join('')}
        </select></label>
      <label class="fnk-f">依頼書郵送日（🟠要依頼書再送のとき）
        <input type="date" value="${r.formSentDate || ''}" onchange="updateFormSentDate(${r.id}, this.value)"></label>
      <label class="fnk-f">引落開始予定日
        <input type="date" value="${expected}" onchange="updateExpectedStart(${r.id}, this.value)"></label>
      <label class="fnk-f">メモ
        <input type="text" value="${escapeHtml(r.memo || '')}" onchange="updateMemo(${r.id}, this.value)"></label>
    </div>
  </div>`;
}

function fnkToggleDetail(id) {
  const d = document.getElementById('fnk-detail-' + id);
  if (!d) return;
  d.style.display = d.style.display === 'none' ? 'block' : 'none';
}

// [回収済]タップ → 回収方法ピッカーを出す（1〜2タップで消込・§4-3）
function fnkMarkCollected(id) {
  const act = document.getElementById('fnk-act-' + id);
  if (!act) return;
  act.innerHTML = '<span class="fnk-method-label">回収方法:</span>'
    + ['現金', '口座変更', '翌月合算', 'その他'].map(m =>
        `<button class="fnk-method-btn" onclick="fnkConfirmCollected(${id}, '${m}')">${m}</button>`).join('')
    + `<button class="fnk-method-cancel" onclick="renderMonth()" title="やめる">×</button>`;
}

// 消込確定（回収済フラグでのみ消える・日付では消えない）。saveData→cloudSync（fnkGuardProdWrite経由）
function fnkConfirmCollected(id, method) {
  const r = data.records.find(x => x.id === id);
  if (!r) return;
  const month = document.getElementById('monthSelect').value;
  r.status = '回収済';
  r.resolvedMonth = month;
  r.collectMethod = method;
  r.resolvedNote = `${month} 回収済（${method}）`;
  saveData(data);
  renderMonth();
  fnkScheduleNotify(month); // 伝達ボードの要対応件数を更新
}

// 消込の取消（1操作）
function fnkUndoCollected(id) {
  const r = data.records.find(x => x.id === id);
  if (!r) return;
  r.status = '未対応';
  delete r.resolvedMonth;
  delete r.collectMethod;
  delete r.resolvedNote;
  saveData(data);
  renderMonth();
  fnkScheduleNotify(document.getElementById('monthSelect').value); // 取消で件数が戻る→通知更新
}

// ③ 翌月合算の回収済候補（自動確定せず一括承認・§4-4）
function renderCandidatePanel(month) {
  const el = document.getElementById('candidatePanel');

function fnkApproveCandidate(id) {
  const r = data.records.find(x => x.id === id);
  if (!r) return;
  const month = document.getElementById('monthSelect').value;
  r.status = '回収済';
  r.resolvedMonth = month;
  r.collectMethod = '翌月合算';
  r.resolvedNote = `${month}の取込で引落成功を確認（翌月合算）`;
  _fnkCandidates = _fnkCandidates.filter(x => x.id !== id);
  saveData(data);
  renderMonth();
  fnkScheduleNotify(month);
}

function fnkApproveAllCandidates() {
  const month = document.getElementById('monthSelect').value;
  (_fnkCandidates || []).forEach(r => {
    r.status = '回収済';
    r.resolvedMonth = month;
    r.collectMethod = '翌月合算';
    r.resolvedNote = `${month}の取込で引落成功を確認（翌月合算）`;
  });
  _fnkCandidates = [];
  saveData(data);
  renderMonth();
  fnkScheduleNotify(month);
}

// ④ 今月回収済フッタ（既定は畳む・展開で取消できる）
function renderCollectedFooter(month) {
  const el = document.getElementById('collectedFooter');
  if (!el) return;
  const collected = data.records.filter(r => r.resolvedMonth === month);
  if (collected.length === 0) { el.style.display = 'none'; el.innerHTML = ''; return; }
  el.style.display = 'block';
  const open = el.getAttribute('data-open') === '1';
  el.innerHTML = `<div class="fnk-cf-head" onclick="fnkToggleCollected()">✓ 今月回収済 ${collected.length}件 ${open ? '▲' : '▼'}</div>`
    + (open ? `<div class="fnk-cf-body">` + collected.map(r => {
        const om = r.month ? parseInt(r.month.split('-')[1]) + '月分' : '';

      }).join('') + `</div>` : '');
}

function fnkToggleCollected() {
  const el = document.getElementById('collectedFooter');
  if (!el) return;
  el.setAttribute('data-open', el.getAttribute('data-open') === '1' ? '0' : '1');
  renderCollectedFooter(document.getElementById('monthSelect').value);
}

// ============ データ操作 ============
function updateName(id, value) {
  const rec = data.records.find(r => r.id === id);
  if (rec) { rec.name = value; saveData(data); renderMonth(); }
}

function updateStatus(id, value) {
  const rec = data.records.find(r => r.id === id);
  if (!rec) return;
  // 詳細理由が空のまま「未対応」以外に変えようとしたら警告
  if (value !== '未対応' && !rec.detailReason) {
    const ok = confirm('⚠️ 詳細理由・経緯が未入力です！\n\n何で振替不能だったか記録しないと後で困ります。\n\n「OK」= このまま変更（後で必ず入力）\n「キャンセル」= 戻る');
    if (!ok) {
      renderMonth(); // セレクトを元に戻すため再描画
      return;
    }
  }
  rec.status = value;
  saveData(data);
  renderMonth();
}

function updateMemo(id, value) {
  const rec = data.records.find(r => r.id === id);
  if (rec) { rec.memo = value; saveData(data); }
}

function updateDetailReason(id, value) {
  const rec = data.records.find(r => r.id === id);
  if (rec) { rec.detailReason = value; saveData(data); renderMonth(); }
}

function updateFormSentDate(id, value) {
  const rec = data.records.find(r => r.id === id);
  if (rec) {
    rec.formSentDate = value;
    // 郵送日を入れたら自動でスケジュール表に基づく引落日を提案
    if (value && !rec.expectedStartDate && !rec.expectedStartMonth) {
      const suggestDate = guessExpectedDate(value);
      if (suggestDate) {
        const [sy, sm, sd] = suggestDate.split('-');
        if (confirm(`引落開始予定を「${sy}年${parseInt(sm)}月${parseInt(sd)}日」に設定しますか？\n（スケジュール表に基づく見込み）`)) {
          rec.expectedStartDate = suggestDate;
          rec.expectedStartMonth = suggestDate.substring(0, 7);
          rec.status = '手続中';
        }
      }
    }
    saveData(data);
    renderMonth();
  }
}

// 電算スケジュール表2026年（27日振替）に基づいて引落開始予定日を推定
function guessExpectedDate(sentDate) {
  // 新規依頼書締切日 → その月の振替日（27日 or 振替日）
  const schedule = [
    { deadline: '2025-12-18', furikaeDate: '2026-01-27' },
    { deadline: '2026-01-21', furikaeDate: '2026-02-27' },
    { deadline: '2026-02-18', furikaeDate: '2026-03-27' },
    { deadline: '2026-03-23', furikaeDate: '2026-04-27' },
    { deadline: '2026-04-17', furikaeDate: '2026-05-27' },
    { deadline: '2026-05-21', furikaeDate: '2026-06-29' },
    { deadline: '2026-06-23', furikaeDate: '2026-07-27' },
    { deadline: '2026-07-22', furikaeDate: '2026-08-27' },
    { deadline: '2026-08-21', furikaeDate: '2026-09-28' },
    { deadline: '2026-09-18', furikaeDate: '2026-10-27' },
    { deadline: '2026-10-21', furikaeDate: '2026-11-27' },
    { deadline: '2026-11-20', furikaeDate: '2026-12-28' },
  ];
  // 郵送日がどの締切に間に合うかを判定
  for (const s of schedule) {
    if (sentDate <= s.deadline) {
      return s.furikaeDate;
    }
  }
  // 2026年内に間に合わない場合は翌年1月
  return '2027-01-27';
}

function updateExpectedStart(id, value) {
  const rec = data.records.find(r => r.id === id);
  if (rec) {
    rec.expectedStartDate = value;
    // 旧形式のexpectedStartMonthも残しておく（互換性）
    if (value) rec.expectedStartMonth = value.substring(0, 7);
    if (value && rec.status === '未対応') {
      rec.status = '手続中';
    }
    saveData(data);
    renderMonth();
  }
}

function saveDraft(silent) {
  const fields = ['formMonth','formNo','formName','formBank','formBranch','formAccount','formAmount','formCustomerId','formReason','formDetailReason','formSentDate','formExpectedStart'];
  const d = { _savedAt: new Date().toISOString() };

  });
  localStorage.setItem(DRAFT_KEY, JSON.stringify(d));
  if(!silent) {
    showTemplateHint('🕐 一時保存しました。続きは次回「＋追加」を押した時に復元できます');
  }
}

function restoreDraft(d) {
  const fields = ['formMonth','formNo','formName','formBank','formBranch','formAccount','formAmount','formCustomerId','formReason','formDetailReason','formSentDate','formExpectedStart'];
  fields.forEach(id => {
    if(d[id] !== undefined) document.getElementById(id).value = d[id];
  });
  showTemplateHint('📂 下書きを復元しました');
}

function clearDraft() {
  localStorage.removeItem(DRAFT_KEY);
}

  const expectedMonth = expectedStart ? expectedStart.substring(0, 7) : '';

  const rec = {
    id: data.nextId++,
    month: month,
    hikiotoshiDate: '',
    no: no,
    name: document.getElementById('formName').value.trim(),

  renderMonth();
}

// ============ CSV出力 ============
function exportCSV() {
  const month = document.getElementById('monthSelect').value;
  const records = data.records.filter(r => r.month === month);
  const bom = '\uFEFF';
  const header = '連番,利用者名,金融機関,支店,口座番号,金額,顧客番号,不能理由,詳細理由・経緯,対応状況,依頼書郵送日,引落開始予定日,メモ\n';
  const csvEscape = v => {
    const s = String(v == null ? '' : v);
    return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const rows = records.map(r =>
    [r.no, r.name, r.bank, r.branch, r.account, r.amount, r.customerId, r.reason, r.detailReason || '', r.status, r.formSentDate || '', r.expectedStartDate || r.expectedStartMonth || '', r.memo].map(csvEscape).join(',')
  ).join('\n');

  const blob = new Blob([bom + header + rows], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const [y, mo] = month.split('-');
  a.download = `振替不能_${y}年${parseInt(mo)}月.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ============ ユーティリティ ============
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============ 不備返却アプリ連動 ============
const FURIKAE_FUBI_GAS = 'https://script.google.com/macros/s/AKfycby9yifGR7oxbstElccGjUFhNN2BlDGfMgcFBT-KlX4iAHIgb6LZuCpplMgpxkMy7am91w/exec';
let furikaeFubiCases = [];

function normalizeNameForFubi(s) {
  return String(s || '').normalize('NFKC').replace(/様$|さん$/g, '').replace(/\s+/g, '').trim();
}

function fubiHistoryBadge(record) {
  if (!furikaeFubiCases || furikaeFubiCases.length === 0) return '';
  const recordName = normalizeNameForFubi(record.name);
  if (!recordName) return '';
  const matched = furikaeFubiCases.filter(c => {
    if (c['状態'] !== '完了') return false;
    if (normalizeNameForFubi(c['利用者名']) !== recordName) return false;
    const completedDate = c['完了日'] ? new Date(c['完了日']) : null;
    if (!completedDate) return false;
    const daysAgo = (new Date() - completedDate) / (1000*60*60*24);
    return daysAgo <= 180;
  });
  if (matched.length === 0) return '';
  const latest = matched.sort((a, b) => (b['完了日']||'').localeCompare(a['完了日']||''))[0];
  const reasons = (latest['不備理由カテゴリ']||[]).join('・');
  const sendStep = (latest['ステップ履歴']||[]).find(s => s.ステップ === 5);
  const sendDate = sendStep && sendStep.日時 ? sendStep.日時.slice(0,10) : '-';
  return `<div style="display:block;margin-top:4px;padding:3px 8px;background:#fff3cd;color:#856404;border-radius:10px;font-size:11px;font-weight:bold;" title="${escapeHtml(reasons)}・再送付${sendDate}">🏦 不備返却由来（${(latest['受領日']||'').slice(5)}・再送付${sendDate.slice(5)}）</div>`;
}

async function fetchFurikaeFubi() {
  try {
    const res = await fetch(FURIKAE_FUBI_GAS + '?action=list');
    const d = await res.json();
    if (d && d.ok && Array.isArray(d.cases)) {
      furikaeFubiCases = d.cases;
      renderMonth();
    }
  } catch (err) {
    console.warn('fetchFurikaeFubi failed:', err);
  }
}

// ============ 事例ノート機能 ============
const NOTES_KEY = 'yawaragi_furikae_notes';

function loadNotes() {
  try {
    return JSON.parse(localStorage.getItem(NOTES_KEY)) || [];
  } catch(e) { return []; }
}

function saveNotes(notes) {
  localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
}

function renderNotes() {
  const notes = loadNotes();
  // ピン留め → 新しい順
  const sorted = [...notes].sort((a, b) => {
    if (a.pinned !== b.pinned) return b.pinned ? 1 : -1;
    return (b.date || '').localeCompare(a.date || '');
  });

  const body = document.getElementById('notesBody');
  if (!body) return;

  if (sorted.length === 0) {
    body.innerHTML = '<div class="note-empty">📝 まだ事例が登録されていません。「＋事例追加」から記録してください。</div>';
  } else {
    body.innerHTML = sorted.map(n => {
      const cat = n.category || 'その他';
      return `
        <div class="note-card ${n.pinned ? 'pinned' : ''}">
          <div class="note-card-header">
            <div>
              <span class="note-title">${escapeHtml(n.title)}</span>
              <span class="note-category note-cat-${cat}">${cat}</span>
              ${n.pinned ? '<span class="note-pin-badge">📌 要注意</span>' : ''}
            </div>
            <div class="note-actions">
              <button class="btn btn-small btn-secondary" onclick="togglePinNote('${n.id}')">${n.pinned ? '📌解除' : '📌要注意'}</button>
              <button class="btn btn-small btn-primary" onclick="editNote('${n.id}')">編集</button>
              <button class="btn btn-small btn-danger" onclick="deleteNote('${n.id}')">削除</button>
            </div>
          </div>
          <div class="note-meta">📅 ${n.date || '-'} ／ 登録: ${n.author || '-'}</div>
          <div class="note-desc">${escapeHtml(n.description || '')}</div>
        </div>
      `;
    }).join('');
  }

  // バナーも更新
  renderAlertBanner(sorted);
}

function renderAlertBanner(sortedNotes) {
  const pinned = sortedNotes.filter(n => n.pinned);
  const banner = document.getElementById('alertBanner');
  if (!banner) return;

  if (pinned.length === 0) {
    banner.style.display = 'none';
    return;
  }

  banner.style.display = 'block';
  banner.innerHTML = `
    <div class="alert-banner-title">⚠️ 請求作業前に必ず確認してください（${pinned.length}件）</div>
    ${pinned.map(n => `
      <div class="alert-item">
        <div class="alert-item-title">${escapeHtml(n.title)}</div>
        <div class="alert-item-desc">${escapeHtml(n.description || '')}</div>
        <div class="alert-item-meta">📅 ${n.date || '-'}</div>
      </div>
    `).join('')}
  `;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function openNoteModal(editId) {
  const modal = document.getElementById('noteModal');
  const notes = loadNotes();
  const editing = editId ? notes.find(n => n.id === editId) : null;
  document.getElementById('noteModalTitle').textContent = editing ? '事例を編集' : '事例を追加';
  document.getElementById('noteEditId').value = editId || '';
  document.getElementById('noteTitle').value = editing?.title || '';
  document.getElementById('noteCategory').value = editing?.category || 'エラー';
  document.getElementById('noteDate').value = editing?.date || new Date().toISOString().slice(0,10);
  document.getElementById('noteDescription').value = editing?.description || '';
  document.getElementById('notePinned').checked = editing?.pinned || false;
  document.getElementById('noteAuthor').value = editing?.author || loadContactStaff() || '';
  modal.classList.add('active');
}

function closeNoteModal() {
  document.getElementById('noteModal').classList.remove('active');
}

function saveNote() {
  const id = document.getElementById('noteEditId').value || ('n_' + Date.now());
  const title = document.getElementById('noteTitle').value.trim();
  if (!title) { alert('タイトルを入力してください'); return; }
  const note = {
    id: id,
    title: title,
    category: document.getElementById('noteCategory').value,
    date: document.getElementById('noteDate').value,
    description: document.getElementById('noteDescription').value.trim(),
    pinned: document.getElementById('notePinned').checked,
    author: document.getElementById('noteAuthor').value.trim()
  };
  let notes = loadNotes();
  const idx = notes.findIndex(n => n.id === id);
  if (idx >= 0) notes[idx] = note;
  else notes.push(note);
  saveNotes(notes);
  closeNoteModal();
  renderNotes();
}

function editNote(id) { openNoteModal(id); }

function deleteNote(id) {
  if (!confirm('この事例を削除しますか？')) return;
  saveNotes(loadNotes().filter(n => n.id !== id));
  renderNotes();
}

function togglePinNote(id) {
  const notes = loadNotes();
  const n = notes.find(x => x.id === id);
  if (!n) return;
  n.pinned = !n.pinned;
  saveNotes(notes);
  renderNotes();
}
