<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>清掃・準備チェック表 - yawaragi</title>
<style>
:root {
  --primary: #1a73e8;
  --green: #34a853;
  --orange: #f9ab00;
  --red: #ea4335;
  --bg: #f5f7fa;
  --card: #ffffff;
  --text: #202124;
  --sub: #5f6368;
  --border: #e0e0e0;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI','Hiragino Sans','Meiryo',sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

/* ヘッダー */
/* ヘッダー群：青ヘッダー + ユーザーバーをまとめて sticky */
.header-group {
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}

.header {
  background: var(--primary);
  color: #fff;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header-date { font-size: 13px; opacity: .9; }
.header-right { display:flex; gap:8px; align-items:center; }
.header-btn {
  background: rgba(255,255,255,.2);
  border: none;
  color: #fff;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
}
.header-btn:active { background: rgba(255,255,255,.35); }

/* ユーザー表示 */
.user-bar {
  background: #e8f0fe;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 15px;
  border-bottom: 2px solid var(--primary);
}
.user-bar .name {
  font-weight: 700;
  color: var(--primary);
  font-size: 17px;
  margin-left: 6px;
}
.user-bar .change-btn {
  background: var(--primary);
  border: none;
  color: #fff;
  padding: 8px 18px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 2px 4px rgba(0,0,0,.1);
}
.user-bar .change-btn:active { transform: scale(0.96); }

/* 進捗バー */
.progress-section {
  padding: 12px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.progress-bar-wrap {
  background: #e0e0e0;
  border-radius: 10px;
  height: 20px;
  overflow: hidden;
  margin-top: 6px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), #43b581);
  border-radius: 10px;
  transition: width .4s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: #fff;
  font-weight: 600;
  min-width: 30px;
}
.progress-text {
  font-size: 13px;
  color: var(--sub);
  display: flex;
  justify-content: space-between;
}

/* 時間帯セクション */
.time-section {
  margin: 8px 0;
}
.time-header {
  background: #fff;
  padding: 10px 16px;
  font-weight: 600;
  font-size: 14px;
  color: var(--primary);
  border-left: 4px solid var(--primary);
  margin: 0 8px;
  border-radius: 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.time-header .count {
  font-size: 12px;
  color: var(--sub);
  font-weight: 400;
}

/* タスクアイテム */
.task-list { padding: 0 8px; }
.task-item {
  background: var(--card);
  margin: 4px 0;
  padding: 12px 16px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  transition: all .2s;
  cursor: pointer;
  border: 2px solid transparent;
  min-height: 52px;
}
.task-item:active { transform: scale(.98); }
.task-item.checked {
  background: #f0faf0;
  border-color: var(--green);
}
.task-item.checked .task-name { text-decoration: line-through; color: var(--sub); }

/* 代理ボタン */
.proxy-btn {
  background: #fff3cd;
  border: 1px solid var(--orange);
  color: #d97c00;
  padding: 5px 10px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  margin-left: 8px;
  flex-shrink: 0;
  font-weight: bold;
}
.proxy-btn:hover { background: #ffe699; }
.staff-name.proxy { background: #fff3cd; color: #d97c00; padding: 1px 6px; border-radius: 4px; }

.task-check {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid #ccc;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .2s;
  font-size: 16px;
}
.task-item.checked .task-check {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}

.task-info { flex: 1; min-width: 0; }
.task-name { font-size: 14px; line-height: 1.3; }
.task-meta {
  font-size: 11px;
  color: var(--sub);
  margin-top: 2px;
}
.task-meta .staff-name { color: var(--green); font-weight: 600; }
.task-day-limit {
  display: inline-block;
  background: #fef7e0;
  color: var(--orange);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 3px;
  margin-left: 6px;
  font-weight: 600;
}

/* 統計セクション */
.stats-toggle {
  background: var(--card);
  margin: 8px;
  border-radius: 8px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
  overflow: hidden;
}
.stats-toggle-btn {
  width: 100%;
  padding: 12px 16px;
  background: none;
  border: none;
  font-size: 14px;
  font-weight: 600;
  color: var(--primary);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.stats-toggle-btn:active { background: #f0f4ff; }
.stats-content { display: none; padding: 0 16px 16px; }
.stats-content.show { display: block; }

.stats-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}
.stats-tab {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  background: #f0f0f0;
  color: var(--sub);
  font-weight: 500;
}
/* 業務分担マトリックス */
.matrix-table {
  width: 100%; border-collapse: collapse; font-size: 12px; background: #fff;
}
.matrix-table th, .matrix-table td {
  border: 1px solid #ddd; padding: 4px 6px; text-align: center;
}
.matrix-table thead th {
  background: var(--primary); color: #fff; font-weight: bold;
  position: sticky; top: 0; z-index: 1;
}
.matrix-table th.task-name-col {
  text-align: left; min-width: 180px;
  background: #f5f7fa; color: var(--text);
  position: sticky; left: 0; z-index: 2;
}
.matrix-table tbody td.task-name-col {
  text-align: left; background: #f5f7fa;
  position: sticky; left: 0; z-index: 1; font-weight: bold;
}
.matrix-table td.zero { background: #ffe3e3; color: #c00; font-weight: bold; }
.matrix-table td.low { background: #fff5d6; }
.matrix-table td.high { background: #d6f5d8; }
.matrix-wrapper {
  max-height: 500px; overflow: auto;
  border: 1px solid #ddd; border-radius: 6px;
}

.stats-tab.active {
  background: var(--primary);
  color: #fff;
}

.stats-row {
  display: flex;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #f0f0f0;
  gap: 10px;
}
.stats-row:last-child { border-bottom: none; }
.stats-rank {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #e0e0e0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.stats-rank.rank1 { background: #ffd700; color: #7a6200; }
.stats-rank.rank2 { background: #c0c0c0; color: #555; }
.stats-rank.rank3 { background: #cd7f32; color: #fff; }
.stats-name { flex: 1; font-size: 14px; }
.stats-bar-wrap {
  flex: 2;
  background: #f0f0f0;
  border-radius: 4px;
  height: 16px;
  overflow: hidden;
}
.stats-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), #4a90d9);
  border-radius: 4px;
  transition: width .3s;
}
.stats-count {
  width: 36px;
  text-align: right;
  font-weight: 700;
  font-size: 14px;
  color: var(--primary);
}
.stats-unit {
  font-size: 11px;
  color: var(--sub);
  font-weight: 400;
}

/* スタッフ選択モーダル */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff;
  border-radius: 16px;
  padding: 24px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
}
.modal h2 {
  font-size: 18px;
  text-align: center;
  margin-bottom: 8px;
}
.modal p {
  text-align: center;
  font-size: 13px;
  color: var(--sub);
  margin-bottom: 16px;
}
.staff-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.staff-btn {
  background: #f0f4ff;
  border: 2px solid transparent;
  padding: 14px 8px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  color: var(--text);
}
.staff-btn:active { transform: scale(.95); }
.staff-btn.selected {
  border-color: var(--primary);
  background: #d2e3fc;
}

/* PINモーダル */
.pin-modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.5);
  display: none; align-items: center; justify-content: center;
  z-index: 1000;
}
.pin-modal-overlay.show { display: flex; }
.pin-modal {
  background: #fff; border-radius: 12px; padding: 24px;
  width: 90%; max-width: 360px; box-shadow: 0 10px 40px rgba(0,0,0,.2);
}
.pin-modal h2 { margin: 0 0 16px; font-size: 18px; text-align: center; }
.pin-modal input {
  width: 100%; padding: 12px; font-size: 24px; text-align: center;
  letter-spacing: 8px; border: 2px solid #ccc; border-radius: 8px;
  box-sizing: border-box; margin-bottom: 12px;
}
.pin-modal .pin-error {
  color: var(--red); font-size: 13px; margin-bottom: 12px; text-align: center;
  display: none;
}
.pin-modal .pin-buttons { display: flex; gap: 8px; }
.pin-modal button {
  flex: 1; padding: 10px; font-size: 14px; border: none; border-radius: 8px;
  cursor: pointer;
}
.pin-modal .pin-cancel { background: #eee; color: var(--text); }
.pin-modal .pin-ok { background: var(--primary); color: #fff; }

/* 編集モード */
body.edit-mode .header { background: linear-gradient(135deg, #d33 0%, #b22 100%); }
body.edit-mode #btnRefresh { display: none !important; }
body.edit-mode .stats-toggle { display: none; }
body.edit-mode .progress-section { display: none; }
body.edit-mode .user-bar { display: none !important; }

.edit-mode-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-top: 2px solid var(--red);
  padding: 12px 16px; display: none;
  box-shadow: 0 -4px 12px rgba(0,0,0,.1); z-index: 500;
  gap: 8px; justify-content: flex-end;
}
body.edit-mode .edit-mode-bar { display: flex; }
.edit-mode-bar button {
  padding: 10px 20px; font-size: 14px; border: none; border-radius: 8px;
  cursor: pointer; font-weight: bold;
}
.edit-mode-bar .btn-cancel { background: #eee; color: var(--text); }
.edit-mode-bar .btn-save { background: var(--red); color: #fff; }
.edit-mode-bar .btn-save:disabled { background: #ccc; cursor: not-allowed; }
body.edit-mode #mainView { padding-bottom: 80px; }

/* 編集行 */
.edit-row {
  display: grid;
  grid-template-columns: 32px 1fr 140px 120px 1fr 60px;
  gap: 8px; align-items: center;
  padding: 8px; background: #fff;
  border: 1px solid #ddd; border-radius: 8px; margin-bottom: 6px;
}
.edit-row input[type=text], .edit-row select {
  padding: 6px 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 6px;
  width: 100%; box-sizing: border-box;
}
.edit-row .move-btns { display: flex; gap: 2px; }
.edit-row .move-btns button {
  width: 26px; height: 26px; padding: 0; font-size: 14px;
  background: #f5f5f5; border: 1px solid #ccc; border-radius: 4px;
  cursor: pointer;
}
.edit-row .delete-btn {
  background: #fee; color: var(--red); border: 1px solid var(--red);
  padding: 6px 8px; font-size: 12px; border-radius: 6px; cursor: pointer;
}
.edit-add-btn {
  width: 100%; padding: 12px; margin-top: 12px;
  background: #e8f0fe; border: 2px dashed var(--primary); color: var(--primary);
  font-size: 14px; border-radius: 8px; cursor: pointer;
}
.edit-slot-header {
  background: var(--primary); color: #fff;
  padding: 8px 14px; margin: 16px 0 8px;
  border-radius: 6px; font-weight: bold; font-size: 14px;
}
.edit-slot-header:first-child { margin-top: 0; }
@media (max-width: 768px) {
  .edit-row {
    grid-template-columns: 32px 1fr 60px;
    grid-template-areas:
      "move name del"
      "move slot slot"
      "move day day"
      "move memo memo";
  }
  .edit-row .move-btns { grid-area: move; flex-direction: column; }
  .edit-row .name-input { grid-area: name; }
  .edit-row .slot-select { grid-area: slot; }
  .edit-row .day-select { grid-area: day; }
  .edit-row .memo-input { grid-area: memo; }
  .edit-row .delete-btn { grid-area: del; }
}

/* 設定画面 */
.settings-panel {
  display: none;
  padding: 16px;
}
.settings-panel.show { display: block; }
.settings-section {
  background: var(--card);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
.settings-section h3 {
  font-size: 15px;
  margin-bottom: 12px;
  color: var(--primary);
}
.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
.input-row input, .input-row select {
  flex: 1;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 14px;
}
.input-row button {
  padding: 10px 16px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  white-space: nowrap;
}
.input-row button:active { opacity: .8; }

.gas-url-input {
  width: 100%;
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  margin-bottom: 8px;
}
.save-url-btn {
  width: 100%;
  padding: 10px;
  background: var(--green);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
}
.save-url-btn:active { opacity: .8; }

/* トースト */
.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #323232;
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  z-index: 300;
  transition: transform .3s ease;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.55; }
}

/* 同期状態 */
.sync-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(255,255,255,.2);
}
.sync-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #4caf50;
}
.sync-dot.offline { background: #ff9800; }
.sync-dot.error { background: #f44336; }

/* 更新ボタン */
.refresh-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--primary);
  color: #fff;
  border: none;
  font-size: 24px;
  box-shadow: 0 4px 12px rgba(0,0,0,.25);
  cursor: pointer;
  z-index: 90;
  display: flex;
  align-items: center;
  justify-content: center;
}
.refresh-float:active { transform: scale(.9); }
.refresh-float.syncing { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* メインとセッティング切り替え */
.main-view { display: block; }
.main-view.hide { display: none; }

/* レスポンシブ */
@media (max-width: 400px) {
  .staff-grid { grid-template-columns: repeat(2, 1fr); }
  .header h1 { font-size: 16px; }
}
</style>
</head>
<body>
<script src="auto-refresh-patch.js"></script>

<!-- ヘッダー群（スクロールしても常に表示） -->
<div class="header-group">
  <!-- ヘッダー -->
  <div class="header">
    <div>
      <h1>清掃・準備チェック表</h1>
      <div class="header-date" id="headerDate"></div>
      <div id="monthEndAlert" style="display:none;margin-top:6px;padding:6px 10px;background:#fff3cd;color:#d33;border:2px solid #d33;border-radius:6px;font-weight:bold;font-size:13px;animation:blink 1.5s ease-in-out infinite"></div>
    </div>
    <div class="header-right">
      <div class="sync-status">
        <div class="sync-dot" id="syncDot"></div>
        <span id="syncText">接続中</span>
      </div>
      <button class="header-btn" id="btnSettings" onclick="toggleSettings()">設定</button>
      <button class="header-btn" onclick="showAdminPinModal()" style="background:rgba(52,168,83,.85);color:#fff">清掃内容変更</button>
    </div>
  </div>

  <!-- ユーザーバー -->
  <div class="user-bar" id="userBar" style="display:none">
    <div>操作中: <span class="name" id="currentUserName"></span></div>
    <div style="display:flex;gap:8px">
      <button class="change-btn" onclick="showStaffModal()">人を変更</button>
      <button class="change-btn" style="background:var(--red)" onclick="clearCurrentUser()">解除</button>
    </div>
  </div>
</div>

<!-- メイン画面 -->
<div class="main-view" id="mainView">
  <!-- 進捗バー -->
  <div class="progress-section">
    <div class="progress-text">
      <span id="progressLabel">読み込み中...</span>
      <span id="progressCount"></span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
  </div>

  <!-- 統計セクション -->
  <div class="stats-toggle">
    <button class="stats-toggle-btn" onclick="toggleStats()">
      <span>みんなの貢献</span>
      <span id="statsArrow">▼</span>
    </button>
    <div class="stats-content" id="statsContent">
      <div class="stats-tabs">
        <button class="stats-tab active" id="tabToday" onclick="showStats('today')">今日</button>
        <button class="stats-tab" id="tabMonth" onclick="showStats('month')">今月</button>
        <button class="stats-tab" id="tabMatrix" onclick="showStats('matrix')">業務分担</button>
      </div>
      <div id="matrixControls" style="display:none;padding:8px 12px;background:#f8f9fa;border-bottom:1px solid var(--border);font-size:13px">
        期間：
        <select id="matrixPeriod" onchange="loadMatrix()" style="padding:4px 8px;font-size:13px;border:1px solid #ccc;border-radius:4px;margin-left:6px">
          <option value="current">今月</option>
          <option value="prev">先月</option>
          <option value="all">全期間</option>
        </select>
      </div>
      <div id="statsBody">読み込み中...</div>
    </div>
  </div>

  <!-- タスク一覧 -->
  <div id="taskContainer"></div>
</div>

<!-- 設定画面 -->
<div class="settings-panel" id="settingsPanel">
  <div class="settings-section">
    <h3>GAS URL設定</h3>
    <p style="font-size:12px;color:var(--sub);margin-bottom:8px;text-align:left">
      GASのウェブアプリURLを貼り付けてください
    </p>
    <input type="text" class="gas-url-input" id="gasUrlInput" placeholder="https://script.google.com/macros/s/...">
    <button class="save-url-btn" onclick="saveGasUrl()">URLを保存して接続テスト</button>
  </div>

  <div class="settings-section">
    <h3>自動更新間隔</h3>
    <div class="input-row">
      <select id="refreshInterval" onchange="saveRefreshInterval()">
        <option value="10">10秒ごと</option>
        <option value="30" selected>30秒ごと</option>
        <option value="60">1分ごと</option>

<div class="toast" id="toast"></div>

<script>
// ============================================
// 業務チェック表 メインスクリプト
// ============================================

// --- 状態管理 ---
let STATE = {
  gasUrl: localStorage.getItem('gyomu_gas_url') || 'https://script.google.com/macros/s/AKfycbzejQJ-JNok50wACj5XRSR13-ODvaocl9GhaHX245EFC7nPeL5jtNSyyqf21mi7DAyi/exec',
  currentUser: localStorage.getItem('gyomu_current_user') || '',
  tasks: [],
  log: [],
  staff: [],
  refreshInterval: parseInt(localStorage.getItem('gyomu_refresh_interval') || '30'),
  lastSync: null,
  monthlyStats: {},
  statsView: 'today',
  editMode: false,
  editingTasks: [],
  editDirty: false,
  taskLastDates: JSON.parse(localStorage.getItem('gyomu_task_last_dates') || '{}')
};

let refreshTimer = null;

// --- 初期化 ---
document.addEventListener('DOMContentLoaded', function() {
  updateDateDisplay();
  loadRefreshInterval();

  if (!STATE.gasUrl) {
    showToast('設定からGAS URLを入力してください');
    toggleSettings();
  } else if (!STATE.currentUser) {
    loadAllData().then(function() {
      showStaffModal();
    });
  } else {
    document.getElementById('userBar').style.display = 'flex';
    document.getElementById('currentUserName').textContent = STATE.currentUser;
    loadAllData();
  }

  startAutoRefresh();
});

// --- 日付表示 ---
function updateDateDisplay() {
  const now = new Date();
  const days = ['日','月','火','水','木','金','土'];
  const str = now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日（' + days[now.getDay()] + '）';
  document.getElementById('headerDate').textContent = str;

  // 月末まで6日以内なら警告表示（最後の週=おおむね最後の6日）
  const lastDay = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
  const daysLeft = lastDay - now.getDate();
  const alertEl = document.getElementById('monthEndAlert');
  if (alertEl) {
    if (daysLeft <= 5) {
      const msg = daysLeft === 0
        ? '⚠️ 今日は月末！ファイリング終わらないと帰れないよ！'
        : '⚠️ 月末まで残り' + daysLeft + '日！ファイリング終わらないと帰れないよ';
      alertEl.textContent = msg;
      alertEl.style.display = 'block';
    } else {
      alertEl.style.display = 'none';
    }
  }
}

// --- GAS通信（JSONP方式：file://でも動作する） ---
function gasRequest(params) {
  return new Promise(function(resolve, reject) {
    if (!STATE.gasUrl) { reject(new Error('GAS URLが設定されていません')); return; }
    var callbackName = '_gasCallback_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    var timeout = setTimeout(function() {
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('タイムアウト'));
    }, 15000);

    window[callbackName] = function(data) {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };

    params.callback = callbackName;
    var url = STATE.gasUrl + '?' + new URLSearchParams(params).toString();
    var script = document.createElement('script');
    script.src = url;
    script.onerror = function() {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
      reject(new Error('通信エラー'));
    };
    document.head.appendChild(script);
  });
}

// gasGet/gasPostの代わりに全部gasRequestを使う
async function gasGet(params) { return gasRequest(params); }
async function gasPost(data) { return gasRequest(data); }

// 大きなデータを送る用のPOST（JSONP URL長制限の回避）
// fetch + Content-Type: text/plain でCORS preflight回避。
// no-corsモードなのでレスポンス本文は読めない → 楽観的にsuccess扱い、
// 直後の loadAllData() で実データを取り直して画面を同期する。
async function gasPostLarge(data) {
  if (!STATE.gasUrl) throw new Error('GAS URLが設定されていません');
  await fetch(STATE.gasUrl, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(data)
  });
  return { success: true };
}

// --- データ読み込み ---
async function loadAllData() {
  const btn = document.getElementById('btnRefresh');
  btn.classList.add('syncing');
  setSyncStatus('syncing');

  try {
    // 1回のリクエストで全データを取得
    const allRes = await gasGet({ action: 'getAllData' });
    if (allRes.error) throw new Error(allRes.error);

    STATE.tasks = allRes.tasks || [];
    STATE.log = allRes.log || [];
    STATE.staff = allRes.staff || [];
    STATE.monthlyStats = allRes.monthlyStats || {};
    STATE.lastSync = new Date();

    // ローカルキャッシュに保存（オフライン対策）
    localStorage.setItem('gyomu_tasks_cache', JSON.stringify(STATE.tasks));
    localStorage.setItem('gyomu_log_cache', JSON.stringify(STATE.log));
    localStorage.setItem('gyomu_staff_cache', JSON.stringify(STATE.staff));
    localStorage.setItem('gyomu_monthly_cache', JSON.stringify(STATE.monthlyStats));

    // インターバル系タスクがあれば過去ログから最新実施日を算出（バックグラウンド）
    loadIntervalLastDates();

    renderTasks();
    renderStats();
    setSyncStatus('online');
  } catch (e) {
    console.error('データ取得エラー:', e);
    // キャッシュから復元
    try {
      STATE.tasks = JSON.parse(localStorage.getItem('gyomu_tasks_cache') || '[]');
      STATE.log = JSON.parse(localStorage.getItem('gyomu_log_cache') || '[]');
      STATE.staff = JSON.parse(localStorage.getItem('gyomu_staff_cache') || '[]');
      renderTasks();
      setSyncStatus('offline');
      showToast('オフライン: キャッシュを表示中');
    } catch (e2) {
      setSyncStatus('error');
      showToast('データ取得に失敗しました');
    }
  } finally {
    btn.classList.remove('syncing');
  }
}

// インターバル系タスクの最新実施日を過去ログから算出
async function loadIntervalLastDates() {
  // 「N日インターバル」形式の dayLimit を持つタスクがあるか確認
  const intervalTasks = (STATE.tasks || []).filter(function(t) {
    return /^\d+日インターバル$/.test(t.dayLimit || '');
  });
  if (intervalTasks.length === 0) return;

  // 最大インターバル日数 + 余裕5日 を遡って取得
  let maxDays = 30;
  intervalTasks.forEach(function(t) {
    const m = String(t.dayLimit).match(/^(\d+)日インターバル$/);
    if (m) maxDays = Math.max(maxDays, parseInt(m[1], 10));
  });
  const lookbackDays = maxDays + 5;

  function fmt(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + dd;
  }

  const today = new Date();
  const targetTaskNos = new Set(intervalTasks.map(function(t) { return String(t.no); }));
  const lastDateMap = Object.assign({}, STATE.taskLastDates || {});

  // 5並列ずつバッチ実行（GASレート制限対策）
  const batchSize = 5;
  for (let offset = 1; offset <= lookbackDays; offset += batchSize) {
    const batch = [];
    for (let i = 0; i < batchSize && (offset + i) <= lookbackDays; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() - (offset + i));
      const dateStr = fmt(d);
      batch.push(
        gasGet({ action: 'getLog', date: dateStr })
          .then(function(r) { return { date: dateStr, log: (r && r.log) || [] }; })
          .catch(function() { return { date: dateStr, log: [] }; })
      );
    }
    const results = await Promise.all(batch);
    results.forEach(function(item) {
      item.log.forEach(function(l) {
        const no = String(l.taskNo);
        if (targetTaskNos.has(no)) {
          if (!lastDateMap[no] || lastDateMap[no] < item.date) {
            lastDateMap[no] = item.date;
          }
        }
      });
    });
  }

  STATE.taskLastDates = lastDateMap;
  localStorage.setItem('gyomu_task_last_dates', JSON.stringify(lastDateMap));
  // 取得後に再描画（最新実施日反映）
  renderTasks();
}

// チェックログだけ更新（軽量）
async function refreshLog() {
  try {
    const logRes = await gasGet({ action: 'getLog' });
    if (logRes.error) return;
    const newLog = logRes.log || [];
    // ログに変化がなければ再描画スキップ（チラつき防止）
    const same = JSON.stringify(STATE.log) === JSON.stringify(newLog);
    STATE.log = newLog;
    localStorage.setItem('gyomu_log_cache', JSON.stringify(STATE.log));
    if (!same) {
      const scrollY = window.scrollY;
      renderTasks();
      renderStats();
      // 再描画でスクロール位置が飛ぶのを防ぐ
      window.scrollTo({ top: scrollY, behavior: 'instant' });
    }
    setSyncStatus('online');
    STATE.lastSync = new Date();
  } catch (e) {
    setSyncStatus('offline');
  }
}

// --- 同期状態表示 ---
function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  dot.className = 'sync-dot';
  if (status === 'online') {
    // 緑（デフォルト。追加クラス不要）
    text.textContent = '接続中';
  } else if (status === 'offline') {
    dot.classList.add('offline');
    text.textContent = 'オフライン';
  } else if (status === 'syncing') {
    dot.classList.add('offline');
    text.textContent = '同期中...';
  } else {
    dot.classList.add('error');
    text.textContent = 'エラー';
  }
}

// --- 高坂地区（あずま町）ゴミ収集判定 ---
// 可燃物: 毎週月・木 / プラ: 毎週金 / 紙類・布類: 第1・3火
// びん・かん・ペットボトル: 第1・3・5水 / 不燃物: 第2・4水
function getTakasakaGarbageItem(date) {
  const day = date.getDay();
  const nth = Math.ceil(date.getDate() / 7);
  if (day === 1 || day === 4) return '可燃物';
  if (day === 5) return 'プラスチック類';
  if (day === 2 && (nth === 1 || nth === 3)) return '紙類・布類';
  if (day === 3) {
    if (nth === 1 || nth === 3 || nth === 5) return 'びん・かん・ペットボトル';
    if (nth === 2 || nth === 4) return '不燃物';
  }
  return null;
}

// --- 月末日判定 ---
function isLastDayOfMonth_(d) {
  const tomorrow = new Date(d);
  tomorrow.setDate(d.getDate() + 1);
  return tomorrow.getMonth() !== d.getMonth();
}

// --- タスク描画 ---
function renderTasks() {
  const container = document.getElementById('taskContainer');
  const today = new Date();
  const days = ['日','月','火','水','木','金','土'];
  const todayDay = days[today.getDay()];
  const todayIsLastDay = isLastDayOfMonth_(today);
  const todayGarbage = getTakasakaGarbageItem(today);
  const tomorrow = new Date(today);
  tomorrow.setDate(today.getDate() + 1);
  const tomorrowGarbage = getTakasakaGarbageItem(tomorrow);

  // 時間帯でグループ化（既知の固定順 + ユーザー追加の未知時間帯を出現順で末尾に）
  const knownSlots = [
    '朝',
    '午前利用中',
    '前半終了後',
    '午前終了後',
    '昼清掃・準備',
    '午後利用中',
    '午後準備'
  ];
  const unknownSlots = [];
  STATE.tasks.forEach(function(t) {
    if (t.timeSlot && knownSlots.indexOf(t.timeSlot) === -1 && unknownSlots.indexOf(t.timeSlot) === -1) {
      unknownSlots.push(t.timeSlot);
    }
  });
  const timeSlots = knownSlots.concat(unknownSlots);

  const timeSlotLabels = {
    '朝': '朝',
    '午前利用中': '午前利用中',
    '前半終了後': '前半終了後',
    '午前終了後': '午前終了後',
    '昼清掃・準備': '昼清掃・準備',
    '午後利用中': '午後利用中',
    '午後準備': '午後準備'
  };
  unknownSlots.forEach(function(s) { timeSlotLabels[s] = s; });

  // 旧値→新値マッピング（互換性維持。既存タスクが UI で再保存されるまでこちらで吸収）
  // 旧「利用中」「午前利用中（前半）」「午前利用中（後半）」は一旦「午前利用中」として表示。
  // 社長が UI で「午後利用中」に変更して保存すれば、その時点でスプレッドシートに新値が書き込まれる。
  const legacyTimeSlotMap = {
    '朝（1から順番に行う）': '朝',
    '午前利用中（前半）': '午前利用中',
    '午前利用中（後半）': '午前利用中',
    '利用中': '午前利用中'
  };
  STATE.tasks.forEach(function(t) {
    if (legacyTimeSlotMap[t.timeSlot]) {
      t.timeSlot = legacyTimeSlotMap[t.timeSlot];
    }
  });

  // 共通判定関数
  function isTaskActiveToday_(t) {
    if (!t.dayLimit) return true;
    if (t.dayLimit === '月末日' || t.dayLimit === '月末') return todayIsLastDay;
    // 「N日インターバル」形式：前回実施からN日以上経過で表示
    const intervalMatch = String(t.dayLimit).match(/^(\d+)日インターバル$/);
    if (intervalMatch) {
      const intervalDays = parseInt(intervalMatch[1], 10);
      // 当日チェック済みなら表示維持（チェック直後に消えないように）
      if (STATE.log.some(function(l) { return l.taskNo == t.no; })) return true;
      const lastDate = (STATE.taskLastDates || {})[String(t.no)];
      if (!lastDate) return true; // 一度も実施なし → 表示
      const last = new Date(lastDate + 'T00:00:00');
      const todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const daysSince = Math.floor((todayMid - last) / 86400000);
      return daysSince >= intervalDays;
    }
    return t.dayLimit.indexOf(todayDay) >= 0;
  }
  function isSummaryTaskGlobal_(t) {
    return /(全て|すべて)の確認チェック/.test(t.name);
  }
  function isAllDaySummary_(t) {
    return /1日.*(全て|すべて)の確認チェック/.test(t.name);
  }
  // 「1日 全ての確認チェック」用：全時間帯の非サマリータスクが全件チェック済みか
  const allDayNonSummaryAllChecked = STATE.tasks.filter(function(t) {
    return isTaskActiveToday_(t) && !isSummaryTaskGlobal_(t);
  }).every(function(t) {
    return STATE.log.some(function(l) { return l.taskNo == t.no; });
  });

  // 完全連鎖ロック用：時間帯ごとのサマリー完了状態
  // - その時間帯のサマリータスク（1日サマリー除く）が全部チェック済みなら true
  // - サマリータスクが無い時間帯は true（ブロックしない）
  const slotSummaryDone = {};
  timeSlots.forEach(function(slot) {
    const summaries = STATE.tasks.filter(function(t) {
      return t.timeSlot === slot
        && isSummaryTaskGlobal_(t)
        && !isAllDaySummary_(t)
        && isTaskActiveToday_(t);
    });
    if (summaries.length === 0) {
      slotSummaryDone[slot] = true;
      return;
    }
    slotSummaryDone[slot] = summaries.every(function(t) {
      return STATE.log.some(function(l) { return l.taskNo == t.no; });
    });
  });

  let html = '';
  let totalTasks = 0;
  let checkedTasks = 0;

  timeSlots.forEach(function(slot) {
    const slotTasks = STATE.tasks.filter(function(t) { return t.timeSlot === slot; });
    if (slotTasks.length === 0) return;

    // 今日の曜日でフィルタ + ゴミ出し系タスクの動的リネーム
    // - 「ゴミ出し」: 今日のごみ → ある日「ゴミ出し（可燃物）」/ない日「ゴミ出し（今日なし）」
    // - 「明日のごみ出し準備」: 明日のごみ → ある日「明日のごみ出し準備【可燃物】」/ない日「明日のごみ出し準備【なし】」
    const filteredTasks = slotTasks.filter(function(t) {
      return isTaskActiveToday_(t);
    }).map(function(t) {
      if (/^ゴミ出し($|（)/.test(t.name)) {
        return Object.assign({}, t, { name: 'ゴミ出し（' + (todayGarbage || '今日なし') + '）' });
      }
      if (/^明日の(ごみ|ゴミ)出し準備($|【)/.test(t.name)) {
        return Object.assign({}, t, { name: '明日のごみ出し準備【' + (tomorrowGarbage || 'なし') + '】' });
      }
      return t;
    }).filter(function(t) { return t !== null; });

    if (filteredTasks.length === 0) return;

    let slotChecked = 0;
    let taskHtml = '';

    // サマリータスク判定: 名前に「全ての確認チェック」「すべての確認チェック」を含む
    function isSummaryTask(t) {
      return /(全て|すべて)の確認チェック/.test(t.name);
    }
    // このセクションの非サマリータスクが全部チェック済みか
    const nonSummaryTasks = filteredTasks.filter(function(t){ return !isSummaryTask(t); });
    const allOthersChecked = nonSummaryTasks.length > 0 && nonSummaryTasks.every(function(t) {
      return STATE.log.some(function(l) { return l.taskNo == t.no; });
    });
    // サマリータスクは必ずセクションの末尾に表示する（並びを安定ソートで補正）
    filteredTasks.sort(function(a, b) {
      return (isSummaryTask(a) ? 1 : 0) - (isSummaryTask(b) ? 1 : 0);
    });

    filteredTasks.forEach(function(task) {
      const logEntry = STATE.log.find(function(l) { return l.taskNo == task.no; });
      const isChecked = !!logEntry;
      if (isChecked) { checkedTasks++; slotChecked++; }
      totalTasks++;

      // ロック判定（完全連鎖）：
      //   通常タスク → 前の時間帯のサマリーが全部完了
      //   時間帯サマリー → 前のサマリー全部完了 + 自分の時間帯の他タスク全部完了
      //   1日サマリー → 全時間帯の非サマリータスクが全部完了
      const taskSlotIdx = timeSlots.indexOf(task.timeSlot);
      const previousSlots = timeSlots.slice(0, Math.max(taskSlotIdx, 0));
      const allPreviousSummariesDone = previousSlots.every(function(s) { return slotSummaryDone[s]; });
      const blockingSlot = previousSlots.find(function(s) { return !slotSummaryDone[s]; });

      let locked = false;
      let lockMsg = '';
      if (!isChecked) {
        if (isAllDaySummary_(task)) {
          locked = !allDayNonSummaryAllChecked;
          lockMsg = '今日の全タスクを終わらせてから押してください';
        } else if (isSummaryTask(task)) {
          if (!allPreviousSummariesDone) {
            locked = true;
            lockMsg = '先に「' + blockingSlot + '」の確認チェックを完了させてください';
          } else if (!allOthersChecked) {
            locked = true;
            lockMsg = 'このセクションの全項目をチェックしてから押してください';
          }
        } else {
          // 通常タスク：前の時間帯のサマリー全部完了が必要
          if (!allPreviousSummariesDone) {
            locked = true;
            lockMsg = '先に「' + blockingSlot + '」の確認チェックを完了させてください';
          }
        }
      }
      const clickAttr = locked
        ? 'onclick="showToast(\'' + escHtml(lockMsg).replace(/'/g, '\\\'') + '\')"'
        : 'onclick="toggleTask(' + task.no + ',\'' + escHtml(task.name) + '\',' + isChecked + ')"';
      const lockedStyle = locked ? ' style="opacity:0.45;cursor:not-allowed;"' : '';

      // 代理ボタン: 未チェック・ロック解除のタスクにのみ表示
      const proxyBtn = (!isChecked && !locked)
        ? '<button class="proxy-btn" onclick="event.stopPropagation();showProxyModal(' + task.no + ',\'' + escHtml(task.name) + '\')">代理</button>'
        : '';

      // 完了者の表示: 名前に「（代理）」を含むなら別スタイル
      let staffHtml = '';
      if (isChecked) {
        const isProxy = /（代理）$/.test(logEntry.staff);
        staffHtml = '<div class="task-meta"><span class="staff-name' + (isProxy ? ' proxy' : '') + '">' + escHtml(logEntry.staff) + '</span> ' + escHtml(logEntry.time) + '</div>';
      }

      taskHtml += '<div class="task-item' + (isChecked ? ' checked' : '') + '" '
        + clickAttr + lockedStyle + ' '
        + 'data-no="' + task.no + '">'
        + '<div class="task-check">' + (isChecked ? '&#10003;' : (locked ? '🔒' : '')) + '</div>'
        + '<div class="task-info">'
        + '<div class="task-name">' + escHtml(task.name)
        + (task.dayLimit ? '<span class="task-day-limit">' + escHtml(task.dayLimit) + '</span>' : '')
        + '</div>'
        + staffHtml
        + '</div>'
        + proxyBtn
        + '</div>';
    });

    html += '<div class="time-section">'
      + '<div class="time-header">'
      + '<span>' + escHtml(slot) + '</span>'
      + '<span class="count">' + slotChecked + '/' + filteredTasks.length + '</span>'
      + '</div>'
      + '<div class="task-list">' + taskHtml + '</div></div>';
  });

  container.innerHTML = html;
  updateProgress(checkedTasks, totalTasks);
}

function updateProgress(checked, total) {
  const pct = total === 0 ? 0 : Math.round((checked / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressBar').textContent = pct + '%';
  document.getElementById('progressLabel').textContent =
    pct === 100 ? '全タスク完了！' : '今日の進捗';
  document.getElementById('progressCount').textContent = checked + ' / ' + total;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

let pendingProxy = null;

function showProxyModal(taskNo, taskName) {
  pendingProxy = { no: taskNo, name: taskName };
  document.getElementById('proxyModalSub').textContent = '「' + taskName + '」のチェックを誰の代わりに付けますか？';
  const grid = document.getElementById('proxyStaffGrid');

    btn.onclick = function() { doProxyCheck(name); };
    grid.appendChild(btn);
  });

}

  document.getElementById('proxyModal').classList.remove('show');

}

async function doProxyCheck(staffName) {
  if (!pendingProxy) return;
  const task = pendingProxy;
  closeProxyModal();
  const proxyStaff = staffName + '（代理）';
  try {
    await gasPost({ action: 'check', taskNo: task.no, taskName: task.name, staff: proxyStaff });
    var now = new Date();
    STATE.log.push({ taskNo: task.no, taskName: task.name, staff: proxyStaff, time: ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2) });
    renderTasks();
    renderStats();
    showToast(staffName + 'さん（代理）でチェックしました');
    setTimeout(function() { refreshLog(); }, 2000);
  } catch (e) {
    showToast('代理チェック失敗: ' + e.message);
  }
}

async function toggleTask(taskNo, taskName, isChecked) {
  if (!STATE.currentUser) {
    showStaffModal();
    return;
  }

  if (isChecked) {
    // チェック解除は確認する（誤タップ防止）
    if (!confirm('「' + taskName + '」のチェックを解除しますか？')) return;
  }

  try {
    if (isChecked) {
      // チェック解除
      await gasPost({ action: 'uncheck', taskNo: taskNo });
      // ローカルでも即反映
      STATE.log = STATE.log.filter(function(l) { return l.taskNo != taskNo; });
      renderTasks();
      renderStats();
      showToast(taskName + ' のチェックを解除しました');
    } else {
      // チェック
      await gasPost({ action: 'check', taskNo: taskNo, taskName: taskName, staff: STATE.currentUser });
      // ローカルでも即反映
      var now = new Date();
      STATE.log.push({ taskNo: taskNo, taskName: taskName, staff: STATE.currentUser, time: ('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2) });
      renderTasks();
      renderStats();
      showToast(STATE.currentUser + ' が「' + taskName + '」を完了');
    }
    // 少し待ってからサーバーのデータと同期
    setTimeout(function() { refreshLog(); }, 2000);
  } catch (e) {
    showToast('通信エラー: ' + e.message);
    // オフライン時もローカルで即反映
    if (!isChecked) {
      var now2 = new Date();
      STATE.log.push({ taskNo: taskNo, taskName: taskName, staff: STATE.currentUser, time: ('0'+now2.getHours()).slice(-2)+':'+('0'+now2.getMinutes()).slice(-2) });
    } else {
      STATE.log = STATE.log.filter(function(l) { return l.taskNo != taskNo; });
    }
    renderTasks();
    renderStats();
  }
}

// --- 業務分担マトリックス ---
async function loadMatrix() {
  const body = document.getElementById('statsBody');
  body.innerHTML = '<div style="padding:20px;text-align:center;color:#666">読み込み中...</div>';
  const period = document.getElementById('matrixPeriod').value;
  let monthParam = 'all';
  if (period === 'current') {
    const now = new Date();
    monthParam = now.getFullYear() + '-' + ('0' + (now.getMonth() + 1)).slice(-2);
  } else if (period === 'prev') {
    const now = new Date();
    const prev = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    monthParam = prev.getFullYear() + '-' + ('0' + (prev.getMonth() + 1)).slice(-2);
  }
  try {
    const res = await gasGet({ action: 'getTaskStaffMatrix', month: monthParam });
    if (res.error) throw new Error(res.error);
    renderMatrix(res.matrix || {}, monthParam);
  } catch (e) {
    body.innerHTML = '<div style="padding:20px;text-align:center;color:#c00">読み込み失敗: ' + escHtml(e.message) + '</div>';
  }
}

function renderMatrix(matrix, period) {
  const body = document.getElementById('statsBody');

  // スタッフ一覧（実績がある人 + 登録スタッフ）。代理を含む既存スタッフ名のみ。
  const staffSet = new Set();
  Object.values(matrix).forEach(function(t) {
    Object.keys(t.counts || {}).forEach(function(s) { staffSet.add(s); });
  });
  // 登録スタッフも含める（実績0でも列を出すため）
  STATE.staff.forEach(function(s) {
    const name = (typeof s === 'string') ? s : (s.name || '');
    if (name && name !== '代表') staffSet.add(name);
  });
  const staffList = Array.from(staffSet).sort();

  // タスクごとの行を作る。STATE.tasks の順序に合わせ、ログにのみあるタスクは末尾。
  const orderedTaskNos = STATE.tasks.map(function(t) { return String(t.no); });
  const matrixKeys = Object.keys(matrix);
  matrixKeys.forEach(function(no) {
    if (orderedTaskNos.indexOf(String(no)) === -1) orderedTaskNos.push(String(no));
  });

  if (staffList.length === 0 || orderedTaskNos.length === 0) {
    body.innerHTML = '<div style="padding:20px;text-align:center;color:#666">該当期間のデータがありません</div>';
    return;
  }

  // 各タスクの最大値（その行の最大％判定用）
  let html = '<div class="matrix-wrapper"><table class="matrix-table">';
  html += '<thead><tr><th class="task-name-col">タスク</th>';
  staffList.forEach(function(s) {
    html += '<th>' + escHtml(s) + '</th>';
  });
  html += '<th>合計</th></tr></thead><tbody>';

  orderedTaskNos.forEach(function(no) {
    const taskInfo = matrix[no] || { name: '', counts: {} };
    let taskName = taskInfo.name;
    if (!taskName) {
      const t = STATE.tasks.find(function(t) { return String(t.no) === String(no); });
      if (t) taskName = t.name;
    }
    if (!taskName) return;
    const counts = taskInfo.counts || {};
    const total = staffList.reduce(function(sum, s) { return sum + (counts[s] || 0); }, 0);
    if (total === 0) {
      // 全員0回のタスクはスキップ（雑音）。ただし表に「未実施」行として出してもいい
      // ここでは表示する：そのタスクは「誰もやってない」=見える化
    }
    html += '<tr>';
    html += '<td class="task-name-col">' + escHtml(taskName) + '</td>';
    staffList.forEach(function(s) {
      const c = counts[s] || 0;
      const pct = total > 0 ? Math.round((c / total) * 100) : 0;
      let cls = '';
      if (c === 0) cls = 'zero';
      else if (pct >= 40) cls = 'high';
      else if (pct < 15) cls = 'low';
      html += '<td class="' + cls + '">' + (c === 0 ? '0' : (c + '<br><small>' + pct + '%</small>')) + '</td>';
    });
    html += '<td><strong>' + total + '</strong></td>';
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  html += '<div style="font-size:11px;color:#666;padding:6px 4px">期間: ' + escHtml(period === 'all' ? '全期間' : period) + ' ／ <span style="background:#ffe3e3;padding:1px 6px;border-radius:3px;color:#c00">赤=0回</span> <span style="background:#fff5d6;padding:1px 6px;border-radius:3px">黄=15%未満</span> <span style="background:#d6f5d8;padding:1px 6px;border-radius:3px">緑=40%以上</span> ／ 代理は元のスタッフに集約</div>';
  body.innerHTML = html;
}

function renderStats() {
  const body = document.getElementById('statsBody');
  let data = {};

  if (STATE.statsView === 'today') {
    // 今日のログからスタッフごとにカウント
    STATE.log.forEach(function(l) {
      if (!data[l.staff]) data[l.staff] = 0;
      data[l.staff]++;
    });
  } else {
    data = STATE.monthlyStats || {};
  }

  // ソート（多い順）
  const sorted = Object.entries(data).sort(function(a, b) { return b[1] - a[1]; });

  if (sorted.length === 0) {
    body.innerHTML = '<div style="text-align:center;color:var(--sub);padding:16px;font-size:13px">'
      + (STATE.statsView === 'today' ? 'まだチェックがありません' : 'データがありません') + '</div>';
    return;
  }

  const maxCount = sorted[0][1];
  let html = '';

  sorted.forEach(function(item, i) {
    const name = item[0];
    const count = item[1];
    const pct = maxCount > 0 ? Math.round((count / maxCount) * 100) : 0;
    const rankClass = i === 0 ? ' rank1' : i === 1 ? ' rank2' : i === 2 ? ' rank3' : '';

    html += '<div class="stats-row">'
      + '<div class="stats-rank' + rankClass + '">' + (i + 1) + '</div>'
      + '<div class="stats-name">' + escHtml(name) + '</div>'
      + '<div class="stats-bar-wrap"><div class="stats-bar-fill" style="width:' + pct + '%"></div></div>'
      + '<div class="stats-count">' + count + '<span class="stats-unit">回</span></div>'
      + '</div>';
  });

  body.innerHTML = html;
}

// --- 編集モード ---
// 通常画面と同じ並び（時間帯順 → 同じ時間帯内は元の順）に並び替える
const EDIT_SLOT_ORDER = ['朝（1から順番に行う）','午前利用中','前半終了後','午前終了後','昼清掃・準備','午後利用中','午後準備'];

function sortByTimeSlot_(tasks) {
  // 既知時間帯にない時間帯は最後尾に、出現順を維持してまとめる
  const unknown = [];
  tasks.forEach(function(t) {
    if (EDIT_SLOT_ORDER.indexOf(t.timeSlot) === -1 && unknown.indexOf(t.timeSlot) === -1) {
      unknown.push(t.timeSlot);
    }
  });
  const full = EDIT_SLOT_ORDER.concat(unknown);
  return tasks.slice().sort(function(a, b) {
    return full.indexOf(a.timeSlot) - full.indexOf(b.timeSlot);
  });
}

function enterEditMode() {
  STATE.editingTasks = STATE.tasks.map(function(t) {
    return { no: t.no, name: t.name, timeSlot: t.timeSlot, dayLimit: t.dayLimit || '', memo: t.memo || '' };
  });
  STATE.editingTasks = sortByTimeSlot_(STATE.editingTasks);
  STATE.editMode = true;
  STATE.editDirty = false;
  document.body.classList.add('edit-mode');
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  renderEditTasks();
}

function exitEditMode() {
  STATE.editMode = false;
  STATE.editingTasks = [];
  STATE.editDirty = false;
  document.body.classList.remove('edit-mode');
  startAutoRefresh();
  renderTasks();
}

function cancelEditMode() {
  if (STATE.editDirty && !confirm('編集中の内容を破棄しますか？')) return;
  exitEditMode();
}

function renderEditTasks() {
  const container = document.getElementById('taskContainer');
  let html = '';
  let currentSlot = null;
  STATE.editingTasks.forEach(function(t, idx) {
    if (t.timeSlot !== currentSlot) {
      currentSlot = t.timeSlot;
      html += '<div class="edit-slot-header">' + escHtml(currentSlot || '(時間帯未設定)') + '</div>';
    }
    html += '<div class="edit-row" data-idx="' + idx + '">';
    html += '<div class="move-btns">';
    html += '<button onclick="moveEditRow(' + idx + ',-1)" title="上へ">↑</button>';
    html += '<button onclick="moveEditRow(' + idx + ',1)" title="下へ">↓</button>';
    html += '</div>';
    html += '<input type="text" class="name-input" value="' + escHtml(t.name) + '" placeholder="タスク名" oninput="updateEditField(' + idx + ',\'name\',this.value)">';
    html += '<select class="slot-select" onchange="onSlotChange(' + idx + ',this)">' + buildSlotOptions(t.timeSlot) + '</select>';
    html += '<select class="day-select" onchange="onDayChange(' + idx + ',this)">' + buildDayOptions(t.dayLimit) + '</select>';
    html += '<input type="text" class="memo-input" value="' + escHtml(t.memo) + '" placeholder="メモ（任意）" oninput="updateEditField(' + idx + ',\'memo\',this.value)">';
    html += '<button class="delete-btn" onclick="deleteEditRow(' + idx + ')">削除</button>';
    html += '</div>';
  });
  html += '<button class="edit-add-btn" onclick="addEditRow()">＋ タスクを追加</button>';
  container.innerHTML = html;
}

function updateEditField(idx, field, value) {
  STATE.editingTasks[idx][field] = value;
  STATE.editDirty = true;
}

function deleteEditRow(idx) {
  const t = STATE.editingTasks[idx];
  if (!confirm('「' + (t.name || '(名称なし)') + '」を削除しますか？')) return;
  STATE.editingTasks.splice(idx, 1);
  STATE.editDirty = true;
  renderEditTasks();
}

function addEditRow() {
  STATE.editingTasks.push({ name: '', timeSlot: '朝（1から順番に行う）', dayLimit: '', memo: '' });
  STATE.editDirty = true;
  renderEditTasks();
  setTimeout(function() {
    const inputs = document.querySelectorAll('.edit-row .name-input');
    if (inputs.length) inputs[inputs.length - 1].focus();
  }, 50);
}

function moveEditRow(idx, dir) {
  const target = idx + dir;
  if (target < 0 || target >= STATE.editingTasks.length) return;
  const tmp = STATE.editingTasks[idx];
  STATE.editingTasks[idx] = STATE.editingTasks[target];
  STATE.editingTasks[target] = tmp;
  STATE.editDirty = true;
  renderEditTasks();
}

// 各時間帯セクションに「全ての確認チェック」が無ければ追加する補完ボタン
function addMissingSummaries() {
  const slotMap = {};   // { 時間帯名: { hasSummary: bool } }
  STATE.editingTasks.forEach(function(t) {
    if (!t.timeSlot) return;
    if (!slotMap[t.timeSlot]) slotMap[t.timeSlot] = { hasSummary: false };
    if (/(全て|すべて)の確認チェック/.test(t.name || '')) {
      slotMap[t.timeSlot].hasSummary = true;
    }
  });
  const slotsToAdd = Object.keys(slotMap).filter(function(s) { return !slotMap[s].hasSummary; });
  if (slotsToAdd.length === 0) {
    showToast('全ての時間帯に既に確認ボタンがあります');
    return;
  }
  if (!confirm(slotsToAdd.length + '個の時間帯に「全ての確認チェック」を追加しますか？\n\n対象：\n' + slotsToAdd.join('\n'))) return;
  slotsToAdd.forEach(function(slot) {
    STATE.editingTasks.push({
      no: 0,
      name: slot + '：全ての確認チェック',
      timeSlot: slot,
      dayLimit: '',
      memo: ''
    });
  });
  STATE.editingTasks = sortByTimeSlot_(STATE.editingTasks);
  STATE.editDirty = true;
  renderEditTasks();
  showToast(slotsToAdd.length + '個の確認ボタンを追加しました（保存で確定）');
}

// --- 既存値からユニーク抽出 ---
function getUniqueSlots() {
  const set = new Set();
  STATE.tasks.forEach(function(t) { if (t.timeSlot) set.add(t.timeSlot); });
  STATE.editingTasks.forEach(function(t) { if (t.timeSlot) set.add(t.timeSlot); });
  // 推奨表示順序を優先
  const preferred = ['朝（1から順番に行う）','午前利用中','前半終了後','午前終了後','昼清掃・準備','午後利用中','午後準備'];
  const result = preferred.filter(function(s) { return set.has(s); });
  Array.from(set).forEach(function(s) { if (result.indexOf(s) === -1) result.push(s); });
  return result;
}

function getUniqueDays() {
  const set = new Set();
  STATE.tasks.forEach(function(t) { if (t.dayLimit) set.add(t.dayLimit); });
  STATE.editingTasks.forEach(function(t) { if (t.dayLimit) set.add(t.dayLimit); });
  return Array.from(set);
}

function buildSlotOptions(selected) {
  const slots = getUniqueSlots();
  if (selected && slots.indexOf(selected) === -1) slots.unshift(selected);
  let html = slots.map(function(s) {
    return '<option value="' + escHtml(s) + '"' + (s === selected ? ' selected' : '') + '>' + escHtml(s) + '</option>';
  }).join('');
  html += '<option value="__new__">＋ 新しい時間帯を作る</option>';
  return html;
}

function buildDayOptions(selected) {
  const days = getUniqueDays();
  // 「月末日」「30日インターバル」を必ず候補に含める
  if (days.indexOf('月末日') === -1) days.push('月末日');
  if (days.indexOf('30日インターバル') === -1) days.push('30日インターバル');
  if (selected && days.indexOf(selected) === -1) days.unshift(selected);
  let html = '<option value=""' + (!selected ? ' selected' : '') + '>毎日</option>';
  html += days.map(function(d) {
    return '<option value="' + escHtml(d) + '"' + (d === selected ? ' selected' : '') + '>' + escHtml(d) + '</option>';
  }).join('');
  html += '<option value="__new__">＋ 新しい曜日制限を作る</option>';
  return html;
}

function onSlotChange(idx, sel) {
  if (sel.value === '__new__') {
    const v = prompt('新しい時間帯名を入力してください（例: 夕方準備）:');
    if (v && v.trim()) {
      STATE.editingTasks[idx].timeSlot = v.trim();
      STATE.editDirty = true;
    }
  } else {
    STATE.editingTasks[idx].timeSlot = sel.value;
    STATE.editDirty = true;
  }
  // 時間帯が変わったので並びを揃える（該当時間帯グループの末尾に移動）
  STATE.editingTasks = sortByTimeSlot_(STATE.editingTasks);
  renderEditTasks();
}

function onDayChange(idx, sel) {
  if (sel.value === '__new__') {
    const v = prompt('新しい曜日制限を入力してください（例: 月・水・金 / 空欄で毎日）:');
    if (v !== null) {
      STATE.editingTasks[idx].dayLimit = v.trim();
      STATE.editDirty = true;
    }
    renderEditTasks();
    return;
  }
  updateEditField(idx, 'dayLimit', sel.value);
}

async function saveEditMode() {
  // バリデーション
  for (let i = 0; i < STATE.editingTasks.length; i++) {
    const t = STATE.editingTasks[i];
    if (!t.name || !t.name.trim()) {
      showToast((i + 1) + '番目のタスク名を入力してください');
      return;
    }
    if (!t.timeSlot || !t.timeSlot.trim()) {
      showToast((i + 1) + '番目の時間帯を選択してください');
      return;
    }
  }

  const btn = document.getElementById('btnSaveEdit');
  btn.disabled = true;
  btn.textContent = '保存中...';

  try {
    const order = STATE.editingTasks.map(function(t) {
      return {
        no: 0,
        name: t.name.trim(),
        timeSlot: t.timeSlot.trim(),
        dayLimit: (t.dayLimit || '').trim(),
        memo: (t.memo || '').trim()
      };
    });
    // fetch+POST（no-cors）で大きいデータを送信。レスポンスは読めないので
    // 楽観的に成功扱いし、直後の loadAllData() で実データを取り直して整合確認。
    await gasPostLarge({ action: 'reorderTasks', order: order });
    showToast('保存しました（' + order.length + '件）');
    exitEditMode();
    await loadAllData();
  } catch (e) {
    showToast('保存失敗: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '保存';
  }
}
</script>
