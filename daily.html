// 時刻文字列→分に変換（特殊値にも対応）
function timeToMin(t){
  if(!t) return null;
  const specials={'送迎後':17*60+15,'清掃後':17*60+15,'ラスト':17*60+15};
  if(specials[t]!==undefined) return specials[t];
  if(t==='有給') return null;
  const p=t.split(':');
  if(p.length!==2) return null;
  const h=parseInt(p[0]),m=parseInt(p[1]);
  if(isNaN(h)||isNaN(m)) return null;
  return h*60+m;
}

// フロアスタッフの実働時間（出勤〜退社−休憩1h）※data省略時はグローバルD
function calcFloorHours(name,data){
  const d=data||D;
  const att=(d.attendance||[]).find(a=>a.name===name);
  if(!att||!att.time) return 0;
  const startM=timeToMin(att.time);
  if(startM===null) return 0;
  const lv=(d.leave||[]).find(l=>l.name===name);
  if(!lv||!lv.time) return 0;
  const endM=timeToMin(lv.time);
  if(endM===null) return 0;
  const raw=(endM-startM)/60-1;
  return Math.max(0,Math.round(raw*100)/100);
}

// 送迎スタッフの実働時間（各時間帯の合計）※data省略時はグローバルD
function calcSendHours(name,data){
  const d=data||D;
  const ss=(d.sendStaff||[]).find(s=>s.name===name);
  if(!ss) return 0;
  let total=0;
  if(ss.am&&ss.am!=='有給'){
    const s=timeToMin(ss.am), e=timeToMin(ss.amEnd||'9:00');
    if(s!==null&&e!==null) total+=e-s;
  }
  if(ss.mid){
    const s=timeToMin(ss.mid), e=timeToMin(ss.midEnd||'13:30');
    if(s!==null&&e!==null) total+=e-s;
  }
  if(ss.pm){
    const s=timeToMin(ss.pm), e=timeToMin(ss.pmEnd||'17:15');
    if(s!==null&&e!==null) total+=e-s;
  }
  return Math.round(total/60*100)/100;
}

// ═══════════════════════════════════════════════
// 月間人件費集計
// ═══════════════════════════════════════════════
// 月全体の人件費を計算（保存済み＝確定、未保存＝シフトから予測）
function calcFullMonthCost(){
  const all=loadAllData();
  const wages=loadWages();
  if(!D.date) return null;
  const ym=D.date.slice(0,7);
  const year=parseInt(ym.slice(0,4));
  const month=parseInt(ym.slice(5,7))-1;
  const lastDay=new Date(year,month+1,0).getDate();
  const workDays=getWorkingDays(D.date);
  const monthData=SHIFT_DATA[ym];

  let confirmedTotal=0, confirmedDays=0;
  let plannedTotal=0, plannedDays=0;
  const dailyBreakdown=[]; // [{date,cost,type:'confirmed'|'planned'}]

  for(let day=1;day<=lastDay;day++){
    const d=new Date(year,month,day);
    const dow=d.getDay();
    if(dow===0||dow===6) continue;
    const dateStr=fmtDate(d);
    const savedData=all[dateStr];

    if(savedData){
      // 確定：保存済みデータから計算
      confirmedDays++;
      let dayCost=0;
      (savedData.attendance||[]).forEach(a=>{
        if(savedData.staffAbsent&&savedData.staffAbsent[a.name]) return;
        const staff=STAFF.find(s=>s.name===a.name);
        if(!staff) return;
        const wage=wages[staff.id]||0;
        if(staff.wageType==='monthly'){
          dayCost+=wage>0?Math.round(wage/workDays):0;
        } else {
          dayCost+=Math.round(wage*calcFloorHours(a.name,savedData));
        }
      });
      (savedData.sendStaff||[]).forEach(s=>{
        if(savedData.staffAbsent&&savedData.staffAbsent[s.name]) return;
        const staff=STAFF.find(st=>st.name===s.name);
        if(!staff) return;
        const wage=wages[staff.id]||0;
        dayCost+=Math.round(wage*calcSendHours(s.name,savedData));
      });
      confirmedTotal+=dayCost;
      dailyBreakdown.push({date:dateStr,cost:dayCost,type:'confirmed'});
    } else if(monthData){
      // 予定：シフトデータから計算
      plannedDays++;
      let dayCost=0;
      for(const [staffId,shifts] of Object.entries(monthData)){
        const code=shifts[day-1];
        if(!code||code==='-'||code==='休') continue;
        const staff=STAFF.find(s=>s.id===staffId);
        if(!staff) continue;
        const wage=wages[staffId]||0;
        if(staff.wageType==='monthly'){
          dayCost+=wage>0?Math.round(wage/workDays):0;
        } else {
          dayCost+=Math.round(wage*(SHIFT_HOURS[code]||0));
        }
      }
      plannedTotal+=dayCost;
      dailyBreakdown.push({date:dateStr,cost:dayCost,type:'planned'});
    }
  }
  return {confirmedTotal,confirmedDays,plannedTotal,plannedDays,
    grandTotal:confirmedTotal+plannedTotal,totalDays:confirmedDays+plannedDays,workDays,dailyBreakdown};
}

function renderWagePanel(){
  const wages=loadWages();
  let totalCost=0;
  let workingCount=0;
  let rows='';

  // 全出勤者（フロア＋送迎）をまとめて処理
  const allWorkers=[];
  D.attendance.forEach(a=>{
    const staff=STAFF.find(s=>s.name===a.name);
    if(!staff) return;
    allWorkers.push({name:a.name, staff:staff, section:'フロア'});
  });
  D.sendStaff.forEach(s=>{
    const staff=STAFF.find(st=>st.name===s.name);
    if(!staff) return;
    allWorkers.push({name:s.name, staff:staff, section:'送迎'});
  });

  const workDays=getWorkingDays(D.date);

  allWorkers.forEach(w=>{
    const isAbsent=D.staffAbsent&&D.staffAbsent[w.name];
    // 実際の勤務時間から計算
    const hours=w.section==='送迎'?calcSendHours(w.name):calcFloorHours(w.name);
    const wage=wages[w.staff.id]||0;
    const wt=w.staff.wageType;
    let cost=0, hoursLabel='', unitLabel='';

    if(wt==='monthly'){
      // 正社員：月給÷営業日数＝日当
      cost=wage>0?Math.round(wage/workDays):0;
      hoursLabel=hours?hours+'h（日当）':'日当';
      unitLabel='円/月';
    } else {
      // パート・送迎：時給×実働時間
      cost=Math.round(wage*hours);
      hoursLabel=hours?hours+'h':'--';
      unitLabel='円/h';
    }

    const cls=isAbsent?' wage-absent':'';
    if(!isAbsent){
      totalCost+=cost;
      workingCount++;
    }

    // 出退勤時間の表示
    let timeInfo='';
    if(w.section==='送迎'){
      const ss=D.sendStaff.find(s=>s.name===w.name);
      if(ss){
        const parts=[];
        if(ss.am&&ss.am!=='有給') parts.push(ss.am+'〜'+(ss.amEnd||''));
        if(ss.mid) parts.push(ss.mid+'〜'+(ss.midEnd||''));
        if(ss.pm) parts.push(ss.pm+'〜'+(ss.pmEnd||''));
        timeInfo=parts.join(' / ');
      }
    } else {
      const att=D.attendance.find(a=>a.name===w.name);
      const lv=D.leave.find(l=>l.name===w.name);
      if(att&&lv&&lv.time) timeInfo=att.time+'〜'+lv.time;
    }

    rows+='<tr class="'+cls+'">';
    rows+='<td>'+w.name+'</td>';
    rows+='<td style="color:#666;font-size:10px">'+w.section+'</td>';
    rows+='<td style="color:#666;font-size:10px">'+(timeInfo||'--')+'</td>';
    rows+='<td style="color:#666;font-size:10px">'+hoursLabel+'</td>';

  // ④ 月間見込み（コンパクト版）
  if(mc){
    const monthNum=parseInt(D.date.slice(5,7));
    h+='<div style="font-weight:900;font-size:12px;margin-bottom:3px;padding:3px 8px;background:#e8f5e9;border-radius:4px;border-left:4px solid #0d9668">💰 '+monthNum+'月の人件費見込み</div>';

    // 月間売上推計との比較
    const avgRevM=loadAvgRevenue();
    // 全営業日の利用者数合計を推計（保存日の平均 × 営業日数）
    let totalUsersMonth=0, savedDaysWithUsers=0;

    const avgUsersPerDay=savedDaysWithUsers>0?Math.round(totalUsersMonth/savedDaysWithUsers):totalUsers;
    const monthlyRevEst=avgRevM*avgUsersPerDay*mc.workDays;
    const monthlyRatio=monthlyRevEst>0?Math.round(mc.grandTotal/monthlyRevEst*1000)/10:0;
    const mRatioColor=monthlyRatio<=60?'#4caf50':monthlyRatio<=70?'#ff9800':'#f44336';

    h+='<div style="padding:2px 6px;border-radius:3px;text-align:center;background:#333">';
    h+='<div style="font-size:8px;color:#aaa">月間人件費率</div>';
    h+='<div style="font-weight:900;font-size:13px;color:'+mRatioColor+'">'+monthlyRatio+'%</div></div>';
    h+='</div>';
  }

  h+='</div>'; // 右パネル終了

// ═══════════════════════════════════════════════
// 健康チェック（口腔・体重）
// ═══════════════════════════════════════════════
function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getOralCheckData(){
  try{ return JSON.parse(localStorage.getItem('yawaragi_oral_check')||'{}'); }catch(e){ return {}; }
}
function getWeightCheckData(){
  try{ return JSON.parse(localStorage.getItem('yawaragi_weight_check')||'{}'); }catch(e){ return {}; }
}
function saveOralCheckData(data){
  localStorage.setItem('yawaragi_oral_check',JSON.stringify(data));
  debouncedCloudSync();
}
function saveWeightCheckData(data){
  localStorage.setItem('yawaragi_weight_check',JSON.stringify(data));
  debouncedCloudSync();
}
function getHealthFiscalYear(){
  const now=new Date(); return (now.getMonth()+1)>=4?now.getFullYear():now.getFullYear()-1;
}
function getCurrentMonthLabel(){
  return (new Date().getMonth()+1)+'月';
}

// 利用者名から今月の口腔・体重・測定マークHTMLを返す
function getUserHealthMarks(name){
  const fy=getHealthFiscalYear();
  const ml=getCurrentMonthLabel();
  let marks='';

  // 口腔チェック状態
  const oralData=getOralCheckData();
  const userMap={};
  (oralData.users||[]).forEach(u=>{ userMap[u.name]=u; });
  const checks=(oralData.checks||{})[fy]||{};
  const uc=checks[name]||{};
  const done1=!!uc[ml+'_1回目'];
  const done2=!!uc[ml+'_2回目'];
  const info=userMap[name];
  const isKaigo=info?info.care==='kaigo':true;

  if(isKaigo){
    if(done1&&done2) marks+='<span class="health-mark oral-done" title="口腔✓(2回完了)">🦷✓</span>';
    else if(done1) marks+='<span class="health-mark oral-partial" title="口腔①(1回目完了)">🦷①</span>';
  } else {
    if(done1) marks+='<span class="health-mark oral-done" title="口腔✓(完了)">🦷✓</span>';
  }

  // 体重チェック状態
  const wData=getWeightCheckData();
  const weights=(wData.weights||{})[fy]||{};
  const uw=weights[name]||{};
  if(uw[ml]!==undefined&&uw[ml]!==null&&uw[ml]!==''){
    marks+='<span class="health-mark weight-done" title="体重測定済">⚖✓</span>';
  }

  // 測定（3ヶ月ごとの身体測定）チェック - healthChecks.weightDoneに含まれているか
  if(D.healthChecks&&D.healthChecks.weightDone&&D.healthChecks.weightDone.includes(name)){
    if(!marks.includes('⚖✓')) marks+='<span class="health-mark measure-done" title="測定済">📏✓</span>';
  }

  return marks;
}

// 今日来所する利用者一覧（AM+PM、欠席除く、重複除く）
function getTodayUsers(){
  const names=new Set();
  ['am','pm'].forEach(k=>{
    if(!D[k]||!D[k].users) return;
    D[k].users.forEach(u=>{
      if(!u) return;
      const st=D[k].userStatus?D[k].userStatus[u]||'':'';
      if(!isAbsentStatus(st)) names.add(u);
    });
  });
  return [...names];
}

// 口腔チェックが今月まだ必要な人を返す
function getOralNeeded(todayUsers){
  const oralData=getOralCheckData();
  const fy=getHealthFiscalYear();
  const ml=getCurrentMonthLabel();
  const checks=(oralData.checks||{})[fy]||{};
  const userMap={};
  (oralData.users||[]).forEach(u=>{ userMap[u.name]=u; });

  const needed=[];
  todayUsers.forEach(name=>{
    // 今日すでに完了記録済みならスキップ
    if(D.healthChecks&&D.healthChecks.oralDone&&D.healthChecks.oralDone.includes(name)) return;
    const info=userMap[name];
    const isKaigo=info?info.care==='kaigo':true; // 不明なら介護扱い
    const userChecks=checks[name]||{};
    const done1=userChecks[ml+'_1回目'];
    const done2=userChecks[ml+'_2回目'];

    if(!done1){
      needed.push({name,round:'1回目',care:isKaigo?'介護':'支援'});
    } else if(isKaigo&&!done2){
      needed.push({name,round:'2回目',care:'介護'});
    }
  });
  return needed;
}

// 体重測定が今月まだ必要な人を返す
function getWeightNeeded(todayUsers){
  const wData=getWeightCheckData();
  const fy=getHealthFiscalYear();
  const ml=getCurrentMonthLabel();
  const weights=(wData.weights||{})[fy]||{};

  const needed=[];
  todayUsers.forEach(name=>{
    if(D.healthChecks&&D.healthChecks.weightDone&&D.healthChecks.weightDone.includes(name)) return;
    const userWeights=weights[name]||{};
    if(userWeights[ml]===undefined||userWeights[ml]===null||userWeights[ml]===''){
      needed.push({name});
    }
  });
  return needed;
}

const MT_KEY='yawaragi_measurement_tracking';
function loadMT(){try{return JSON.parse(localStorage.getItem(MT_KEY))||{done:{},adHoc:{}};}catch(e){return{done:{},adHoc:{}};}}
function saveMT(d){localStorage.setItem(MT_KEY,JSON.stringify(d));}

// 計画書開始月→測定が必要な月を計算（各3ヶ月期間の最終月）
// 例: 1月開始→3,6,9,12月  4月開始→6,9,12,3月
function getMeasureMonths(startM){
  const r=[];
  for(let i=2;i<12;i+=3) r.push(((startM-1+i)%12)+1);
  return r;
}

// 今月の測定状況を返す
function getMeasureStatus(){
  if(!_taichoUserInfoCache) return {needed:[],completed:[],birthdays:[]};
  const mt=loadMT();
  const now=new Date(),cm=now.getMonth()+1,cy=now.getFullYear();
  const needed=[],completed=[];

  for(const [name,info] of Object.entries(_taichoUserInfoCache)){
    if(!info.planStart) continue;
    // planStartは "yyyy-MM" 形式（例: "2026-04"）
    const psMatch=String(info.planStart).match(/^(\d{4})-(\d{2})$/);
    if(!psMatch) continue;
    const psYear=parseInt(psMatch[1]);
    const psMonth=parseInt(psMatch[2]);
    const mms=getMeasureMonths(psMonth);

    // 今月またはその前の最新の測定月を探す
    // ※ 2026年4月から測定開始のため、それより前の持ち越しは表示しない
    const MEASURE_START_Y=2026, MEASURE_START_M=4;
    let targetM=0,targetY=cy,type='scheduled';
    if(mms.includes(cm)){
      targetM=cm;targetY=cy;
    } else {
      for(let b=1;b<=3;b++){
        let m=cm-b,y=cy;
        if(m<=0){m+=12;y--;}
        if(mms.includes(m)){targetM=m;targetY=y;type='carryover';break;}
      }
    }
    if(!targetM) continue;
    // 測定開始月より前の持ち越しはスキップ
    if(targetY*12+targetM < MEASURE_START_Y*12+MEASURE_START_M) continue;

    // 新規利用者（利用開始日あり）→ 利用開始前の測定期間は除外
    if(info.startDate){
      const sdm=String(info.startDate).match(/^(\d{4})-(\d{2})$/);
      if(sdm){
        const sdY=parseInt(sdm[1]),sdM=parseInt(sdm[2]);
        const selected=cy*12+(cm-1);
        if(selected<sdY*12+(sdM-1)) continue;
      }
    }

    const key=targetY+'-'+String(targetM).padStart(2,'0');
    const nextPlan=targetM%12+1;

    if(mt.done[key]&&mt.done[key].includes(name)){
      completed.push({name,cycleKey:key});
    } else {
      const label=type==='carryover'
        ?nextPlan+'月～（'+targetM+'月から持ち越し）'
        :nextPlan+'月～新計画書';
      needed.push({name,type,cycleKey:key,label});
    }
  }

  // 臨時追加
  const aKey=cy+'-'+String(cm).padStart(2,'0');
  if(mt.adHoc&&mt.adHoc[aKey]){
    mt.adHoc[aKey].forEach(item=>{
      const dk=aKey+'_adhoc';
      if(mt.done[dk]&&mt.done[dk].includes(item.name)){
        completed.push({name:item.name,cycleKey:dk});
      } else {
        needed.push({name:item.name,type:'adhoc',cycleKey:dk,label:'ケアプラン変更'});
      }
    });
  }

  // 今月の誕生日
  const birthdays=[];
  for(const [name,info] of Object.entries(_taichoUserInfoCache)){
    if(!info.birthday) continue;
    const m=info.birthday.match(/^(\d{1,2})\/(\d{1,2})/);
    if(m&&parseInt(m[1])===cm) birthdays.push({name,day:parseInt(m[2])});
  }
  birthdays.sort((a,b)=>a.day-b.day);

  return {needed,completed,birthdays};
}

// 測定完了
function completeMeasure(name,cycleKey){
  if(!confirm(name+'さんの測定＋居宅訪問を完了にしますか？')) return;
  const mt=loadMT();
  if(!mt.done[cycleKey]) mt.done[cycleKey]=[];
  if(!mt.done[cycleKey].includes(name)) mt.done[cycleKey].push(name);
  saveMT(mt);render();
  showToast('✅ '+name+'さんの測定＋居宅訪問を記録','#0d9668');
}

// 測定完了を取り消し
function undoMeasure(name,cycleKey){
  if(!confirm(name+'さんの記録を取り消しますか？')) return;
  const mt=loadMT();
  if(mt.done[cycleKey]) mt.done[cycleKey]=mt.done[cycleKey].filter(n=>n!==name);
  saveMT(mt);render();
  showToast('↩ '+name+'さんの記録を取り消しました','#666');
}

// 臨時測定追加（ケアプラン変更時）
function addAdHocMeasure(){
  if(!_taichoUserInfoCache){alert('利用者台帳が読み込まれていません。\n「🔄 利用者を更新」ボタンを押してください。');return;}
  const names=Object.keys(_taichoUserInfoCache).sort();
  let list='';
  names.forEach((n,i)=>{list+=(i+1)+'. '+n+'\n';});
  const input=prompt('臨時測定を追加する利用者の番号:\n\n'+list);
  if(!input) return;
  const idx=parseInt(input)-1;
  if(isNaN(idx)||idx<0||idx>=names.length){alert('無効な番号です');return;}
  const name=names[idx];
  const now=new Date();
  const key=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const mt=loadMT();
  if(!mt.adHoc) mt.adHoc={};
  if(!mt.adHoc[key]) mt.adHoc[key]=[];
  if(mt.adHoc[key].find(a=>a.name===name)){alert(name+'さんは既に追加済みです');return;}
  mt.adHoc[key].push({name});
  saveMT(mt);render();
  showToast('📋 '+name+'さんを臨時測定に追加','#1565c0');
}

// 臨時測定を削除
function removeAdHocMeasure(name){
  if(!confirm(name+'さんの臨時測定を削除しますか？')) return;
  const now=new Date();
  const key=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const mt=loadMT();
  if(mt.adHoc&&mt.adHoc[key]) mt.adHoc[key]=mt.adHoc[key].filter(a=>a.name!==name);
  saveMT(mt);render();
}

// 送迎管理システムから利用者リスト読み込み
// ═══════════════════════════════════════════════
// 利用者台帳スプレッドシートから直接取得（キャッシュ付き）
const TAICHO_GAS_URL='https://script.google.com/macros/s/AKfycby-V66UddiWmavoKDYopA2WTU3Sl94GzXGdvRUAgCpHn96qNovOMo9YRLnVI_pgKjgsIA/exec';
const MEASURE_GAS_URL='https://script.google.com/macros/s/AKfycbwqfudNXAiZ3E1RoD3MP0s2cjFajKk_94MvjnWoLUElYNEM32BUPbpGLEyVxUSDmjyW/exec';
let _taichoCache=null; // {曜日: {am:[], pm:[]}} のキャッシュ
let _taichoUserInfoCache=null; // {名前: {birthday, planStart}} のキャッシュ

function loadUsersFromTransport(dow,dateStr){
  // キャッシュがあればそこから返す（利用開始日でフィルタ）
  if(_taichoCache){
    const base=_taichoCache[dow]||{am:[],pm:[]};
    if(dateStr&&_taichoUserInfoCache){
      const dateYM=dateStr.slice(0,7); // "2026-03"
      const filterByStartDate=(list)=>list.filter(name=>{
        const info=_taichoUserInfoCache[name];
        if(!info||!info.planStart) return true; // 計画書開始なし→既存利用者→常に表示
        return info.planStart<=dateYM; // 計画書開始月が当月以前なら表示
      });
      return {am:filterByStartDate(base.am),pm:filterByStartDate(base.pm)};
    }
    return base;
  }
  // フォールバック: 送迎管理システムのlocalStorageから読み取り
  try{
    const raw=localStorage.getItem('yawaragi_transport_data');
    if(!raw) return {am:[],pm:[]};
    const td=JSON.parse(raw);
    const userDays=td.userDays||{};
    const am=[],pm=[];
    for(const [name,ud] of Object.entries(userDays)){
      if(ud&&ud.schedule&&ud.schedule[dow]){
        if(ud.schedule[dow]==='am') am.push(name);
        else if(ud.schedule[dow]==='pm') pm.push(name);
      }
    }
    return {am,pm};
  }catch(e){
    return {am:[],pm:[]};
  }
}

function fetchTaicho(){
  // TAICHO GAS（曜日・AM/PM）と 測定一覧GAS（planStart・birthday）を並行取得
  return Promise.all([
    fetch(TAICHO_GAS_URL+'?t='+Date.now()).then(res=>{if(!res.ok) throw new Error('取得失敗');return res.json();}),
    fetch(MEASURE_GAS_URL+'?action=getMembersData').then(r=>r.json()).then(d=>d.data||[]).catch(()=>[])
  ]).then(([users, measureData])=>{
      // 測定一覧GASのデータをマップに変換（正しいplanStart=yyyy-MM、birthday=M/D）
      const measureMap={};
      measureData.forEach(m=>{
        if(m.name) measureMap[m.name.replace(/[\s　]+/g,'').trim()]=m;
      });
      const cache={};
      const userInfo={};
      ['月','火','水','木','金','土'].forEach(d=>{cache[d]={am:[],pm:[]};});
      users.forEach(u=>{
        if(!u.name||!u.dow) return;
        u.name = u.name.replace(/[\s　]+/g,'').trim();
        const mInfo=measureMap[u.name]||{};
        userInfo[u.name]={
          birthday: mInfo.birthday||'',         // M/D形式（測定一覧GASから）
          planStart: mInfo.planStart||null,      // yyyy-MM形式（測定一覧GASから）
          startDate: mInfo.startDate||''         // yyyy-MM形式（測定一覧GASから、新規のみ）
        };
        const days=u.dow.match(/[月火水木金土]/g);
        if(!days||days.length===0) return;
        const ampmStr=u.ampm||'';
        const perDay={};
        if(ampmStr.includes('午前')&&ampmStr.includes('午後')&&ampmStr.match(/[月火水木金土]/)){
          // 曜日ごと異なるパターン: 「月午前・木午後」
          const parts=ampmStr.split(/[・、,]/);
          parts.forEach(p=>{
            const d=p.match(/[月火水木金土]/);
            const ap=p.includes('午前')?'am':p.includes('午後')?'pm':'';
            if(d&&ap) perDay[d[0]]=ap;
          });
        } else {
          const ap=ampmStr.includes('午前')?'am':ampmStr.includes('午後')?'pm':'';
          if(ap) days.forEach(d=>{perDay[d]=ap;});
        }
        for(const [d,ap] of Object.entries(perDay)){
          if(cache[d]&&cache[d][ap]) cache[d][ap].push(u.name);
        }
      });
      // 測定一覧GASにしかいない利用者もuserInfoに追加（TAICHO GASに曜日がない人）
      for(const [name,m] of Object.entries(measureMap)){
        if(!userInfo[name]){
          userInfo[name]={birthday:m.birthday||'',planStart:m.planStart||null};
        }
      }
      _taichoCache=cache;
      _taichoUserInfoCache=userInfo;
      console.log('利用者台帳から取得完了',cache,userInfo);
    })
    .catch(err=>{
      console.warn('利用者台帳の取得に失敗（localStorageにフォールバック）',err);
    });
}

function loadFromShift(dateStr){
  const ym=dateStr.slice(0,7);
  const day=parseInt(dateStr.slice(8,10));
  // シフト表アプリのデータを優先、なければハードコードデータを使用
  let monthData=SHIFT_DATA[ym];
  // シフト表アプリデータでスタッフ0人の場合、ハードコードデータにフォールバック
  if(monthData && typeof SHIFT_DATA_HARDCODED!=='undefined' && SHIFT_DATA_HARDCODED[ym]){
    let hasStaff=false;
    for(const [staffId,shifts] of Object.entries(monthData)){
      const code=shifts[day-1];
      if(code && code!=='-' && code!=='休'){ hasStaff=true; break; }
    }
    if(!hasStaff){
      // ハードコードデータにスタッフがいるか確認
      let hardcodeHasStaff=false;
      for(const [staffId,shifts] of Object.entries(SHIFT_DATA_HARDCODED[ym])){
        const code=shifts[day-1];
        if(code && code!=='-' && code!=='休'){ hardcodeHasStaff=true; break; }
      }
      if(hardcodeHasStaff){
        console.log('⚠️ シフト表アプリのデータにスタッフなし → ハードコードデータを使用（'+dateStr+'）');
        monthData=SHIFT_DATA_HARDCODED[ym];
      }
    }
  }

  const data=newDayData();
  data.date=dateStr;

  // 送迎管理システムから利用者リストを読み込み（利用開始日フィルタ付き）
  const dow=getDow(dateStr);
  const users=loadUsersFromTransport(dow,dateStr);
  data.am.users=users.am.slice(0,18);
  data.pm.users=users.pm.slice(0,18);

  if(!monthData) return data;

  const floorInfo=[]; // {name, code, end} シフト情報付き
  for(const [staffId,shifts] of Object.entries(monthData)){
    const code=shifts[day-1];
    if(!code||code==='-'||code==='休') continue;
    const staff=STAFF.find(s=>s.id===staffId);
    if(!staff) continue;

    if(SEND_CODES[code]){
      // 送迎スタッフ
      const sc=SEND_CODES[code];
      data.sendStaff.push({name:staff.name, am:sc.am, amEnd:sc.amEnd, mid:sc.mid, midEnd:sc.midEnd, pm:sc.pm, pmEnd:sc.pmEnd});
    } else if(SHIFT_TIMES[code]){
      // フロアスタッフ
      const end=SHIFT_TIMES[code].end;
      data.attendance.push({name:staff.name, time:SHIFT_TIMES[code].start});
      floorInfo.push({name:staff.name, code:code, end:end});

      // 退社時間
      if(end==='15:00'){
        data.leave.push({name:staff.name, time:'15:00'});
      } else if(end==='16:00'){
        data.leave.push({name:staff.name, time:'16:00'});
      } else if(end==='16:30'){
        data.leave.push({name:staff.name, time:'16:30'});
      } else if(end==='16:45'||end==='17:00'){
        data.leave.push({name:staff.name, time:'送迎後'});
      }
    }
  }

  // 休憩: フロアスタッフ1人1枠、時間帯をずらして配置
  const breakSlots=['10:50','11:30','12:00','12:15','12:20','13:00','13:30','13:45'];
  data.breaks=floorInfo.map((s,i)=>({
    time:breakSlots[i]||'12:00',
    name:s.name,
    duration:'１時間'
  }));

  // 清掃①: 早番（E1等15:00退社）、②: 遅番（B2,C等）
  data.clean.first=floorInfo.filter(s=>s.end==='15:00'||s.end==='16:00').map(s=>s.name);
  data.clean.remain=floorInfo.filter(s=>s.end!=='15:00'&&s.end!=='16:00').map(s=>s.name);

  // 退社時清掃: 最後まで残るスタッフ
  data.leaveClean=floorInfo.filter(s=>s.end==='16:45'||s.end==='17:00').map(s=>s.name);

  // デフォルトルート枠（車種定員に合わせる）
  const cs=(v)=>{const a=[];for(let i=0;i<(CAR_CAPACITY[v]||5);i++)a.push({user:'',time:''});return a;};
  data.am.pick=[
    {driver:'',depTime:'',vehicle:'ス',stops:cs('ス')},
    {driver:'',depTime:'',vehicle:'シS',stops:cs('シS')},
    {driver:'',depTime:'',vehicle:'シW',stops:cs('シW')},
  ];
  data.am.drop=[
    {no:'①',driver:'',vehicle:'ス',stops:cs('ス')},
    {no:'②',driver:'',vehicle:'シS',stops:cs('シS')},
    {no:'③',driver:'',vehicle:'シW',stops:cs('シW')},
    {no:'④',driver:'',vehicle:'モ',stops:cs('モ')},
  ];
  data.pm.pick=[
    {driver:'',depTime:'',vehicle:'シW',stops:cs('シW')},
    {driver:'',depTime:'',vehicle:'ス',stops:cs('ス')},
    {driver:'',depTime:'',vehicle:'シS',stops:cs('シS')},
  ];
  data.pm.drop=[
    {no:'①',driver:'',vehicle:'ス',stops:cs('ス')},
    {no:'②',driver:'',vehicle:'シW',stops:cs('シW')},
    {no:'③',driver:'',vehicle:'シS',stops:cs('シS')},
    {no:'④',driver:'',vehicle:'モ',stops:cs('モ')},
  ];

  // 送迎スタッフをルートのドライバーに自動割り当て
  autoAssignSendStaffDrivers(data);

  return data;
}

// 送迎スタッフ（小野・林等）をルートのドライバーに自動割り当て
// 空きドライバー枠に、シフトが入っている送迎スタッフを順に配置する
function autoAssignSendStaffDrivers(dayData){
  const d=dayData||D;
  if(!d.sendStaff||d.sendStaff.length===0) return;
  if(!d.staffAbsent) d.staffAbsent={};

  // ルート種別ごとに必要なsendStaffのシフトスロット
  const slotMap={
    'am.pick':'am', 'am.drop':'mid',
    'pm.pick':'mid', 'pm.drop':'pm'
  };

  ['am.pick','am.drop','pm.pick','pm.drop'].forEach(key=>{
    const [unit,type]=key.split('.');
    if(!d[unit]||!d[unit][type]) return;
    const routes=d[unit][type];
    const slot=slotMap[key];

    // この便で既にアサイン済みのドライバー
    const assigned=new Set(routes.map(r=>r.driver).filter(Boolean));

    // このスロットで使えるsendStaff（シフトあり・有給でない・未アサイン・休みでない）
    const available=d.sendStaff.filter(s=>{
      if(d.staffAbsent[s.name]) return false;
      if(!s[slot]||s[slot]==='有給') return false;
      if(assigned.has(s.name)) return false;
      return true;
    }).slice(); // コピー

    // 空きドライバー枠に割り当て
    routes.forEach(route=>{
      if(route.driver) return; // 既にドライバーがいる
      if(available.length===0) return;
      const staff=available.shift();
      route.driver=staff.name;
      assigned.add(staff.name);
    });
  });
}

function normalizeUserNames_(dayData){
  // 全利用者名のスペースを統一（名前の不一致を防止）
  ['am','pm'].forEach(k=>{
    if(!dayData[k]) return;
    if(dayData[k].users){
      dayData[k].users=dayData[k].users.map(u=>u?normName(u):u);
    }
    // userStatusのキーも正規化
    if(dayData[k].userStatus){
      const newStatus={};
      Object.entries(dayData[k].userStatus).forEach(([name,val])=>{
        newStatus[normName(name)]=val;
      });
      dayData[k].userStatus=newStatus;
    }
    // ルート内の利用者名も正規化
    ['pick','drop'].forEach(t=>{
      (dayData[k][t]||[]).forEach(route=>{
        route.stops.forEach(stop=>{
          if(stop.user) stop.user=normName(stop.user);
        });
      });
    });
  });
}

function autoSave(){
  if(IS_READONLY || !D.date) return;
  normalizeUserNames_(D); // 保存前に名前を正規化
  // 編集されたら自動的に確定解除（スタッフに中途半端な状態を見せない）
  if(D.confirmed){
    D.confirmed=false;
    updateConfirmBtn();
  }
  D._lastModified = Date.now();
  const all=loadAllData();
  all[D.date]=D;
  localStorage.setItem('yawaragi_daily_ops',JSON.stringify(all));
  // 送迎管理システムとのデータ同期（ルート・利用者情報）
  syncToTransport(all);
  // GASにも自動同期（5秒デバウンス）
  debouncedCloudSync();
}

function saveBackup(dateStr){
  const all=loadAllData();
  if(!all[dateStr]) return;
  const backupKey='yawaragi_daily_ops_backup';
  const backups=JSON.parse(localStorage.getItem(backupKey)||'{}');
  backups[dateStr]=JSON.parse(JSON.stringify(all[dateStr]));
  backups[dateStr]._backupTime=new Date().toLocaleString('ja-JP');
  localStorage.setItem(backupKey,JSON.stringify(backups));
}
function restoreBackup(){
  if(!D.date) return;
  const backups=JSON.parse(localStorage.getItem('yawaragi_daily_ops_backup')||'{}');
  const backup=backups[D.date];
  if(!backup){
    alert('この日のバックアップはありません');
    return;
  }
  const time=backup._backupTime||'不明';
  if(!confirm(D.date+' のデータを復元します\n\nバックアップ時刻: '+time+'\n\nよろしいですか？')) return;
  delete backup._backupTime;
  D=backup;
  const all=loadAllData();
  all[D.date]=D;
  localStorage.setItem('yawaragi_daily_ops',JSON.stringify(all));
  render();
  alert('復元しました！');
}

// 出勤＆送迎表のルートをファイルとして書き出し（送迎管理システムで読み込む用）
function exportRoutesForTransport(){
  const allData=loadAllData();
  const dnames=['日','月','火','水','木','金','土'];
  const dates=Object.keys(allData).sort().reverse();
  const sync={};
  const found=new Set();
  for(const dateStr of dates){
    if(found.size>=6) break;
    const d=allData[dateStr];
    const dow=dnames[new Date(dateStr+'T00:00:00').getDay()];
    if(dow==='日'||found.has(dow)) continue;
    found.add(dow);
    sync[dow]={
      date:dateStr,
      am:{
        users:(d.am?.users||[]).filter(u=>u),
        userStatus:d.am?.userStatus||{},
        pick:d.am?.pick||[],
        drop:d.am?.drop||[]
      },
      pm:{
        users:(d.pm?.users||[]).filter(u=>u),
        userStatus:d.pm?.userStatus||{},
        pick:d.pm?.pick||[],
        drop:d.pm?.drop||[]
      }
    };
  }
  const json=JSON.stringify({lastUpdated:new Date().toISOString(),routes:sync},null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='routes_sync.json';
  a.click();
  URL.revokeObjectURL(a.href);
  alert('✅ ルートデータを書き出しました（'+found.size+'曜日分）\n\n送迎管理システムの「設定・保存」→「ルートファイルを読み込む」で取り込んでください。');
}

// 出勤＆送迎表の最新データを送迎管理システム用に書き出し
function syncToTransport(allData){
  try{
    const sync={};
    // 直近30日分のデータから曜日別の最新ルートを抽出
    const dnames=['日','月','火','水','木','金','土'];
    const dates=Object.keys(allData).sort().reverse(); // 新しい順
    const found=new Set();
    for(const dateStr of dates){

      const d=allData[dateStr];
      const dow=dnames[new Date(dateStr+'T00:00:00').getDay()];
      if(dow==='日'||found.has(dow)) continue;
      found.add(dow);
      sync[dow]={
        date:dateStr,
        am:{
          users:(d.am?.users||[]).filter(u=>u),
          userStatus:d.am?.userStatus||{},
          pick:d.am?.pick||[],
          drop:d.am?.drop||[]
        },
        pm:{
          users:(d.pm?.users||[]).filter(u=>u),
          userStatus:d.pm?.userStatus||{},
          pick:d.pm?.pick||[],
          drop:d.pm?.drop||[]

function importOpsJSON(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(data.type!=='yawaragi_daily_ops_backup'){
        alert('出勤＆送迎表のファイルではありません');return;
      }
      const current=loadAllData();
      const importDates=Object.keys(data.dailyOps||{});
      if(importDates.length===0){alert('データがありません');return;}
      // 既存データがある日を検出
      const existDates=importDates.filter(d=>current[d]);
      let mode='new'; // new=新規のみ, all=全上書き
      if(existDates.length>0){
        const r=confirm(existDates.length+'日分の既存データがあります。\n\n【OK】→ 上書きして復元\n【キャンセル】→ 新しい日だけ追加');
        mode=r?'all':'new';
      }
      let added=0,updated=0;
      Object.entries(data.dailyOps||{}).forEach(([date,val])=>{
        if(!current[date]){ current[date]=val; added++; }
        else if(mode==='all'){ current[date]=val; updated++; }
      });
      localStorage.setItem('yawaragi_daily_ops',JSON.stringify(current));
      alert('追加: '+added+'日 / 上書き: '+updated+'日');
      if(D.date) loadDay(D.date);
      render();
    }catch(err){
      alert('ファイルの読み込みに失敗しました');
    }
  };
  reader.readAsText(file);
  event.target.value='';
}

function loadAllData(){
  if(IS_READONLY) return _roCloudData;
  try{
    return JSON.parse(localStorage.getItem('yawaragi_daily_ops'))||{};
  }catch(e){return {};}
}

function loadDay(dateStr){
  const all=loadAllData();
  if(all[dateStr]){
    D=all[dateStr];
  } else {
    // シフトから自動生成
    const fromShift=loadFromShift(dateStr);
    if(fromShift){
      D=fromShift;
    } else {
      D=newDayData();
      D.date=dateStr;
    }
  }
  // データ構造の安全保証（古いデータや欠けたプロパティを補完）
  if(!D.staffAbsent) D.staffAbsent={};
  if(!D.events) D.events=[];
  if(!D.sendStaff) D.sendStaff=[];
  if(!D.attendance) D.attendance=[];
  if(!D.breaks) D.breaks=[];
  if(!D.leave) D.leave=[];
  if(!D.leaveClean) D.leaveClean=[];
  if(!D.telCalls) D.telCalls=[];
  if(!D.clean) D.clean={};

  // ★ スタッフ自動復旧: 保存済みデータのattendanceが空なのにシフトにスタッフがいる場合、自動補完
  if(D.attendance.length===0 && D.sendStaff.length===0){
    const shiftFix=loadFromShift(dateStr);
    if(shiftFix && (shiftFix.attendance.length>0 || shiftFix.sendStaff.length>0)){
      console.log('⚠️ スタッフ自動復旧: attendance/sendStaffが空のためシフトから再生成');
      D.attendance=shiftFix.attendance;
      D.sendStaff=shiftFix.sendStaff;
      D.breaks=shiftFix.breaks;
      D.leave=shiftFix.leave;
      D.leaveClean=shiftFix.leaveClean;
      D.clean=shiftFix.clean;
      autoSave();
    }
  }
  ['am','pm'].forEach(key=>{
    if(!D[key]) D[key]={users:[],userStatus:{},pick:[],drop:[]};
    if(!D[key].users) D[key].users=[];
    if(!D[key].userStatus) D[key].userStatus={};
    if(!D[key].pick) D[key].pick=[];
    if(!D[key].drop) D[key].drop=[];
  });

  // 旧データ互換: clean.am → clean.first
  if(D.clean.am&&!D.clean.first){
    D.clean.first=D.clean.am;
    D.clean.remain=D.clean.remain||[];
    delete D.clean.am;
  }
  if(!D.clean.first) D.clean.first=[];
  if(!D.clean.remain) D.clean.remain=[];

  // 利用者名のスペース除去（台帳のスペース入り名前を修正）
  sanitizeUserNames();

  // ★ 送迎スタッフのドライバー自動補完（シフトがあるのにドライバー未配置の場合）
  // 今日以降の日付のみ実行（過去のデータは触らない）
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr+'T00:00:00');
  if(target >= today){
    autoAssignSendStaffDrivers();
    syncWithTransportSchedule(dateStr);
  }
}

function sanitizeUserNames(){
  const fix = s => s ? s.replace(/[\s\u3000]+/g,'') : s;
  ['am','pm'].forEach(key=>{
    if(!D[key]) return;
    if(D[key].users) D[key].users = D[key].users.map(fix);
    if(D[key].userStatus){
      const ns={};
      Object.entries(D[key].userStatus).forEach(([n,v])=>{ ns[fix(n)]=v; });
      D[key].userStatus=ns;
    }
    ['pick','drop'].forEach(type=>{
      if(D[key][type]) D[key][type].forEach(r=>{
        if(r.stops) r.stops.forEach(s=>{ if(s.user) s.user=fix(s.user); });
      });
    });
  });
  if(D.telCalls) D.telCalls.forEach(t=>{ if(t.name) t.name=fix(t.name); });
}

function syncWithTransportSchedule(dateStr){
  const dow=getDow(dateStr);
  if(!dow) return;
  // ★ フィルタなしの台帳全員リストを使う（planStartフィルタで既存利用者が消えるのを防ぐ）
  if(!_taichoCache||!_taichoCache[dow]) return;
  const base=_taichoCache[dow];
  if(base.am.length===0&&base.pm.length===0) return;

  // ★ 同期前に必ずバックアップを取る
  saveBackup(dateStr);

  let anyChanged=false;

  ['am','pm'].forEach(key=>{
    const freshList=key==='am'?base.am:base.pm;
    const freshNormSet=new Set(freshList.map(normName));
    const unit=D[key];
    if(!unit) return;
    if(!unit.userStatus) unit.userStatus={};

    // 台帳にいるが未追加の利用者を追加（既存リストの末尾に追加）
    const currentNormSet=new Set(unit.users.filter(u=>u).map(normName));
    freshList.forEach(freshName=>{
      if(!currentNormSet.has(normName(freshName))){
        unit.users.push(freshName);
        anyChanged=true;
      }
    });

    // 台帳から消えた利用者をリストから除去（体験者は除く）
    const trialNormSet=new Set(unit.users.filter(u=>u&&unit.userStatus[u]==='trial').map(normName));
    const before=unit.users.length;
    unit.users=unit.users.filter(u=>{
      if(!u) return false; // 空枠は除去
      if(trialNormSet.has(normName(u))) return true; // 体験者は保持
      return freshNormSet.has(normName(u)); // 台帳にいる人だけ残す
    });
    if(unit.users.length!==before) anyChanged=true;
  });

  if(anyChanged) autoSave();
}

function changeDate(dateStr){

            copyFromPrevWeek();
          }

      }
    }
  }
}

function refreshUsers(){
  if(!D.date) return;
  // スプレッドシートから最新を取得してからリフレッシュ
  _taichoCache=null; // キャッシュクリア
  _taichoUserInfoCache=null;
  fetchTaicho().then(()=>{_doRefreshUsers();}).catch(()=>{_doRefreshUsers();});
}
function _doRefreshUsers(){
  if(!D.date) return;
  const dow=getDow(D.date);
  const fresh=loadUsersFromTransport(dow,D.date);
  if(fresh.am.length===0&&fresh.pm.length===0){
    alert('利用者台帳にこの曜日の利用者データがありません');
    return;
  }
  // 現在の利用者（正規化名でも比較できるようにする）
  const oldAmRaw=D.am.users.filter(u=>u);
  const oldPmRaw=D.pm.users.filter(u=>u);
  const oldAmNormSet=new Set(oldAmRaw.map(normName));
  const oldPmNormSet=new Set(oldPmRaw.map(normName));
  const newAmNormSet=new Set(fresh.am.map(normName));
  const newPmNormSet=new Set(fresh.pm.map(normName));

  // 体験者は差分計算から除外
  const trialAm=new Set(D.am.users.filter(u=>u&&D.am.userStatus&&D.am.userStatus[u]==='trial'));
  const trialPm=new Set(D.pm.users.filter(u=>u&&D.pm.userStatus&&D.pm.userStatus[u]==='trial'));
  const trialAmNorm=new Set([...trialAm].map(normName));
  const trialPmNorm=new Set([...trialPm].map(normName));
  // 差分を計算（正規化名で比較、体験者は除外）
  const addedAm=fresh.am.filter(u=>!oldAmNormSet.has(normName(u)));
  const removedAm=oldAmRaw.filter(u=>!newAmNormSet.has(normName(u))&&!trialAmNorm.has(normName(u)));
  const addedPm=fresh.pm.filter(u=>!oldPmNormSet.has(normName(u)));
  const removedPm=oldPmRaw.filter(u=>!newPmNormSet.has(normName(u))&&!trialPmNorm.has(normName(u)));

  if(!addedAm.length&&!removedAm.length&&!addedPm.length&&!removedPm.length){
    alert('変更はありません');
    return;
  }

  let msg='利用者リストを更新します\n（※送迎ルートはそのまま残ります）\n\n';
  if(addedAm.length) msg+='【午前 追加】'+addedAm.join('、')+'\n';
  if(removedAm.length) msg+='【午前 削除】'+removedAm.join('、')+'\n';
  if(addedPm.length) msg+='【午後 追加】'+addedPm.join('、')+'\n';
  if(removedPm.length) msg+='【午後 削除】'+removedPm.join('、')+'\n';
  if(!confirm(msg+'\nよろしいですか？')) return;

  pushUndo();

  // 利用者リスト更新（体験者は保持）
  const keepTrialAm=[...trialAm];
  const keepTrialPm=[...trialPm];
  D.am.users=[...fresh.am.slice(0,18),...keepTrialAm];
  D.pm.users=[...fresh.pm.slice(0,18),...keepTrialPm];

  // 削除された利用者のみルートから除去（追加はルートに影響しない）
  if(removedAm.length||removedPm.length){
    const removedAmNorm=new Set(removedAm.map(normName));
    const removedPmNorm=new Set(removedPm.map(normName));
    ['am','pm'].forEach(k=>{
      const removedNorm=k==='am'?removedAmNorm:removedPmNorm;
      if(removedNorm.size===0) return;
      ['pick','drop'].forEach(t=>{
        (D[k][t]||[]).forEach(route=>{
          route.stops.forEach(stop=>{
            if(stop.user&&removedNorm.has(normName(stop.user))){
              stop.user='';
            }
          });
        });
      });
    });
  }

  autoSave();
  render();
  alert('利用者リストを更新しました！');
}

// 通常休み(absent)をリセットし、リセットされた利用者名リストを返す
// 長期休み(longabsent)はそのまま残す
function resetAbsentUsers(){
  const resetNames=[];
  ['am','pm'].forEach(key=>{
    if(!D[key]||!D[key].userStatus) return;
    Object.keys(D[key].userStatus).forEach(name=>{
      if(D[key].userStatus[name]==='absent'){
        delete D[key].userStatus[name]; // 利用に戻す
        if(!resetNames.includes(name)) resetNames.push(name);
      }
    });
  });
  return resetNames;
}

// 体験者をコピー先から除去（体験は1回限り）
function removeTrialUsers(){
  const removed=[];
  ['am','pm'].forEach(key=>{
    if(!D[key]||!D[key].userStatus) return;
    const trials=[];
    Object.keys(D[key].userStatus).forEach(name=>{
      if(D[key].userStatus[name]==='trial') trials.push(name);
    });
    trials.forEach(name=>{
      // ユーザーリストから除去
      D[key].users=D[key].users.filter(u=>u!==name);
      // ステータス削除
      delete D[key].userStatus[name];
      // ルートから除去
      ['pick','drop'].forEach(t=>{
        (D[key][t]||[]).forEach(route=>{
          route.stops=route.stops.filter(s=>s.user!==name);
        });
      });
      if(!removed.includes(name)) removed.push(name);
    });
  });
  return removed;
}

// ═══════════════════════════════════════════════
// コピー後のドライバー自動マッチング
// 前週/別日からルートをコピーした後、今週のsendStaffに合わせてドライバーを入れ替える
// 利用者・時間・車両はそのまま保持し、ドライバーだけ更新する
// ═══════════════════════════════════════════════
function remapDriversAfterCopy(){
  if(!D.sendStaff||D.sendStaff.length===0) return {swapped:[], cleared:[]};

  // 今週の全スタッフ名セット（sendStaff + attendance）
  const allStaffNames=new Set();
  (D.sendStaff||[]).forEach(s=>allStaffNames.add(s.name));
  (D.attendance||[]).forEach(a=>allStaffNames.add(a.name));

  // 各ルート種別に必要なsendStaffのスロット
  // am.pick → am, am.drop → mid, pm.pick → mid, pm.drop → pm
  const slotMap={
    'am.pick':'am', 'am.drop':'mid',
    'pm.pick':'mid', 'pm.drop':'pm'
  };

  // 各スロットで使えるsendStaffメンバー
  function getAvailableSendStaff(slot){
    return (D.sendStaff||[]).filter(s=>{
      if(D.staffAbsent&&D.staffAbsent[s.name]) return false;
      return s[slot]&&s[slot]!=='有給';
    }).map(s=>s.name);
  }

  // 既に割り当て済みのドライバーを収集
  const assigned={};
  ['am.pick','am.drop','pm.pick','pm.drop'].forEach(key=>{
    assigned[key]=new Set();
    const [unit,type]=key.split('.');
    (D[unit][type]||[]).forEach(route=>{
      if(route.driver&&allStaffNames.has(route.driver)){
        assigned[key].add(route.driver);
      }
    });
  });

  const swapped=[]; // {from, to, route}
  const cleared=[]; // {name, route}

  // 各ルートのドライバーをチェック・入れ替え
  ['am.pick','am.drop','pm.pick','pm.drop'].forEach(key=>{
    const [unit,type]=key.split('.');
    const slot=slotMap[key];
    const available=getAvailableSendStaff(slot);

    (D[unit][type]||[]).forEach(route=>{
      const oldDriver=route.driver;
      if(!oldDriver) return; // ドライバー未設定→スキップ

      // 今週のスタッフにいる→そのまま
      if(allStaffNames.has(oldDriver)) return;

      // いない→空きスタッフから割り当て
      const replacement=available.find(name=>!assigned[key].has(name));
      if(replacement){
        route.driver=replacement;
        assigned[key].add(replacement);
        swapped.push({from:oldDriver, to:replacement, route:key});
      } else {
        // 空きがない→ドライバーをクリア（手動で設定してもらう）
        route.driver='';
        cleared.push({name:oldDriver, route:key});
      }
    });
  });

  // ライダー（同乗者）も同様にチェック
  ['am','pm'].forEach(unit=>{
    ['pick','drop'].forEach(type=>{
      (D[unit][type]||[]).forEach(route=>{
        if(route.rider&&!allStaffNames.has(route.rider)){
          route.rider='';
        }
      });
    });
  });

  return {swapped, cleared};
}

function copyFromPrevWeek(){
  if(!D.date){alert('先に日付を選んでください');return;}
  const curDate=new Date(D.date+'T00:00:00');
  const prevDate=new Date(curDate);
  prevDate.setDate(prevDate.getDate()-7);
  const prevStr=fmtDate(prevDate);
  const all=loadAllData();
  const prevData=all[prevStr];

  if(!prevData){
    alert('前週（'+prevStr+'）のデータがありません。\nカレンダーから別の日を選んでコピーすることもできます。');
    return;
  }

  const prevDow=['日','月','火','水','木','金','土'][prevDate.getDay()];
  if(!confirm('前週 '+prevStr+'（'+prevDow+'）のデータをコピーしますか？\n\n・利用者リスト、ルート配置、イベント → コピー\n・出勤スタッフ → 今週のシフトで再生成\n\n※現在のデータは上書きされます')){

  pushUndo();

  // シフトから今週の出勤情報を生成
  const shiftBase=loadFromShift(D.date);

  // 前週データをベースにコピー
  D=JSON.parse(JSON.stringify(prevData));
  D.date=document.getElementById('inp-date').value;

  // 出勤スタッフ・送迎スタッフ・休憩・清掃・退社はシフトから再生成
  if(shiftBase){

    D.sendStaff=shiftBase.sendStaff;
    D.breaks=shiftBase.breaks;
    D.clean=shiftBase.clean;
    D.leave=shiftBase.leave;
    D.leaveClean=shiftBase.leaveClean;
  }

  // スタッフ休み情報はリセット（今週は別なので）
  D.staffAbsent={};

  // 予定・メモはクリア（毎週違うので）
  D.events=[];

  const removedTrials=removeTrialUsers();

    msg+='🔄 ドライバーを自動入替しました:\n';

// デフォルト日付（翌営業日ロジック）
// ═══════════════════════════════════════════════
function getDefaultDate(){
  const now=new Date();
  const h=now.getHours();
  const dow=now.getDay(); // 0=日,1=月,...,6=土

  // 朝8時まで → 当日（印刷用）
  // 朝8時以降 → 翌営業日（準備用）
  let d=new Date(now);
  if(h>=8){
    // 翌営業日へ進める
    d.setDate(d.getDate()+1);
    // 土日ならスキップ
    if(d.getDay()===6) d.setDate(d.getDate()+2); // 土→月
    if(d.getDay()===0) d.setDate(d.getDate()+1); // 日→月
  } else {
    // 朝8時前でも土日なら月曜日
    if(dow===6) d.setDate(d.getDate()+2); // 土→月
    if(dow===0) d.setDate(d.getDate()+1); // 日→月
  }
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// ═══════════════════════════════════════════════
// 週間ナビゲーション
// ═══════════════════════════════════════════════
function getMonday(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  const day=d.getDay(); // 0=日,1=月,...,6=土
  const diff=day===0?-6:1-day; // 月曜日に戻る
  d.setDate(d.getDate()+diff);
  return d;
}

function fmtDate(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function renderWeekNav(){
  const currentDate=D.date||document.getElementById('inp-date').value;
  if(!currentDate) return;
  const monday=getMonday(currentDate);
  const all=loadAllData();
  const dowNames=['月','火','水','木','金'];
  const today=fmtDate(new Date());

  let h='';
  // 前週ボタン
  h+='<button onclick="navWeek(-1)" title="前週">◀</button>';

  // 週ラベル
  const monStr=(monday.getMonth()+1)+'/'+monday.getDate();
  const fri=new Date(monday);fri.setDate(fri.getDate()+4);
  const friStr=(fri.getMonth()+1)+'/'+fri.getDate();
  h+='<span class="week-label">'+monStr+'〜'+friStr+'</span>';

  // 月〜金ボタン
  for(let i=0;i<5;i++){
    const d=new Date(monday);
    d.setDate(d.getDate()+i);
    const ds=fmtDate(d);
    const isActive=ds===currentDate;
    const hasData=!!all[ds];
    const isToday=ds===today;
    let cls='dow-btn';
    if(isActive) cls+=' active';
    if(hasData&&!isActive) cls+=' has-data';
    const label=dowNames[i]+'<span style="font-size:9px;display:block">'+(d.getMonth()+1)+'/'+d.getDate()+'</span>';
    h+='<button class="'+cls+'"'+(isToday?' title="今日"':'')
      +' onclick="changeDate(\''+ds+'\');document.getElementById(\'inp-date\').value=\''+ds+'\'">'+label+'</button>';
  }

  // 次週ボタン
  h+='<button onclick="navWeek(1)" title="次週">▶</button>';
  // 今日ボタン
  h+='<button onclick="goToday()" style="margin-left:4px;font-size:10px">今日</button>';

  document.getElementById('week-nav').innerHTML=h;
}

function navWeek(dir){
  const currentDate=D.date||document.getElementById('inp-date').value;
  const monday=getMonday(currentDate);
  monday.setDate(monday.getDate()+dir*7);
  const ds=fmtDate(monday);
  document.getElementById('inp-date').value=ds;
  changeDate(ds);
}

function goToday(){
  const ds=fmtDate(new Date());
  document.getElementById('inp-date').value=ds;
  changeDate(ds);
}

};

// 月間カレンダー
// ═══════════════════════════════════════════════
let calYear, calMonth; // 表示中の年月
let calCopyMode=false; // コピーモード

function openCalendar(){
  const currentDate=D.date||document.getElementById('inp-date').value||fmtDate(new Date());
  const d=new Date(currentDate+'T00:00:00');
  calYear=d.getFullYear();
  calMonth=d.getMonth();
  renderCalendar();
  document.getElementById('cal-overlay').classList.add('show');
}

function closeCalendar(){
  calCopyMode=false;
  document.getElementById('cal-overlay').classList.remove('show');
}

function renderCalendar(){
  const all=loadAllData();
  const today=fmtDate(new Date());
  const selectedDate=D.date||'';
  const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  let h='';
  // ヘッダー
  h+='<div class="cal-header">';
  h+='<button onclick="calYear--;renderCalendar()">◀◀</button>';
  h+='<button onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar()">◀</button>';
  h+='<span class="cal-title">'+calYear+'年 '+monthNames[calMonth]+'</span>';
  h+='<button onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar()">▶</button>';
  h+='<button onclick="calYear++;renderCalendar()">▶▶</button>';
  h+='</div>';

  // 曜日ヘッダー（日〜土）
  h+='<div class="cal-grid">';
  ['日','月','火','水','木','金','土'].forEach(d=>{
    h+='<div class="cal-dow">'+d+'</div>';
  });

  // 月の初日と最終日
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const startDow=firstDay.getDay(); // 0=日

  // 前月の日を埋める
  const prevLast=new Date(calYear,calMonth,0);
  for(let i=startDow-1;i>=0;i--){
    const day=prevLast.getDate()-i;
    const d=new Date(calYear,calMonth-1,day);
    const ds=fmtDate(d);
    h+='<div class="cal-day other-month" onclick="selectCalDay(\''+ds+'\')">'+day+'</div>';
  }

  // 当月の日
  for(let day=1;day<=lastDay.getDate();day++){
    const d=new Date(calYear,calMonth,day);
    const ds=fmtDate(d);
    const dow=d.getDay();
    let cls='cal-day';
    if(ds===today) cls+=' today';
    if(ds===selectedDate) cls+=' selected';
    if(all[ds]) cls+=' has-data';
    if(dow===0) cls+=' sun';
    if(dow===6) cls+=' sat';
    h+='<div class="'+cls+'" onclick="selectCalDay(\''+ds+'\')">'+day+'</div>';
  }

  // 次月の日を埋める（6行まで）
  const totalCells=startDow+lastDay.getDate();
  const remaining=(7-totalCells%7)%7;
  for(let i=1;i<=remaining;i++){
    const d=new Date(calYear,calMonth+1,i);
    const ds=fmtDate(d);
    h+='<div class="cal-day other-month" onclick="selectCalDay(\''+ds+'\')">'+i+'</div>';
  }
  h+='</div>';

  // 凡例＋コピーモード
  h+='<div style="margin-top:8px;font-size:10px;color:#666;display:flex;gap:8px;align-items:center;flex-wrap:wrap">';
  h+='<span><span style="display:inline-block;width:8px;height:8px;background:#0d9668;border-radius:50%;margin-right:2px"></span>保存済み</span>';
  h+='<span style="outline:2px solid #0d9668;padding:0 4px;border-radius:2px">今日</span>';
  if(calCopyMode){
    h+='<span style="color:#e65100;font-weight:900;font-size:12px">← コピー元の日付をクリック（保存済みの日のみ）</span>';
    h+='<button onclick="calCopyMode=false;renderCalendar()" style="padding:3px 10px;border:1px solid #ccc;border-radius:4px;cursor:pointer;font-weight:700">キャンセル</button>';
  } else {
    h+='<button onclick="calCopyMode=true;renderCalendar()" style="padding:3px 10px;border:1px solid #ff9800;border-radius:4px;cursor:pointer;font-weight:700;background:#fff3e0;color:#e65100">📋 この日からコピー</button>';
  }
  h+='<button onclick="closeCalendar()" style="margin-left:auto;padding:4px 12px;border:1px solid #ccc;border-radius:4px;cursor:pointer;font-weight:700">閉じる</button>';
  h+='</div>';

  document.getElementById('cal-box').innerHTML=h;
}

function selectCalDay(dateStr){
  if(calCopyMode){
    // コピーモード：保存済みの日のみコピー可能
    const all=loadAllData();
    if(!all[dateStr]){
      alert(dateStr+' にはデータがありません。\n保存済みの日（緑丸マーク）を選んでください。');
      return;
    }
    calCopyMode=false;
    copyFromDate(dateStr);
    return;
  }
  closeCalendar();
  document.getElementById('inp-date').value=dateStr;
  changeDate(dateStr);
}

// ═══════════════════════════════════════════════
// 閲覧専用モード（GitHub Pages用）
// ═══════════════════════════════════════════════
let _roCloudData = {}; // 閲覧専用モード用のクラウドデータキャッシュ

// ═══════════════════════════════════════════════
// 確定ボタン（スタッフへの公開制御）
// ═══════════════════════════════════════════════
function toggleConfirm(){
  if(!D.date) return;
  if(D.confirmed){
    // 確定解除
    if(!confirm(D.date+' の確定を解除しますか？\nスタッフの閲覧ページに表示されなくなります。')) return;
    D.confirmed=false;
  } else {
    // 確定
    D.confirmed=true;
  }
  autoSave();
  updateConfirmBtn();
  // 確定フラグを即クラウド同期
  if(getOpsGasUrl()){
    if(_cloudSyncTimer) clearTimeout(_cloudSyncTimer);
    cloudSyncOps();
  }
}

function updateConfirmBtn(){
  const btn=document.getElementById('btn-confirm');
  if(!btn) return;
  if(D.confirmed){
    btn.textContent='✅ 確定済み（公開中）';
    btn.style.background='#2e7d32';
    btn.style.color='#fff';
    btn.style.borderColor='#1b5e20';
  } else {
    btn.textContent='📢 確定して公開';
    btn.style.background='#e3f2fd';
    btn.style.color='#1565c0';
    btn.style.borderColor='#1976d2';
  }
}

function readonlyCleanup(){
  const app=document.getElementById('app');
  if(!app) return;
  // 未確定の場合はデータを非表示にしてメッセージを出す
  if(!D.confirmed){
    app.innerHTML='<div style="text-align:center;padding:60px 20px;color:#666;font-size:16px">'
      +'<div style="font-size:48px;margin-bottom:16px">📋</div>'
      +'<div style="font-weight:900;font-size:18px;margin-bottom:8px">'
      +(D.date?D.date.replace(/^\d{4}-/,'').replace('-','月')+'日':'')
      +' のデータはまだ確定されていません</div>'
      +'<div>社長が確定するまでお待ちください</div></div>';
    roUpdateStatus('未確定');
    return;
  }
  // select → 選択中のテキストに置換
  app.querySelectorAll('select').forEach(sel=>{
    const span=document.createElement('span');
    span.textContent=sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].text:'';
    span.style.cssText='font-size:'+getComputedStyle(sel).fontSize+';font-weight:'+getComputedStyle(sel).fontWeight+';color:'+getComputedStyle(sel).color+';';
    span.className=sel.className;
    sel.replaceWith(span);
  });
  // input → 値をテキストに置換
  app.querySelectorAll('input').forEach(inp=>{
    if(inp.type==='date'||inp.type==='file') return;
    const span=document.createElement('span');
    span.textContent=inp.value||'';
    span.style.cssText='font-size:'+getComputedStyle(inp).fontSize+';font-weight:'+getComputedStyle(inp).fontWeight+';';
    span.className=inp.className;
    inp.replaceWith(span);
  });
  // contenteditable無効化
  app.querySelectorAll('[contenteditable]').forEach(el=>{el.removeAttribute('contenteditable');});
  // onclick無効化（名前クリックでステータスメニューが出るのを防止）
  app.querySelectorAll('.name, .user-cell').forEach(el=>{
    el.removeAttribute('onclick');
    el.style.cursor='default';
    el.removeAttribute('draggable');
  });
  // ドラッグ無効化
  app.querySelectorAll('[draggable]').forEach(el=>{el.removeAttribute('draggable');el.style.cursor='default';});
}

function roChangeDay(offset){
  const cur=document.getElementById('ro-date').value||document.getElementById('inp-date').value;
  if(!cur) return;
  const d=new Date(cur+'T00:00:00');
  d.setDate(d.getDate()+offset);
  const ds=d.toISOString().slice(0,10);
  document.getElementById('ro-date').value=ds;
  document.getElementById('inp-date').value=ds;
  changeDate(ds);
}

function roGoToday(){
  const ds=new Date().toISOString().slice(0,10);
  document.getElementById('ro-date').value=ds;
  document.getElementById('inp-date').value=ds;
  changeDate(ds);
}

function roUpdateStatus(msg){
  const el=document.getElementById('ro-status');
  if(el) el.textContent=msg;
}

const defaultDate=getDefaultDate();

// GASからデータを取得してlocalStorageに反映してから初期化
async function initApp(){
  if(IS_READONLY) roUpdateStatus('データ取得中...');
  const url = getOpsGasUrl();
  if(url){
    try {
      const sep = url.includes('?') ? '&' : '?';
      const res = await fetch(url + sep + 'action=getOps&t=' + Date.now());
      if(res.ok){
        const data = await res.json();
        if(data && data.dailyOps){
          if(IS_READONLY){
            // 閲覧専用モード: メモリに保持（localStorageは使わない）
            _roCloudData = data.dailyOps;
          } else {
          const existing = JSON.parse(localStorage.getItem('yawaragi_daily_ops') || '{}');
          Object.entries(data.dailyOps).forEach(([date, val]) => {
            if(!existing[date]){
              existing[date] = val;
            } else {
              const localMod = existing[date]._lastModified || 0;
              const cloudMod = (val && val._lastModified) || 0;
              if(cloudMod > 0 && cloudMod > localMod){
                existing[date] = val;
              }
            }
          });
          localStorage.setItem('yawaragi_daily_ops', JSON.stringify(existing));
          }
        }
        // 口腔・体重チェックデータをクラウドから取得・マージ（閲覧モードでは不要）
        if(!IS_READONLY){
        if(data.oralCheck){
          const localOral = JSON.parse(localStorage.getItem('yawaragi_oral_check')||'{}');
          // クラウドのデータをローカルにマージ（年度→ユーザー→月単位で新しい方を優先）
          if(data.oralCheck.checks){
            if(!localOral.checks) localOral.checks = {};
            Object.entries(data.oralCheck.checks).forEach(([fy,users])=>{
              if(!localOral.checks[fy]) localOral.checks[fy] = {};
              Object.entries(users).forEach(([name,months])=>{
                if(!localOral.checks[fy][name]) localOral.checks[fy][name] = {};
                Object.entries(months).forEach(([mk,val])=>{
                  if(!localOral.checks[fy][name][mk]) localOral.checks[fy][name][mk] = val;
                });
              });
            });
          }
          if(data.oralCheck.users && (!localOral.users || data.oralCheck.users.length >= (localOral.users||[]).length)){
            localOral.users = data.oralCheck.users;
          }
          localStorage.setItem('yawaragi_oral_check', JSON.stringify(localOral));
        }
        if(data.weightCheck){
          const localWeight = JSON.parse(localStorage.getItem('yawaragi_weight_check')||'{}');
          if(data.weightCheck.weights){
            if(!localWeight.weights) localWeight.weights = {};
            Object.entries(data.weightCheck.weights).forEach(([fy,users])=>{
              if(!localWeight.weights[fy]) localWeight.weights[fy] = {};
              Object.entries(users).forEach(([name,months])=>{
                if(!localWeight.weights[fy][name]) localWeight.weights[fy][name] = {};
                Object.entries(months).forEach(([mk,val])=>{
                  if(localWeight.weights[fy][name][mk] === undefined || localWeight.weights[fy][name][mk] === null || localWeight.weights[fy][name][mk] === ''){
                    localWeight.weights[fy][name][mk] = val;
                  }
                });
              });
            });
          }
          localStorage.setItem('yawaragi_weight_check', JSON.stringify(localWeight));
        }
        } // end if(!IS_READONLY)
      }
      if(!IS_READONLY) updateCloudBtn('ok');
    } catch(e){
      console.warn('クラウド取得エラー:', e);
      if(!IS_READONLY) updateCloudBtn('error');
      if(IS_READONLY) roUpdateStatus('データ取得に失敗しました');
    }
  }
  try { await fetchTaicho(); } catch(e){}
  loadDay(defaultDate);
  render();
  if(!IS_READONLY) opsAutoBackup();
  if(IS_READONLY) roUpdateStatus('最終更新: '+new Date().toLocaleTimeString('ja-JP'));
}
initApp();

// ── 印刷（A4横1枚に自動縮小＋select/inputをspan化） ──
window._printSpans=[];
window.addEventListener('beforeprint',function(){
  const app=document.getElementById('app');
  // ① select→span（印刷時に値を表示するため）
  window._printSpans=[];
  app.querySelectorAll('select').forEach(function(sel){
    if(sel.classList.contains('no-print')) return;
    var span=document.createElement('span');
    span.textContent=sel.options[sel.selectedIndex]?sel.options[sel.selectedIndex].text:'';
    span.style.fontSize=window.getComputedStyle(sel).fontSize;
    span.style.fontWeight=window.getComputedStyle(sel).fontWeight;
    span.style.color='#000';
    span.className=sel.className;
    sel.style.display='none';
    sel.parentNode.insertBefore(span,sel.nextSibling);
    window._printSpans.push({el:sel,span:span});
  });
  // ② input→span
  app.querySelectorAll('input').forEach(function(inp){
    if(inp.classList.contains('no-print')||inp.type==='date') return;
    var span=document.createElement('span');
    span.textContent=inp.value||'';
    span.style.fontSize=window.getComputedStyle(inp).fontSize;
    span.style.fontWeight=window.getComputedStyle(inp).fontWeight;
    span.style.color='#000';
    span.className=inp.className;
    inp.style.display='none';
    inp.parentNode.insertBefore(span,inp.nextSibling);
    window._printSpans.push({el:inp,span:span});
  });
  // ③ A4 1枚に収める自動縮小（iPad Safari対応）
  // transform:scaleは崩れるのでzoomを使用（WebKit系で安定）
  window._printZoom=false;
  var pageH=287*3.78; // A4(297mm)-余白(10mm)=287mm → px換算(≒1085px)
  var h=app.scrollHeight;
  if(h>pageH){
    var z=Math.max(pageH/h,0.7); // 最小70%まで
    app.style.zoom=z;
    window._printZoom=true;
  }
});
window.addEventListener('afterprint',function(){
  // span除去・元のselect/inputを復元
  window._printSpans.forEach(function(item){
    item.el.style.display='';
    if(item.span.parentNode) item.span.parentNode.removeChild(item.span);
  });
  window._printSpans=[];
  // zoom復元
  if(window._printZoom){
    document.getElementById('app').style.zoom='';
    window._printZoom=false;
  }
});
</script>
