<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>出勤＆送迎表 - やわらぎ</title>
<script>
// ═══════════════════════════════════════════════
// 閲覧専用モード判定（GitHub Pagesドメインで自動適用）
// ═══════════════════════════════════════════════
const IS_READONLY = location.hostname.includes('github.io');
if(IS_READONLY) document.documentElement.classList.add('readonly');
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
#sandbar-container,.sandbar,.userscript-banner{display:none!important;height:0!important;position:absolute!important;}
body{font-family:'Noto Sans JP',sans-serif;background:#fff;color:#222;font-size:13px;padding:6px;}

/* ── ヘッダー ── */
.header{display:flex;align-items:baseline;gap:10px;margin-bottom:4px;border-bottom:2px solid #333;padding-bottom:3px;}
.header .date{font-size:18px;font-weight:900;}
.header .dow{font-size:15px;font-weight:700;}
.header .tel-area{margin-left:auto;display:flex;align-items:center;gap:4px;}
.header .tel-label{font-size:10px;font-weight:700;background:#ddd;padding:1px 6px;border-radius:3px;}
.header .tel-box{font-size:10px;border:1px solid #999;padding:1px 8px;border-radius:3px;min-width:50px;}
.back-link{font-size:10px;color:#2563eb;text-decoration:none;background:#f0f4ff;padding:2px 8px;border-radius:4px;border:1px solid #c7d2fe;font-weight:700;}

/* ── コントロール（印刷時非表示） ── */
.ctrl{display:flex;gap:6px;margin-bottom:0;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:200;background:#fff;padding:4px 0;border-bottom:1px solid #ccc;}
.ctrl input[type="date"]{border:1px solid #ccc;padding:2px 6px;border-radius:4px;font-size:11px;font-family:inherit;}
.ctrl button{padding:3px 10px;border:1px solid #ccc;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;background:#fff;}
.ctrl button:hover{background:#f0f0f0;}
.ctrl .btn-primary{background:#0d9668;color:#fff;border-color:#0d9668;}
.ctrl .btn-primary:hover{background:#0a7e56;}

/* ── 週間ナビ ── */
.week-nav{display:flex;gap:3px;align-items:center;margin-left:6px;border-left:1px solid #ccc;padding-left:6px;}
.week-nav button{padding:2px 8px;border:1px solid #ccc;border-radius:4px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;background:#fff;min-width:32px;}
.week-nav button:hover{background:#f0f0f0;}
.week-nav .dow-btn{min-width:28px;padding:2px 6px;}
.week-nav .dow-btn.active{background:#0d9668;color:#fff;border-color:#0d9668;}
.week-nav .dow-btn.has-data{border-bottom:3px solid #0d9668;}
.week-nav .dow-btn.is-holiday{color:#d32f2f;}
.week-nav .week-label{font-size:10px;color:#666;font-weight:700;white-space:nowrap;}

/* ── カレンダーモーダル ── */
.cal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.3);z-index:500;justify-content:center;align-items:flex-start;padding-top:60px;}
.cal-overlay.show{display:flex;}
.cal-box{background:#fff;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.2);padding:12px;min-width:300px;}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cal-header button{padding:4px 10px;border:1px solid #ccc;border-radius:4px;cursor:pointer;font-size:13px;font-weight:700;background:#fff;}
.cal-header button:hover{background:#f0f0f0;}
.cal-header .cal-title{font-size:15px;font-weight:900;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;}
.cal-grid .cal-dow{font-size:10px;font-weight:700;color:#666;padding:2px 0;}
.cal-grid .cal-dow:first-child{color:#d32f2f;}
.cal-grid .cal-dow:last-child{color:#1565c0;}
.cal-day{padding:6px 2px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:500;position:relative;}
.cal-day:hover{background:#e8f5e9;}
.cal-day.today{font-weight:900;outline:2px solid #0d9668;}
.cal-day.selected{background:#0d9668;color:#fff;font-weight:900;}
.cal-day.has-data::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5px;height:5px;background:#0d9668;border-radius:50%;}
.cal-day.selected.has-data::after{background:#fff;}
.cal-day.other-month{color:#ccc;}
.cal-day.sun{color:#d32f2f;}
.cal-day.sat{color:#1565c0;}

/* ── テーブル共通 ── */
table{border-collapse:collapse;font-size:12px;width:100%;}
th,td{border:1px solid #999;padding:1px 3px;vertical-align:top;white-space:nowrap;}
th{background:#e8e8e8;font-weight:700;text-align:center;white-space:nowrap;}

/* ── 上部固定エリア ── */
.sticky-top{position:sticky;top:32px;z-index:100;background:#fff;padding-bottom:2px;border-bottom:2px solid #ccc;}

/* ── 出勤テーブル ── */
.attendance-area{display:flex;gap:8px;margin-bottom:4px;}
.attendance-table{width:auto;}
.attendance-table td{padding:1px 4px;}
.attendance-table .name{font-weight:700;min-width:35px;cursor:pointer;}
.attendance-table .name.staff-absent{background:#d0d0d0;color:#888;text-decoration:line-through;}
.attendance-table .substitute{font-size:10px;color:#d32f2f;font-weight:700;margin-left:2px;white-space:nowrap;}
.attendance-table .sub-input{font-size:11px;width:50px;border:1px solid #ccc;padding:0 2px;}
.attendance-table .time{min-width:35px;text-align:center;}

.send-staff-table{width:auto;}
.send-staff-table td{padding:1px 4px;text-align:center;}

/* ── イベント欄 ── */
.event-table{width:auto;min-width:200px;}
.event-table th{background:#fff3e0;color:#e65100;font-size:11px;}
.event-table td{padding:1px 4px;font-size:11px;}
.event-table .ev-type{font-weight:900;white-space:nowrap;}
.event-table .ev-type-担会{color:#d32f2f;}
.event-table .ev-type-体験{color:#1565c0;}
.event-table .ev-type-見学{color:#2e7d32;}
.event-table .ev-type-契約{color:#6a1b9a;}
.event-table .ev-type-メモ{color:#555;}
.event-table .ev-note{min-width:100px;}
.ev-type-select{font-size:11px;font-weight:700;border:1px solid #ccc;padding:0 2px;}
.ev-time-input{font-size:11px;width:45px;border:1px solid #ccc;padding:0 2px;text-align:center;}
.ev-note-input{font-size:11px;min-width:130px;border:1px solid #ccc;padding:0 2px;field-sizing:content;}

/* ── AMPMセクション ── */
.section{margin-bottom:4px;}
.section-title{font-size:13px;font-weight:900;text-align:center;background:#333;color:#fff;padding:2px;margin-bottom:0;}

/* ── 利用者＆ルートの2カラム ── */
.section-body{display:flex;gap:24px;}
.user-list-col{flex-shrink:0;}
.user-list-col table{height:100%;}
.user-list-col td{padding:0 2px;font-size:12px;line-height:1.3;white-space:nowrap;}
.user-list-col .num{text-align:right;width:16px;font-weight:700;color:#666;}
.health-mark{font-size:9px;margin-left:2px;vertical-align:middle;display:inline-block;line-height:1;}
.health-mark.oral-done{color:#2E7D32;}
.health-mark.oral-partial{color:#F57F17;}
.health-mark.weight-done{color:#1565C0;}
.health-mark.measure-done{color:#E65100;}
.route-col{flex:1;overflow-x:auto;}

/* ── ルートテーブル ── */
.route-block{margin-bottom:2px;}
.route-block h4{font-size:11px;font-weight:900;background:#f0f0f0;padding:1px 4px;border:1px solid #999;border-bottom:none;}
.route-table{width:auto;}
.route-table td{padding:0 2px;white-space:nowrap;line-height:1.3;vertical-align:middle;}
.route-table .user-cell{font-size:12px;white-space:nowrap;cursor:pointer;min-width:50px;min-height:22px;border:1px dashed #ccc;}
.route-table .user-cell:hover{background:#e3f2fd;}
.route-table .user-cell[draggable="true"]{cursor:grab;border:1px solid #999;}
.route-table .disabled-cell{background:#e0e0e0;cursor:default;border:1px solid #d0d0d0;pointer-events:none;}
.route-table .disabled-cell:hover{background:#e0e0e0;}
.route-table .time-cell{font-size:11px;color:#333;text-align:center;}


/* ── 休憩＆清掃 ── */
.break-clean{display:flex;gap:10px;margin-top:3px;margin-bottom:3px;}
.break-table,.clean-table{width:auto;}
.break-table th,.clean-table th{background:#f5f5f5;font-size:10px;}
.break-table td,.clean-table td{font-size:10px;padding:0 4px;}

/* ── 退社 ── */
.leave-area{margin-top:2px;}

/* ── セレクト ── */
.sel-driver,.sel-time,.sel-vehicle,.sel-staff{font-family:inherit;font-size:12px;font-weight:700;border:1px solid #ccc;border-radius:2px;padding:0;background:#fffff0;cursor:pointer;}
.sel-driver{min-width:40px;}
.sel-time{min-width:40px;color:#d32f2f;}
.sel-vehicle{min-width:28px;background:#e3f2fd;}
.sel-staff{min-width:40px;}

/* ── 利用者ステータス ── */
.st-new{background:#fff9c4 !important;color:#f57f17 !important;font-weight:900;}
.st-new::after{content:' 新規';font-size:9px;font-weight:900;color:#e65100;}
.st-absent{background:#d0d0d0 !important;color:#888 !important;text-decoration:line-through;}
.st-longabsent{background:#a0a0a0 !important;color:#fff !important;text-decoration:line-through;font-weight:700;}
.st-longabsent::after{content:' 長期休';font-size:9px;font-weight:900;}
.st-walk{background:#e3f2fd !important;color:#1565c0 !important;}
.st-walk::after{content:' 徒';font-size:9px;font-weight:700;}
.st-family{background:#e8f5e9 !important;color:#2e7d32 !important;}
.st-family::after{content:' 家';font-size:9px;font-weight:700;}
.st-pickonly{background:#e8eaf6 !important;color:#283593 !important;}
.st-pickonly::after{content:' 迎のみ';font-size:9px;font-weight:700;}
.st-droponly{background:#fce4ec !important;color:#880e4f !important;}
.st-droponly::after{content:' 送のみ';font-size:9px;font-weight:700;}
.st-trial{background:#ff9800 !important;color:#fff !important;font-weight:900;border:2px solid #e65100 !important;animation:trialBlink 1.5s ease-in-out 3;}
.st-trial::after{content:' 体験';font-size:9px;font-weight:900;color:#fff;}
@keyframes trialBlink{0%,100%{background:#ff9800 !important;}50%{background:#fff3e0 !important;color:#e65100 !important;}}

.st-marked{background:#fdd835 !important;font-weight:900;border:2px solid #f9a825 !important;}

/* ── 送迎警告 ── */
.cap-warn{background:#fff3e0;border-left:4px solid #ff9800;padding:1px 8px;font-weight:900;color:#e65100;font-size:13px;margin:1px 0;line-height:1.3;white-space:normal;max-width:100%;}
@keyframes blink-warn{0%,100%{background:#ffcdd2 !important}50%{background:#fff !important}}
.mismatch-hl{animation:blink-warn 1.2s ease-in-out infinite !important;font-weight:900;}
.warn-msg{color:#d32f2f;font-size:10px;font-weight:900;line-height:1.1;white-space:nowrap;}
@keyframes blink-border{0%,100%{border-color:#d32f2f;box-shadow:0 0 6px #d32f2f}50%{border-color:transparent;box-shadow:none}}
.sel-driver-warn{animation:blink-border 1s ease-in-out infinite !important;border:3px solid #d32f2f !important;font-weight:900;}
.rider-tag{font-size:10px;color:#1565c0;font-weight:700;background:#e3f2fd;padding:0 4px;border-radius:3px;margin-left:4px;display:inline-block;}
.rider-tag .del-btn{color:#1565c0;}
.btn-rider{font-size:9px;color:#999;cursor:pointer;border:1px dashed #ccc;background:none;padding:0 4px;border-radius:3px;font-family:inherit;}
.rider-in-cell{background:#e3f2fd !important;border:1px solid #90caf9 !important;text-align:center;vertical-align:middle;}
.rider-btn-cell{border:1px dashed #90caf9 !important;text-align:center;vertical-align:middle;}

/* ── ステータスメニュー ── */
.st-menu-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:600;}
.st-menu-overlay.show{display:block;}
.st-menu{position:fixed;z-index:601;background:#fff;border:2px solid #333;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.25);padding:4px 0;min-width:140px;}
.st-menu-item{padding:8px 16px;cursor:pointer;font-size:13px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:8px;}
.st-menu-item:hover{background:#f0f0f0;}
.st-menu-item.active{background:#e8f5e9;}
.st-menu-item .st-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0;}

/* ── ドラッグ ── */
.draggable{cursor:grab;user-select:none;}
.draggable:active{cursor:grabbing;}
.draggable.dragging{opacity:.4;}
.drop-target{transition:background .15s;}
.drop-target.drag-over{background:#dbeafe!important;outline:2px solid #2563eb;}

/* ── 入力フィールド ── */
.editable{background:#fff;cursor:text;min-width:20px;}
.editable:focus{outline:2px solid #2563eb;background:#fff;}
.add-row-btn{font-size:9px;color:#2563eb;cursor:pointer;border:1px dashed #2563eb;background:none;padding:0 6px;border-radius:3px;margin:1px;}
.del-btn{font-size:8px;color:#d32f2f;cursor:pointer;border:none;background:none;padding:0 2px;}
.move-btn{font-size:9px;cursor:pointer;color:#1565c0;line-height:1;padding:0;user-select:none;}

/* ── TEL連絡欄 ── */
.tel-print{display:none;}
.tel-table{width:auto;border-collapse:collapse;}
.tel-table th{background:#e3f2fd;font-size:11px;padding:1px 4px;border:1px solid #999;white-space:nowrap;}
.tel-table td{padding:1px 4px;border:1px solid #999;font-size:11px;white-space:nowrap;}
.tel-name-input{font-size:11px;width:80px;border:1px solid #ccc;padding:0 4px;border-radius:2px;font-family:inherit;}
.tel-done{text-decoration:line-through;color:#999;background:#f0f0f0;}
.tel-check{cursor:pointer;font-size:12px;}

/* ── 人件費パネル（画面のみ） ── */
.wage-panel{margin:4px 0;border:1px solid #e0e0e0;border-radius:6px;background:#fafafa;font-size:11px;}
.wage-header{display:flex;align-items:center;gap:8px;padding:4px 10px;cursor:pointer;background:#f5f5f5;border-radius:6px;font-weight:700;font-size:13px;user-select:none;}
.wage-header:hover{background:#eee;}
.wage-body{padding:4px 8px;}
.wage-table{width:auto;border:none;}
.wage-table th{border:none;padding:2px 8px;font-size:10px;color:#666;text-align:left;background:transparent;}
.wage-table td{border:none;padding:1px 8px;font-size:11px;}
.wage-total-row td{font-weight:900;font-size:13px;border-top:2px solid #333;padding-top:3px;}
.wage-edit{width:70px;border:1px solid #ccc;border-radius:3px;padding:1px 4px;font-size:11px;text-align:right;font-family:inherit;}
.wage-absent td{color:#999;text-decoration:line-through;}
.wage-cost{text-align:right;font-weight:700;min-width:70px;}

/* ── 健康チェックパネル ── */
.health-check-panel{margin:4px 0;border:1px solid #e0e0e0;border-radius:6px;background:#f8fffe;font-size:12px;}
.hc-header{display:flex;align-items:center;gap:8px;padding:4px 10px;cursor:pointer;background:#e8f5e9;border-radius:6px;font-weight:700;font-size:13px;user-select:none;}
.hc-header:hover{background:#c8e6c9;}
.hc-body{padding:6px 10px;display:flex;gap:16px;flex-wrap:wrap;}
.hc-section{flex:1;min-width:200px;}
.hc-title{font-size:14px;font-weight:900;padding:3px 8px;border-radius:4px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;}
.hc-title.oral{background:#e8f5e9;color:#2E7D32;}
.hc-title.weight{background:#e3f2fd;color:#1565C0;}
.hc-list{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:repeat(5,1fr);gap:2px 8px;}
.hc-item{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:4px;min-height:32px;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.hc-item:hover{background:#f0f0f0;}
.hc-item.skipped{opacity:0.4;text-decoration:line-through;}
.hc-item .hc-name{font-weight:700;font-size:14px;}
.hc-item .hc-detail{font-size:11px;color:#666;}
.hc-toggle{width:20px;height:20px;border:2px solid #4CAF50;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#4CAF50;flex-shrink:0;}
.hc-toggle.off{border-color:#ccc;color:#ccc;}
.hc-complete-btn{padding:4px 12px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;color:#fff;min-height:32px;touch-action:manipulation;}
.hc-complete-btn.oral{background:#4CAF50;}
.hc-complete-btn.oral:hover{background:#388E3C;}
.hc-complete-btn.weight{background:#2196F3;}
.hc-complete-btn.weight:hover{background:#1976D2;}
.hc-done-msg{font-size:12px;color:#4CAF50;font-weight:700;padding:4px 0;}
.hc-none-msg{font-size:12px;color:#999;padding:4px 0;}

/* ── 今月やることパネル（測定＋居宅訪問・誕生日） ── */
.mt-panel{margin:4px 0;border:1px solid #e0e0e0;border-radius:6px;background:#fffbf5;font-size:12px;}
.mt-header{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;background:#fff3e0;border-radius:6px;font-weight:700;font-size:13px;user-select:none;-webkit-user-select:none;touch-action:manipulation;flex-wrap:wrap;}
.mt-header:hover{background:#ffe0b2;}
.mt-body{padding:6px 10px;}
.mt-section{margin-bottom:6px;}
.mt-section-title{font-size:13px;font-weight:900;padding:4px 8px;border-radius:4px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.mt-section-title.mt-measure{background:#fff3e0;color:#e65100;}
.mt-section-title.mt-birthday{background:#fce4ec;color:#c62828;}
.mt-list{list-style:none;padding:0;margin:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:3px 8px;}
.mt-item{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:6px;min-height:36px;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.mt-item:active{background:#e8e8e8;}
.mt-check{width:24px;height:24px;border:2px solid #0d9668;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#0d9668;flex-shrink:0;}
.mt-check.done{background:#0d9668;color:#fff;border-color:#0d9668;}
.mt-name{font-weight:700;font-size:14px;}
.mt-detail{font-size:11px;color:#666;}
.mt-done{opacity:0.5;}
.mt-done .mt-name{text-decoration:line-through;}
.mt-carryover{background:#fff5f5;border-left:3px solid #d32f2f;}
.mt-adhoc{background:#f0f8ff;border-left:3px solid #1565c0;}
.mt-btn{padding:4px 12px;border:1px solid #ccc;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;min-height:36px;touch-action:manipulation;}

/* ══ 印刷：A4縦・1枚・9pt・PDF安定・隙間ゼロ ══ */
@media print{
  @page{size:A4 portrait!important;margin:5mm!important;}

  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;box-sizing:border-box!important;}
  html,body{margin:0!important;padding:0!important;width:100%!important;font-size:9pt!important;line-height:1.1!important;overflow:hidden!important;}
  #app{margin:0!important;padding:0!important;width:100%!important;}

  /* 非表示 */
  body>*:not(#app),#sandbar-container,.sandbar,.userscript-banner,
  .ctrl,.back-link,.add-row-btn,.del-btn,.no-print,.st-menu-overlay,.health-mark,
  .wage-panel,.health-check-panel,.mt-panel,.cap-warn,.ev-time-label,
  .health-check-panel .hc-complete-btn,.health-check-panel .hc-toggle,
  .del-col,.empty-row{display:none!important;}
  tr:has(.empty-row){display:none!important;}
  .tel-screen{display:block!important;}.tel-print{display:none!important;}

  /* ヘッダー */
  .header{margin:0!important;padding:0!important;width:100%!important;border-bottom:1px solid #333;}
  .header .date{font-size:11pt!important;font-weight:900;}
  .header .dow{font-size:9pt!important;font-weight:900;}

  /* セクション：隙間完全ゼロ */
  .section{width:100%!important;margin:0!important;padding:0!important;}
  .section-title{font-size:8pt!important;padding:0 3px!important;margin:0!important;line-height:1.1!important;font-weight:900;background:#333!important;color:#fff!important;}
  .section-body{width:100%!important;margin:0!important;padding:0!important;gap:0!important;}
  .sticky-top{position:static;border-bottom:none;padding:0;margin:0;}
  .editable{background:transparent;}

  /* テーブル共通：9pt・紙幅99%・隙間ゼロ・右端収め */

// ═══════════════════════════════════════════════
// クラウド同期（GAS経由でスプレッドシートに保存）
// ═══════════════════════════════════════════════
const OPS_GAS_URL_KEY = 'yawaragi_ops_gas_url';
const READONLY_GAS_URL = 'https://script.google.com/macros/s/AKfycby-V66UddiWmavoKDYopA2WTU3Sl94GzXGdvRUAgCpHn96qNovOMo9YRLnVI_pgKjgsIA/exec';
function getOpsGasUrl(){ return IS_READONLY ? READONLY_GAS_URL : (localStorage.getItem(OPS_GAS_URL_KEY)||localStorage.getItem('yawaragi_nisshi_gas_url')||''); }
function setOpsGasUrl(url){ if(!IS_READONLY) localStorage.setItem(OPS_GAS_URL_KEY, url); }

// 同期状態の管理
let _cloudSyncTimer = null;
let _cloudSyncPending = false;  // 未送信データがあるか
let _cloudSyncRetryCount = 0;
const CLOUD_SYNC_MAX_RETRY = 3;

// デバウンス付きGAS自動同期（autoSaveから呼ばれる、3秒間隔制限）
function debouncedCloudSync(){
  if(IS_READONLY || !getOpsGasUrl()) return;
  _cloudSyncPending = true;
  updateCloudBtn('pending');
  if(_cloudSyncTimer) clearTimeout(_cloudSyncTimer);
  _cloudSyncTimer = setTimeout(cloudSyncOps, 3000);
}

// 即時同期（ページ離脱時などに使用）
function flushCloudSync(){
  if(IS_READONLY || !_cloudSyncPending) return;
  if(_cloudSyncTimer) clearTimeout(_cloudSyncTimer);
  _cloudSyncTimer = null;
  // sendBeaconで確実に送信（ページ閉じても送られる）
  const url = getOpsGasUrl();
  if(!url || !D.date) return;
  const sendData = {};
  sendData[D.date] = D;
  const payload = { type:'yawaragi_daily_ops', dailyOps: sendData };
  try { payload.oralCheck = JSON.parse(localStorage.getItem('yawaragi_oral_check')||'{}'); } catch(e){}
  try { payload.weightCheck = JSON.parse(localStorage.getItem('yawaragi_weight_check')||'{}'); } catch(e){}
  try {
    const sent = navigator.sendBeacon(url, JSON.stringify(payload));
    if(sent){
      console.log('☁️ sendBeaconで送信完了');
      _cloudSyncPending = false;
    } else {
      console.warn('☁️ sendBeacon失敗、fetchで再試行');
      // sendBeacon失敗時はfetchで試す（ページ閉じる前に間に合うかは保証なし）
      fetch(url, { method:'POST', mode:'no-cors', body: JSON.stringify(payload), keepalive: true });
      _cloudSyncPending = false;
    }
  } catch(e){
    console.warn('☁️ flushCloudSync エラー:', e);
  }
}

// ページ離脱・タブ切替時に未送信データを即送信
window.addEventListener('beforeunload', function(){ flushCloudSync(); });
window.addEventListener('pagehide', function(){ flushCloudSync(); });
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'hidden') flushCloudSync();
});

async function cloudSyncOps(){
  const url = getOpsGasUrl();
  if(!url) return;
  if(!D.date) return;
  _cloudSyncTimer = null;
  // 現在表示中の日付のデータだけ送信（軽量化）
  const sendData = {};
  sendData[D.date] = D;
  const payload = { type:'yawaragi_daily_ops', dailyOps: sendData };
  // 口腔・体重チェックデータも同期
  try { payload.oralCheck = JSON.parse(localStorage.getItem('yawaragi_oral_check')||'{}'); } catch(e){}
  try { payload.weightCheck = JSON.parse(localStorage.getItem('yawaragi_weight_check')||'{}'); } catch(e){}

  try {
    // まずfetchで送信（keepalive: trueでページ閉じても継続）
    await fetch(url, {
      method:'POST',
      mode:'no-cors',
      body: JSON.stringify(payload),
      keepalive: true
    });
    console.log('☁️ クラウド送信完了');

    // 送信後にGETで到着確認（no-corsでは応答が読めないため、別途GETで検証）
    const verified = await verifyCloudSync();
    if(verified){
      _cloudSyncPending = false;
      _cloudSyncRetryCount = 0;
      updateCloudBtn('ok');
    } else {
      throw new Error('データ到着を確認できません');
    }
  } catch(err){
    console.warn('☁️ クラウド同期エラー:', err);
    _cloudSyncRetryCount++;
    if(_cloudSyncRetryCount <= CLOUD_SYNC_MAX_RETRY){
      console.log('☁️ リトライ ' + _cloudSyncRetryCount + '/' + CLOUD_SYNC_MAX_RETRY);
      updateCloudBtn('retry');
      // 段階的に待機時間を増やしてリトライ
      setTimeout(cloudSyncOps, _cloudSyncRetryCount * 3000);
    } else {
      _cloudSyncRetryCount = 0;
      updateCloudBtn('error');
    }
  }
}

// GASにGETリクエストして、送信したデータが到着しているか確認
async function verifyCloudSync(){
  const url = getOpsGasUrl();
  if(!url || !D.date) return false;
  try {
    const sep = url.includes('?') ? '&' : '?';
    const res = await fetch(url + sep + 'action=getOps&t=' + Date.now());
    if(!res.ok) return false;
    const data = await res.json();
    if(data && data.dailyOps && data.dailyOps[D.date]){
      const cloudMod = data.dailyOps[D.date]._lastModified || 0;
      const localMod = D._lastModified || 0;
      // GAS上のデータが今のデータと同じかそれ以上に新しければOK
      return cloudMod >= localMod;
    }
    return false;
  } catch(e){
    console.warn('☁️ 検証エラー:', e);
    return false;
  }
}

function updateCloudBtn(status){
  const btn = document.getElementById('btn-cloud');
  if(!btn) return;
  const url = getOpsGasUrl();
  if(!url){ btn.textContent='☁️'; btn.style.background='#e3f2fd'; btn.title='クラウド同期未設定'; return; }
  switch(status){
    case 'ok':
      btn.textContent = '☁️✓';
      btn.style.background = '#c8e6c9';
      btn.title = '同期済み';
      setTimeout(()=>{ if(!_cloudSyncPending){ btn.textContent='☁️'; } }, 3000);
      break;
    case 'pending':
      btn.textContent = '☁️…';
      btn.style.background = '#fff9c4';
      btn.title = '送信待ち...';
      break;
    case 'retry':
      btn.textContent = '☁️↻';
      btn.style.background = '#ffe0b2';
      btn.title = 'リトライ中... (' + _cloudSyncRetryCount + '/' + CLOUD_SYNC_MAX_RETRY + ')';
      break;
    case 'error':
      btn.textContent = '☁️✗';
      btn.style.background = '#ffcdd2';
      btn.title = '同期失敗！クリックして再試行';
      break;
    default: // true/false（後方互換）
      if(status === true){ updateCloudBtn('ok'); }
      else if(status === false){ updateCloudBtn('error'); }
  }
}

function setupCloudSync(){
  const current = getOpsGasUrl();
  const msg = current
    ? '☁️ クラウド同期設定済み\n\n現在のURL:\n' + current + '\n\n変更する場合は新しいURLを入力（空欄で解除）:'
    : '☁️ クラウド同期の設定\n\n送迎日誌GASのURLを入力してください:';
  const input = prompt(msg, current);
  if(input === null) return; // キャンセル
  if(input.trim() === ''){
    localStorage.removeItem(OPS_GAS_URL_KEY);
    alert('☁️ クラウド同期を解除しました');
    updateCloudBtn('error');
  } else {
    setOpsGasUrl(input.trim());
    alert('☁️ クラウド同期を設定しました！\n保存するたびに自動でクラウドに送ります');
    cloudSyncOps(); // 初回同期
  }
}

  // イベントから体験ユーザーを収集
  const eventTrials={am:new Set(),pm:new Set()};
  D.events.forEach(ev=>{
    if((ev.type==='体験'||ev.type==='見学')&&ev.name){
      // 見学で配置なしの場合はスキップ
      if(ev.type==='見学'&&ev.haichi==='no') return;
      const name=stripSama(ev.name);
      if(!name) return;
      if(ev.unit==='both'){eventTrials.am.add(name);eventTrials.pm.add(name);}
      else if(ev.unit==='am') eventTrials.am.add(name);
      else if(ev.unit==='pm') eventTrials.pm.add(name);
    }
  });

  ['am','pm'].forEach(key=>{
    if(!D[key].userStatus) D[key].userStatus={};
    // ルートに配置済みの体験者名を収集
    const inRoute=new Set();
    ['pick','drop'].forEach(t=>{
      (D[key][t]||[]).forEach(route=>{
        route.stops.forEach(s=>{if(s.user) inRoute.add(s.user);});
      });
    });

    // 既存のtrial状態を一旦クリア
    const oldTrials=new Set();
    Object.keys(D[key].userStatus).forEach(name=>{
      if(D[key].userStatus[name]==='trial') oldTrials.add(name);
    });

    // イベントに存在する体験者 → trialステータスを維持/設定
    eventTrials[key].forEach(name=>{
      if(!D[key].users.includes(name)) D[key].users.push(name);
      D[key].userStatus[name]='trial';
    });

    // イベントから消えた体験者 → ルートにいなければ除去、いれば残す
    oldTrials.forEach(name=>{
      if(eventTrials[key].has(name)) return; // まだイベントにいる
      if(inRoute.has(name)){
        // ルートに配置済み → リストとステータスは残す
        D[key].userStatus[name]='trial';
      } else {
        // ルートにもいない → 除去
        delete D[key].userStatus[name];
        D[key].users=D[key].users.filter(u=>u!==name);
      }
    });
  });
}

  h+=renderWagePanel();

  h+=renderUnit('AM','am');

  if(!D.vehicleMismatchOk) D.vehicleMismatchOk={};
  if(D.am&&D.am.drop&&D.pm&&D.pm.pick){
    D.am.drop.forEach(ad=>{
      if(!ad.driver||!ad.vehicle) return;
      D.pm.pick.forEach(pp=>{
        if(pp.driver===ad.driver&&pp.vehicle&&ad.vehicle!==pp.vehicle){
          const wk='vm_'+ad.driver;
          if(!D.vehicleMismatchOk[wk]){
            h+='<div style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;font-size:13px;padding:8px 10px;font-weight:700;margin:4px 0;border-radius:4px">⚠ '+ad.driver+'：AM送り（'+ad.vehicle+'）→ PM迎え（'+pp.vehicle+'）車両が違います！ <button class="no-print" style="margin-left:8px;padding:2px 12px;background:#28a745;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px;font-weight:700" onclick="if(!D.vehicleMismatchOk)D.vehicleMismatchOk={};D.vehicleMismatchOk[\''+wk+'\']=true;autoSave();render()">OK</button></div>';
          }
        }
      });
    });
    // 車両が揃ったらOKフラグをリセット
    const activeKeys=new Set();
    D.am.drop.forEach(ad=>{
      if(!ad.driver||!ad.vehicle) return;
      D.pm.pick.forEach(pp=>{
        if(pp.driver===ad.driver&&pp.vehicle&&ad.vehicle!==pp.vehicle) activeKeys.add('vm_'+ad.driver);

  h+=renderUnit('PM','pm');

  // ── 退社（PMセクション内に統合） ──

function renderUnit(title,key){
  const unit=D[key];
  let h='';
  h+='<div class="section '+(key==='pm'?'pm-section':'')+'">';
  h+='<div class="section-title">'+title+'</div>';
  h+='<div class="section-body">';

  // 左: 利用者番号リスト（ドラッグ元）
  if(!unit.userStatus) unit.userStatus={};
  let activeCount=0, needTransportPick=0, needTransportDrop=0;
  h+='<div class="user-list-col"><table>';
  const lastUsed=unit.users.reduce((max,u,i)=>u?i:max,-1);
  const rowCount=Math.min(Math.max(lastUsed+3,3),18);
  for(let i=0;i<rowCount;i++){
    const name=unit.users[i]||'';
    const st=name?unit.userStatus[name]||'':'';
    h+='<tr><td class="num">'+(i+1)+'</td>';
    if(name){
      const cls=st?'st-'+st:'';
      if(!isAbsentStatus(st)) activeCount++;
      if(!isAbsentStatus(st)&&st!=='walk'&&st!=='family'&&st!=='droponly') needTransportPick++;
      if(!isAbsentStatus(st)&&st!=='walk'&&st!=='family'&&st!=='pickonly') needTransportDrop++;
      const hMarks=isAbsentStatus(st)?'':getUserHealthMarks(name);
      h+='<td class="draggable '+cls+'" draggable="true"'
        +' ondragstart="onDragStart(event,\''+name.replace(/'/g,"\\'")+'\',\''+st+'\')"'
        +' onclick="toggleUserStatus(\''+key+'\',\''+name.replace(/'/g,"\\'")+'\',event)"'
        +' ondblclick="event.stopPropagation();editUserName(\''+key+'\','+i+')"'
        +'>'+(st==='trial'?name:sama(name))+hMarks+'</td>'
        +'<td style="padding:0;border:none"><span class="del-btn no-print" onclick="event.stopPropagation();removeUser(\''+key+'\','+i+',\''+name.replace(/'/g,"\\'")+'\')">✕</span></td></tr>';
    } else {
      h+='<td class="editable empty-row" contenteditable onblur="setUser(\''+key+'\','+i+',this.textContent.trim())"></td></tr>';
    }
  }
  h+='</table></div>';

  // 右: ルート
  h+='<div class="route-col">';

  // 送迎人数チェック（同乗者分を引く）
  let totalCap=0, filledPick=0;
  unit.pick.forEach(r=>{
    const cap=CAR_CAPACITY[r.vehicle]||0;
    const riderCount=r.rider?1:0;
    if(r.vehicle) totalCap+=cap-riderCount;
    r.stops.forEach(s=>{ if(s.user) filledPick++; });
  });
  // 重複チェック（迎え）
  const pickNames=[];
  unit.pick.forEach(r=>r.stops.forEach(s=>{ if(s.user) pickNames.push(s.user); }));
  const pickNorms=pickNames.map(normName);
  const pickDups=pickNames.filter((n,i)=>pickNorms.indexOf(normName(n))!==i);
  // 重複チェック（送り）
  const dropNames=[];
  unit.drop.forEach(r=>r.stops.forEach(s=>{ if(s.user) dropNames.push(s.user); }));
  const dropNorms=dropNames.map(normName);
  const dropDups=dropNames.filter((n,i)=>dropNorms.indexOf(normName(n))!==i);

  // 車両重複チェック（迎え）
  if(!D.dupOk) D.dupOk={};
  const pickVehs=unit.pick.map(r=>r.vehicle).filter(v=>v);
  const pickVehDups=pickVehs.filter((v,i)=>pickVehs.indexOf(v)!==i);
  if(pickVehDups.length>0){
    const dk=key+'_pickVeh';
    if(!D.dupOk[dk]){
      h+='<div class="cap-warn no-print" style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;padding:4px 8px;font-weight:700">⚠ 迎えで同じ車が重複：'+[...new Set(pickVehDups)].join('、')+' <button style="margin-left:6px;padding:1px 10px;background:#28a745;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px" onclick="if(!D.dupOk)D.dupOk={};D.dupOk[\''+dk+'\']=true;autoSave();render()">OK</button></div>';
    }
  } else { delete D.dupOk[key+'_pickVeh']; }
  // 車両重複チェック（送り）
  const dropVehs=unit.drop.map(r=>r.vehicle).filter(v=>v);
  const dropVehDups=dropVehs.filter((v,i)=>dropVehs.indexOf(v)!==i);
  if(dropVehDups.length>0){
    const dk=key+'_dropVeh';
    if(!D.dupOk[dk]){
      h+='<div class="cap-warn no-print" style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;padding:4px 8px;font-weight:700">⚠ 送りで同じ車が重複：'+[...new Set(dropVehDups)].join('、')+' <button style="margin-left:6px;padding:1px 10px;background:#28a745;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px" onclick="if(!D.dupOk)D.dupOk={};D.dupOk[\''+dk+'\']=true;autoSave();render()">OK</button></div>';
    }
  } else { delete D.dupOk[key+'_dropVeh']; }
  // ドライバー重複チェック（迎え）
  const pickDrvs=unit.pick.map(r=>r.driver).filter(v=>v);
  const pickDrvDups=pickDrvs.filter((v,i)=>pickDrvs.indexOf(v)!==i);
  if(pickDrvDups.length>0){
    const dk=key+'_pickDrv';
    if(!D.dupOk[dk]){
      h+='<div class="cap-warn no-print" style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;padding:4px 8px;font-weight:700">⚠ 迎えでドライバー重複：'+[...new Set(pickDrvDups)].join('、')+' <button style="margin-left:6px;padding:1px 10px;background:#28a745;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px" onclick="if(!D.dupOk)D.dupOk={};D.dupOk[\''+dk+'\']=true;autoSave();render()">OK</button></div>';
    }
  } else { delete D.dupOk[key+'_pickDrv']; }
  // ドライバー重複チェック（送り）
  const dropDrvs=unit.drop.map(r=>r.driver).filter(v=>v);
  const dropDrvDups=dropDrvs.filter((v,i)=>dropDrvs.indexOf(v)!==i);
  if(dropDrvDups.length>0){
    const dk=key+'_dropDrv';
    if(!D.dupOk[dk]){
      h+='<div class="cap-warn no-print" style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;padding:4px 8px;font-weight:700">⚠ 送りでドライバー重複：'+[...new Set(dropDrvDups)].join('、')+' <button style="margin-left:6px;padding:1px 10px;background:#28a745;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px" onclick="if(!D.dupOk)D.dupOk={};D.dupOk[\''+dk+'\']=true;autoSave();render()">OK</button></div>';
    }
  } else { delete D.dupOk[key+'_dropDrv']; }
  // イベント（担会・契約）で使用中の車両チェック（実際の時間帯で判定）
  // 競合情報を記録 → 該当ルートのすぐ近くに警告表示
  const evPickConflicts={}; // {車両名: {type,time,warnKey}}
  const evDropConflicts={};
  if(D.events){
    const lbl=key==='am'?'AM':'PM';
    const unitTimes=key==='am'?{pickStart:8*60,pickEnd:9*60,dropStart:11*60+50,dropEnd:12*60+10}:{pickStart:13*60,pickEnd:13*60+40,dropStart:16*60+20,dropEnd:16*60+40};
    if(!D.eventVehicleOk) D.eventVehicleOk={};
    D.events.filter(ev=>ev.vehicle&&(ev.type==='担会'||ev.type==='契約')&&ev.time).forEach(ev=>{
      const evMin=timeToMin(ev.time);
      if(evMin==null||evMin<0) return;
      const back=ev.backTime?timeToMin(ev.backTime):null;
      const evEnd=(back!=null&&back>evMin)?back:evMin+60;
      const veh=ev.vehicle;
      const pickConflict=pickVehs.includes(veh)&&evMin<unitTimes.pickEnd&&evEnd>unitTimes.pickStart;
      const dropConflict=dropVehs.includes(veh)&&evMin<unitTimes.dropEnd&&evEnd>unitTimes.dropStart;
      if(pickConflict){
        const wk=key+'_pick_'+veh+'_'+ev.time+'_'+ev.type;
        if(!D.eventVehicleOk[wk]) evPickConflicts[veh]={type:ev.type,time:ev.time,warnKey:wk,label:lbl+'迎え'};
      }
      if(dropConflict){
        const wk=key+'_drop_'+veh+'_'+ev.time+'_'+ev.type;
        if(!D.eventVehicleOk[wk]) evDropConflicts[veh]={type:ev.type,time:ev.time,warnKey:wk,label:lbl+'送り'};
      }
    });
  }

  if(pickDups.length>0){
    h+='<div class="cap-warn no-print" style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;padding:4px 8px;font-weight:700">⚠ 迎えに重複あり！ '+[...new Set(pickDups)].map(n=>n+'様').join('、')+'</div>';
  }
  if(dropDups.length>0){
    h+='<div class="cap-warn no-print" style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;padding:4px 8px;font-weight:700">⚠ 送りに重複あり！ '+[...new Set(dropDups)].map(n=>n+'様').join('、')+'</div>';
  }
  const needTransport=Math.max(needTransportPick,needTransportDrop);
  if(needTransport>0){
    if(totalCap<needTransport){
      h+='<div class="cap-warn no-print" style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;padding:4px 8px;font-weight:700">⚠ 送迎枠不足！ 必要'+needTransport+'名 ＞ 枠'+totalCap+'名</div>';
    }
    // 未配置の利用者を特定（名前のスペース違いを吸収）
    const pickNormSet=new Set(pickNames.map(normName));
    const missingPick=[];
    for(let i=0;i<unit.users.length;i++){
      const n=unit.users[i];
      if(!n) continue;
      const st=unit.userStatus[n]||'';
      if(isAbsentStatus(st)||st==='walk'||st==='family'||st==='droponly') continue;
      if(!pickNormSet.has(normName(n))) missingPick.push(n);
    }
    if(missingPick.length>0){
      h+='<div class="cap-warn no-print" style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;padding:4px 8px;font-weight:700">⚠ 迎え未配置：'+missingPick.map(n=>n+'様').join('、')+'</div>';
    }
    // 送りも同様
    const dropNormSet=new Set(dropNames.map(normName));
    const missingDrop=[];
    for(let i=0;i<unit.users.length;i++){
      const n=unit.users[i];
      if(!n) continue;
      const st=unit.userStatus[n]||'';
      if(isAbsentStatus(st)||st==='walk'||st==='family'||st==='pickonly') continue;
      if(!dropNormSet.has(normName(n))) missingDrop.push(n);
    }
    if(missingDrop.length>0){
      h+='<div class="cap-warn no-print" style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;padding:4px 8px;font-weight:700">⚠ 送り未配置：'+missingDrop.map(n=>n+'様').join('、')+'</div>';
    }
  }

  // ドライバー出勤時間チェック
  if(!D.shiftWarnOk) D.shiftWarnOk={};
  const shiftResult=checkDriverShiftWarnings(key);
  // エラー（出勤前に出発）→ 消せない
  shiftResult.errors.forEach(w=>{
    h+='<div class="cap-warn no-print" style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;padding:4px 8px;font-weight:700">'+w+'</div>';
  });
  // 確認（ギリギリ）→ OKで消せる
  shiftResult.confirms.forEach((w,wi)=>{
    const swk=key+'_sc_'+wi;
    if(!D.shiftWarnOk[swk]){

function renderDropOnly(key){
  const unit=D[key];
  if(!unit) return '';
  const MAX_STOPS=7;
  const lbl=key==='am'?'AM':'PM';

  // 送り未配置チェック用
  const dropNames=[];
  unit.drop.forEach(r=>r.stops.forEach(s=>{ if(s.user) dropNames.push(s.user); }));
  const dropNormSet=new Set(dropNames.map(normName));
  const missingDrop=[];
  for(let i=0;i<unit.users.length;i++){
    const n=unit.users[i];
    if(!n) continue;
    const st=unit.userStatus[n]||'';
    if(isAbsentStatus(st)||st==='walk'||st==='family'||st==='pickonly') continue;
    if(!dropNormSet.has(normName(n))) missingDrop.push(n);
  }

  // イベント車両チェック用
  if(!D.eventVehicleOk) D.eventVehicleOk={};
  const evDropConflicts={};
  if(D.events){
    D.events.forEach(ev=>{
      if(!ev.vehicle||!ev.time) return;
      unit.drop.forEach(r=>{
        if(r.vehicle===ev.vehicle){
          const wk=key+'_drop_ev_'+ev.vehicle;
          if(!D.eventVehicleOk[wk]) evDropConflicts[r.vehicle]={type:ev.type,time:ev.time,warnKey:wk,label:lbl+'送り'};

      +(ri<unit.drop.length-1?'<span class="move-btn" onclick="pushUndo();swapDrop(\''+key+'\','+ri+','+(ri+1)+')">▼</span>':'<span class="move-btn" style="visibility:hidden">▼</span>')

    h+='<td>'+driverSelect(key+'.drop['+ri+'].driver',route.driver,dropNoDrv)+dropDrvMsg+'</td>';

function sendStaffTimeSelect(si,key,current){
  let times=[];

function breakTimeSelect(idx,current){
  let times=[];
  for(let m=10*60+30;m<=14*60;m+=5) times.push(minToTime(m));
  let opts='<option value="">--</option>';
  times.forEach(t=>{
    opts+='<option value="'+t+'"'+(current===t?' selected':'')+'>'+t+'</option>';
  });
  opts+='<option value="送迎後"'+(current==='送迎後'?' selected':'')+'>送迎後</option>';
  return '<select class="sel-time" style="color:#333" onchange="D.breaks['+idx+'].time=this.value;autoSave();render()">'+opts+'</select>';
}

function breakStaffSelect(idx,current){
  // 送迎ドライバーは昼休憩なし→フロアスタッフのみ表示
  const floor=activeFloor();
  // 既に他の休憩行で選択済みの名前を除外（自分自身は除く）
  const used=new Set(D.breaks.filter((_,i)=>i!==idx).map(b=>b.name).filter(Boolean));
  let opts='<option value="">--</option>';
  floor.forEach(n=>{
    if(used.has(n)&&n!==current) return;
    opts+='<option value="'+n+'"'+(current===n?' selected':'')+'>'+n+'</option>';
  });
  return '<select class="sel-staff" onchange="D.breaks['+idx+'].name=this.value;autoSave()">'+opts+'</select>';
}

function cleanStaffSelect(path,selected){
  // フロアスタッフ＋比嘉（送迎の小野・林は除外）
  const floor=activeFloor();
  if(!floor.includes('比嘉')) floor.push('比嘉');

  selected.forEach((n,i)=>{
    if(!n) return;
    h+='<span style="font-weight:700;margin-right:4px">'+n+'<span class="del-btn no-print" onclick="pushUndo();'+path+'.splice('+i+',1);render()">✕</span></span>';
  });
  const added=new Set(selected);
  const cand=floor.filter(n=>!added.has(n));

  return h;

function renderBreakClean(){
  // 休憩を時系列にソート
  D.breaks.sort((a,b)=>{
    if(!a.time) return 1;
    if(!b.time) return -1;
    return a.time.localeCompare(b.time);
  });
  let h='<div class="break-clean">';
  // 休憩
  h+='<div><table class="break-table"><tr><th colspan="4">休憩時間</th></tr>';
  D.breaks.forEach((b,i)=>{
    h+='<tr>';
    h+='<td>'+breakTimeSelect(i,b.time)+'</td>';
    h+='<td>'+breakStaffSelect(i,b.name)+'</td>';
    h+='<td>'+b.duration+'</td>';
    h+='<td class="del-col"><span class="del-btn no-print" onclick="pushUndo();D.breaks.splice('+i+',1);render()">✕</span></td>';
    h+='</tr>';
  });
  h+='<tr><td colspan="4"><button class="add-row-btn no-print" onclick="addBreak()">＋</button></td></tr>';
  // 休憩と送迎の整合性チェック
  if(!D.breakWarnOk) D.breakWarnOk={};
  const breakWarns=checkBreakDriverWarnings();
  breakWarns.forEach((w,wi)=>{
    const bwk='bw_'+wi;
    if(!D.breakWarnOk[bwk]){
      h+='<tr><td colspan="4" style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;font-size:11px;padding:4px;font-weight:700">'+w+' <button class="no-print" style="margin-left:8px;padding:1px 10px;background:#28a745;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px" onclick="if(!D.breakWarnOk)D.breakWarnOk={};D.breakWarnOk[\''+bwk+'\']=true;autoSave();render()">OK</button></td></tr>';
    }
  });
  // 担会・契約と休憩の競合チェック（出発〜戻りの全時間帯）
  if(!D.eventBreakOk) D.eventBreakOk={};
  if(D.events && D.breaks){
    D.events.forEach((ev,i)=>{
      if(!ev.staff || !ev.time || (ev.type!=='担会'&&ev.type!=='契約')) return;
      const staffBreak=D.breaks.find(b=>b.name===ev.staff && b.time && b.time!=='送迎後');
      if(!staffBreak) return;
      const evMin=timeToMin(ev.time);
      const departMin=evMin-30;
      const backMin=ev.backTime?timeToMin(ev.backTime):evMin+90;
      const bStart=timeToMin(staffBreak.time);
      const bDur=staffBreak.duration==='１時間'?60:staffBreak.duration==='45分'?45:60;
      const bEnd=bStart+bDur;
      const wk='break_'+i+'_'+ev.staff;
      if(bStart<backMin && bEnd>departMin){
        if(!D.eventBreakOk[wk]){
          const dH=Math.floor(departMin/60);const dM=String(departMin%60).padStart(2,'0');
          const rH=Math.floor(backMin/60);const rM=String(backMin%60).padStart(2,'0');
          h+='<tr><td colspan="4" style="color:#b71c1c;background:#fff0f0;border-left:4px solid #d32f2f;font-size:11px;padding:4px;font-weight:700">⚠ '+ev.staff+'の休憩（'+staffBreak.time+'～'+bDur+'分間）が外出（'+dH+':'+dM+'～'+rH+':'+rM+'）と重なります <button class="no-print" style="margin-left:8px;padding:1px 10px;background:#28a745;color:#fff;border:none;border-radius:3px;cursor:pointer;font-size:11px" onclick="if(!D.eventBreakOk)D.eventBreakOk={};D.eventBreakOk[\''+wk+'\']=true;autoSave();render()">OK</button></td></tr>';
        }
      } else {
        delete D.eventBreakOk[wk];
      }
    });
  }
  // フロア人数チェック（3人未満で警告）
  if(!D.floorWarnOk) D.floorWarnOk={};
  const floorWarns=checkFloorStaffCount();
  floorWarns.forEach((w,fi)=>{
    const fwk='fw_'+fi;
    if(!D.floorWarnOk[fwk]){
      h+='<tr><td colspan="4" style="color:#fff;background:#d32f2f;border-left:4px solid #b71c1c;font-size:12px;padding:6px;font-weight:900">'+w+' <button class="no-print" style="margin-left:8px;padding:2px 12px;background:#fff;color:#d32f2f;border:none;border-radius:3px;cursor:pointer;font-size:11px;font-weight:700" onclick="if(!D.floorWarnOk)D.floorWarnOk={};D.floorWarnOk[\''+fwk+'\']=true;autoSave();render()">OK</button></td></tr>';
    }
  });
  h+='</table></div>';
  // 清掃
  if(!D.clean.first) D.clean.first=D.clean.am||[];
  if(!D.clean.remain) D.clean.remain=[];
  h+='<div><table class="clean-table">';
  h+='<tr><th colspan="2">清掃・片付け</th></tr>';
  h+='<tr><td style="font-weight:700;font-size:10px;white-space:nowrap">清掃</td><td>'+cleanStaffSelect('D.clean.first',D.clean.first)+'</td></tr>';
  h+='<tr><td style="font-weight:700;font-size:10px;white-space:nowrap;color:#d32f2f">残りお願い</td><td>'+cleanStaffSelect('D.clean.remain',D.clean.remain)+'</td></tr>';
  h+='</table></div>';
  h+='</div>';
  return h;
}

function leaveStaffSelect(idx,current){
  const floor=activeFloor();
  const send=activeSend();
  // 既に他の退社行で選択済みの名前を除外
  const used=new Set(D.leave.filter((_,i)=>i!==idx).map(l=>l.name).filter(Boolean));
  let opts='<option value="">--</option>';
  floor.forEach(n=>{
    if(used.has(n)&&n!==current) return;
    opts+='<option value="'+n+'"'+(current===n?' selected':'')+'>'+n+'</option>';
  });
  send.forEach(n=>{
    if(used.has(n)&&n!==current) return;
    opts+='<option value="'+n+'"'+(current===n?' selected':'')+'>'+n+'</option>';
  });
  return '<select class="sel-staff" onchange="D.leave['+idx+'].name=this.value;autoSave()">'+opts+'</select>';
}

function leaveTimeSelect(idx,current){
  const times=['15:00','15:30','16:00','16:30','16:45','17:00','送迎後','清掃後','ラスト'];
  let opts='<option value="">--</option>';

    opts+='<option value="'+t+'"'+(current===t?' selected':'')+'>'+t+'</option>';
  });
  return '<select class="sel-time" style="color:#333" onchange="D.leave['+idx+'].time=this.value;autoSave()">'+opts+'</select>';
}

function renderLeave(){
  // 清掃・片付けスタッフの退社時間を「清掃後」に自動設定
  (D.leaveClean||[]).forEach(name=>{
    const lv=D.leave.find(l=>l.name===name);
    if(lv && lv.time!=='清掃後') { lv.time='清掃後'; autoSave(); }
  });
  // 退社を時系列にソート（送迎後→清掃後→ラストの順）
  const leaveOrder={'送迎後':90,'清掃後':91,'ラスト':92};
  D.leave.sort((a,b)=>{
    if(!a.time) return 1;
    if(!b.time) return -1;
    const oa=leaveOrder[a.time]||0;
    const ob=leaveOrder[b.time]||0;
    if(oa||ob) return (oa||0)-(ob||0)||(oa?1:-1);
    return a.time.localeCompare(b.time);
  });
  let h='<div class="leave-area"><div class="break-clean">';
  h+='<div><table class="break-table"><tr><th colspan="3">退社時間</th></tr>';
  D.leave.forEach((l,i)=>{
    h+='<tr>';
    h+='<td>'+leaveStaffSelect(i,l.name)+'</td>';
    h+='<td>'+leaveTimeSelect(i,l.time)+'</td>';
    h+='<td class="del-col"><span class="del-btn no-print" onclick="pushUndo();D.leave.splice('+i+',1);render()">✕</span></td>';
    h+='</tr>';
  });
  h+='<tr><td colspan="3"><button class="add-row-btn no-print" onclick="addLeave()">＋</button></td></tr>';
  h+='</table></div>';
  h+='<div><table class="clean-table"><tr><th>清掃・片付け（最長17時15分まで）</th></tr>';
  h+='<tr><td>'+cleanStaffSelect('D.leaveClean',D.leaveClean)+'</td></tr>';
  h+='</table>';
  h+='<div style="font-size:10px;color:#d32f2f;margin-top:2px;line-height:1.4;font-weight:700">※清掃は1つ終わるごとにアプリでチェック → 全完了で退勤</div>';
  h+='</div>';
  h+='</div></div>';
  return h;
}

function driverSelect(path,current){
  // その日の出勤者のみ（送迎スタッフは該当時間帯のみ表示）
  const isAm=path.startsWith('am');
  const isPick=path.includes('.pick[');
  // 同じ便で既に選択済みのドライバーを除外
  // path例: am.pick[0].driver → 同じam.pickの他ルートのdriverを取得
  const pathBase=path.replace(/\[\d+\]\.driver$/,'');
  const routes=getNestedValue(D,pathBase)||[];
  const used=new Set(routes.map(r=>r.driver).filter(Boolean));
  if(!D.staffAbsent) D.staffAbsent={};
  const send=D.sendStaff.filter(s=>{
    if(D.staffAbsent[s.name]) return false;
    return true;
  }).map(s=>s.name);
  const floor=activeFloor();
  let opts='<option value="">--</option>';
  send.forEach(n=>{
    opts+='<option value="'+n+'"'+(current===n?' selected':'')+'>'+n+'</option>';
  });
  floor.forEach(n=>{
    opts+='<option value="'+n+'"'+(current===n?' selected':'')+'>'+n+'</option>';
  });
  // 比嘉社長（送迎時のみ選択可）
  if(!send.some(n=>n==='比嘉')&&!floor.some(n=>n==='比嘉')){
    opts+='<option value="比嘉"'+(current==='比嘉'?' selected':'')+'>比嘉</option>';
  }
  return '<select class="sel-driver'+(arguments[2]?' sel-driver-warn':'')+'" onchange="onDriverSelect(\''+path+'\',this.value)">'+opts+'</select>';
}

// ドライバー選択時：AM送り⇔PM迎えで車を自動セット
function onDriverSelect(path,val){
  setPath('D.'+path,val);
  if(val){
    // AM送りでドライバー選択 → PM迎えの同じドライバーから車をコピー
    const amDropMatch=path.match(/^am\.drop\[(\d+)\]\.driver$/);
    if(amDropMatch){
      const ri=parseInt(amDropMatch[1]);
      const route=D.am.drop[ri];
      if(!route.vehicle&&D.pm&&D.pm.pick){
        const pmRoute=D.pm.pick.find(r=>r.driver===val&&r.vehicle);
        if(pmRoute){
          route.vehicle=pmRoute.vehicle;
          adjustRouteStops('am.drop['+ri+'].vehicle',pmRoute.vehicle);
          showToast('🚗 PM迎えの '+val+' と同じ車('+pmRoute.vehicle+')をセット','#1565c0');
        }
      }
    }
    // PM迎えでドライバー選択 → AM送りの同じドライバーから車をコピー
    const pmPickMatch=path.match(/^pm\.pick\[(\d+)\]\.driver$/);
    if(pmPickMatch){
      const ri=parseInt(pmPickMatch[1]);
      const route=D.pm.pick[ri];
      if(!route.vehicle&&D.am&&D.am.drop){
        const amRoute=D.am.drop.find(r=>r.driver===val&&r.vehicle);
        if(amRoute){
          route.vehicle=amRoute.vehicle;
          adjustRouteStops('pm.pick['+ri+'].vehicle',amRoute.vehicle);
          showToast('🚗 AM送りの '+val+' と同じ車('+amRoute.vehicle+')をセット','#1565c0');
        }
      }
    }
  }
  render();
}

function vehicleSelect(path,current){

  vehs.forEach(v=>{

function onVehicleChange(path,val){
  // path例: "am.pick[0].vehicle"
  pushUndo();
  setPath('D.'+path,val);
  // stopsの数を車種定員に合わせる
  adjustRouteStops(path,val);
  // AM送り⇔PM迎え 車両自動同期
  syncAmDropPmPickVehicle(path,val);
  autoSave();
  render();
}

// ルートのstops数を車種定員に合わせる
function adjustRouteStops(path,val){
  const routePath='D.'+path.replace('.vehicle','');
  let route;
  try{ route=eval(routePath); }catch(e){ return; }
  if(!route||!route.stops) return;
  const cap=CAR_CAPACITY[val]||5;
  while(route.stops.length<cap) route.stops.push({user:'',time:''});
  if(route.stops.length>cap){
    const unitKey=path.startsWith('am.')?'am':path.startsWith('pm.')?'pm':'';
    const userStatus=(unitKey&&D[unitKey]&&D[unitKey].userStatus)||{};
    while(route.stops.length>cap){
      const last=route.stops[route.stops.length-1];
      if(!last.user) route.stops.pop();
      else break;
    }
    const activeCount=route.stops.filter(s=>s.user&&!isAbsentStatus(userStatus[s.user])).length;
    if(activeCount>cap){
      alert('⚠ 実乗車'+activeCount+'名が定員（'+cap+'名）をオーバーしています。\n手動で利用者を外してください。');
    }
  }
}

// AM送り⇔PM迎え 車両自動同期（同じドライバーの車を揃える）
function syncAmDropPmPickVehicle(path,val){
  if(!val) return;
  // AM送りの車を変更 → 同じドライバーのPM迎えに同期
  const amDropMatch=path.match(/^am\.drop\[(\d+)\]\.vehicle$/);
  if(amDropMatch){
    const ri=parseInt(amDropMatch[1]);
    const driver=(D.am.drop[ri]||{}).driver;
    if(driver&&D.pm&&D.pm.pick){
      D.pm.pick.forEach((route,i)=>{
        if(route.driver===driver&&route.vehicle!==val){
          route.vehicle=val;
          adjustRouteStops('pm.pick['+i+'].vehicle',val);
          showToast('🚗 PM迎え '+driver+' の車も '+val+' に同期しました','#1565c0');
        }
      });
    }
    return;
  }
  // PM迎えの車を変更 → 同じドライバーのAM送りに同期
  const pmPickMatch=path.match(/^pm\.pick\[(\d+)\]\.vehicle$/);
  if(pmPickMatch){
    const ri=parseInt(pmPickMatch[1]);
    const driver=(D.pm.pick[ri]||{}).driver;
    if(driver&&D.am&&D.am.drop){
      D.am.drop.forEach((route,i)=>{
        if(route.driver===driver&&route.vehicle!==val){
          route.vehicle=val;
          adjustRouteStops('am.drop['+i+'].vehicle',val);
          showToast('🚗 AM送り '+driver+' の車も '+val+' に同期しました','#1565c0');
        }
      });
    }
  }
}

function timeSelect(path,current,type){
  // AM出発: 7:45〜8:45、PM出発: 12:30〜13:25
  let times=[];
  if(type==='am_dep'){
    for(let m=7*60+45;m<=8*60+45;m+=5) times.push(minToTime(m));
  } else {
    for(let m=12*60;m<=13*60+25;m+=5) times.push(minToTime(m));
  }
  let opts='<option value="">--</option>';
  times.forEach(t=>{
    opts+='<option value="'+t+'"'+(current===t?' selected':'')+'>'+t+'</option>';
  });
  return '<select class="sel-time" onchange="setPath(\'D.'+path+'\',this.value);render()">'+opts+'</select>';
}

function minToTime(m){return String(Math.floor(m/60))+':'+String(m%60).padStart(2,'0');}
function timeToMin(t){if(!t||typeof t!=='string')return -1;const p=t.split(':');if(p.length!==2)return -1;return parseInt(p[0])*60+parseInt(p[1]);}

// 開始時間から戻り時間を自動計算（担会:1.5h、契約:2h）
function calcBackTime(idx){
  const ev=D.events[idx];
  if(!ev||!ev.time) return;
  const m=timeToMin(ev.time);
  if(m<0) return;
  const add=ev.type==='契約'?120:90;
  const back=m+add;
  ev.backTime=Math.floor(back/60)+':'+String(back%60).padStart(2,'0');
}

// 送迎ドライバーの出発時間と出勤時間の整合性チェック
// errors: 消せない（出勤前に出発）, confirms: OK で消せる（ギリギリ30分以内）
function checkDriverShiftWarnings(key){
  const unit=D[key];
  const errors=[];
  const confirms=[];
  // 迎えチェック
  unit.pick.forEach((route,ri)=>{
    const driver=route.driver;
    const depTime=route.depTime;
    if(!driver) return;
    // 送迎スタッフから検索
    const ss=(D.sendStaff||[]).find(s=>s.name===driver);
    if(ss){
      const shiftKey=key==='am'?'am':'mid';
      const shiftLabel=key==='am'?'朝':'昼';
      const shiftTime=ss[shiftKey]||'';
      if(shiftTime==='有給'){
        errors.push('⚠ '+driver+'は'+shiftLabel+'が有給なのにドライバーに入っています！');
        return;
      }
      if(!shiftTime){
        errors.push('⚠ '+driver+'が'+key.toUpperCase()+'迎えのドライバーに入っていますが、'+shiftLabel+'の勤務時間が未入力です！');
        return;
      }
      if(depTime){
        const depMin=timeToMin(depTime);
        const shiftMin=timeToMin(shiftTime);
        if(depMin>=0&&shiftMin>=0){
          if(depMin<shiftMin){
            errors.push('⚠ '+driver+'の出発'+depTime+'が出勤'+shiftTime+'より前です！');
          } else if(depMin-shiftMin>=15){
            confirms.push('⚠ '+driver+'：出勤'+shiftTime+'→出発'+depTime+'（'+(depMin-shiftMin)+'分早い）人件費大丈夫？');
          }
        }
      }
      return;
    }
    // フロアスタッフから検索
    if(depTime){
      const att=(D.attendance||[]).find(a=>a.name===driver);
      if(att){
        if(D.staffAbsent&&D.staffAbsent[driver]){
          errors.push('⚠ '+driver+'は休みなのにドライバーに入っています！');
          return;
        }
        const depMin=timeToMin(depTime);
        if(key==='pm'){
          // PM迎え → 休憩終了時間と比較
          const brk=(D.breaks||[]).find(b=>b.name===driver&&b.time&&b.time!=='送迎後');
          if(brk){
            const brkStart=timeToMin(brk.time);
            const brkDur=parseInt(brk.duration)||60;
            const brkEnd=brkStart+brkDur;
            const brkEndTime=String(Math.floor(brkEnd/60)).padStart(2,'0')+':'+String(brkEnd%60).padStart(2,'0');
            if(depMin>=0&&brkEnd>=0){
              if(depMin<brkEnd){
                errors.push('⚠ '+driver+'の出発'+depTime+'が休憩終了'+brkEndTime+'より前です！');
              } else if(depMin-brkEnd>=15){
                confirms.push('⚠ '+driver+'：休憩終了'+brkEndTime+'→出発'+depTime+'（'+(depMin-brkEnd)+'分早い）人件費大丈夫？');
              }
            }
          }
        } else {
          // AM迎え → 出勤時間と比較
          const attMin=timeToMin(att.time);
          if(depMin>=0&&attMin>=0){
            if(depMin<attMin){
              errors.push('⚠ '+driver+'の出発'+depTime+'が出勤'+att.time+'より前です！');
            } else if(depMin-attMin>=15){
              confirms.push('⚠ '+driver+'：出勤'+att.time+'→出発'+depTime+'（'+(depMin-attMin)+'分早い）人件費大丈夫？');
            }
          }
        }
      }
    }
  });

  // 送りチェック（送迎スタッフの勤務時間が未入力なら警告）
  unit.drop.forEach((route,ri)=>{
    const driver=route.driver;
    if(!driver) return;
    const ss=(D.sendStaff||[]).find(s=>s.name===driver);
    if(ss){
      const shiftKey=key==='am'?'mid':'pm';
      const shiftLabel=key==='am'?'昼':'夕方';
      const shiftTime=ss[shiftKey]||'';
      if(shiftTime==='有給'){
        errors.push('⚠ '+driver+'は'+shiftLabel+'が有給なのに'+key.toUpperCase()+'送りのドライバーに入っています！');
        return;
      }
      if(!shiftTime){
        errors.push('⚠ '+driver+'が'+key.toUpperCase()+'送りのドライバーに入っていますが、'+shiftLabel+'の勤務時間が未入力です！');
      }
    }
  });
  return {errors, confirms};
}

// 送迎スタッフの勤務時間とルート割当の整合性チェック
function checkSendStaffRouteWarnings(){
  const warnings=[];
  if(!D.sendStaff||D.sendStaff.length===0) return warnings;
  if(!D.sendStaffOk) D.sendStaffOk={};

  // 各ルートのドライバーを集める
  const amPickDrivers=new Set((D.am.pick||[]).map(r=>r.driver).filter(Boolean));
  const amDropDrivers=new Set((D.am.drop||[]).map(r=>r.driver).filter(Boolean));
  const pmPickDrivers=new Set((D.pm.pick||[]).map(r=>r.driver).filter(Boolean));
  const pmDropDrivers=new Set((D.pm.drop||[]).map(r=>r.driver).filter(Boolean));

  const checks=[
    {slot:'am', label:'朝', drivers:amPickDrivers, route:'AM迎え'},
    {slot:'mid',label:'昼', drivers:null, route:'AM送り・PM迎え'},
    {slot:'pm', label:'夕方',drivers:pmDropDrivers, route:'PM送り'},
  ];

  D.sendStaff.forEach(s=>{
    if(D.staffAbsent&&D.staffAbsent[s.name]) return;
    checks.forEach(c=>{
      const time=s[c.slot];
      if(!time||time==='有給') return;
      let hasRoute;
      if(c.slot==='mid') hasRoute=amDropDrivers.has(s.name)||pmPickDrivers.has(s.name);
      else hasRoute=c.drivers.has(s.name);
      if(hasRoute) return;
      // OKキーは名前+スロット+時間（時間が変わったらリセット）
      const okKey=s.name+'_'+c.slot+'_'+time;
      if(D.sendStaffOk[okKey]) return; // 確認済み
      warnings.push({
        msg:'⚠ '+s.name+'の'+c.label+'('+time+')が入っていますが、'+c.route+'のドライバーに入っていません',
        okKey:okKey
      });
    });
  });

  // 古いOKキーを掃除（該当する警告が無くなったら削除）
  const validKeys=new Set();
  D.sendStaff.forEach(s=>{
    ['am','mid','pm'].forEach(slot=>{
      if(s[slot]&&s[slot]!=='有給') validKeys.add(s.name+'_'+slot+'_'+s[slot]);
    });
  });
  Object.keys(D.sendStaffOk).forEach(k=>{
    if(!validKeys.has(k)) delete D.sendStaffOk[k];
  });

  return warnings;
}
function dismissSendStaffWarn(okKey){
  if(!D.sendStaffOk) D.sendStaffOk={};
  D.sendStaffOk[okKey]=true;
  autoSave();
  render();
}

// 休憩と送迎の整合性チェック
function checkBreakDriverWarnings(){
  const warnings=[];
  if(!D.breaks||!D.breaks.length) return warnings;
  // AM送りのドライバー一覧（送り時間帯≒12:00）
  const amDropDrivers=new Set();
  (D.am.drop||[]).forEach(r=>{ if(r.driver) amDropDrivers.add(r.driver); });
  // PM迎えのドライバーと出発時間
  const pmPickDrivers=[];
  (D.pm.pick||[]).forEach(r=>{ if(r.driver&&r.depTime) pmPickDrivers.push({name:r.driver,dep:r.depTime}); });
  D.breaks.forEach(b=>{
    if(!b.name||!b.time||b.time==='送迎後') return;
    const bStart=timeToMin(b.time);
    if(bStart<0) return;
    const bEnd=bStart+60; // 1時間
    // AM送りチェック（12:00頃）：休憩が12:00にかかっていたら警告
    if(amDropDrivers.has(b.name)){
      if(bStart<=12*60&&bEnd>12*60){
        warnings.push('⚠ '+b.name+'の休憩'+b.time+'〜がAM送りの時間(12:00)と重なっています！');
      }
    }
    // PM迎えチェック：休憩が出発時間にかかっていたら警告
    pmPickDrivers.forEach(d=>{
      if(d.name===b.name){
        const depMin=timeToMin(d.dep);
        if(depMin>=0&&bStart<=depMin&&bEnd>depMin){
          warnings.push('⚠ '+b.name+'の休憩'+b.time+'〜がPM迎え出発('+d.dep+')と重なっています！');
        }
      }
    });
  });
  return warnings;
}

// ═══════════════════════════════════════════════
// フロア人数チェック（3人未満で警告）
// ═══════════════════════════════════════════════
function checkFloorStaffCount(){
  const results=[];
  const floorNames=activeFloor();
  if(floorNames.length===0) return results;

  // AM送りでフロアスタッフがドライバーの場合のセット
  const amDropDrivers=new Set();
  (D.am.drop||[]).forEach(r=>{if(r.driver&&floorNames.includes(r.driver)) amDropDrivers.add(r.driver);});
  // PM迎えでフロアスタッフがドライバーの場合 {name, depMin}
  const pmPickDrivers=[];
  (D.pm.pick||[]).forEach(r=>{
    if(r.driver&&floorNames.includes(r.driver)&&r.depTime){
      const dep=timeToMin(r.depTime);
      if(dep!=null&&dep>0) pmPickDrivers.push({name:r.driver,dep});
    }
  });
  // PM送りでフロアスタッフがドライバーの場合のセット
  const pmDropDrivers=new Set();
  (D.pm.drop||[]).forEach(r=>{if(r.driver&&floorNames.includes(r.driver)) pmDropDrivers.add(r.driver);});

  // 担会・契約イベント {staff, start, end}
  const eventAway=[];
  (D.events||[]).forEach(ev=>{
    if(!ev.staff||!ev.time) return;
    if(!floorNames.includes(ev.staff)) return;
    if(ev.type!=='担会'&&ev.type!=='契約') return;
    const s=timeToMin(ev.time);
    if(s==null||s<=0) return;
    const back=ev.backTime?timeToMin(ev.backTime):null;
    const end=(back!=null&&back>s)?back:s+60; // 戻り時間があればそれを使用、なければ1時間
    eventAway.push({name:ev.staff,start:s,end:end,type:ev.type});
  });

  // 利用時間のみチェック（AM 9:00-11:30 / PM 13:30-16:00）※送り開始前まで
  const serviceRanges=[
    {start:9*60,end:11*60+30,label:'AM'},
    {start:13*60+30,end:16*60,label:'PM'}
  ];

  for(const range of serviceRanges){
    for(let min=range.start;min<=range.end;min+=15){
      const away={}; // name -> reason

      // 未出勤（出勤時間がまだ来ていない）
      floorNames.forEach(name=>{
        const att=D.attendance.find(a=>a.name===name);
        if(att&&att.time){
          const arrMin=timeToMin(att.time);
          if(arrMin!=null&&arrMin>min) away[name]='未出勤';
        }
      });

      // 退勤済
      (D.leave||[]).forEach(l=>{
        if(l.name&&floorNames.includes(l.name)&&l.time){
          const lvMin=timeToMin(l.time);
          if(lvMin!=null&&lvMin>0&&lvMin<=min) away[l.name]='退勤済';
        }
      });

      // 休憩中（1時間）
      (D.breaks||[]).forEach(b=>{
        if(!b.name||!b.time||b.time==='送迎後') return;
        if(!floorNames.includes(b.name)) return;
        const bStart=timeToMin(b.time);
        if(bStart==null||bStart<0) return;
        if(min>=bStart&&min<bStart+60) away[b.name]='休憩';
      });

      // AM送り運転（11:45〜12:00）
      if(min>=11*60+45&&min<=12*60){
        amDropDrivers.forEach(name=>{if(!away[name]) away[name]='AM送り';});
      }
      // PM迎え運転（出発時間〜+35分）
      pmPickDrivers.forEach(d=>{
        if(min>=d.dep&&min<=d.dep+35){if(!away[d.name]) away[d.name]='PM迎え';}
      });
      // PM送り運転（16:15〜16:30）
      if(min>=16*60+15&&min<=16*60+30){
        pmDropDrivers.forEach(name=>{if(!away[name]) away[name]='PM送り';});
      }

      // 担会・契約で外出中
      eventAway.forEach(ev=>{
        if(min>=ev.start&&min<ev.end){if(!away[ev.name]) away[ev.name]=ev.type;}
      });

      const onFloor=floorNames.filter(n=>!away[n]);
      if(onFloor.length<3){
        const timeStr=String(Math.floor(min/60))+':'+String(min%60).padStart(2,'0');
        results.push({min,timeStr,count:onFloor.length,onFloor,away:{...away},label:range.label});
      }
    }
  }

  // 連続する同じaway構成をまとめて範囲表示
  if(results.length===0) return [];
  const merged=[];
  let si=0;
  for(let i=1;i<=results.length;i++){
    const same=i<results.length&&results[i].label===results[si].label&&JSON.stringify(results[i].away)===JSON.stringify(results[si].away);
    if(!same){
      const w=results[si];
      const awayDesc=Object.entries(w.away).map(([n,r])=>n+'('+r+')').join('・');
      const range2=si===i-1?w.timeStr:w.timeStr+'〜'+results[i-1].timeStr;
      merged.push('⚠ '+w.label+' '+range2+' フロア'+w.count+'人（'+w.onFloor.join('・')+'）　離席: '+awayDesc+'　問題ないですか？');
      si=i;
    }
  }
  return merged;
}

// AM送り⇔PM迎え 不一致のルート番号セットを返す（順番ではなくセットで比較）
function getMismatchRoutes(){
  const result={vehicle:new Set(),driver:new Set()};
  const amDrop=D.am.drop||[];
  const pmPick=D.pm.pick||[];
  // AM送り全体のドライバー・車両セット
  const amDrivers=new Set(amDrop.map(r=>r.driver).filter(Boolean));
  const amVehicles=new Set(amDrop.map(r=>r.vehicle).filter(Boolean));
  const pmDrivers=new Set(pmPick.map(r=>r.driver).filter(Boolean));
  const pmVehicles=new Set(pmPick.map(r=>r.vehicle).filter(Boolean));
  // AM送りにいるがPM迎えにいないドライバー → そのルートにエラー
  amDrop.forEach((ad,i)=>{
    if(ad.driver&&!pmDrivers.has(ad.driver)) result.driver.add(i);
  });
  // PM迎えにいるがAM送りにいないドライバー → そのルートにエラー
  pmPick.forEach((pp,i)=>{
    if(pp.driver&&!amDrivers.has(pp.driver)) result.driver.add(i);
  });
  // 車両も同様
  amDrop.forEach((ad,i)=>{
    if(ad.vehicle&&!pmVehicles.has(ad.vehicle)) result.vehicle.add(i);
  });
  pmPick.forEach((pp,i)=>{
    if(pp.vehicle&&!amVehicles.has(pp.vehicle)) result.vehicle.add(i);
  });
  return result;
}

// AM送りとPM迎えのドライバー・車両の整合性チェック
function checkAmDropPmPickMismatch(){
  const warnings=[];
  const amDrop=D.am.drop||[];
  const pmPick=D.pm.pick||[];
  const amDrivers=new Set(amDrop.map(r=>r.driver).filter(Boolean));
  const pmDrivers=new Set(pmPick.map(r=>r.driver).filter(Boolean));
  const amVehicles=new Set(amDrop.map(r=>r.vehicle).filter(Boolean));
  const pmVehicles=new Set(pmPick.map(r=>r.vehicle).filter(Boolean));
  // AM送りにいるがPM迎えにいない
  amDrop.forEach(ad=>{
    if(ad.driver&&!pmDrivers.has(ad.driver)) warnings.push('⚠ AM送りの <span class="mismatch-hl" style="background:#ffcdd2">'+ad.driver+'</span> がPM迎えにいません');
    if(ad.vehicle&&!pmVehicles.has(ad.vehicle)) warnings.push('⚠ AM送りの <span class="mismatch-hl" style="background:#ffcdd2">'+ad.vehicle+'</span> がPM迎えにいません');
  });
  // PM迎えにいるがAM送りにいない
  pmPick.forEach(pp=>{
    if(pp.driver&&!amDrivers.has(pp.driver)) warnings.push('⚠ PM迎えの <span class="mismatch-hl" style="background:#bbdefb">'+pp.driver+'</span> がAM送りにいません');
    if(pp.vehicle&&!pmVehicles.has(pp.vehicle)) warnings.push('⚠ PM迎えの <span class="mismatch-hl" style="background:#bbdefb">'+pp.vehicle+'</span> がAM送りにいません');
  });
  return [...new Set(warnings)];
}

function arrivalSelect(path,current,key){
  // AM迎え到着: 8:00〜9:00、PM迎え到着: 12:30〜13:30（5分刻み、範囲表記）
  let times=[];
  if(key==='am'){
    for(let m=8*60;m<=9*60;m+=5) times.push(m);
  } else {
    for(let m=12*60+30;m<=13*60+30;m+=5) times.push(m);
  }
  let opts='<option value="">--</option>';
  times.forEach(m=>{
    const from=minToTime(m);
    const toM=m+5;
    const toMin=String(toM%60).padStart(2,'0');
    const label=from+'~'+toMin;
    opts+='<option value="'+label+'"'+(current===label?' selected':'')+'>'+label+'</option>';
  });
  opts+='<option value="__color_on__">🟡 色on</option>';
  opts+='<option value="__color_off__">⬜ 色off</option>';
  return '<select class="sel-time" style="color:#333" onchange="markTimeChanged(\''+path+'\',this.value)">'+opts+'</select>';
}
function markTimeChanged(path,val){
  const stopPath='D.'+path.replace(/\.time$/,'');
  let stop;
  try{ stop=eval(stopPath); }catch(e){ return; }
  if(val==='__color_on__'){
    stop.timeChanged=true;
    autoSave(); render(); return;
  }
  if(val==='__color_off__'){
    delete stop.timeChanged;
    autoSave(); render(); return;
  }
  setPath('D.'+path,val);
  autoSave();
  render();
}

function getNestedValue(obj,path){

  try{ return path.split('.').reduce((o,k)=>{

function setPath(path,val){

function onDragStart(e,name,st){
  if(isAbsentStatus(st)){e.preventDefault();return;}
  e.dataTransfer.setData('text/plain',name);
  e.dataTransfer.setData('source','list');
  e.target.classList.add('dragging');
  setTimeout(()=>e.target.classList.remove('dragging'),200);
}

function onDragStartRoute(e,name,sourcePath){
  e.dataTransfer.setData('text/plain',name);
  e.dataTransfer.setData('source','route');
  e.dataTransfer.setData('sourcePath',sourcePath);
  e.target.classList.add('dragging');
  setTimeout(()=>e.target.classList.remove('dragging'),200);
}

function onDrop(e,path,el){
  e.preventDefault();
  el.classList.remove('drag-over');
  const name=e.dataTransfer.getData('text/plain');
  if(!name) return;
  pushUndo();

  const source=e.dataTransfer.getData('source');
  const sourcePath=e.dataTransfer.getData('sourcePath');

  // ドロップ先のルートとインデックスを解析
  const m=path.match(/D\.(\w+)\.(pick|drop)\[(\d+)\]\.stops\[(\d+)\]\.user/);
  if(m){
    const unit=D[m[1]];
    const routes=unit[m[2]];
    const route=routes[parseInt(m[3])];
    const si=parseInt(m[4]);
    const stops=route.stops;
    const existingUser=stops[si].user;

    if(source==='route'&&sourcePath){
      // ルート間の移動 → 入れ替え（スワップ）、時間はそのまま残す
      stops[si].user=name;
      // 元のセルにドロップ先にいた利用者を入れる（時間はそのまま）
      try{ eval(sourcePath+'="'+(existingUser||'').replace(/"/g,'\\"')+'"'); }catch(ex){}
    } else if(existingUser && existingUser!==name){
      // リストからのドロップ → 挿入して右にスライド（時間はそのまま）
      for(let i=stops.length-1;i>si;i--){
        stops[i].user=stops[i-1].user;
      }
      stops[si].user=name;
    } else {
      stops[si].user=name;
    }
  } else {
    try{ eval(path+'="'+name.replace(/"/g,'\\"')+'"'); }catch(ex){}
  }
  render();
}

function routeUserSelect(path,current,key,type){
  // ルートに配置する利用者のプルダウン
  const unit=D[key];
  if(!unit||!unit.users) return '';
  // 既にルートに配置済みの利用者を集める
  const placed=new Set();
  const routes=type==='pick'?unit.pick:unit.drop;
  routes.forEach(r=>r.stops.forEach(s=>{if(s.user)placed.add(s.user);}));
  // 現在のセルの利用者は除外しない（再選択できるように）
  if(current) placed.delete(current);

  // 送迎が必要な利用者（休み・徒歩・家族を除外、片道ステータスも考慮）
  const candidates=unit.users.filter(u=>{
    if(!u) return false;
    const st=unit.userStatus[u]||'';
    if(isAbsentStatus(st)||st==='walk'||st==='family') return false;
    if(type==='pick'&&st==='droponly') return false;
    if(type==='drop'&&st==='pickonly') return false;
    if(placed.has(u)) return false;
    return true;
  });

  const ust=current?userCellClass(unit.userStatus[current]):'';
  let opts='<option value="">--</option>';
  if(current){
    const isTrial=unit.userStatus[current]==='trial';
    opts+='<option value="'+current+'" selected>'+current+'様'+(isTrial?' 体験':'')+'</option>';
  }
  candidates.forEach(u=>{
    const isTrial=unit.userStatus[u]==='trial';
    opts+='<option value="'+u+'">'+u+'様'+(isTrial?' 🔶体験':'')+'</option>';
  });
  return '<select class="sel-staff'+ust+'" style="min-width:55px;font-size:12px" onchange="pushUndo();setPath(\'D.'+path+'\',this.value);render()">'+opts+'</select>';
}

function pickUserDialog(key,type,ri,si){
  // 空欄クリック時：未配置の利用者一覧を表示して選択
  const unit=D[key];
  if(!unit||!unit.users) return;
  const placed=new Set();
  const routes=type==='pick'?unit.pick:unit.drop;
  routes.forEach(r=>r.stops.forEach(s=>{if(s.user)placed.add(s.user);}));
  const candidates=unit.users.filter(u=>{
    if(!u) return false;
    const st=unit.userStatus[u]||'';
    if(isAbsentStatus(st)||st==='walk'||st==='family') return false;
    if(placed.has(u)) return false;
    return true;
  });
  if(candidates.length===0){alert('配置可能な利用者がいません');return;}
  const list=candidates.map((u,i)=>{
    const isTrial=unit.userStatus[u]==='trial';
    return (i+1)+'. '+u+'様'+(isTrial?' 【体験】':'');
  }).join('\n');
  const num=prompt('利用者を番号で選んでください：\n\n'+list);
  if(!num) return;
  const idx=parseInt(num)-1;
  if(idx>=0&&idx<candidates.length){
    pushUndo();
    D[key][type][ri].stops[si].user=candidates[idx];
    render();
  }
}

function showStatusMenu(key,name,e){
  // 既存メニューがあれば閉じる
  closeStatusMenu();
  const cur=D[key].userStatus[name]||'';
  const items=[
    {val:'',     label:'利用（通常）', color:'#fff',    border:'#999'},
    {val:'absent',label:'休み',       color:'#d0d0d0', border:'#999'},
    {val:'longabsent',label:'長期休', color:'#a0a0a0', border:'#666'},
    {val:'walk',  label:'徒歩',       color:'#e3f2fd', border:'#1565c0'},
    {val:'family',label:'家族送迎',   color:'#e8f5e9', border:'#2e7d32'},
    {val:'pickonly',label:'迎えのみ（行きだけ）',color:'#e8eaf6', border:'#283593'},
    {val:'droponly',label:'送りのみ（帰りだけ）',color:'#fce4ec', border:'#880e4f'},
    {val:'new',   label:'新規',       color:'#fff9c4', border:'#f57f17'}
  ];
  // オーバーレイ
  const overlay=document.createElement('div');
  overlay.className='st-menu-overlay show';
  overlay.onclick=closeStatusMenu;
  // メニュー本体
  const menu=document.createElement('div');
  menu.className='st-menu';
  menu.id='st-menu-popup';
  items.forEach(item=>{
    const row=document.createElement('div');
    row.className='st-menu-item'+(cur===item.val?' active':'');
    row.innerHTML='<span class="st-dot" style="background:'+item.color+';border:2px solid '+item.border+'"></span>'+item.label+(cur===item.val?' ✓':'');
    row.onclick=function(ev){
      ev.stopPropagation();
      applyUserStatus(key,name,cur,item.val);
      closeStatusMenu();
    };
    menu.appendChild(row);
  });
  overlay.appendChild(menu);
  document.body.appendChild(overlay);
  // 位置調整（クリック位置の近くに表示）
  const cx=e?e.clientX:100, cy=e?e.clientY:100;
  const mw=menu.offsetWidth, mh=menu.offsetHeight;
  const ww=window.innerWidth, wh=window.innerHeight;
  menu.style.left=Math.min(cx,ww-mw-8)+'px';
  menu.style.top=Math.min(cy,wh-mh-8)+'px';
}

}

function applyUserStatus(key,name,oldSt,newSt){
  pushUndo();
  if(newSt){
    D[key].userStatus[name]=newSt;
  } else {
    delete D[key].userStatus[name];
  }
  // 欠席→復帰した時、ルートの定員オーバーをチェック
  if(isAbsentStatus(oldSt)&&!isAbsentStatus(newSt)){
    const warns=[];
    ['pick','drop'].forEach(type=>{
      D[key][type].forEach((route,ri)=>{
        const riderCount=route.rider?1:0;
        const cap=CAR_CAPACITY[route.vehicle]||0;
        const userCap=cap-riderCount;
        const active=route.stops.filter(s=>s.user&&!isAbsentStatus(D[key].userStatus[s.user])).length;
        if(active>userCap){
          const label=type==='pick'?'迎え':'送り';
          warns.push(label+(ri+1)+'便：実乗車'+active+'名 ＞ '+route.vehicle+'の定員'+userCap+'名');
        }
      });
    });
    if(warns.length>0){
      alert('⚠ 車両の定員オーバー！\n'+warns.join('\n')+'\n\n車両をステップワゴン等に変更してください。');
    }
  }
  autoSave();
  render();
}

function getShiftStaffIds(){

  const ym=D.date?D.date.slice(0,7):'';
  const day=D.date?parseInt(D.date.slice(8,10)):0;
  const monthData=SHIFT_DATA[ym];
  if(!monthData||!day) return new Set();
  const ids=new Set();
  for(const [staffId,shifts] of Object.entries(monthData)){
    const code=shifts[day-1];
    if(code&&code!=='-'&&code!=='休') ids.add(staffId);
  }
  return ids;
}

    offShift.forEach(s=>{opts+='<option value="'+s.id+'_off">'+s.name+'（シフト外）</option>';});

function addAttendance(val){
  if(!val) return;
  pushUndo();
  const isOff=val.endsWith('_off');
  const staffId=isOff?val.replace('_off',''):val;

  const defVeh=allVehs.find(v=>!used.has(v))||'ス';

  for(let i=0;i<cap;i++) stops.push({user:'',time:''});

    D[key].drop.push({no:no,driver:'',vehicle:defVeh,stops:stops});

  render();
}

function loadShiftFromTable(){
  try {
    const raw = localStorage.getItem('yawaragi_shift');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.year || !data.month || !data.shift) return false;

    const ym = data.year + '-' + String(data.month).padStart(2,'0');
    const daysInMonth = new Date(data.year, data.month, 0).getDate();
    const result = {};

    for (const [name, id] of Object.entries(SHIFT_NAME_TO_ID)) {
      if (id === 'higa') continue; // 社長はシフト表に含めない
      const defaultCode = SHIFT_DEFAULT_CODE[id] || '-';
      const arr = [];
      for (let d = 1; d <= daysInMonth; d++) {
        const dayData = data.shift[String(d)];
        if (!dayData || dayData[name] === undefined || dayData[name] === 0) {
          arr.push('-');
        } else if (dayData[name] === 16) {
          arr.push(id === 'haruyama' ? 'H' : 'F');
        } else {
          arr.push(defaultCode);
        }
      }
      result[id] = arr;
    }

    SHIFT_DATA[ym] = result;
    console.log('✅ シフト表から読み込み: ' + ym + '（' + Object.keys(result).length + '名）');
    return true;
  } catch(e) {
    console.warn('シフト表読み込みエラー:', e);
    return false;
  }
}
