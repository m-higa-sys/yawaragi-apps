<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>社長用 アプリ一覧</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  padding: 20px;
}
h1 {
  text-align: center;
  color: #2c3e50;
  font-size: 1.6em;
  margin-bottom: 8px;
}
.subtitle {
  text-align: center;
  color: #7f8c8d;
  font-size: 0.9em;
  margin-bottom: 24px;
}
.wrap {
  max-width: 800px;
  margin: 0 auto;
}
/* ヒーローカード（yawaragiボード） */
.hero-btn {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 24px 26px;
  margin-bottom: 28px;
  background: linear-gradient(135deg, #2c3e50 0%, #4a6580 100%);
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(44,62,80,0.28);
  text-decoration: none;
  color: #fff;
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.hero-btn:active {
  transform: scale(0.98);
  box-shadow: 0 3px 10px rgba(44,62,80,0.3);
}
.hero-btn .icon {
  font-size: 2.6em;
  width: 56px;
  text-align: center;
  flex-shrink: 0;
}
.hero-text .hero-title {
  font-size: 1.45em;
  font-weight: 700;
  margin-bottom: 4px;
}
.hero-text .hero-desc {
  font-size: 0.85em;
  opacity: 0.85;
}
/* グループ見出し */
.group-title {
  color: #2c3e50;
  font-size: 1.05em;
  font-weight: 700;
  margin: 22px 4px 10px;
  padding-left: 10px;
  border-left: 4px solid #4a6580;
}
.apps {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.app-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 18px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  text-decoration: none;
  color: #2c3e50;
  font-size: 1em;
  font-weight: 600;
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.app-btn:active {
  transform: scale(0.97);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.icon {
  font-size: 1.6em;
  width: 40px;
  text-align: center;
  flex-shrink: 0;
}
/* 下部の小リンク */
.footer-link {
  text-align: center;
  margin-top: 32px;
}
.footer-link a {
  color: #7f8c8d;
  font-size: 0.9em;
  text-decoration: none;
}
.footer-link a:active {
  color: #2c3e50;
}
</style>
</head>
