<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>業務担当 | yawaragi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
/* ===== 担会・契約後アプリから継承（変更禁止） ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --navy-0: #0e1623;
    --navy-1: #131e30;
    --navy-2: #1b293f;
    --navy-3: #243651;
    --navy-line: #2e4566;
    --ink-on-dark: #f4f7fb;
    --ink-on-dark-mute: #b6c2d4;

    --paper: #f6f4ed;
    --paper-deep: #ece8db;
    --ink-deep: #0b1320;

    --accent: #f5c518;
    --accent-warm: #ff7a3a;
    --accent-cool: #58e1c4;

    --shadow-card: 6px 6px 0 var(--navy-0);

    --display: 'Bricolage Grotesque', 'Noto Sans JP', sans-serif;
    --jp: 'Noto Sans JP', sans-serif;
}

html, body {
    background: var(--paper);
    color: var(--ink-deep);
    font-family: var(--jp);
    font-size: 16px;
    line-height: 1.6;
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
}

body {
    background-image:
        radial-gradient(circle at 1px 1px, rgba(14, 22, 35, 0.08) 1px, transparent 0);
    background-size: 20px 20px;
    background-color: var(--paper);
}
body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 240px;
    background: linear-gradient(180deg, var(--accent) 0%, rgba(245, 197, 24, 0.4) 78%, transparent 100%);
    z-index: 0;
    pointer-events: none;
}

button { font-family: inherit; }
input, select, textarea { font-family: inherit; }

.page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

/* ============ HEADER ============ */
.hero {
    color: var(--ink-deep);
    padding: 32px 30px;
    position: relative;
    margin-top: 24px;
    border: 3px solid var(--navy-0);
    background: #fffdf6;
    box-shadow: var(--shadow-card);
    border-radius: 6px;
    overflow: hidden;
}
.hero::after {
    content: "";
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: var(--accent);
    transform: rotate(45deg);
    z-index: 0;
}
.hero > * { position: relative; z-index: 1; }
.hero h1 {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(2rem, 4.5vw, 2.8rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--ink-deep);
}
.hero h1 .icon { margin-right: 8px; }
.hero-desc {
    font-size: 15px;
    color: #3a4252;
    margin-top: 14px;
    max-width: 60ch;
    line-height: 1.7;
}
.hero-desc b { color: var(--ink-deep); font-weight: 800; background: var(--accent); padding: 1px 4px; }

/* ============ TOOLBAR ============ */
.toolbar {
    display: flex;
    gap: 12px;
    align-items: stretch;
    flex-wrap: wrap;
    margin: 26px 0 28px;
}
.btn {
    font-family: var(--jp);
    font-weight: 800;
    font-size: 16px;
    border: 3px solid var(--navy-0);
    border-radius: 6px;
    padding: 14px 22px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 5px 5px 0 var(--navy-0);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    background: #fff;
    color: var(--navy-0);
}
.btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0 var(--navy-0);
}
.btn:active {
    transform: translate(5px, 5px);
    box-shadow: 0 0 0 var(--navy-0);
}
.btn-primary { background: var(--accent); color: var(--navy-0); }
.btn-secondary { background: #fff; color: var(--navy-0); }
.btn-secondary:hover { background: var(--accent-cool); }
.btn-reload {
    background: var(--navy-2);
    color: var(--ink-on-dark);
    font-weight: 700;
    font-size: 15px;
    margin-left: auto;
}
.btn-reload:hover { background: var(--navy-1); }
.btn .plus {
    font-size: 22px;
    line-height: 1;
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--navy-0);
    color: var(--accent);
    border-radius: 4px;
    font-weight: 900;
}
.btn:disabled,
.btn[data-locked="1"] {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
    box-shadow: 5px 5px 0 var(--navy-0);
}

/* モーダル内の小型ボタン */
.btn-sm {
    font-family: var(--jp);
    font-weight: 800;
    font-size: 14px;
    border: 2.5px solid var(--navy-0);
    border-radius: 5px;
    padding: 8px 16px;
    cursor: pointer;
    background: #fff;
    color: var(--navy-0);
    box-shadow: 3px 3px 0 var(--navy-0);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
}
.btn-sm:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--navy-0); }
.btn-sm:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--navy-0); }
.btn-sm.primary { background: var(--accent); }
.btn-sm.danger { background: #fff5f5; color: #c53030; border-color: #c53030; box-shadow: 3px 3px 0 #c53030; }
.btn-sm.danger:hover { box-shadow: 4px 4px 0 #c53030; }
.btn-sm.danger:active { box-shadow: 0 0 0 #c53030; }
.btn-sm:disabled, .btn-sm[data-locked="1"] { opacity: 0.55; cursor: not-allowed; transform: none; }

/* ============ モーダル ============ */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(14, 22, 35, 0.55); z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal-content {
    background: #fffdf6;
    border: 3px solid var(--navy-0);
    border-radius: 6px;
    box-shadow: var(--shadow-card);
    padding: 22px 22px 20px;
    width: 96%;
    max-height: 92vh;
    overflow-y: auto;
    position: relative;
}
.modal-content.modal-md { max-width: 480px; }
.modal-content.modal-sm { max-width: 380px; }
.modal-content.modal-lg { max-width: 720px; }
.modal-content h3 {
    font-family: var(--jp);
    font-weight: 900;
    font-size: 1.25rem;
    color: var(--navy-0);
    margin: 0 0 16px 0;
    padding-bottom: 10px;
    border-bottom: 2.5px solid var(--navy-0);
}
.modal-content h2 {
    font-family: var(--jp);
    font-weight: 900;
    font-size: 1.5rem;
    color: var(--navy-0);
    margin-bottom: 16px;
}

/* モーダル内フォーム要素 */
.modal-content label {
    display: block;
    margin-bottom: 14px;
    font-family: var(--jp);
    font-weight: 700;
    font-size: 14px;
    color: var(--navy-1);
}
.modal-content label .req { color: #c53030; margin-left: 2px; }
.modal-content input[type="text"],
.modal-content input[type="date"],
.modal-content input[type="number"],
.modal-content textarea,
.modal-content select {
    width: 100%;
    padding: 10px 12px;
    margin-top: 6px;
    font-size: 15px;
    font-family: var(--jp);
    font-weight: 500;
    color: var(--navy-0);
    background: #fff;
    border: 2.5px solid var(--navy-0);
    border-radius: 5px;
    box-sizing: border-box;
    transition: box-shadow 0.12s ease, border-color 0.12s ease;
}
.modal-content input[type="text"]:focus,
.modal-content input[type="date"]:focus,
.modal-content textarea:focus,
.modal-content select:focus {
    outline: none;
    border-color: var(--navy-0);
    box-shadow: 0 0 0 3px var(--accent);
}

.form-row { margin-bottom: 14px; }
.form-row label { margin-bottom: 6px; }
.form-row > label { display: inline-block; margin-right: 10px; }

/* ============ TOAST ============ */
.toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--navy-0);
    color: var(--accent);
    padding: 14px 26px;
    border: 2.5px solid var(--navy-0);
    border-radius: 5px;
    font-family: var(--jp);
    font-weight: 800;
    font-size: 0.95rem;
    z-index: 2000;
    transition: transform 0.3s ease;
    box-shadow: 5px 5px 0 var(--navy-2);
}
.toast.show { transform: translateX(-50%) translateY(0); }

@media (max-width: 600px) {
    .page { padding: 0 14px 50px; }
    .hero { padding: 24px 18px; }
    .btn-reload { margin-left: 0; width: 100%; justify-content: center; }
    .hero h1 { font-size: 1.8rem; }
}

/* ===== 業務担当アプリ 追加スタイル ===== */
.task-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin: 16px 0 32px; }

.category-section { margin-bottom: 36px; }
.category-heading {
    font-family: var(--display);
    font-weight: 800;
    font-size: 22px;
    color: var(--navy-0);
    border-bottom: 3px solid var(--navy-0);
    padding-bottom: 6px;
    margin: 24px 0 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}
.category-heading .count { font-size: 14px; color: #5b6477; font-weight: 700; }

.task-card {
    background: #fff;
    border: 3px solid var(--navy-0);
    border-radius: 6px;
    padding: 14px;
    box-shadow: var(--shadow-card);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    cursor: pointer;
    position: relative;
}
.task-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 8px 8px 0 var(--navy-0);
}
.task-card.proposed { border-style: dashed; border-color: var(--accent-warm); background: #fff8e8; }
.task-card.rejected { border-color: #888; background: #f0f0f0; opacity: 0.7; }

.task-card .task-name { font-weight: 800; font-size: 16px; margin-bottom: 8px; line-height: 1.3; }
.task-card .badge-primary {
    display: inline-block;
    background: var(--accent);
    border: 2px solid var(--navy-0);
    border-radius: 4px;
    padding: 2px 8px;
    font-weight: 800;
    font-size: 13px;
    margin-right: 4px;
}
.task-card .badge-warn {
    position: absolute;
    top: -8px;
    right: -8px;
    background: #e74c3c;
    color: #fff;
    border: 2px solid var(--navy-0);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 11px;
    font-weight: 800;
}
.task-card .badge-warn.subwarn { background: #ffc107; color: var(--navy-0); right: 30%; }
.task-card .badge-warn.overdue { background: #888; color: #fff; }

.stat-bar { display: flex; gap: 16px; flex-wrap: wrap; margin: 18px 0 0; }
.stat-chip {
    background: #fff;
    border: 2.5px solid var(--navy-0);
    border-radius: 6px;
    padding: 8px 14px;
    font-weight: 700;
    font-size: 14px;
    box-shadow: 3px 3px 0 var(--navy-0);
}
.stat-chip .num { font-family: var(--display); font-weight: 800; font-size: 22px; margin-right: 6px; }
.stat-chip.warn { background: #ffe5e0; }

.rejected-section { margin-top: 32px; }
.rejected-section summary {
    background: #f0f0f0;
    border: 2px solid #888;
    border-radius: 6px;
    padding: 8px 14px;
    cursor: pointer;
    font-weight: 800;
    color: #555;
    list-style: none;
}
.rejected-section summary::-webkit-details-marker { display: none; }

.operator-bar {
    margin: 18px 0 4px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}
.operator-name-chip {
    background: var(--accent);
    border: 2px solid var(--navy-0);
    border-radius: 4px;
    padding: 2px 10px;
    font-weight: 800;
}

/* 操作者選択モーダル：スタッフボタングリッド */
.operator-btn-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
}
.operator-btn-grid .btn-sm {
    padding: 14px 8px;
    font-size: 16px;
    text-align: center;
    display: block;
}

/* 編集モーダル：履歴リスト */
.history-list {
    font-size: 13px;
    max-height: 220px;
    overflow-y: auto;
    background: #fafafa;
    border: 1.5px solid #ccc;
    border-radius: 4px;
    padding: 8px;
}
.history-list > div {
    padding: 4px 0;
    border-bottom: 1px dashed #ddd;
}
.history-list > div:last-child { border-bottom: none; }

/* 承認モーダル：提案情報ボックス */
.proposal-info-box {
    background: #fff8e8;
    border: 2px dashed var(--accent-warm);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 16px;
    font-size: 14px;
}
.proposal-info-box > div { margin-bottom: 4px; }
.proposal-info-box strong { color: var(--navy-0); }

/* コメントリスト */
.comments-list {
    background: #fff;
    border: 2px solid var(--navy-0);
    border-radius: 6px;
    padding: 8px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 13px;
}
.comments-list > div {
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px dashed #eee;
}
.comments-list > div:last-child { border-bottom: none; margin-bottom: 0; }

/* カテゴリ管理：テーブル */
.category-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}
.category-table th {
    background: var(--navy-0);
    color: #fff;
    padding: 8px 6px;
    text-align: left;
}
.category-table td {
    padding: 6px;
    border-bottom: 1px solid #eee;
    vertical-align: middle;
}
.category-table input[type="text"],
.category-table input[type="number"] {
    margin-top: 0;
    padding: 6px 8px;
    font-size: 13px;
}
.category-table input[type="text"] { width: 200px; }
.category-table input[type="number"] { width: 70px; }

/* 人ビュー */
.person-block {
    margin-bottom: 22px;
    background: #fff;
    border: 2.5px solid var(--navy-0);
    border-radius: 6px;
    padding: 12px 14px;
    box-shadow: 3px 3px 0 var(--navy-0);
}
.person-block .person-head {
    font-family: var(--display);
    font-weight: 800;
    font-size: 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}
.person-block .person-count { font-size: 13px; color: #5b6477; font-weight: 700; }
.person-block .person-row { font-size: 14px; margin: 4px 0; line-height: 1.5; }
.person-block .person-row strong { display: inline-block; min-width: 80px; }
.person-block .badge-over {
    background: var(--accent-warm);
    color: #fff;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 800;
}
</style>
</head>
<body>
<div class="page">
    <!-- HERO -->
    <div class="hero">
        <h1><span class="icon">🗂</span>業務担当</h1>
        <div class="hero-desc">
            「<b>誰が何をやってる</b>」を一目で。<br>
            スタッフが提案 → 社長が承認 → 正式登録の見える化。
        </div>
        <div class="stat-bar" id="statBar">
            <span class="stat-chip"><span class="num" id="statTotal">-</span>業務総数</span>
            <span class="stat-chip"><span class="num" id="statProposed">-</span>承認待ち</span>
            <span class="stat-chip"><span class="num" id="statOneshot">-</span>単発</span>
            <span class="stat-chip warn"><span class="num" id="statZero">-</span>担当ゼロ ⚠</span>
        </div>
    </div>

    <!-- 操作者表示 -->
    <div class="operator-bar">
        操作者: <span class="operator-name-chip" id="operatorName">未選択</span>
        <button class="btn-sm" id="btnChangeOperator">変更</button>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <button class="btn btn-primary" id="btnPropose"><span class="plus">💡</span>仕事を提案</button>
        <button class="btn" id="btnPersonView"><span>👥</span>人ビュー</button>
        <button class="btn" id="btnManageCategory"><span>⚙</span>カテゴリ管理</button>
        <button class="btn btn-reload" id="btnReload">🔄 再読込</button>
    </div>

    <!-- カード一覧（カテゴリ別） -->
    <div id="taskListContainer"></div>

    <!-- 単発業務横断ビュー -->
    <div id="oneshotContainer"></div>

    <!-- 却下済セクション（折りたたみ） -->
    <details class="rejected-section">
        <summary>📁 却下済 (<span id="rejectedCount">0</span>) ▶</summary>
        <div id="rejectedContainer" style="margin-top: 12px;"></div>
    </details>
</div>

<!-- ========== モーダル群 ========== -->

<!-- 操作者選択モーダル -->
<div class="modal-overlay" id="modalOperator">
    <div class="modal-content modal-md">
        <h2>👤 あなたは誰ですか？</h2>
        <p style="margin-bottom: 16px; color: #5b6477; font-size: 14px;">編集履歴に名前が記録されます。</p>
        <div style="margin-bottom: 14px;">
            <button class="btn-sm primary" id="btnOperatorDaihyo" style="width: 100%; padding: 14px;">👔 代表</button>
        </div>
        <div id="operatorButtonGrid" class="operator-btn-grid"></div>
    </div>
</div>

<!-- 提案モーダル -->
<div class="modal-overlay" id="modalPropose">
    <div class="modal-content modal-md">
        <h2>💡 仕事を提案する</h2>
        <form id="formPropose">
            <div class="form-row">
                <label>業務名 <span class="req">*</span></label>
                <input type="text" id="proposeName" required>
            </div>
            <div class="form-row">
                <label>説明・メモ</label>
                <textarea id="proposeNote" rows="3" placeholder="いつ・誰がやってる、頻度など 自由記入"></textarea>
            </div>
            <div class="form-row">
                <label>提案者</label>
                <span class="operator-name-chip" id="proposeOperatorName"></span>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-sm" id="btnProposeCancel">キャンセル</button>
                <button type="submit" class="btn-sm primary">社長に提案</button>
            </div>
        </form>
    </div>
</div>

<!-- 承認モーダル（提案カードクリック時） -->
<div class="modal-overlay" id="modalApprove">
    <div class="modal-content modal-lg">
        <h2>✅ 承認・登録</h2>
        <div id="approveProposalInfo" class="proposal-info-box"></div>

        <h3>💬 コメント</h3>
        <div id="approveComments" class="comments-list"></div>
        <div style="display: flex; gap: 8px; margin: 8px 0 16px;">
            <input type="text" id="approveNewComment" placeholder="コメントを追加" style="flex: 1; padding: 8px;">
            <button type="button" class="btn-sm" id="btnApproveAddComment">投稿</button>
        </div>

        <h3>📝 社長が仕上げる</h3>
        <form id="formApprove">
            <input type="hidden" id="approveTaskId">
            <div class="form-row">
                <label>業務名 <span class="req">*</span></label>
                <input type="text" id="approveName" required>
            </div>
            <div class="form-row">
                <label>カテゴリ</label>
                <select id="approveCategoryId"></select>
            </div>
            <div class="form-row">
                <label>種別</label><br>
                <label style="display:inline-block;"><input type="radio" name="approveKind" value="定期" checked> 定期</label>
                <label style="display:inline-block;"><input type="radio" name="approveKind" value="単発"> 単発</label>
            </div>
            <div class="form-row">
                <label>主担当</label>
                <select id="approvePrimaryId"></select>
            </div>
            <div class="form-row">
                <label>副担当</label>
                <select id="approveSecondaryId"></select>
            </div>
            <div class="form-row">
                <label>終了日（単発時）</label>
                <input type="date" id="approveEndDate">
            </div>
            <div class="form-row">
                <label>メモ</label>
                <input type="text" id="approveMemo">
            </div>

            <div class="modal-actions split">
                <button type="button" class="btn-sm danger" id="btnApproveReject">❌ 却下</button>
                <div style="display:flex; gap:8px;">
                    <button type="button" class="btn-sm" id="btnApproveCancel">キャンセル</button>
                    <button type="submit" class="btn-sm primary">✅ 承認</button>
                </div>
            </div>
        </form>
    </div>
</div>

<!-- 編集モーダル（承認済みカードクリック時） -->
<div class="modal-overlay" id="modalEditTask">
    <div class="modal-content modal-lg">
        <h2>📝 業務を編集</h2>
        <form id="formEditTask">

            <div class="form-row">

                <label>主担当</label>
                <select id="editPrimaryId"></select>

                <input type="text" id="editNote">

</div>

<!-- 人ビューモーダル -->
<div class="modal-overlay" id="modalPersonView">
    <div class="modal-content modal-lg">
        <h2>👥 人ビュー</h2>
        <p style="margin-bottom: 16px; color: #5b6477; font-size: 14px;">スタッフごとの担当業務一覧。主担当が5件超えると「持ちすぎ」バッジ。</p>
        <div id="personViewContainer"></div>

<div class="modal-overlay" id="modalCategoryManage">

        <h2>⚙ カテゴリ管理</h2>
        <table class="category-table" id="categoryTable">
            <thead><tr>
                <th>名前</th>
                <th>並び順</th>
                <th>業務数</th>
                <th>操作</th>
            </tr></thead>
            <tbody></tbody>
        </table>
        <div style="margin-top: 16px; display: flex; gap: 8px;">
            <input type="text" id="newCategoryName" placeholder="新規カテゴリ名" style="flex: 1; padding: 8px;">

        <div class="modal-actions">
            <button class="btn-sm" id="btnCategoryManageClose">閉じる</button>
        </div>
    </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ===== 設定 =====
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwo1UGxsK1qgmO8IDaqT-inDM0Qgoe_MRvxfKDxHy_gXANi4FwNFlgn2pEanMXVQxsdlw/exec';
const CURRENT_OPERATOR_KEY = 'tasks_app_operator_v1';

// ===== グローバル状態 =====
let CURRENT_OPERATOR = null;  // { id, name }
let STAFF_LIST = [];
let CATEGORIES = [];
let TASKS = [];

// ===== ユーティリティ =====
function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, ch => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[ch]));
}

function getStaffName(id) {
    if (!id) return '';
    if (id === 'guest') return 'ゲスト';
    const s = STAFF_LIST.find(x => String(x.id) === String(id));
    return s ? s.name : String(id);
}

function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2400);
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

async function callGas(params) {
    const url = GAS_URL + '?' + new URLSearchParams(params).toString();
    const res = await fetch(url);
    return res.json();
}

// ===== スタッフ一覧取得 =====
async function loadStaffList() {
    try {
        const data = await callGas({ action: 'staff_list' });
        // staff: 文字列配列の場合と、{id, name}配列の場合の両方に対応
        const raw = data.staff || data.staffList || [];
        STAFF_LIST = raw.map((s, i) => {
            if (typeof s === 'string') return { id: s, name: s };
            return { id: s.id || s.name, name: s.name || s.id };
        });
        return STAFF_LIST;
    } catch (e) {
        console.error('loadStaffList failed:', e);
        STAFF_LIST = [];
        return [];
    }
}

// ===== 操作者選択 =====
function getStoredOperator() {
    try {
        const stored = localStorage.getItem(CURRENT_OPERATOR_KEY);
        return stored ? JSON.parse(stored) : null;
    } catch (e) { return null; }
}

function setStoredOperator(operator) {
    localStorage.setItem(CURRENT_OPERATOR_KEY, JSON.stringify(operator));
    CURRENT_OPERATOR = operator;
    renderOperatorBar();
}

function renderOperatorBar() {
    document.getElementById('operatorName').textContent =
        CURRENT_OPERATOR ? CURRENT_OPERATOR.name : '未選択';
}

function showOperatorModal() {
    const grid = document.getElementById('operatorButtonGrid');
    grid.innerHTML = '';
    STAFF_LIST.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'btn-sm';
        btn.textContent = s.name;
        btn.addEventListener('click', () => onOperatorSelect(s.id, s.name));
        grid.appendChild(btn);
    });
    openModal('modalOperator');
}

function onOperatorSelect(id, name) {
    setStoredOperator({ id: id, name: name });
    closeModal('modalOperator');
    onOperatorReady();
}

document.getElementById('btnChangeOperator').addEventListener('click', showOperatorModal);
document.getElementById('btnOperatorDaihyo').addEventListener('click', () => onOperatorSelect('daihyo', '代表'));

// ===== データロード =====
async function loadCategories() {
    try {
        const data = await callGas({ action: 'list_categories' });
        if (data && data.ok && Array.isArray(data.categories)) {
            CATEGORIES = data.categories;
        }
    } catch (e) { console.error('loadCategories failed:', e); }
}

async function loadTasks() {
    try {
        const data = await callGas({ action: 'list_tasks', include: 'all' });
        // 空ガード（同期4点セット）
        if (!data || !data.ok || !Array.isArray(data.tasks)) {
            console.warn('list_tasks returned empty or invalid; skip render');
            return;
        }
        TASKS = data.tasks;
        renderTasks();
        renderStatBar();
    } catch (e) { console.error('loadTasks failed:', e); }
}

// ===== カード描画 =====
function makeTaskCard(t) {
    const div = document.createElement('div');
    div.className = 'task-card';
    if (t.approval_status === 'proposed') div.classList.add('proposed');
    if (t.approval_status === 'rejected') div.classList.add('rejected');
    div.dataset.taskId = t.task_id;

    // 警告バッジ
    let warnHtml = '';
    if (t.approval_status === 'approved') {
        if (!t.primary_id) warnHtml += '<span class="badge-warn">⚠担当未設定</span>';
        else if (!t.secondary_id) warnHtml += '<span class="badge-warn subwarn">⚠カバーなし</span>';
        if (t.kind === '単発' && t.end_date) {
            const today = new Date().toISOString().slice(0, 10);
            if (t.end_date < today) warnHtml += '<span class="badge-warn overdue">⏱終了日超過</span>';
        }
    }

    if (t.approval_status === 'proposed') {
        div.innerHTML = `
            ${warnHtml}
            <div class="task-name">💡 ${escapeHtml(t.task_name)}</div>
            <div style="font-size:13px; color:#5b6477;">
                by ${escapeHtml(t.proposed_by_name_snapshot)} ${(t.proposed_at || '').slice(5,10)}
            </div>
            ${t.proposal_note ? `<div style="margin-top:6px; font-size:13px;">${escapeHtml(t.proposal_note)}</div>` : ''}
        `;
    } else {
        div.innerHTML = `
            ${warnHtml}
            <div class="task-name">${escapeHtml(t.task_name)}</div>
            <div><span class="badge-primary">主</span>${escapeHtml(getStaffName(t.primary_id) || '-')}</div>
            <div style="margin-top:4px; font-size:14px;">副: ${escapeHtml(getStaffName(t.secondary_id) || '-')}</div>
            ${t.memo ? `<div style="margin-top:6px; font-size:13px; color:#5b6477;">⏰ ${escapeHtml(t.memo)}</div>` : ''}
            ${t.kind === '単発' && t.end_date ? `<div style="margin-top:4px; font-size:13px;">📅 〜${escapeHtml(t.end_date)}</div>` : ''}
            ${t.rejected_reason ? `<div style="margin-top:6px; font-size:12px; color:#888;">却下: ${escapeHtml(t.rejected_reason)}</div>` : ''}
        `;
    }

    div.addEventListener('click', () => onTaskCardClick(t));
    return div;
}

function onTaskCardClick(task) {
    if (task.approval_status === 'proposed') {
        openProposalModal(task);
    } else if (task.approval_status === 'rejected') {
        // 却下済はクリック無効（情報表示のみ）
        showToast('却下された提案です');
    } else {
        openEditModal(task);
    }
}

function renderTasks() {
    const container = document.getElementById('taskListContainer');
    const rejectedContainer = document.getElementById('rejectedContainer');
    container.innerHTML = '';
    rejectedContainer.innerHTML = '';

    // カテゴリ別グルーピング（rejected除外、archived除外）
    const byCat = {};
    let rejectedCount = 0;
    TASKS.forEach(t => {
        if (t.status === 'archived') return;
        if (t.approval_status === 'rejected') {
            rejectedContainer.appendChild(makeTaskCard(t));
            rejectedCount++;
            return;
        }
        const cid = t.category_id || '_none_';
        if (!byCat[cid]) byCat[cid] = [];
        byCat[cid].push(t);
    });
    document.getElementById('rejectedCount').textContent = rejectedCount;

    // カテゴリ順で描画
    const renderCatSection = (catName, tasks) => {
        const sec = document.createElement('div');
        sec.className = 'category-section';
        sec.innerHTML = `
            <div class="category-heading">━ ${escapeHtml(catName)} <span class="count">(${tasks.length}件)</span></div>
            <div class="task-grid"></div>
        `;
        const grid = sec.querySelector('.task-grid');
        tasks
            .sort((a, b) => (a.sort_order || 0) - (b.sort_order || 0))
            .forEach(t => grid.appendChild(makeTaskCard(t)));
        container.appendChild(sec);
    };

    CATEGORIES.forEach(cat => {
        const tasks = byCat[cat.category_id];
        if (!tasks || tasks.length === 0) return;
        renderCatSection(cat.name, tasks);
        delete byCat[cat.category_id];
    });
    // カテゴリ未設定の業務（カテゴリID空 or マスター不在）
    Object.keys(byCat).forEach(cid => {
        renderCatSection(cid === '_none_' ? '(カテゴリ未設定)' : '(廃止カテゴリ)', byCat[cid]);
    });

    // 単発横断ビュー
    renderOneshotView();
}

function renderStatBar() {
    const total = TASKS.filter(t => t.status !== 'archived' && t.approval_status === 'approved').length;
    const proposed = TASKS.filter(t => t.status !== 'archived' && t.approval_status === 'proposed').length;
    const oneshot = TASKS.filter(t => t.status !== 'archived' && t.approval_status === 'approved' && t.kind === '単発').length;
    const zero = TASKS.filter(t => t.status !== 'archived' && t.approval_status === 'approved' && !t.primary_id).length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statProposed').textContent = proposed;
    document.getElementById('statOneshot').textContent = oneshot;
    document.getElementById('statZero').textContent = zero;
}

// ===== 単発業務横断ビュー =====
function renderOneshotView() {
    const container = document.getElementById('oneshotContainer');
    container.innerHTML = '';
    const oneshots = TASKS
        .filter(t => t.status !== 'archived' && t.approval_status === 'approved' && t.kind === '単発')
        .sort((a, b) => {
            const today = new Date().toISOString().slice(0, 10);
            const aOver = a.end_date && a.end_date < today;
            const bOver = b.end_date && b.end_date < today;
            if (aOver !== bOver) return aOver ? 1 : -1;
            return (a.end_date || '9999') < (b.end_date || '9999') ? -1 : 1;
        });
    if (oneshots.length === 0) return;
    const sec = document.createElement('div');
    sec.className = 'category-section';
    sec.innerHTML = `
        <div class="category-heading">📅 単発業務 横断ビュー <span class="count">(${oneshots.length}件・終了日順)</span></div>
        <div class="task-grid"></div>
    `;
    const grid = sec.querySelector('.task-grid');
    oneshots.forEach(t => grid.appendChild(makeTaskCard(t)));
    container.appendChild(sec);
}

// ===== 提案モーダル =====
document.getElementById('btnPropose').addEventListener('click', () => {
    if (!CURRENT_OPERATOR) { showToast('操作者を選択してください'); return; }
    document.getElementById('proposeName').value = '';
    document.getElementById('proposeNote').value = '';
    document.getElementById('proposeOperatorName').textContent = CURRENT_OPERATOR.name;
    openModal('modalPropose');
});
document.getElementById('btnProposeCancel').addEventListener('click', () => closeModal('modalPropose'));
document.getElementById('formPropose').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    if (!CURRENT_OPERATOR) { showToast('操作者を選択してください'); return; }
    const data = await callGas({
        action: 'add_task',
        task_name: document.getElementById('proposeName').value,
        memo: document.getElementById('proposeNote').value,
        operator_id: CURRENT_OPERATOR.id,
        is_proposal: 'true'
    });
    if (data.ok) {
        closeModal('modalPropose');
        showToast('提案しました');
        await loadTasks();
    } else {
        alert('提案失敗: ' + (data.error || ''));
    }
});

// ===== 承認モーダル =====
async function openProposalModal(task) {
    document.getElementById('approveTaskId').value = task.task_id;
    document.getElementById('approveName').value = task.task_name || '';
    document.getElementById('approveMemo').value = task.proposal_note || '';
    document.getElementById('approveEndDate').value = '';

    document.getElementById('approveProposalInfo').innerHTML = `
        <div><strong>提案:</strong> ${escapeHtml(task.task_name)}</div>
        <div><strong>by:</strong> ${escapeHtml(task.proposed_by_name_snapshot)} (${escapeHtml(task.proposed_at)})</div>
        <div><strong>説明:</strong> ${escapeHtml(task.proposal_note || '(なし)')}</div>
    `;

    const catSel = document.getElementById('approveCategoryId');
    catSel.innerHTML = '<option value="">(未選択)</option>' +
        CATEGORIES.map(c => `<option value="${escapeHtml(c.category_id)}">${escapeHtml(c.name)}</option>`).join('');

    const staffOptions = '<option value="">(未選択)</option>' +
        STAFF_LIST.map(s => `<option value="${escapeHtml(s.id)}">${escapeHtml(s.name)}</option>`).join('');
    document.getElementById('approvePrimaryId').innerHTML = staffOptions;
    document.getElementById('approveSecondaryId').innerHTML = staffOptions;

    document.querySelectorAll('input[name="approveKind"]').forEach(r => r.checked = (r.value === '定期'));

    await reloadApproveComments(task.task_id);
    openModal('modalApprove');
}

async function reloadApproveComments(taskId) {
    const data = await callGas({ action: 'list_comments', task_id: taskId });
    const html = (data.comments || []).map(c =>
        `<div><strong>${escapeHtml(c.commenter_name_snapshot)}</strong> ${escapeHtml((c.created_at || '').slice(5,16))}: ${escapeHtml(c.body)}</div>`
    ).join('');
    document.getElementById('approveComments').innerHTML = html || '<div style="color:#888;">コメントなし</div>';
}

document.getElementById('btnApproveAddComment').addEventListener('click', async () => {
    if (!CURRENT_OPERATOR) { showToast('操作者を選択してください'); return; }
    const body = document.getElementById('approveNewComment').value.trim();
    if (!body) return;
    const taskId = document.getElementById('approveTaskId').value;
    const data = await callGas({
        action: 'add_comment', task_id: taskId, body: body, operator_id: CURRENT_OPERATOR.id
    });
    if (data.ok) {
        document.getElementById('approveNewComment').value = '';
        await reloadApproveComments(taskId);
    } else {
        alert('コメント投稿失敗: ' + (data.error || ''));
    }
});

document.getElementById('btnApproveCancel').addEventListener('click', () => closeModal('modalApprove'));

document.getElementById('formApprove').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    if (!CURRENT_OPERATOR) { showToast('操作者を選択してください'); return; }
    const taskId = document.getElementById('approveTaskId').value;
    const data = await callGas({
        action: 'approve_task',
        task_id: taskId,
        task_name: document.getElementById('approveName').value,
        category_id: document.getElementById('approveCategoryId').value,
        kind: document.querySelector('input[name="approveKind"]:checked').value,
        primary_id: document.getElementById('approvePrimaryId').value,
        secondary_id: document.getElementById('approveSecondaryId').value,
        end_date: document.getElementById('approveEndDate').value,
        memo: document.getElementById('approveMemo').value,
        operator_id: CURRENT_OPERATOR.id
    });
    if (data.ok) {
        closeModal('modalApprove');
        showToast('承認しました');
        await loadTasks();
    } else {
        alert('承認失敗: ' + (data.error || ''));
    }
});

document.getElementById('btnApproveReject').addEventListener('click', async () => {
    if (!CURRENT_OPERATOR) { showToast('操作者を選択してください'); return; }
    const taskId = document.getElementById('approveTaskId').value;
    const taskName = document.getElementById('approveName').value;
    const reason = prompt(`提案「${taskName}」を却下します。\n却下理由を入力してください（必須）:`);
    if (!reason) return;
    const data = await callGas({
        action: 'reject_task', task_id: taskId, reason: reason, operator_id: CURRENT_OPERATOR.id
    });
    if (data.ok) {
        closeModal('modalApprove');
        showToast('却下しました');
        await loadTasks();
    } else {
        alert('却下失敗: ' + (data.error || ''));
    }
});

// ===== 編集モーダル =====
async function openEditModal(task) {
    document.getElementById('editTaskId').value = task.task_id;
    document.getElementById('editTaskName').value = task.task_name || '';
    document.getElementById('editMemo').value = task.memo || '';
    document.getElementById('editEndDate').value = task.end_date || '';
    document.getElementById('editNote').value = '';

    const catSel = document.getElementById('editCategoryId');
    catSel.innerHTML = '<option value="">(未選択)</option>' +
        CATEGORIES.map(c => `<option value="${escapeHtml(c.category_id)}" ${c.category_id === task.category_id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('');

    document.querySelectorAll('input[name="editKind"]').forEach(r => r.checked = (r.value === (task.kind || '定期')));

    const staffOptions = '<option value="">(未選択)</option>' +
        STAFF_LIST.map(s => `<option value="${escapeHtml(s.id)}">${escapeHtml(s.name)}</option>`).join('');
    const primSel = document.getElementById('editPrimaryId');
    const secSel = document.getElementById('editSecondaryId');
    primSel.innerHTML = staffOptions; primSel.value = task.primary_id || '';
    secSel.innerHTML = staffOptions; secSel.value = task.secondary_id || '';

    // 履歴ロード
    const histData = await callGas({ action: 'list_task_history', task_id: task.task_id });
    const histHtml = (histData.history || []).map(h => {
        const who = h.changed_by_name_snapshot || '?';
        const when = h.changed_at || '';
        if (h.action === 'updated') {
            return `<div>• ${escapeHtml(when)} <strong>${escapeHtml(who)}</strong> ${escapeHtml(h.field)}: ${escapeHtml(h.old_value_snapshot || h.old_value || '(空)')} → ${escapeHtml(h.new_value_snapshot || h.new_value || '(空)')}${h.note ? '（' + escapeHtml(h.note) + '）' : ''}</div>`;
        }
        return `<div>• ${escapeHtml(when)} <strong>${escapeHtml(who)}</strong> ${escapeHtml(h.action)}${h.note ? '（' + escapeHtml(h.note) + '）' : ''}</div>`;
    }).join('');
    document.getElementById('editHistory').innerHTML = histHtml || '<div style="color:#888;">履歴なし</div>';

    openModal('modalEditTask');
}

document.getElementById('btnEditCancel').addEventListener('click', () => closeModal('modalEditTask'));

document.getElementById('formEditTask').addEventListener('submit', async (ev) => {
    ev.preventDefault();
    if (!CURRENT_OPERATOR) { showToast('操作者を選択してください'); return; }
    const taskId = document.getElementById('editTaskId').value;
    const data = await callGas({
        action: 'update_task',
        task_id: taskId,
        task_name: document.getElementById('editTaskName').value,
        category_id: document.getElementById('editCategoryId').value,
        kind: document.querySelector('input[name="editKind"]:checked').value,
        primary_id: document.getElementById('editPrimaryId').value,
        secondary_id: document.getElementById('editSecondaryId').value,
        end_date: document.getElementById('editEndDate').value,
        memo: document.getElementById('editMemo').value,
        note: document.getElementById('editNote').value,
        operator_id: CURRENT_OPERATOR.id
    });
    if (data.ok) {
        closeModal('modalEditTask');
        showToast('保存しました');
        await loadTasks();
    } else {
        alert('保存失敗: ' + (data.error || ''));
    }
});

document.getElementById('btnArchiveTask').addEventListener('click', async () => {
    if (!CURRENT_OPERATOR) { showToast('操作者を選択してください'); return; }
    const taskId = document.getElementById('editTaskId').value;
    const taskName = document.getElementById('editTaskName').value;
    if (!confirm(`業務「${taskName}」をアーカイブします。\nアーカイブすると一覧から消えますが、履歴は残ります。\n本当にアーカイブしますか？`)) return;
    const note = prompt('アーカイブ理由（任意）') || '';
    const data = await callGas({
        action: 'archive_task', task_id: taskId, operator_id: CURRENT_OPERATOR.id, note: note
    });
    if (data.ok) {
        closeModal('modalEditTask');
        showToast('アーカイブしました');
        await loadTasks();
    } else {
        alert('アーカイブ失敗: ' + (data.error || ''));
    }
});

// ===== 人ビュー =====
function renderPersonView() {
    const container = document.getElementById('personViewContainer');
    container.innerHTML = '';
    const byStaff = {};
    STAFF_LIST.forEach(s => byStaff[s.id] = { primary: [], secondary: [] });
    TASKS.filter(t => t.status !== 'archived' && t.approval_status === 'approved').forEach(t => {
        if (t.primary_id && byStaff[t.primary_id]) byStaff[t.primary_id].primary.push(t);
        if (t.secondary_id && byStaff[t.secondary_id]) byStaff[t.secondary_id].secondary.push(t);
    });
    let any = false;
    STAFF_LIST.forEach(s => {
        const b = byStaff[s.id];
        if (b.primary.length === 0 && b.secondary.length === 0) return;
        any = true;
        const overFlag = b.primary.length > 5;
        const block = document.createElement('div');
        block.className = 'person-block';
        block.innerHTML = `
            <div class="person-head">
                ${escapeHtml(s.name)}
                <span class="person-count">(主:${b.primary.length} / 副:${b.secondary.length})</span>
                ${overFlag ? '<span class="badge-over">⚠持ちすぎ</span>' : ''}
            </div>
            <div class="person-row"><strong>主担当:</strong> ${b.primary.map(t => escapeHtml(t.task_name)).join(' / ') || '-'}</div>
            <div class="person-row"><strong>副担当:</strong> ${b.secondary.map(t => escapeHtml(t.task_name)).join(' / ') || '-'}</div>
        `;
        container.appendChild(block);
    });
    if (!any) container.innerHTML = '<div style="padding: 16px; color:#888;">担当業務が登録されているスタッフはまだいません。</div>';
}

document.getElementById('btnPersonView').addEventListener('click', () => {
    renderPersonView();
    openModal('modalPersonView');
});
document.getElementById('btnPersonViewClose').addEventListener('click', () => closeModal('modalPersonView'));

// ===== カテゴリ管理 =====
function renderCategoryTable() {
    const tbody = document.querySelector('#categoryTable tbody');
    tbody.innerHTML = '';
    const taskCountByCategory = {};
    TASKS.forEach(t => {
        if (t.status !== 'archived' && t.approval_status !== 'rejected') {
            taskCountByCategory[t.category_id] = (taskCountByCategory[t.category_id] || 0) + 1;
        }
    });
    CATEGORIES.forEach(c => {
        const tr = document.createElement('tr');
        const isFixed = (c.name === '未分類');
        tr.innerHTML = `
            <td><input type="text" value="${escapeHtml(c.name)}" data-cat-id="${escapeHtml(c.category_id)}" ${isFixed ? 'disabled' : ''}></td>
            <td><input type="number" value="${c.sort_order || 0}" data-sort-id="${escapeHtml(c.category_id)}" ${isFixed ? 'disabled' : ''}></td>
            <td style="text-align: center;">${taskCountByCategory[c.category_id] || 0}</td>
            <td>
                <button class="btn-sm" data-action="save" data-cat-id="${escapeHtml(c.category_id)}" ${isFixed ? 'disabled' : ''}>保存</button>
                <button class="btn-sm danger" data-action="archive" data-cat-id="${escapeHtml(c.category_id)}" ${isFixed ? 'disabled' : ''}>削除</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
    tbody.querySelectorAll('[data-action="save"]').forEach(btn => {
        btn.addEventListener('click', async () => {
            const id = btn.dataset.catId;
            const name = tbody.querySelector(`input[type="text"][data-cat-id="${CSS.escape(id)}"]`).value;
            const sort = tbody.querySelector(`input[type="number"][data-sort-id="${CSS.escape(id)}"]`).value;
            const data = await callGas({
                action: 'update_category', category_id: id, name: name, sort_order: sort, operator_id: CURRENT_OPERATOR.id
            });
            if (data.ok) { await loadCategories(); renderCategoryTable(); await loadTasks(); showToast('保存しました'); }
            else alert('保存失敗: ' + (data.error || ''));
        });
    });
    tbody.querySelectorAll('[data-action="archive"]').forEach(btn => {
        btn.addEventListener('click', async () => {
            const id = btn.dataset.catId;
            const name = tbody.querySelector(`input[type="text"][data-cat-id="${CSS.escape(id)}"]`).value;
            if (!confirm(`カテゴリ「${name}」を削除します。\n配下の業務は「未分類」に自動移動します（業務は消えません）。\n本当に削除しますか？`)) return;
            const data = await callGas({
                action: 'archive_category', category_id: id, operator_id: CURRENT_OPERATOR.id
            });
            if (data.ok) { await loadCategories(); renderCategoryTable(); await loadTasks(); showToast('削除しました'); }
            else alert('削除失敗: ' + (data.error || ''));
        });
    });
}

document.getElementById('btnManageCategory').addEventListener('click', () => {
    if (!CURRENT_OPERATOR) { showToast('操作者を選択してください'); return; }
    renderCategoryTable();
    openModal('modalCategoryManage');
});
document.getElementById('btnCategoryManageClose').addEventListener('click', () => closeModal('modalCategoryManage'));
document.getElementById('btnCategoryAdd').addEventListener('click', async () => {
    if (!CURRENT_OPERATOR) { showToast('操作者を選択してください'); return; }
    const name = document.getElementById('newCategoryName').value.trim();
    if (!name) return;
    const data = await callGas({
        action: 'add_category', name: name, operator_id: CURRENT_OPERATOR.id
    });
    if (data.ok) {
        document.getElementById('newCategoryName').value = '';
        await loadCategories();
        renderCategoryTable();
        showToast('追加しました');
    } else alert('追加失敗: ' + (data.error || ''));
});

// ===== 再読込ボタン =====
document.getElementById('btnReload').addEventListener('click', async () => {
    await loadCategories();
    await loadTasks();
    showToast('更新しました');
});

// ===== visibilitychange による自動再取得 + 10秒ポーリング =====
document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState === 'visible' && CURRENT_OPERATOR) {
        await loadCategories();
        await loadTasks();
    }
});
setInterval(async () => {
    if (document.visibilityState === 'visible' && CURRENT_OPERATOR) {
        await loadTasks();
    }
}, 10000);

// ===== 起動 =====
async function onOperatorReady() {
    await loadCategories();
    await loadTasks();
}

(async function init() {
    await loadStaffList();
    const stored = getStoredOperator();
    if (stored) {
        CURRENT_OPERATOR = stored;
        renderOperatorBar();
        onOperatorReady();
    } else {
        showOperatorModal();
    }
})();
</script>
</body>
