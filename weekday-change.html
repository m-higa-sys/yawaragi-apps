<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>利用曜日変更 | yawaragi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --navy-0: #0e1623;
    --navy-1: #131e30;
    --navy-2: #1b293f;
    --navy-3: #243651;
    --navy-line: #2e4566;
    --ink-on-dark: #f4f7fb;
    --ink-on-dark-mute: #b6c2d4;

    --paper: #f6f4ed;
    --paper-deep: #ece8db;
    --ink-deep: #0b1320;

    --accent: #f5c518;
    --accent-warm: #ff7a3a;
    --accent-cool: #58e1c4;

    --shadow-card: 6px 6px 0 var(--navy-0);

    --display: 'Bricolage Grotesque', 'Noto Sans JP', sans-serif;
    --jp: 'Noto Sans JP', sans-serif;
}

html, body {
    background: var(--paper);
    color: var(--ink-deep);
    font-family: var(--jp);
    font-size: 16px;
    line-height: 1.6;
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
}

body {
    background-image:
        radial-gradient(circle at 1px 1px, rgba(14, 22, 35, 0.08) 1px, transparent 0);
    background-size: 20px 20px;
    background-color: var(--paper);
}
body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 240px;
    background: linear-gradient(180deg, var(--accent) 0%, rgba(245, 197, 24, 0.4) 78%, transparent 100%);
    z-index: 0;
    pointer-events: none;
}

button { font-family: inherit; }
input, select, textarea { font-family: inherit; }

.page { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 60px; }

/* ============ HEADER ============ */
.hero {
    color: var(--ink-deep);
    padding: 32px 30px;
    position: relative;
    margin-top: 24px;
    border: 3px solid var(--navy-0);
    background: #fffdf6;
    box-shadow: var(--shadow-card);
    border-radius: 6px;
    overflow: hidden;
}
.hero::after {
    content: "";
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: var(--accent);
    transform: rotate(45deg);
    z-index: 0;
}
.hero > * { position: relative; z-index: 1; }
.hero h1 {
    font-family: var(--display);
    font-weight: 800;
    font-size: clamp(2rem, 4.5vw, 2.8rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--ink-deep);
}
.hero h1 .icon { margin-right: 8px; }
.hero-desc {
    font-size: 15px;
    color: #3a4252;
    margin-top: 14px;
    max-width: 60ch;
    line-height: 1.7;
}
.hero-desc b { color: var(--ink-deep); font-weight: 800; background: var(--accent); padding: 1px 4px; }

/* hero-meta（統計）は今回は非表示。将来拡張用にCSSは残す */
.hero-meta {
    display: flex;
    gap: 28px;
    margin-top: 22px;
    flex-wrap: wrap;
    align-items: baseline;
    padding-top: 18px;
    border-top: 2px dashed rgba(14, 22, 35, 0.2);
}
.stat { display: flex; align-items: baseline; gap: 10px; }
.stat .num {
    font-family: var(--display);
    font-weight: 800;
    font-size: 36px;
    line-height: 1;
    color: var(--ink-deep);
    letter-spacing: -0.03em;
}
.stat .lbl { font-family: var(--jp); font-weight: 700; font-size: 14px; color: #5b6477; }
.stat.warm .num { color: var(--accent-warm); }
.stat.cool .num { color: #2a8a73; }

/* ============ TOOLBAR ============ */
.toolbar {
    display: flex;
    gap: 12px;
    align-items: stretch;
    flex-wrap: wrap;
    margin: 26px 0 28px;
}
.btn {
    font-family: var(--jp);
    font-weight: 800;
    font-size: 16px;
    border: 3px solid var(--navy-0);
    border-radius: 6px;
    padding: 14px 22px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    box-shadow: 5px 5px 0 var(--navy-0);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    background: #fff;
    color: var(--navy-0);
}
.btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 7px 7px 0 var(--navy-0);
}
.btn:active {
    transform: translate(5px, 5px);
    box-shadow: 0 0 0 var(--navy-0);
}
.btn-primary { background: var(--accent); color: var(--navy-0); }
.btn-secondary { background: #fff; color: var(--navy-0); }
.btn-secondary:hover { background: var(--accent-cool); }
.btn-reload {
    background: var(--navy-2);
    color: var(--ink-on-dark);
    font-weight: 700;
    font-size: 15px;
    margin-left: auto;
}
.btn-reload:hover { background: var(--navy-1); }
.btn .plus {
    font-size: 22px;
    line-height: 1;
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--navy-0);
    color: var(--accent);
    border-radius: 4px;
    font-weight: 900;
}
.btn:disabled,
.btn[data-locked="1"] {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
    box-shadow: 5px 5px 0 var(--navy-0);
}

/* モーダル内の小型ボタン */
.btn-sm {
    font-family: var(--jp);
    font-weight: 800;
    font-size: 14px;
    border: 2.5px solid var(--navy-0);
    border-radius: 5px;
    padding: 8px 16px;
    cursor: pointer;
    background: #fff;
    color: var(--navy-0);
    box-shadow: 3px 3px 0 var(--navy-0);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
}
.btn-sm:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--navy-0); }
.btn-sm:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--navy-0); }
.btn-sm.primary { background: var(--accent); }
.btn-sm.danger { background: #fff5f5; color: #c53030; border-color: #c53030; box-shadow: 3px 3px 0 #c53030; }
.btn-sm.danger:hover { box-shadow: 4px 4px 0 #c53030; }
.btn-sm.danger:active { box-shadow: 0 0 0 #c53030; }
.btn-sm:disabled, .btn-sm[data-locked="1"] { opacity: 0.55; cursor: not-allowed; transform: none; }

/* ============ SECTION HEADER ============ */
.section-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 3px solid var(--navy-0);
}
.section-bar .label {
    font-family: var(--jp);
    font-weight: 900;
    font-size: 22px;
    color: var(--navy-0);
}
.section-bar .count-chip {
    margin-left: auto;
    font-family: var(--jp);
    font-weight: 700;
    font-size: 14px;
    background: var(--navy-0);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 4px;
}

/* ============ CARDS ============ */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 18px;
}

.card {
    position: relative;
    background: #fff;
    border: 3px solid var(--navy-0);
    border-radius: 6px;
    padding: 18px 18px 16px 24px;
    box-shadow: 6px 6px 0 var(--navy-0);
    cursor: pointer;
    transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), box-shadow 0.18s;
    opacity: 0;
    transform: translateY(16px);
    animation: slamIn 0.5s cubic-bezier(.34,1.56,.64,1) forwards;
    overflow: hidden;
}
.card:nth-child(1) { animation-delay: 0.04s; }
.card:nth-child(2) { animation-delay: 0.10s; }
.card:nth-child(3) { animation-delay: 0.16s; }
.card:nth-child(4) { animation-delay: 0.22s; }
.card:nth-child(5) { animation-delay: 0.26s; }
.card:nth-child(6) { animation-delay: 0.30s; }
@keyframes slamIn {
    to { opacity: 1; transform: translateY(0); }
}

.card:hover {
    transform: translate(-3px, -3px);
    box-shadow: 9px 9px 0 var(--navy-0);
}
.card:active {
    transform: translate(5px, 5px);
    box-shadow: 0 0 0 var(--navy-0);
}

.card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 10px;
    background: var(--accent);
}
.card.is-contract::before { background: var(--accent); }
.card.is-meeting::before  { background: var(--accent-cool); }
.card.is-udc::before      { background: var(--accent-cool); }
.card.is-done::before     { background: #b0b9c6; }

/* 利用曜日変更カード：適用開始日を大きく表示 */
.card.is-udc .udc-effective {
    font-family: var(--display);
    font-weight: 800;
    font-size: 30px;
    line-height: 1.1;
    color: var(--navy-0);
    background: var(--accent);
    border: 2.5px solid var(--navy-0);
    border-radius: 5px;
    box-shadow: 3px 3px 0 var(--navy-0);
    padding: 8px 14px;
    margin: 4px 0 14px 0;
    display: inline-block;
    letter-spacing: -0.02em;
}
.card.is-udc.is-done .udc-effective {
    background: #b0b9c6;
    color: var(--navy-2);
}
.card.is-udc .udc-days-change {
    font-family: var(--jp);
    font-weight: 700;
    font-size: 14px;
    color: var(--navy-1);
    margin: -8px 0 14px 0;
    line-height: 1.5;
}
.card.is-udc .udc-days-change b {
    background: var(--paper-deep);
    border: 2px solid var(--navy-0);
    border-radius: 3px;
    padding: 1px 6px;
    font-weight: 800;
}

.card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
}
.type-chip {
    display: inline-flex;
    align-items: center;
    font-family: var(--jp);
    font-weight: 800;
    font-size: 14px;
    padding: 4px 12px;
    background: var(--navy-0);
    color: var(--accent);
    border-radius: 4px;
}
.card.is-meeting .type-chip { color: var(--accent-cool); }
.card.is-udc .type-chip { color: var(--accent-cool); }
.card.is-done .type-chip { background: #b0b9c6; color: var(--navy-0); }

.status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--jp);
    font-weight: 700;
    font-size: 13px;
    color: var(--navy-2);
}
.status-pill .d { width: 9px; height: 9px; border-radius: 50%; background: var(--accent-warm); }
.card.is-done .status-pill .d { background: var(--accent-cool); }

.card-name {
    font-family: var(--jp);
    font-weight: 900;
    font-size: 24px;
    line-height: 1.2;
    color: var(--navy-0);
    margin: 6px 0 16px 0;
    letter-spacing: -0.005em;
}
.card.is-done .card-name { color: #6b7686; }

.card-meta {
    font-family: var(--jp);
    font-weight: 500;
    font-size: 12px;
    color: #6b7686;
    margin: -8px 0 14px 0;
    line-height: 1.5;
}

.progress-block { }
.progress-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
}
.progress-num {
    font-family: var(--display);
    font-weight: 800;
    font-size: 30px;
    line-height: 1;
    color: var(--navy-0);
    letter-spacing: -0.03em;
}
.progress-num .of {
    font-size: 17px;
    color: #6b7686;
    margin-left: 2px;
    font-weight: 700;
}
.progress-pct {
    font-family: var(--display);
    font-weight: 800;
    font-size: 15px;
    color: var(--navy-2);
    background: var(--paper-deep);
    padding: 4px 10px;
    border-radius: 4px;
    border: 2px solid var(--navy-0);
}
.card.is-done .progress-pct {
    background: var(--accent-cool);
    color: var(--navy-0);
}

.progress-bar {
    height: 14px;
    background: var(--paper-deep);
    border: 2.5px solid var(--navy-0);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    background: var(--accent);
    width: var(--pct, 0%);
    transition: width 0.7s cubic-bezier(.34,1.56,.64,1);
}
.card.is-meeting .progress-fill { background: var(--accent-cool); }
.card.is-udc .progress-fill { background: var(--accent-cool); }
.card.is-done .progress-fill { background: var(--accent-cool); }

.today-strip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    background: var(--accent-warm);
    color: var(--navy-0);
    font-family: var(--jp);
    font-weight: 900;
    font-size: 14px;
    padding: 7px 12px;
    border: 2.5px solid var(--navy-0);
    border-radius: 4px;
    box-shadow: 3px 3px 0 var(--navy-0);
}
.today-strip .icon {
    width: 18px; height: 18px;
    background: var(--navy-0);
    color: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 900;
}

.empty {
    margin-top: 36px;
    padding: 22px 18px;
    border: 3px dashed var(--navy-line);
    border-radius: 6px;
    text-align: center;
    background: rgba(255,255,255,0.5);
    font-family: var(--jp);
    font-weight: 700;
    font-size: 15px;
    color: var(--navy-2);
}

/* ============ モーダル ============ */
.modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(14, 22, 35, 0.55); z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal-content {
    background: #fffdf6;
    border: 3px solid var(--navy-0);
    border-radius: 6px;
    box-shadow: var(--shadow-card);
    padding: 22px 22px 20px;
    width: 96%;
    max-height: 92vh;
    overflow-y: auto;
    position: relative;
}
.modal-content.modal-md { max-width: 480px; }
.modal-content.modal-sm { max-width: 380px; }
.modal-content.modal-lg { max-width: 720px; }
.modal-content h3 {
    font-family: var(--jp);
    font-weight: 900;
    font-size: 1.25rem;
    color: var(--navy-0);
    margin: 0 0 16px 0;
    padding-bottom: 10px;
    border-bottom: 2.5px solid var(--navy-0);
}

/* モーダル内フォーム要素 */
.modal-content label {
    display: block;
    margin-bottom: 14px;
    font-family: var(--jp);
    font-weight: 700;
    font-size: 14px;
    color: var(--navy-1);
}
.modal-content label .req { color: #c53030; margin-left: 2px; }
.modal-content input[type="text"],
.modal-content input[type="date"],
.modal-content select,
.modal-content textarea {
    width: 100%;
    padding: 10px 12px;
    margin-top: 6px;
    font-size: 15px;
    font-family: var(--jp);
    font-weight: 500;
    color: var(--navy-0);
    background: #fff;
    border: 2.5px solid var(--navy-0);
    border-radius: 5px;
    box-sizing: border-box;
    transition: box-shadow 0.12s ease, border-color 0.12s ease;
}
.modal-content input[type="text"]:focus,
.modal-content input[type="date"]:focus,
.modal-content select:focus,
.modal-content textarea:focus {
    outline: none;
    border-color: var(--navy-0);
    box-shadow: 0 0 0 3px var(--accent);
}

/* 曜日チェックボックスのラベル */
#udc-current-days label,
#udc-new-days label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #fff;
    border: 2.5px solid var(--navy-0);
    border-radius: 5px;
    padding: 6px 12px;
    margin: 0;
    font-family: var(--jp);
    font-weight: 800;
    font-size: 16px;
    color: var(--navy-0);
    cursor: pointer;
    user-select: none;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
}
#udc-current-days label:hover,
#udc-new-days label:hover {
    transform: translate(-1px, -1px);
    box-shadow: 3px 3px 0 var(--navy-0);
}

/* 曜日×午前午後 行ボタン（2026-05-31・コンパクト版） */
#udc-current-days, #udc-new-days { flex-direction: column !important; flex-wrap: nowrap !important; padding: 8px !important; gap: 4px !important; }
.udc-day-row {
    display: flex;
    align-items: center;
    gap: 5px;
    width: 100%;
}
.udc-day-name {
    flex: 0 0 1.4em;
    font-family: var(--jp);
    font-weight: 800;
    font-size: 15px;
    color: var(--navy-0);
    text-align: center;
}
.udc-ap-btn {
    flex: 1 1 0;
    padding: 5px 0;
    font-family: var(--jp);
    font-weight: 800;
    font-size: 13.5px;
    color: var(--navy-0);
    background: #fff;
    border: 2px solid var(--navy-0);
    border-radius: 5px;
    cursor: pointer;
    user-select: none;
    transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.1s ease;
}
.udc-ap-btn:hover { transform: translate(-1px, -1px); box-shadow: 2px 2px 0 var(--navy-0); }
.udc-ap-btn.active { background: var(--navy-0); color: #fff; }
#udc-current-days input[type="checkbox"],
#udc-new-days input[type="checkbox"] {
    transform: scale(1.3);
    cursor: pointer;
    accent-color: var(--navy-0);
}
.modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 18px;
    flex-wrap: wrap;
}
.modal-actions.split { justify-content: space-between; align-items: center; }

/* 詳細モーダル：チェックリスト項目 */
.modal-content .detail-close {
    background: none;
    border: 2.5px solid var(--navy-0);
    border-radius: 5px;
    font-family: var(--jp);
    font-weight: 800;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 2px 12px;
    color: var(--navy-0);
    background: #fff;
    box-shadow: 3px 3px 0 var(--navy-0);
}
.modal-content .detail-close:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--navy-0); }
.modal-content .detail-close:active { transform: translate(3px, 3px); box-shadow: 0 0 0 var(--navy-0); }
.detail-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin: 0 0 16px 0;
    padding-bottom: 10px;
    border-bottom: 2.5px solid var(--navy-0);
}
.detail-header-row h3 {
    margin: 0; padding: 0; border: none;
    font-size: 1.15rem;
}
.detail-item {
    display: flex;
    align-items: flex-start;
    padding: 10px 6px;
    border-bottom: 1.5px solid var(--paper-deep);
}
.detail-item.is-done { opacity: 0.55; }
.detail-item input[type="checkbox"] {
    margin-right: 12px;
    margin-top: 4px;
    transform: scale(1.3);
    cursor: pointer;
    accent-color: var(--navy-0);
}
.detail-item-body { flex: 1; }
.detail-item-label {
    font-family: var(--jp);
    font-weight: 600;
    font-size: 0.95rem;
    line-height: 1.5;
    color: var(--navy-0);
}
.detail-item .urgent-on { color: #e53e3e; font-weight: 900; margin-right: 4px; }
.detail-item .urgent-off { opacity: 0.3; margin-right: 4px; cursor: pointer; user-select: none; }
.detail-item .urgent-toggle { cursor: pointer; user-select: none; margin-right: 4px; }
.detail-item .tag-select {
    font-size: 0.78rem;
    margin-left: 6px;
    padding: 2px 6px;
    border: 2px solid var(--navy-0);
    border-radius: 3px;
    background: var(--paper-deep);
    color: var(--navy-0);
    font-family: var(--jp);
    font-weight: 700;
    cursor: pointer;
}
.detail-item .tag-readonly {
    font-size: 0.78rem;
    color: #5b6477;
    margin-left: 6px;
    font-weight: 700;
}
.detail-item .edit-pen {
    cursor: pointer;
    color: var(--navy-2);
    margin-left: 6px;
    font-size: 0.85rem;
}
.detail-item .edit-pen:hover { color: var(--navy-0); }
.detail-item .done-line {
    font-size: 0.78rem;
    color: #6b7686;
    margin-top: 4px;
    font-weight: 500;
}
.detail-item .done-line .fix-link {
    cursor: pointer;
    color: var(--navy-2);
    margin-left: 6px;
    font-size: 0.82rem;
    font-weight: 700;
    text-decoration: underline;
}
.detail-footer-note {
    font-size: 0.8rem;
    color: #5b6477;
    padding: 12px 6px 4px;
    margin-top: 6px;

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ===== GAS API URL =====
const ABS_BOARD_API_URL = 'https://script.google.com/macros/s/AKfycbwo1UGxsK1qgmO8IDaqT-inDM0Qgoe_MRvxfKDxHy_gXANi4FwNFlgn2pEanMXVQxsdlw/exec';

// ===== 共通ユーティリティ（yawaragiボード.html から流用） =====
function showToast(msg, duration) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration || 2000);
}

function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

// ===== リトライ付きGAS POST送信 =====
// 3回まで再試行。失敗時はスタッフに警告表示
async function gasPost(data, label) {
    const maxRetries = 3;
    for (let i = 1; i <= maxRetries; i++) {
        try {
            await fetch(ABS_BOARD_API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return true; // ネットワーク送信成功
        } catch (err) {
            console.error('GAS送信エラー (' + i + '/' + maxRetries + '): ' + (label || ''), err);
            if (i < maxRetries) {
                await new Promise(r => setTimeout(r, 2000));
            }
        }
    }
    showToast('⚠️ 送信失敗！ネットワークを確認してください', 5000);
    return false;
}

// ============================================================
// ===== 2重押し防止ヘルパー（2026-05-22追加）=====
// 登録ボタンを押した瞬間に無効化し、送信中の連打による重複登録を防ぐ。
// lockSubmitBtn: 戻り値 = ボタン要素（ロック成功）／ false（2回目の押下）／ null（ボタン不在）
// ============================================================
function lockSubmitBtn(btnId, busyLabel) {
    const btn = document.getElementById(btnId);
    if (!btn) return null;                          // ボタン不在＝従来通り素通し
    if (btn.dataset.locked === '1') return false;   // 既にロック中＝2回目の押下
    btn.dataset.locked = '1';
    btn.dataset.origLabel = btn.textContent;
    btn.disabled = true;
    btn.style.opacity = '0.55';
    btn.style.cursor = 'not-allowed';
    btn.textContent = busyLabel || '送信中…';
    return btn;
}
function unlockSubmitBtn(btn) {
    if (!btn || btn === false) return;
    btn.dataset.locked = '0';
    btn.disabled = false;
    btn.style.opacity = '';
    btn.style.cursor = 'pointer';
    if (btn.dataset.origLabel) btn.textContent = btn.dataset.origLabel;
}

// ============================================================
// ===== 利用者イベント（契約後35項目チェックリスト） 2026/4/29 =====
// ============================================================
const EVT_API_URL = ABS_BOARD_API_URL; // 同じGAS（既存定数を再利用）
const EVT_LABEL_MAP = { usage_days_change: '利用曜日変更' };
const ALLOWED_EVENT_TYPES = ['usage_days_change'];
let _evtCache = [];          // 一覧キャッシュ
let _evtCurrent = null;      // 詳細表示中のイベント

// ----- 一覧取得（JSONP） -----
function evtLoadList(_retryCount) {
    _retryCount = _retryCount || 0;
    const host = document.getElementById('user-events-list');
    if (!host) return;
    host.innerHTML = '<p style="color:#5b6477; padding:20px; text-align:center; grid-column: 1 / -1;">' +
        (_retryCount > 0 ? '再読み込み中... (' + _retryCount + ')' : '読み込み中…') + '</p>';

    const cbName = 'evtListCb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const url = EVT_API_URL + '?action=user_events&callback=' + cbName;

    window[cbName] = function(resp) {
        try {
            const events = (resp && resp.user_events) ? resp.user_events : [];
            _evtCache = events;
            evtRenderList(events);
        } catch (e) {
            host.innerHTML = '<p style="color:#c53030; padding:20px; grid-column: 1 / -1;">描画エラー: ' + escapeHtml(e && e.message || String(e)) + '</p>';
        } finally {
            try { delete window[cbName]; } catch(e) {}
        }
    };

    const script = document.createElement('script');
    script.src = url;
    script.onerror = function() {
        host.innerHTML = '<p style="color:#c53030; padding:20px; grid-column: 1 / -1;">通信エラー：GASに接続できません。Ctrl+Shift+R でリロードしてください。</p>';
        try { delete window[cbName]; } catch(e) {}
    };
    document.body.appendChild(script);
    setTimeout(() => {
        try { script.remove(); } catch(e) {}
        if (typeof window[cbName] === 'function') {
            try { delete window[cbName]; } catch(e) {}
            if (_retryCount < 2) {
                setTimeout(() => evtLoadList(_retryCount + 1), 500);
            } else {
                host.innerHTML = '<p style="color:#c53030; padding:20px; grid-column: 1 / -1;">取得タイムアウト：GAS応答なし（リトライ2回失敗）</p>';
            }
        }
    }, 8000);
}

function evtRenderList(events) {
    const host = document.getElementById('user-events-list');
    events = (events || []).filter(e => ALLOWED_EVENT_TYPES.includes(e.eventType));
    if (events.length === 0) {
        host.innerHTML = '<div class="empty" style="grid-column: 1 / -1;">進行中のイベントはありません。</div>';
        const chip0 = document.getElementById('event-count-chip');
        if (chip0) chip0.textContent = '0件';
        return;
    }
    host.innerHTML = '';
    events.forEach(evt => host.appendChild(evtBuildCard(evt)));
    // section-bar の件数バッジを更新
    const chip = document.getElementById('event-count-chip');
    if (chip) chip.textContent = events.length + '件';
}

function evtBuildCard(evt) {
    const card = document.createElement('article');
    const isDone = evt.status === 'completed';
    // このアプリは usage_days_change 専用なので常に is-udc
    card.className = 'card is-udc' + (isDone ? ' is-done' : '');

    const typeLabel = EVT_LABEL_MAP[evt.eventType] || evt.eventType;
    const statusLabel = isDone ? '完了済み' : '進行中';
    const done = Number(evt.itemDone) || 0;
    const total = Number(evt.itemTotal) || 0;
    const pct = total > 0 ? Math.round((done / total) * 1000) / 10 : 0;
    const pctLabel = isDone ? '100% ✓' : (pct + '%');

    const meta = evt.metadata || {};
    const effDate = meta.effectiveDate || evt.eventDate || '';
    const prevDays = meta.currentDays || '';
    const newDays = meta.newDays || '';
    const prevCount = prevDays.split(',').filter(Boolean).length;
    const newCount = newDays.split(',').filter(Boolean).length;

    // 適用開始日（大型表示）
    const effBlock = effDate ? '<div class="udc-effective">🗓️ ' + escapeHtml(effDate) + ' から</div>' : '';

    // 曜日比較
    const daysBlock = (prevDays || newDays)
        ? '<div class="udc-days-change">' +
              '<b>旧: ' + escapeHtml(prevDays || '—') + ' 週' + prevCount + '</b>' +
              ' → ' +
              '<b>新: ' + escapeHtml(newDays || '—') + ' 週' + newCount + '</b>' +
          '</div>'
        : '';

    // メタ情報（記入者・ケアマネ・連絡日）
    const metaParts = [];
    if (meta.recorder) metaParts.push('📝 ' + escapeHtml(meta.recorder));
    if (meta.cmOffice) {
        let cm = meta.cmOffice;
        if (meta.cmContact) cm += ' ' + meta.cmContact;
        metaParts.push('📞 ' + escapeHtml(cm));
    }
    if (meta.contactDate) metaParts.push('📅 連絡日 ' + escapeHtml(meta.contactDate));
    if (meta.leadershipMemo) metaParts.push('🎯 ' + escapeHtml(meta.leadershipMemo));
    const metaLine = metaParts.length ? '<div class="card-meta">' + metaParts.join(' / ') + '</div>' : '';

    card.innerHTML =
        '<div class="card-head">' +
            '<span class="type-chip">' + escapeHtml(typeLabel) + '</span>' +
            '<span class="status-pill"><span class="d"></span>' + statusLabel + '</span>' +
        '</div>' +
        effBlock +
        '<div class="card-name">' + escapeHtml(evt.userName) + ' 様</div>' +
        daysBlock +
        metaLine +
        '<div class="progress-block">' +
            '<div class="progress-top">' +
                '<span class="progress-num">' + done + '<span class="of">/' + total + '</span></span>' +
                '<span class="progress-pct">' + pctLabel + '</span>' +
            '</div>' +
            '<div class="progress-bar"><div class="progress-fill" style="width: ' + pct + '%;"></div></div>' +
        '</div>';
    card.onclick = () => evtOpenDetail(evt);
    return card;
}

// ----- 詳細モーダル -----
function evtOpenDetail(evt) {
    _evtCurrent = evt;
    evtRenderDetailHeader(evt);
    evtRenderDetailBody(evt);
    document.getElementById('event-detail-modal').classList.add('show');
}

function evtCloseDetail() {
    document.getElementById('event-detail-modal').classList.remove('show');
    _evtCurrent = null;
}

function evtRenderDetailHeader(evt) {
    document.getElementById('event-detail-title').textContent =
        evt.userName + ' 様 / ' + (EVT_LABEL_MAP[evt.eventType] || evt.eventType) +
        '（' + evt.itemDone + '/' + evt.itemTotal + '）';
}

function evtRenderDetailBody(evt) {
    const body = document.getElementById('event-detail-body');
    const ownerLabel = { boss: '🔵社長', consultant: '🟢相談員', anyone: '🟡誰でも可' };
    if (!evt.items || evt.items.length === 0) {
        body.innerHTML = '<p style="color:#5b6477; padding:20px; text-align:center; font-weight:700;">項目がありません。</p>';
        return;
    }
    const html = evt.items.map(item => {
        const isDone = item.status === 'done';
        const safeId = escapeHtml(item.id).replace(/'/g, "\\'");
        const checkedAttr = isDone ? 'checked disabled' : '';
        const onChange = isDone ? '' : "onchange=\"evtCheckItem('" + safeId + "')\"";
        const doneLine = isDone
            ? '<div class="done-line">完了: ' + escapeHtml(item.doneAt) + ' by ' + escapeHtml(item.doneBy) +
              ' <span class="fix-link" onclick="evtOpenEditCompletion(\'' + safeId + '\')" title="完了日・完了者を訂正">✏️訂正</span></div>'
            : '';
        // 急ぎ・タグセレクト・編集ボタン（完了済みは編集不可）
        const urgentBtn = isDone
            ? (item.isUrgent ? '<span class="urgent-on">🚨</span>' : '')
            : '<span class="urgent-toggle ' + (item.isUrgent ? 'urgent-on' : 'urgent-off') + '" onclick="evtToggleUrgent(\'' + safeId + '\', ' + (item.isUrgent ? 'false' : 'true') + ')" title="急ぎ切替">🚨</span>';
        const tagSelect = isDone
            ? '<span class="tag-readonly">' + (ownerLabel[item.ownerTag] || escapeHtml(item.ownerTag)) + '</span>'
            : '<select class="tag-select" onchange="evtUpdateOwnerTag(\'' + safeId + '\', this.value)">' +
                '<option value="boss"' + (item.ownerTag === 'boss' ? ' selected' : '') + '>🔵社長</option>' +
                '<option value="consultant"' + (item.ownerTag === 'consultant' ? ' selected' : '') + '>🟢相談員</option>' +
                '<option value="anyone"' + (item.ownerTag === 'anyone' ? ' selected' : '') + '>🟡誰でも可</option>' +
              '</select>';
        const editBtn = isDone
            ? ''
            : ' <span class="edit-pen" onclick="evtEditLabel(\'' + safeId + '\')" title="文言編集">✏️</span>';
        return '<div class="detail-item' + (isDone ? ' is-done' : '') + '">' +
            '<input type="checkbox" ' + checkedAttr + ' ' + onChange + '>' +
            '<div class="detail-item-body">' +
                '<div class="detail-item-label">' +
                    urgentBtn + item.seq + '. ' + escapeHtml(item.label) + editBtn +
                    tagSelect +
                '</div>' +
                doneLine +
            '</div>' +
        '</div>';
    }).join('');
    body.innerHTML = html +
        '<div class="detail-footer-note">' +
        'ℹ️ 全項目を完了すると、代表に通知メールが届きます。</div>';
}

// タグ変更（boss/consultant/anyone）
async function evtUpdateOwnerTag(itemId, newTag) {
    const ok = await gasPost({ action: 'update_event_item', itemId: itemId, ownerTag: newTag }, '項目タグ更新');
    if (!ok) { alert('タグ更新に失敗しました'); return; }
    setTimeout(() => evtRefreshAfterUpdate(), 800);
}

// 急ぎフラグ切替
async function evtToggleUrgent(itemId, newIsUrgent) {
    const ok = await gasPost({ action: 'update_event_item', itemId: itemId, isUrgent: newIsUrgent }, '項目急ぎ切替');
    if (!ok) { alert('急ぎ切替に失敗しました'); return; }
    setTimeout(() => evtRefreshAfterUpdate(), 800);
}

// 文言編集
async function evtEditLabel(itemId) {
    if (!_evtCurrent) return;
    const item = _evtCurrent.items.find(it => it.id === itemId);
    if (!item) return;
    const newLabel = prompt('項目の文言を編集', item.label);
    if (newLabel === null) return;  // キャンセル
    const trimmed = String(newLabel).trim();
    if (!trimmed) { alert('文言は空にできません'); return; }
    if (trimmed === item.label) return;  // 変更なし
    const ok = await gasPost({ action: 'update_event_item', itemId: itemId, label: trimmed }, '項目文言更新');
    if (!ok) { alert('文言更新に失敗しました'); return; }
    setTimeout(() => evtRefreshAfterUpdate(), 800);
}

async function evtCheckItem(itemId) {
    const doneBy = prompt('完了者を入力してください', localStorage.getItem('yawaragi_staff') || '');

        alert('完了者が必要です');

        action: 'complete_event_item',
        itemId: itemId,
        doneBy: doneBy.trim()
    }, '利用者イベント項目完了');

        if (_evtCurrent) evtRenderDetailBody(_evtCurrent);
        return;
    }
    // 1秒待ってから一覧再取得 → モーダル更新
    setTimeout(async () => {

        _evtCache = updated;
        evtRenderList(updated);
        if (_evtCurrent) {
            const refreshed = updated.find(e => e.id === _evtCurrent.id);
            if (refreshed) {
                _evtCurrent = refreshed;
                evtRenderDetailHeader(refreshed);
                evtRenderDetailBody(refreshed);

// JSONPでイベント一覧を取得（Promise化）
function evtFetchList() {
    return new Promise(resolve => {
        const cbName = 'evtFetchCb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        const url = EVT_API_URL + '?action=user_events&callback=' + cbName;
        let resolved = false;
        window[cbName] = function(resp) {
            if (resolved) return;
            resolved = true;
            const events = (resp && resp.user_events) ? resp.user_events : [];
            try { delete window[cbName]; } catch(e) {}
            resolve(events);
        };
        const script = document.createElement('script');
        script.src = url;
        script.onerror = function() {
            if (resolved) return;
            resolved = true;
            try { delete window[cbName]; } catch(e) {}
            resolve([]);
        };
        document.body.appendChild(script);
        setTimeout(() => {
            try { script.remove(); } catch(e) {}
            if (!resolved) {
                resolved = true;
                try { delete window[cbName]; } catch(e) {}
                resolve([]);
            }
        }, 8000);
    });
}

async function _populateStaffSelects() {

    ids.forEach(id => {
        const sel = document.getElementById(id);
        if (!sel) return;
        const current = sel.value;

    });

// 非表示事業所のSet（office名のみで非表示判定）
function _cmGetHiddenOffices() {
    const officeAllRows = {};
    (_cmContactsList || []).forEach(c => {
        if (!c.office) return;
        if (!officeAllRows[c.office]) officeAllRows[c.office] = { total: 0, hidden: 0, hasNameEmpty: false };
        officeAllRows[c.office].total++;
        if (c.hidden) officeAllRows[c.office].hidden++;
        if (c.hidden && (!c.name || c.name.length === 0)) officeAllRows[c.office].hasNameEmpty = true;
    });
    const hidden = new Set();
    Object.keys(officeAllRows).forEach(office => {
        const r = officeAllRows[office];
        if (r.hasNameEmpty) hidden.add(office);
    });
    return hidden;
}

// 非表示担当者のSet（"office\nname" キー）
function _cmGetHiddenStaffKeys() {
    const set = new Set();
    (_cmContactsList || []).forEach(c => {
        if (c.hidden && c.name && c.name.length > 0) set.add(c.office + '\n' + c.name);
    });
    return set;
}

// cmContacts と 利用者台帳の両方から「yawaragi接点のあった事業所」を集計（非表示除外）
function _cmGetAllOffices() {
    const hiddenOffices = _cmGetHiddenOffices();
    const fromContacts = (_cmContactsList || []).map(c => c.office);
    const fromUsers = (_cmUserList || []).map(u => u.currentCmOffice);
    return Array.from(new Set([...fromContacts, ...fromUsers].filter(o => o && o.length > 0 && !hiddenOffices.has(o))))
        .sort((a, b) => a.localeCompare(b, 'ja'));
}

// cmContacts と 利用者台帳の両方から「指定事業所の担当者」を集計（非表示除外）
function _cmGetStaffsByOffice(office) {
    const hiddenStaffKeys = _cmGetHiddenStaffKeys();
    const fromContacts = (_cmContactsList || [])
        .filter(c => c.office === office && c.name && c.name.length > 0 && !c.hidden)
        .map(c => c.name);
    const fromUsers = (_cmUserList || [])
        .filter(u => u.currentCmOffice === office && u.currentCmStaff && u.currentCmStaff.length > 0)
        .filter(u => !hiddenStaffKeys.has(office + '\n' + u.currentCmStaff))
        .map(u => u.currentCmStaff);
    return Array.from(new Set([...fromContacts, ...fromUsers]))
        .sort((a, b) => a.localeCompare(b, 'ja'));
}

var UDC_TOTAL_STEPS = 10;
const UDC_WEEKDAYS = ['月', '火', '水', '木', '金', '土'];

// ----- モーダル開閉 -----
function udcOpenWizard() {
    udcCurrentStep = 1;
    udcInitForm();
    // 記入者プルダウン: _staffListが既にキャッシュされていれば即時再流し込み
    _populateStaffSelects().then(() => {

        const rec = document.getElementById('udc-recorder-select');
        if (rec && !Array.from(rec.options).some(function(o) { return o.value === '比嘉'; })) {
            const opt = document.createElement('option');

            opt.textContent = '比嘉';
            rec.appendChild(opt);
        }
        // 記入者デフォルトは空にする（前回入力者が残ると別人がそのまま登録する誤記録の元・2026-05-31）
        document.getElementById('udc-recorder-select').value = '';
    });

    udcShowStep(1);
}

function udcCloseWizard() {
    document.getElementById('udc-wizard-modal').classList.remove('show');
}

function udcShowStep(n) {
    document.querySelectorAll('.wizard-step').forEach(el => {
        el.style.display = 'none';
    });
    const target = document.querySelector('.wizard-step[data-step="' + n + '"]');
    if (target) target.style.display = 'block';
    document.getElementById('udc-step-indicator').textContent = 'Step ' + n + ' / ' + UDC_TOTAL_STEPS;
    // 戻るボタン
    document.getElementById('udc-btn-prev').style.display = (n > 1) ? 'inline-block' : 'none';
    // 次へ／登録 ボタン
    if (n < UDC_TOTAL_STEPS) {
        document.getElementById('udc-btn-next').style.display = 'inline-block';
        document.getElementById('udc-btn-submit').style.display = 'none';
    } else {
        document.getElementById('udc-btn-next').style.display = 'none';
        document.getElementById('udc-btn-submit').style.display = 'inline-block';
    }
}

function udcNext() {
    if (!udcValidateStep(udcCurrentStep)) return;
    udcCurrentStep++;
    udcShowStep(udcCurrentStep);
}

function udcPrev() {
    if (udcCurrentStep > 1) {
        udcCurrentStep--;
        udcShowStep(udcCurrentStep);
    }
}

function udcValidateStep(n) {
    switch (n) {
        case 1: {
            if (!udcSelectedUser) { alert('利用者を選んでください'); return false; }
            return true;
        }
        case 2: {
            const v = document.getElementById('udc-recorder-select').value.trim();
            if (!v) { alert('記入者を選んでください'); return false; }
            return true;
        }
        case 3: {
            const v = document.getElementById('udc-contact-date').value;
            if (!v) { alert('連絡日を入力してください'); return false; }
            return true;
        }
        case 4: {
            const sel = document.getElementById('udc-cm-office');
            const v = sel.value;
            if (!v) { alert('ケアマネ事業所を選んでください'); return false; }
            if (v === '__OTHER__') {
                const manual = document.getElementById('udc-cm-office-other').value.trim();
                if (!manual) { alert('事業所名を入力してください'); return false; }
            }
            return true;
        }
        case 5: {
            const sel = document.getElementById('udc-cm-contact');
            const v = sel.value;
            if (!v) { alert('ケアマネ担当者を選んでください'); return false; }
            if (v === '__OTHER__') {
                const manual = document.getElementById('udc-cm-contact-other').value.trim();
                if (!manual) { alert('担当者名を入力してください'); return false; }
            }
            return true;
        }
        case 6: {
            const days = udcGetCheckedDays('udc-current-days');
            if (days.length === 0) { alert('現在の利用日（曜日＋午前/午後）を1つ以上選んでください'); return false; }
            return true;
        }
        case 7: {
            const days = udcGetCheckedDays('udc-new-days');
            if (days.length === 0) { alert('変更後の利用日（曜日＋午前/午後）を1つ以上選んでください'); return false; }
            return true;
        }
        case 8: {
            const v = document.getElementById('udc-effective-date').value;
            if (!v) { alert('適用開始日を入力してください'); return false; }
            return true;
        }
        case 9: {
            const v = document.getElementById('udc-leadership-memo').value;
            if (!v) { alert('変更の発信元を選んでください'); return false; }
            return true;
        }
        case 10:
            return true; // 任意
        default:
            return true;
    }
}

function udcGetCheckedDays(containerId) {

        searchInput.oninput = function() {

                return u.userName.indexOf(q) !== -1 ||

            }).slice(0, 10);

            suggestions.innerHTML = matches.map(function(u) {

                    u.userName.replace(/'/g, "\\'") + '\')">' + escapeHtml(u.userName) +
                    (u.userNameKana ? ' <span style="color:#6b7686; font-size:0.78rem; font-weight:500;">(' + escapeHtml(u.userNameKana) + ')</span>' : '') +
                    '</div>';
            }).join('');
            suggestions.style.display = 'block';

    document.getElementById('udc-contact-date').value = udcToday();
    document.getElementById('udc-effective-date').value = udcNextMonthFirst();

    // 3. 曜日チェックボックス初期化

// ----- 利用者検索ボックス：候補クリックで確定（2026-05-22）-----
function udcSelectUser(userName) {
    const user = (_cmUserList || []).find(function(u) { return u.userName === userName; });
    if (!user) return;
    udcSelectedUser = user;
    document.getElementById('udc-user-search').value = userName;
    document.getElementById('udc-user-suggestions').style.display = 'none';

    // 利用曜日＋午前/午後を利用者台帳から Step 6 / Step 7 に自動セット（2026-05-31）
    udcSetWeekdayCheckboxes('udc-current-days', user.days || '', user.ampm || '');
    udcSetWeekdayCheckboxes('udc-new-days', user.days || '', user.ampm || '');
    // ケアマネ事業所・担当者を利用者台帳から Step 4 / Step 5 に自動セット（2026-05-31）
    udcPrefillCaremanager(user);
}

// 利用者台帳の currentCmOffice / currentCmStaff を Step 4・5 にプリフィル（手入力負担の削減）
// ケアマネ事業所プルダウンは _cmFetchContacts() で非同期構築されるため、完了を待ってからセット
// （待たないと .then による innerHTML 再構築でセット値が上書きされ消える）
function udcPrefillCaremanager(user) {
    const office = (user.currentCmOffice || '').trim();
    if (!office) return;   // 台帳にケアマネ事業所が無ければ手動選択にフォールバック
    const staff = (user.currentCmStaff || '').trim();
    _cmFetchContacts().then(function() {
        const officeSel = document.getElementById('udc-cm-office');
        if (!officeSel) return;
        // 事業所がプルダウンに無ければ動的に追加（非表示事業所でも確実にセット）
        if (!Array.from(officeSel.options).some(function(o) { return o.value === office; })) {
            const opt = document.createElement('option');
            opt.value = office; opt.textContent = office;
            officeSel.appendChild(opt);
        }
        officeSel.value = office;
        udcOnOfficeChange();   // 担当者プルダウンを連動生成
        // 担当者をセット
        if (staff) {
            const staffSel = document.getElementById('udc-cm-contact');
            if (staffSel) {
                if (!Array.from(staffSel.options).some(function(o) { return o.value === staff; })) {
                    const opt = document.createElement('option');
                    opt.value = staff; opt.textContent = staff;
                    staffSel.appendChild(opt);
                }
                staffSel.value = staff;
            }
        }
    });
}

function udcToday() {
    return new Date().toISOString().slice(0, 10);
}

function udcNextMonthFirst() {
    const d = new Date();
    d.setDate(1);
    d.setMonth(d.getMonth() + 1);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    return y + '-' + m + '-01';
}

                btn.type = 'button';
                btn.className = 'udc-ap-btn';
                btn.textContent = ap;
                btn.dataset.day = d;
                btn.dataset.ampm = ap;
                btn.onclick = function() { btn.classList.toggle('active'); };
                row.appendChild(btn);
            });
            container.appendChild(row);
        });
    });
}

// 台帳の「利用曜日(月火水)」＋「午前/午後」から、各曜日の利用スロットを復元
// 複合パターン（「月午前、木午後」）も単純パターン（「午前」「午前午後」）も対応
function udcParseUsagePattern(daysString, ampmString) {
    const WD = ['月', '火', '水', '木', '金', '土'];
    const result = [];
    const ampm = (ampmString || '').trim();
    // 複合パターン：午前/午後欄に曜日名が含まれる（例「月午前、木午後」）
    if (WD.some(function(d) { return ampm.indexOf(d) >= 0; })) {
        ampm.split(/[,、・\s]+/).filter(Boolean).forEach(function(part) {
            const d = WD.filter(function(x) { return part.indexOf(x) >= 0; })[0];
            if (!d) return;
            if (part.indexOf('午前') >= 0) result.push(d + '午前');
            if (part.indexOf('午後') >= 0) result.push(d + '午後');
        });
        return result;
    }
    // 単純パターン：利用曜日の各曜日に午前/午後を一律適用
    // 台帳の曜日は「火木」のように区切りなしで連続するため、含まれる曜日文字を抽出
    const days = WD.filter(function(d) { return (daysString || '').indexOf(d) >= 0; });
    let aps = [];
    const hasAm = ampm.indexOf('午前') >= 0;
    const hasPm = ampm.indexOf('午後') >= 0;
    if (ampm === '両方' || (hasAm && hasPm)) aps = ['午前', '午後'];
    else if (hasPm) aps = ['午後'];
    else if (hasAm) aps = ['午前'];
    days.forEach(function(d) { aps.forEach(function(a) { result.push(d + a); }); });
    return result;
}

// daysString＋ampmString（台帳形式）または「月午前,火午後」形式を受け取りボタンを点灯
function udcSetWeekdayCheckboxes(containerId, daysString, ampmString) {
    document.querySelectorAll('#' + containerId + ' .udc-ap-btn').forEach(function(btn) {
        btn.classList.remove('active');
    });
    let slots;
    // daysString が既に「月午前」形式（午前/午後を含む）ならそのまま、そうでなければ台帳パース
    if (/午前|午後/.test(daysString || '') && !ampmString) {
        slots = (daysString || '').split(/[,、・\s]/).filter(Boolean);
    } else {
        slots = udcParseUsagePattern(daysString, ampmString);
    }
    slots.forEach(function(slot) {
        const m = slot.match(/^(.)(午前|午後)$/);
        if (!m) return;
        const btn = document.querySelector('#' + containerId + ' .udc-ap-btn[data-day="' + m[1] + '"][data-ampm="' + m[2] + '"]');
        if (btn) btn.classList.add('active');
    });
}

// ----- ケアマネ事業所＋担当者 -----
function udcInitCmDropdowns() {
    // コンテンツをリセット
    document.getElementById('udc-cm-office').innerHTML = '<option value="">選択してください</option>';
    document.getElementById('udc-cm-contact').innerHTML = '<option value="">先に事業所を選んでください</option>';
    document.getElementById('udc-cm-office-other').style.display = 'none';
    document.getElementById('udc-cm-office-other').value = '';
    document.getElementById('udc-cm-contact-other').style.display = 'none';
    document.getElementById('udc-cm-contact-other').value = '';

    _cmFetchContacts().then(function() {
        const officeSel = document.getElementById('udc-cm-office');
        officeSel.innerHTML = '<option value="">選択してください</option>' +
            '<option value="__OTHER__">その他（手入力）</option>';
        _cmGetAllOffices().forEach(function(office) {
            const opt = document.createElement('option');
            opt.value = office;
            opt.textContent = office;
            officeSel.appendChild(opt);
        });
        // 担当者連動
        officeSel.onchange = function() { udcOnOfficeChange(); };

        // 担当者初期化
        const staffSel = document.getElementById('udc-cm-contact');
        staffSel.innerHTML = '<option value="">先に事業所を選んでください</option>';
    });
}

function udcOnOfficeChange() {
    const officeSel = document.getElementById('udc-cm-office');
    const office = officeSel.value;
    const staffSel = document.getElementById('udc-cm-contact');
    const officeOther = document.getElementById('udc-cm-office-other');
    const contactOther = document.getElementById('udc-cm-contact-other');

    if (office === '__OTHER__') {
        officeOther.style.display = 'block';
        officeOther.focus();
        staffSel.innerHTML = '<option value="__OTHER__">手入力</option>';
        staffSel.value = '__OTHER__';
        contactOther.style.display = 'block';
    } else if (office) {
        officeOther.style.display = 'none';
        officeOther.value = '';
        contactOther.style.display = 'none';
        contactOther.value = '';
        staffSel.innerHTML = '<option value="">選択してください</option>' +
            '<option value="__OTHER__">その他（手入力）</option>';
        _cmGetStaffsByOffice(office).forEach(function(s) {
            const opt = document.createElement('option');
            opt.value = s;
            opt.textContent = s;
            staffSel.appendChild(opt);
        });
        staffSel.onchange = function() {
            contactOther.style.display = (staffSel.value === '__OTHER__') ? 'block' : 'none';
            if (staffSel.value === '__OTHER__') contactOther.focus();
        };
    } else {
        officeOther.style.display = 'none';
        officeOther.value = '';
        contactOther.style.display = 'none';
        contactOther.value = '';
        staffSel.innerHTML = '<option value="">先に事業所を選んでください</option>';
    }
}

// ----- 登録処理 -----
async function udcSubmit() {
    // 全ステップ再バリデーション
    for (var i = 1; i <= UDC_TOTAL_STEPS; i++) {
        if (!udcValidateStep(i)) {
            udcCurrentStep = i;
            udcShowStep(i);
            return;
        }
    }

    const userName = udcSelectedUser ? udcSelectedUser.userName : '';
    const recorder = document.getElementById('udc-recorder-select').value.trim();
    const contactDate = document.getElementById('udc-contact-date').value;

    let cmOffice = document.getElementById('udc-cm-office').value;
    let cmContact = document.getElementById('udc-cm-contact').value;
    if (cmOffice === '__OTHER__') cmOffice = document.getElementById('udc-cm-office-other').value.trim();
    if (cmContact === '__OTHER__') cmContact = document.getElementById('udc-cm-contact-other').value.trim();

    const currentDays = udcGetCheckedDays('udc-current-days').join(',');
    const newDays = udcGetCheckedDays('udc-new-days').join(',');
    const effectiveDate = document.getElementById('udc-effective-date').value;
    const leadershipMemo = document.getElementById('udc-leadership-memo').value;
    const memo = document.getElementById('udc-memo').value;

    if (currentDays === newDays) {
        if (!confirm('現在の曜日と変更後の曜日が同じですが、登録しますか？')) return;
    }

    try { localStorage.setItem('yawaragi_staff', recorder); } catch(e) {}

    // 2重押し防止：登録中はボタンを無効化
    const _btn = lockSubmitBtn('udc-btn-submit', '登録中…');
    if (_btn === false) return;   // 送信中の2回目押下は無視

    let ok = false;
    try {
        const payload = {
            action: 'add_user_event',
            eventType: 'usage_days_change',
            userName: userName,
            eventDate: effectiveDate,
            createdBy: recorder,
            metadata: {
                recorder: recorder,
                contactDate: contactDate,
                cmOffice: cmOffice,
                cmContact: cmContact,
                currentDays: currentDays,
                newDays: newDays,
                effectiveDate: effectiveDate,
                leadershipMemo: leadershipMemo,
                memo: memo
            }
        };
        ok = await gasPost(payload, '利用曜日変更イベント登録');
    } finally {
        unlockSubmitBtn(_btn);
    }

    if (ok) {
        alert('✅ 登録しました：' + userName + ' 様 利用曜日変更（' + currentDays + ' → ' + newDays + '）');
        udcCloseWizard();
        setTimeout(evtLoadList, 1200);
    }
}

window.addEventListener('DOMContentLoaded', function() {
    evtLoadList();
    _populateStaffSelects(); // 入力者プルダウンにスタッフ名を流し込む
});
