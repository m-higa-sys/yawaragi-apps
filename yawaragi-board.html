const JIS_ORAL_SYNC_URL = 'https://script.google.com/macros/s/AKfycbyJtAHueOf4_F4EcVpXO1-6mksEcmJChCKxT7J28XNQNp9S8ZMFOMDyq4v4ML1C1qxP/exec';

let jisFilter = 'all'; // 'all' | 'am' | 'pm'
let jisOralData = null; // 口腔チェックデータ
let jisAbsenceData = []; // 欠席データ（GASから取得）

function jisSetFilter(f, btn) {
    jisFilter = f;
    document.querySelectorAll('.jis-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    jisRender();
}

function jisLoad() {
    const month = document.getElementById('jis-month').value;
    if (!month) { alert('月を選んでください'); return; }

    const status = document.getElementById('jis-status');
    status.textContent = '読み込み中...';

    // 口腔チェックデータと欠席データを並行取得
    let loaded = 0;
    const total = 2;
    const checkDone = () => { loaded++; if (loaded >= total) { status.textContent = '取得完了'; jisRender(); } };

    // 1. 口腔チェックデータ取得（JSONP）
    const cbOral = '_jisOralCb_' + Date.now();
    window[cbOral] = function(data) {
        delete window[cbOral];
        if (data && data.checks) jisOralData = data.checks;
        checkDone();
    };
    const scriptOral = document.createElement('script');
    scriptOral.src = JIS_ORAL_SYNC_URL + '?action=getOral&callback=' + cbOral + '&t=' + Date.now();
    scriptOral.onerror = () => { delete window[cbOral]; checkDone(); };
    document.body.appendChild(scriptOral);

    // 2. 欠席データ取得（yawaragiボードGAS JSONP）
    const cbAbs = '_jisAbsCb_' + Date.now();
    window[cbAbs] = function(data) {
        delete window[cbAbs];
        if (data && data.absences) jisAbsenceData = data.absences;
        checkDone();
    };
    const scriptAbs = document.createElement('script');
    // 月の1日を指定して14日分ではなく、全月分取得したいので、直接出欠変更を見る
    // yawaragiボードGASは今日起点で14日先までなので、localStorageの欠席データも併用
    scriptAbs.src = ABS_BOARD_API_URL + '?action=absences&date=' + month + '-01&callback=' + cbAbs + '&t=' + Date.now();
    scriptAbs.onerror = () => { delete window[cbAbs]; checkDone(); };
    document.body.appendChild(scriptAbs);
}

function jisRender() {
    const month = document.getElementById('jis-month').value;
    if (!month) return;

    const [yearStr, monStr] = month.split('-');
    const year = parseInt(yearStr);
    const mon = parseInt(monStr);

    // この月の日数
    const daysInMonth = new Date(year, mon, 0).getDate();

    // 利用者一覧
    let users = absGetUsers();
    if (users.length === 0) {
        document.getElementById('jis-table-wrap').innerHTML = '<p style="text-align:center; color:#a0aec0; padding:40px;">利用者データがありません</p>';
        return;
    }

    // フィルター適用
    if (jisFilter === 'am') {
        users = users.filter(u => u.pattern && u.pattern.some(p => p.unit === 'am'));
    } else if (jisFilter === 'pm') {
        users = users.filter(u => u.pattern && u.pattern.some(p => p.unit === 'pm'));
    }

    // 欠席マップ作成（日付+名前 → 理由）
    const absMap = {};
    // localStorageから
    const localRecords = absGetRecords();
    localRecords.forEach(r => {
        const from = new Date(r.dateFrom);
        const to = new Date(r.dateTo);
        for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
            const key = d.toISOString().slice(0, 10) + '_' + r.userName;
            absMap[key] = r.reason;
        }
    });
    // GASから取得した欠席データも追加
    if (jisAbsenceData) {
        jisAbsenceData.forEach(a => {
            absMap[a.date + '_' + a.name] = a.reason;
        });
    }

    // 口腔チェックマップ作成（名前 → { "4月_1回目": "4/7", ... }）
    const fiscalYear = mon >= 4 ? year : year - 1;
    const monthLabel = mon + '月';
    const oralMap = {};
    if (jisOralData && jisOralData[fiscalYear]) {
        Object.keys(jisOralData[fiscalYear]).forEach(name => {
            const checks = jisOralData[fiscalYear][name];
            oralMap[name] = {};
            // この月の口腔チェック日を抽出
            Object.keys(checks).forEach(key => {
                if (key.startsWith(monthLabel + '_')) {
                    const val = checks[key];
                    if (val) oralMap[name][key] = val;
                }
            });
        });
    }

    // テーブル生成
    const dowNames = ['日','月','火','水','木','金','土'];
    let html = '<table class="jis-table"><thead><tr>';
    html += '<th class="jis-name-col">利用者</th>';

    // 日付ヘッダー
    for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, mon - 1, d);
        const dow = date.getDay();
        let dowClass = '';
        if (dow === 0) dowClass = 'jis-sun';
        else if (dow === 6) dowClass = 'jis-sat';
        html += `<th class="jis-day-header"><div>${d}</div><div class="jis-dow ${dowClass}">${dowNames[dow]}</div></th>`;
    }
    html += '<th class="jis-summary-col">出席</th>';
    html += '<th class="jis-summary-col">口腔</th>';
    html += '</tr></thead><tbody>';

    users.forEach(u => {
        html += '<tr>';
        html += `<td class="jis-name-cell">${u.name}</td>`;

        let attendCount = 0;
        let totalDays = 0;

        for (let d = 1; d <= daysInMonth; d++) {
            const date = new Date(year, mon - 1, d);
            const dow = date.getDay();
            const dateStr = `${year}-${String(mon).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

            // この曜日に通所するか
            const isScheduled = u.pattern && u.pattern.some(p => {
                if (p.day !== dow) return false;
                if (jisFilter === 'am') return p.unit === 'am';
                if (jisFilter === 'pm') return p.unit === 'pm';
                return true;
            });

            if (!isScheduled) {
                html += '<td class="jis-not-day"></td>';
                continue;
            }

            totalDays++;
            const absKey = dateStr + '_' + u.name;
            const isAbsent = absMap[absKey];

            if (isAbsent) {
                html += `<td class="jis-absent" title="${isAbsent}">✕</td>`;
            } else {
                attendCount++;
                // 口腔チェックがこの日に実施されたか
                let oralMark = '';
                if (oralMap[u.name]) {
                    Object.values(oralMap[u.name]).forEach(val => {
                        if (typeof val === 'string' && val === `${mon}/${d}`) {
                            oralMark = '<br><span class="jis-oral">口</span>';
                        }
                    });
                }
                html += `<td class="jis-attend">○${oralMark}</td>`;
            }
        }

        // 月計
        html += `<td class="jis-summary-col">${attendCount}/${totalDays}</td>`;

        // 口腔チェック回数
        const oralCount = oralMap[u.name] ? Object.keys(oralMap[u.name]).length : 0;
        const today = new Date();
        const isCurrentMonth = (today.getFullYear() === year && today.getMonth() + 1 === mon);
        const isLateMonth = isCurrentMonth && today.getDate() >= 20;
        const warnOral = oralCount === 0 && isLateMonth;
        html += `<td class="jis-summary-col ${warnOral ? 'jis-warn' : ''}">${oralCount}回${warnOral ? ' !!!' : ''}</td>`;

        html += '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('jis-table-wrap').innerHTML = html;
}

let attCurrentDate = new Date();
const ATT_DAY_NAMES = ['日','月','火','水','木','金','土'];
const ATT_CACHE_KEY = 'yawaragi_att_cache';

function attFormatDate(d) {
    return d.getFullYear() + '-' +
        String(d.getMonth()+1).padStart(2,'0') + '-' +
        String(d.getDate()).padStart(2,'0');
}

function attUpdateDateLabel() {
    const d = attCurrentDate;
    const m = d.getMonth() + 1;
    const day = d.getDate();
    const dow = ATT_DAY_NAMES[d.getDay()];
    document.getElementById('att-date-label').textContent = m + '月' + day + '日';
    document.getElementById('att-dow-label').textContent = '（' + dow + '曜日）';
}

function attChangeDate(offset) {
    attCurrentDate.setDate(attCurrentDate.getDate() + offset);
    attUpdateDateLabel();
    attLoad();
}

function attGoToday() {
    attCurrentDate = new Date();
    attUpdateDateLabel();
    attLoad();
}

function attLoad() {
    const dateStr = attFormatDate(attCurrentDate);
    const content = document.getElementById('att-content');

    // キャッシュがあれば即表示
    let cacheShown = false;
    try {
        const cache = JSON.parse(localStorage.getItem(ATT_CACHE_KEY) || '{}');
        if (cache[dateStr]) {
            attRender(cache[dateStr]);
            cacheShown = true;
        }
    } catch {}

    if (!cacheShown) {
        content.innerHTML = '<div class="att-loading">読み込み中...</div>';
        document.getElementById('att-status-bar').innerHTML = '';
    }

    // GASから最新データを取得（裏で更新）
    const cbName = 'attCallback_' + Date.now();
    window[cbName] = function(data) {
        delete window[cbName];
        const scriptEl = document.getElementById('att-script');
        if (scriptEl) scriptEl.remove();

        if (!data.success || !data.attendance) {
            if (!cacheShown) content.innerHTML = '<div class="att-loading">データを取得できませんでした</div>';
            return;
        }

        // キャッシュに保存（日付ごと、最大7日分保持）
        try {
            const cache = JSON.parse(localStorage.getItem(ATT_CACHE_KEY) || '{}');
            cache[dateStr] = data.attendance;
            const keys = Object.keys(cache).sort();
            while (keys.length > 7) { delete cache[keys.shift()]; }
            localStorage.setItem(ATT_CACHE_KEY, JSON.stringify(cache));
        } catch {}

        attRender(data.attendance);
    };

    const script = document.createElement('script');
    script.id = 'att-script';
    script.src = ABS_BOARD_API_URL + '?action=attendance&date=' + dateStr + '&callback=' + cbName + '&t=' + Date.now();
    script.onerror = function() {
        delete window[cbName];
        if (!cacheShown) content.innerHTML = '<div class="att-loading">通信エラー。再読み込みしてください。</div>';
    };
    document.body.appendChild(script);
}

function attRender(data) {
    const content = document.getElementById('att-content');
    const statusBar = document.getElementById('att-status-bar');

    // データを保持（欠席登録への遷移用）
    attLastData = { am: data.am.slice(), pm: data.pm.slice() };

    // 出席予定データから利用者キャッシュを補完
    const seen = {};
    data.am.concat(data.pm).forEach(u => {
        if (!seen[u.name]) {
            seen[u.name] = true;
            const existing = absUserCache.find(c => c.name === u.name);
            if (existing) {
                if (!existing.reading && u.kana) existing.reading = u.kana;
                if (!existing.care && u.care) existing.care = u.care;
                if (!existing.cmOffice && u.cmOffice) existing.cmOffice = u.cmOffice;
            } else {
                absUserCache.push({
                    name: u.name, reading: u.kana || '', pattern: [],
                    care: u.care || '', cmOffice: u.cmOffice || ''
                });
            }
        }
    });
    if (absUserCache.length > 0) absUserLoaded = true;

    // ローカルの欠席データも反映（GASに未送信のもの）
    const localRecords = absGetRecords();
    const dateStr = attFormatDate(attCurrentDate);
    const localAbsMap = {};
    localRecords.forEach(r => {
        if (r.dateFrom <= dateStr && r.dateTo >= dateStr) {
            localAbsMap[r.userName] = r.reason;
        }
    });

    // ローカル欠席をGASデータにマージ
    [data.am, data.pm].forEach(list => {
        list.forEach(u => {
            if (u.status !== '欠席' && localAbsMap[u.name]) {
                u.status = '欠席';
                u.reason = localAbsMap[u.name];
            }
        });
    });

    const amPresent = data.am.filter(u => u.status === '出席').length;
    const amAbsent = data.am.filter(u => u.status === '欠席').length;
    const pmPresent = data.pm.filter(u => u.status === '出席').length;
    const pmAbsent = data.pm.filter(u => u.status === '欠席').length;

    statusBar.innerHTML =
        '<span class="att-count-present">出席 ' + (amPresent + pmPresent) + '</span>' +
        '<span class="att-count-absent">欠席 ' + (amAbsent + pmAbsent) + '</span>';

    let html = '';

    // 午前
    html += '<div class="att-unit-section">';
    html += '<div class="att-unit-header am">';
    html += '<span>午前の部（9:00〜12:00）</span>';
    html += '<span class="att-unit-count">' + amPresent + '人出席';
    if (amAbsent > 0) html += '　' + amAbsent + '人欠席';
    html += '</span></div>';
    html += '<div class="att-user-list">';
    if (data.am.length === 0) {
        html += '<div class="att-empty">通所予定の利用者がいません</div>';
    } else {
        // 出席を先に、欠席を後に
        const amSorted = data.am.slice().sort((a, b) => {
            if (a.status === '出席' && b.status !== '出席') return -1;
            if (a.status !== '出席' && b.status === '出席') return 1;
            return 0;
        });
        amSorted.forEach(u => {
            html += attRenderUser(u);
        });
    }
    html += '</div></div>';

    // 午後
    html += '<div class="att-unit-section">';
    html += '<div class="att-unit-header pm">';
    html += '<span>午後の部（13:30〜16:30）</span>';
    html += '<span class="att-unit-count">' + pmPresent + '人出席';
    if (pmAbsent > 0) html += '　' + pmAbsent + '人欠席';
    html += '</span></div>';
    html += '<div class="att-user-list">';
    if (data.pm.length === 0) {
        html += '<div class="att-empty">通所予定の利用者がいません</div>';
    } else {
        const pmSorted = data.pm.slice().sort((a, b) => {
            if (a.status === '出席' && b.status !== '出席') return -1;
            if (a.status !== '出席' && b.status === '出席') return 1;
            return 0;
        });
        pmSorted.forEach(u => {
            html += attRenderUser(u);
        });
    }
    html += '</div></div>';

    content.innerHTML = html;
}

function attRenderUser(u) {
    const isAbsent = u.status === '欠席';
    const iconClass = isAbsent ? 'absent' : 'present';
    const iconText = isAbsent ? '欠' : '出';
    const escapedName = u.name.replace(/'/g, "\\'");
    return '<div class="att-user-row" onclick="attStartAbsence(\'' + escapedName + '\')" style="cursor:pointer;">' +
        '<div class="att-user-icon ' + iconClass + '">' + iconText + '</div>' +
        '<span class="att-user-name">' + u.name + '</span>' +
        (u.care ? '<span class="att-user-care">' + u.care + '</span>' : '') +
        (isAbsent && u.reason ? '<span class="att-user-reason">' + u.reason + '</span>' : '') +
        '</div>';
}

// 出席予定タブから取得したデータを保持
let attLastData = { am: [], pm: [] };

function attStartAbsence(name) {
    // 欠席登録タブに切り替え
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    const absTab = document.querySelector('.tab-btn[data-tab="absence"]');
    absTab.classList.add('active');
    document.getElementById('tab-absence').classList.add('active');

    // フォームリセット
    absClearName();

    // 出席予定データからユーザー情報を取得
    const attUser = attLastData.am.concat(attLastData.pm).find(u => u.name === name);
    const care = attUser ? (attUser.care || '') : '';
    const cmOffice = attUser ? (attUser.cmOffice || '') : '';

    // フォームに直接セット（absSelectUserに依存しない）
    const user = { name: name, reading: '', pattern: [], care: care, cmOffice: cmOffice };
    absState.selectedUser = user;

    // 入力欄に名前を表示
    document.getElementById('abs-name-input').value = name;
    document.getElementById('abs-name-input').readOnly = true;
    document.getElementById('abs-search-results').innerHTML = '';
    document.getElementById('abs-clear-btn').style.display = 'flex';

    // 選択情報を表示
    const info = document.getElementById('abs-selected-info');
    info.style.display = 'block';
    info.innerHTML = '<div class="abs-selected-name">' + name + '</div>' +
        (care ? '<div class="abs-selected-pattern">' + care + '</div>' : '');

    // 日付選択ステップを表示
    document.getElementById('abs-step-date').style.display = 'block';
    absSelectDateType('today');

    // 画面上部にスクロール
    document.getElementById('tab-absence').scrollIntoView({ behavior: 'smooth' });
}

function attInit() {
    attUpdateDateLabel();
    attLoad();
    attLoadAllUsers();
}

// 全利用者データを取得（欠席登録の検索用、patternsから全員取得）
function attLoadAllUsers() {
    const cbName = 'attAllUsersCallback_' + Date.now();
    window[cbName] = function(data) {
        delete window[cbName];
        const scriptEl = document.getElementById('att-allusers-script');
        if (scriptEl) scriptEl.remove();

        if (!data.success) return;

        // patternsは { "名前": { days, unit, kana, care }, ... } 形式
        if (data.patterns) {
            Object.keys(data.patterns).forEach(name => {
                const p = data.patterns[name];
                const existing = absUserCache.find(c => c.name === name);
                if (existing) {
                    if (!existing.reading && p.kana) existing.reading = p.kana;
                    if (!existing.care && p.care) existing.care = p.care;
                } else {
                    absUserCache.push({
                        name: name, reading: p.kana || '', pattern: [],
                        care: p.care || '', cmOffice: ''
                    });
                }
            });
        }

        // attendanceからcare/kana/cmOffice情報を補完
        if (data.attendance) {
            data.attendance.am.concat(data.attendance.pm).forEach(u => {
                const cached = absUserCache.find(c => c.name === u.name);
                if (cached) {
                    if (!cached.care && u.care) cached.care = u.care;
                    if (!cached.reading && u.kana) cached.reading = u.kana;
                    if (!cached.cmOffice && u.cmOffice) cached.cmOffice = u.cmOffice;
                }
            });
        }

        absUserLoaded = true;
    };

    const script = document.createElement('script');
    script.id = 'att-allusers-script';
    script.src = ABS_BOARD_API_URL + '?action=all&callback=' + cbName + '&t=' + Date.now();
    script.onerror = function() { delete window[cbName]; };
    document.body.appendChild(script);
}

// ===== 受付者（欠席連絡を受けたスタッフ）=====
const ABS_RECEPTIONIST_KEY = 'yawaragi_receptionist';
let absReceptionist = '';

function absInitReceptionist() {
    // 前回の選択を復元
    absReceptionist = localStorage.getItem(ABS_RECEPTIONIST_KEY) || '';

    const container = document.getElementById('abs-receptionist-btns');
    const selectedEl = document.getElementById('abs-receptionist-selected');
    const staff = getStaff();

    container.innerHTML = staff.map(s =>
        `<button class="abs-contact-btn${absReceptionist === s ? ' selected' : ''}" onclick="absSelectReceptionist('${s}', this)">${s}</button>`
    ).join('');

    if (absReceptionist) {
        selectedEl.textContent = '受付者: ' + absReceptionist;
        selectedEl.style.display = 'block';
    }
}

function absSelectReceptionist(name, btn) {
    absReceptionist = name;
    localStorage.setItem(ABS_RECEPTIONIST_KEY, name);

    // ボタンのハイライト
    document.querySelectorAll('#abs-receptionist-btns .abs-contact-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

    // 表示更新
    const selectedEl = document.getElementById('abs-receptionist-selected');
    selectedEl.textContent = '受付者: ' + name;
    selectedEl.style.display = 'block';
}

function absInit() {
    absInitReceptionist();
    absRenderUpcomingList();

    // 利用者台帳APIからデータ取得
    absLoadUsersFromAPI().then(() => {
        absRenderUserManage();
        console.log('利用者データ取得完了:', absUserCache.length + '人');
    }).catch(err => {
        console.error('利用者データ取得エラー:', err);
        absRenderUserManage();
    });
}

// ========== 初期化 ==========
init();
