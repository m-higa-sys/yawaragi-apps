// 一覧モード（入れ替え用）：午前送り＋午後迎えを3段グリッドで表示
function renderListModeMid(dropGroups,pickGroups,stickyBar){
  var data=dropGroups.map(function(dg,i){
    var pg=pickGroups[i]||pickGroups[0];
    var vid=effectiveVid(dg,'mid');
    if(!vid||!VEH[vid]) return null;
    var v=VEH[vid];
    var acol=v.col;
    var pat=midPattern(dg.no);
    var pVid=midPickEffVid(dg.no);
    var mid=calcMid(dg.members,pg.members,dg.no);
    var dactRaw=dg.members.filter(function(n){return !S.absent.has(n);});
    var pactRaw=pg.members.filter(function(n){return !S.absent.has(n);});
    var dact=pat==='pick_only'?[]:applyRouteOvr(dactRaw,'am_drop',dg.no);
    var pact=pat==='drop_only'?[]:applyRouteOvr(pactRaw,'pm_pick',pg.no);
    var staffId=S.staffMap[vid+'_'+dg.no]||dg.staff;
    var seatHtmlDrop=pat==='pick_only'?'':sientaSeatDiagramHtml(dact,vid,'drop','mid',dg.no,staffId,false);
    var seatHtmlPick=pat==='drop_only'?'':sientaSeatDiagramHtml(pact,pVid||vid,'pick','mid',pg.no,staffId,false);
    return {dg:dg,pg:pg,vid:vid,v:v,acol:acol,mid:mid,dact:dact,pact:pact,pat:pat,pVid:pVid,seatHtmlDrop:seatHtmlDrop,seatHtmlPick:seatHtmlPick};
  }).filter(function(d){return d;});

  var n=data.length;
  var gc='repeat('+n+', 1fr)';

  // ── Row1: ヘッダー ──
  var row1='<div style="display:grid;grid-template-columns:'+gc+';gap:6px;margin-bottom:6px">';
  data.forEach(function(d){
    var retCol=d.mid.onTime?'var(--grn)':'var(--red)';
    var over=d.dact.length>d.v.cap;
    var bdr=over?'2px solid var(--red)':'2px solid '+d.acol+'55';
    var lk='am_drop_'+d.dg.no;
    var il=!!S.lockedCars[lk];
    var lkBtn='<button onclick="toggleCarLock(\''+lk+'\');event.stopPropagation()" title="'+(il?'ロック解除':'ロック')+'" '
      +'style="font-size:14px;background:'+(il?'rgba(248,113,113,.15)':'rgba(0,212,170,.1)')+';color:'+(il?'#f87171':'#00d4aa')+';border:2px solid '+(il?'#f87171':'#00d4aa')+';border-radius:6px;padding:2px 8px;cursor:pointer;font-weight:700;white-space:nowrap">'
      +(il?'🔒':'🔓')+'</button>';
    // 送り車種セレクタ
    var usedVids=new Set();
    if(S.groups.am_drop) S.groups.am_drop.forEach(function(og){if(og.no!==d.dg.no){var ov=effectiveVid(og,'mid');if(ov)usedVids.add(ov);}});
    var vSel='<select title="送りの車両" style="font-family:var(--sans);font-size:10px;background:var(--bg3);color:var(--grn);border:2px solid var(--grn);border-radius:5px;padding:2px 4px;cursor:pointer;font-weight:700;white-space:nowrap" '
      +'onchange="updateVehicle(\'mid\',\''+d.dg.no+'\',this.value)">'
      +VEHICLES.map(function(v){var isCur=v.id===d.vid;var tooSmall=v.capacity<d.dact.length;var inUse=!isCur&&usedVids.has(v.id);var dis=tooSmall;var lb=v.icon+' '+v.name+'('+v.capacity+'名)';if(tooSmall)lb+=' ⚠定員不足';else if(inUse)lb+=' 🔄他号車と入替';return '<option value="'+v.id+'"'+(isCur?' selected':'')+(dis?' disabled':'')+'>'+lb+'</option>';}).join('')
      +'</select>';
    // 迎え車種セレクタ
    var curPV=S.midPickVid[d.dg.no]||'__same__';
    var pSel='<select title="迎えの車両" style="font-family:var(--sans);font-size:10px;background:var(--bg3);color:#60a5fa;border:2px solid #60a5fa;border-radius:5px;padding:2px 4px;cursor:pointer;font-weight:700;white-space:nowrap" '
      +'onchange="updateMidPickVid(\''+d.dg.no+'\',this.value)">'
      +'<option value="__same__"'+(curPV==='__same__'?' selected':'')+'>🔄 送りと同じ</option>'
      +'<option value="__none__"'+(curPV==='__none__'?' selected':'')+'>🚫 送りのみ</option>'
      +'<option value="__pick_only__"'+(curPV==='__pick_only__'?' selected':'')+'>🔵 迎えのみ</option>'
      +VEHICLES.map(function(v){var isCur=curPV===v.id;return '<option value="'+v.id+'"'+(isCur?' selected':'')+'>'+v.icon+' '+v.name+'</option>';}).join('')
      +'</select>';
    var patLabel=d.pat==='drop_only'?'🔴 送りのみ':d.pat==='pick_only'?'🔵 迎えのみ':d.pat==='change_car'?'🔀 車変更':'🔄 直行';
    var patCol=d.pat==='drop_only'?'rgba(251,146,60,.15);color:#fb923c':d.pat==='pick_only'?'rgba(91,156,246,.15);color:#5b9cf6':d.pat==='change_car'?'rgba(96,165,250,.15);color:#60a5fa':'rgba(0,212,170,.1);color:var(--grn)';
    row1+='<div style="background:linear-gradient(90deg,var(--bg3),var(--bg2));border:'+bdr+';border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:4px'+(over?';box-shadow:0 0 0 2px rgba(248,113,113,.25)':'')+'">'
      +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
        +'<span style="font-size:20px">'+d.v.icon+'</span>'
        +'<span style="font-size:16px;font-weight:900;color:'+d.acol+'">'+d.dg.no+'号車</span>'
        +'<span style="font-size:10px;padding:1px 6px;border-radius:4px;background:'+patCol+'">'+patLabel+'</span>'
        +'<span style="margin-left:auto"></span>'
        +lkBtn
        +'<button onclick="openRouteMapSingle(\'am_drop\',\''+d.dg.no+'\')" style="font-size:12px;background:var(--bg3);color:#fb923c;border:1px solid #fb923c;border-radius:6px;padding:2px 8px;cursor:pointer;font-weight:700;white-space:nowrap">🗺️</button>'
      +'</div>'
      +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'
        +'<span style="font-size:10px;color:#f97316;font-weight:700">送り:</span>'+vSel
        +'<span style="font-size:10px;color:#5b9cf6;font-weight:700;margin-left:8px">迎え:</span>'+pSel
      +'</div>'
    +'</div>';
  });
  row1+='</div>';

  // ── Row2: 🔴送り メンバー | 座席図 ──
  var row2='<div style="display:grid;grid-template-columns:'+gc+';gap:6px;margin-bottom:6px">';
  data.forEach(function(d){
    if(d.pat==='pick_only'){
      row2+='<div style="overflow:hidden;background:var(--panel);border:2px dashed var(--bdr);border-radius:8px;opacity:.5;display:flex;align-items:center;justify-content:center;min-height:80px">'
        +'<span style="font-size:13px;color:var(--tx3);font-weight:700">🚫 送りなし（迎えのみ）</span>'
      +'</div>';
      return;
    }
    var dropStopMap={};
    (d.mid.dropStops||[]).forEach(function(s){dropStopMap[s.name]=s.arr;});
    var dropMemHtml=d.dact.length?d.dact.map(function(name,i){return _lmItem(name,'#f97316',i,dropStopMap[name]||'');}).join('')
      :'<div style="padding:4px;text-align:center;color:var(--tx3);font-size:11px">なし</div>';
    row2+='<div class="car list-car" style="overflow:hidden;background:var(--panel);border:2px solid '+d.acol+'33;border-radius:8px">'
      +'<div data-tltabkey="am_drop" data-tlcarno="'+d.dg.no+'">'
      +'<div style="padding:3px 4px;font-size:13px;font-weight:800;color:#f97316;border-bottom:1px solid var(--bdr)">🔴 送り '+d.dact.length+'名</div>'
      +'<div style="display:flex;align-items:stretch;gap:0;min-height:160px">'
        +'<div style="flex:0 0 auto;padding:3px 2px;max-width:40%">'+dropMemHtml+'</div>'
        +'<div style="flex:1;border-left:1px solid var(--bdr);padding:6px;overflow:hidden;display:flex;align-items:center;justify-content:center">'+d.seatHtmlDrop+'</div>'
      +'</div>'
      +'</div></div>';
  });
  row2+='</div>';

  // ── Row3: 🔵迎え メンバー | 座席図（パターンBは「送りのみ」表示）──
  var row3='<div style="display:grid;grid-template-columns:'+gc+';gap:6px">';
  data.forEach(function(d){
    if(d.pat==='drop_only'){
      row3+='<div style="overflow:hidden;background:var(--panel);border:2px dashed var(--bdr);border-radius:8px;opacity:.5;display:flex;align-items:center;justify-content:center;min-height:80px">'
        +'<span style="font-size:13px;color:var(--tx3);font-weight:700">🚫 送りのみ（迎えなし）</span>'
      +'</div>';
      return;
    }
    var pVid=d.pVid||d.vid;
    var pv=VEH[pVid];
    var pickStopMap={};
    (d.mid.pickStops||[]).forEach(function(s){pickStopMap[s.name]=s.arr;});
    var pickMemHtml=d.pact.length?d.pact.map(function(name,i){return _lmItem(name,'#5b9cf6',i,pickStopMap[name]||'');}).join('')
      :'<div style="padding:4px;text-align:center;color:var(--tx3);font-size:11px">なし</div>';
    var pickTitle='🔵 迎え '+d.pact.length+'名'+(d.pat==='change_car'&&pv?' — '+pv.icon+pv.name:'');
    var retCol2=d.mid.onTime?'var(--grn)':'var(--red)';
    var retTime2=d.pat==='drop_only'?d.mid.dropRetTime:d.mid.retTime;
    var retBadge='<span style="font-size:12px;color:'+retCol2+';font-weight:800">'+retTime2+'着'+(d.mid.onTime?' ✅':' ⚠')+'</span>';
    var plk='pm_pick_'+d.pg.no;var pil=!!S.lockedCars[plk];
    var plkBtn='<button onclick="toggleCarLock(\''+plk+'\');event.stopPropagation()" title="'+(pil?'迎えロック解除':'迎えロック')+'" '
      +'style="font-size:12px;background:'+(pil?'rgba(248,113,113,.15)':'rgba(0,212,170,.1)')+';color:'+(pil?'#f87171':'#00d4aa')+';border:2px solid '+(pil?'#f87171':'#00d4aa')+';border-radius:5px;padding:1px 6px;cursor:pointer;font-weight:700">'+(pil?'🔒':'🔓')+'</button>';

      +'<div style="padding:3px 4px;font-size:13px;font-weight:800;color:#5b9cf6;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:6px">'+pickTitle+'<span style="margin-left:auto"></span>'+retBadge+plkBtn+'</div>'

        +'<div style="flex:0 0 auto;padding:3px 2px;max-width:40%">'+pickMemHtml+'</div>'
        +'<div style="flex:1;border-left:1px solid var(--bdr);padding:6px;overflow:hidden;display:flex;align-items:center;justify-content:center">'+d.seatHtmlPick+'</div>'
      +'</div>'
      +'</div></div>';
  });
  row3+='</div>';

  var hdr=(stickyBar||'')+row1;
  return '<div class="sticky-hdr">'+hdr+'</div>'+row2+row3;
}

function addUserModal(){
  document.getElementById('add-user-modal').style.display='flex';
  ['au-name','au-addr'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('au-lv').value='3';
  document.getElementById('au-step').checked=false;
  document.getElementById('au-no3').checked=false;
  document.getElementById('au-am').checked=true;
  document.getElementById('au-pm').checked=false;
  document.getElementById('au-name').focus();
}
function closeUserModal(){document.getElementById('add-user-modal').style.display='none';}
function submitNewUser(){
  const name=document.getElementById('au-name').value.trim();
  if(!name){alert('氏名を入力してください');return;}
  if(S.users[name]){alert('同名の利用者が既に存在します');return;}
  const addr=document.getElementById('au-addr').value.trim()||'埼玉県比企郡滑川町';
  const boardMin=parseInt(document.getElementById('au-lv').value)||3;
  const no3=document.getElementById('au-no3').checked;
  const isAm=document.getElementById('au-am').checked;
  const isPm=document.getElementById('au-pm').checked;
  S.users[name]={addr,lat:36.031+Math.random()*0.02,lng:139.394+Math.random()*0.02,boardMin,no3,frontPref:no3,transport:'shuttle'};
  // 空きが一番多い車に追加
  function findBestCar(groups,tabKey){
    let best=0,bestSpace=-1;
    groups.forEach((g,i)=>{
      const vid=effectiveVid(g,tabKey);
      const cap=VEH[vid]?VEH[vid].cap:4;
      const space=cap-g.members.length;
      if(space>bestSpace){bestSpace=space;best=i;}
    });
    return best;
  }
  if(isAm){
    const bi=findBestCar(S.groups.am_pick,'am_pick');
    S.groups.am_pick[bi].members.push(name);
    S.groups.am_drop[bi].members.push(name);
  }
  if(isPm){
    const bi=findBestCar(S.groups.pm_pick,'pm_pick');
    S.groups.pm_pick[bi].members.push(name);
    S.groups.pm_drop[bi].members.push(name);
  }
  closeUserModal();
  renderAll();
  alert(name+'さんを追加しました。\n設定タブで住所・移動時間を調整してください。');
}
function removeUser(name){
  if(!confirm(name+'さんを削除しますか？（全グループから除外されます）')) return;
  delete S.users[name];
  delete S.userDays[name];
  ['am_pick','am_drop','pm_pick','pm_drop'].forEach(k=>{
    S.groups[k].forEach(g=>{g.members=g.members.filter(m=>m!==name);});
  });
  S.absent.delete(name);
  renderAll();
}

function renderMain(){
  // 描画前に重複を除去
  deduplicateGroups();
  // ズームモーダルが開いていたら元に戻す
  const zm=document.getElementById('zoom-modal');
  if(zm&&zm.classList.contains('show')){
    const content=document.getElementById('zoom-modal-content');
    const moved=content.querySelector('.settings-card');
    if(moved&&content._origParent){
      content._origParent.insertBefore(moved,content._origNext);
    }
    zm.classList.remove('show');
  }
  // スクロール位置を保存（利用者管理テーブル等）
  const secUsers=document.getElementById('sec-users');
  const scrollBox=secUsers&&secUsers.querySelector('[style*="overflow-y"]');
  const savedScroll=scrollBox?scrollBox.scrollTop:0;
  const savedPageScroll=window.scrollY;

  const m=document.getElementById('main');
  if(S.currentTab==='am')  m.innerHTML=renderAM();
  else if(S.currentTab==='mid') m.innerHTML=renderMID();
  else if(S.currentTab==='pm')  m.innerHTML=renderPM();
  else if(S.currentTab==='vacancy') m.innerHTML=renderVacancy();
  else if(S.currentTab==='osrm') m.innerHTML=renderOSRM();
  else m.innerHTML=renderSet();
  // タブ切替のたびにサイドパネルも更新
  const sideEl=document.getElementById('side');
  if(sideEl) sideEl.innerHTML=renderSide();

  // スクロール位置を復元
  requestAnimationFrame(()=>{
    const secUsers2=document.getElementById('sec-users');
    const scrollBox2=secUsers2&&secUsers2.querySelector('[style*="overflow-y"]');
    if(scrollBox2&&savedScroll) scrollBox2.scrollTop=savedScroll;
    window.scrollTo(0,savedPageScroll);
  });
  // 変更を自動保存
  autoSave();
  // 体験チェッカーの地図を初期化（DOM再生成後なのでリセットして再描画）
  if(S.currentTab==='vacancy'){
    _vacancyMapReady=false;
    if(_vacancyMap){try{_vacancyMap.remove();}catch(e){}_vacancyMap=null;}
    var vf=S.vacancyForm||{};
    if(vf.routeResult&&vf.routeResult.lat&&document.getElementById('vacancy-map')){
      setTimeout(function(){initVacancyMap(vf.routeResult.lat,vf.routeResult.lng);},150);
    }
  }
}

// ルート順ドラッグ並び替え＆車間移動
function initRouteDnD(){
  const main=document.getElementById('main');
  let dragRoute=null; // {name, tabKey, carNo}

  main.addEventListener('dragstart',e=>{
    const stopEl=e.target.closest('[data-routename]');
    if(!stopEl||e.target.closest('[data-seat]')) return;
    const tlCol=stopEl.closest('[data-tltabkey]');
    if(!tlCol) return;
    const _tk=tlCol.dataset.tltabkey, _cn=tlCol.dataset.tlcarno;
    if(isCarLocked(_tk,_cn)){e.preventDefault();showToast('🔒 ロック中です。解除してから操作してください','#f87171');return;}
    dragRoute={
      name:stopEl.dataset.routename,
      tabKey:_tk,
      carNo:_cn,
    };
    stopEl.style.opacity='0.4';
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/route',dragRoute.name);
    e.stopPropagation();
  },true);

  main.addEventListener('dragover',e=>{
    if(!dragRoute) return;
    // 同じ車内のルート並び替え or 別の車エリアへの移動
    const carEl=e.target.closest('.car');
    if(carEl) e.preventDefault();
    main.querySelectorAll('[data-routename].route-drag-over').forEach(el=>el.classList.remove('route-drag-over'));
    main.querySelectorAll('.car.car-drag-over').forEach(el=>el.classList.remove('car-drag-over'));
    const stopEl=e.target.closest('[data-routename]');
    if(stopEl) stopEl.classList.add('route-drag-over');
    else if(carEl) carEl.classList.add('car-drag-over');
  },true);

  main.addEventListener('dragleave',e=>{
    const stopEl=e.target.closest('[data-routename]');
    if(stopEl) stopEl.classList.remove('route-drag-over');
    const carEl=e.target.closest('.car');
    if(carEl&&!carEl.contains(e.relatedTarget)) carEl.classList.remove('car-drag-over');
  },true);

  main.addEventListener('drop',e=>{
    if(!dragRoute) return;
    e.preventDefault();
    main.querySelectorAll('.car.car-drag-over').forEach(el=>el.classList.remove('car-drag-over'));

    // ドロップ先の車を特定
    const stopEl=e.target.closest('[data-routename]');
    const tlCol=stopEl?stopEl.closest('[data-tltabkey]'):null;
    const carEl=e.target.closest('.car');
    const carTl=carEl?carEl.querySelector('[data-tltabkey]'):null;

    // ドロップ先のtabKey/carNoを取得
    let toTabKey=null, toCarNo=null;
    if(tlCol){
      toTabKey=tlCol.dataset.tltabkey;
      toCarNo=tlCol.dataset.tlcarno;
    } else if(carTl){
      toTabKey=carTl.dataset.tltabkey;
      toCarNo=carTl.dataset.tlcarno;
    }
    if(!toTabKey||!toCarNo){dragRoute=null;return;}
    // ドロップ先がロック中なら拒否
    if(isCarLocked(toTabKey,toCarNo)){dragRoute=null;showToast('🔒 移動先がロック中です','#f87171');return;}

    const sameTab=toTabKey===dragRoute.tabKey;
    const sameCar=sameTab&&toCarNo===dragRoute.carNo;

    if(sameCar&&stopEl){
      // 同じ車内: ルート順並び替え
      const toName=stopEl.dataset.routename;
      if(toName===dragRoute.name){dragRoute=null;return;}
      const allStopsRaw=[...tlCol.querySelectorAll('[data-routename]')].map(el=>el.dataset.routename);
      // 重複除去（タイムライン+座席図で同じ名前が複数取得されるため）
      const seen=new Set();
      const allStops=allStopsRaw.filter(n=>{if(seen.has(n))return false;seen.add(n);return true;});
      const fromIdx=allStops.indexOf(dragRoute.name);
      const toIdx=allStops.indexOf(toName);
      if(fromIdx<0||toIdx<0){dragRoute=null;return;}
      allStops.splice(fromIdx,1);
      allStops.splice(toIdx,0,dragRoute.name);
      S.routeOvr[dragRoute.tabKey+'_'+dragRoute.carNo]=allStops;
      dragRoute=null;
      renderMain();
      showToast('🔀 ルート順を変更しました','#f5c518');
    } else {
      // 別の車へ移動
      const name=dragRoute.name;
      const fromKey=dragRoute.tabKey;
      const fromCarNo=dragRoute.carNo;

      // 定員チェック: 移動先の全関連グループで定員オーバーにならないか確認
      function checkCapacity(groupKeys){
        for(const gk of groupKeys){
          const groups=S.groups[gk];
          if(!groups) continue;
          const dstG=groups.find(g=>g.no===toCarNo);
          if(!dstG) continue;
          let vid=effectiveVid(dstG,gk);
          // pm_pickで「送りと同じ」の場合、送り(am_drop)の車種を使う
          if((gk==='pm_pick'||gk==='pm_drop')&&(!S.midPickVid[toCarNo])){
            vid=midPickEffVid(toCarNo)||vid;
          }
          if(!vid||!VEH[vid]) continue;
          const actCount=dstG.members.filter(n=>n!==name&&!S.absent.has(n)).length;
          if(actCount+1>VEH[vid].cap){
            return VEH[vid].name+'（定員'+VEH[vid].cap+'名）に既に'+actCount+'名乗っています。これ以上乗れません。';
          }
        }
        return null;
      }
      const pairKeys=(fromKey==='am_pick'||fromKey==='am_drop')?['am_pick','am_drop']
        :(fromKey==='pm_pick'||fromKey==='pm_drop')?['pm_pick','pm_drop']:[];
      const capErr=checkCapacity(pairKeys);
      if(capErr){
        dragRoute=null;
        showToast('🚫 定員オーバー！ '+capErr,'#f87171');
        renderMain();
        return;
      }

      // 移動元から削除、移動先に追加（全車から確実に削除してから追加）
      function moveMember(groupKey){
        const groups=S.groups[groupKey];
        if(!groups) return;
        // 全車から削除（重複防止）
        groups.forEach(g=>{g.members=g.members.filter(m=>m!==name);});
        // 先の車に追加
        const dstG=groups.find(g=>g.no===toCarNo);
        if(dstG) dstG.members.push(name);
      }

      // 迎えと送りをペアで移動
      pairKeys.forEach(gk=>moveMember(gk));

      // routeOvrをクリア（移動後は自動順に）
      delete S.routeOvr[fromKey+'_'+fromCarNo];
      delete S.routeOvr[toTabKey+'_'+toCarNo];

      dragRoute=null;
      renderMain();
      showToast('🚐 '+name+' を '+toCarNo+' に移動しました','#60a5fa');
      // 移動先の車で座席制約チェック→ポップアップ
      setTimeout(()=>{
        const grp=S.groups[toTabKey];
        if(!grp) return;
        const g=grp.find(x=>x.no===toCarNo);
        if(!g) return;
        const act=g.members.filter(n=>!S.absent.has(n)&&needsShuttle(n));
        const evid=effectiveVid(g,toTabKey)||g.vid;
        const sa=assignSeats(act,evid,toTabKey,toCarNo);
        const dir=toTabKey.includes('pick')?'pick':'drop';
        const warns=checkSeatConstraint(sa,evid,dir);
        if(warns.length) showSeatConstraintPopup(warns,g.no+'（'+(VEH[evid]||VEH[g.vid]).name+'）');
      },100);
    }
  },true);

  main.addEventListener('dragend',e=>{
    main.querySelectorAll('[data-routename]').forEach(el=>{
      el.style.opacity='';
      el.classList.remove('route-drag-over');
    });
    main.querySelectorAll('.car.car-drag-over').forEach(el=>el.classList.remove('car-drag-over'));
    dragRoute=null;
  },true);
}

const DAYS=['月','火','水','木','金','土'];

function getDayCounts(){
  const du=getDayUsers();
  const amNow=du.am.filter(n=>!S.absent.has(n)).length;
  const pmNow=du.pm.filter(n=>!S.absent.has(n)).length;
  const counts={};
  DAYS.forEach(d=>{
    if(d===S.currentDay){
      counts[d]={am:amNow, pm:pmNow};
    } else {
      // 他の曜日はuserDaysから計算
      let amC=0, pmC=0;
      Object.keys(S.users).forEach(n=>{
        const ud=S.userDays[n];
        if(ud&&ud.schedule&&ud.schedule[d]){
          if(ud.schedule[d]==='am') amC++;
          else if(ud.schedule[d]==='pm') pmC++;
        }
      });
      // userDays未設定ならdayCountフォールバック
      if(amC===0&&pmC===0&&S.dayCount&&S.dayCount[d]){
        counts[d]={am:S.dayCount[d].am||0, pm:S.dayCount[d].pm||0};
      } else {
        counts[d]={am:amC, pm:pmC};
      }
    }
  });
  return counts;
}

function updateDayCount(day,ampm,val){
  if(!S.dayCount)S.dayCount={};
  if(!S.dayCount[day])S.dayCount[day]={am:0,pm:0};
  S.dayCount[day][ampm]=parseInt(val)||0;
  renderMain();
}

// 月曜の車両ごと空き座席を詳細チェック（実際のassignSeatsロジックを流用）
function checkMonAvailSeats(ampm, newNo3, newStep, newWalk){
  const groupKey = ampm==='am'?'am_pick':'pm_pick';
  const tabKey   = ampm==='am'?'am_pick':'pm_pick';
  const groups = S.groups[groupKey];
  const results=[];
  groups.forEach(g=>{
    const evid=effectiveVid(g,tabKey)||g.vid;
    const vdef=VEH[evid]||VEH[g.vid];
    if(!vdef) return;
    const act=g.members.filter(n=>!S.absent.has(n));
    const cap=vdef.cap;
    const avail=cap-act.length;
    if(avail<=0){results.push({vid:evid,no:g.no,vname:vdef.name,vicon:vdef.icon,avail:0,okSeats:[],reason:'満席'});return;}

    // 現在の座席占有状況をassignSeatsで取得
    const sa=assignSeats(g.members, evid, tabKey, g.no);
    const usedIds=new Set(sa.filter(x=>x.seat).map(x=>x.seat));

    // 空き座席から条件に合う席を抽出
    const allSeats=vdef.seats.filter(s=>s.seatColor!=='straddle');
    const emptySeats=allSeats.filter(s=>!usedIds.has(s.id));
    const okSeats=emptySeats.filter(s=>{
      if(newNo3 && s.row===3) return false;         // 3列NG
      if(newStep && !s.accessible) return false;     // 段差NG → accessible席のみ
      return true;
    });
    // 歩行不安定の場合は前方席を優先表示（row1→row2→row3の順）
    const sortedSeats=newWalk?[...okSeats].sort((a,b)=>a.row-b.row):okSeats;

    results.push({vid:evid,no:g.no,vname:vdef.name,vicon:vdef.icon,col:vdef.col,avail,okSeats:sortedSeats});
  });
  return results;
}

// ── 日付ユーティリティ ──
const DAY_IDX={'月':1,'火':2,'水':3,'木':4,'金':5}; // JS getDay()は0=日
function dateToYMD(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function ymdToJa(ymd){
  const d=new Date(ymd+'T00:00:00');
  const dnames=['日','月','火','水','木','金','土'];
  return (d.getMonth()+1)+'月'+d.getDate()+'日（'+dnames[d.getDay()]+'）';
}
function getStaffForDay(dayName){
  return S.staffSchedule[dayName]||[];
}

// 指定した曜日名から今日以降の日付を SEARCH_WEEKS 週分返す
function futureDatesForDay(dayName){
  const target=DAY_IDX[dayName];
  if(target===undefined) return [];
  const results=[];
  const today=new Date(); today.setHours(0,0,0,0);
  // 最低2日後から
  const start=new Date(today); start.setDate(start.getDate()+2);
  const end=new Date(today); end.setDate(end.getDate()+SEARCH_WEEKS*7+7);
  for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    if(d.getDay()===target) results.push(dateToYMD(new Date(d)));
  }
  return results;
}

// ある日付の体験受入可否を総合判定
function judgeDateSlot(ymd, dayName, ampm, no3, step, walk){
  const result={ymd, dayName, ampm, ok:false, reasons:[], warnings:[]};

  // 1. 担会・契約等でブロックされていないか
  if((S.busyDates||[]).includes(ymd)){
    result.reasons.push('担会・契約等のため体験不可日に設定済み');
    return result;
  }

  // 2. スタッフ人数チェック（アプリ設定がある場合のみ。未設定=アナログ確認に委ねる）
  const staff=getStaffForDay(dayName);
  if(staff.length>0 && staff.length < STAFF_MIN){
    result.reasons.push('スタッフ'+staff.length+'名（最低'+STAFF_MIN+'名必要）');
    return result;
  }

  // 3. 定員チェック
  const counts=getDayCounts();
  const avail=MAX_AM-counts[dayName][ampm];
  if(avail<=0){
    result.reasons.push('定員満員（'+counts[dayName][ampm]+'/'+MAX_AM+'名）');
    return result;
  }

  // 4. 月曜は座席チェックまで
  if(dayName==='月'){
    const gkey=ampm+'_pick';
    // 現在ルートで使っている3台の車両ID
    const activeCars=S.groups[gkey]||[];
    const allCarsInRoute=checkMonAvailSeats(ampm,no3,step,walk);
    const okInRoute=allCarsInRoute.filter(cr=>cr.okSeats&&cr.okSeats.length>0);

    if(okInRoute.length>0){
      // 通常3台で乗れる
      result.ok=true;
      result.okCars=okInRoute;
      result.extraCar=false;
    } else {
      // 現ルートの3台が満車 → 4台目（モコまたはキューブ）で対応できるか
      // 現在ルートに入っていない車両を探す
      const routeVids=activeCars.map(g=>g.vid);
      const ALL_VIDS=['stepwgn','sienta_w','sienta_s','cube','moco'];
      const spareVids=ALL_VIDS.filter(id=>!routeVids.includes(id));
      // 予備車に空きがあれば増車で対応可
      const hasSpare=spareVids.length>0;
      result.ok=true;
      result.extraCar=true; // 増車が必要
      result.spareVids=spareVids;
      result.okCars=[];
    }
  }

  result.ok=true;
  result.staffCount=staff.length;
  result.staffNames=staff;
  result.avail=avail;
  if(staff.length===STAFF_MIN) result.warnings.push('スタッフが最低人数（'+STAFF_MIN+'名）');
  return result;
}

        const simState=f.simState||{};

        // ═══════════════════════════════════════════
        // A案：体験者だけ単独送迎（往復）
        // ═══════════════════════════════════════════
        const soloKmRaw=dk(FAC_C,vC)*2;
        const soloKm=soloKmRaw*ROAD_FACTOR; // 道路距離補正
        const soloMin=Math.round(soloKm/20*60); // 20km/hで計算

        // ═══════════════════════════════════════════
        // 送りルートの迂回時間を計算するヘルパー
        // gk='am_pick' → dropGk='am_drop', gk='pm_pick' → dropGk='pm_drop'
        // ═══════════════════════════════════════════
        const calcDropDetour=(gk,carNo,actMembers,mocoName)=>{
          const dropGk=gk==='am_pick'?'am_drop':'pm_drop';
          const dg=S.groups[dropGk].find(g=>g.no===carNo);
          if(!dg) return {min:0,pos:0,dropCount:0,dropCap:99};
          const dAct=mocoName?dg.members.filter(n=>!S.absent.has(n)&&n!==mocoName):dg.members.filter(n=>!S.absent.has(n));
          // お送り車両の定員チェック用
          const refGk2=gk==='am_pick'?'am_pick':'pm_pick';
          const refG2=(S.groups[refGk2]||[]).find(rg=>rg.no===carNo);
          const dropVid=refG2?effectiveVid(refG2,refGk2):effectiveVid(dg,dropGk);
          const dropCap=dropVid&&VEH[dropVid]?VEH[dropVid].cap:99;
          const dStops=[FAC_C,...dAct.map(n=>S.users[n]?[S.users[n].lat,S.users[n].lng]:FAC_C),FAC_C];
          let best=9999,pos=0;
          for(let i=0;i<dStops.length-1;i++){
            const d=dk(dStops[i],vC)+dk(vC,dStops[i+1])-dk(dStops[i],dStops[i+1]);
            if(d<best){best=d;pos=i;}
          }
          return {min:Math.round(best/25*60),pos,dropCount:dAct.length+1,dropCap};
        };

        // ═══════════════════════════════════════════
        // 午前体験時：入れ替え（mid）の帰着時間チェック
        // 12:00出発 → 午前送り → 午後迎え → 施設帰着 ≤ 13:25
        // ═══════════════════════════════════════════
        // 送りルートで体験者を最適位置に挿入するヘルパー
        const insertOptimalDrop=(members,trialName)=>{
          if(!members.length) return [trialName];
          const tc=coord(trialName);
          const stops=[FC,...members.map(n=>coord(n))];
          let bestPos=0,bestD=9999;
          for(let i=0;i<=members.length;i++){
            const prev=stops[i];
            const next=i<members.length?stops[i+1]:FC;
            const d=dk(prev,tc)+dk(tc,next)-dk(prev,next);
            if(d<bestD){bestD=d;bestPos=i;}
          }
          return [...members.slice(0,bestPos),trialName,...members.slice(bestPos)];
        };

        const calcMidImpact=(carNo,mocoName)=>{
          const dg=S.groups.am_drop.find(g=>g.no===carNo);
          const pg=S.groups.pm_pick.find(g=>g.no===carNo);
          if(!dg||!pg) return {ok:true,retTime:'--:--',addMin:0};
          const dm=mocoName?dg.members.filter(n=>n!==mocoName):dg.members;
          const pm=mocoName?pg.members.filter(n=>n!==mocoName):pg.members;
          const hadUser=!!S.users[vname];
          if(!hadUser) S.users[vname]={addr:'体験者',lat:vC[0],lng:vC[1],boardMin:3};
          try{
            const midNow=calcMid(dm,pm,carNo);
            // 体験者を午前送りの最適位置に挿入（午後迎えには乗らない）
            const dmWithV=insertOptimalDrop(dm,vname);
            const midNew=calcMid(dmWithV,pm,carNo);
            const addMin=Math.round(midNew.retMin-midNow.retMin);
            return {ok:midNew.onTime,retTime:midNew.retTime,addMin,retMin:midNew.retMin};
          }finally{
            if(!hadUser) delete S.users[vname];
          }
        };

        // ═══════════════════════════════════════════
        // B案：各号車に挿入 → 迎え＋送り＋入れ替えの合計で評価
        // ═══════════════════════════════════════════
        const bPlans=[];
        const planGks=reqAmpm==='am'?['am_pick']:reqAmpm==='pm'?['pm_pick']:['am_pick','pm_pick'];
        planGks.forEach(gk=>{
          S.groups[gk].forEach(g=>{
            const vid=effectiveVid(g,gk);
            if(!vid||!VEH[vid]) return;
            const act=g.members.filter(n=>!S.absent.has(n));
            const cap=VEH[vid].cap;
            const label=(gk==='am_pick'?'午前':'午後')+' '+g.no+'号車('+VEH[vid].name+')';

            // お迎えの最小迂回位置
            const stops=[FAC_C,...act.map(n=>S.users[n]?[S.users[n].lat,S.users[n].lng]:FAC_C),FAC_C];
            const bestDetour=(()=>{
              let best=9999,pos=0;
              for(let i=0;i<stops.length-1;i++){
                const d=dk(stops[i],vC)+dk(vC,stops[i+1])-dk(stops[i],stops[i+1]);
                if(d<best){best=d;pos=i;}
              }
              return {min:Math.round(best/25*60),pos};
            })();

            if(act.length<cap){
              // 空きあり → そのまま挿入
              const dropD=calcDropDetour(gk,g.no,act,null);
              const midInfo=gk==='am_pick'?calcMidImpact(g.no,null):null;
              const pickMin=bestDetour.min;
              const dropMin=dropD.min;
              const totalExtra=pickMin+dropMin;
              const dropCapOk=dropD.dropCount<=dropD.dropCap;
              const midOk=!midInfo||midInfo.ok;
              bPlans.push({
                gk,g,vid,label,
                type:'insert',
                mainDetourMin:pickMin,
                dropDetourMin:dropMin,
                dropBestPos:dropD.pos,
                bestPos:bestDetour.pos,
                act:[...act],
                mocoMin:0,mocoName:null,
                totalExtra,
                midInfo,
                dropCapOk,
                dropCount:dropD.dropCount,dropCap:dropD.dropCap,
                allOk:dropCapOk&&midOk,
                savingVsSolo:soloMin-totalExtra
              });
            } else {
              // 満席 → 1人分離パターンを全計算
              act.forEach(sepName=>{
                const u=S.users[sepName];
                if(!u) return;
                const mocoKm=dk(FAC_C,[u.lat,u.lng])*2;
                const mocoMin=Math.round(mocoKm/25*60);
                const remain=act.filter(n=>n!==sepName);
                const stopsR=[FAC_C,...remain.map(n=>S.users[n]?[S.users[n].lat,S.users[n].lng]:FAC_C),FAC_C];
                let bestR=9999,posR=0;
                for(let i=0;i<stopsR.length-1;i++){
                  const d=dk(stopsR[i],vC)+dk(vC,stopsR[i+1])-dk(stopsR[i],stopsR[i+1]);
                  if(d<bestR){bestR=d;posR=i;}
                }
                const mainMin=Math.round(bestR/25*60);
                const dropD=calcDropDetour(gk,g.no,remain,sepName);
                const midInfo=gk==='am_pick'?calcMidImpact(g.no,sepName):null;
                const totalExtra=mocoMin+mainMin+dropD.min;
                const dropCapOk=dropD.dropCount<=dropD.dropCap;
                const midOk=!midInfo||midInfo.ok;
                bPlans.push({
                  gk,g,vid,label,
                  type:'separate',
                  mainDetourMin:mainMin,
                  dropDetourMin:dropD.min,
                  dropBestPos:dropD.pos,
                  bestPos:posR,
                  act:remain,
                  mocoMin,mocoName:sepName,
                  mocoKm,
                  totalExtra,
                  midInfo,
                  dropCapOk,
                  dropCount:dropD.dropCount,dropCap:dropD.dropCap,
                  allOk:dropCapOk&&midOk,
                  savingVsSolo:soloMin-totalExtra
                });
              });
            }
          });
        });

        // 全条件OK（定員+入れ替え時間）の案を優先、NGは後ろに回す
        const okPlans=bPlans.filter(p=>p.allOk);
        const ngPlans=bPlans.filter(p=>!p.allOk);
        okPlans.sort((a,b)=>a.totalExtra-b.totalExtra);
        ngPlans.sort((a,b)=>a.totalExtra-b.totalExtra);
        // OKがあればOKだけ、なければNGのベスト案も見せる
        const top3=okPlans.length>0?okPlans.slice(0,3):ngPlans.slice(0,3);
        const allMidNg=okPlans.length===0&&ngPlans.length>0;

        // 選択中の案
        const selIdx=Math.max(0,top3.findIndex(p=>
          p.gk===(simState.gk||'')&&p.g.no===(simState.no||'')&&(p.mocoName||'')===(simState.mocoName||'')
        ));
        const sel=top3[selIdx];

        // ═══════════════════════════════════════════
        // 表示
        // ═══════════════════════════════════════════
        const medals=['🥇','🥈','🥉'];
        const colGood='#00d4aa', colWarn='#f5c518', colBad='#f87171';

        // A案バナー（4台目の判断含む）
        const isNearby=soloMin<=10;
        const aBannerHtml=
          '<div style="background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">'
          +'<span style="font-size:10px;color:var(--tx3)">比較基準</span>'
          +'<span style="font-size:10px;font-weight:800;color:var(--tx)">🚐 A案：'+vname+'だけ単独送迎（4台目）</span>'
          +'<span style="font-size:11px;font-weight:900;color:'+(isNearby?colWarn:colBad)+'">往復'+soloMin+'分</span>'
          +'<span style="font-size:9px;color:var(--tx3)">'+soloKm.toFixed(1)+'km・ドライバー1名専従</span>'
          +(isNearby?'<span style="font-size:9px;background:rgba(245,197,24,.15);color:#f5c518;border:1px solid rgba(245,197,24,.4);border-radius:4px;padding:1px 6px;font-weight:700">近場なので4台目でもOK</span>':'')
          +(!isNearby?'<span style="font-size:9px;background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.3);border-radius:4px;padding:1px 6px">遠い→3台に組み込み推奨</span>':'')
          +'</div>';

        // 全案NG警告
        const midNgWarn=allMidNg
          ?'<div style="background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.4);border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:11px;color:#f87171;font-weight:700">🚫 どの号車に入れても条件を満たせません（定員オーバー or 入れ替え超過）。車種変更・ルート変更 or 4台目（単独送迎）を検討してください。</div>'
          :'';

        // 上位3案タブ
        const tabsHtml=top3.length===0
          ? '<div style="font-size:10px;color:#f87171;padding:8px">送迎グループが未設定です。まず送迎タブで車の配置を作ってください。</div>'
          : '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">'
            +top3.map((p,i)=>{
              const isSel=i===selIdx;
              const acol=VEH[p.vid].col;
              const saving=p.savingVsSolo;
              const saveCol=saving>0?colGood:saving===0?colWarn:colBad;
              const mn=(p.mocoName||'').replace(/['"%]/g,'');
              return '<button onclick="selectSimPlan(this)" data-gk="'+p.gk+'" data-no="'+p.g.no+'" data-moco="'+mn+'" '
                +'style="flex:1;min-width:110px;padding:8px 10px;border-radius:9px;cursor:pointer;border:2px solid '+(isSel?acol:'var(--bdr)')+';background:'+(isSel?'#fff':'#f8f8f8')+';text-align:left">'
                +'<div style="font-size:9px;font-weight:900;color:'+(isSel?acol:'var(--tx)')+'">'+medals[i]+' '+S.currentDay+'曜 '+(p.gk==='am_pick'?'午前':'午後')+' '+p.g.no+'号車</div>'
                +'<div style="font-size:8px;color:var(--tx3);margin-bottom:3px">'+VEH[p.vid].name+(p.mocoName?' + モコ('+p.mocoName+')':'')+'</div>'
                +'<div style="font-size:10px;font-weight:800;color:'+(p.totalExtra===0?colGood:p.totalExtra<=5?colGood:colWarn)+'">迎え+'+p.mainDetourMin+'分 送り+'+p.dropDetourMin+'分</div>'
                +'<div style="font-size:9px;font-weight:700;color:'+saveCol+'">'+(saving>0?'▲'+saving+'分節約':saving===0?'±0':'▼'+Math.abs(saving)+'分増')+'</div>'
                +(p.midInfo&&p.midInfo.ok?'<div style="font-size:8px;color:'+colGood+'">✅ 入替'+p.midInfo.retTime+'着</div>':'')
                +(p.midInfo&&!p.midInfo.ok?'<div style="font-size:8px;font-weight:800;color:'+colBad+'">🚨 入替'+p.midInfo.retTime+'着(超過)</div>':'')
                +(!p.dropCapOk?'<div style="font-size:8px;font-weight:800;color:'+colBad+'">🚨 送り定員オーバー('+p.dropCount+'/'+p.dropCap+'名)</div>':'')
                +'</button>';
            }).join('')
            +'</div>';

        // ── 選択案：お迎え＋送りの全ルート表示 ──
        let detailHtml='';
        if(sel){
          const isAm=sel.gk==='am_pick';
          const acol=VEH[sel.vid].col;

          // ── 共通：カード生成ヘルパー ──
          // 体験チェッカー用: 号車番号でam_pick/pm_pickグループの車両を参照
          const trialGetVid=(g)=>{
            const refGk=isAm?'am_pick':'pm_pick';
            const refG=(S.groups[refGk]||[]).find(rg=>rg.no===g.no);
            return refG?effectiveVid(refG,refGk):effectiveVid(g,refGk);
          };
          const renderRouteCard=(gkType,g,isSelCar,selPlan,direction)=>{
            const vid=trialGetVid(g);
            if(!vid||!VEH[vid]) return '';
            const acol2=VEH[vid].col;
            const act=g.members.filter(n=>!S.absent.has(n));

            let members=[...act];
            if(isSelCar){
              if(selPlan.type==='separate') members=members.filter(n=>n!==selPlan.mocoName);
              const pos=direction==='pick'?selPlan.bestPos:selPlan.dropBestPos;
              members=[...members.slice(0,pos),null,...members.slice(pos)];
            }
            const membersForCalc=members.map(n=>n===null?vname:n);

            let rt,stopsMap={};
            if(direction==='pick'){
              const goal=isAm?toMin('8:55'):toMin('13:25');
              rt=calcReverse(membersForCalc,goal);
            } else {
              const start=isAm?toMin('12:00'):toMin('16:30');
              rt=calcForward(membersForCalc,start);
            }
            (rt.stops||[]).forEach(s=>stopsMap[s.name]=s.arr);
            const isMocoCar=isSelCar&&selPlan.type==='separate'&&selPlan.mocoName;
            const dirLabel=direction==='pick'?'お迎え':'お送り';

            // 空き座席があるか（体験者を入れられるか）
            const cap=VEH[vid].cap;
            const canInsert=!isSelCar&&act.length<cap&&direction==='pick';

            return '<div style="flex:1;min-width:130px;background:var(--bg3);'
              +'border:2px solid '+(isSelCar?acol2:acol2+'33')+';'
              +'border-radius:9px;padding:8px 10px">'
              +'<div style="display:flex;align-items:center;gap:4px;margin-bottom:6px">'
                +'<span style="font-size:16px">'+VEH[vid].icon+'</span>'
                +'<span style="font-size:13px;font-weight:900;color:'+acol2+'">'+VEH[vid].name+'</span>'
                +(isSelCar?'<span style="font-size:8px;background:'+acol2+';color:#000;border-radius:3px;padding:1px 5px;margin-left:auto;font-weight:700">'+dirLabel+'</span>':'')
                +(canInsert?'<button onclick="moveTrialToCar(\''+g.no+'\',\''+(isAm?'am_pick':'pm_pick')+'\')" style="margin-left:auto;font-size:8px;font-weight:800;background:#f5c518;color:#000;border:none;border-radius:4px;padding:2px 6px;cursor:pointer">★ここに入れる</button>':'')
              +'</div>'
              +'<div style="font-size:8px;color:var(--tx3);margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between">'
                +(direction==='pick'
                  ?'<span>出発 <b style="color:'+acol2+'">'+rt.dep+'</b></span>'
                   +(rt.retTime?'<span>🏢着 <b style="color:'+acol2+'">'+rt.retTime+'</b></span>':'')
                  :'<span>出発 <b style="color:'+acol2+'">'+(isAm?'12:00':'16:30')+'</b></span>'
                   +(rt.retTime?'<span>🏢着 <b style="color:'+acol2+'">'+rt.retTime+'</b></span>':''))
              +'</div>'
              +'<div style="display:flex;flex-direction:column;gap:3px">'
              +members.map(n=>{
                const isV=n===null;
                const name=isV?vname:n;
                const arrT=stopsMap[name]||'';
                return '<div style="display:flex;align-items:center;gap:4px;padding:2px 4px;border-radius:4px;'
                  +'background:'+(isV?'rgba(245,197,24,.15)':'transparent')+'">'
                  +(isV
                    ?'<span style="font-size:9px;font-weight:900;color:#f5c518;flex:1">★ '+name+'</span>'
                    :'<span style="font-size:9px;color:var(--tx);flex:1">'+name+'</span>')
                  +'<span style="font-size:9px;font-weight:700;color:'+(isV?'#f5c518':'var(--tx2)')+';white-space:nowrap">'+arrT+'</span>'
                +'</div>';
              }).join('')
              +(isMocoCar?(()=>{
                const goal=direction==='pick'?(isAm?toMin('8:55'):toMin('13:25')):0;
                const mocoRt=direction==='pick'?calcReverse([selPlan.mocoName],goal):calcForward([selPlan.mocoName],isAm?toMin('12:00'):toMin('16:30'));
                const mocoArr=(mocoRt.stops&&mocoRt.stops[0])?mocoRt.stops[0].arr:'';
                return '<div style="margin-top:6px;padding-top:5px;border-top:1px dashed #f5c518">'
                  +'<div style="font-size:8px;color:#f5c518;font-weight:700;margin-bottom:3px">🛻 モコ分離('+dirLabel+')</div>'
                  +'<div style="display:flex;align-items:center;gap:4px;padding:2px 4px;border-radius:4px;background:rgba(245,197,24,.08)">'
                    +'<span style="font-size:9px;color:var(--tx);flex:1">'+selPlan.mocoName+'</span>'
                    +'<span style="font-size:9px;font-weight:700;color:#f5c518">'+mocoArr+'</span>'
                  +'</div></div>';
              })():'')
              +'</div></div>';
          };

          // 体験者の座標を一時登録（calcReverse/calcForward内でS.usersを参照）
          const hadUser2=!!S.users[vname];
          if(!hadUser2) S.users[vname]={addr:'体験者',lat:vC[0],lng:vC[1],boardMin:3};

          // ── お迎えルート ──
          const pickGk=isAm?'am_pick':'pm_pick';
          const pickCards=S.groups[pickGk].map(g=>{
            const isSelCar=sel.g.no===g.no;
            return renderRouteCard('pick',g,isSelCar,sel,'pick');
          }).join('');

          // ── 送りルート ──
          const dropGk=isAm?'am_drop':'pm_drop';
          const dropCards=S.groups[dropGk].map(g=>{
            const isSelCar=sel.g.no===g.no;
            return renderRouteCard('drop',g,isSelCar,sel,'drop');
          }).join('');

          // 一時登録を解除
          if(!hadUser2) delete S.users[vname];

          // ── 入れ替えシミュレーション（午前のみ）──
          let midHtml='';
          if(isAm){
            // 体験者の座標を一時登録
            const hadUserMid=!!S.users[vname];
            if(!hadUserMid) S.users[vname]={addr:'体験者',lat:vC[0],lng:vC[1],boardMin:3};

            // 選択中の号車で入れ替えルートを計算
            const midDg=S.groups.am_drop.find(g=>g.no===sel.g.no);
            const midPg=S.groups.pm_pick.find(g=>g.no===sel.g.no);
            if(midDg&&midPg){
              const mdm=sel.type==='separate'?midDg.members.filter(n=>n!==sel.mocoName):midDg.members;
              const mpm=sel.type==='separate'?midPg.members.filter(n=>n!==sel.mocoName):midPg.members;

              // 体験者なしの現状
              const midNow=calcMid(mdm,mpm,sel.g.no);
              // 体験者を午前送りの最適位置に挿入（午後迎えには乗らない）
              const midNew=calcMid(insertOptimalDrop(mdm,vname),mpm,sel.g.no);

              const mi=sel.midInfo||{ok:midNew.onTime,retTime:midNew.retTime,addMin:Math.round(midNew.retMin-midNow.retMin)};
              const midCol=mi.ok?colGood:colBad;

              // 号車ごとの入れ替えカード（全号車）
              const midCarCards=S.groups.am_drop.map((dg,idx)=>{
                const pg2=S.groups.pm_pick[idx];
                if(!pg2) return '';
                const vid2=trialGetVid(dg);
                if(!vid2||!VEH[vid2]) return '';
                const acol3=VEH[vid2].col;
                const isMidSel=dg.no===sel.g.no;
                const dm2=isMidSel?(sel.type==='separate'?dg.members.filter(n=>n!==sel.mocoName):dg.members):dg.members;
                const pm2=isMidSel?(sel.type==='separate'?pg2.members.filter(n=>n!==sel.mocoName):pg2.members):pg2.members;
                // 体験者を午前送りの最適位置に挿入。午後迎えには乗らない
                const dmCalc=isMidSel?insertOptimalDrop(dm2,vname):dm2;
                const mid2=calcMid(dmCalc,pm2,dg.no);
                const retCol2=mid2.onTime?colGood:colBad;

                return '<div style="flex:1;min-width:130px;background:var(--bg3);border:2px solid '+(isMidSel?acol3:acol3+'33')+';border-radius:9px;padding:8px 10px">'
                  +'<div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">'
                    +'<span style="font-size:16px">'+VEH[vid2].icon+'</span>'

  // ── STEP3: アナログ確認チェック（送迎OKの場合のみ） ──

            +'style="flex:1;padding:8px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:800;border:2px solid '+(staffOk?'#00d4aa':'var(--bdr2)')+';background:'+(staffOk?'#00d4aa':'var(--bg2)')+';color:'+(staffOk?'#000':'var(--tx3)')+'">✅ OK　確保できる</button>'

        const bColE=directOkE?'#00d4aa':'#f5c518';

      step3Html+=

          ?(()=>{

              // 代替候補
              +(altCands.length
                ?'<div style="background:rgba(245,197,24,.08);border:1px solid rgba(245,197,24,.3);border-radius:7px;padding:8px 10px;margin-bottom:10px">'

                    const bd=new Date(alt.ymd+'T00:00:00');
                    const apLbl=alt.ap==='am'?'午前':'午後';
                    const dateStr=(bd.getMonth()+1)+'月'+bd.getDate()+'日';

function applyTrialPlan(){
  const f=S.vacancyForm||{};
  const name=(f.vname||'').trim();
  const r=f.routeResult;
  if(!name){showToast('⚠️ お名前を入力してください','#f87171');return;}
  if(!r||!r.lat){showToast('⚠️ 住所・判定を先に完了してください','#f87171');return;}
  const sim=f.simState||{};
  const gk=sim.gk||'am_pick';
  const carNo=sim.no;
  if(!carNo){showToast('⚠️ 号車が選択されていません','#f87171');return;}

  // 1. 仮予約として追加（まだ未追加なら）
  const days=f.selDays&&f.selDays.length?f.selDays:DAYS.slice();
  const ampm=gk.startsWith('am')?'am':'pm';
  if(!S.users[name]){
    S.users[name]={addr:f.addr||'体験者',lat:r.lat,lng:r.lng,boardMin:3,transport:'shuttle'};
    const schedule={};
    days.forEach(d=>schedule[d]=ampm);
    S.userDays[name]={schedule:schedule};
    S.tentative.add(name);
  }

  // 2. 迎えグループに挿入（最適位置）
  const pickGk=gk;
  const pg=S.groups[pickGk].find(g=>g.no===carNo);
  if(pg&&!pg.members.includes(name)){
    // 最適挿入位置を計算
    const FAC_C=[FAC.lat,FAC.lng];
    const vC=[r.lat,r.lng];
    const act=pg.members.filter(n=>!S.absent.has(n));
    const stops=[FAC_C,...act.map(n=>S.users[n]?[S.users[n].lat,S.users[n].lng]:FAC_C),FAC_C];
    let bestPos=0,bestD=9999;
    for(let i=0;i<stops.length-1;i++){
      const d=dk(stops[i],vC)+dk(vC,stops[i+1])-dk(stops[i],stops[i+1]);
      if(d<bestD){bestD=d;bestPos=i;}
    }
    pg.members.splice(bestPos,0,name);
  }

  // 3. 送りグループにも挿入
  const dropGk=gk==='am_pick'?'am_drop':'pm_drop';
  const dg=S.groups[dropGk].find(g=>g.no===carNo);
  if(dg&&!dg.members.includes(name)){
    const FAC_C=[FAC.lat,FAC.lng];
    const vC=[r.lat,r.lng];
    const act=dg.members.filter(n=>!S.absent.has(n));
    const stops=[FAC_C,...act.map(n=>S.users[n]?[S.users[n].lat,S.users[n].lng]:FAC_C),FAC_C];
    let bestPos=0,bestD=9999;
    for(let i=0;i<stops.length-1;i++){
      const d=dk(stops[i],vC)+dk(vC,stops[i+1])-dk(stops[i],stops[i+1]);
      if(d<bestD){bestD=d;bestPos=i;}
    }
    dg.members.splice(bestPos,0,name);
  }

  renderAll();
  showToast('✅ '+name+' を'+carNo+'号車に追加しました！','#00d4aa');
}

var _vacancyMap=null,_vacancyMarker=null,_vacancyMapReady=false;
function initVacancyMap(lat,lng){
  var el=document.getElementById('vacancy-map');
  if(!el) return;
  // 既に同じ位置で表示済みならスキップ
  if(_vacancyMapReady&&_vacancyMarker){
    var cur=_vacancyMarker.getLatLng();
    if(Math.abs(cur.lat-lat)<0.0001&&Math.abs(cur.lng-lng)<0.0001) return;
  }
  _vacancyMapReady=false;
  loadLeaflet().then(function(){
    if(_vacancyMap){_vacancyMap.remove();_vacancyMap=null;}
    _vacancyMap=L.map('vacancy-map').setView([lat,lng],15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© OpenStreetMap',maxZoom:19
    }).addTo(_vacancyMap);
    // 施設マーカー
    var facIcon=L.divIcon({className:'',html:'<div style="background:#ffd700;border:2px solid #000;border-radius:50%;width:14px;height:14px"></div>',iconSize:[14,14],iconAnchor:[7,7]});
    L.marker([FAC.lat,FAC.lng],{icon:facIcon}).addTo(_vacancyMap).bindPopup('🏠 施設');
    // 体験者マーカー（ドラッグ可能）
    var redIcon=L.divIcon({className:'',html:'<div style="background:#f44;border:2px solid #fff;border-radius:50%;width:18px;height:18px;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',iconSize:[18,18],iconAnchor:[9,9]});
    _vacancyMarker=L.marker([lat,lng],{icon:redIcon,draggable:true}).addTo(_vacancyMap).bindPopup('📍 体験者の位置<br><span style="font-size:10px">ドラッグまたは地図クリックで修正</span>').openPopup();
    _vacancyMarker.on('dragend',function(){
      var p=_vacancyMarker.getLatLng();
      updateVacancyCoord(p.lat,p.lng);
    });
    _vacancyMap.on('click',function(e){
      _vacancyMarker.setLatLng(e.latlng);
      updateVacancyCoord(e.latlng.lat,e.latlng.lng);
    });
    _vacancyMapReady=true;
  });
}
function updateVacancyCoord(lat,lng){
  var f=S.vacancyForm||{};
  if(f.routeResult){
    f.routeResult.lat=lat;
    f.routeResult.lng=lng;
  }
  // 手動修正フラグを立てる（再判定時にジオコーディングをスキップ）
  S.vacancyForm=Object.assign(f,{coordManual:true});
  showToast('📍 位置を修正しました（再判定してください）','#60a5fa');
}

async function checkVacancyRoute(){
  const f=S.vacancyForm||{};
  if(!f.addr){showToast('住所を入力してください','#f87171');return;}
  try{
    let result;
    // 手動でピンを修正済みならジオコーディングをスキップ
    if(f.coordManual&&f.routeResult&&f.routeResult.lat){
      result={lat:f.routeResult.lat,lng:f.routeResult.lng};
      showToast('📍 修正済みの位置で再判定中...','#60a5fa');
    }else{
      showToast('📍 住所から座標を取得中...','#60a5fa');
      result=await geocodeAddress(f.addr);
    }

    // Google Maps APIで体験者の実道路距離を取得
    if(S.googleApiKey&&S.googleApiKey.trim()){
      showToast('🗺️ 実道路距離を取得中...','#4285f4');
      const distOk=await fetchOnePersonDistances(result.lat,result.lng);
      if(distOk>0) showToast('✅ '+distOk+'区間の距離を取得','#00d4aa');
    }

    const newC=[result.lat,result.lng];
    let bestDetour=9999,bestCarName='',bestRouteKey='';
    ['am_pick','pm_pick'].forEach(gk=>{
      S.groups[gk].forEach(g=>{
        const act=g.members.filter(n=>!S.absent.has(n));
        if(!act.length) return;
        const stops=[[FAC.lat,FAC.lng],...act.map(n=>[S.users[n].lat,S.users[n].lng]),[FAC.lat,FAC.lng]];
        for(let i=0;i<stops.length-1;i++){
          const from=stops[i],to=stops[i+1];
          // キャッシュがあれば実距離を使う
          const ck=cacheKey(from,newC);
          const ck2=cacheKey(newC,to);
          const d1=S.googleDistCache[ck]?S.googleDistCache[ck].km:dk(from,newC)*ROAD_FACTOR;
          const d2=S.googleDistCache[ck2]?S.googleDistCache[ck2].km:dk(newC,to)*ROAD_FACTOR;
          const d0Ck=cacheKey(from,to);
          const d0=S.googleDistCache[d0Ck]?S.googleDistCache[d0Ck].km:dk(from,to)*ROAD_FACTOR;
          const detourKm=d1+d2-d0;
          // 時間もキャッシュがあれば使う
          const t1=S.googleDistCache[ck]?S.googleDistCache[ck].min:d1/25*60;
          const t2=S.googleDistCache[ck2]?S.googleDistCache[ck2].min:d2/25*60;
          const t0=S.googleDistCache[d0Ck]?S.googleDistCache[d0Ck].min:d0/25*60;
          const detourMin=Math.round(t1+t2-t0);
          if(detourMin<bestDetour){
            bestDetour=detourMin;
            bestCarName=g.no+'号車('+VEH[g.vid].name+')';
            bestRouteKey=gk==='am_pick'?'午前':'午後';
          }
        }
      });
    });
    // 最寄り号車(gk)で増車判定
    const bestGk=bestRouteKey==='午前'?'am_pick':'pm_pick';
    const bestAmpm=bestRouteKey==='午前'?'am':'pm';
    const routeVids=(S.groups[bestGk]||[]).map(g=>g.vid);
    const ALL_VIDS_CHK=['stepwgn','sienta_w','sienta_s','cube','moco'];
    const spareVidsChk=ALL_VIDS_CHK.filter(id=>!routeVids.includes(id));
    const okCarsChk=checkMonAvailSeats(bestAmpm,false,false,(f.mobility==='assist')).filter(cr=>cr.okSeats&&cr.okSeats.length>0);
    // 月曜のみ座席チェック、他曜日はシンプル定員チェック
    const counts2=getDayCounts();
    const dayName=new Date().getDay()===1?'月':'火'; // 実際には選択曜日で判定
    const selD=(f.selDays&&f.selDays.length>0)?f.selDays:DAYS;
    const isMon=selD.includes('月')&&selD.length===1;
    const avail=MAX_AM-counts2['月'][bestAmpm];
    const extraCar=isMon&&avail>0&&okCarsChk.length===0;
    S.vacancyForm=Object.assign(f,{
      simState: f.simState||{},
      routeResult:{
        routeOk:bestDetour<=15,
        detourMin:bestDetour,
        nearCar:bestRouteKey+' '+bestCarName,
        extraCar:extraCar,
        spareVids:extraCar?spareVidsChk:[],
        lat:result.lat,
        lng:result.lng
      }
    });
    renderMain();
  }catch(e){showToast(e.message||'住所から座標を取得できません。東松山市内の町名（石橋・高坂・岩殿など）を含む住所を入力してください。','#f87171');}
}

// 候補日を4週先まで構築してS.vacancyForm.candidatesに保存
function buildCandidates(){
  const f=S.vacancyForm||{};
  const selDays  = f.selDays||[];
  const allDays  = selDays.length===0||selDays.length===DAYS.length;
  const targetDays = allDays?DAYS:selDays;
  const targetAmpm = f.reqAmpm?[f.reqAmpm]:['am','pm'];
  const walk = (f.mobility||'ok')==='assist';
  const candidates=[];

  targetDays.forEach(dayName=>{
    const dates=futureDatesForDay(dayName);
    dates.forEach(ymd=>{
      targetAmpm.forEach(ap=>{
        const j=judgeDateSlot(ymd,dayName,ap,false,false,walk);
        candidates.push(j);
      });
    });
  });

  // 日付順に並べ替え
  candidates.sort((a,b)=>a.ymd.localeCompare(b.ymd));
  S.vacancyForm=Object.assign(f,{candidates});
}

function parseCSVLine(line){
  const cols=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
    else cur+=c;
  }
  cols.push(cur.trim());
  return cols;
}
function parseDayCols(dayStr,ampmStr){
  // 「火木」→ {火:'am', 木:'am'}、午前→am、午後→pm
  const schedule={};
  if(!dayStr) return schedule;
  const ap=ampmStr&&ampmStr.includes('午後')?'pm':'am';
  const validDays=['月','火','水','木','金','土'];
  for(const ch of dayStr){
    if(validDays.includes(ch)) schedule[ch]=ap;
  }
  return schedule;
}
function processCSVText(text){
  text=text.replace(/^\uFEFF/,'');
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){showToast('⚠ データがありません','#f44');return;}
  const hdr=parseCSVLine(lines[0]);
  const iName=hdr.indexOf('名前');
  const iAddr=hdr.indexOf('住所');
  const iDay=hdr.indexOf('利用曜日');
  const iAmpm=hdr.findIndex(h=>h==='午前午後'||h==='午前/午後');
  const iKaigo=hdr.indexOf('要介護度');
  const iStatus=hdr.indexOf('利用ステータス');
  if(iName<0){showToast('⚠ 「名前」列が見つかりません','#f44');return;}
  const newUsers={};
  const newUserDays={};
  let dayCount=0, skipCount=0;
  for(let i=1;i<lines.length;i++){
    const cols=parseCSVLine(lines[i]);
    const name=cols[iName]; if(!name) continue;
    // 利用ステータスが「終了」等なら除外
    if(iStatus>=0){
      const st=(cols[iStatus]||'').trim();
      if(st==='終了'||st==='中止'||st==='休止'){skipCount++;continue;}
    }
    const addr=iAddr>=0? cols[iAddr]:'';
    const old=S.users[name]||{};
    newUsers[name]={
      lat:old.lat||0, lng:old.lng||0,
      addr:addr||old.addr||'',
      cond:old.cond||'良好',
      boardMin:old.boardMin||3,
      no3:old.no3||false,
      step:old.step||false,
      transport:old.transport||'shuttle'
    };
    // 要介護度を保存
    if(iKaigo>=0&&cols[iKaigo]) newUsers[name].kaigo=cols[iKaigo];
    // 利用曜日・午前午後を読み込み
    if(iDay>=0){
      const dayStr=cols[iDay]||'';
      const ampmStr=iAmpm>=0?(cols[iAmpm]||''):'';
      const schedule=parseDayCols(dayStr,ampmStr);
      if(Object.keys(schedule).length>0){
        const oldUd=S.userDays[name]||{};
        newUserDays[name]={schedule:schedule, memo:oldUd.memo||''};
        dayCount++;
      }
    }
  }
  S.users=newUsers;
  // 曜日データがあれば反映（既存の手動設定を上書き）
  if(iDay>=0){
    // 新規CSVにいない利用者の曜日設定は削除
    Object.keys(S.userDays).forEach(n=>{if(!Object.keys(newUsers).includes(n)) delete S.userDays[n];});
    // 新しい曜日設定を反映
    Object.keys(newUserDays).forEach(n=>{S.userDays[n]=newUserDays[n];});
  }
  const names=Object.keys(newUsers);
  ['am_pick','am_drop','pm_pick','pm_drop'].forEach(k=>{
    if(S.groups[k]) S.groups[k].forEach(g=>{g.members=g.members.filter(m=>names.includes(m));});
  });
  Object.keys(S.dayGroups).forEach(day=>{
    const dg=S.dayGroups[day];
    ['am_pick','am_drop','pm_pick','pm_drop'].forEach(k=>{
      if(dg[k]) dg[k].forEach(g=>{g.members=g.members.filter(m=>names.includes(m));});
    });
  });
  Object.keys(S.userDays).forEach(n=>{if(!names.includes(n)) delete S.userDays[n];});
  [S.travelOvr,S.notified,S.schedTime].forEach(obj=>{
    if(obj) Object.keys(obj).forEach(n=>{if(!names.includes(n)) delete obj[n];});
  });
  renderAll();
  const dayMsg=iDay>=0?' / 曜日設定:'+dayCount+'名':'';
  const skipMsg=skipCount>0?' / 終了等:'+skipCount+'名除外':'';
  showToast('✅ スプレッドシートから読み込み完了（'+names.length+'名'+dayMsg+skipMsg+'）','#4caf50');
}

      // 要介護度を保存
      if(iKaigo>=0&&cols[iKaigo]) newUsers[name].kaigo=cols[iKaigo];
      // 利用曜日・午前午後を読み込み
      if(iDay>=0){
        const dayStr=cols[iDay]||'';
        const ampmStr=iAmpm>=0?(cols[iAmpm]||''):'';
        const schedule=parseDayCols(dayStr,ampmStr);
        if(Object.keys(schedule).length>0){
          const oldUd=S.userDays[name]||{};
          newUserDays[name]={schedule:schedule, memo:oldUd.memo||''};
          dayCount++;
        }
      }
    }
    S.users=newUsers;
    // 曜日データがあれば反映
    if(iDay>=0){
      Object.keys(S.userDays).forEach(n=>{if(!Object.keys(newUsers).includes(n)) delete S.userDays[n];});
      Object.keys(newUserDays).forEach(n=>{S.userDays[n]=newUserDays[n];});
    }
    const names=Object.keys(newUsers);
    // 現在の曜日グループから不要な名前を除去
    ['am_pick','am_drop','pm_pick','pm_drop'].forEach(k=>{
      if(S.groups[k]) S.groups[k].forEach(g=>{ g.members=g.members.filter(m=>names.includes(m)); });
    });
    // 全曜日グループから不要な名前を除去
    Object.keys(S.dayGroups).forEach(day=>{
      const dg=S.dayGroups[day];
      ['am_pick','am_drop','pm_pick','pm_drop'].forEach(k=>{
        if(dg[k]) dg[k].forEach(g=>{ g.members=g.members.filter(m=>names.includes(m)); });
      });
    });
    // 曜日設定から不要な名前を除去
    Object.keys(S.userDays).forEach(n=>{ if(!names.includes(n)) delete S.userDays[n]; });
    // その他の名前キーデータも整理
    [S.travelOvr,S.notified,S.schedTime].forEach(obj=>{
      if(obj) Object.keys(obj).forEach(n=>{ if(!names.includes(n)) delete obj[n]; });
    });
    renderAll();
    const dayMsg=iDay>=0?' / 曜日設定:'+dayCount+'名':'';
    const skipMsg=skipCount>0?' / 終了等:'+skipCount+'名除外':'';
    showToast('✅ CSV読み込み完了（'+names.length+'名'+dayMsg+skipMsg+'）','#4caf50');
  };
  reader.readAsText(file,'UTF-8');
  e.target.value='';
}

// userDaysの変更をgroupsに同期（未配車の利用者をロックされていない号車に追加、外れた利用者を除去）
function syncDayUsersToGroups(){
  var du=getDayUsers();
  var allAm=new Set(du.am), allPm=new Set(du.pm);
  // ロックされていない号車のうち空きが最も多い号車を探すヘルパー
  function findUnlockedCar(groups,tabKey){
    var best=-1, bestSpace=-1;
    groups.forEach(function(g,i){
      var lk=tabKey+'_'+g.no;
      if(S.lockedCars[lk]) return; // ロック中はスキップ
      var vid=effectiveVid(g,tabKey);
      var cap=(VEH[vid]||{}).cap||7;
      var space=cap-g.members.length;
      if(space>bestSpace){bestSpace=space;best=i;}
    });
    // 全車ロック中なら仕方なく0番目に入れる
    return best>=0?best:0;
  }
  // 現在どの車にも乗っていないAM利用者を追加
  var assignedAm=new Set();
  S.groups.am_pick.forEach(function(g){g.members.forEach(function(n){assignedAm.add(n);});});
  allAm.forEach(function(n){
    if(!assignedAm.has(n)){
      var pi=findUnlockedCar(S.groups.am_pick,'am_pick');
      var di=findUnlockedCar(S.groups.am_drop,'am_drop');
      S.groups.am_pick[pi].members.push(n);
      S.groups.am_drop[di].members.push(n);
    }
  });
  // AMから外れた利用者を全車から除去（AM利用者だけ残す）
  S.groups.am_pick.forEach(function(g){g.members=g.members.filter(function(n){return allAm.has(n);});});
  S.groups.am_drop.forEach(function(g){g.members=g.members.filter(function(n){return allAm.has(n);});});
  // PM利用者も同様
  var assignedPm=new Set();
  S.groups.pm_pick.forEach(function(g){g.members.forEach(function(n){assignedPm.add(n);});});
  allPm.forEach(function(n){
    if(!assignedPm.has(n)){
      var pi=findUnlockedCar(S.groups.pm_pick,'pm_pick');
      var di=findUnlockedCar(S.groups.pm_drop,'pm_drop');
      S.groups.pm_pick[pi].members.push(n);
      S.groups.pm_drop[di].members.push(n);
    }
  });
  S.groups.pm_pick.forEach(function(g){g.members=g.members.filter(function(n){return allPm.has(n);});});
  S.groups.pm_drop.forEach(function(g){g.members=g.members.filter(function(n){return allPm.has(n);});});
}

function autoAssign(){
  const du=getDayUsers();
  const amNames=du.am.filter(n=>!S.absent.has(n));
  const pmNames=du.pm.filter(n=>!S.absent.has(n));
  const maxNeeded=Math.max(amNames.length,pmNames.length);

  // 人数に合わせて号車を自動追加
  let addedCars=0;
  while(S.groups.am_pick.length<5){
    const curCap=S.groups.am_pick.reduce((s,g)=>{const vid=effectiveVid(g,'am_pick');const v=VEH[vid]||VEH[g.vid];return s+(v?v.cap:0);},0);
    if(curCap>=maxNeeded) break;
    // 号車を追加
    const used=getUsedVids();
    const priority=['sienta_s','moco','cube','sienta_w','stepwgn'];
    const defVid=priority.find(id=>!used.has(id))||'';
    const no=getNextCarNo();
    ['am_pick','am_drop','pm_pick','pm_drop'].forEach(gk=>{
      S.groups[gk].push({no:no, vid:defVid, staff:'', members:[]});
    });
    addedCars++;
  }
  if(addedCars>0) showToast('🚗 人数に合わせて'+addedCars+'台追加しました','#22d3ee');

  // 定員合計チェック（それでも足りない場合のみ警告）
  const amCap=S.groups.am_pick.reduce((s,g)=>{const vid=effectiveVid(g,'am_pick');const v=VEH[vid]||VEH[g.vid];return s+(v?v.cap:0);},0);
  const pmCap=S.groups.pm_pick.reduce((s,g)=>{const vid=effectiveVid(g,'pm_pick');const v=VEH[vid]||VEH[g.vid];return s+(v?v.cap:0);},0);
  if(amNames.length>amCap){
    if(!confirm('⚠️ 午前 '+amNames.length+'名に対し、定員合計 '+amCap+'名です。\n'+
      (amNames.length-amCap)+'名が乗り切れません。\n5台すべて使用中のため、これ以上追加できません。\n\nこのまま続けますか？')) return;
  }
  if(pmNames.length>pmCap){
    if(!confirm('⚠️ 午後 '+pmNames.length+'名に対し、定員合計 '+pmCap+'名です。\n'+
      (pmNames.length-pmCap)+'名が乗り切れません。\n5台すべて使用中のため、これ以上追加できません。\n\nこのまま続けますか？')) return;
  }

  // 最寄り順ルート（nearest neighbor法）
  // startから一番近い→次に近い→…と繋いでいく
  function nearestNeighborRoute(names, start){
    if(names.length===0) return [];
    const remaining=new Set(names);
    const route=[];
    let cur=start; // [lat,lng]
    while(remaining.size>0){
      let best=null, bestDist=Infinity;
      for(const n of remaining){
        const d=dk(cur,coord(n));
        if(d<bestDist){bestDist=d;best=n;}
      }
      route.push(best);
      cur=coord(best);
      remaining.delete(best);
    }
    return route;
  }

  // ルート推定距離（dk統一: キャッシュ有無に左右されず一貫した比較が可能）
  function routeTime(r){
    if(!r.length) return 0;
    let d=dk(FC,coord(r[0]));
    for(let i=0;i<r.length-1;i++) d+=dk(coord(r[i]),coord(r[i+1]));
    d+=dk(coord(r[r.length-1]),FC);
    return d;
  }
  // ルート最適化: 一番遠い人を先頭に固定し、残りの最短順を全探索
  function optimizeRoute(names){
    if(names.length<=1) return names;
    // 一番遠い人を特定（迎え: 遠い人を最初にピックアップ）
    let maxD=0, farthest=null;
    for(const n of names){
      const d=dk(FC,coord(n));
      if(d>maxD){maxD=d;farthest=n;}
    }
    const rest=names.filter(n=>n!==farthest);
    if(rest.length===0) return [farthest];
    // 学習スコア: 社長の順序を反映（ペア順序の一致度をボーナスとして加算）
    const learn=S.routeLearn;
    function learnScore(r){
      if(!learn||!learn.pairOrder) return 0;
      let score=0;
      for(let i=0;i<r.length;i++){
        for(let j=i+1;j<r.length;j++){
          score+=(learn.pairOrder[r[i]+'|'+r[j]]||0);
        }
      }
      return score;
    }
    if(rest.length<=7){
      // 残りの全順列を試す（7!=5040 → 一瞬）
      let bestRoute=null, bestDist=Infinity, bestLearn=-1;
      (function permute(arr,l){
        if(l===arr.length){
          const full=[farthest,...arr];
          const d=routeTime(full);
          const ls=learnScore(full);
          // 距離が同等（5%以内）なら学習スコアが高い方を優先
          if(d<bestDist*0.95||(d<bestDist*1.05&&ls>bestLearn)){
            bestDist=Math.min(d,bestDist);bestLearn=ls;bestRoute=[...arr];
          }
          return;
        }
        for(let i=l;i<arr.length;i++){
          const tmp=arr[l];arr[l]=arr[i];arr[i]=tmp;
          permute(arr,l+1);
          arr[i]=arr[l];arr[l]=tmp;
        }
      })([...rest],0);
      return [farthest,...bestRoute];
    } else {
      // 8人以上: 遠い人先頭 + 残りをnearest neighbor + 2-opt
      const nn=nearestNeighborRoute(rest, coord(farthest));
      let best=[farthest,...nn], bestDist=routeTime(best);
      let improved=true;
      while(improved){
        improved=false;
        // 先頭(farthest)は固定、index 1以降で2-opt
        for(let i=1;i<best.length-1;i++){
          for(let j=i+1;j<best.length;j++){
            const nr=[...best.slice(0,i),...best.slice(i,j+1).reverse(),...best.slice(j+1)];
            const nd=routeTime(nr);
            if(nd<bestDist-0.0001){best=nr;bestDist=nd;improved=true;}
          }
        }
      }
      return best;
    }
  }

  // 方角でグループ分け＋ルート最適化＋車間入れ替え改善
  function distribute(names, groups, tabKey){
    groups.forEach(g=>g.members=[]);
    if(names.length===0) return;

    // effectiveVidで実際の車種（手動変更含む）の定員を取得
    const caps=groups.map(g=>{const vid=tabKey?effectiveVid(g,tabKey):g.vid;const v=VEH[vid]||VEH[g.vid];return v?v.cap:4;});
    const total=caps.reduce((a,b)=>a+b,0);
    if(total===0) return;

    // ① 施設から見た方角でソート → 仮振り分け
    const sorted=[...names].sort((a,b)=>{
      const angA=Math.atan2(coord(a)[1]-FC[1],coord(a)[0]-FC[0]);
      const angB=Math.atan2(coord(b)[1]-FC[1],coord(b)[0]-FC[0]);
      return angA-angB;
    });

    let assigned=0;
    const remaining=sorted.length;
    const counts=caps.map((c,i)=>{
      if(i===caps.length-1) return Math.min(caps[i], sorted.length-assigned);
      const n=Math.min(caps[i], Math.round(remaining*c/total));
      assigned+=n;
      return n;
    });

    // 定員制限で配置しきれなかった人を空きのある車に追加
    let totalAssigned=counts.reduce((a,b)=>a+b,0);
    let idx=0;
    groups.forEach((g,i)=>{
      g.members=sorted.slice(idx,idx+counts[i]);
      idx+=counts[i];
    });
    // 未配置の人がいれば空きのある車に入れる
    for(let si=idx;si<sorted.length;si++){
      let bestGi=-1, bestSpace=0;
      for(let gi=0;gi<groups.length;gi++){
        const space=caps[gi]-groups[gi].members.length;
        if(space>bestSpace){bestSpace=space;bestGi=gi;}
      }
      if(bestGi>=0) groups[bestGi].members.push(sorted[si]);
    }

    // ①-b 学習データがあれば、同じ車に乗せたペアを優先的にグループ化
    const learn=S.routeLearn;
    if(learn&&learn.pairOrder&&Object.keys(learn.pairOrder).length>0){
      // 同じ車グループのスコアが高いペアを同じ車に集める
      let learnImproved=true, learnRound=0;
      while(learnImproved&&learnRound<10){
        learnImproved=false;learnRound++;
        for(let gi=0;gi<groups.length;gi++){
          for(let mi=groups[gi].members.length-1;mi>=0;mi--){
            const person=groups[gi].members[mi];
            // この人の「同グループスコア」を各車で計算
            let bestGi=gi, bestScore=0;
            groups[gi].members.forEach(other=>{
              if(other===person) return;
              const gk='group|'+[person,other].sort().join('|');
              bestScore+=(learn.pairOrder[gk]||0);
            });
            for(let gj=0;gj<groups.length;gj++){
              if(gi===gj) continue;
              if(groups[gj].members.length>=caps[gj]) continue;
              let score=0;
              groups[gj].members.forEach(other=>{
                const gk='group|'+[person,other].sort().join('|');
                score+=(learn.pairOrder[gk]||0);
              });
              if(score>bestScore+1){bestScore=score;bestGi=gj;}
            }
            if(bestGi!==gi){
              groups[gi].members.splice(mi,1);
              groups[bestGi].members.push(person);
              learnImproved=true;
            }
          }
        }
      }
    }

    // ② 車間入れ替え改善: 利用者を別の車に移すと全体の走行時間が短くなるか試す
    let swapImproved=true, swapRound=0;
    while(swapImproved&&swapRound<20){
      swapImproved=false;swapRound++;
      for(let gi=0;gi<groups.length;gi++){
        for(let mi=groups[gi].members.length-1;mi>=0;mi--){
          const person=groups[gi].members[mi];
          if(groups[gi].members.length<=1) continue; // 1人しかいない車からは移さない
          // この人を抜いた場合の元の車の距離
          const without=[...groups[gi].members];without.splice(mi,1);
          const distWithout=routeTime(without);
          const distWith=routeTime(groups[gi].members);
          const savingFrom=distWith-distWithout; // 抜くことで減る時間

          let bestTarget=-1, bestCost=Infinity;
          for(let gj=0;gj<groups.length;gj++){
            if(gi===gj) continue;
            if(groups[gj].members.length>=caps[gj]) continue; // 定員オーバー
            // この人を追加した場合のコスト増分を計算
            // 最適な挿入位置を探す
            const mem=groups[gj].members;
            let minInsertCost=Infinity;
            for(let pos=0;pos<=mem.length;pos++){
              const trial=[...mem.slice(0,pos),person,...mem.slice(pos)];
              const cost=routeTime(trial)-routeTime(mem);
              if(cost<minInsertCost) minInsertCost=cost;
            }
            if(minInsertCost<bestCost){bestCost=minInsertCost;bestTarget=gj;}
          }
          // 移した方が全体の走行時間が短くなるか？
          if(bestTarget>=0&&bestCost<savingFrom-0.0001){
            // 移動実行
            groups[gi].members.splice(mi,1);
            // 最適位置に挿入
            const mem=groups[bestTarget].members;
            let minC=Infinity,bestPos=0;
            for(let pos=0;pos<=mem.length;pos++){
              const trial=[...mem.slice(0,pos),person,...mem.slice(pos)];
              const cost=routeTime(trial);
              if(cost<minC){minC=cost;bestPos=pos;}
            }
            groups[bestTarget].members.splice(bestPos,0,person);
            swapImproved=true;
          }
        }
      }
    }

    // ③ 各車のルート順を最適化（全パターン探索）
    groups.forEach(g=>{
      if(g.members.length>0) g.members=optimizeRoute(g.members);
    });
  }

  // ロック中の車のメンバーを保護して振り分け
  function distributeWithLock(names, groups, tabKey){
    // ロック中の車のメンバーを特定
    const lockedNames=new Set();
    groups.forEach(g=>{
      if(S.lockedCars[tabKey+'_'+g.no]){
        g.members.filter(n=>names.includes(n)).forEach(n=>lockedNames.add(n));
      }
    });
    // ロックされていない人だけを振り分け対象にする
    const freeNames=names.filter(n=>!lockedNames.has(n));
    // ロック中の車はメンバーを保持、それ以外はクリア
    const freeGroups=[];
    groups.forEach(g=>{
      if(S.lockedCars[tabKey+'_'+g.no]){
        // ロック中: 欠席者だけ除外、順序もそのまま
        g.members=g.members.filter(n=>names.includes(n));
      } else {
        g.members=[];
        freeGroups.push(g);
      }
    });
    if(freeGroups.length>0&&freeNames.length>0){
      distribute(freeNames, freeGroups, tabKey);
    }
    if(lockedNames.size>0){
      showToast('🔒 ロック中の車はそのまま保持しました','#60a5fa');
    }
  }

  // 午前（迎え＝送り同じメンバー）
  distributeWithLock(amNames, S.groups.am_pick, 'am_pick');
  S.groups.am_drop.forEach((g,i)=>{
    g.members=[...S.groups.am_pick[i].members];
  });
  // 午後（迎え＝送り同じメンバー）
  distributeWithLock(pmNames, S.groups.pm_pick, 'pm_pick');
  S.groups.pm_drop.forEach((g,i)=>{
    g.members=[...S.groups.pm_pick[i].members];
  });

  // 手動配置をリセット（ロック中の車は除く）
  Object.keys(S.seatOvr).forEach(k=>{
    const parts=k.split('_'); // tabKey_carNo_seatId
    const lockKey=parts[0]+'_'+parts[1];
    if(!S.lockedCars[lockKey]) delete S.seatOvr[k];
  });
  Object.keys(S.routeOvr).forEach(k=>{
    if(!S.lockedCars[k]) delete S.routeOvr[k];
  });

  // ベースライン保存（後で比較・学習に使う）
  S.autoBaseline={
    day:S.currentDay,

// 号車追加・削除（3台↔4台）
// ═══════════════════════════════════════════════
function getUsedVids(){
  const used=new Set();
  S.groups.am_pick.forEach(g=>{if(g.vid) used.add(g.vid);});
  return used;
}
function getNextCarNo(){
  const nos=S.groups.am_pick.map(g=>g.no);
  const labels=['①','②','③','④','⑤'];
  for(const l of labels){ if(!nos.includes(l)) return l; }
  return '⑤';
}
function addCar(){
  if(S.groups.am_pick.length>=5){showToast('⚠️ 最大5台までです','#f87171');return;}
  // 使っていない車両を探す（優先順: sienta_s → moco → 残り）
  const used=getUsedVids();
  const priority=['sienta_s','moco','cube','sienta_w','stepwgn'];
  let defVid=priority.find(id=>!used.has(id))||'';
  const no=getNextCarNo();
  ['am_pick','am_drop','pm_pick','pm_drop'].forEach(gk=>{
    S.groups[gk].push({no:no, vid:defVid, staff:'', members:[]});
  });
  renderAll();
  showToast('🚗 '+no+'号車を追加しました（車種はヘッダーで変更可）','#00d4aa');
}
function removeCar(targetNo){
  if(S.groups.am_pick.length<=2){showToast('⚠️ 最低2台は必要です','#f87171');return;}
  if(!targetNo) targetNo=S.groups.am_pick[S.groups.am_pick.length-1].no;
  if(!confirm(targetNo+'号車を削除します。\n乗っているメンバーは他の車に移動します。\nよろしいですか？')) return;
  ['am_pick','am_drop','pm_pick','pm_drop'].forEach(gk=>{
    const idx=S.groups[gk].findIndex(g=>g.no===targetNo);
    if(idx<0) return;
    const removed=S.groups[gk].splice(idx,1)[0];
    // メンバーを残りの車に分散（空きが多い車から順に）
    if(removed.members.length>0){
      removed.members.forEach(name=>{
        let bestIdx=0, bestSpace=-1;
        S.groups[gk].forEach((g,i)=>{
          const evid=effectiveVid(g,gk);const cap=(VEH[evid]||VEH[g.vid]||{cap:4}).cap;
          const space=cap-g.members.length;
          if(space>bestSpace){bestSpace=space;bestIdx=i;}
        });
        S.groups[gk][bestIdx].members.push(name);
      });
    }
  });
  // vidOvr, seatOvr, routeOvr, lockedCars の該当キーを削除
  Object.keys(S.vidOvr).forEach(k=>{if(k.includes('_'+targetNo)) delete S.vidOvr[k];});
  Object.keys(S.seatOvr).forEach(k=>{if(k.includes('_'+targetNo+'_')) delete S.seatOvr[k];});
  Object.keys(S.routeOvr).forEach(k=>{if(k.includes('_'+targetNo)) delete S.routeOvr[k];});
  Object.keys(S.lockedCars).forEach(k=>{if(k.includes('_'+targetNo)) delete S.lockedCars[k];});
  // currentCarが削除した号車を指していたらリセット
  Object.keys(S.currentCar).forEach(k=>{if(S.currentCar[k]===targetNo) S.currentCar[k]=S.groups.am_pick[0].no;});
  renderAll();
  showToast('🗑️ '+targetNo+'号車を削除しました','#fb923c');
}

function _evalCalcCar(members,mode){
  const act=members.filter(n=>!S.absent.has(n)&&needsShuttle(n));
  if(!act.length) return {dist:0,time:0,members:[]};
  let dist=0,prev=FC;
  act.forEach(n=>{
    const c=coord(n);
    const ck=cacheKey(prev,c);
    const cached=S.googleDistCache[ck];
    dist+=cached?cached.km:dk(prev,c)*ROAD_FACTOR;
    prev=c;
  });
  const ckRet=cacheKey(prev,FC);
  const cachedRet=S.googleDistCache[ckRet];
  dist+=cachedRet?cachedRet.km:dk(prev,FC)*ROAD_FACTOR;
  const rt=mode==='pick'?calcReverse(act,toMin('8:55')):calcForward(act,toMin('16:30'));
  return {dist:Math.round(dist*10)/10, time:rt.rideMax||0, members:[...act]};
}
