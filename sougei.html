var _optData=null;

function _optDist(members){
  if(!members.length) return 0;
  let d=dk(FC,coord(members[0]));
  for(let i=0;i<members.length-1;i++) d+=dk(coord(members[i]),coord(members[i+1]));
  d+=dk(coord(members[members.length-1]),FC);
  return d;
}

function _optInsertBest(arr,name){
  if(!arr.length) return 0;
  let best=0,bestD=Infinity;
  for(let p=0;p<=arr.length;p++){
    const trial=[...arr.slice(0,p),name,...arr.slice(p)];
    const d=_optDist(trial);
    if(d<bestD){bestD=d;best=p;}
  }
  return best;
}

function checkRouteOptimization(ampm){
  const pickKey=ampm==='am'?'am_pick':'pm_pick';
  const dropKey=ampm==='am'?'am_drop':'pm_drop';
  const dirLabel=ampm==='am'?'午前':'午後';
  const grps=S.groups[pickKey];
  if(!grps||grps.length<=1){showToast('⚠ 号車が1台しかありません','#f87171');return;}

  const cars=grps.map((g,i)=>{
    const vid=effectiveVid(g,pickKey);
    const v=VEH[vid];
    return {
      g,idx:i,no:g.no,vid,
      vname:v?v.name:'未設定',icon:v?v.icon:'🚗',col:v?v.col:'#888',
      cap:v?v.cap:0,
      members:g.members.filter(n=>!S.absent.has(n)&&needsShuttle(n))
    };
  });

  const activeCars=cars.filter(c=>c.members.length>0);
  if(activeCars.length<=1){showToast('✅ すでに最小台数（'+activeCars.length+'台）です','#4caf50');return;}

  // ── 車の廃止チェック（少人数の車から順に試す） ──
  const elimSuggestions=[];
  [...activeCars].sort((a,b)=>a.members.length-b.members.length).forEach(car=>{
    const others=activeCars.filter(c=>c.no!==car.no);
    const totalFree=others.reduce((s,c)=>s+(c.cap-c.members.length),0);
    if(totalFree<car.members.length) return;

    const tempMem={};
    others.forEach(c=>{tempMem[c.no]=[...c.members];});
    const tempFree={};
    others.forEach(c=>{tempFree[c.no]=c.cap-c.members.length;});

    const moves=[];
    let allOk=true;
    for(const name of car.members){
      let bestNo=null,bestCost=Infinity;
      for(const oc of others){
        if(tempFree[oc.no]<=0) continue;
        const mem=tempMem[oc.no];
        const origD=_optDist(mem);
        for(let p=0;p<=mem.length;p++){
          const trial=[...mem.slice(0,p),name,...mem.slice(p)];
          const cost=_optDist(trial)-origD;
          if(cost<bestCost){bestCost=cost;bestNo=oc.no;}
        }
      }
      if(bestNo===null){allOk=false;break;}
      const target=others.find(c=>c.no===bestNo);
      const detourMin=Math.round(bestCost*ROAD_FACTOR/DRIVE_SPEED*60);
      moves.push({name,toNo:bestNo,toVname:target.vname,toIcon:target.icon,detourMin});
      const mem=tempMem[bestNo];
      const pos=_optInsertBest(mem,name);
      mem.splice(pos,0,name);
      tempFree[bestNo]--;
    }
    if(!allOk) return;

    const elimDistKm=(_optDist(car.members)*ROAD_FACTOR).toFixed(1);
    const origOD=others.reduce((s,c)=>s+_optDist(c.members),0)*ROAD_FACTOR;
    const newOD=others.reduce((s,c)=>s+_optDist(tempMem[c.no]),0)*ROAD_FACTOR;
    const extraDistKm=(newOD-origOD).toFixed(1);
    const maxDetour=Math.max(...moves.map(m=>m.detourMin));
    elimSuggestions.push({car,moves,elimDistKm,extraDistKm,maxDetour});
  });

  // ── 個別移動チェック（台数は変わらないが距離短縮） ──
  const swapSuggestions=[];
  const coveredNames=new Set();
  elimSuggestions.forEach(s=>s.moves.forEach(m=>coveredNames.add(m.name)));

  activeCars.forEach(car=>{
    if(car.members.length<=1) return;
    car.members.forEach(name=>{
      if(coveredNames.has(name)) return;
      const withD=_optDist(car.members);
      const withoutD=_optDist(car.members.filter(n=>n!==name));
      const currentCost=withD-withoutD;

      let bestOc=null,bestSaving=-Infinity;
      activeCars.forEach(oc=>{
        if(oc.no===car.no||oc.cap-oc.members.length<=0) return;
        const origD=_optDist(oc.members);
        let bestCost=Infinity;
        for(let p=0;p<=oc.members.length;p++){
          const trial=[...oc.members.slice(0,p),name,...oc.members.slice(p)];
          const cost=_optDist(trial)-origD;
          if(cost<bestCost) bestCost=cost;
        }
        const saving=(currentCost-bestCost)*ROAD_FACTOR;
        if(saving>bestSaving){bestSaving=saving;bestOc=oc;}
      });
      if(bestOc&&Math.round(bestSaving/DRIVE_SPEED*60)>=2){
        swapSuggestions.push({
          name,fromCar:car,toCar:bestOc,
          savingKm:bestSaving.toFixed(1),
          savingMin:Math.round(bestSaving/DRIVE_SPEED*60)
        });
      }
    });
  });
  swapSuggestions.sort((a,b)=>b.savingMin-a.savingMin);

  if(!elimSuggestions.length&&!swapSuggestions.length){
    showToast('✅ 現在の'+dirLabel+'配置は効率的です — 改善点なし','#4caf50');
    return;
  }

  // ── データ保存 ──
  _optData={pickKey,dropKey,elim:elimSuggestions,swaps:swapSuggestions};

  // ── モーダル表示 ──
  let html='<div style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9999;display:flex;align-items:center;justify-content:center" id="opt-modal" onclick="if(event.target===this)this.remove()">'
    +'<div style="background:var(--panel);border:2px solid #06b6d4;border-radius:16px;padding:24px;max-width:600px;width:95%;max-height:85vh;overflow-y:auto">'
    +'<h2 style="margin:0 0 4px;color:#06b6d4">🔄 最適化チェック — '+dirLabel+'</h2>'
    +'<p style="color:var(--tx3);font-size:11px;margin:0 0 16px">現在 <b>'+activeCars.length+'台</b> 稼働中 — 減らせる車がないかチェックしました</p>';

  if(elimSuggestions.length){
    elimSuggestions.forEach((s,si)=>{
      html+='<div style="background:rgba(74,222,128,.06);border:2px solid #4ade80;border-radius:12px;padding:16px;margin-bottom:14px">'
        +'<div style="font-size:15px;font-weight:900;color:#4ade80;margin-bottom:8px">'
        +'💰 '+s.car.no+'号車（'+s.car.icon+' '+s.car.vname+'）を廃止 → 1台削減！</div>'
        +'<div style="font-size:11px;color:var(--tx3);margin-bottom:10px">'
        +s.car.members.length+'名を他の車に振り分け</div>';
      s.moves.forEach(m=>{
        const col=m.detourMin<=3?'#4ade80':m.detourMin<=5?'#f5c518':'#fb923c';
        html+='<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg2);border-radius:8px;margin-bottom:4px;font-size:13px">'
          +'<span style="font-weight:800;min-width:70px">'+m.name+'</span>'
          +'<span style="color:var(--tx3)">→</span>'
          +'<span style="font-weight:700">'+m.toIcon+' '+m.toNo+'号車</span>'
          +'<span style="margin-left:auto;font-weight:800;color:'+col+'">+'+m.detourMin+'分</span>'
        +'</div>';
      });
      html+='<div style="margin-top:10px;padding:10px;background:rgba(74,222,128,.08);border-radius:8px;font-size:12px;color:var(--tx2);line-height:1.8">'
        +'📊 廃止分: <b style="color:#4ade80">-'+s.elimDistKm+'km</b> / 他車追加: <b style="color:#fb923c">+'+s.extraDistKm+'km</b>'
        +' / 最大迂回: <b>+'+s.maxDetour+'分</b></div>'
        +'<button onclick="applyOptEliminate('+si+')" '
        +'style="margin-top:10px;width:100%;padding:12px;background:linear-gradient(135deg,#4ade80,#06b6d4);color:#0a2a1a;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:900">'
        +'✅ この最適化を適用</button></div>';
    });
  }

  if(swapSuggestions.length){
    html+='<div style="background:rgba(245,197,24,.06);border:2px solid #f5c518;border-radius:12px;padding:16px;margin-bottom:14px">'
      +'<div style="font-size:13px;font-weight:900;color:#f5c518;margin-bottom:8px">💡 個別の移動で効率UP（台数は変わらず）</div>';
    swapSuggestions.forEach((s,si)=>{
      html+='<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg2);border-radius:8px;margin-bottom:4px;font-size:13px">'
        +'<span style="font-weight:800;min-width:70px">'+s.name+'</span>'
        +'<span style="color:var(--tx3)">'+s.fromCar.no+'→'+s.toCar.no+'号車</span>'
        +'<span style="margin-left:auto;font-weight:800;color:#4ade80">-'+s.savingMin+'分</span>'
        +'<button onclick="applyOptSwap('+si+')" '
        +'style="padding:4px 12px;background:#f5c518;color:#1a1a2e;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:800">適用</button>'
      +'</div>';
    });
    html+='</div>';
  }

  html+='<button onclick="this.closest(\'#opt-modal\').remove()" '
    +'style="width:100%;padding:10px;background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr);border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;margin-top:8px">閉じる</button>'
    +'</div></div>';
  document.body.insertAdjacentHTML('beforeend',html);
}

function applyOptEliminate(idx){
  if(!_optData||!_optData.elim[idx]) return;
  const s=_optData.elim[idx];
  if(!confirm(s.car.no+'号車（'+s.car.vname+'）の'+s.moves.length+'名を他の車に統合します。\nよろしいですか？')) return;

  const pickGrps=S.groups[_optData.pickKey];
  const dropGrps=S.groups[_optData.dropKey];

  s.moves.forEach(m=>{
    const pFrom=pickGrps.find(g=>g.no===s.car.no);
    const dFrom=dropGrps.find(g=>g.no===s.car.no);
    if(pFrom) pFrom.members=pFrom.members.filter(n=>n!==m.name);
    if(dFrom) dFrom.members=dFrom.members.filter(n=>n!==m.name);

    const pTo=pickGrps.find(g=>g.no===m.toNo);
    const dTo=dropGrps.find(g=>g.no===m.toNo);
    if(pTo){const pos=_optInsertBest(pTo.members,m.name);pTo.members.splice(pos,0,m.name);}
    if(dTo){const pos=_optInsertBest(dTo.members,m.name);dTo.members.splice(pos,0,m.name);}
  });

  recalcAll();
  const el=document.getElementById('opt-modal');if(el)el.remove();
  showToast('✅ '+s.car.no+'号車を廃止 → '+s.moves.length+'名を他の車に統合しました','#4caf50');
}

function applyOptSwap(idx){
  if(!_optData||!_optData.swaps[idx]) return;
  const s=_optData.swaps[idx];

  const pickGrps=S.groups[_optData.pickKey];
  const dropGrps=S.groups[_optData.dropKey];

  const pFrom=pickGrps.find(g=>g.no===s.fromCar.no);
  const dFrom=dropGrps.find(g=>g.no===s.fromCar.no);
  if(pFrom) pFrom.members=pFrom.members.filter(n=>n!==s.name);
  if(dFrom) dFrom.members=dFrom.members.filter(n=>n!==s.name);

  const pTo=pickGrps.find(g=>g.no===s.toCar.no);
  const dTo=dropGrps.find(g=>g.no===s.toCar.no);
  if(pTo){const pos=_optInsertBest(pTo.members,s.name);pTo.members.splice(pos,0,s.name);}
  if(dTo){const pos=_optInsertBest(dTo.members,s.name);dTo.members.splice(pos,0,s.name);}

  recalcAll();
  const el=document.getElementById('opt-modal');if(el)el.remove();
  showToast('✅ '+s.name+'を'+s.fromCar.no+'号車→'+s.toCar.no+'号車に移動しました','#4caf50');
}

// 学習: 現在の配置からペア順序と車割り当てを記録
function learnFromCurrent(ampm){
  const groups=ampm==='am'?S.groups.am_pick:S.groups.pm_drop;
  const tabKey=ampm==='am'?'am_pick':'pm_drop';
  if(!S.routeLearn) S.routeLearn={};
  if(!S.routeLearn.pairOrder) S.routeLearn.pairOrder={};
  if(!S.routeLearn.carAssign) S.routeLearn.carAssign={};

  groups.forEach(g=>{
    const act=applyRouteOvr(g.members.filter(n=>!S.absent.has(n)&&needsShuttle(n)),tabKey,g.no);
    const vid=effectiveVid(g,tabKey);
    // 車割り当て: この人はこの車種に乗ることが多い
    act.forEach(n=>{
      if(!S.routeLearn.carAssign[n]) S.routeLearn.carAssign[n]={};
      S.routeLearn.carAssign[n][vid]=(S.routeLearn.carAssign[n][vid]||0)+1;
    });
    // ペア順序: AがBより前にいる → A>Bのスコア+1
    for(let i=0;i<act.length;i++){
      for(let j=i+1;j<act.length;j++){
        const key=act[i]+'|'+act[j];
        const revKey=act[j]+'|'+act[i];
        if(!S.routeLearn.pairOrder[key]) S.routeLearn.pairOrder[key]=0;
        if(!S.routeLearn.pairOrder[revKey]) S.routeLearn.pairOrder[revKey]=0;
        S.routeLearn.pairOrder[key]++;
      }
    }
    // 同じ車グループ: この人たちはセットで乗ることが多い
    for(let i=0;i<act.length;i++){
      for(let j=i+1;j<act.length;j++){
        const gkey='group|'+[act[i],act[j]].sort().join('|');
        if(!S.routeLearn.pairOrder[gkey]) S.routeLearn.pairOrder[gkey]=0;
        S.routeLearn.pairOrder[gkey]++;
      }
    }
  });
  const count=Object.keys(S.routeLearn.pairOrder).length;
  showToast('🧠 学習しました（'+count+'件のパターンを記録）','#a78bfa');
}

function updateVehicle(tabKey,no,newVid){
  // ペアタブ（pick↔drop）にも同時反映。midは全4タブに反映
  const keys=tabKey==='mid'
    ?['mid','am_pick','am_drop','pm_pick','pm_drop']
    :(function(){var pairMap={am_pick:'am_drop',am_drop:'am_pick',pm_pick:'pm_drop',pm_drop:'pm_pick'};var r=[tabKey];if(pairMap[tabKey])r.push(pairMap[tabKey]);return r;})();
  if(newVid===''){
    keys.forEach(k=>{S.vidOvr[k+'_'+no]='__unset__';});
    renderMain();
    showToast('🚗 '+no+'号車を未設定にしました','#60a5fa');
  } else {
    // 他号車で使用中かチェック → スワップ（入れ替え）
    const gkForTab={am_pick:'am_pick',am_drop:'am_drop',pm_pick:'pm_pick',pm_drop:'pm_drop',mid:'am_drop'};
    const gk=gkForTab[tabKey]||tabKey;
    let otherNo=null;
    if(S.groups[gk]){
      S.groups[gk].forEach(og=>{
        if(og.no!==no){
          const ov=effectiveVid(og,tabKey==='mid'?'mid':tabKey);
          if(ov===newVid) otherNo=og.no;
        }
      });
    }
    if(otherNo){
      // スワップ確認ダイアログ
      const myGroup=(S.groups[gk]||[]).find(g=>g.no===no);
      const myVid=myGroup?effectiveVid(myGroup,tabKey==='mid'?'mid':tabKey):null;
      const otherGroup=(S.groups[gk]||[]).find(g=>g.no===otherNo);
      const otherAct=otherGroup?otherGroup.members.filter(n=>!S.absent.has(n)).length:0;
      const myAct=myGroup?myGroup.members.filter(n=>!S.absent.has(n)).length:0;
      let msg=otherNo+'号車の'+VEH[newVid].name+'と入れ替えますか？\n\n';
      msg+='【入れ替え後】\n';
      msg+=no+'号車: '+VEH[newVid].name+'(定員'+VEH[newVid].cap+'名) ← '+myAct+'名乗車\n';
      if(myVid&&VEH[myVid]) msg+=otherNo+'号車: '+VEH[myVid].name+'(定員'+VEH[myVid].cap+'名) ← '+otherAct+'名乗車\n';
      else msg+=otherNo+'号車: 未設定 ← '+otherAct+'名乗車\n';
      if(myVid&&VEH[myVid]&&otherAct>VEH[myVid].cap){
        msg+='\n⚠ '+otherNo+'号車が定員オーバーになります！（'+otherAct+'名 > 定員'+VEH[myVid].cap+'名）';
      }
      if(myAct>VEH[newVid].cap){
        msg+='\n⚠ '+no+'号車が定員オーバーになります！（'+myAct+'名 > 定員'+VEH[newVid].cap+'名）';
      }
      if(!confirm(msg)) return;
      // スワップ実行
      keys.forEach(k=>{
        S.vidOvr[k+'_'+no]=newVid;
        if(myVid) S.vidOvr[k+'_'+otherNo]=myVid;
        else S.vidOvr[k+'_'+otherNo]='__unset__';
      });
      renderMain();
      showToast('🔄 '+no+'号車と'+otherNo+'号車の車両を入れ替えました','#00d4aa');
    } else {
      keys.forEach(k=>{S.vidOvr[k+'_'+no]=newVid;});
      renderMain();
      showToast('🚗 '+no+'号車の車両を変更しました','#00d4aa');
    }
  }
}

// ②タブ: パターン判定 A=normal, B=drop_only, C=change_car, D=pick_only
function midPattern(no){
  const pv=S.midPickVid[no];
  if(pv==='__none__') return 'drop_only';
  if(pv==='__pick_only__') return 'pick_only';
  if(!pv) return 'normal';
  // 送りの車種と比較
  const dg=(S.groups.am_drop||[]).find(g=>g.no===no);
  if(!dg) return 'normal';
  const dropVid=effectiveVid(dg,'mid');
  return pv===dropVid?'normal':'change_car';
}
// ②タブ: 迎えの実効車種を取得（パターンA=送りと同じ, B=null, C=指定車種, D=送りと同じ）
function midPickEffVid(no){
  const pat=midPattern(no);
  if(pat==='drop_only') return null;
  if(pat==='change_car') return S.midPickVid[no];
  // normal / pick_only: 送りと同じ車
  const dg=(S.groups.am_drop||[]).find(g=>g.no===no);
  return dg?effectiveVid(dg,'mid'):null;
}

function addStaff(){
  const inp=document.getElementById('new-staff-name');
  const name=inp.value.trim();
  if(!name){showToast('⚠️ スタッフ名を入力してください','#f87171');return;}
  if(STAFF_OK[name]){showToast('⚠️ '+name+'は既に登録されています','#f87171');return;}
  const allVeh=document.getElementById('new-staff-all').checked;
  const limited=document.getElementById('new-staff-limited').checked;
  if(allVeh){
    STAFF_OK[name]=VEHICLES.map(v=>v.id);
  } else if(limited){
    STAFF_OK[name]=['cube','moco'];
  } else {
    STAFF_OK[name]=VEHICLES.map(v=>v.id);
  }
  inp.value='';
  renderMain();
  showToast('✅ '+name+'を追加しました','#00d4aa');
}
function removeStaff(name){
  if(!confirm(name+'を削除しますか？')){return;}
  delete STAFF_OK[name];
  // staffMapからも削除
  Object.keys(S.staffMap).forEach(k=>{if(S.staffMap[k]===name)delete S.staffMap[k];});
  renderMain();
  showToast('🗑️ '+name+'を削除しました','#60a5fa');
}
function toggleStaffVeh(staff,vid,checked){
  if(!STAFF_OK[staff])return;
  if(checked){
    if(!STAFF_OK[staff].includes(vid))STAFF_OK[staff].push(vid);
  } else {
    STAFF_OK[staff]=STAFF_OK[staff].filter(v=>v!==vid);
  }
  renderMain();
}
function updateStaffNg(staff,list){S.staffNgOvr[staff]=list;renderMain();}
function addStaffNg(staff,name){

  if(!S.staffNgOvr[staff].includes(name))S.staffNgOvr[staff].push(name);
  renderMain();
}
function removeStaffNg(staff,name){
  if(!S.staffNgOvr[staff])return;
  S.staffNgOvr[staff]=S.staffNgOvr[staff].filter(n=>n!==name);
  renderMain();
}

// タップ交換（座席図内 & 車間移動）
// ═══════════════════════════════════════════════
var _tapSel=null; // {name,seat,tabKey,carNo,el} 座席タップ1人目
var _movePopup=null; // 車間移動ポップアップDOM

function closeMovePopup(){
  if(_movePopup){_movePopup.remove();_movePopup=null;}
}
function clearTapSel(){
  if(_tapSel&&_tapSel.el) _tapSel.el.classList.remove('seat-tap-selected');
  _tapSel=null;
  document.querySelectorAll('.seat-tap-hint').forEach(el=>el.remove());
  document.querySelectorAll('.seat-tap-selected').forEach(el=>el.classList.remove('seat-tap-selected'));
}

// ドラッグ判定用（短距離移動はクリック扱い）
var _tapStartPos=null;
var _tapDragged=false;

// 座席タップ & ルート名タップ
function initSeatTap(){
  const main=document.getElementById('main');

  // ドラッグとクリックを区別するためmousedown/up距離を計測
  main.addEventListener('mousedown',function(e){_tapStartPos={x:e.clientX,y:e.clientY};_tapDragged=false;});
  main.addEventListener('mousemove',function(e){
    if(_tapStartPos){
      const dx=e.clientX-_tapStartPos.x, dy=e.clientY-_tapStartPos.y;
      if(dx*dx+dy*dy>64) _tapDragged=true; // 8px以上動いたらドラッグ
    }
  });
  main.addEventListener('mouseup',function(){_tapStartPos=null;});

  // タッチデバイス用（タッチ後のドラッグ判定）
  main.addEventListener('touchstart',function(e){
    const t=e.touches[0];_tapStartPos={x:t.clientX,y:t.clientY};_tapDragged=false;
  },{passive:true});
  main.addEventListener('touchmove',function(e){
    if(_tapStartPos){
      const t=e.touches[0], dx=t.clientX-_tapStartPos.x, dy=t.clientY-_tapStartPos.y;
      if(dx*dx+dy*dy>64) _tapDragged=true;
    }
  },{passive:true});
  main.addEventListener('touchend',function(){_tapStartPos=null;},{passive:true});

  main.addEventListener('click',function(e){
    if(_tapDragged) return; // ドラッグ操作はスルー

    // ポップアップ内のクリックは無視
    if(e.target.closest('.move-popup')) return;
    // ポップアップが出ている場合、外側クリックで閉じる
    if(_movePopup&&!e.target.closest('.move-popup')){closeMovePopup();return;}
    // ボタン・入力・チェックボックス等はスルー
    if(e.target.closest('button,input,select,label,a')) return;

    // ── ルート名タップ（車間移動）── 座席セルより先に判定
    const routeEl=e.target.closest('[data-routename]');
    if(routeEl&&!e.target.closest('[data-seat]')){
      // 座席選択中ならキャンセル
      clearTapSel();
      const name=routeEl.dataset.routename;
      if(!name) return;
      // tabKey/carNoを取得
      const tlCol=routeEl.closest('[data-tltabkey]');
      if(!tlCol) return;
      const tk=tlCol.dataset.tltabkey, cn=tlCol.dataset.tlcarno;
      e.stopPropagation();
      onRouteTap(name,tk,cn,e);
      return;
    }

    const seatEl=e.target.closest('[data-seat]');
    if(!seatEl) return;
    // 座席モーダル内のクリックはスルー（モーダルは別途処理）
    if(seatEl.closest('#seat-modal-content')) return;
    // ドラッグ中はスルー
    if(seatEl.classList.contains('dragging')) return;

    const tab=seatEl.dataset.tab, car=seatEl.dataset.car;
    const name=seatEl.dataset.name, seat=seatEl.dataset.seat;
    if(!tab||!car) return;
    if(isCarLocked(tab,car)){showToast('🔒 ロック中です','#f87171');return;}

    if(!_tapSel){
      // 1人目選択（空席でなければ）
      if(!name) return;
      _tapSel={name,seat,tabKey:tab,carNo:car,el:seatEl};
      seatEl.classList.add('seat-tap-selected');
      // ヒント表示
      const diag=seatEl.closest('[id^="seat-diag-"]');
      if(diag){
        const old=diag.querySelector('.seat-tap-hint');
        if(old) old.remove();
        diag.insertAdjacentHTML('beforeend','<div class="seat-tap-hint">🔄 交換先の座席をタップしてください（空席もOK）<br><span style="font-size:10px;cursor:pointer;text-decoration:underline" onclick="clearTapSel()">キャンセル</span></div>');
      }
      e.stopPropagation();
    } else {
      // 2人目タップ → 交換実行
      if(_tapSel.tabKey!==tab||_tapSel.carNo!==car){clearTapSel();return;} // 違う車はキャンセル
      if(_tapSel.seat===seat){clearTapSel();return;} // 同じ席はキャンセル

      const pre=tab+'_'+car+'_';
      const toName=name||'';
      if(toName){
        // 2人を交換
        S.seatOvr[pre+_tapSel.seat]=toName;
        S.seatOvr[pre+seat]=_tapSel.name;
      } else {
        // 空席へ移動
        S.seatOvr[pre+_tapSel.seat]='';
        S.seatOvr[pre+seat]=_tapSel.name;
      }
      const savedTab=tab, savedCar=car;
      clearTapSel();
      renderMain();
      showToast('🔄 座席を'+(toName?'交換':'移動')+'しました','#f5c518');
      // 座席制約チェック
      setTimeout(()=>{
        const grp=S.groups[savedTab];
        if(!grp) return;
        const g=grp.find(x=>x.no===savedCar);
        if(!g) return;
        const act=g.members.filter(n=>!S.absent.has(n)&&needsShuttle(n));
        const evid=effectiveVid(g,savedTab)||g.vid;
        const sa=assignSeats(act,evid,savedTab,savedCar);
        const dir=savedTab.includes('pick')?'pick':'drop';
        const warns=checkSeatConstraint(sa,evid,dir);
        if(warns.length) showSeatConstraintPopup(warns,g.no+'（'+(VEH[evid]||VEH[g.vid]).name+'）');
      },100);
      e.stopPropagation();
    }
  });
}

// ルート名クリック → 車間移動ポップアップ
function onRouteTap(name,tabKey,carNo,evt){
  closeMovePopup();
  clearTapSel();
  if(!name||!tabKey||!carNo) return;
  if(isCarLocked(tabKey,carNo)){showToast('🔒 ロック中です','#f87171');return;}

  // この人が所属するペアキー（am系 or pm系）
  const pairKeys=(tabKey==='am_pick'||tabKey==='am_drop')?['am_pick','am_drop']
    :(tabKey==='pm_pick'||tabKey==='pm_drop')?['pm_pick','pm_drop']:[];

  // 他の車一覧を構築
  const groups=S.groups[tabKey]||[];
  const carOptions=[];
  groups.forEach(g=>{
    if(g.no===carNo) return;
    // 移動先の定員チェック
    let full=false, capInfo='';
    for(const gk of pairKeys){
      const grps=S.groups[gk];if(!grps) continue;
      const dstG=grps.find(x=>x.no===g.no);if(!dstG) continue;
      const vid=effectiveVid(dstG,gk);if(!vid||!VEH[vid]) continue;
      const actCnt=dstG.members.filter(n=>!S.absent.has(n)).length;
      if(actCnt>=VEH[vid].cap) full=true;
      capInfo=actCnt+'/'+VEH[vid].cap+'名';
    }
    const vid=effectiveVid(g,tabKey)||g.vid;
    const v=VEH[vid]||VEH[g.vid];
    carOptions.push({no:g.no,vid,v,full,capInfo,members:g.members.filter(n=>!S.absent.has(n)&&n!==name)});
  });

  // ポップアップHTML構築
  let popHtml='<div class="move-popup" id="move-popup">'
    +'<div style="font-weight:900;font-size:14px;color:var(--tx);margin-bottom:4px">🚐 '+name+' を移動</div>'
    +'<div style="font-size:11px;color:var(--tx3);margin-bottom:12px">移動先の号車をタップ</div>';

  carOptions.forEach(opt=>{
    if(!opt.full){
      // 空きあり → 直接移動
      popHtml+='<div class="move-popup-car" onclick="execRouteMove(\''+name+'\',\''+tabKey+'\',\''+carNo+'\',\''+opt.no+'\');closeMovePopup()">'
        +'<span style="font-size:20px">'+(opt.v?opt.v.icon:'🚗')+'</span>'
        +'<div><div style="font-weight:800;color:'+(opt.v?opt.v.col:'var(--tx)')+'">'+opt.no+'号車 '+(opt.v?opt.v.name:'')+'</div>'
        +'<div style="font-size:11px;color:var(--tx3)">'+opt.capInfo+' — 空きあり</div></div>'
      +'</div>';
    } else {
      // 満員 → 交換相手選択を展開
      popHtml+='<div class="move-popup-car full" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">'
        +'<span style="font-size:20px">'+(opt.v?opt.v.icon:'🚗')+'</span>'
        +'<div><div style="font-weight:800;color:'+(opt.v?opt.v.col:'var(--tx)')+'">'+opt.no+'号車 '+(opt.v?opt.v.name:'')+'</div>'
        +'<div style="font-size:11px;color:#f5c518">'+opt.capInfo+' — 満員（タップで交換相手を選択）</div></div>'
      +'</div>';
      popHtml+='<div style="display:none;margin:0 0 8px 16px">';
      opt.members.forEach(m=>{
        popHtml+='<div class="move-popup-swap" onclick="execRouteSwap(\''+name+'\',\''+tabKey+'\',\''+carNo+'\',\''+opt.no+'\',\''+m+'\');closeMovePopup()">'
          +'<span style="font-size:14px">🔄</span>'
          +'<div style="font-weight:700;font-size:12px">'+m+' と交換</div>'
        +'</div>';
      });
      popHtml+='</div>';
    }
  });

  popHtml+='<div style="text-align:center;margin-top:10px">'
    +'<span onclick="closeMovePopup()" style="font-size:12px;color:var(--tx3);cursor:pointer;text-decoration:underline">キャンセル</span>'
  +'</div></div>';

  document.body.insertAdjacentHTML('beforeend',popHtml);
  _movePopup=document.getElementById('move-popup');

  // 位置調整（クリック位置の近く）
  const rect=_movePopup.getBoundingClientRect();
  let x=evt.clientX-rect.width/2, y=evt.clientY+10;
  if(x<10) x=10; if(x+rect.width>window.innerWidth-10) x=window.innerWidth-rect.width-10;
  if(y+rect.height>window.innerHeight-10) y=evt.clientY-rect.height-10;
  _movePopup.style.left=x+'px';_movePopup.style.top=y+'px';
}

// 車間移動実行
function execRouteMove(name,fromTabKey,fromCarNo,toCarNo){
  const pairKeys=(fromTabKey==='am_pick'||fromTabKey==='am_drop')?['am_pick','am_drop']
    :(fromTabKey==='pm_pick'||fromTabKey==='pm_drop')?['pm_pick','pm_drop']:[];

  pairKeys.forEach(gk=>{
    const groups=S.groups[gk];if(!groups) return;
    groups.forEach(g=>{g.members=g.members.filter(m=>m!==name);});
    const dstG=groups.find(g=>g.no===toCarNo);
    if(dstG) dstG.members.push(name);
  });
  // routeOvrクリア
  pairKeys.forEach(gk=>{
    delete S.routeOvr[gk+'_'+fromCarNo];
    delete S.routeOvr[gk+'_'+toCarNo];
  });
  renderMain();
  showToast('🚐 '+name+' を '+toCarNo+'号車 に移動しました','#60a5fa');
}

// 車間交換実行
function execRouteSwap(name1,tabKey,carNo1,carNo2,name2){
  const pairKeys=(tabKey==='am_pick'||tabKey==='am_drop')?['am_pick','am_drop']
    :(tabKey==='pm_pick'||tabKey==='pm_drop')?['pm_pick','pm_drop']:[];

  pairKeys.forEach(gk=>{
    const groups=S.groups[gk];if(!groups) return;
    const g1=groups.find(g=>g.no===carNo1);
    const g2=groups.find(g=>g.no===carNo2);
    if(!g1||!g2) return;
    // g1からname1を抜いてname2を入れ、g2からname2を抜いてname1を入れる
    g1.members=g1.members.map(m=>m===name1?name2:m);
    g2.members=g2.members.map(m=>m===name2?name1:m);
  });
  // routeOvr/seatOvrクリア
  pairKeys.forEach(gk=>{
    delete S.routeOvr[gk+'_'+carNo1];
    delete S.routeOvr[gk+'_'+carNo2];
    // 座席配置もクリア（交換した人の席は自動配置に戻す）
    Object.keys(S.seatOvr).forEach(k=>{
      if(k.startsWith(gk+'_'+carNo1+'_')||k.startsWith(gk+'_'+carNo2+'_')){
        const v=S.seatOvr[k];
        if(v===name1||v===name2) delete S.seatOvr[k];
      }
    });
  });
  renderMain();
  showToast('🔄 '+name1+' ↔ '+name2+' を交換しました','#f5c518');
}

function initDnD(){
  const main=document.getElementById('main');
  let dragInfo=null;
  main.addEventListener('dragstart',e=>{
    const seatEl=e.target.closest('[data-seat]');
    if(!seatEl) return;
    if(isCarLocked(seatEl.dataset.tab,seatEl.dataset.car)){e.preventDefault();showToast('🔒 ロック中です。解除してから操作してください','#f87171');return;}
    dragInfo={name:seatEl.dataset.name,seat:seatEl.dataset.seat,tabKey:seatEl.dataset.tab,carNo:seatEl.dataset.car};
    e.dataTransfer.effectAllowed='move';
    setTimeout(()=>seatEl.style.opacity='0.4',0);
  });
  main.addEventListener('dragend',e=>{
    const seatEl=e.target.closest('[data-seat]');
    if(seatEl) seatEl.style.opacity='';
    dragInfo=null;
  });
  main.addEventListener('dragover',e=>{
    if(e.target.closest('[data-seat]')||e.target.closest('.drop-zone')) e.preventDefault();
  });
  main.addEventListener('dragenter',e=>{
    const z=e.target.closest('.drop-zone');
    if(z) z.classList.add('drag-over');
  });
  main.addEventListener('dragleave',e=>{
    const z=e.target.closest('.drop-zone');
    if(z) z.classList.remove('drag-over');
  });
  main.addEventListener('drop',e=>{
    const toEl=e.target.closest('[data-seat]');
    document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
    if(!toEl||!dragInfo) return;
    e.preventDefault();
    const toSeat=toEl.dataset.seat;
    const toName=toEl.dataset.name;
    const pre=dragInfo.tabKey+'_'+dragInfo.carNo+'_';
    if(toName&&toName!==dragInfo.name){
      S.seatOvr[pre+dragInfo.seat]=toName;
      S.seatOvr[pre+toSeat]=dragInfo.name;
    } else {
      S.seatOvr[pre+dragInfo.seat]='';
      S.seatOvr[pre+toSeat]=dragInfo.name;
    }
    // 座席制約チェック→ポップアップ
    const _tabKey=dragInfo.tabKey, _carNo=dragInfo.carNo;
    dragInfo=null;
    renderMain();
    setTimeout(()=>{
      const grp=S.groups[_tabKey];
      if(!grp) return;
      const g=grp.find(x=>x.no===_carNo);
      if(!g) return;
      const act=g.members.filter(n=>!S.absent.has(n)&&needsShuttle(n));
      const evid=effectiveVid(g,_tabKey)||g.vid;
      const sa=assignSeats(act,evid,_tabKey,_carNo);
      const dir=_tabKey.includes('pick')?'pick':'drop';
      const warns=checkSeatConstraint(sa,evid,dir);
      if(warns.length) showSeatConstraintPopup(warns,g.no+'（'+(VEH[evid]||VEH[g.vid]).name+'）');
    },100);
  });
}

function openZoomModal(elementId){
  const src=document.getElementById(elementId);
  if(!src) return;
  const content=document.getElementById('zoom-modal-content');
  // 元のノードをモーダルに移動（ライブ参照で操作可能に）
  content._origParent=src.parentNode;
  content._origNext=src.nextSibling;
  content.innerHTML='<div class="zoom-modal-close" onclick="closeZoomModal(event,true)">✕</div>';
  content.appendChild(src);
  document.getElementById('zoom-modal').classList.add('show');
}
function closeZoomModal(e,force){
  if(force||e.target.id==='zoom-modal'){
    const content=document.getElementById('zoom-modal-content');
    // 元の場所に戻す
    const moved=content.querySelector('.settings-card');
    if(moved&&content._origParent){
      content._origParent.insertBefore(moved,content._origNext);
    }
    document.getElementById('zoom-modal').classList.remove('show');
  }
}

function openSeatModal(members,vid,dir,tabKey,carNo,staffName){
  const content=document.getElementById('seat-modal-content');
  let html=sientaSeatDiagramHtml(members,vid,dir,tabKey,carNo,staffName);
  // モーダル用: 座席セル内の座席ラベル(「○列・左」「助手席」等)を削除
  html=html.replace(/<span style="font-size:7px;color:#[0-9a-f]{6};margin-top:[12]px">[^<]*<\/span>(<\/div>)/g,'$1');
  // 💺アイコンを削除（乗客あり・なし両方）
  html=html.replace(/<span style="font-size:12px">💺<\/span>/g,'')
           .replace(/<span style="font-size:11px;opacity:\.4">💺<\/span>/g,'');
  // 「🚪出口」「🚪通路」を削除
  html=html.replace(/🚪出口/g,'').replace(/<span style="font-size:7px;color:#00c896;margin-top:1px;font-weight:700">🚪通路<\/span>/g,'');
  // 「左端(助手席側)が出口通路」注記を削除
  html=html.replace(/🟢左端\(助手席側\)が出口通路/g,'');
  // 運転席の🚗アイコンを削除
  html=html.replace(/<span style="font-size:14px">🚗<\/span>/g,'');
  // 乗り込み分数を削除（「○分」バッジ）
  html=html.replace(/<span style="font-size:7px;font-weight:700;color:#60a5fa;background:rgba\(0,0,0,\.25\);border-radius:2px;padding:1px 3px;margin-top:1px">[^<]*<\/span>/g,'');
  // 「（乗降ドア）」を削除
  html=html.replace(/（乗降ドア）/g,'');
  // 運転席テキストを大きく
  html=html.replace(/font-size:10px;color:var\(--tx\);font-weight:700/g,
                     'font-size:15px;color:var(--tx);font-weight:700');
  // 1列目ラベルを他の列と同じサイズに
  html=html.replace(/font-size:8px;color:var\(--tx3\);font-weight:700;margin-bottom:3px">1列目/g,
                     'font-size:13px;color:var(--tx3);font-weight:700;margin-bottom:6px">1列目');
  // モーダル用フォントサイズ拡大
  html=html.replace(/font-size:7px/g,'font-size:12px')
           .replace(/font-size:8px;font-weight:700;text-align:center/g,
                    'font-size:15px;font-weight:700;text-align:center')
           .replace(/font-size:16px">&#x2195;/g,'font-size:22px">&#x2195;');
  content.innerHTML='<div class="seat-modal-close" onclick="closeSeatModal(event,true)">✕</div>'+html;
  document.getElementById('seat-modal').classList.add('show');
}
function closeSeatModal(e,force){
  if(force||e.target.id==='seat-modal'){
    document.getElementById('seat-modal').classList.remove('show');
  }
}

try{
  const coordFix=localStorage.getItem('yawaragi_coord_fix');
  if(coordFix){
    const fixes=JSON.parse(coordFix);
    Object.entries(fixes).forEach(([name,c])=>{

// 出勤＆送迎表のルートを送迎管理システムに反映
function applyDailySync(){
  if(!S.dailySync||!S.dailySync.routes){
    showToast('⚠ 出勤＆送迎表のデータがありません。先に出勤＆送迎表を開いてください。','#f87171');
    return;
  }
  const vehMap={'ス':'stepwgn','シS':'sienta_s','シW':'sienta_w','モ':'moco','キ':'cube'};
  const routes=S.dailySync.routes;
  const DAYS_ALL=['月','火','水','木','金','土'];
  const nums=['①','②','③','④','⑤'];
  let appliedDays=0, totalUsers=0;

  let timeCount=0;
  DAYS_ALL.forEach(day=>{
    const rd=routes[day];
    if(!rd) return;
    const groups={am_pick:[],am_drop:[],pm_pick:[],pm_drop:[]};

    const buildGroups=(apData,gkPick,gkDrop)=>{
      if(apData.pick){
        apData.pick.forEach((car,i)=>{
          const vid=vehMap[car.vehicle]||'stepwgn';
          const members=[];
          car.stops.forEach(s=>{
            if(!s.user||!s.user.trim()) return;
            const name=s.user.trim();
            members.push(name);
            // 迎え時間をschedTimeに反映
            if(s.time&&s.time.trim()){
              if(!S.schedTime[name]) S.schedTime[name]={};
              S.schedTime[name][day]=s.time.trim();
              timeCount++;
            }
          });
          totalUsers+=members.length;
          groups[gkPick].push({no:nums[i]||(''+(i+1)), vid:vid, staff:car.driver||'', members:members});
        });
      }
      if(apData.drop){
        apData.drop.forEach((car,i)=>{
          const vid=vehMap[car.vehicle]||'stepwgn';
          const members=car.stops.filter(s=>s.user&&s.user.trim()).map(s=>s.user.trim());
          groups[gkDrop].push({no:car.no||nums[i]||(''+(i+1)), vid:vid, staff:car.driver||'', members:members});
        });
      }
    };

    buildGroups(rd.am||{},'am_pick','am_drop');
    buildGroups(rd.pm||{},'pm_pick','pm_drop');
    // 重複車両を修正（同じvehicleが複数台ある場合、未使用車に振り替え）
    const allVids=['stepwgn','sienta_s','sienta_w','cube','moco'];
    ['am_pick','am_drop','pm_pick','pm_drop'].forEach(gk=>{
      const usedV=new Set();
      groups[gk].forEach(g=>{
        if(usedV.has(g.vid)){
          const alt=allVids.find(v=>!usedV.has(v));
          if(alt) g.vid=alt;
        }
        if(g.vid) usedV.add(g.vid);
      });
    });
    S.dayGroups[day]=groups;
    appliedDays++;
  });

  if(S.dayGroups[S.currentDay]){
    S.groups=JSON.parse(JSON.stringify(S.dayGroups[S.currentDay]));
  }
  renderAll();
  const timeMsg=timeCount>0?' / 伝えた時刻:'+timeCount+'件':'';
  showToast('✅ 出勤＆送迎表から'+appliedDays+'曜日分のルートを反映しました'+timeMsg,'#4caf50');
}

// 安全なGoogle Directions API（一括取得を絶対にさせない設計）
// ═══════════════════════════════════════════════
const ROUTE_API={
  DAILY_LIMIT: 100,     // 1日の上限（超えたら絶対に呼ばない）
  WARN_AT: 50,          // この回数で警告を出す

  // 今日のAPI呼び出し回数を取得
  getTodayCount(){
    try{
      const d=JSON.parse(localStorage.getItem('yawaragi_api_count')||'{}');
      const today=new Date().toISOString().slice(0,10);
      return (d.date===today)?d.count:0;
    }catch(e){return 0;}
  },

  // API呼び出し回数を+1
  increment(){
    const today=new Date().toISOString().slice(0,10);
    const d=JSON.parse(localStorage.getItem('yawaragi_api_count')||'{}');
    const count=(d.date===today)?(d.count||0)+1:1;
    localStorage.setItem('yawaragi_api_count',JSON.stringify({date:today,count}));
    return count;
  },

  // 月間カウント
  getMonthCount(){
    try{
      const d=JSON.parse(localStorage.getItem('yawaragi_api_month')||'{}');
      const month=new Date().toISOString().slice(0,7);
      return (d.month===month)?d.count:0;
    }catch(e){return 0;}
  },
  incrementMonth(){
    const month=new Date().toISOString().slice(0,7);
    const d=JSON.parse(localStorage.getItem('yawaragi_api_month')||'{}');
    const count=(d.month===month)?(d.count||0)+1:1;
    localStorage.setItem('yawaragi_api_month',JSON.stringify({month,count}));
    return count;
  }
};

// Google Directions APIで1ルートの時間を取得（1回の呼び出しで1ルートだけ）
async function callGoogleDirections(waypoints){
  // waypoints = [{lat,lng}, {lat,lng}, ...] （最初=出発地、最後=到着地、間=経由地）
  if(waypoints.length<2) throw new Error('最低2地点が必要です');
  if(waypoints.length>25) throw new Error('⛔ 経由地が多すぎます（最大25地点）');

  // 日次上限チェック
  const todayCount=ROUTE_API.getTodayCount();
  if(todayCount>=ROUTE_API.DAILY_LIMIT){
    throw new Error('⛔ 本日のAPI上限（'+ROUTE_API.DAILY_LIMIT+'回）に達しました。明日また使えます。');
  }

  if(!S.googleApiKey) throw new Error('Google APIキーが設定されていません（設定・保存タブで入力してください）');

  const origin=waypoints[0].lat+','+waypoints[0].lng;
  const dest=waypoints[waypoints.length-1].lat+','+waypoints[waypoints.length-1].lng;
  const vias=waypoints.slice(1,-1).map(w=>'via:'+w.lat+','+w.lng).join('|');

  const url='https://maps.googleapis.com/maps/api/directions/json?'
    +'origin='+origin
    +'&destination='+dest
    +(vias?'&waypoints='+encodeURIComponent(vias):'')
    +'&mode=driving&language=ja'
    +'&key='+S.googleApiKey;

  // カウント（呼び出し前にカウントすることで、エラーでも上限に含める）
  ROUTE_API.increment();
  ROUTE_API.incrementMonth();

  const res=await fetch(url);
  if(!res.ok) throw new Error('Google API エラー: '+res.status);
  const json=await res.json();
  if(json.status!=='OK') throw new Error('Google API: '+json.status+' '+(json.error_message||''));

  const route=json.routes[0];
  const legs=route.legs;

  return {
    totalKm: legs.reduce((s,l)=>s+l.distance.value,0)/1000,
    totalMin: legs.reduce((s,l)=>s+l.duration.value,0)/60,
    legs: legs.map(l=>({
      km: l.distance.value/1000,
      min: l.duration.value/60,
      startAddr: l.start_address,
      endAddr: l.end_address
    }))
  };
}

// OSRM（無料フォールバック用）
async function osrmAPI(coords){
  const str=coords.map(c=>c[0].toFixed(6)+','+c[1].toFixed(6)).join(';');
  const url='https://router.project-osrm.org/route/v1/driving/'+str+'?overview=false&steps=false';
  const res=await fetch(url);
  if(!res.ok) throw new Error('OSRM API エラー: '+res.status);
  const json=await res.json();
  if(json.code!=='Ok') throw new Error('OSRM: '+json.code);
  const rt=json.routes[0];
  return {totalKm:rt.distance/1000,totalMin:rt.duration/60,legs:rt.legs.map(l=>({km:l.distance/1000,min:l.duration/60}))};
}

function osrmGetUser(n){return (S.users[n]&&S.users[n].lat)?S.users[n]:((typeof UD!=='undefined'&&UD[n]&&UD[n].lat)?UD[n]:null);}

function osrmCurrentCalc(members){
  let totalKm=0,totalMin=0,prev=FC;
  members.forEach(n=>{
    const u=osrmGetUser(n); if(!u) return;
    const c=[u.lat,u.lng];
    const raw=dk(prev,c);
    const road=raw*ROAD_FACTOR;
    totalKm+=road;
    totalMin+=road/20*60+(u.boardMin||3);
    prev=c;
  });
  const retRaw=dk(prev,FC)*ROAD_FACTOR;
  totalKm+=retRaw;
  totalMin+=retRaw/20*60;
  return {distanceKm:totalKm,durationMin:totalMin};
}

      +'</div>';
    console.error(e);

}

async function osrmTestAll(){
  const routes=window._osrmRoutes;
  if(!routes||!routes.length) return;
  const el=document.getElementById('osrm-result');
  el.innerHTML='<div style="text-align:center;padding:20px;color:#60a5fa">🔄 全'+routes.length+'ルートをテスト中...</div>';

  const results=[];
  for(let i=0;i<routes.length;i++){
    const route=routes[i];
    try{
      const memberCoords=route.members.map(n=>{const u=osrmGetUser(n);return [u.lng,u.lat];});
      const osrmCoords=[[FAC.lng,FAC.lat],...memberCoords,[FAC.lng,FAC.lat]];
      const osrm=await osrmAPI(osrmCoords);
      const curr=osrmCurrentCalc(route.members);
      const board=route.members.reduce((s,n)=>{const u=osrmGetUser(n);return s+(u?u.boardMin||3:3);},0);
      const osrmWB=osrm.totalMin+board;
      const diff=curr.durationMin-osrmWB;
      results.push({label:route.vInfo.icon+' '+route.day+'曜'+route.tabLabel+' '+route.carNo+'号車',n:route.members.length,osrm:osrmWB,curr:curr.durationMin,osrmKm:osrm.totalKm,currKm:curr.distanceKm,diff,pct:diff/osrmWB*100});
      await new Promise(r=>setTimeout(r,100));
    }catch(e){
      results.push({label:route.vInfo.icon+' '+route.day+'曜'+route.tabLabel+' '+route.carNo+'号車',n:route.members.length,error:e.message});
    }
  }

  const valid=results.filter(r=>!r.error);
  const avgDiff=valid.length?valid.reduce((s,r)=>s+Math.abs(r.diff),0)/valid.length:0;
  const maxDiff=valid.length?Math.max(...valid.map(r=>Math.abs(r.diff))):0;
  const avgC=avgDiff<=3?'#00d4aa':avgDiff<=7?'#f5c518':'#f87171';
  const maxC=maxDiff<=5?'#00d4aa':maxDiff<=10?'#f5c518':'#f87171';

  let h='<div style="padding:14px;background:var(--bg3);border-radius:12px;margin-bottom:14px;text-align:center">'
    +'<div style="font-size:14px;font-weight:900;color:#60a5fa;margin-bottom:8px">📊 全ルート精度まとめ</div>'
    +'<div style="display:flex;justify-content:center;gap:24px;flex-wrap:wrap">'
    +'<div><div style="font-size:10px;color:var(--tx3)">テスト数</div><div style="font-size:20px;font-weight:900;color:var(--tx)">'+valid.length+'本</div></div>'
    +'<div><div style="font-size:10px;color:var(--tx3)">平均誤差</div><div style="font-size:20px;font-weight:900;color:'+avgC+'">'+avgDiff.toFixed(1)+'分</div></div>'
    +'<div><div style="font-size:10px;color:var(--tx3)">最大誤差</div><div style="font-size:20px;font-weight:900;color:'+maxC+'">'+maxDiff.toFixed(1)+'分</div></div>'
    +'</div></div>';

  h+='<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px">';
  h+='<tr style="background:var(--bg3)"><th style="padding:6px;text-align:left">ルート</th><th>人数</th><th style="color:#00d4aa">OSRM</th><th style="color:#f87171">現行</th><th>差</th><th>誤差率</th></tr>';
  results.forEach(r=>{
    if(r.error){
      h+='<tr><td style="text-align:left">'+r.label+'</td><td>'+r.n+'</td><td colspan="4" style="color:#f87171">'+r.error+'</td></tr>';
    }else{
      const cls=Math.abs(r.diff)<=3?'color:#00d4aa':Math.abs(r.diff)<=7?'color:#f5c518':'color:#f87171';
      h+='<tr><td style="text-align:left;font-weight:700">'+r.label+'</td><td>'+r.n+'名</td>'
        +'<td style="color:#00d4aa;font-weight:700">'+r.osrm.toFixed(1)+'分</td>'
        +'<td style="color:#f87171;font-weight:700">'+r.curr.toFixed(1)+'分</td>'
        +'<td style="font-weight:700;'+cls+'">'+(r.diff>0?'+':'')+r.diff.toFixed(1)+'分</td>'
        +'<td style="font-weight:700;'+cls+'">'+(r.pct>0?'+':'')+r.pct.toFixed(0)+'%</td></tr>';
    }
  });
  h+='</table></div>';
  el.innerHTML=h;
}
</script>

<script>
// 全員地図
var _allMap={map:null,markers:[],infoWin:null};
function openAllUsersMap(){
  var names=Object.keys(S.users);
  var hasCoord=names.filter(function(n){var d=S.users[n];return d&&d.lat&&d.lng;});
  if(hasCoord.length===0){alert('座標が設定されている利用者がいません。\n先に「📍 住所から座標を一括取得」を実行してください。');return;}
  document.getElementById('allmap-modal').style.display='flex';
  document.getElementById('allmap-count').textContent='座標あり: '+hasCoord.length+'/'+names.length+'名';
  if(!window.google||!window.google.maps){
    loadGoogleMapsJS(S.googleApiKey).then(function(){initAllUsersMap();});
  } else {
    setTimeout(function(){initAllUsersMap();},50);
  }
}
function initAllUsersMap(){
  // 既存マーカー削除
  _allMap.markers.forEach(function(m){m.setMap(null);});
  _allMap.markers=[];
  if(_allMap.infoWin) _allMap.infoWin.close();

  var bounds=new google.maps.LatLngBounds();
  // 施設ピン
  var facPos=new google.maps.LatLng(FAC.lat,FAC.lng);
  bounds.extend(facPos);

  _allMap.map=new google.maps.Map(document.getElementById('allmap-container'),{
    center:facPos,zoom:14,mapTypeId:'hybrid',
    styles:[{featureType:'all',elementType:'labels',stylers:[{visibility:'on'}]}]
  });
  _allMap.infoWin=new google.maps.InfoWindow();

  // 施設マーカー
  var facMarker=new google.maps.Marker({
    position:facPos,map:_allMap.map,
    icon:{path:google.maps.SymbolPath.BACKWARD_CLOSED_ARROW,scale:8,fillColor:'#f5c518',fillOpacity:1,strokeColor:'#fff',strokeWeight:2},
    title:FAC.name,zIndex:1000
  });
  _allMap.markers.push(facMarker);
  facMarker.addListener('click',function(){
    _allMap.infoWin.setContent(
      '<div style="padding:4px;min-width:180px">'
      +'<div style="font-size:13px;font-weight:700;color:#333">⭐ '+FAC.name+'</div>'
      +'<div style="font-size:11px;color:#666;margin:4px 0">'+FAC.addr+'</div>'
      +'<div style="font-size:10px;color:#999;font-family:monospace;margin-bottom:6px">'+FAC.lat.toFixed(6)+', '+FAC.lng.toFixed(6)+'</div>'
      +'<button onclick="closeAllUsersMap();setTimeout(function(){openFacMapModal()},300)" style="padding:5px 12px;background:#f5c518;color:#333;border:none;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700">📍 施設の座標を修正</button>'
      +'</div>'
    );
    _allMap.infoWin.open(_allMap.map,facMarker);
  });

  // 利用者ピン
  var names=Object.keys(S.users);
  names.forEach(function(name){
    var d=S.users[name];
    if(!d) return;
    var hasCoord=d.lat&&d.lng;
    var pos=hasCoord?new google.maps.LatLng(d.lat,d.lng):null;
    if(!pos) return; // 座標なしはスキップ
    bounds.extend(pos);
    var pinColor=hasCoord?'#34a853':'#f44336';
    var marker=new google.maps.Marker({
      position:pos,map:_allMap.map,
      icon:{path:google.maps.SymbolPath.CIRCLE,scale:7,fillColor:pinColor,fillOpacity:1,strokeColor:'#fff',strokeWeight:2},
      title:name,zIndex:100
    });
    _allMap.markers.push(marker);
    marker.addListener('click',function(){
      var addr=d.addr||'住所なし';
      var coord=d.lat.toFixed(6)+', '+d.lng.toFixed(6);
      _allMap.infoWin.setContent(
        '<div style="padding:4px;min-width:180px">'
        +'<div style="font-size:13px;font-weight:700;color:#333">'+name+'</div>'
        +'<div style="font-size:11px;color:#666;margin:4px 0">'+addr+'</div>'
        +'<div style="font-size:10px;color:#999;font-family:monospace;margin-bottom:6px">'+coord+'</div>'
        +'<button onclick="closeAllUsersMap();setTimeout(function(){_mapModal.fromAllMap=true;openMapModal(\''+name.replace(/'/g,"\\'")+'\')},300)" style="padding:5px 12px;background:#4285f4;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:11px;font-weight:700">📍 座標を修正</button>'
        +'</div>'
      );
      _allMap.infoWin.open(_allMap.map,marker);
    });
  });

  // 全ピンが見えるようにズーム調整（施設を中心に保つ）
  if(_allMap.markers.length>1){
    _allMap.map.fitBounds(bounds,{top:40,right:40,bottom:40,left:40});
    // fitBounds後に施設を中心にパン
    google.maps.event.addListenerOnce(_allMap.map,'idle',function(){
      _allMap.map.panTo(facPos);
    });
  }

  // 座標なしの利用者一覧を表示
  var noCoord=names.filter(function(n){var d=S.users[n];return !d||!d.lat||!d.lng;});
  if(noCoord.length>0){
    var listDiv=document.createElement('div');
    listDiv.style.cssText='position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.8);color:#fff;padding:8px 12px;border-radius:8px;font-size:11px;max-width:300px;max-height:150px;overflow-y:auto;z-index:10';
    listDiv.innerHTML='<div style="font-weight:700;color:#f87171;margin-bottom:4px">🔴 座標未取得（'+noCoord.length+'名）</div>'+noCoord.map(function(n){return '<div style="padding:1px 0;color:#fca5a5">・'+n+'</div>';}).join('');
    document.getElementById('allmap-container').style.position='relative';
    document.getElementById('allmap-container').appendChild(listDiv);
  }
}
function closeAllUsersMap(){
  document.getElementById('allmap-modal').style.display='none';
  if(_allMap.infoWin) _allMap.infoWin.close();
  _allMap.markers.forEach(function(m){m.setMap(null);});
  _allMap.markers=[];
  _allMap.map=null;
  // 座標未取得リストのDIVを削除
  var container=document.getElementById('allmap-container');
  var overlay=container.querySelector('div[style*="position:absolute"]');
  if(overlay) overlay.remove();
}
</script>

var _routeMap={map:null,markers:[],lines:[],infoWin:null};
var ROUTE_COLORS=['#f87171','#60a5fa','#34d399','#fbbf24','#a78bfa'];

function getRouteMembers(tabKey,carNo){
  var grp=S.groups[tabKey];
  if(!grp) return [];
  var g=grp.find(function(x){return x.no===carNo;});
  if(!g) return [];
  var members=applyRouteOvr(g.members,tabKey,carNo);
  return members.filter(function(n){return !S.absent.has(n)&&needsShuttle(n);});
}

function openRouteMapSingle(tabKey,carNo){
  var members=getRouteMembers(tabKey,carNo);
  if(!members.length){alert('乗車する利用者がいません');return;}
  var grp=S.groups[tabKey];
  var g=grp.find(function(x){return x.no===carNo;});
  var vid=effectiveVid(g,tabKey);
  var vname=VEH[vid]?VEH[vid].name:'';
  var dirLabel=tabKey.includes('pick')?'迎え':'送り';
  document.getElementById('route-map-title').textContent='🗺️ '+g.no+' '+vname+' '+dirLabel+'ルート';
  // 他の号車の利用者情報を収集
  var otherCars=[];
  grp.forEach(function(og,i){
    if(og.no===carNo) return;
    var oMembers=getRouteMembers(tabKey,og.no);
    if(!oMembers.length) return;
    var oVid=effectiveVid(og,tabKey);
    var oVname=VEH[oVid]?VEH[oVid].name:'';
    otherCars.push({members:oMembers,color:ROUTE_COLORS[(i+1)%ROUTE_COLORS.length],label:og.no+' '+oVname,vid:oVid});
  });
  showRouteMap([{members:members,color:ROUTE_COLORS[0],label:g.no+' '+vname}],otherCars);
}

function openRouteMapAll(tabKey){
  var grps=S.groups[tabKey];
  if(!grps||!grps.length){alert('車両データがありません');return;}
  var dirLabel=tabKey.includes('pick')?'迎え':'送り';
  var routes=[];
  grps.forEach(function(g,i){
    var vid=effectiveVid(g,tabKey);
    if(!vid) return;
    var members=getRouteMembers(tabKey,g.no);
    if(!members.length) return;
    var vname=VEH[vid]?VEH[vid].name:'';
    routes.push({members:members,color:ROUTE_COLORS[i%ROUTE_COLORS.length],label:g.no+' '+vname});
  });
  if(!routes.length){alert('ルートがありません');return;}
  document.getElementById('route-map-title').textContent='🗺️ 全車 '+dirLabel+'ルート';
  showRouteMap(routes);
}

function showRouteMap(routes,otherCars){
  if(!window.google||!window.google.maps){
    var key=S.googleApiKey.trim();
    if(!key){alert('APIキーが設定されていません');return;}
    loadGoogleMapsJS(key).then(function(){showRouteMap(routes,otherCars);});
    return;
  }
  document.getElementById('route-map-modal').style.display='flex';
  clearRouteMap();

  var bounds=new google.maps.LatLngBounds();
  var facPos=new google.maps.LatLng(FAC.lat,FAC.lng);
  bounds.extend(facPos);

  _routeMap.map=new google.maps.Map(document.getElementById('route-map-container'),{
    center:facPos,zoom:13,
    styles:[{elementType:'geometry',stylers:[{color:'#1d2c4d'}]},{elementType:'labels.text.fill',stylers:[{color:'#8ec3b9'}]},{elementType:'labels.text.stroke',stylers:[{color:'#1a3646'}]},{featureType:'road',elementType:'geometry',stylers:[{color:'#304a7d'}]},{featureType:'water',elementType:'geometry',stylers:[{color:'#17263c'}]}]
  });
  _routeMap.infoWin=new google.maps.InfoWindow();

  // 施設ピン
  var facMarker=new google.maps.Marker({
    position:facPos,map:_routeMap.map,
    icon:{path:google.maps.SymbolPath.CIRCLE,scale:12,fillColor:'#ff69b4',fillOpacity:1,strokeColor:'#fff',strokeWeight:2},
    title:'施設',zIndex:1000
  });
  facMarker.addListener('click',function(){_routeMap.infoWin.setContent('<div style="color:#333;font-weight:700;font-size:14px">⭐ 施設</div>');_routeMap.infoWin.open(_routeMap.map,facMarker);});
  _routeMap.markers.push(facMarker);

  // 他の号車の利用者を先に描画（背面に薄く表示）
  if(otherCars&&otherCars.length>0){
    otherCars.forEach(function(oc){
      oc.members.forEach(function(name){
        var d=S.users[name];
        if(!d||!d.lat||!d.lng) return;
        var pos=new google.maps.LatLng(d.lat,d.lng);
        bounds.extend(pos);
        var marker=new google.maps.Marker({
          position:pos,map:_routeMap.map,
          label:{text:oc.label.charAt(0),color:'#fff',fontSize:'12px',fontWeight:'900'},
          icon:{path:google.maps.SymbolPath.CIRCLE,scale:16,fillColor:oc.color,fillOpacity:0.9,strokeColor:'#fff',strokeWeight:2},
          title:name+' ('+oc.label+')',zIndex:50
        });
        marker.addListener('click',function(){
          _routeMap.infoWin.setContent(
            '<div style="color:#333;font-size:14px;font-weight:700">'+name+'</div>'
            +'<div style="color:#666;font-size:12px;margin:2px 0">'+oc.label+'</div>'
            +'<div style="color:#666;font-size:11px">'+(d.addr||'')+'</div>'
            +'<div style="color:#999;font-size:10px;margin-top:4px">※ 他の号車の利用者</div>'
          );
          _routeMap.infoWin.open(_routeMap.map,marker);
        });
        _routeMap.markers.push(marker);
      });
    });
  }

  // 各ルート（メインの号車）
  routes.forEach(function(route){
    var path=[facPos];
    route.members.forEach(function(name,idx){
      var d=S.users[name];
      if(!d||!d.lat||!d.lng) return;
      var pos=new google.maps.LatLng(d.lat,d.lng);
      bounds.extend(pos);
      path.push(pos);

      var marker=new google.maps.Marker({
        position:pos,map:_routeMap.map,
        label:{text:String(idx+1),color:'#fff',fontSize:'12px',fontWeight:'900'},
        icon:{path:google.maps.SymbolPath.CIRCLE,scale:16,fillColor:route.color,fillOpacity:0.9,strokeColor:'#fff',strokeWeight:2},
        title:name,zIndex:100+idx
      });
      marker.addListener('click',function(){
        _routeMap.infoWin.setContent('<div style="color:#333;font-size:14px;font-weight:700">'+(idx+1)+'. '+name+'</div><div style="color:#666;font-size:12px">'+route.label+'</div><div style="color:#666;font-size:11px">'+(d.addr||'')+'</div>');
        _routeMap.infoWin.open(_routeMap.map,marker);
      });
      _routeMap.markers.push(marker);
    });
    path.push(facPos);

    var line=new google.maps.Polyline({
      path:path,map:_routeMap.map,
      strokeColor:route.color,strokeOpacity:0.8,strokeWeight:4,
      icons:[{icon:{path:google.maps.SymbolPath.FORWARD_OPEN_ARROW,scale:3,strokeColor:route.color},offset:'50%',repeat:'120px'}]
    });
    _routeMap.lines.push(line);
  });

  _routeMap.map.fitBounds(bounds,{top:50,bottom:50,left:50,right:50});

  // 凡例
  var legendHtml=routes.map(function(r){
    return '<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:28px;height:4px;background:'+r.color+';border-radius:2px;display:inline-block"></span><b>'+r.label+'</b>（'+r.members.length+'名）</span>';
  }).join('');
  // 他号車の凡例を追加
  if(otherCars&&otherCars.length>0){
    legendHtml+='<span style="color:var(--tx3);margin-left:8px">│</span>';
    legendHtml+=otherCars.map(function(oc){
      return '<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:12px;height:12px;background:'+oc.color+';border-radius:50%;display:inline-block"></span><span>'+oc.label+'（'+oc.members.length+'名）</span></span>';
    }).join('');
  }
  document.getElementById('route-map-legend').innerHTML=legendHtml;
}

function clearRouteMap(){
  _routeMap.markers.forEach(function(m){m.setMap(null);});
  _routeMap.lines.forEach(function(l){l.setMap(null);});
  _routeMap.markers=[];
  _routeMap.lines=[];
  if(_routeMap.infoWin) _routeMap.infoWin.close();
}

function closeRouteMap(){
  document.getElementById('route-map-modal').style.display='none';
  clearRouteMap();
  _routeMap.map=null;
}
</script>

<script>
// 地図モーダル（座標修正用）
var _mapModal={map:null,marker:null,name:'',fromAllMap:false};
function openMapModal(name){
  var d=S.users[name];if(!d)return;
  _mapModal.name=name;
  var lat=d.lat||FAC.lat, lng=d.lng||FAC.lng;
  document.getElementById('map-modal-title').textContent=name+' の座標を修正';
  document.getElementById('map-modal').style.display='flex';
  document.getElementById('map-modal-coord').textContent=lat.toFixed(6)+', '+lng.toFixed(6);
  // Google Maps JS APIが読み込み済みか確認
  if(!window.google||!window.google.maps){
    loadGoogleMapsJS(S.googleApiKey).then(function(){initMapModal(lat,lng);});
  } else {
    setTimeout(function(){initMapModal(lat,lng);},50);
  }
}
function initMapModal(lat,lng){
  var pos={lat:lat,lng:lng};
  _mapModal.map=new google.maps.Map(document.getElementById('map-modal-container'),{
    center:pos,zoom:17,mapTypeId:'hybrid',
    styles:[{featureType:'all',elementType:'labels',stylers:[{visibility:'on'}]}]
  });
  _mapModal.marker=new google.maps.Marker({
    position:pos,map:_mapModal.map,draggable:true,
    title:'ドラッグして移動'
  });
  _mapModal.marker.addListener('dragend',function(){
    var p=_mapModal.marker.getPosition();
    document.getElementById('map-modal-coord').textContent=p.lat().toFixed(6)+', '+p.lng().toFixed(6);
  });
}
function closeMapModal(){
  document.getElementById('map-modal').style.display='none';
  if(_mapModal.marker){_mapModal.marker.setMap(null);_mapModal.marker=null;}
  _mapModal.map=null;
  _mapModal.fromAllMap=false;
}
function saveMapCoord(){
  var p=_mapModal.marker.getPosition();
  var name=_mapModal.name;
  var reopenAllMap=_mapModal.fromAllMap;
  // 施設の座標修正
  if(name==='__facility__'){
    saveFacCoord(p.lat(),p.lng());
    closeMapModal();
    if(reopenAllMap) setTimeout(function(){openAllUsersMap();},400);
    return;
  }
  if(S.users[name]){
    S.users[name].lat=p.lat();
    S.users[name].lng=p.lng();
    closeMapModal();
    renderAll();
    // Google APIキーがあれば、この人の距離を自動取得
    if(S.googleApiKey&&S.googleApiKey.trim()){
      showToast('📍 '+name+' の距離を取得中...','#4285f4');
      fetchOnePersonDistances(p.lat(),p.lng()).then(function(cnt){
        autoSave();
        renderAll();
        showToast('✅ '+name+' 修正完了（距離'+cnt+'区間）','#00d4aa');
        if(reopenAllMap) setTimeout(function(){openAllUsersMap();},400);
      }).catch(function(e){
        showToast('⚠️ '+name+' 距離取得失敗','#f87171');
        if(reopenAllMap) setTimeout(function(){openAllUsersMap();},400);
      });
    } else {
      showToast('✅ '+name+' の座標を修正しました','#00d4aa');
      if(reopenAllMap) setTimeout(function(){openAllUsersMap();},400);
    }
  } else {
    closeMapModal();
  }
}
// 施設の座標修正
function openFacMapModal(){
  _mapModal.name='__facility__';
  _mapModal.fromAllMap=true;
  var lat=FAC.lat, lng=FAC.lng;
  document.getElementById('map-modal-title').textContent='⭐ 施設の座標を修正';
  document.getElementById('map-modal').style.display='flex';
  document.getElementById('map-modal-coord').textContent=lat.toFixed(6)+', '+lng.toFixed(6);
  if(!window.google||!window.google.maps){
    loadGoogleMapsJS(S.googleApiKey).then(function(){initMapModal(lat,lng);});
  } else {
    setTimeout(function(){initMapModal(lat,lng);},50);
  }
}
function saveFacCoord(lat,lng){
  FAC.lat=lat; FAC.lng=lng;
  FC[0]=lat; FC[1]=lng;
  try{localStorage.setItem('sakura_fac_coord',JSON.stringify({lat:lat,lng:lng}));}catch(e){}
  showToast('✅ 施設の座標を修正しました','#00d4aa');
  renderAll();
}

// ═══════════════════════════════════════════════
// OSRM精度テスト用 座標修正（Leaflet = 完全無料）
// ═══════════════════════════════════════════════
var _leafletLoaded=false;
function loadLeaflet(){
  return new Promise(function(resolve){
    if(_leafletLoaded){resolve();return;}
    var link=document.createElement('link');
    link.rel='stylesheet';
    link.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
    document.head.appendChild(link);
    var script=document.createElement('script');
    script.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
    script.onload=function(){_leafletLoaded=true;resolve();};
    document.head.appendChild(script);
  });
}

var _fixState={name:'',lat:0,lng:0,map:null,marker:null,newMarker:null};

function osrmFixCoord(name,lat,lng){
  _fixState.name=name;
  _fixState.lat=lat;
  _fixState.lng=lng;
  // モーダル表示
  var modal=document.getElementById('osrm-fix-modal');
  if(!modal){
    modal=document.createElement('div');
    modal.id='osrm-fix-modal';
    modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px';
    modal.innerHTML=
      '<div style="background:#16213e;border-radius:16px;width:100%;max-width:700px;max-height:90vh;overflow:hidden;border:2px solid #334">'
        +'<div style="padding:14px 16px;border-bottom:1px solid #334;display:flex;align-items:center;gap:10px">'
          +'<div style="flex:1">'
            +'<div id="osrm-fix-title" style="font-size:15px;font-weight:900;color:#f5c518"></div>'
            +'<div id="osrm-fix-addr" style="font-size:11px;color:var(--tx3);margin-top:2px"></div>'
          +'</div>'
          +'<button onclick="osrmFixClose()" style="background:none;border:none;color:#f87171;font-size:20px;cursor:pointer;padding:4px 8px">✕</button>'
        +'</div>'
        +'<div style="padding:12px 16px;background:#0f3460">'
          +'<div style="font-size:13px;color:#fff;line-height:1.8;margin-bottom:8px">'
            +'<b>使い方：</b><br>'
            +'🔴 赤ピン = 今の登録位置<br>'
            +'地図上で <b>実際の家の場所をクリック</b> → 🟢 緑ピンが立つ<br>'
            +'合っていたら「✅ この位置で保存」を押す'
          +'</div>'
        +'</div>'
        +'<div id="osrm-fix-map" style="width:100%;height:400px"></div>'
        +'<div style="padding:12px 16px;display:flex;gap:10px;align-items:center;border-top:1px solid #334">'
          +'<div id="osrm-fix-coord" style="font-size:11px;color:var(--tx3);flex:1"></div>'
          +'<button id="osrm-fix-save-btn" onclick="osrmFixSave()" disabled style="padding:10px 24px;background:linear-gradient(135deg,#00d4aa,#4285f4);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:900;opacity:.5">✅ この位置で保存</button>'
          +'<button onclick="osrmFixClose()" style="padding:10px 16px;background:var(--bg3);color:var(--tx2);border:1px solid var(--bdr);border-radius:8px;cursor:pointer;font-size:12px">キャンセル</button>'
        +'</div>'
      +'</div>';
    document.body.appendChild(modal);
  }
  modal.style.display='flex';

  var u=osrmGetUser(name);
  document.getElementById('osrm-fix-title').textContent='📍 '+name+' の座標を修正';
  document.getElementById('osrm-fix-addr').textContent=u?u.addr:'';
  document.getElementById('osrm-fix-coord').textContent='現在: '+lat.toFixed(6)+', '+lng.toFixed(6);
  document.getElementById('osrm-fix-save-btn').disabled=true;
  document.getElementById('osrm-fix-save-btn').style.opacity='.5';

  loadLeaflet().then(function(){
    setTimeout(function(){
      if(_fixState.map){_fixState.map.remove();_fixState.map=null;}
      var map=L.map('osrm-fix-map').setView([lat,lng],16);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'© OpenStreetMap',maxZoom:19
      }).addTo(map);

      // 赤ピン（現在位置）
      var redIcon=L.divIcon({className:'',html:'<div style="width:20px;height:20px;background:#f87171;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',iconSize:[20,20],iconAnchor:[10,10]});
      L.marker([lat,lng],{icon:redIcon}).addTo(map).bindPopup('🔴 現在の登録位置').openPopup();

      _fixState.map=map;
      _fixState.newMarker=null;

      // 地図クリック → 緑ピン
      map.on('click',function(e){
        var greenIcon=L.divIcon({className:'',html:'<div style="width:24px;height:24px;background:#00d4aa;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',iconSize:[24,24],iconAnchor:[12,12]});
        if(_fixState.newMarker){map.removeLayer(_fixState.newMarker);}
        _fixState.newMarker=L.marker([e.latlng.lat,e.latlng.lng],{icon:greenIcon}).addTo(map).bindPopup('🟢 新しい位置').openPopup();
        _fixState.newLat=e.latlng.lat;
        _fixState.newLng=e.latlng.lng;
        document.getElementById('osrm-fix-coord').textContent='新しい座標: '+e.latlng.lat.toFixed(6)+', '+e.latlng.lng.toFixed(6);
        document.getElementById('osrm-fix-save-btn').disabled=false;
        document.getElementById('osrm-fix-save-btn').style.opacity='1';
      });
    },100);
  });
}

function osrmFixFacility(){
  _fixState.name='__facility__';
  _fixState.lat=FAC.lat;
  _fixState.lng=FAC.lng;
  var modal=document.getElementById('osrm-fix-modal');
  if(!modal){ osrmFixCoord('',FAC.lat,FAC.lng); return; }
  modal.style.display='flex';
  document.getElementById('osrm-fix-title').textContent='📍 施設の座標を修正';
  document.getElementById('osrm-fix-addr').textContent=FAC.addr;
  document.getElementById('osrm-fix-coord').textContent='現在: '+FAC.lat.toFixed(6)+', '+FAC.lng.toFixed(6);
  document.getElementById('osrm-fix-save-btn').disabled=true;
  document.getElementById('osrm-fix-save-btn').style.opacity='.5';

  loadLeaflet().then(function(){
    setTimeout(function(){
      if(_fixState.map){_fixState.map.remove();_fixState.map=null;}
      var map=L.map('osrm-fix-map').setView([FAC.lat,FAC.lng],16);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'© OpenStreetMap',maxZoom:19
      }).addTo(map);
      var redIcon=L.divIcon({className:'',html:'<div style="width:20px;height:20px;background:#f87171;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',iconSize:[20,20],iconAnchor:[10,10]});
      L.marker([FAC.lat,FAC.lng],{icon:redIcon}).addTo(map).bindPopup('🔴 現在の登録位置').openPopup();
      _fixState.map=map;
      _fixState.newMarker=null;
      map.on('click',function(e){
        var greenIcon=L.divIcon({className:'',html:'<div style="width:24px;height:24px;background:#00d4aa;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.4)"></div>',iconSize:[24,24],iconAnchor:[12,12]});
        if(_fixState.newMarker){map.removeLayer(_fixState.newMarker);}
        _fixState.newMarker=L.marker([e.latlng.lat,e.latlng.lng],{icon:greenIcon}).addTo(map).bindPopup('🟢 新しい位置').openPopup();
        _fixState.newLat=e.latlng.lat;
        _fixState.newLng=e.latlng.lng;
        document.getElementById('osrm-fix-coord').textContent='新しい座標: '+e.latlng.lat.toFixed(6)+', '+e.latlng.lng.toFixed(6);
        document.getElementById('osrm-fix-save-btn').disabled=false;
        document.getElementById('osrm-fix-save-btn').style.opacity='1';
      });
    },100);
  });
}

function osrmFixClose(){
  var modal=document.getElementById('osrm-fix-modal');
  if(modal) modal.style.display='none';
  if(_fixState.map){_fixState.map.remove();_fixState.map=null;}
}

function osrmFixSave(){
  var name=_fixState.name;
  var lat=_fixState.newLat;
  var lng=_fixState.newLng;

  if(name==='__facility__'){
    // 施設の座標を更新
    saveFacCoord(lat,lng);
    osrmFixClose();
    renderMain();
    return;
  }

  // S.usersにあれば更新
  if(S.users[name]){
    S.users[name].lat=lat;
    S.users[name].lng=lng;
  }
  // UDにもあれば更新（ルート計算で参照されるため）
  if(typeof UD!=='undefined'&&UD[name]){
    UD[name].lat=lat;
    UD[name].lng=lng;
  }

  // 座標修正をブラウザに永続保存（ページ更新しても消えない）
  try{
    var fixes=JSON.parse(localStorage.getItem('yawaragi_coord_fix')||'{}');
    fixes[name]={lat:lat,lng:lng};
    localStorage.setItem('yawaragi_coord_fix',JSON.stringify(fixes));
  }catch(e){}

  autoSave();
  osrmFixClose();
  showToast('✅ '+name+' の座標を修正しました（ブラウザに保存済み）','#00d4aa');

  // 精度テストタブを再描画
  renderMain();
}
</script>
