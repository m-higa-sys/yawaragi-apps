    <!-- キャッシュ自動更新バージョンゲート（design.md 2026-06-18 準拠・<head>最先頭） -->
    <!-- version.txt を取得し、現URLの ?v= と違えば1回だけ最新版へ location.replace する -->
    <script>
    function gateShouldReload(cur, latest) { return !!latest && cur !== latest; }
    function buildVersionedUrl(currentUrl, latest) { var u = new URL(currentUrl); u.searchParams.set('v', latest); return u.href; }
    (function () {
        try {
            var cur = new URLSearchParams(location.search).get('v');
            fetch('version.txt?_=' + Date.now(), { cache: 'no-store' })
                .then(function (r) { return r.text(); })
                .then(function (t) {
                    var latest = (t || '').trim();
                    if (gateShouldReload(cur, latest)) {
                        location.replace(buildVersionedUrl(location.href, latest));
                    }
                })
                .catch(function () { /* オフライン等は no-op で固まらせない */ });
        } catch (e) { /* 念のため no-op（ゲートで画面を固まらせない） */ }
    })();
    </script>

  <script>
    console.log('[intake.html] 初期化開始 / shared:', typeof gasPost, typeof YAWARAGIBOARD_API_URL);

    /* ===== 同梱依存(P4と統一・board 1:1) ===== */
    const DEFAULT_STAFF = [
        '比嘉', '星野', '勝又', '下浦', '工藤', '髙山', '春山', '大久保', '石井'
    ];
    function getStaff() { return DEFAULT_STAFF; }

    /* ===== 見学・体験(intake) board 1:1移植(board 12832-14491) =====
       INTAKE_API_URL/自前escape/69関数を含む。ABS_BOARD_API_URLは元々0。 */
    // ===== 見学・体験・新規 Intake タブ（2026/4/19追加・v2 タップUI）=====
    // =====================================================================
    
    const INTAKE_API_URL = YAWARAGIBOARD_API_URL; // 後方互換エイリアス（2026-06-06一元化）
    const INTAKE_KIND_LABEL = { inquiry: '問い合わせ', trial: '体験', visit: '見学' };
    const INTAKE_STATUS_LABEL = {
        pending: '受付中', scheduled: '予定確定', done: '完了',
        on_hold: '利用保留', contracted: '契約済', active: '本格利用中',
        rejected: '利用なし', cancelled: 'キャンセル'
    };
    const INTAKE_NO_USE_REASON = {
        other_dayservice: '他社デイに決定',
        price: '金額で折り合わず',
        out_of_range: '送迎範囲外',
        personal_no: '体験で本人NG',
        other: 'その他'
    };
    const INTAKE_CARE_LEVELS = ['申請前・申請中', '要支援1', '要支援2', '要介護1', '要介護2', '要介護3', '要介護4', '要介護5', '不明'];
    // 土曜営業開始時は '土' を追加（project_土曜営業検討.md 参照）
    const INTAKE_DAY_BUTTONS = ['月', '火', '水', '木', '金'];
    let _intakeCache = [];
    let _cmCache = []; // ケアマネ連絡先キャッシュ
    let _intakeModalMode = 'edit'; // 'new' or 'edit'
    let _intakeModalDraft = null; // 新規時の一時データ
    
    function intakeEscapeHtml(s) {
        if (s == null) return '';
        return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    }
    function intakeEscapeAttr(s) { return intakeEscapeHtml(s); }
    
    // 生年月日を和暦表示に変換 + 年齢自動計算（onblurで呼ばれる）
    function intakeNormalizeBirthday() {
        const bdEl = document.getElementById('m-生年月日');
        const ageEl = document.getElementById('m-年齢');
        if (!bdEl) return;
        const raw = (bdEl.value || '').trim();
        if (!raw) return;
        // 全角数字を半角に
        const half = raw.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));
        // パース：YYYYMMDD / YYYY-MM-DD / YYYY/MM/DD / 昭和XX年X月X日 / 平成XX年X月X日 / 令和XX年X月X日
        let y = 0, mo = 0, d = 0;
        let m = half.match(/^(\d{4})(\d{2})(\d{2})$/);
        if (m) { y = +m[1]; mo = +m[2]; d = +m[3]; }
        if (!y) {
            m = half.match(/^(\d{4})[\-\/.](\d{1,2})[\-\/.](\d{1,2})$/);
            if (m) { y = +m[1]; mo = +m[2]; d = +m[3]; }
        }
        if (!y) {
            m = half.match(/^(明治|大正|昭和|平成|令和)(\d{1,2})年(\d{1,2})月(\d{1,2})日$/);
            if (m) {
                const era = m[1], en = +m[2];
                const baseY = era === '明治' ? 1867 : era === '大正' ? 1911 : era === '昭和' ? 1925 : era === '平成' ? 1988 : 2018;
                y = baseY + en; mo = +m[3]; d = +m[4];
            }
        }
        if (!y || !mo || !d) return; // パース失敗ならそのまま
        // 西暦→和暦
        const dt = y * 10000 + mo * 100 + d;
        let era = '', en = 0;
        if (dt >= 20190501) { era = '令和'; en = y - 2018; }
        else if (dt >= 19890108) { era = '平成'; en = y - 1988; }
        else if (dt >= 19261225) { era = '昭和'; en = y - 1925; }
        else if (dt >= 19120730) { era = '大正'; en = y - 1911; }
        else { era = '明治'; en = y - 1867; }
        bdEl.value = era + en + '年' + mo + '月' + d + '日';
        // 年齢計算
        const today = new Date();
        let age = today.getFullYear() - y;
        if (today.getMonth() + 1 < mo || (today.getMonth() + 1 === mo && today.getDate() < d)) age--;
        if (ageEl && age >= 0 && age < 130) ageEl.value = age;
    }
    
    // 今日の日付をJST(日本時間)の yyyy-MM-dd で返す（toISOStringのUTCズレ＝朝9時前に前日になる不具合の対策・2026-06-13）
    function getTodayJST() {
      const d = new Date();
      const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
      return jst.toISOString().slice(0, 10);
    }

    // 日本の電話番号を自動でハイフン整形する
    function formatJPPhone(input) {
        if (!input) return '';
        // 全角数字を半角に変換 + 数字以外を削除
        var s = String(input).replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)).replace(/[^\d]/g, '');
        if (!s) return '';
        // フリーダイヤル: 0120-XXX-XXX / 0800-XXX-XXXX
        if (s.length === 10 && s.startsWith('0120')) return s.slice(0,4) + '-' + s.slice(4,7) + '-' + s.slice(7);
        if (s.length === 11 && s.startsWith('0800')) return s.slice(0,4) + '-' + s.slice(4,7) + '-' + s.slice(7);
        // 携帯/IP: 090/080/070/050 → XXX-XXXX-XXXX
        if (s.length === 11 && /^(090|080|070|050)/.test(s)) return s.slice(0,3) + '-' + s.slice(3,7) + '-' + s.slice(7);
        // 大都市固定: 03/06 → XX-XXXX-XXXX
        if (s.length === 10 && /^(03|06)/.test(s)) return s.slice(0,2) + '-' + s.slice(2,6) + '-' + s.slice(6);
        // 一般固定（市外局番4桁・東松山0493等） → XXXX-XX-XXXX
        if (s.length === 10) return s.slice(0,4) + '-' + s.slice(4,6) + '-' + s.slice(6);
        // 整形できない場合は元の数字列を返す
        return s;
    }

    function loadCmFromUserListCache(onLoaded) {
        const cbName = 'cmFromUsersCb_' + Date.now();
        const url = ABS_USER_API_URL + '?action=cmFromUsers&callback=' + cbName;
        window[cbName] = function(resp) {
            if (resp && resp.success && Array.isArray(resp.cmFromUsers)) {
                const seen = {};
                _cmCache.forEach(c => { seen[(c.office || '') + '|' + (c.name || '')] = true; });
                resp.cmFromUsers.forEach(c => {
                    const k = (c.office || '') + '|' + (c.name || '');

            }

            try { delete window[cbName]; } catch(e){}

    const INTAKE_TIME_AM = (() => {
        const a = ['07:50','07:55'];
        for (let m = 0; m < 60; m += 5) a.push('08:' + String(m).padStart(2,'0'));
        return a;
    })();
    const INTAKE_TIME_PM = (() => {
        const a = [];
        for (let m = 30; m < 60; m += 5) a.push('12:' + String(m).padStart(2,'0'));
        for (let m = 0; m < 30; m += 5) a.push('13:' + String(m).padStart(2,'0'));
        return a;
    })();
    function intakeTimeOptions(selected, ampm) {
        // ampm: 'AM' or 'PM' or null (両方)
        let slots;
        if (ampm === 'AM') slots = INTAKE_TIME_AM;

        else slots = INTAKE_TIME_AM.concat(INTAKE_TIME_PM);
        let html = '<option value="">-</option>';
        slots.forEach(t => {
            html += `<option value="${t}"${selected === t ? ' selected' : ''}>${t}</option>`;
        });
        return html;

    function gstepSync() {
        let reqTotal = 0, reqDone = 0, disp = 0;
        GSTEP_DEFS.forEach(d => {
            const el = document.getElementById('gstep-' + d.n);
            if (!el) return;
            const show = gstepCond(d);
            el.style.display = show ? '' : 'none';
            if (!show) return;
            disp++; // 見えている段だけで番号を振り直す（隠れた段で欠番にしない）
            const badge = el.querySelector('.gstep-badge');
            if (badge) badge.textContent = disp;
            const done = gstepDone(d), req = gstepReq(d);
            el.classList.toggle('done', done);
            const qt = el.querySelector('.gstep-qt');
            if (qt) qt.textContent = d.dynQ ? d.dynQ() : d.q;
            const mark = el.querySelector('.gstep-mark');
            if (mark) mark.innerHTML = req ? '<span class="gstep-req">必須</span>' : '<span class="gstep-opt">任意</span>';
            const sumEl = el.querySelector('.gstep-sum');
            if (sumEl) sumEl.textContent = done ? ('✓ ' + d.sum()) : '';
            if (req) { reqTotal++; if (done) reqDone++; }
        });
        const h7 = document.getElementById('gstep7-hint');
        if (h7) h7.textContent = gstepDef(7).note;
        if (typeof intakeUpdateYoteibiDow === 'function') intakeUpdateYoteibiDow();
        const prog = document.getElementById('gstep-progress');
        if (prog) {
            const left = reqTotal - reqDone;
            prog.textContent = left > 0 ? `必須 残り${left}項目` : '✓ 必須そろいました';
            prog.classList.toggle('allok', left === 0);
        }
    }
    function gstepOpen(n) {
        GSTEP_DEFS.forEach(d => {
            const el = document.getElementById('gstep-' + d.n);
            if (el) el.classList.toggle('open', d.n === n);
        });
        const open = document.getElementById('gstep-' + n);
        if (open) {
            const inp = open.querySelector('.gstep-body input:not([type=hidden]), .gstep-body textarea, .gstep-body select');
            if (inp) setTimeout(() => { try { inp.focus({ preventScroll:true }); } catch(e){} }, 60);
            try { open.scrollIntoView({ behavior:'smooth', block:'nearest' }); } catch(e){}
        }
    }
    function gstepHeadClick(n) {
        const el = document.getElementById('gstep-' + n);
        if (el && el.classList.contains('open')) gstepOpen(0); // 開いてるのを再タップで閉じる
        else gstepOpen(n);
    }
    function gstepAdvance(n) {
        gstepSync();
        const next = GSTEP_DEFS.filter(d => d.n > n && gstepCond(d) && !gstepDone(d))[0];
        if (next) gstepOpen(next.n); else gstepOpen(0);
    }
    function gstepOnGroup() {
        const openEl = document.querySelector('.gstep.open');
        const n = openEl ? parseInt(openEl.dataset.n, 10) : 0;
        gstepAdvance(n);
    }
    function gstepInit() {
        gstepSync();
        const first = GSTEP_DEFS.filter(d => gstepCond(d) && !gstepDone(d))[0];
        gstepOpen(first ? first.n : 1);
    }

    function intakeWarnings(r) {
        const warns = [];
        if (r.ペースメーカー === '不明') warns.push('🚨ペースメーカー未確認');
        const today = getTodayJST();
        const tomorrow = new Date(new Date(today).getTime() + 86400000).toISOString().slice(0,10);
        // 体験/見学が明日 → 前日連絡リマインド
        if (r.予定日 === tomorrow && !r.前日連絡日時) {
            warns.push('📞 明日が予定日：前日連絡してください');
        }
        // 体験/見学が明日まで → Googleマップ未登録警告（送迎者が困る）
        if (r.予定日 && r.予定日 <= tomorrow && r.予定日 >= today && !r['Googleマップ登録済み']) {
            warns.push('🗺️ Googleマップ未登録：送迎前に登録してください');
        }
        if (r.予定日 && r.予定日 >= today && !r.送迎時間連絡済) {
            const dDay = (new Date(r.予定日) - new Date(today)) / 86400000;
            if (dDay <= 1) warns.push('🟠送迎時間連絡 前日');
        }
        if (r.予定日 && r.予定日 < today && !r.ケアマネ連絡済) {
            warns.push('🔴ケアマネ連絡 超過');
        }
        if (r.社長確認依頼日時 && !r.社長確認済) warns.push('📩社長確認待ち');
        // 体験後フォロー状態（GAS@v213 が followup:{追客,ケアマネ} を返す・表示のみ）
        if (r.followup) {
            if (r.followup.追客) warns.push(r.followup.追客);
            if (r.followup.ケアマネ) warns.push(r.followup.ケアマネ);
        }
        return warns;
    }

    function loadIntakeList(_retryCount) {
        _retryCount = _retryCount || 0;
        renderIntakeToolbar();
        const statusEl = document.getElementById('if-status');
        const warnEl = document.getElementById('if-warn');
        const apprEl = document.getElementById('if-approval');
        const status = statusEl ? statusEl.value : '';
        const warnOnly = warnEl ? warnEl.checked : false;
        const approvalOnly = apprEl ? apprEl.checked : false;
    
        const host = document.getElementById('intake-list');
        host.innerHTML = _retryCount > 0
            ? '<div style="padding:20px;text-align:center;color:#888;">再読み込み中... (' + _retryCount + ')</div>'
            : '<div style="padding:20px;text-align:center;color:#888;">読み込み中...</div>';
    
        const cbName = 'intakeListCb_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
        let url = INTAKE_API_URL + '?action=intake_list&callback=' + cbName;
        if (status) url += '&status=' + encodeURIComponent(status);
        if (approvalOnly) url += '&pendingApproval=1';
    
        window[cbName] = function(resp) {
            try {
                if (!resp || !resp.success) {

            } finally {
                try { delete window[cbName]; } catch(e){}
            }
        };
        const script = document.createElement('script');
        script.src = url;
        script.onerror = function() {

        setTimeout(() => {
            try { script.remove(); } catch(e){}
            // タイムアウト時にコールバックが残っていれば、自動リトライ（最大2回）
            if (typeof window[cbName] === 'function') {

    // ===== 受付カンバン Phase C（2026-05-31）=====
    // 段階別アクセント：冷たい入口(藍)→温まる体験(琥珀)→到達(緑)へ進む配色

        { key:'受付',         label:'受付',         accent:'#5b7cba' },

        '受付→見学': ['氏名','TEL','エリア','種別'],
        '受付→体験': ['氏名','TEL','エリア','ペースメーカー'],

    function renderKanban(list) {

    // ゲート充足判定（boolはtrue、ペースメーカーは有/無を充足とみなす）
    function kanbanFieldFilled(r, f) {
        if (f === 'ペースメーカー') return ['有','無'].indexOf(r.ペースメーカー) !== -1;
        const v = r[f];
        return !(v === '' || v === null || v === undefined || v === false);
    }
    
    function renderKanbanCard(r, phase) {
        const name = intakeEscapeHtml(r.氏名 || r.ふりがな || '（名前未入力）');
        const dateInfo = (phase === '利用開始準備' && r.本格利用開始日) ? '開始: ' + r.本格利用開始日
            : (r.予定日 ? '予定: ' + r.予定日 : (r.種別 === 'inquiry' ? '問い合わせのみ' : '日付未定'));
        const warns = [];
        if (r.followup) { if (r.followup.追客) warns.push(r.followup.追客); if (r.followup.ケアマネ) warns.push(r.followup.ケアマネ); }
        const warnHtml = warns.length ? `<div class="kanban-card-warn">${intakeEscapeHtml(warns.join(' / '))}</div>` : '';
        let btn = '';
        const nextFn = KANBAN_NEXT[phase];
        if (nextFn) {
            const np = nextFn(r);
            const req = KANBAN_GATE[phase + '→' + np] || [];
            const missing = req.filter(f => !kanbanFieldFilled(r, f));
            const dis = missing.length > 0;
            const title = dis ? '未入力: ' + missing.join('・') : np + 'へ進める';
            btn = `<button class="kanban-card-advance"${dis ? ' disabled' : ''} title="${intakeEscapeAttr(title)}" onclick="event.stopPropagation();kanbanAdvance('${intakeEscapeAttr(r.id)}','${np}')">${np}へ &rsaquo;</button>`;
        }
        return `<div class="kanban-card" onclick="openIntakeModal('${intakeEscapeAttr(r.id)}')">`
            + `<div class="kanban-card-name">${name}</div>`
            + `<div class="kanban-card-sub">${intakeEscapeHtml(dateInfo)}</div>${warnHtml}${btn}</div>`;
    }

    function loadKanbanFunnel(ym) {
        ym = ym || getTodayJST().slice(0,7);
        const cb = 'kanbanFunnelCb_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
        window[cb] = function(resp) {
            try {
                const host = document.getElementById('kanban-funnel-bar');
                if (!host || !resp || !resp.success) return;
                const f = resp.funnel;
                const r1 = f.受付 > 0 ? Math.round(f.見学 / f.受付 * 100) : 0;
                const r2 = f.見学 > 0 ? Math.round(f.体験 / f.見学 * 100) : 0;
                const r3 = f.体験 > 0 ? Math.round(f.契約 / f.体験 * 100) : 0;
                const stages = [['受付',f.受付],['見学',f.見学],['体験',f.体験],['契約',f.契約],['利用開始',f.利用開始]];
                const flow = stages.map((s,i) =>
                    `<div class="pl-stage"><span class="pl-stage-n">${s[1]}</span><span class="pl-stage-l">${s[0]}</span></div>`
                    + (i < stages.length - 1 ? '<span class="pl-arrow">&rsaquo;</span>' : '')
                ).join('');
                host.innerHTML = `<div class="pl-funnel">`
                    + `<div class="pl-funnel-top"><span class="pl-funnel-ttl">受付パイプライン</span>`
                    +   `<select class="pl-funnel-mo" onchange="loadKanbanFunnel(this.value)">${kanbanFunnelMonths(ym)}</select></div>`
                    + `<div class="pl-funnel-flow">${flow}</div>`
                    + `<div class="pl-conv"><span>受付→見学 ${r1}%</span><span>見学→体験 ${r2}%</span><span>体験→契約 ${r3}%</span></div>`
                    + `</div>`;
            } finally { try { delete window[cb]; } catch(e){} }
        };
        const s = document.createElement('script');
        s.src = INTAKE_API_URL + '?action=intake_get_funnel&yearMonth=' + encodeURIComponent(ym) + '&callback=' + cb;
        s.onerror = function(){ try { delete window[cb]; } catch(e){} };
        document.body.appendChild(s);
        setTimeout(() => { try { s.remove(); } catch(e){} }, 8000);
    }
    function kanbanFunnelMonths(sel) {
        const now = new Date(), out = [];
        for (let i = 0; i < 6; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const ym = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
            const label = d.getFullYear() + '年' + (d.getMonth() + 1) + '月';
            out.push(`<option value="${ym}"${ym === sel ? ' selected' : ''}>${label}</option>`);
        }
        return out.join('');
    }

    // 必須項目の未入力ハイライトを更新（入力されたら自動で白に戻る）
    function intakeRefreshRequiredHighlight() {

        const kind = document.querySelector('[data-iv-group="種別"]');

    // ===== 曜日ボタン（第N希望 × 複数曜日 × AM/PM）=====
    // 保存形式: "第1:月/金AM, 第2:水PM"（同ランク内で複数曜日可、'/'区切り）
    function ivParseDayWishes(str) {
        const out = {};
        if (!str) return out;
        String(str).split(',').forEach(part => {
            const m = part.trim().match(/^第(\d+):([月火水木金土日\/]+)(AM|PM)?$/);
            if (m) out[m[1]] = { days: m[2].split('/').filter(Boolean), ampm: m[3] || '' };
        });
        return out;
    }
    function ivFormatDayWishes(prefix, count) {
        const parts = [];
        for (let i = 1; i <= count; i++) {
            const host = document.querySelector(`[data-iv-day-group="${prefix}-${i}"]`);
            if (!host) continue;
            const daysStr = host.dataset.days || '';
            const ampm = host.dataset.ampm || '';
            if (daysStr) parts.push(`第${i}:${daysStr}${ampm}`);
        }
        return parts.join(', ');
    }
    function ivSelectDay(groupId, day) {
        const host = document.querySelector(`[data-iv-day-group="${groupId}"]`);
        if (!host) return;
        // 複数選択トグル：同ランク内で複数曜日可
        const cur = (host.dataset.days || '').split('/').filter(Boolean);
        const idx = cur.indexOf(day);
        if (idx >= 0) {
            cur.splice(idx, 1);
        } else {
            cur.push(day);
        }
        // 順序：月火水木金土日 で並び替え
        const orderMap = { '月':1,'火':2,'水':3,'木':4,'金':5,'土':6,'日':7 };
        cur.sort((a, b) => (orderMap[a] || 9) - (orderMap[b] || 9));
        host.dataset.days = cur.join('/');
        // ボタンの active 状態更新
        host.querySelectorAll('.iv-day-btn').forEach(b => {
            b.classList.toggle('active', cur.indexOf(b.dataset.day) >= 0);
        });
    }
    function ivSelectAmpm(groupId, ampm) {
        const host = document.querySelector(`[data-iv-day-group="${groupId}"]`);
        if (!host) return;
        host.querySelectorAll('.iv-ampm-btn').forEach(b => b.classList.remove('active'));
        if (host.dataset.ampm === ampm) {
            host.dataset.ampm = '';
        } else {
            const tgt = host.querySelector(`.iv-ampm-btn[data-ampm="${ampm}"]`);
            if (tgt) tgt.classList.add('active');
            host.dataset.ampm = ampm;
        }
    }

        const dayBtns = INTAKE_DAY_BUTTONS.map(d =>

        const pmBtn = `<button type="button" class="iv-ampm-btn${selectedAmpm === 'PM' ? ' active' : ''}" data-ampm="PM" onclick="ivSelectAmpm('${groupId}','PM')">PM</button>`;
        return `<div class="iv-day-row" data-iv-day-group="${groupId}" data-days="${daysArr.join('/')}" data-ampm="${selectedAmpm || ''}">
            <span class="rank-label">${rankLabel}</span>
            ${dayBtns}

            ${amBtn}${pmBtn}

    function ivRenderDayWishes(prefix, rankCount, rawValue, options) {
        options = options || {};
        const raw = String(rawValue || '');
        // 「いつでもOK」判定
        const anytime = /いつでもOK/.test(raw);
        // 「後日ご連絡」判定（フォーマット例：「後日ご連絡」 or 「後日ご連絡:2026-05-20」）
        const followUpMatch = raw.match(/^後日ご連絡(?::(\d{4}-\d{2}-\d{2}))?/);
        const followUp = !!followUpMatch;
        const followUpDate = followUpMatch ? (followUpMatch[1] || '') : '';
    
        const parsed = ivParseDayWishes(rawValue);
        let rows = '';
        for (let i = 1; i <= rankCount; i++) {
            const p = parsed[i] || {};
            rows += ivRenderDayRow(`${prefix}-${i}`, `第${i}希望`, p.days || [], p.ampm || '');
        }
        const anyBtn = options.hideAnytime ? '' : `<button type="button" class="iv-btn${anytime ? ' active' : ''}" data-value="anytime" onclick="intakeToggleAnytime('${prefix}')" style="margin-bottom:8px;">🗓️ いつでもOK</button>`;
    
        // 「後日ご連絡」ボタン＋日付欄（options.enableFollowUp が true の時のみ）
        let followUpUI = '';
        if (options.enableFollowUp) {
            const followUpBtn = `<button type="button" class="iv-btn${followUp ? ' active' : ''}" data-value="followup" onclick="intakeToggleFollowUp('${prefix}')" style="margin-bottom:8px;margin-left:6px;">📅 後日ご連絡</button>`;
            const dateBlock = `<div id="${prefix}-followup-date" style="${followUp ? '' : 'display:none;'}margin-bottom:8px;padding:8px 12px;background:#fff5e6;border:1px solid #f6ad55;border-radius:6px;">

                <input type="date" id="${prefix}-followup-date-input" value="${intakeEscapeAttr(followUpDate)}" style="margin-left:6px;">
            </div>`;
            followUpUI = followUpBtn + dateBlock;
        }
    
        const helpText = `<div style="font-size:11px;color:#718096;margin-bottom:6px;">同じ希望枠で複数曜日OKなら複数タップ（例：月と金どっちでも）</div>`;
        // 「いつでもOK」のみ曜日選択をグレーアウト。「後日ご連絡」は曜日入力を許可（仮希望を記入できるように）
        const inactive = anytime;
        return `<div data-iv-anytime="${prefix}" data-anytime="${anytime ? 'true' : 'false'}" data-followup="${followUp ? 'true' : 'false'}">
            ${anyBtn}${followUpUI}${helpText}
            <div class="iv-anytime-rows" style="${inactive ? 'opacity:0.35;pointer-events:none;' : ''}">${rows}</div>
        </div>`;

    function intakeToggleAnytime(prefix) {
        const host = document.querySelector(`[data-iv-anytime="${prefix}"]`);
        if (!host) return;
        const btn = host.querySelector('.iv-btn[data-value="anytime"]');
        const rows = host.querySelector('.iv-anytime-rows');
        const cur = host.dataset.anytime === 'true';
        const next = !cur;
        host.dataset.anytime = next ? 'true' : 'false';
        if (btn) btn.classList.toggle('active', next);
        // 「いつでもOK」のみ曜日グレーアウト。「後日ご連絡」とは共存OK
        rows.style.opacity = next ? 0.35 : 1;
        rows.style.pointerEvents = next ? 'none' : 'auto';
        if (next) {
            // 「いつでもOK」選択時は全曜日クリア
            host.querySelectorAll('[data-iv-day-group]').forEach(g => {
                g.dataset.days = ''; g.dataset.ampm = '';
                g.querySelectorAll('.iv-day-btn, .iv-ampm-btn').forEach(b => b.classList.remove('active'));
            });
        }
    }
    
    function intakeToggleFollowUp(prefix) {
        // 「後日ご連絡」はマーカーのみ。曜日選択はそのまま入力可能（仮希望として記録できる）
        const host = document.querySelector(`[data-iv-anytime="${prefix}"]`);
        if (!host) return;
        const btn = host.querySelector('.iv-btn[data-value="followup"]');
        const dateBlock = document.getElementById(`${prefix}-followup-date`);
        const cur = host.dataset.followup === 'true';
        const next = !cur;
        host.dataset.followup = next ? 'true' : 'false';
        if (btn) btn.classList.toggle('active', next);
        if (dateBlock) dateBlock.style.display = next ? '' : 'none';
    }

        const host = document.querySelector(`[data-iv-anytime="${prefix}"]`);

    // ===== 送迎シミュレーション（時間プルダウン＋AM/PM切替）=====
    function renderTransportSim(idPrefix, json, ampm) {
        let arr = [];
        try { arr = json ? (typeof json === 'string' ? JSON.parse(json) : json) : []; } catch(e) { arr = []; }
        while (arr.length < 6) arr.push({ 順: arr.length + 1, 時間: '' });
        // AM/PMトグル（時間プルダウンの範囲を絞る）
        const toggleId = idPrefix + '-ampm';
        const amBtn = `<button type="button" class="iv-btn small${ampm === 'AM' ? ' active' : ''}" data-value="AM" onclick="intakeToggleTransportAmpm('${idPrefix}','AM')">AM</button>`;
        const pmBtn = `<button type="button" class="iv-btn small${ampm === 'PM' ? ' active' : ''}" data-value="PM" onclick="intakeToggleTransportAmpm('${idPrefix}','PM')">PM</button>`;
        const toggle = `<div class="iv-btn-group" data-iv-group="${toggleId}" data-value="${ampm || ''}" style="margin-bottom:6px;">${amBtn}${pmBtn}</div>`;
        let labels = '', selects = '';
        arr.slice(0, 6).forEach((slot, i) => {
            labels += `<div>${i + 1}番目</div>`;
            selects += `<select id="${idPrefix}-${i}">${intakeTimeOptions(slot.時間 || '', ampm)}</select>`;
        });
        return toggle
             + `<div class="transport-sim-labels">${labels}</div>`
             + `<div class="transport-sim">${selects}</div>`;
    }
    
    // AM/PM切替で時間プルダウンの選択肢を絞る
    function intakeToggleTransportAmpm(idPrefix, ampm) {
        const host = document.querySelector(`[data-iv-group="${idPrefix}-ampm"]`);
        if (!host) return;
        host.querySelectorAll('.iv-btn').forEach(b => b.classList.remove('active'));
        if (host.dataset.value === ampm) {
            host.dataset.value = '';
        } else {
            const t = host.querySelector(`.iv-btn[data-value="${ampm}"]`);
            if (t) t.classList.add('active');
            host.dataset.value = ampm;
        }
        const active = host.dataset.value || null;
        // 各プルダウンを再構築（現在の選択値は保持）
        for (let i = 0; i < 6; i++) {
            const sel = document.getElementById(`${idPrefix}-${i}`);
            if (!sel) continue;
            const prev = sel.value;
            sel.innerHTML = intakeTimeOptions(prev, active);
        }
    }
    
    // 送迎順JSONからAM/PM推定
    function detectAmpmFromTransport(json) {
        let arr = [];
        try { arr = json ? (typeof json === 'string' ? JSON.parse(json) : json) : []; } catch(e) { arr = []; }
        for (const s of arr) {
            if (s && s.時間) {
                const h = parseInt(String(s.時間).split(':')[0], 10);
                if (!isNaN(h)) {
                    if (h < 12) return 'AM';
                    if (h >= 12) return 'PM';
                }
            }
        }
        return null;
    }

                ${intakeCheckItem('m-リハブクラウド登録済', 'リハブ登録', r.リハブクラウド登録済 === true, false)}
                ${intakeCheckItem('m-ケアズ登録済', 'ケアズ登録', r.ケアズ登録済 === true, false)}
                ${intakeCheckItem('m-SNS顔出し可否確認済', 'SNS可否確認', r.SNS顔出し可否確認済 === true, false)}
                ${intakeCheckItem('m-写真撮影済', '写真撮影', r.写真撮影済 === true, false)}
                ${intakeCheckItem('m-同意書類取得済', '同意書取得', r.同意書類取得済 === true, false)}
                ${intakeCheckItem('m-朝礼周知済', '朝礼周知', r.朝礼周知済 === true, false)}
            </div>
            ${(!isNew && r.フェーズ !== 'アーカイブ' && r.フェーズ !== 'ドロップ')
                ? `<div style="margin-top:12px;"><button type="button" class="danger" onclick="kanbanDrop('${r.id}')">📦 ドロップ（見送り・他社決定など）</button></div>`
                : ''}
            </div>
    
            <!-- ステータス -->
            <div class="intake-modal-section"><h4>ステータス</h4>
                ${ivRenderBtnGroup('ステータス', Object.keys(INTAKE_STATUS_LABEL), Object.values(INTAKE_STATUS_LABEL), r.ステータス || 'pending')}
                <div style="font-size:12px;color:#718096;margin-top:8px;">${approvalStatus}</div>
            </div>
    
            <!-- アクション -->
            <div class="intake-modal-actions">
                ${deleteBtn}
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    ${actionBtns}
                </div>
            </div>
        `;
    }
    
    // ===== 保存・承認・削除 =====
    
    function collectTransportSim(idPrefix) {
        const out = [];
        for (let i = 0; i < 6; i++) {
            const el = document.getElementById(idPrefix + '-' + i);
            const v = el ? el.value.trim() : '';
            out.push({ 順: i + 1, 時間: v });
        }
        return JSON.stringify(out);
    }
    
    // モーダルから全値を収集（新規・編集共通）
    function collectIntakeModalPayload() {
        const p = {};
        // テキスト・日付系
        ['問い合わせ日','予定日','見学日','初回対応スタッフ','ケアマネ事業所','ケアマネ氏名',
         'ふりがな','氏名','性別','生年月日','年齢','介護度','住所詳細','TEL','TEL続柄',
         '主訴','yawaragi何番目','利用なし理由詳細',
         '体験お迎え時間','体験前連絡予定日','体験前連絡メモ',
         '前日連絡日時','前日連絡担当','前日連絡メモ','訪問注意事項',
         '本格利用開始日','初回お迎え時間','契約日',
         'ケアマネ報告日時','ケアマネ報告内容','ケアマネ利用可否連絡日','契約順位'].forEach(f => {
            const el = document.getElementById('m-' + f);
            if (el) p[f] = el.value;
        });
        // ボタングループ
        p.種別 = ivGetGroupValue('種別') || 'trial';
        p.予定日AMPM = ivGetGroupValue('予定日AMPM') || '';
        const sex = ivGetGroupValue('性別');
        if (sex) p.性別 = sex;
        p.介護度 = ivGetGroupValue('介護度');
        p.ペースメーカー = ivGetGroupValue('ペースメーカー');
        p.利用有無 = ivGetGroupValue('利用有無') || '未定';
        p.利用なし理由 = ivGetGroupValue('利用なし理由');
        p.ステータス = ivGetGroupValue('ステータス') || 'pending';
        // 有無系（true/false文字列を bool に）
        ['送迎有無','直接連絡可否','他デイ見学'].forEach(f => {
            const v = ivGetGroupValue(f);
            if (v === 'true') p[f] = true;
            else if (v === 'false') p[f] = false;
        });
        // チェックボックス
        ['利用日前日連絡フラグ','ケアマネ連絡済','送迎時間連絡済','週間予定表仮予約済','全記入済',
         'Googleマップ登録済み','初回お迎え時間報告済','ケアマネ報告済','体験前連絡済',
         // カンバン進行・完了チェック（Phase C）
         '見学完了','体験完了',
         '重要事項説明済','契約書取り交わし済',
         '名札_通常済','名札_荷物済','名札_ハンガー済','名札_ドリンク済','名札_靴済',
         'リハブクラウド登録済','ケアズ登録済','SNS顔出し可否確認済',
         '写真撮影済','同意書類取得済','朝礼周知済'].forEach(f => {
            const el = document.getElementById('m-' + f);
            if (el) p[f] = el.checked === true;
        });
        // 体験打診結果（btnGroup）
        p.体験打診結果 = ivGetGroupValue('体験打診結果');
        // 前日連絡相手・表札・ケアマネ可否回答・体験前連絡相手（btnGroup）
        p.前日連絡相手 = ivGetGroupValue('前日連絡相手');
        p.体験前連絡相手 = ivGetGroupValue('体験前連絡相手');
        p.表札有無 = ivGetGroupValue('表札有無');
        p.ケアマネ利用可否回答 = ivGetGroupValue('ケアマネ利用可否回答');
        p.利用意向 = ivGetGroupValue('利用意向');
        p.連絡元区分 = ivGetGroupValue('連絡元区分');
        p.エリア = ivGetGroupValue('エリア');
        // 決定理由（複数選択チェックボックス → カンマ区切り保存）
        const reasonItems = ['立地・送迎範囲が良い','半日型である','リハビリ・運動メニューが魅力','価格・金額','雰囲気・スタッフ対応','ケアマネの推薦','知人・家族の紹介','HP・SNSを見て','体験で本人が気に入った','その他'];
        p.決定理由 = reasonItems.filter(item => {
            const el = document.getElementById('m-決定理由-' + item);
            return el && el.checked;
        }).join(',');
        const reasonDetailEl = document.getElementById('m-決定理由詳細');
        if (reasonDetailEl) p.決定理由詳細 = reasonDetailEl.value;
        // 曜日希望（「いつでもOK」対応）
        p.利用希望曜日 = ivCollectDayWishes('wish-user', 2);
        p['yawarigi希望曜日'] = ivCollectDayWishes('wish-yawaragi', 3);
        // 送迎シミュレーション
        p.お試し送迎順 = collectTransportSim('m-transport-trial');
        p.利用時送迎順 = collectTransportSim('m-transport-active');
        // 住所区分は東松山市固定
        p.住所区分 = '東松山市';
        return p;
    }
    
    // 新規保存（通常 or 中断）
    async function saveIntakeModalNew(suspend) {
        const p = collectIntakeModalPayload();
        if (!p.エリア) p.エリア = '東松山市'; // 受け入れは東松山市のみ（2026-05-31〜）。ガイドではエリアを聞かず固定
        const jump = (n, msg) => { alert(msg); if (typeof gstepOpen === 'function') gstepOpen(n); };
        if (suspend) {
            // 中断保存：途中でもOK。本人特定のため名前か電話のどちらかだけは欲しい
            if (!p.氏名 && !p.ふりがな && !p.TEL) { alert('お名前か電話番号のどちらかだけ入れてから中断保存してください'); if (typeof gstepOpen==='function') gstepOpen(4); return; }
        } else {
            // 本保存：種別に応じた必須チェック（該当ステップを開く）
            if (!p.連絡元区分) { jump(1, '「誰からの連絡？」を選んでください'); return; }
            if (p.連絡元区分 === 'caremane' && (!p.ケアマネ事業所 || !p.ケアマネ氏名)) { jump(2, 'ケアマネの事業所・担当を入力してください'); return; }
            if (!p.種別) { jump(3, '今回はどれか（問い合わせ／見学／体験）を選んでください'); return; }
            if (!p.氏名 && !p.ふりがな) { jump(4, 'お名前（漢字不明ならふりがなだけでOK）を入れてください'); return; }
            if (!p.TEL) { jump(5, '電話番号を入れてください'); return; }
            if (!p.介護度) { jump(6, '介護度を選んでください'); return; }
            if (p.種別 === 'trial' && !p.ペースメーカー) { jump(7, '体験はペースメーカーの有無確認が必須です（運動機器の干渉波 安全確認）'); return; }
        }
        if (p.TEL) p.TEL = formatJPPhone(p.TEL);
    
        p.action = 'intake_create';
        p.登録者 = localStorage.getItem('yawaragi_staff') || '';
        if (!p.初回対応スタッフ) p.初回対応スタッフ = p.登録者;
        p.未完了フラグ = suspend === true;
        if (suspend) {
            p.ステータス = 'pending';
            p.全記入済 = false;
        } else {
            p.全記入済 = true;
        }
    
        const ok = await gasPost(p, suspend ? '新規受付 中断保存' : '新規受付 保存');
        if (ok) {
            if (suspend) {
                alert('✅ 保存しました！残りは後で入力できます。フロアの状況を確認してください。');
            }
            closeIntakeModal();
            setTimeout(loadIntakeList, 800);
        }
    }
    
    // 編集モードの保存
    function intakeOnOtherDayChange() {
        const v = ivGetGroupValue('他デイ見学');
        document.querySelectorAll('.intake-other-day-only').forEach(el => {
            el.style.display = v === 'true' ? '' : 'none';
        });
    }
    
    function intakeOnAnswerChange() {
        const v = ivGetGroupValue('ケアマネ利用可否回答');
        document.querySelectorAll('.intake-no-use-only').forEach(el => {
            el.style.display = v === '利用しない' ? '' : 'none';
        });
        document.querySelectorAll('.intake-on-hold-only').forEach(el => {
            el.style.display = v === '保留' ? '' : 'none';
        });
        document.querySelectorAll('.intake-use-only').forEach(el => {
            el.style.display = v === '利用する' ? '' : 'none';
        });
    }
    
    function intakeOpenMap() {
        const addrEl = document.getElementById('m-住所詳細');
        const addr = addrEl ? (addrEl.value || '').trim() : '';
        if (!addr) { alert('住所を入力してからクリックしてください'); return; }
        const fullAddr = '埼玉県東松山市' + addr;
        const url = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(fullAddr);
        window.open(url, '_blank');
    }
    
    async function syncIntakeToUserListAction(id) {
        if (!id) { alert('保存してから利用者台帳に反映してください'); return; }
        if (!confirm('利用者台帳に転記します。よろしいですか？\n\n転記項目：氏名・ふりがな・介護度・ケアマネ・電話・住所・性別・生年月日・利用曜日・本格利用開始日')) return;
        const ok = await gasPost({ action: 'intake_sync_to_userlist', id: id }, '利用者台帳に反映');
        if (ok) {
            alert('✅ 利用者台帳に反映しました');
            setTimeout(loadIntakeList, 800);
        }
    }
    
    // 体験者を「体験中」ステータスで利用者台帳に仮登録（2026-05-11追加）
    async function intakeAddAsTrialAction(id) {
        if (!id) { alert('まず「💾保存」してから押してください'); return; }
        // モーダル未保存の値があれば先に保存する案内
        const planDate = document.getElementById('m-予定日')?.value || '';
        const pickupTime = document.getElementById('m-体験お迎え時間')?.value || '';
        if (!planDate) {
            alert('⚠️ 予定日（体験日）を入力してから押してください');
            return;
        }
        if (!confirm(
            'この方を利用者台帳に「体験中」ステータスで仮登録します。\n\n' +
            '・出勤＆送迎表・出席予定タブに自動表示されます\n' +
            '・体験日: ' + planDate + '\n' +
            '・お迎え時間: ' + (pickupTime || '未入力') + '\n\n' +
            '不成立時は利用者台帳画面で「中止」ステータスに変更してください。\n\n' +
            'よろしいですか？'
        )) return;
        const ok = await gasPost({ action: 'intake_add_as_trial', id: id }, '出勤＆送迎表に追加');
        if (ok) {
            alert(
                '✅ 出勤＆送迎表に体験者として追加しました。\n\n' +
                '出勤＆送迎表・出席予定タブで「体験中」ステータスの利用者として表示されます。\n\n' +
                '通知メールが yawaragi.notify@gmail.com にも届きます。'
            );
            setTimeout(loadIntakeList, 800);
        }
    }
    
    async function saveIntakeModal(id) {
        const p = collectIntakeModalPayload();
        if (p.TEL) p.TEL = formatJPPhone(p.TEL);
        p.action = 'intake_update';
        p.id = id;
        const ok = await gasPost(p, '見学・体験・新規 保存');
        if (ok) {
            closeIntakeModal();
            setTimeout(loadIntakeList, 800);
        }
    }
    
    async function requestApproval(id) {
        if (!confirm('社長に確認依頼のメールを送ります。よろしいですか？')) return;
        const ok = await gasPost({ action: 'intake_request_approval', id: id }, '社長確認依頼');
        if (ok) {
            alert('📩 社長に提出しました。メール＋yawaragiボードで通知されます。');
            closeIntakeModal();
            setTimeout(loadIntakeList, 800);
        }
    }
    
    async function markOwnerApproved(id) {
        if (!confirm('社長確認済にします。よろしいですか？（社長本人の操作推奨）')) return;
        const ok = await gasPost({ action: 'intake_update', id: id, 社長確認済: true }, '社長確認済');
        if (ok) {
            alert('✅ 社長確認済にしました');
            closeIntakeModal();
            setTimeout(loadIntakeList, 800);
        }
    }
    
    async function deleteIntakeAction(id) {
        if (!confirm('本当に削除しますか？（取り消せません）')) return;
        const ok = await gasPost({ action: 'intake_delete', id: id }, '見学・体験・新規 削除');
        if (ok) {
            closeIntakeModal();
            setTimeout(loadIntakeList, 800);
        }
    }
    

    /* ===== 初期化(単一タブ=intake) ===== */
    window.addEventListener('load', function () {
      try { if (typeof loadCmContactsCache === 'function') loadCmContactsCache(); } catch (e) { console.error(e); }
      try { if (typeof loadIntakeList === 'function') loadIntakeList(); } catch (e) { console.error(e); }
      console.log('[intake.html] 初期化完了');
    });
