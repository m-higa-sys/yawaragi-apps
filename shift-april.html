<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年4月 シフト表 - yawaragi</title>
    <style>
        @page { size: A4 landscape; margin: 5mm; }
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            .boss-only { display: none !important; }
            .print-btn-area { display: none !important; }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Yu Gothic', 'Meiryo', sans-serif;
            font-size: 9pt;
            padding: 4px;
            background: #fff;
        }
        h1 { text-align: center; font-size: 13pt; margin: 2px 0; }
        .subtitle { text-align: center; font-size: 7.5pt; color: #666; margin-bottom: 4px; }

        /* メインテーブル */
        table.shift {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
        }
        table.shift th, table.shift td {
            border: 1px solid #ccc;
            text-align: center;
            padding: 1px;
            font-size: 7.5pt;
            height: 20px;
            overflow: hidden;
            white-space: nowrap;
        }
        /* 名前列 */
        table.shift .name-col {
            width: 80px;
            min-width: 80px;
            text-align: left;
            padding-left: 4px;
            font-weight: bold;
            font-size: 8pt;
            position: sticky;
            left: 0;
            background: #fff;
            z-index: 2;
            border-right: 2px solid #999;
        }
        /* ヘッダー行 */
        table.shift thead th {
            background: #f5f5f5;
            font-weight: bold;
            font-size: 7pt;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        table.shift thead th.name-col {
            z-index: 3;
            background: #f5f5f5;
        }
        /* 日付ヘッダー */
        .day-header { font-size: 8pt; }
        .dow-header { font-size: 6.5pt; color: #666; }

        /* 曜日色 */
        .sat { background: #e8f0ff !important; }
        .sun { background: #ffe8e8 !important; }
        .hol { background: #ffe8e8 !important; }
        .sat-h { color: #0055cc; }
        .sun-h, .hol-h { color: #cc0000; }

        /* セルの種類 */
        .work { background: #d5f0d5; }
        .work-nurse { background: #c0ddf0; }
        .work-nurse16 { background: #80b8e0; font-weight: bold; }
        .work-boss { background: #e0d5f0; }
        .work-driver { background: #dde8d0; }
        .work-counselor { background: #f0e0c0; }
        .rest-kibou { background: #f5d0d0; color: #a00; font-weight: bold; }
        .rest-chosei { background: #f5e0b0; color: #855; }
        .off-day { background: #f0f0f0; color: #bbb; }

        /* 集計列 */
        .summary-col {
            border-left: 2px solid #999;
            font-weight: bold;
            width: 28px;
            font-size: 7.5pt;
        }

        /* フロア行 */
        .floor-row td { font-weight: bold; font-size: 7.5pt; }
        .floor-ok { background: #d5f0d5; }
        .floor-warn { background: #f5e0b0; }
        .floor-bad { background: #f5d0d0; }

        /* 区切り行 */
        .separator td {
            height: 4px;
            padding: 0;
            border-left: none;
            border-right: none;
            background: #999;
        }

        /* 凡例 */
        .legend {
            text-align: center;
            font-size: 7pt;
            margin: 4px 0 2px 0;
        }
        .legend span {
            display: inline-block;
            padding: 1px 6px;
            margin: 0 2px;
            border: 1px solid #aaa;
        }

        /* 人件費（下部） */
        .cost-area {
            margin-top: 6px;
            font-size: 7.5pt;
        }
        table.cost {
            border-collapse: collapse;
            font-size: 7.5pt;
        }
        table.cost th, table.cost td {
            border: 1px solid #ccc;
            padding: 1px 5px;
        }
        table.cost th { background: #f0f0f0; }
        .money { text-align: right; }
        .cost-total td { background: #e8e8e8; font-weight: bold; }

        /* PDF作成ボタン */
        .print-btn-area {
            text-align: center;
            margin: 8px 0;
        }
        .print-btn {
            padding: 10px 30px;
            font-size: 14pt;
            font-weight: bold;
            background: #2196F3;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .print-btn:hover { background: #1976D2; }
        .boss-label {
            display: inline-block;
            background: #ff9800;
            color: #fff;
            font-size: 7pt;
            padding: 1px 6px;
            border-radius: 3px;
            margin-left: 4px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <h1>2026年4月 シフト表</h1>
    <p class="subtitle">リハビリデイサービス yawaragi ｜ 営業日22日</p>

    <div class="legend">
        <span class="work">出勤</span>
        <span class="work-nurse">看護師</span>
        <span class="work-nurse16">★16時</span>
        <span class="work-counselor">相談員</span>
        <span class="work-driver">送迎</span>
        <span class="rest-kibou">休</span>
        <span class="rest-chosei">調</span>
        <span class="off-day">- 非営業</span>
    </div>

    <div class="print-btn-area">
        <button class="print-btn" onclick="window.print()">📄 スタッフ用PDF作成</button>
    </div>

    <div id="app" style="overflow-x: auto;"></div>
    <div class="cost-area boss-only" id="costArea"></div>

    <script>
    // ========== カレンダー ==========
    // 2026年4月: 1(水)〜30(木)
    const DAYS_IN_MONTH = 30;
    const DOW = ['','水','木','金','土','日','月','火','水','木','金','土','日',
                 '月','火','水','木','金','土','日','月','火','水','木','金','土','日',
                 '月','火','水','木'];
    // 営業日（平日+祝日営業）
    const EIGYO = [1,2,3,6,7,8,9,10,13,14,15,16,17,20,21,22,23,24,27,28,29,30];
    const HOLIDAYS = [29]; // 昭和の日
    const SATURDAYS = [4,11,18,25];
    const SUNDAYS = [5,12,19,26];

    function isSat(d) { return SATURDAYS.includes(d); }
    function isSun(d) { return SUNDAYS.includes(d); }
    function isHol(d) { return HOLIDAYS.includes(d); }
    function isEigyo(d) { return EIGYO.includes(d); }

    // ========== スタッフ ==========
    const STAFF = [
        {id:'勝又', name:'勝又裕子', role:'employee'},
        {id:'星野', name:'星野友太', role:'employee'},
        {id:'下浦', name:'下浦理絵', role:'employee'},
        {id:'工藤', name:'工藤経子', role:'counselor'},
        {id:'髙山', name:'髙山奈緒美', role:'nurse'},
        {id:'春山', name:'春山忍', role:'nurse'},
        {id:'比嘉', name:'比嘉学', role:'boss'},
        {id:'大久保', name:'大久保好美', role:'employee'},
        {id:'石井', name:'石井祐子', role:'nurse'},
        {id:'小野', name:'小野重次郎', role:'driver'},
        {id:'林',   name:'林秀明', role:'driver'}
    ];

    const NURSES = ['髙山','春山','石井'];
    const FLOOR_MEMBERS = ['勝又','星野','下浦','工藤','大久保'];

    // 希望休
    const KIBOU = {
        '勝又': [1], '星野': [22],
        '下浦': [2,8,16,28],
        '春山': [7,8,22,24], '髙山': [14,15],
        '石井': [22]
    };
    const CHOSEI = { '下浦': [14,21,24] };

    // シフトデータ（営業日のみ）: 1=出勤, 16=16時, 0=休み
    const SHIFT = {
        1:  {比嘉:1,勝又:0,星野:1,下浦:1,工藤:1,髙山:1,春山:0,小野:1,林:0,大久保:0,石井:0},
        2:  {比嘉:1,勝又:1,星野:1,下浦:0,工藤:1,髙山:0,春山:1,小野:1,林:1,大久保:1,石井:1},
        3:  {比嘉:1,勝又:1,星野:1,下浦:1,工藤:0,髙山:1,春山:0,小野:0,林:1,大久保:0,石井:0},
        6:  {比嘉:1,勝又:1,星野:1,下浦:1,工藤:1,髙山:0,春山:1,小野:1,林:1,大久保:1,石井:0},
        7:  {比嘉:1,勝又:1,星野:1,下浦:1,工藤:1,髙山:1,春山:0,小野:1,林:0,大久保:0,石井:1},
        8:  {比嘉:1,勝又:1,星野:1,下浦:0,工藤:1,髙山:1,春山:0,小野:0,林:1,大久保:0,石井:1},
        9:  {比嘉:1,勝又:1,星野:1,下浦:1,工藤:1,髙山:0,春山:1,小野:1,林:0,大久保:1,石井:1},
        10: {比嘉:1,勝又:1,星野:1,下浦:1,工藤:0,髙山:1,春山:0,小野:1,林:0,大久保:0,石井:0},
        13: {比嘉:1,勝又:1,星野:1,下浦:1,工藤:0,髙山:1,春山:0,小野:1,林:1,大久保:1,石井:1},
        14: {比嘉:1,勝又:1,星野:1,下浦:0,工藤:1,髙山:0,春山:16,小野:1,林:0,大久保:0,石井:1},
        15: {比嘉:1,勝又:1,星野:1,下浦:1,工藤:1,髙山:0,春山:1,小野:1,林:0,大久保:0,石井:1},
        16: {比嘉:1,勝又:1,星野:1,下浦:0,工藤:0,髙山:1,春山:0,小野:1,林:0,大久保:1,石井:0},
        17: {比嘉:1,勝又:1,星野:1,下浦:1,工藤:1,髙山:0,春山:1,小野:0,林:1,大久保:0,石井:0},
        20: {比嘉:1,勝又:1,星野:1,下浦:1,工藤:0,髙山:0,春山:1,小野:0,林:1,大久保:1,石井:1},
        21: {比嘉:1,勝又:1,星野:1,下浦:0,工藤:1,髙山:1,春山:16,小野:1,林:1,大久保:0,石井:0},
        22: {比嘉:1,勝又:1,星野:0,下浦:1,工藤:1,髙山:1,春山:0,小野:1,林:0,大久保:0,石井:0},
        23: {比嘉:1,勝又:1,星野:1,下浦:1,工藤:0,髙山:0,春山:1,小野:1,林:0,大久保:1,石井:0},
        24: {比嘉:1,勝又:1,星野:1,下浦:0,工藤:1,髙山:1,春山:0,小野:1,林:0,大久保:0,石井:1},
        27: {比嘉:1,勝又:1,星野:1,下浦:1,工藤:0,髙山:0,春山:1,小野:1,林:0,大久保:1,石井:0},
        28: {比嘉:1,勝又:1,星野:1,下浦:0,工藤:1,髙山:1,春山:0,小野:1,林:0,大久保:0,石井:1},
        29: {比嘉:1,勝又:1,星野:1,下浦:1,工藤:0,髙山:0,春山:16,小野:1,林:0,大久保:0,石井:1},
        30: {比嘉:1,勝又:1,星野:1,下浦:1,工藤:0,髙山:1,春山:0,小野:1,林:1,大久保:1,石井:1}
    };

    // 給与
    const WAGES = {
        '勝又':   {type:'monthly', amount:250000},
        '星野':   {type:'monthly', amount:220000},
        '下浦':   {type:'hourly', rate:1450, hours:7.0},
        '工藤':   {type:'hourly', rate:1400, hours:7.25},
        '髙山':   {type:'hourly', rate:1730, hours:5.5},
        '春山':   {type:'mixed',  rate:1700, h15:5.5, h16:6.5},
        '石井':   {type:'hourly', rate:1650, hours:5.5},
        '小野':   {type:'hourly', rate:1300, hours:3.0},
        '林':     {type:'hourly', rate:1200, hours:3.0},
        '大久保': {type:'hourly', rate:1400, hours:7.5}
    };

    // ========== フロア計算 ==========
    function calcFloor(day) {
        if (!SHIFT[day]) return {floor:0, after15:0};
        const row = SHIFT[day];
        let floor = 0;
        for (const s of FLOOR_MEMBERS) { if (row[s] >= 1) floor++; }
        for (const s of NURSES) { if (row[s] >= 1) floor++; }
        let leave15 = 0;
        for (const s of NURSES) { if (row[s] === 1) leave15++; }
        return { floor, after15: floor - leave15 };
    }

    // ========== 描画 ==========
    function render() {
        let html = '<table class="shift">';

        // ヘッダー: 日付
        html += '<thead>';
        html += '<tr><th class="name-col" rowspan="2" style="vertical-align:middle">スタッフ</th>';
        for (let d = 1; d <= DAYS_IN_MONTH; d++) {
            let cls = '';
            if (isSat(d)) cls = 'sat sat-h';
            else if (isSun(d)) cls = 'sun sun-h';
            else if (isHol(d)) cls = 'hol hol-h';
            html += '<th class="day-header ' + cls + '">' + d + '</th>';
        }
        html += '<th class="summary-col" rowspan="2">勤務</th>';
        html += '<th class="summary-col" rowspan="2">休</th>';
        html += '</tr>';

        // ヘッダー: 曜日
        html += '<tr>';
        for (let d = 1; d <= DAYS_IN_MONTH; d++) {
            let cls = '';
            if (isSat(d)) cls = 'sat sat-h';
            else if (isSun(d)) cls = 'sun sun-h';
            else if (isHol(d)) cls = 'hol hol-h';
            let dowText = DOW[d];
            if (isHol(d)) dowText += '祝';
            html += '<th class="dow-header ' + cls + '">' + dowText + '</th>';
        }
        html += '</tr>';
        html += '</thead><tbody>';

        // 各スタッフ行
        const totals = {};
        for (const staff of STAFF) {
            const sid = staff.id;
            let workDays = 0, restDays = 0;

            // 小野の前に区切り線
            if (sid === '小野') {
                html += '<tr class="separator"><td colspan="' + (DAYS_IN_MONTH + 3) + '"></td></tr>';
            }
            html += '<tr>';
            html += '<td class="name-col">' + staff.name + '</td>';

            for (let d = 1; d <= DAYS_IN_MONTH; d++) {
                if (!isEigyo(d)) {
                    // 非営業日
                    html += '<td class="off-day">-</td>';
                    continue;
                }

                const row = SHIFT[d];
                const v = row[sid];
                let cls = '', txt = '';

                if (v >= 1) {
                    workDays++;
                    if (v === 16) {
                        cls = 'work-nurse16'; txt = '★';
                    } else if (staff.role === 'boss') {
                        cls = 'work-boss'; txt = '○';
                    } else if (staff.role === 'nurse') {
                        cls = 'work-nurse'; txt = '○';
                    } else if (staff.role === 'driver') {
                        cls = 'work-driver'; txt = '○';
                    } else if (staff.role === 'counselor') {
                        cls = 'work-counselor'; txt = '○';
                    } else {
                        cls = 'work'; txt = '○';
                    }
                } else {
                    // 休み
                    if (KIBOU[sid] && KIBOU[sid].includes(d)) {
                        cls = 'rest-kibou'; txt = '休'; restDays++;
                    } else if (CHOSEI[sid] && CHOSEI[sid].includes(d)) {
                        cls = 'rest-chosei'; txt = '調'; restDays++;
                    } else {
                        cls = ''; txt = '';
                    }
                }
                html += '<td class="' + cls + '">' + txt + '</td>';
            }

            html += '<td class="summary-col">' + workDays + '</td>';
            html += '<td class="summary-col">' + restDays + '</td>';
            html += '</tr>';
            totals[sid] = {work: workDays, rest: restDays};
        }

        // 区切り線
        html += '<tr class="separator boss-only"><td colspan="' + (DAYS_IN_MONTH + 3) + '"></td></tr>';

        // フロア行（日中）
        html += '<tr class="floor-row boss-only"><td class="name-col" style="font-size:7pt">フロア(日中)</td>';
        for (let d = 1; d <= DAYS_IN_MONTH; d++) {
            if (!isEigyo(d)) { html += '<td class="off-day">-</td>'; continue; }
            const {floor} = calcFloor(d);
            html += '<td class="floor-ok">' + floor + '</td>';
        }
        html += '<td class="summary-col" colspan="2"></td></tr>';

        // フロア行（15時以降）
        html += '<tr class="floor-row boss-only"><td class="name-col" style="font-size:7pt">15時以降</td>';
        for (let d = 1; d <= DAYS_IN_MONTH; d++) {
            if (!isEigyo(d)) { html += '<td class="off-day">-</td>'; continue; }
            const {after15} = calcFloor(d);
            let cls = after15 >= 4 ? 'floor-ok' : after15 === 3 ? 'floor-warn' : 'floor-bad';
            html += '<td class="' + cls + '">' + after15 + (after15 <= 2 ? '⚠':'') + '</td>';
        }
        html += '<td class="summary-col" colspan="2"></td></tr>';

        // ========== 加算チェック ==========
        html += '<tr class="separator boss-only"><td colspan="' + (DAYS_IN_MONTH + 3) + '"></td></tr>';

        // 相談員チェック（下浦→工藤→勝又→星野の優先順）
        html += '<tr class="floor-row boss-only"><td class="name-col" style="font-size:6.5pt">相談員</td>';
        for (let d = 1; d <= DAYS_IN_MONTH; d++) {
            if (!isEigyo(d)) { html += '<td class="off-day">-</td>'; continue; }
            const row = SHIFT[d];
            let who = '';
            if (row['下浦'] >= 1) who = '下';
            else if (row['工藤'] >= 1) who = '工';
            else if (row['勝又'] >= 1) who = '勝';
            else if (row['星野'] >= 1) who = '星';
            const cls = who ? 'floor-ok' : 'floor-bad';
            html += '<td class="' + cls + '" style="font-size:6pt">' + (who || '✕') + '</td>';
        }
        html += '<td class="summary-col" colspan="2" style="font-size:5.5pt">✓1+</td></tr>';

        // 看護職員チェック
        html += '<tr class="floor-row boss-only"><td class="name-col" style="font-size:6.5pt">看護師</td>';
        for (let d = 1; d <= DAYS_IN_MONTH; d++) {
            if (!isEigyo(d)) { html += '<td class="off-day">-</td>'; continue; }
            const row = SHIFT[d];
            let cnt = 0;
            for (const n of NURSES) { if (row[n] >= 1) cnt++; }
            const cls = cnt >= 1 ? 'floor-ok' : 'floor-bad';
            html += '<td class="' + cls + '">' + cnt + '</td>';
        }
        html += '<td class="summary-col" colspan="2" style="font-size:5.5pt">✓1+</td></tr>';

        // 介護職員(PM)チェック - 工藤を除く（生活相談員のため）
        html += '<tr class="floor-row boss-only"><td class="name-col" style="font-size:6.5pt">介護(PM)</td>';
        for (let d = 1; d <= DAYS_IN_MONTH; d++) {
            if (!isEigyo(d)) { html += '<td class="off-day">-</td>'; continue; }
            const row = SHIFT[d];
            let cnt = 0;
            for (const s of ['勝又','星野','下浦','大久保']) { if (row[s] >= 1) cnt++; }
            const cls = cnt >= 2 ? 'floor-ok' : cnt >= 2 ? 'floor-warn' : (cnt < 2 ? 'floor-bad' : 'floor-ok');
            html += '<td class="' + cls + '">' + cnt + '</td>';
        }
        html += '<td class="summary-col" colspan="2" style="font-size:5.5pt">✓2+</td></tr>';

        // 機能訓練指導員（比嘉+看護師）
        html += '<tr class="floor-row boss-only"><td class="name-col" style="font-size:6.5pt">機能訓練</td>';
        for (let d = 1; d <= DAYS_IN_MONTH; d++) {
            if (!isEigyo(d)) { html += '<td class="off-day">-</td>'; continue; }
            const row = SHIFT[d];
            let cnt = row['比嘉'] >= 1 ? 1 : 0;
            for (const n of NURSES) { if (row[n] >= 1) cnt++; }
            const cls = cnt >= 2 ? 'floor-ok' : 'floor-bad';
            html += '<td class="' + cls + '">' + cnt + '</td>';
        }
        html += '<td class="summary-col" colspan="2" style="font-size:5.5pt">✓2+</td></tr>';

        html += '</tbody></table>';
        document.getElementById('app').innerHTML = html;

        renderCost(totals);
    }

    function renderCost(totals) {
        let h16 = 0;
        for (const d of EIGYO) { if (SHIFT[d]['春山'] === 16) h16++; }

        let html = '<table class="cost"><tr>';
        const names = Object.keys(WAGES);
        let grand = 0;

        html += '<th>スタッフ</th>';
        for (const s of names) html += '<th>' + s + '</th>';
        html += '<th>合計</th></tr><tr><td>月額</td>';

        for (const s of names) {
            const w = WAGES[s];
            let m = 0;
            if (w.type === 'monthly') m = w.amount;
            else if (w.type === 'mixed') {
                const h15 = totals[s].work - h16;
                m = w.rate * w.h15 * h15 + w.rate * w.h16 * h16;
            } else {
                m = w.rate * w.hours * totals[s].work;
            }
            grand += m;
            html += '<td class="money">' + m.toLocaleString() + '</td>';
        }
        html += '<td class="money" style="font-weight:bold">' + grand.toLocaleString() + '円</td>';
        html += '</tr></table>';

        // ========== サービス提供体制強化加算 ==========
        // 介護職員の常勤換算（工藤は相談員→含めない）
        const JOKIN_H = 176; // 常勤基準時間（22日×8h）
        const kaigoStaff = [
            {name:'勝又', kaifuku:true, hours: totals['勝又'].work * 8},
            {name:'星野', kaifuku:true, hours: totals['星野'].work * 8},
            {name:'下浦', kaifuku:true, hours: totals['下浦'].work * 7},
            {name:'大久保', kaifuku:true, hours: totals['大久保'].work * 7.5},
            {name:'小野', kaifuku:false, hours: totals['小野'].work * 3},
            {name:'林', kaifuku:false, hours: totals['林'].work * 3}
        ];
        let totalJokin = 0, fukushiJokin = 0;
        for (const s of kaigoStaff) {
            const j = Math.round((s.hours / JOKIN_H) * 1000) / 1000;
            totalJokin += j;
            if (s.kaifuku) fukushiJokin += j;
        }
        const ratio = Math.round((fukushiJokin / totalJokin) * 1000) / 10;

        html += '<div style="margin-top:6px">';
        html += '<table class="cost">';
        html += '<tr><th colspan="4" style="text-align:left;background:#e0e8f0">サービス提供体制強化加算（介護福祉士割合）※工藤は生活相談員→分母に含めない</th></tr>';
        html += '<tr><th>区分</th><th>常勤換算</th><th>達成率</th><th>判定</th></tr>';
        html += '<tr><td>介護福祉士（勝又・星野・下浦・大久保）</td>';
        html += '<td class="money">' + fukushiJokin.toFixed(2) + '</td>';
        html += '<td rowspan="2" class="money" style="font-size:12pt;font-weight:bold;vertical-align:middle;color:' + (ratio >= 70 ? '#080' : '#c00') + '">' + ratio + '%</td>';
        html += '<td rowspan="2" style="font-size:10pt;vertical-align:middle">' + (ratio >= 70 ? '✅ (I)達成' : ratio >= 50 ? '⚠ (II)のみ' : '❌ 未達') + '</td>';
        html += '</tr>';
        html += '<tr><td>介護職員 合計（＋小野・林）</td>';
        html += '<td class="money">' + totalJokin.toFixed(2) + '</td></tr>';
        html += '</table></div>';

        document.getElementById('costArea').innerHTML = html;
    }

    render();

    // ========== localStorage保存（他アプリ連携用） ==========
    const shiftStorage = {
        year: 2026,
        month: 4,
        daysInMonth: DAYS_IN_MONTH,
        eigyo: EIGYO,
        staff: STAFF,
        nurses: NURSES,
        floorMembers: FLOOR_MEMBERS,
        shift: SHIFT
    };
    localStorage.setItem('yawaragi_shift', JSON.stringify(shiftStorage));
    </script>
</body>
</html>
