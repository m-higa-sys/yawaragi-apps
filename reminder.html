<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リマインダー - yawaragi</title>
<!-- shared.js は本体scriptより前（head先頭）で読む契約 -->
<script src="shared.js"></script>
<style>
  :root{
    --bg:#f4f6f8; --card:#fff; --ink:#26323a; --sub:#6b7a85;
    --line:#e3e8ec; --accent:#3a8ab5; --accent-d:#2c6e92;
    --red:#d9534f; --green:#5c9a6f; --amber:#e0a32e;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;
       background:var(--bg);color:var(--ink);font-size:16px;-webkit-text-size-adjust:100%;}
  header{background:var(--accent);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:10;}
  header h1{margin:0;font-size:20px;display:flex;align-items:center;gap:8px;}
  .userbar{display:flex;align-items:center;gap:10px;margin-top:6px;font-size:13px;}
  .userbar .who{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:14px;}
  .userbar button{background:#fff;color:var(--accent-d);border:0;border-radius:14px;
       padding:3px 10px;font-size:12px;font-weight:bold;}
  .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--line);
       position:sticky;top:0;z-index:9;}
  .tabs button{flex:1;border:0;background:none;padding:14px 4px;font-size:15px;
       color:var(--sub);border-bottom:3px solid transparent;font-weight:bold;}
  .tabs button.active{color:var(--accent-d);border-bottom-color:var(--accent);}
  main{padding:14px;max-width:680px;margin:0 auto;}
  .panel{display:none;} .panel.active{display:block;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;
       padding:12px 14px;margin-bottom:10px;}
  .row{display:flex;align-items:center;gap:8px;}
  .row .name{flex:1;font-size:16px;}
  .muted{color:var(--sub);font-size:13px;}
  .sec-title{font-size:13px;color:var(--sub);font-weight:bold;margin:18px 4px 8px;}
  input[type=text],input[type=number],select{
       padding:10px;border:1px solid var(--line);border-radius:8px;font-size:16px;width:100%;}
  .addrow{display:flex;gap:8px;margin-bottom:8px;}
  .addrow input{flex:1;}
  .btn{background:var(--accent);color:#fff;border:0;border-radius:8px;
       padding:10px 16px;font-size:15px;font-weight:bold;white-space:nowrap;}
  .btn.green{background:var(--green);} .btn.gray{background:#9aa7af;}
  .btn.sm{padding:7px 12px;font-size:13px;}
  .iconbtn{background:none;border:0;font-size:18px;padding:4px 6px;flex:0 0 auto;cursor:pointer;}
  .chk{width:26px;height:26px;border-radius:6px;border:2px solid var(--accent);
       background:#fff;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;}
  .status{font-size:12px;font-weight:bold;padding:2px 8px;border-radius:10px;flex:0 0 auto;}
  .status.due{background:#fdecea;color:var(--red);}
  .status.done{background:#eaf5ee;color:var(--green);}
  .done-line{font-size:12px;color:var(--sub);margin-top:2px;}
  .hist{font-size:13px;color:var(--sub);padding:6px 2px;border-bottom:1px dashed var(--line);}
  .empty{color:var(--sub);text-align:center;padding:24px 0;}
  .banner{background:#fff7e6;border:1px solid var(--amber);color:#8a6d1d;
       border-radius:8px;padding:10px;font-size:13px;margin-bottom:12px;}
  .ph{background:#eef3f6;border:1px dashed var(--accent);border-radius:8px;
       padding:14px;color:var(--accent-d);font-size:14px;text-align:center;}
  .cycle-fields{margin:8px 0;}
  .wd-grid{display:flex;gap:6px;flex-wrap:wrap;}
  .wd-grid label{border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:14px;}
  /* ゴミ箱 */
  .trash-toggle{width:100%;background:#eef1f3;border:1px solid var(--line);border-radius:8px;
       padding:10px;font-size:14px;color:var(--sub);font-weight:bold;margin-top:20px;}
  .trash-item{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px dashed var(--line);font-size:14px;}
  .trash-item .name{flex:1;}
  .tabbadge{font-size:11px;background:#e3e8ec;color:var(--sub);border-radius:8px;padding:2px 7px;}
  /* モーダル */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
       z-index:50;align-items:center;justify-content:center;padding:20px;}
  .modal-overlay.show{display:flex;}
  .modal{background:#fff;border-radius:12px;padding:18px;max-width:420px;width:100%;
       max-height:84vh;overflow:auto;}
  .modal h2{margin:0 0 12px;font-size:18px;}
  .modal label.fld{display:block;font-size:13px;color:var(--sub);margin:10px 0 4px;font-weight:bold;}
  .staff-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .staff-grid button{padding:14px 8px;border:1px solid var(--line);background:#f7f9fa;
       border-radius:8px;font-size:16px;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .modal-actions .btn{flex:1;}
  /* トースト */
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
       background:#26323a;color:#fff;padding:10px 18px;border-radius:20px;font-size:14px;
       opacity:0;transition:opacity .2s;z-index:100;pointer-events:none;}
  #toast.show{opacity:.95;}
</style>
</head>
<body>

<header>
  <h1>🔔 リマインダー</h1>
  <div class="userbar">
    <span class="who" id="whoName">スタッフ未選択</span>
    <button onclick="openStaffModal()">変更</button>
    <button onclick="reloadAll()" style="margin-left:auto;">↻ 更新</button>
  </div>
</header>

<div class="tabs">
  <button id="tab-buy" class="active" onclick="switchTab('buy')">🛒 買い出し</button>
  <button id="tab-clean" onclick="switchTab('clean')">🧹 長期掃除</button>
  <button id="tab-link" onclick="switchTab('link')">🚗 連携</button>
</div>

<main>
  <div id="gasBanner" class="banner" style="display:none;">
    ⚠️ リマインダーのバックエンド(GAS)が未設定です。社長のデプロイ後にURLを設定すると保存が有効になります。
  </div>

  <!-- 買い出し -->
  <section id="panel-buy" class="panel active">
    <div class="addrow">
      <input type="text" id="buyInput" placeholder="買うもの（例：トイレットペーパー）">
      <button class="btn" onclick="addBuy()">追加</button>
    </div>
    <div id="buyList"></div>
    <div class="sec-title">🧾 購入済み履歴</div>
    <div id="buyHist"></div>
  </section>

  <!-- 長期掃除 -->
  <section id="panel-clean" class="panel">
    <div class="card">
      <div class="sec-title" style="margin-top:0;">＋ 掃除項目を登録</div>
      <input type="text" id="cleanName" placeholder="項目名（例：冷蔵庫の掃除）" style="margin-bottom:8px;">
      <select id="addPreset" onchange="onFreqPresetChange('add')" style="margin-bottom:8px;">
        <option value="weekly">毎週</option>
        <option value="biweekly">隔週</option>
        <option value="monthly" selected>毎月</option>
        <option value="quarter">3ヶ月ごと</option>
        <option value="weekday">曜日指定</option>
        <option value="customdays">日数を入力</option>
      </select>
      <div id="addDaysWrap" class="cycle-fields" style="display:none;">
        <div class="muted" style="margin-bottom:4px;">何日ごと？</div>
        <input type="number" id="addDays" value="30" min="1">
      </div>
      <div id="addWdWrap" class="cycle-fields" style="display:none;">
        <div class="muted" style="margin-bottom:4px;">曜日を選ぶ（複数可）</div>
        <div class="wd-grid" id="addWd"></div>
      </div>
      <button class="btn" style="margin-top:8px;width:100%;" onclick="addClean()">登録する</button>
    </div>
    <div id="cleanList"></div>
  </section>

  <!-- 連携（走行距離） -->
  <section id="panel-link" class="panel">
    <div class="ph">
      🚗 <b>車両メンテナンス管理アプリ連携</b><br>
      Phase3で走行距離の入力を検知して自動完了する予定です。<br>
      それまでは下の項目を手動でチェックできます。
    </div>
    <div class="addrow" style="margin-top:12px;">
      <input type="text" id="linkInput" placeholder="連携タスク名（例：走行距離の記録）">
      <button class="btn" onclick="addLink()">追加</button>
    </div>
    <div id="linkList"></div>
  </section>

  <!-- ゴミ箱（全タブ共通） -->
  <button class="trash-toggle" id="trashToggle" onclick="toggleTrash()">🗑 ゴミ箱（0）</button>
  <div class="card" id="trashPanel" style="display:none;">
    <div id="trashList"></div>
  </div>
</main>

<!-- スタッフ選択モーダル -->
<div class="modal-overlay" id="staffModal">
  <div class="modal">
    <h2>誰が操作する？</h2>
    <div class="muted" style="margin-bottom:10px;">選ぶと完了記録の「氏名」になります。</div>
    <div class="staff-grid" id="staffGrid"><div class="empty">読み込み中…</div></div>
  </div>
</div>

<!-- 編集モーダル -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h2>項目を編集</h2>
    <label class="fld">名前</label>
    <input type="text" id="editName">
    <label class="fld">タブ（移動できます）</label>
    <select id="editTab" onchange="onEditTabChange()">
      <option value="buy">🛒 買い出し</option>
      <option value="clean">🧹 長期掃除</option>
      <option value="link">🚗 連携</option>
    </select>
    <div id="editFreqWrap">
      <label class="fld">頻度（長期掃除）</label>
      <select id="editPreset" onchange="onFreqPresetChange('edit')">
        <option value="weekly">毎週</option>
        <option value="biweekly">隔週</option>
        <option value="monthly">毎月</option>
        <option value="quarter">3ヶ月ごと</option>
        <option value="weekday">曜日指定</option>
        <option value="customdays">日数を入力</option>
      </select>
      <div id="editDaysWrap" class="cycle-fields" style="display:none;">
        <div class="muted" style="margin-bottom:4px;">何日ごと？</div>
        <input type="number" id="editDays" value="30" min="1">
      </div>
      <div id="editWdWrap" class="cycle-fields" style="display:none;">
        <div class="muted" style="margin-bottom:4px;">曜日を選ぶ（複数可）</div>
        <div class="wd-grid" id="editWd"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn gray" onclick="closeModal('editModal')">やめる</button>
      <button class="btn" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ===== 定数 ===== */
// リマインダー専用GAS（m-higa名義・deployment @1）。localStorage で上書き可。
var REMINDER_GAS_URL = localStorage.getItem('reminder_gas_url') ||
  'https://script.google.com/macros/s/AKfycbwzq4-5qiFKDMA3UuQjK5azjfbtowP022Z4LggW3rCXonlqnZT1yDYpZ7XBC0Z23PPr/exec';
// スタッフ一覧の単一の真実（既存 gyomu GAS）。読み取りのみ流用。
var GYOMU_GAS_URL = 'https://script.google.com/macros/s/AKfycbzejQJ-JNok50wACj5XRSR13-ODvaocl9GhaHX245EFC7nPeL5jtNSyyqf21mi7DAyi/exec';
var DOW = ['日','月','火','水','木','金','土'];
var WD_ORDER = ['月','火','水','木','金','土','日'];

var STATE = {
  currentUser: localStorage.getItem('gyomu_current_user') || '',
  staff: JSON.parse(localStorage.getItem('gyomu_staff_cache') || '[]'),
  tasks: JSON.parse(localStorage.getItem('reminder_tasks_cache') || '[]'),
  logs: JSON.parse(localStorage.getItem('reminder_logs_cache') || '[]'),
  tab: 'buy',
  editingId: null
};

/* ===== 純ロジック（reminder-core.js と同等・node TDD 済） ===== */
function ymdToUTC(ymd){var p=String(ymd).slice(0,10).split('-');return Date.UTC(+p[0],+p[1]-1,+p[2]);}
function utcToYmd(ms){var d=new Date(ms);return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0');}
function daysSince(a,b){return Math.floor((ymdToUTC(b)-ymdToUTC(a))/86400000);}
function latestWeekdayOnOrBefore(today,csv){
  var t=String(csv).split(',').map(function(s){return s.trim();}).filter(Boolean);
  var base=ymdToUTC(today);
  for(var i=0;i<7;i++){var ms=base-i*86400000;if(t.indexOf(DOW[new Date(ms).getUTCDay()])>=0)return utcToYmd(ms);}
  return today;
}
function lastDoneForTask(logs,taskId){
  var ds=(logs||[]).filter(function(l){return l.taskId===taskId;})
    .map(function(l){return String(l.completedAt||'').slice(0,10);}).filter(Boolean);
  if(!ds.length)return null; ds.sort(); return ds[ds.length-1];
}
function isDue(task,lastDone,today){
  if(!task)return false;
  if(task.cycleType==='days'){if(!lastDone)return true;return daysSince(lastDone,today)>=parseInt(task.cycleValue,10);}
  if(task.cycleType==='weekday'){var a=latestWeekdayOnOrBefore(today,task.cycleValue);if(!lastDone)return true;return lastDone<a;}
  return false;
}
function cycleLabel(ct,cv){
  if(ct==='weekday')return '毎週 '+String(cv);
  if(ct==='days'){var n=parseInt(cv,10);
    if(n===7)return'毎週';if(n===14)return'隔週';if(n===30)return'毎月';if(n===90)return'3ヶ月ごと';return n+'日ごと';}
  return '手動';
}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

/* ===== 頻度プルダウン（add/edit 共通） ===== */
var PRESET_DAYS = { weekly:7, biweekly:14, monthly:30, quarter:90 };
function onFreqPresetChange(prefix){
  var p=document.getElementById(prefix+'Preset').value;
  document.getElementById(prefix+'DaysWrap').style.display = (p==='customdays')?'block':'none';
  document.getElementById(prefix+'WdWrap').style.display   = (p==='weekday')?'block':'none';
}
// プルダウンの選択を {cycleType,cycleValue} に変換。無効なら null。
function readFreq(prefix){
  var p=document.getElementById(prefix+'Preset').value;
  if(PRESET_DAYS[p]) return {cycleType:'days', cycleValue:PRESET_DAYS[p]};
  if(p==='customdays'){
    var n=parseInt(document.getElementById(prefix+'Days').value,10);
    if(!n||n<1){showToast('日数を入れてください');return null;}
    return {cycleType:'days', cycleValue:n};
  }
  if(p==='weekday'){
    var sel=[];document.querySelectorAll('#'+prefix+'Wd input:checked').forEach(function(c){sel.push(c.value);});
    if(!sel.length){showToast('曜日を選んでください');return null;}
    // 曜日順に並べ替え（月→日）
    sel.sort(function(a,b){return WD_ORDER.indexOf(a)-WD_ORDER.indexOf(b);});
    return {cycleType:'weekday', cycleValue:sel.join(',')};
  }
  return {cycleType:'days', cycleValue:30};
}
// 既存の周期 → プルダウン状態へ反映（編集時）
function setFreq(prefix, ct, cv){
  var preset='customdays';
  if(ct==='weekday') preset='weekday';
  else if(ct==='days'){var n=parseInt(cv,10);
    if(n===7)preset='weekly';else if(n===14)preset='biweekly';else if(n===30)preset='monthly';
    else if(n===90)preset='quarter';else preset='customdays';}
  document.getElementById(prefix+'Preset').value=preset;
  onFreqPresetChange(prefix);
  if(preset==='customdays') document.getElementById(prefix+'Days').value=(parseInt(cv,10)||30);
  if(preset==='weekday'){
    var set=String(cv).split(',').map(function(s){return s.trim();});
    document.querySelectorAll('#'+prefix+'Wd input').forEach(function(c){c.checked=set.indexOf(c.value)>=0;});
  }
}
// 曜日チェックボックス生成
function buildWd(gridId){
  var g=document.getElementById(gridId);
  WD_ORDER.forEach(function(d){
    var l=document.createElement('label');
    l.innerHTML='<input type="checkbox" value="'+d+'"> '+d;
    g.appendChild(l);
  });
}

/* ===== GAS通信 ===== */
function jsonpGet(baseUrl, params){
  return new Promise(function(resolve,reject){
    if(!baseUrl){reject(new Error('URL未設定'));return;}
    var cb='_rmdCb_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    var sc=document.createElement('script');
    var to=setTimeout(function(){delete window[cb];if(sc.parentNode)sc.remove();reject(new Error('タイムアウト'));},15000);
    window[cb]=function(d){clearTimeout(to);delete window[cb];if(sc.parentNode)sc.remove();resolve(d);};
    params=params||{}; params.callback=cb;
    sc.src=baseUrl+'?'+new URLSearchParams(params).toString()+'&t='+Date.now();
    sc.onerror=function(){clearTimeout(to);delete window[cb];if(sc.parentNode)sc.remove();reject(new Error('通信エラー'));};
    document.head.appendChild(sc);
  });
}
function rmdPost(data){
  if(!REMINDER_GAS_URL){showToast('⚠️ GAS未設定のため保存できません');return Promise.resolve(false);}
  return fetch(REMINDER_GAS_URL,{method:'POST',mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)})
    .then(function(){return true;}).catch(function(){showToast('⚠️ 送信失敗');return false;});
}

/* ===== スタッフ ===== */
function loadStaff(){
  return jsonpGet(GYOMU_GAS_URL,{action:'getAllData'}).then(function(res){
    if(res&&res.staff&&res.staff.length){
      STATE.staff=res.staff;
      localStorage.setItem('gyomu_staff_cache',JSON.stringify(res.staff));
    }
  }).catch(function(){});
}
function openStaffModal(){
  var g=document.getElementById('staffGrid');
  var list=STATE.staff&&STATE.staff.length?STATE.staff:['（スタッフ読込中）'];
  g.innerHTML='';
  list.forEach(function(name){
    var b=document.createElement('button');b.textContent=name;
    b.onclick=function(){selectStaff(name);};
    g.appendChild(b);
  });
  openModal('staffModal');
}
function selectStaff(name){
  STATE.currentUser=name;
  localStorage.setItem('gyomu_current_user',name);
  document.getElementById('whoName').textContent=name;
  closeModal('staffModal');
}
function ensureUser(){
  if(!STATE.currentUser){openStaffModal();showToast('先にスタッフを選んでください');return false;}
  return true;
}

/* ===== データ取得・描画 ===== */
function reloadAll(){
  if(!REMINDER_GAS_URL){renderAll();return Promise.resolve();}
  return jsonpGet(REMINDER_GAS_URL,{action:'getAll'}).then(function(res){
    if(res&&res.success){
      STATE.tasks=res.tasks||[]; STATE.logs=res.logs||[];
      localStorage.setItem('reminder_tasks_cache',JSON.stringify(STATE.tasks));
      localStorage.setItem('reminder_logs_cache',JSON.stringify(STATE.logs));
    }
    renderAll();
  }).catch(function(){renderAll();});
}
function renderAll(){renderBuy();renderClean();renderLink();renderTrash();}

// 表示対象: 該当タブ・active・未削除
function activeTasks(tab){return STATE.tasks.filter(function(t){return t.tab===tab&&t.active&&!t.deleted;});}

// 操作ボタン（編集・削除）をカードに付与
function appendOps(rowEl, t){
  var e=document.createElement('button');e.className='iconbtn';e.textContent='✏️';e.title='編集';
  e.onclick=function(){openEdit(t.taskId);};
  var d=document.createElement('button');d.className='iconbtn';d.textContent='🗑';d.title='削除';
  d.onclick=function(){deleteTask(t.taskId,t.name);};
  rowEl.appendChild(e);rowEl.appendChild(d);
}

function renderBuy(){
  var list=document.getElementById('buyList');
  var items=activeTasks('buy');
  list.innerHTML=items.length?'':'<div class="empty">買うものはありません</div>';
  items.forEach(function(t){
    var c=document.createElement('div');c.className='card';
    c.innerHTML='<div class="row"><span class="name">'+esc(t.name)+'</span></div>';
    var r=c.querySelector('.row');
    var btn=document.createElement('button');btn.className='btn green sm';btn.textContent='買った';
    btn.onclick=function(){doCheck(t.taskId,'「'+t.name+'」を購入');};
    r.appendChild(btn); appendOps(r,t);
    list.appendChild(c);
  });
  var hist=document.getElementById('buyHist');
  var buyNames={}; STATE.tasks.forEach(function(t){if(t.tab==='buy')buyNames[t.taskId]=t.name;});
  var rows=STATE.logs.filter(function(l){return buyNames[l.taskId];})
    .sort(function(a,b){return b.completedAt<a.completedAt?-1:1;});
  hist.innerHTML=rows.length?'':'<div class="empty">履歴はまだありません</div>';
  rows.forEach(function(l){
    var d=document.createElement('div');d.className='hist';
    d.textContent='✔ '+(buyNames[l.taskId]||'(削除済)')+' ／ '+(l.staffName||'?')+' ／ '+fmtDt(l.completedAt);
    hist.appendChild(d);
  });
}

function renderCleanLike(tab,listId){
  var list=document.getElementById(listId);
  var items=activeTasks(tab);
  var withState=items.map(function(t){
    var ld=lastDoneForTask(STATE.logs,t.taskId);
    return {t:t,ld:ld,due:(tab==='link'?true:isDue(t,ld,todayStr()))};
  });
  withState.sort(function(a,b){return (a.due===b.due)?0:(a.due?-1:1);});
  list.innerHTML=withState.length?'':'<div class="empty">項目はありません</div>';
  withState.forEach(function(o){
    var t=o.t;
    var c=document.createElement('div');c.className='card';
    var clabel=(tab==='link'&&t.cycleType==='none')?'手動':cycleLabel(t.cycleType,t.cycleValue);
    var statusHtml=o.due?'<span class="status due">未</span>':'<span class="status done">済</span>';
    var doneLine='';
    if(!o.due&&o.ld){var lg=lastLog(t.taskId);
      doneLine='<div class="done-line">済 '+o.ld+(lg?(' '+lg.staffName):'')+'</div>';}
    c.innerHTML='<div class="row">'+statusHtml+
      '<span class="name">'+esc(t.name)+'<div class="muted">'+clabel+'</div>'+doneLine+'</span></div>';
    var r=c.querySelector('.row');
    var btn=document.createElement('button');btn.className='btn sm '+(o.due?'green':'gray');
    btn.textContent=o.due?'やった':'再記録';
    btn.onclick=function(){doCheck(t.taskId,'「'+t.name+'」完了');};
    r.appendChild(btn); appendOps(r,t);
    list.appendChild(c);
  });
}
function renderClean(){renderCleanLike('clean','cleanList');}
function renderLink(){renderCleanLike('link','linkList');}

function renderTrash(){
  var trashed=STATE.tasks.filter(function(t){return t.deleted;});
  document.getElementById('trashToggle').textContent='🗑 ゴミ箱（'+trashed.length+'）';
  var list=document.getElementById('trashList');
  list.innerHTML=trashed.length?'':'<div class="empty">ゴミ箱は空です</div>';
  var tabName={buy:'買い出し',clean:'長期掃除',link:'連携'};
  trashed.forEach(function(t){
    var d=document.createElement('div');d.className='trash-item';
    d.innerHTML='<span class="tabbadge">'+(tabName[t.tab]||t.tab)+'</span><span class="name">'+esc(t.name)+'</span>';
    var b=document.createElement('button');b.className='btn sm';b.textContent='戻す';
    b.onclick=function(){restoreTask(t.taskId,t.name);};
    d.appendChild(b); list.appendChild(d);
  });
}
function toggleTrash(){
  var p=document.getElementById('trashPanel');
  p.style.display=(p.style.display==='none')?'block':'none';
}

function lastLog(taskId){
  var rows=STATE.logs.filter(function(l){return l.taskId===taskId;})
    .sort(function(a,b){return a.completedAt<b.completedAt?1:-1;});
  return rows[0]||null;
}

/* ===== 操作（追加・チェック） ===== */
function addBuy(){
  var v=document.getElementById('buyInput').value.trim();if(!v)return;
  rmdPost({action:'addTask',tab:'buy',name:v,cycleType:'none',cycleValue:''}).then(function(){
    document.getElementById('buyInput').value='';showToast('追加しました');setTimeout(reloadAll,800);});
}
function addLink(){
  var v=document.getElementById('linkInput').value.trim();if(!v)return;
  rmdPost({action:'addTask',tab:'link',name:v,cycleType:'none',cycleValue:''}).then(function(){
    document.getElementById('linkInput').value='';showToast('追加しました');setTimeout(reloadAll,800);});
}
function addClean(){
  var name=document.getElementById('cleanName').value.trim();
  if(!name){showToast('項目名を入れてください');return;}
  var f=readFreq('add'); if(!f)return;
  rmdPost({action:'addTask',tab:'clean',name:name,cycleType:f.cycleType,cycleValue:f.cycleValue}).then(function(){
    document.getElementById('cleanName').value='';showToast('登録しました');setTimeout(reloadAll,800);});
}
function doCheck(taskId,msg){
  if(!ensureUser())return;
  rmdPost({action:'check',taskId:taskId,staff:STATE.currentUser}).then(function(){
    showToast('✔ '+msg+'（'+STATE.currentUser+'）');setTimeout(reloadAll,800);});
}

/* ===== 操作（削除・復元・編集） ===== */
function deleteTask(taskId,name){
  rmdPost({action:'deleteTask',taskId:taskId}).then(function(){
    showToast('🗑 「'+name+'」をゴミ箱へ');setTimeout(reloadAll,800);});
}
function restoreTask(taskId,name){
  rmdPost({action:'restoreTask',taskId:taskId}).then(function(){
    showToast('↩ 「'+name+'」を戻しました');setTimeout(reloadAll,800);});
}
function openEdit(taskId){
  var t=STATE.tasks.filter(function(x){return x.taskId===taskId;})[0];
  if(!t)return;
  STATE.editingId=taskId;
  document.getElementById('editName').value=t.name;
  document.getElementById('editTab').value=t.tab;
  // 頻度欄は clean のときだけ。clean以外は現状値が無いので既定(毎月)を仮表示
  if(t.tab==='clean') setFreq('edit',t.cycleType,t.cycleValue);
  else setFreq('edit','days',30);
  onEditTabChange();
  openModal('editModal');
}
function onEditTabChange(){
  var tab=document.getElementById('editTab').value;
  document.getElementById('editFreqWrap').style.display=(tab==='clean')?'block':'none';
}
function saveEdit(){
  var taskId=STATE.editingId; if(!taskId)return;
  var name=document.getElementById('editName').value.trim();
  if(!name){showToast('名前を入れてください');return;}
  var tab=document.getElementById('editTab').value;
  var data={action:'updateTask',taskId:taskId,name:name,tab:tab};
  if(tab==='clean'){var f=readFreq('edit');if(!f)return;data.cycleType=f.cycleType;data.cycleValue=f.cycleValue;}
  else {data.cycleType='none';data.cycleValue='';}
  rmdPost(data).then(function(){
    closeModal('editModal');STATE.editingId=null;showToast('保存しました');setTimeout(reloadAll,800);});
}

/* ===== タブ ===== */
function switchTab(tab){
  STATE.tab=tab;
  ['buy','clean','link'].forEach(function(t){
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
    document.getElementById('panel-'+t).classList.toggle('active',t===tab);
  });
}

/* ===== util ===== */
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fmtDt(iso){if(!iso)return'';var d=new Date(iso);if(isNaN(d))return String(iso).slice(0,16).replace('T',' ');
  return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}

/* ===== 初期化 ===== */
(function init(){
  buildWd('addWd'); buildWd('editWd');
  onFreqPresetChange('add');
  if(STATE.currentUser)document.getElementById('whoName').textContent=STATE.currentUser;
  if(!REMINDER_GAS_URL)document.getElementById('gasBanner').style.display='block';
  renderAll();
  loadStaff();
  reloadAll();
  if(!STATE.currentUser)openStaffModal();
})();
</script>
</body>
